<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問診記錄 - 極簡手機版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .ultra-compact { font-size: 12px; line-height: 1.22; }
        .section-header { font-size: 11.5px; font-weight: 600; color: #1e40af; }
        .mini-input { font-size: 11.5px; padding: 3.5px 5.5px; line-height: 1.15; }
        .mini-textarea { font-size: 11.5px; padding: 3.5px 5.5px; line-height: 1.3; resize: vertical; }
        .mini-btn { font-size: 9px; padding: 1px 5px; border-radius: 4px; }
        .record-row:hover { background-color: #f8fafc; }
        .form-card { max-width: 410px; margin: 0 auto; }
        .tight-section { margin-bottom: 7px; }
        .assoc-card, .past-card { background: #fafbfc; }
        .save-indicator { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-slate-100 py-2">
    <div class="max-w-[420px] mx-auto px-2">
        
        <!-- 頂部按鈕 -->
        <div class="flex justify-between items-center mb-1.5 px-1">
            <div class="font-bold text-slate-800 text-[14px] flex items-center gap-1.5">
                <i class="fa-solid fa-clipboard-list text-blue-600"></i>
                <span>問診記錄</span>
                <span id="save_indicator" class="save-indicator text-[9px] text-emerald-500 opacity-0 flex items-center gap-0.5">
                    <i class="fa-solid fa-check"></i><span>已儲存</span>
                </span>
            </div>
            <div class="flex gap-1">
                <button onclick="exportToJSON()" class="px-2 py-0.5 bg-emerald-600 text-white rounded-lg text-[10px] flex items-center gap-1">
                    <i class="fa-solid fa-download"></i>
                    <span>JSON</span>
                </button>
                <button onclick="clearAll()" class="px-2 py-0.5 bg-red-600 text-white rounded-lg text-[10px] flex items-center gap-1">
                    <i class="fa-solid fa-trash"></i>
                    <span>清空</span>
                </button>
                <button onclick="importFromJSON()" class="px-2 py-0.5 bg-white border border-slate-300 text-slate-700 rounded-lg text-[10px] flex items-center gap-1">
                    <i class="fa-solid fa-upload"></i>
                    <span>匯入</span>
                </button>
            </div>
        </div>

        <div id="form-card" class="form-card bg-white rounded-2xl shadow border border-slate-200 p-3 ultra-compact">
            
            <!-- 基本資料 -->
            <div class="grid grid-cols-3 gap-1.5 mb-2.5">
                <div>
                    <div class="text-[9px] text-slate-500 mb-0.5">日期</div>
                    <input type="date" id="record_date" class="mini-input w-full border border-slate-300 rounded-lg">
                </div>
                <div>
                    <div class="text-[9px] text-slate-500 mb-0.5">姓名 / 代號</div>
                    <input type="text" id="patient_name" class="mini-input w-full border border-slate-300 rounded-lg" placeholder="陳先生">
                </div>
                <div>
                    <div class="text-[9px] text-slate-500 mb-0.5">年齡 / 性別</div>
                    <input type="text" id="patient_age_gender" class="mini-input w-full border border-slate-300 rounded-lg" placeholder="42歲 男">
                </div>
            </div>

            <!-- 主要問題 -->
            <div class="tight-section">
                <div class="flex items-center gap-1 mb-0.5">
                    <i class="fa-solid fa-comment-dots text-blue-600 text-xs"></i>
                    <div class="section-header">主要問題</div>
                </div>
                
                <div class="grid grid-cols-12 gap-1.5 items-end">
                    <div class="col-span-5">
                        <div class="text-[9px] text-slate-600 mb-0.5">最主要痛的位置與感覺</div>
                        <input type="text" id="main_location" class="mini-input w-full border border-slate-300 rounded-lg" placeholder="右腰後方靠近髂骨，深層酸痛">
                    </div>
                    <div class="col-span-3">
                        <div class="text-[9px] text-slate-600 mb-0.5">持續多久？</div>
                        <input type="text" id="main_duration" class="mini-input w-full border border-slate-300 rounded-lg" placeholder="約2個月">
                    </div>
                    <div class="col-span-4">
                        <div class="text-[9px] text-slate-600 mb-0.5">第一次出現？</div>
                        <input type="text" id="first_occurrence" class="mini-input w-full border border-slate-300 rounded-lg" placeholder="不是，以前有過">
                    </div>
                </div>
            </div>

            <!-- 疼痛強度 + 疼痛模式 -->
            <div class="tight-section">
                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <div class="flex justify-between text-[9px] mb-0.5">
                                    <span class="text-slate-600">現在疼痛</span>
                                    <span id="current_pain_value" class="font-semibold text-blue-600">5</span>
                                </div>
                                <input type="range" id="current_pain" min="0" max="10" step="1" value="5" class="w-full accent-blue-600">
                            </div>
                            <div>
                                <div class="flex justify-between text-[9px] mb-0.5">
                                    <span class="text-slate-600">最痛</span>
                                    <span id="max_pain_value" class="font-semibold text-red-600">8</span>
                                </div>
                                <input type="range" id="max_pain" min="0" max="10" step="1" value="8" class="w-full accent-red-500">
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="grid grid-cols-2 gap-1.5">
                            <div>
                                <div class="text-[9px] text-slate-600 mb-0.5">加重因素</div>
                                <input type="text" id="aggravating_factors" class="mini-input w-full border border-slate-300 rounded-lg" placeholder="走路久、久坐">
                            </div>
                            <div>
                                <div class="text-[9px] text-slate-600 mb-0.5">緩解因素</div>
                                <input type="text" id="relieving_factors" class="mini-input w-full border border-slate-300 rounded-lg" placeholder="躺平、熱敷">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 其他痛處：卡片式列表 -->
            <div class="tight-section">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-list-ul text-teal-600 text-xs"></i>
                        <div class="section-header">其他痛處</div>
                    </div>
                    <button onclick="addAssociatedRow()" class="mini-btn bg-teal-600 text-white flex items-center gap-0.5">
                        <i class="fa-solid fa-plus text-[8px]"></i>
                        <span>新增</span>
                    </button>
                </div>
                <div id="associated_container"></div>
            </div>

            <!-- 舊傷痛史：卡片式列表 -->
            <div class="tight-section">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-1">
                        <i class="fa-solid fa-history text-orange-600 text-xs"></i>
                        <div class="section-header">舊傷痛史</div>
                    </div>
                    <button onclick="addPastPainRow()" class="mini-btn bg-orange-600 text-white flex items-center gap-0.5">
                        <i class="fa-solid fa-plus text-[8px]"></i>
                        <span>新增</span>
                    </button>
                </div>
                <div id="past_pain_container"></div>
            </div>

            <!-- 手術與外傷 + 總結 -->
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <div class="flex items-center gap-1 mb-0.5">
                        <i class="fa-solid fa-user-injured text-rose-600 text-xs"></i>
                        <div class="section-header">手術 / 外傷史</div>
                    </div>
                    <textarea id="surgery_trauma" rows="3" class="mini-textarea w-full border border-slate-300 rounded-lg" placeholder="2019右腳踝扭傷"></textarea>
                </div>
                <div>
                    <div class="flex items-center gap-1 mb-0.5">
                        <i class="fa-solid fa-sticky-note text-slate-600 text-xs"></i>
                        <div class="section-header">總結與觀察</div>
                    </div>
                    <textarea id="summary_notes" rows="3" class="mini-textarea w-full border border-slate-300 rounded-lg" placeholder="久坐後明顯"></textarea>
                </div>
            </div>

        </div>
        
        <div class="text-center text-[9px] text-slate-400 mt-1">極簡手機版 • 自動儲存至本機資料庫</div>
    </div>

    <script>
        const STORAGE_KEY = 'pain_record_autosave';
        let saveIndicatorTimeout = null;

        function updatePainValue(inputId, displayId) {
            const input = document.getElementById(inputId);
            const display = document.getElementById(displayId);
            if (input && display) display.textContent = input.value;
        }

        function initPainSliders() {
            const current = document.getElementById('current_pain');
            const maxPain = document.getElementById('max_pain');
            if (current) {
                current.oninput = () => updatePainValue('current_pain', 'current_pain_value');
                setTimeout(() => updatePainValue('current_pain', 'current_pain_value'), 10);
            }
            if (maxPain) {
                maxPain.oninput = () => updatePainValue('max_pain', 'max_pain_value');
                setTimeout(() => updatePainValue('max_pain', 'max_pain_value'), 10);
            }
        }

        // ====== 其他痛處：卡片式列表 ======
        function addAssociatedRow(data = null) {
            const container = document.getElementById('associated_container');
            const card = document.createElement('div');
            card.className = 'assoc-card border border-slate-200 rounded-lg p-2 mb-2 relative';

            const currentPain = data?.current_pain ?? 5;
            const maxPain = data?.max_pain ?? 8;

            card.innerHTML = `
                <button type="button" onclick="removeAssocCard(this)" class="absolute top-1 right-1 text-red-300 hover:text-red-500 p-0.5">
                    <i class="fa-solid fa-times text-xs"></i>
                </button>
                <div class="grid grid-cols-12 gap-1.5 items-end mb-1.5 pr-4">
                    <div class="col-span-5">
                        <div class="text-[9px] text-slate-600 mb-0.5">最主要痛的位置與感覺</div>
                        <input type="text" class="mini-input assoc-location w-full border border-slate-300 rounded-lg" placeholder="右腰後方靠近髂骨，深層酸痛" value="${data?.location || ''}">
                    </div>
                    <div class="col-span-3">
                        <div class="text-[9px] text-slate-600 mb-0.5">持續多久？</div>
                        <input type="text" class="mini-input assoc-duration w-full border border-slate-300 rounded-lg" placeholder="約2個月" value="${data?.duration || ''}">
                    </div>
                    <div class="col-span-4">
                        <div class="text-[9px] text-slate-600 mb-0.5">第一次出現？</div>
                        <input type="text" class="mini-input assoc-first w-full border border-slate-300 rounded-lg" placeholder="不是，以前有過" value="${data?.first_occurrence || ''}">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <div class="flex justify-between text-[9px] mb-0.5">
                                    <span class="text-slate-600">現在疼痛</span>
                                    <span class="assoc-current-value font-semibold text-blue-600">${currentPain}</span>
                                </div>
                                <input type="range" class="assoc-current-pain w-full accent-blue-600" min="0" max="10" step="1" value="${currentPain}">
                            </div>
                            <div>
                                <div class="flex justify-between text-[9px] mb-0.5">
                                    <span class="text-slate-600">最痛</span>
                                    <span class="assoc-max-value font-semibold text-red-600">${maxPain}</span>
                                </div>
                                <input type="range" class="assoc-max-pain w-full accent-red-500" min="0" max="10" step="1" value="${maxPain}">
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="grid grid-cols-2 gap-1.5">
                            <div>
                                <div class="text-[9px] text-slate-600 mb-0.5">加重因素</div>
                                <input type="text" class="mini-input assoc-aggravate w-full border border-slate-300 rounded-lg" placeholder="走路久、久坐" value="${data?.aggravate || ''}">
                            </div>
                            <div>
                                <div class="text-[9px] text-slate-600 mb-0.5">緩解因素</div>
                                <input type="text" class="mini-input assoc-relieve w-full border border-slate-300 rounded-lg" placeholder="躺平、熱敷" value="${data?.relieve || ''}">
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);

            const currentSlider = card.querySelector('.assoc-current-pain');
            const currentValue = card.querySelector('.assoc-current-value');
            const maxSlider = card.querySelector('.assoc-max-pain');
            const maxValue = card.querySelector('.assoc-max-value');
            currentSlider.oninput = () => { currentValue.textContent = currentSlider.value; saveToStorage(); };
            maxSlider.oninput = () => { maxValue.textContent = maxSlider.value; saveToStorage(); };

            saveToStorage();
        }

        function removeAssocCard(btn) {
            btn.closest('.assoc-card')?.remove();
            saveToStorage();
        }

        // ====== 舊傷痛史：卡片式列表 ======
        function addPastPainRow(data = null) {
            const container = document.getElementById('past_pain_container');
            const card = document.createElement('div');
            card.className = 'past-card border border-slate-200 rounded-lg p-2 mb-2 relative';

            const currentPain = data?.current_pain ?? 3;
            const maxPain = data?.max_pain ?? 6;

            card.innerHTML = `
                <button type="button" onclick="removePastCard(this)" class="absolute top-1 right-1 text-red-300 hover:text-red-500 p-0.5">
                    <i class="fa-solid fa-times text-xs"></i>
                </button>
                <div class="grid grid-cols-12 gap-1.5 items-end mb-1.5 pr-4">
                    <div class="col-span-5">
                        <div class="text-[9px] text-slate-600 mb-0.5">位置與當時情況</div>
                        <input type="text" class="mini-input past-location w-full border border-slate-300 rounded-lg" placeholder="左腰，扭傷後酸痛" value="${data?.location || ''}">
                    </div>
                    <div class="col-span-3">
                        <div class="text-[9px] text-slate-600 mb-0.5">持續多久？</div>
                        <input type="text" class="mini-input past-duration w-full border border-slate-300 rounded-lg" placeholder="約半年" value="${data?.duration || ''}">
                    </div>
                    <div class="col-span-4">
                        <div class="text-[9px] text-slate-600 mb-0.5">何時發生？</div>
                        <input type="text" class="mini-input past-when w-full border border-slate-300 rounded-lg" placeholder="2021年搬重物" value="${data?.when || ''}">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <div class="flex justify-between text-[9px] mb-0.5">
                                    <span class="text-slate-600">當時疼痛</span>
                                    <span class="past-current-value font-semibold text-blue-600">${currentPain}</span>
                                </div>
                                <input type="range" class="past-current-pain w-full accent-blue-600" min="0" max="10" step="1" value="${currentPain}">
                            </div>
                            <div>
                                <div class="flex justify-between text-[9px] mb-0.5">
                                    <span class="text-slate-600">最痛</span>
                                    <span class="past-max-value font-semibold text-red-600">${maxPain}</span>
                                </div>
                                <input type="range" class="past-max-pain w-full accent-red-500" min="0" max="10" step="1" value="${maxPain}">
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="grid grid-cols-2 gap-1.5">
                            <div>
                                <div class="text-[9px] text-slate-600 mb-0.5">加重因素</div>
                                <input type="text" class="mini-input past-aggravate w-full border border-slate-300 rounded-lg" placeholder="久坐" value="${data?.aggravate || ''}">
                            </div>
                            <div>
                                <div class="text-[9px] text-slate-600 mb-0.5">緩解因素 / 處理方式</div>
                                <input type="text" class="mini-input past-relieve w-full border border-slate-300 rounded-lg" placeholder="物理治療" value="${data?.relieve || ''}">
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);

            const currentSlider = card.querySelector('.past-current-pain');
            const currentValue = card.querySelector('.past-current-value');
            const maxSlider = card.querySelector('.past-max-pain');
            const maxValue = card.querySelector('.past-max-value');
            currentSlider.oninput = () => { currentValue.textContent = currentSlider.value; saveToStorage(); };
            maxSlider.oninput = () => { maxValue.textContent = maxSlider.value; saveToStorage(); };

            saveToStorage();
        }

        function removePastCard(btn) {
            btn.closest('.past-card')?.remove();
            saveToStorage();
        }

        function collectFormData() {
            const data = {
                version: "7.1-textarea-fields",
                export_date: new Date().toISOString(),
                record_date: document.getElementById('record_date').value,
                patient_name: document.getElementById('patient_name').value,
                patient_age_gender: document.getElementById('patient_age_gender').value,
                main_problem: {
                    location_description: document.getElementById('main_location').value,
                    duration: document.getElementById('main_duration').value,
                    first_occurrence: document.getElementById('first_occurrence').value
                },
                pain_intensity: {
                    current: parseInt(document.getElementById('current_pain').value) || 0,
                    max: parseInt(document.getElementById('max_pain').value) || 0
                },
                pain_pattern: {
                    aggravating_factors: document.getElementById('aggravating_factors').value,
                    relieving_factors: document.getElementById('relieving_factors').value
                },
                associated_symptoms: [],
                past_pain_history: [],
                surgery_trauma: document.getElementById('surgery_trauma').value,
                summary_notes: document.getElementById('summary_notes').value
            };

            document.querySelectorAll('#associated_container .assoc-card').forEach(card => {
                data.associated_symptoms.push({
                    location: card.querySelector('.assoc-location')?.value || '',
                    duration: card.querySelector('.assoc-duration')?.value || '',
                    first_occurrence: card.querySelector('.assoc-first')?.value || '',
                    current_pain: parseInt(card.querySelector('.assoc-current-pain')?.value) || 0,
                    max_pain: parseInt(card.querySelector('.assoc-max-pain')?.value) || 0,
                    aggravate: card.querySelector('.assoc-aggravate')?.value || '',
                    relieve: card.querySelector('.assoc-relieve')?.value || ''
                });
            });

            document.querySelectorAll('#past_pain_container .past-card').forEach(card => {
                data.past_pain_history.push({
                    location: card.querySelector('.past-location')?.value || '',
                    duration: card.querySelector('.past-duration')?.value || '',
                    when: card.querySelector('.past-when')?.value || '',
                    current_pain: parseInt(card.querySelector('.past-current-pain')?.value) || 0,
                    max_pain: parseInt(card.querySelector('.past-max-pain')?.value) || 0,
                    aggravate: card.querySelector('.past-aggravate')?.value || '',
                    relieve: card.querySelector('.past-relieve')?.value || ''
                });
            });

            return data;
        }

        // ====== 自動儲存至本機資料庫 (localStorage) ======
        function saveToStorage() {
            try {
                const data = collectFormData();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                flashSaveIndicator();
            } catch (e) {
                console.error('儲存失敗', e);
            }
        }

        function flashSaveIndicator() {
            const el = document.getElementById('save_indicator');
            if (!el) return;
            el.style.opacity = '1';
            clearTimeout(saveIndicatorTimeout);
            saveIndicatorTimeout = setTimeout(() => { el.style.opacity = '0'; }, 900);
        }

        function loadFromStorage() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const data = JSON.parse(raw);
                fillFormWithData(data);
                return true;
            } catch (e) {
                console.error('讀取失敗', e);
                return false;
            }
        }

        async function exportToJSON() {
            const data = collectFormData();
            const json = JSON.stringify(data, null, 2);
            try {
                await navigator.clipboard.writeText(json);
                alert('JSON 已複製');
            } catch {
                prompt('請手動複製', json);
            }
        }

        async function importFromJSON() {
            let text = '';
            try { text = await navigator.clipboard.readText(); } catch { text = prompt('貼上 JSON'); }
            if (!text) return;
            try {
                fillFormWithData(JSON.parse(text));
                saveToStorage();
            } catch { alert('格式錯誤'); }
        }

        function clearAll() {
            if (!confirm('確定要清空所有已填寫的資料嗎？此操作無法復原。')) return;

            document.getElementById('patient_name').value = '';
            document.getElementById('patient_age_gender').value = '';
            document.getElementById('main_location').value = '';
            document.getElementById('main_duration').value = '';
            document.getElementById('first_occurrence').value = '';
            document.getElementById('current_pain').value = 5;
            document.getElementById('max_pain').value = 8;
            updatePainValue('current_pain', 'current_pain_value');
            updatePainValue('max_pain', 'max_pain_value');
            document.getElementById('aggravating_factors').value = '';
            document.getElementById('relieving_factors').value = '';
            document.getElementById('surgery_trauma').value = '';
            document.getElementById('summary_notes').value = '';

            document.getElementById('associated_container').innerHTML = '';
            document.getElementById('past_pain_container').innerHTML = '';

            document.getElementById('record_date').value = new Date().toISOString().split('T')[0];

            localStorage.removeItem(STORAGE_KEY);
            saveToStorage();
        }

        function fillFormWithData(data) {
            if (!data) return;

            if (data.record_date) document.getElementById('record_date').value = data.record_date;
            if (data.patient_name !== undefined) document.getElementById('patient_name').value = data.patient_name;
            if (data.patient_age_gender !== undefined) document.getElementById('patient_age_gender').value = data.patient_age_gender;

            if (data.main_problem) {
                document.getElementById('main_location').value = data.main_problem.location_description || '';
                document.getElementById('main_duration').value = data.main_problem.duration || '';
                document.getElementById('first_occurrence').value = data.main_problem.first_occurrence || '';
            }

            if (data.pain_intensity) {
                const c = document.getElementById('current_pain');
                const m = document.getElementById('max_pain');
                if (c) { c.value = data.pain_intensity.current || 0; updatePainValue('current_pain', 'current_pain_value'); }
                if (m) { m.value = data.pain_intensity.max || 0; updatePainValue('max_pain', 'max_pain_value'); }
            }

            if (data.pain_pattern) {
                document.getElementById('aggravating_factors').value = data.pain_pattern.aggravating_factors || '';
                document.getElementById('relieving_factors').value = data.pain_pattern.relieving_factors || '';
            }

            document.getElementById('associated_container').innerHTML = '';
            data.associated_symptoms?.forEach(item => addAssociatedRow(item));

            document.getElementById('past_pain_container').innerHTML = '';
            data.past_pain_history?.forEach(item => addPastPainRow(item));

            if (data.surgery_trauma !== undefined) document.getElementById('surgery_trauma').value = data.surgery_trauma;
            if (data.summary_notes !== undefined) document.getElementById('summary_notes').value = data.summary_notes;
        }

        function init() {
            const restored = loadFromStorage();

            const dateInput = document.getElementById('record_date');
            if (dateInput && !dateInput.value) {
                dateInput.value = new Date().toISOString().split('T')[0];
            }
            initPainSliders();

            // 事件委派：任何欄位輸入時自動儲存（包含動態新增的卡片）
            const formCard = document.getElementById('form-card');
            formCard.addEventListener('input', saveToStorage);
            formCard.addEventListener('change', saveToStorage);

            if (!restored) saveToStorage();
        }

        window.onload = init;

        window.DEBUG_fill = function() {
            const sample = {
                "record_date":"2026-07-22",
                "patient_name":"陳先生",
                "patient_age_gender":"42歲 男",

                "pain_intensity":{"current":5,"max":8},
                "pain_pattern":{"aggravating_factors":"走路久、久坐後起身","relieving_factors":"躺平、熱敷"},
                "associated_symptoms":[{"location":"右膝前側","duration":"1個月","first_occurrence":"是","current_pain":3,"max_pain":5,"aggravate":"上下樓梯","relieve":"休息"}],
                "past_pain_history":[{"location":"左腰扭傷","duration":"約半年","when":"2021年搬重物","current_pain":2,"max_pain":6,"aggravate":"久坐","relieve":"物理治療"}],
                "surgery_trauma":"2019右腳踝扭傷",
                "summary_notes":"久坐後明顯"
            };
            fillFormWithData(sample);
            saveToStorage();
        };
    </script>

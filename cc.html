    "answer": "\u003Cp\u003Eir-ta\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：脛後肌中1/3（\u003Cmark\u003E正中間\u003C/mark\u003E）\u003C/li\u003E\u003Cli\u003E如何找到：側躺，從脛骨後方進入，\u003Cmark\u003E避免碰到內側腓腸肌\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：腳踝問題、足底筋膜炎\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E側躺背向自己，上腳曲膝在前下腳曲膝在後，下腳膝掂上腳小腿肚\u003C/mark\u003E，一手撑床邊或床尾，另一手肘上下摔，\u003Cmark\u003E從後往前\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：\u003Cmark\u003E足趾上擡、足跟著地，向內推抗阻\u003C/mark\u003E，檢查踝內側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E踝內點可能有點棘手，因為它涉及脛後肌（tibialis posterior）和屈趾長肌（flexor digitorum muscle）。你必須盡力處理脛後肌，同時避免碰到內側的腓腸肌（gastrocnemius）。\u003Cbr /\u003E患者需要側躺，你必須從後向前，以一個特殊的角度進入，才能在不觸碰周圍組織的情況下，處理到脛後肌的中段三分之一處。這個點位可能非常僵硬。它對於處理腳踝問題以及足底筋膜炎（plantar fasciitis）非常有幫助。建議的姿勢是讓患者側躺並彎曲膝蓋，你再從後方用手肘進入。\u003C/p\u003E\u003Cp\u003E此點在後脛肌（tibialis posterior）中段。我先定位脛骨，從其後方進入，避免觸碰到內側腓腸肌（gastrocnemius medialis）。治療以沿脛骨「儘可能貼近」的縱向方式進行，點位就在此。\u003C/p\u003E\u003Cp\u003Eir-ta 將位於脛骨後肌的中三分之一。\u003Cbr /\u003E所以我們確認出脛骨，走到正後方，我們試著避免碰到腓腸肌內側頭。\u003Cbr /\u003E我們將盡可能靠近脛骨，對這個點進行縱向治療。\u003Cbr /\u003E所以 ir-ta 將會在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090507-ir-ta-l1.jpeg\" alt=\"ir-ta-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090517-ir-ta-t1.jpeg\" alt=\"ir-ta-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090523-ir-ta-t2.jpeg\" alt=\"ir-ta-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090532-ir-ta-t3.jpeg\" alt=\"ir-ta-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E內旋可以讓患者提起腳趾\u003Cbr /\u003E腳跟踩地 腳尖頂你的手\u003Cbr /\u003E檢查踝關節是否有疼痛\u003Cbr /\u003E同理向外側\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（足趾上舉、足跟承重向內推）：患者擡起足趾、足跟著地，向我手掌內推；我檢查踝內側是否有疼痛或牽拉。\u003C/li\u003E\u003Cli\u003EExtra（向外推）：同姿勢下向外推，觀察踝外側牽拉或緊繃。\u003C/li\u003E\u003C/ul\u003     "answer": "\u003Cp\u003Eir-pe\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：外展拇肌中遠1/3、肌腹上方\u003C/li\u003E\u003Cli\u003E如何找到：外展拇肌中段與遠端三分之一，保持在肌腹上方\u003C/li\u003E\u003Cli\u003E臨床意義：大拇趾疼痛、抽筋\u003C/li\u003E\u003Cli\u003E推薦手法：側臥，上腳曲抬腿70度，下腳也曲但腳掌和床邊平行，兩隻腳不貼對方，企床角，一隻手撐床掌手貼床頂住腳背，另一隻手縱向摔（避開第一蹠骨骨膜）\u003C/li\u003E\u003Cli\u003E動作驗證：禁住大腳趾叫對方大腳趾外展或擠壓，檢查疼痛或抽筋，書就話進行足內側緣和第1跖趾關節的負重測試（只有波子骨內側掂地）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足內點位於外展拇肌（abductor hallucis）、屈拇短肌（flexor hallucis brevis）與屈拇長肌（flexor hallucis longus）的區域。我們要處理的是覆蓋在外展拇肌上的所有筋膜。\u003Cbr /\u003E請在外展拇肌的中段與遠端三分之一處施作，並採用縱向手法，同時小心不要壓迫到第一蹠骨的骨膜。這個點位對於處理大拇趾疼痛非常重要，但疼痛也可能擴散到足部的其他區域，甚至引起抽筋。\u003C/p\u003E\u003Cp\u003E此點位於拇趾外展肌（abductor hallucis），在肌腹的中段與遠端三分之一之間。我保持在肌腹上方操作，避免接觸第一掌骨；並以縱向方式處理，以免造成骨膜瘀傷\u003C/p\u003E\u003Cp\u003Eir-pe 將會位於外展拇肌。\u003Cbr /\u003E所以它會位於中三分之一和遠端三分之一之間，正好在肌腹上方，不要碰到第一蹠骨。\u003Cbr /\u003E所以試著保持在正上方並進行縱向操作，這樣你就不會弄傷骨膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090524-ir-pe1.jpeg\" alt=\"ir-pe1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090529-ir-pe-t1.jpeg\" alt=\"ir-pe-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090534-ir-pe-t2.jpeg\" alt=\"ir-pe-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090538-ir-pe-t3.jpeg\" alt=\"ir-pe-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090543-ir-pe-t4.jpeg\" alt=\"ir-pe-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者做一個大腳趾外展 或者用你的手擠壓大腳趾\u003Cbr /\u003E患者可能感覺大腳趾處疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（拇趾外展或擠壓）：我請患者做拇趾外展，或以手擠壓拇趾；患者於拇趾外展肌（abductor hallucis）出現抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010653-move-pe-ir.jpeg\" alt=\"move-pe-ir\" /\     "answer": "\u003Cp\u003Eir-sc\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：鎖骨下方中外1/3、鎖骨下肌\u003C/li\u003E\u003Cli\u003E如何找到：鎖骨中段與外側1/3下方，沿鎖骨方向感覺鎖骨下肌\u003C/li\u003E\u003Cli\u003E臨床意義：放射至整個胸部和手臂，放射痛有時比局部更強\u003C/li\u003E\u003Cli\u003E推薦手法：橫向由下往上（手肘可）\u003C/li\u003E\u003Cli\u003E動作驗證：手放對側肩、肘靠近頸部，檢查終末感與疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛內點非常常見，它所造成的放射痛範圍很廣，因為我們施作的對象是鎖骨下肌（subclavius muscle）。這條肌肉是鎖腋筋膜（clavi-axillary fascia）的張力調節者，因此異常會放射到整個胸部和手臂。有時候，放射痛的感覺甚至比施作點本身的疼痛更為強烈。\u003Cbr /\u003E施作位置在鎖骨下方，介於鎖骨的中段與外側三分之一段之間，對著鎖骨下肌施力。手法是橫向的，並由下往上推。如果患者的胸大肌特別發達，你甚至可以用手肘來處理。這個點位對於處理肩膀、頸部和手臂的問題非常重要。\u003C/p\u003E\u003Cp\u003E此點位於鎖骨下肌（subclavius）之上。鎖骨下肌在鎖骨之下，我以特定角度接近，並在「中間與中間三分之一之間」的區段，沿鎖骨方向定位並處理。\u003C/p\u003E\u003Cp\u003Eir-sc 是頂著鎖骨下肌。\u003Cbr /\u003E鎖骨下肌就在鎖骨正下方，而我們想以這個角度接近。\u003Cbr /\u003E所以你停留在中段與中三分之一之間，顯然是要朝著鎖骨的方向。\u003Cbr /\u003E所以是 ir-sc。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090533-ir-sc-l1.jpeg\" alt=\"ir-sc-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090539-ir-sc-t1.jpeg\" alt=\"ir-sc-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090544-ir-sc-t2.jpeg\" alt=\"ir-sc-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090548-ir-sc-t3.jpeg\" alt=\"ir-sc-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者將手放在對側的肩膀\u003Cbr /\u003E你可以用手輕微施加壓力\u003Cbr /\u003E檢查末端感覺\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（對側上擡、肘靠頸）：我請患者以手臂穿越至對側，讓肘部盡量靠近頸部；我可輕壓鎖骨區並檢查終末感與疼痛。\u003C/li\u003E\u003C/ul\u003E"

    "answer": "\u003Cp\u003Eir-hu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：腋窩深處喙肱肌（肱二頭肌短頭後方）\u003C/li\u003E\u003Cli\u003E如何找到：躺，外展45度，\u003Cmark\u003E曲肘，手指朝天，把三隻手指放在腋窩，你想要減少肱二頭肌短頭的張力。請患者以某種方式頂著你的手用力\u003C/mark\u003E，這樣一來，當肱二頭肌短頭不移動時，喙肱肌就會變大。\u003C/li\u003E\u003Cli\u003E臨床意義：棒球肩、肩膀內後側疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：指節：躺，外展45度，曲肘，手指朝天，一隻手捉手腕，另一隻手平行上臂摔：肘：同指節一樣但外展75度\u003C/li\u003E\u003Cli\u003E動作驗證：站，曲肘90度，上臂貼身體，手掌指前，自己交叉手捉住對方另一側手腕，叫對方兩手內旋抗阻，檢查肩內側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肱骨內點的主要目標是喙肱肌（coracobrachialis），但肩胛下肌（subscapularis）和胸大肌也是這個肌筋膜單位的一部分。施作時，需要讓手臂稍微外旋，以便觸診到位於腋窩深處的喙肱肌。\u003Cbr /\u003E喙肱肌位於肱二頭肌短頭（short head of the biceps）的後方。圖片可能無法完美呈現其位置，但它就在肱二頭肌短頭的正下方。讓患者外旋手臂可以幫助你更容易地找到這條肌肉。更簡單的方式是彎曲手肘，如此一來，前方的肌肉是肱二頭肌短頭，而下方的則是喙肱肌。這個點位與棒球員常見的肩部疼痛、肩膀內部及後側的疼痛有關。\u003C/p\u003E\u003Cp\u003E此點對應喙肱肌（coracobrachialis），其位置在肱二頭肌短頭後方。我用三指放入腋窩以減少肱二頭肌短頭的張力，並請患者往我的手施力，使喙肱肌在不移動裝置的情況下「變大再變小」。能觸到此肌肉的收縮變化，點位就在該處。\u003C/p\u003E\u003Cp\u003Eir-hu 是頂著喙肱肌。\u003Cbr /\u003E喙肱肌就在肱二頭肌短頭的正後方。\u003Cbr /\u003E你要如何確認那個結構？你可以把三隻手指放在腋窩，你想要減少肱二頭肌短頭的張力。\u003Cbr /\u003E你想要請患者以某種方式頂著你的手用力，這樣一來，當肱二頭肌短頭不移動時，喙肱肌就會變大。\u003Cbr /\u003E所以這個變大和變小的結構就是喙肱肌，治療點就會在那裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090542-ir-hu-l1.jpeg\" alt=\"ir-hu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E找點：躺，外展45度，曲肘，手指朝天，把三隻手指放在腋窩，你想要減少肱二頭肌短頭的張力。請患者以某種方式頂著你的手用力，這樣一來，當肱二頭肌短頭不移動時，喙肱肌就會變大。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260602070605-ir-hu-p.jpeg\" alt=\"ir-hu-p\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090547-ir-hu-t1.jpeg\" alt=\"ir-hu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090554-ir-hu-t2.jpeg\" alt=\"ir-hu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090500-ir-hu-t3.jpeg\" alt=\"ir-hu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090505-ir-hu-t4.jpeg\" alt=\"ir-hu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090511-ir-hu-t5.jpeg\" alt=\"ir-hu-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260602070652-ir-hu-t.jpeg\" alt=\"ir-hu-t\" /\u003E\u003C/p\u003E\u003Cp\u003E抗阻向內推\u003Cbr /\u003E檢查是否有肩膀內側的疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（內推）：我請患者向內推，觀察肩內側區域疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010622-move-hu-ir.jpeg\" alt=\"move-hu-ir\" /\u003E\u003C/p\u003E"

    "question": "ir-cu",
    "answer": "\u003Cp\u003Eir-cu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：旋前圓肌深層（近端1/3或中段）（可能指旋前圓肌自己近端1/3位置）\u003Cmark\u003E總之好近內上髁，前臂近端 16 分一的位置，留意旋前圓肌起點佔內上髁較多的空間\u003C/mark\u003E）\u003C/li\u003E\u003Cli\u003E如何找到：近肘的近端1/3中段，感覺較表淺且僵硬結構\u003C/li\u003E\u003Cli\u003E臨床意義：手肘痛並放射至肩膀\u003C/li\u003E\u003Cli\u003E推薦手法：躺，縱向或斜向摔，肘或指節，指節的話另一隻手固定對方上臂\u003C/li\u003E\u003Cli\u003E動作驗證：自己雙手合十鉗實對方手腕，叫對方旋後相關抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘內點非常、非常常見。你會看到許多過度使用手部的患者都有這個問題。它的位置在典型疼痛點的遠端，也就是說，其他點位都在其上方，而它在下方。\u003Cbr /\u003E我們要處理的是旋前圓肌（pronator teres）的深層。你可以在肌肉的近端三分之一或中段，以縱向或斜向的方式施作，這些方向都是有效的。疼痛不僅會出現在手肘，也常放射到肩膀。\u003C/p\u003E\u003Cp\u003E此點位於肱動脈（brachial artery）路徑上。肱動脈由內外上髁附近走向前臂，呈稍微斜向。我辨識較表淺且較堅挺的動脈結構，並在近肘的近端「上三分之一的中段」定位，此即為 intracebital 的位置。\u003C/p\u003E\u003Cp\u003Eir-cu 將會位於肱動脈（此處應指肱肌，語誤說成 brachial artery）。\u003Cbr /\u003E肱肌（brachialis）來自髁部。\u003Cbr /\u003E它的走向稍微呈斜向。\u003Cbr /\u003E所以，我們必須確認出這個更表淺且更僵硬的結構，並想要停留在近端三分之一的中間，非常靠近手肘的近端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090539-ir-cu-l1.jpeg\" alt=\"ir-cu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090544-ir-cu-t1.jpeg\" alt=\"ir-cu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090549-ir-cu-t2.jpeg\" alt=\"ir-cu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090554-ir-cu-t3.jpeg\" alt=\"ir-cu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E我們固定住手部\u003Cbr /\u003E讓患者旋後檢查外旋\u003Cbr /\u003E然後旋前 檢查的是內旋\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（旋前旋後）：我將手固定在中性位，請患者做旋後以檢查 Extra，做旋前以檢查 Intra。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010612-move-cu-er.jpeg\" alt=\"move-cu-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010617-move-cu-ir.jpeg\" alt=\"move-cu-ir\" /\u003E\u003C/p\u003E"

    "question": "ir-ca",
    "answer": "\u003Cp\u003Eir-ca\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：旋前方肌與所有屈肌筋膜\u003C/li\u003E\u003Cli\u003E如何找到：屈肌肌腱與肌肉交界處，正中神經上方\u003C/li\u003E\u003Cli\u003E臨床意義：手腕放射痛與麻木感\u003C/li\u003E\u003Cli\u003E推薦手法：縱向分散壓力\u003C/li\u003E\u003Cli\u003E動作驗證：握手向外滾動，患者做旋前抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腕內點主要處理旋前方肌（pronator quadratus）以及所有屈肌的筋膜。施作位置在屈肌的肌腱與肌肉交界處。由於這個位置正上方就是正中神經（median nerve），所以施力時要分散壓力，不要過度集中在某一點上。\u003Cbr /\u003E建議使用縱向的手法施作，通常位於屈指淺肌（flexor digitorum superficialis）與旋前方肌之間的深層筋膜會因此變得柔軟。這個點位常伴隨大量的放射痛和麻木感，典型的疼痛會出現在手腕。\u003C/p\u003E\u003Cp\u003E此點在「小指屈肌」（flexor digiti）於掌指關節（metacarpal phalangeal junction）的區域，位於旋前方肌（pronator quadratus）之上。我往近端觸摸，當我在掌指關節交界處正中感覺到定位點，即為需以「肘部」施作的 ir-ca 。\u003C/p\u003E\u003Cp\u003Eir-ca 位於旋前方肌上方、指屈肌的肌腱與骨骼交界處（此處語誤說成 metacarpal phalangeal junction 掌指關節，實指與旋前方肌相關的肌腱/肌肉交界處）。\u003Cbr /\u003E所以當你往近端摸，感覺到那個交界處時，就在那裡的正中間。\u003Cbr /\u003E你手肘放的位置就是這個點，ir-ca。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090545-ir-ca1.jpeg\" alt=\"ir-ca1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090549-ir-ca-t1.jpeg\" alt=\"ir-ca-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090553-ir-ca-t2.jpeg\" alt=\"ir-ca-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090558-ir-ca-t3.jpeg\" alt=\"ir-ca-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090503-ir-ca-t4.jpeg\" alt=\"ir-ca-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090507-ir-ca-t5.jpeg\" alt=\"ir-ca-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E握住患者手部\u003Cbr /\u003E患者做一個旋後\u003Cbr /\u003E然後我們向外轉 患者需要旋前抗阻\u003Cbr /\u003E然後我們向外轉 患者需要旋前抗阻（檢查的是內旋-腕部）\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（滾動測試）：我握住患者手進行「向內滾動」，患者做旋後（即 Extra）；再「向外滾動」，患者做旋前（即 Intra）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010652-move-ca-er.jpeg\" alt=\"move-ca-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010600-move-ca-ir.jpeg\" alt=\"move-ca-ir\" /\u003E\u003C/p\u003E"

    "question": "ir-di",
    "answer": "\u003Cp\u003Eir-di\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：掌骨間韌帶（第2-3與3-4掌骨間）\u003C/li\u003E\u003Cli\u003E如何找到：第2-3與3-4掌骨間，感覺彈撥的韌帶\u003C/li\u003E\u003Cli\u003E臨床意義：板機指、手指疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：指關節\u003C/li\u003E\u003Cli\u003E動作驗證：收起所有手指抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E在這個點位，我們主要處理的是緻密結締組織，特別是掌骨間韌帶（metacarpal ligaments），而不是掌腱膜（palmar aponeurosis）。請在第二與第三、以及第三與第四掌骨之間觸診。如果你在掌骨頭的高度感覺到有彈撥感，這代表掌骨間韌帶非常僵硬，可能導致滑輪系統（pulley system）的僵硬，進而引發板機指或手指疼痛。\u003Cbr /\u003E在這個微小的區域，你可以用指關節施作。在嚴重的情況下，雖然可以用手肘稍微處理掌腱膜，但很難區分何為病理狀態，何為生理正常，因為掌腱膜本身就非常堅韌\u003C/p\u003E\u003Cp\u003E此點位於手掌區域的掌骨間韌帶（metacarpal ligament）。我在第二與第三掌骨之間，或第三與第四掌骨之間辨識該韌帶，兩處皆可作為 ir-di 的治療點，重點是精準落在掌骨間韌帶上。\u003C/p\u003E\u003Cp\u003Eir-di 將會位於掌側區域，但主要是在掌骨間韌帶。\u003Cbr /\u003E所以，我們將在第二和第三、以及第三和第四掌骨之間確認出一個彈撥感，那正是掌骨間韌帶。\u003Cbr /\u003E所以 ir-di 可以位於第二和第三掌骨之間，或者也可以在第三和第四掌骨之間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090554-ir-di-l1.jpeg\" alt=\"ir-di-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090500-ir-di-l2.jpeg\" alt=\"ir-di-l2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090506-ir-di-t1.jpeg\" alt=\"ir-di-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090510-ir-di-t2.jpeg\" alt=\"ir-di-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E患者抗阻收起所有的手指\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（全指屈曲抗阻）：請患者全指屈曲並對抗阻力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010649-move-di-ir.jpeg\" alt=\"move-di-ir\" /\u003E\u003C/p\u003E"

    "question": "er-cp1",
    "answer": "\u003Cp\u003Eer-cp1\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：眼球正下方眼眶下緣，處理下斜肌筋膜\u003C/li\u003E\u003Cli\u003E如何找到：眼眶下緣外側，向下推壓感覺阻力處\u003C/li\u003E\u003Cli\u003E臨床意義：頭痛、偏頭痛、功能性斜視\u003C/li\u003E\u003Cli\u003E推薦手法：一係一隻手托下巴，另一隻手指腹橫向摔，一係雙手，四指托住下顎骨角，雙手拇指在指腹橫向摔（避開眼球）\u003C/li\u003E\u003Cli\u003E動作驗證：手指由中間往斜上方偏側移動，檢查額外範圍\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位在眼球正下方，主要處理的是下斜肌以及眼眶的下緣。操作時，我們會用指尖向下按壓，注意不要刺激到眼睛，目標是處理與下斜肌相連的筋膜。這個點對於頭痛、偏頭痛，以及功能性斜視等功能障礙都很重要。\u003C/p\u003E\u003Cp\u003Eer-cp1 位於側邊「ice」的下緣。我在操作時的目標是透過「feet」推進，因此完全不碰觸「ice」。在這個側方下緣的位置，就是 er-cp1。\u003C/p\u003E\u003Cp\u003Eer-cp1 將會位於眼睛外側的下緣。\u003Cbr /\u003E我們想要穿過脂肪（此處語誤將 fat 說成 feet）進行推壓，所以我們完全不想碰觸到眼睛（此處語誤將 eye 說成 ice）。\u003Cbr /\u003E所以這裡我們有 er-cp1。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090551-er-cp1-l1.jpeg\" alt=\"er-cp1-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090555-er-cp1-t1.jpeg\" alt=\"er-cp1-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090500-er-cp1-t2.jpeg\" alt=\"er-cp1-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090506-er-cp1-t3.jpeg\" alt=\"er-cp1-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090510-er-cp1-t4.jpeg\" alt=\"er-cp1-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E向斜上方\u003Cbr /\u003E這里檢查的是外旋-頭部1左側\u003Cbr /\u003E右側同理\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra：手指往高位並偏側移動，我先檢查左側的額外範圍（extra）並回位，之後同樣檢查右側。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120611-move-er-cp1a.jpeg\" alt=\"move-er-cp1a\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120630-move-er-cp1b.jpeg\" alt=\"move-er-cp1b\"     "question": "er-cp2",
    "answer": "\u003Cp\u003Eer-cp2\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：耳上肌（耳朵正上方），帽狀腱膜張力來源\u003C/li\u003E\u003Cli\u003E如何找到：耳朵頂端，感覺帽狀腱膜張力處\u003C/li\u003E\u003Cli\u003E臨床意義：平衡功能障礙、頭痛偏頭痛\u003C/li\u003E\u003Cli\u003E推薦手法：整右邊時，頭轉左邊，企床頭，一隻手撐床一頂佢佢頭左邊，另一手指節橫向摔\u003C/li\u003E\u003Cli\u003E動作驗證：兩邊一齊做，伸出兩隻手指，向下壓對方耳朵檢查對稱性與疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位在耳朵正上方的上耳肌。這條肌肉理論上應該能提起耳朵，但實際上，它是帽狀腱膜（Galea Aponeurotica，即頭頂的筋膜）的主要張力來源。它之所以重要，是因為作為帽狀腱膜的張力來源，它對平衡功能有所影響，處理不當也可能引發許多頭痛和偏頭痛問題。\u003C/p\u003E\u003Cp\u003E尋找 er-cp2 時，我會先定位 auricularis superior（耳廓上方）。在耳朵頂部，可以找到作為 galacapitis 張力來源的結構；在耳朵的水平高度，er-cp2 位於 temporalis 上方。\u003C/p\u003E\u003Cp\u003Eer-cp2，我們將會尋找耳上肌。所以在耳朵的頂端，那是帽狀腱膜的張肌。所以就在耳朵水平高度的這個位置，我們在顳肌上方有 er-cp2。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090501-er-cp2-l1.jpeg\" alt=\"er-cp2-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090506-er-cp2-t1.jpeg\" alt=\"er-cp2-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090511-er-cp2-t2.jpeg\" alt=\"er-cp2-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E同樣的原理檢查耳上肌 所以手放在耳朵上面\u003Cbr /\u003E把耳朵向下壓\u003Cbr /\u003E檢查對稱性 以及有無疼痛、尖銳疼痛和僵硬\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（耳向下壓）：我在耳朵上緣施力，將整個耳朵往下推以測試上耳肌（auricularis superior），檢查終末感、是否有不對稱或疼痛，留意患者回報的銳痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100638-move-cp2-er.jpeg\" alt=\"move-cp2-er\" /\u003E\u003C/p\u003E"

    "question": "er-cp3",
    "answer": "\u003Cp\u003Eer-cp3\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：耳後肌、乳突後上方（胸鎖乳突肌終點附近）\u003C/li\u003E\u003Cli\u003E如何找到：乳突後方，感覺粗糙表面或緊繃處\u003C/li\u003E\u003Cli\u003E臨床意義：頭痛、偏頭痛、胸鎖乳突肌緊繃\u003C/li\u003E\u003Cli\u003E推薦手法：乳突後緣縱向處理\u003C/li\u003E\u003Cli\u003E動作驗證：向前推動耳朵，檢查雙側疼痛、僵硬或終末感差異\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位在耳後肌（Orbicularis Posterior），也是胸鎖乳突肌的終點，頭夾肌也匯集於此。操作時，我們要在乳突的後緣進行縱向處理。耳後肌的細小纖維從這裡發出，胸鎖乳突肌的纖維從另一側過來，而頭夾肌則從另一個方向而來。通常一個簡單的處理方式是讓頸部屈曲，這樣可以稍微減輕胸鎖乳突肌的張力，因為它在那個位置容易變得過於緊繃，並可能引發嚴重的頭痛和偏頭痛\u003C/p\u003E\u003Cp\u003Eer-cp3 位於 auricularis posterior 的位置，靠上、在乳突（mastoid）上方。我會在乳突後方操作，這裡通常比較容易感覺到粗糙的表面，這種粗糙感與 auricularis posterior 的改變有關。此處即為 er-cp3。\u003C/p\u003E\u003Cp\u003Eer-cp3 位於耳後肌，在乳突上方。\u003Cbr /\u003E我們可以直接在乳突正後方進行操作。\u003Cbr /\u003E所以，由於耳後肌的改變，更容易感覺到像粗糙的表面。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090551-er-cp3-l1.jpeg\" alt=\"er-cp3-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090559-er-cp3-t1.jpeg\" alt=\"er-cp3-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090505-er-cp3-t2.jpeg\" alt=\"er-cp3-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E我們想要牽拉他的耳肌區域\u003Cbr /\u003E把耳朵向前活動\u003Cbr /\u003E檢查雙側是否對稱 是否有僵硬感 是否疼痛\u003Cbr /\u003E檢查一側 然後再檢查另一側\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（後耳肌伸展）：我向前推動耳朵，兩側都要檢查，觀察終末感是否引發疼痛、僵硬或兩側差異。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100628-move-cp3-er.jpeg\" alt=\"move-cp3-er\" /\u003E\u003C/p\u003E"

    "question": "er-cl",
    "answer": "\u003Cp\u003Eer-cl\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：提肩胛肌 C3–C4 起點\u003C/li\u003E\u003Cli\u003E如何找到：從鎖骨後方往上，沿提肩胛肌走向找到索狀結構\u003C/li\u003E\u003Cli\u003E臨床意義：頸旋轉痛與頭痛\u003C/li\u003E\u003Cli\u003E推薦手法：指關節縱向\u003C/li\u003E\u003Cli\u003E動作驗證：轉頭至一側並加壓，檢查終末感、疼痛與受限\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位在提肩胛肌，在第三、四節頸椎（C3-C4）的高度。它也可能影響到後方肌群。操作時，我們用指關節縱向處理，會感覺到這個方向有一條像繩索般的結構。典型的癥狀是頸部旋轉時的疼痛，但疼痛也可能向上延伸至頭部\u003C/p\u003E\u003Cp\u003Eer-cl 位於 levator scapulae 的起點，層級大約在 C3、C4，甚至延伸到 C2。我會到鎖骨末端後側，沿著肌纖維方向做縱向觸診；在這個位置，就能找到 er-cl。\u003C/p\u003E\u003Cp\u003Eer-cl 位於提肩胛肌中，在提肩胛肌的起點處，相當於 C3、C4，甚至 C2 的水平高度。\u003Cbr /\u003E所以，我們想直接走到鎖骨端的正後方，並且我們想要順著肌肉纖維的方向進行縱向觸診。\u003Cbr /\u003E所以就在這裡我們有 er-cl。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090542-er-cl-l1.jpeg\" alt=\"er-cl-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090547-er-cl-t1.jpeg\" alt=\"er-cl-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090552-er-cl-t2.jpeg\" alt=\"er-cl-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者轉頭看向一側\u003Cbr /\u003E用手施加一些壓力 看患者有無疼痛以及檢查末端感覺\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（旋轉與端穩測試）：我請患者將頸部旋轉至一側，可用手托住枕骨並在顴骨處提供推力，檢查終末感、疼痛或受限。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100648-move-cl-er.jpeg\" alt=\"move-cl-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100655-move-cl-er2.jpeg\" alt=\"move-cl-er2\" /\u003E\u003C/p\u003E"

    "question": "er-th",
    "answer": "\u003Cp\u003Eer-th\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：肩胛骨內側緣內側、上後鋸肌\u003C/li\u003E\u003Cli\u003E如何找到：肩胛棘與肩胛骨內側緣，向下方伸入感覺突起\u003C/li\u003E\u003Cli\u003E臨床意義：上背、頸、肩痛\u003C/li\u003E\u003Cli\u003E推薦手法：手肘\u003C/li\u003E\u003Cli\u003E動作驗證：擡肩並擠壓頸根部，檢查肩胛上緣銳痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這是一個很常見的點位，目標是上後鋸肌，並會延伸至闊背肌。為了接觸到上後鋸肌，我們需要穿過斜方肌和菱形肌。操作方式是在脊椎末端，沿著肌肉內側緣處理，這樣可以有效地減輕張力。上後鋸肌是一條非常細小的肌肉，它沒有真正的附著點，而是融入從上到下延伸的鋸肌筋膜中，一直連到下後鋸肌，也就是我們下一個「額外腰部點」的位置。這個點位典型的問題是上背、頸部和肩膀的疼痛。\u003C/p\u003E\u003Cp\u003Eer-th 為 serratus posterior superior，位置在肩胛骨內側緣的內側。我會先找到肩胛棘（spine of the scapula）與肩胛骨內側緣，再嘗試往肩胛骨下方伸入；在此區域，即為 er-th。\u003C/p\u003E\u003Cp\u003Eer-th 是後上鋸肌。\u003Cbr /\u003E它位於肩胛骨內側緣的內側。\u003Cbr /\u003E所以我們找到肩胛岡、內側緣，並試著走到肩胛骨的下方。\u003Cbr /\u003E這裡我們有 er-th。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090532-er-th-l1.jpeg\" alt=\"er-th-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090539-er-th-t1.jpeg\" alt=\"er-th-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090544-er-th-t2.jpeg\" alt=\"er-th-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090549-er-th-t3.jpeg\" alt=\"er-th-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090554-er-th-t4.jpeg\" alt=\"er-th-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E去擠壓患者的前鋸肌\u003Cbr /\u003E可以提起患者的肩膀 擠壓頸部根部\u003Cbr /\u003E患者或感覺尖銳疼痛\u003Cbr /\u003E在肩胛骨的上緣\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（上後鋸肌擠壓）：我協助擡肩並擠壓頸根部，患者會在肩胛上緣感到銳痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100645-move-th-er.jpeg\" alt=\"move-th-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100650-move-th-er.jpeg\" alt=\"move-th-er\" /\u003E\u003C/p\u003E"

    "question": "er-lu",
    "answer": "\u003Cp\u003Eer-lu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：第12肋下方、下後鋸肌\u003C/li\u003E\u003Cli\u003E如何找到：沿第12肋下緣滑動，感覺外側邊緣彈撥或凸起即是\u003C/li\u003E\u003Cli\u003E臨床意義：腰部扭轉相關張力、下背痛\u003C/li\u003E\u003Cli\u003E推薦手法：手肘深壓\u003C/li\u003E\u003Cli\u003E動作驗證：固定骨盆，請患者盡量向後轉身回頭看，可輕壓檢查疼痛或抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位在第十二根肋骨下方，對應下後鋸肌。最好的尋找方式是沿著第十二根肋骨，當你感覺到一個邊緣凸起時就是了。這看起來可能像闊背肌，但實際上鋸肌就在這裡，比闊背肌小。操作時，在肋骨正下方，朝著髂骨的平坦部分方向處理。這樣做可以使下後鋸肌放鬆，減輕整個背部的張力，讓上背和下背都感到比較舒緩。\u003C/p\u003E\u003Cp\u003E此處的 er-lu 會對應到 serratus posterior inferior。我會尋找第 12 肋的下緣，當我感覺到一種「snapping」，那就是 serratus posterior inferior 的外側緣；在該點，即為 er-lu。\u003C/p\u003E\u003Cp\u003Eer-lu 將會位於後下鋸肌。\u003Cbr /\u003E所以我們正在尋找第 12 肋骨的下緣。\u003Cbr /\u003E當我們感覺到彈撥感時，那就是後下鋸肌的外側緣。\u003Cbr /\u003E所以就在那裡我們有 er-lu。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110506-er-lu-l1.jpeg\" alt=\"er-lu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110511-er-lu-t1.jpeg\" alt=\"er-lu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110516-er-lu-t2.jpeg\" alt=\"er-lu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110521-er-lu-t3.jpeg\" alt=\"er-lu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110526-er-lu-t4.jpeg\" alt=\"er-lu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者轉身 你的手固定住患者的骨盆\u003Cbr /\u003E讓患者向後看\u003Cbr /\u003E你可以輕微的擠壓一下 看有無疼痛\u003C/p\u003E\u003Cp\u003E內旋的檢查\u003Cbr /\u003E讓患者抗阻向中線轉身\u003Cbr /\u003E看患者有無疼痛和無力\u003Cbr /\u003E對側同理\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（軀幹扭轉）：我以雙手固定胸前，固定骨盆後請患者做軀幹扭轉並「回頭看身後」，我可輕壓以檢查是否有特異性疼痛；在 Intra 測試中，我固定肩部，讓患者以阻力方式回到中線，評估疼痛、無力，並於對側重複。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120639-move-lu-ir-er1.jpeg\" alt=\"move-lu-ir-er1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120648-move-lu-ir-er2.jpeg\" alt=\"move-lu-ir-er2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120655-move-lu-ir-er3.jpeg\" alt=\"move-lu-ir-er3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120602-move-lu-ir-er4.jpeg\" alt=\"move-lu-ir-er4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120613-move-lu-ir-er5.jpeg\" alt=\"move-lu-ir-er5\" /\u003E\u003C/p\u003E"

    "question": "er-pv",
    "answer": "\u003Cp\u003Eer-pv\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：髂脊下方、大轉子後方、\u003Cmark\u003E臀大肌上緣\u003C/mark\u003E，沿住髂骨邊：髂骨中間（1/3)^(2/3)PSIS下少少\u003C/li\u003E\u003Cli\u003E如何找到：大轉子連線後方、髂脊下方，感覺臀大肌上緣邊界\u003C/li\u003E\u003Cli\u003E臨床意義：跑者常見、開車或走路時下背痛、坐骨神經痛\u003C/li\u003E\u003Cli\u003E推薦手法：側躺，背對自己，雙腳曲膝45度貼埋，一隻手護佢腰，一隻手用肘順臀中肌方向摔\u003C/li\u003E\u003Cli\u003E動作驗證：對方雙手放在你肩上，讓患者軀幹保持不動，大角度向外旋轉骨盆\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這是個很常見的點，很多跑者都會有這個問題，也是造成開車或走路時下背痛的典型原因。我們要處理的是臀中肌，但主要是臀大肌的上半部。最簡單的尋找方式是找到臀大肌的上緣。當處理這裡時，患者可能會感覺到一股強烈的放射痛傳到腿部，類似典型的坐骨神經痛，但也可能在下背部區域感到疼痛。這是一個非常重要的治療點，也可以用手肘進行按壓。\u003C/p\u003E\u003Cp\u003Eer-pv 位於大轉子連線的後方、髂脊下方。在該處可以摸到臀大肌（gluteus maximus）的上緣邊界；此位置即為 er-pv。\u003C/p\u003E\u003Cp\u003Eer-pv 將位於大轉子線的後方、髂脊的下方。\u003Cbr /\u003E就在這裡，你會感覺到臀大肌的邊緣，也就是上緣。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110519-er-pv-l1.jpeg\" alt=\"er-pv-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110530-er-pv-t1.jpeg\" alt=\"er-pv-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110537-er-pv-t2.jpeg\" alt=\"er-pv-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110543-er-pv-t3.jpeg\" alt=\"er-pv-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110548-er-pv-t4.jpeg\" alt=\"er-pv-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者固定肩膀\u003Cbr /\u003E雙手放在你肩上\u003Cbr /\u003E讓患者旋轉骨盆 盡量大的角度\u003Cbr /\u003E所以軀幹保持不動\u003Cbr /\u003E你可以用手提示他\u003Cbr /\u003E患者可能感覺有抽筋\u003C/p\u003E\u003Cp\u003E內旋-骨盆 我們先穩定住患者的骨盆\u003Cbr /\u003E然後讓患者抗阻回到中立位\u003Cbr /\u003E檢查有無疼痛和無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（骨盆扭轉）：我固定患者肩部避免軀幹代償，請其盡量扭轉骨盆；若患者於骨盆區域主訴不適，我記錄於相應分類。在 Intra 測試中，我穩定骨盆並請患者以阻力向後回位，觀察無力、疼痛等癥狀。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120607-move-pv-er.jpeg\" alt=\"move-pv-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120622-move-pv-er2.jpeg\" alt=\"move-pv-er2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120631-move-pv-ir.jpeg\" alt=\"move-pv-ir\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120636-move-pv-ir2.jpeg\" alt=\"move-pv-ir2\" /\u003E\u003C/p\u003E"

    "question": "er-cx",
    "answer": "\u003Cp\u003Eer-cx\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：梨狀肌\u003C/li\u003E\u003Cli\u003E如何找到：薦骨末端與大轉子中點，感覺彈撥感即是\u003C/li\u003E\u003Cli\u003E臨床意義：髖痛、下背與腿部放射\u003C/li\u003E\u003Cli\u003E推薦手法：側躺，對方背對自己，上腳曲（枱腿60度至120度）下腳直，\u003Cmark\u003E手肘縱向（打直）平行坐骨神經\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：對方雙手搭自己肩膀，膝蓋向外外旋（對方外腳眼貼膝頭），檢查疼痛與活動度\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這是另一個重點，位於非常知名的梨狀肌。它的作用類似於闊筋膜和孖肌（Gemelli muscles）的筋膜延續。操作時，讓患者的一膝疊在另一膝前方，找到位於薦骨末端和大轉子之間的中點。我們需要平行於坐骨神經的方向，也就是縱向處理。這種處理方式能讓你保持與神經平行。患者可能在髖部局部感到疼痛，但也可能延伸到腿部或下背部。\u003C/p\u003E\u003Cp\u003Eer-cx 正好位在梨狀肌（piriform）上方。我會先找到轉子與骶骨末端，然後在兩者之間的中間點探查；感覺到的「snapping」正是梨狀肌，此處即為 er-cx。\u003C/p\u003E\u003Cp\u003Eer-cx 就在梨狀肌正上方。\u003Cbr /\u003E所以我們找到轉子、骶骨的末端，我們走到正中間。\u003Cbr /\u003E你會感覺到彈撥感。那種彈撥感正是梨狀肌。\u003Cbr /\u003E所以我們就在那裡，er-cx。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110544-er-cx-l1.jpeg\" alt=\"er-cx-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E擡腿 60 度時\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110549-er-cx-t1.jpeg\" alt=\"er-cx-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110555-er-cx-t2.jpeg\" alt=\"er-cx-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110500-er-cx-t3.jpeg\" alt=\"er-cx-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110504-er-cx-t4.jpeg\" alt=\"er-cx-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110510-er-cx-t5.jpeg\" alt=\"er-cx-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110517-er-cx-t6.jpeg\" alt=\"er-cx-t6\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601110616-er-cx-td1.jpeg\" alt=\"er-cx-td1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601110624-er-cx-td2.jpeg\" alt=\"er-cx-td2\" /\u003E\u003C/p\u003E\u003Cp\u003E擡腿120度時\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601110621-er-cx-td3.jpeg\" alt=\"er-cx-td3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601110625-er-cx-td4.jpeg\" alt=\"er-cx-td4\" /\u003E\u003C/p\u003E\u003Cp\u003E外旋-髖部 做一個髖關節的外旋動作\u003Cbr /\u003E將膝關節向外\u003Cbr /\u003E檢查有無疼痛以及關節的活動度如何\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（外旋）：我引導膝蓋向外，檢查外旋時是否出現疼痛並測量活動度。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120616-move-cx-er.jpeg\" alt=\"move-cx-er\" /\u003E\u003C/p\u003E"

    "question": "er-ge",
    "answer": "\u003Cp\u003Eer-ge\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：股二頭肌短頭（長頭外側、闊筋膜內側）\u003C/li\u003E\u003Cli\u003E如何找到：中段與遠端1/3之間，感覺股二頭肌短頭\u003C/li\u003E\u003Cli\u003E臨床意義：坐骨神經痛、膝痛\u003C/li\u003E\u003Cli\u003E推薦手法：手肘縱向溝槽處理\u003C/li\u003E\u003Cli\u003E動作驗證：深蹲或單側負重，檢查膝外側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位在股二頭肌的短頭，基本上位於長頭和股外側肌之間的肌間膈。我們要處理的就是那裡。請記住，股二頭肌短頭的整個表面都與闊筋膜的內層融合。臀大肌融入闊筋膜（此處已被切斷），然後股二頭肌短頭從闊筋膜發源。因此，這兩者之間有直接的關聯。這個點會引發典型的坐骨神經痛，所以對於坐骨神經痛和膝蓋問題來說，這是一個很常見的處理點。可以用手肘在這個溝槽中進行縱向處理。\u003C/p\u003E\u003Cp\u003Eer-ge 位於肱二頭肌短頭（short head of the biceps），其起源來自闊筋膜（fascia lata）的內側面。我會保持在肱二頭肌長頭的外側、闊筋膜加強帶的內側，位置介於中段與遠端三分之一之間；在這個區域，即為 er-ge\u003C/p\u003E\u003Cp\u003Eer-ge 將會位於股二頭肌短頭，它起自闊筋膜的內表面。\u003Cbr /\u003E所以我們停留在股二頭肌長頭的外側，以及闊筋膜增厚部位的內側，處於中三分之一和遠端三分之一之間，就在這裡，er-ge。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110506-er-ge-l1.jpeg\" alt=\"er-ge-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110510-er-ge-t1.jpeg\" alt=\"er-ge-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110515-er-ge-t2.jpeg\" alt=\"er-ge-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110520-er-ge-t3.jpeg\" alt=\"er-ge-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E用一個深蹲的動作可以檢查膝部的水平面情況\u003Cbr /\u003E患者感覺疼痛\u003Cbr /\u003E外側膝蓋 是外旋-膝部\u003Cbr /\u003E內側疼痛是內旋-膝部\u003Cbr /\u003E然後讓患者將重量放在一側 另一側\u003Cbr /\u003E檢查是否有特殊的疼痛或無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（深蹲水平面評估）：透過完整深蹲，我能在水平面評估膝部問題；若疼痛在膝外側為 Extra，內側為 Intra。我亦可推動患者重心至一側，觀察是否出現特定疼痛或無力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120600-move-ge-ir-er.jpeg\" alt=\"move-ge-ir-er\" /\u003E\u003C/p\u003E"

    "question": "er-ta",
    "answer": "\u003Cp\u003Eer-ta\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：腓骨長肌後緣\u003C/li\u003E\u003Cli\u003E如何找到：從後向前推，感覺腓骨長肌後緣\u003C/li\u003E\u003Cli\u003E臨床意義：慢性踝問題、扭傷後僵硬\u003C/li\u003E\u003Cli\u003E推薦手法：手肘從後向前縱向\u003C/li\u003E\u003Cli\u003E動作驗證：足趾上擡、足跟著地，向外推抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這是一個相當常見但很難找到的點位，因為它基本上緊貼著腓骨長肌，並被腓骨長肌的肌腹所包覆。操作時，必須從後向前推，因為我們不想觸碰到內側腓腸肌。患者需要仰臥，而我們要從後方往前推。這個點可能相當僵硬，甚至在第五蹠骨骨折或嚴重踝關節扭傷後，會變得極度僵硬。這個點可能會導致慢性的踝關節問題，非常重要，也可能非常僵硬，需要用手肘來處理。\u003C/p\u003E\u003Cp\u003Eer-ta 的定位在腓骨長肌（fibularis longus）的後緣，可位於近端至中段三分之一之間，或介於兩者中點。我會先觸到後緣，並沿肌纖維方向做縱向操作；在此處，即為 er-ta。\u003C/p\u003E\u003Cp\u003Eer-ta 位於腓骨長肌的後緣。\u003Cbr /\u003E它可以處於近端和中三分之一之間，或者在中間位置。\u003Cbr /\u003E所以我們想要感覺到後緣，然後我們進行縱向操作。所以就在這裡我們有 er-ta。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110557-er-ta-l1.jpeg\" alt=\"er-ta-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110511-er-ta-t1.jpeg\" alt=\"er-ta-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110516-er-ta-t2.jpeg\" alt=\"er-ta-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E內旋可以讓患者提起腳趾\u003Cbr /\u003E腳跟踩地 腳尖頂你的手\u003Cbr /\u003E檢查踝關節是否有疼痛\u003Cbr /\u003E同理向外側\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（足趾上舉、足跟承重向內推）：患者擡起足趾、足跟著地，向我手掌內推；我檢查踝內側是否有疼痛或牽拉。\u003C/li\u003E\u003Cli\u003EExtra（向外推）：同姿勢下向外推，觀察踝外側牽拉或緊繃。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120631-move-ta-ir.jpeg\" alt=\"move-ta-ir\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120635-move-ta-er.jpeg\" alt=\"move-ta-er\" /\u003E\u003C/p\u003E"

    "question": "er-pe",
    "answer": "\u003Cp\u003Eer-pe\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：伸趾短肌的肌腹，也與上方的支持帶（Retinaculum）沾黏在一起，所以疼痛感可以非常銳利，拉扯感一直延伸到腹部區域也不奇怪。\u003C/li\u003E\u003Cli\u003E如何找到：請患者擡腳趾，感覺隆起正中央即是\u003C/li\u003E\u003Cli\u003E臨床意義：第四五趾痛、錘狀趾（Hammer toes，二三田腳趾關節像錘子一樣向下不正常蜷曲）、足底筋膜炎\u003C/li\u003E\u003Cli\u003E推薦手法：趴，一雙腳青蛙腳 45 度並骨盤上升，使脛骨內側和\u003Cmark\u003E足弓貼床面\u003C/mark\u003E，自己企床尾，整佢上腳，一隻手掌貼床頂住佢腳底，另一隻手用指關節或肘以外側腳眼至腳趾尾方向摔，也可以多方向\u003C/li\u003E\u003Cli\u003E動作驗證：對方企，搵禁住對方腳趾 2345，叫對方所有腳趾上舉抗阻，檢查足背疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這是一個非常微小的結構，是伸趾短肌的肌腹，一塊位於此處的小肌肉，用來上拉所有腳趾。當你請患者上擡腳趾時，會感覺到一塊肌腹從這裡隆起，我們就在它的正中間進行處理。這個點可能會非常緊繃，記住它也與上方的支持帶（Retinaculum）沾黏在一起。因此，當處理這個點時，會對支持帶產生很大的張力，而支持帶會牽引整個筋膜。如果整個筋膜都很僵硬，患者可能會感覺到拉扯感一直延伸到腹部區域，這並不奇怪。由於我們同時也處理到一些支持帶，疼痛感會非常銳利。錘狀趾（Hammer toes）是這種僵硬的典型癥狀，但最典型的情況是第四、五趾的疼痛。\u003C/p\u003E\u003Cp\u003Eer-pe 對應到足部的 extensor brevis（在 pedius）。我會請患者擡起腳趾，這時可以看到該肌肉隆起；定位點就在隆起的正中央，即為 er-pe。\u003C/p\u003E\u003Cp\u003Eer-pe將會是足部的短伸肌（簡稱 pedius）。\u003Cbr /\u003E所以如果患者，我們請患者擡起腳趾，你會看到這塊肌肉鼓起來。\u003Cbr /\u003E治療點就在正中間。er-pe。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110555-er-pe-l1.jpeg\" alt=\"er-pe-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110559-er-pe-t1.jpeg\" alt=\"er-pe-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110505-er-pe-t2.jpeg\" alt=\"er-pe-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110510-er-pe-t3.jpeg\" alt=\"er-pe-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110514-er-pe-t4.jpeg\" alt=\"er-pe-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者擡起所有的腳趾抗阻\u003Cbr /\u003E可能在腳背感覺疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（全趾上舉抗阻）：我請患者所有足趾上舉並施加阻力，患者在足背（epididymis 之名稱於此處指足背隆起部位）可能出現抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010649-move-pe-er.jpeg\" alt=\"move-pe-er\" /\u003E\u003C/p\u003E"

    "question": "er-sc",
    "answer": "\u003Cp\u003Eer-sc\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：肩胛骨頂部、提肩胛肌遠端起點\u003C/li\u003E\u003Cli\u003E如何找到：找到肩胛骨，往上觸診感覺提肩胛肌造成的突起\u003C/li\u003E\u003Cli\u003E臨床意義：肩膀問題，\u003Cmark\u003E絕不會從這裡開始處理，因為癥狀大多出現在其上方。會先從 ir-sc / ir-th 開始\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E坐，身體斜向前60度，一隻手手肘掂床邊托額頭，另一隻手屈曲，前臂前側連掌心貼床，手指向前外指。\u003C/mark\u003E指節的話一手護肩胛骨後，另一手橫向摔，肘就手隻手撑床床撑椅背，另一手摔\u003C/li\u003E\u003Cli\u003E動作驗證：對方肘指天，手心貼 C7，額狀面輕推肘靠近中線（非向後），患者背後可能感到銳痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位在肩胛骨頂部，提肩胛肌的起點處。我們前面已經看過更上方的「額外頸部點」。這個「額外肩胛點」同樣是處理提肩胛肌，但位置更偏遠端。這裡可能極度僵硬，有時要放鬆它真的是一大挑戰。我絕不會從這裡開始處理，特別是因為癥狀大多出現在其上方。因此，沒有理由從這裡開始。我們會從肩胛間（Inter-Scapula）、胸內（Intra-Thorax）開始，然後最終再處理「額外肩胛點」，這樣才能解決問題。直接從這裡開始對治療師和患者來說都將是一場噩夢。但這個點對於處理肩膀問題非常有效。\u003C/p\u003E\u003Cp\u003E檢視 er-sc 時，我仍以提肩胛肌（levator scapulae）為參考。我會先找到肩胛骨，往上觸診，摸到因提肩胛肌造成的突起（nubbin）；定位點就在這個區域上方，即為 er-sc。\u003C/p\u003E\u003Cp\u003E我們來看一下，er-sc。\u003Cbr /\u003E所以我們仍然在提肌（提肩胛肌）中。\u003Cbr /\u003E所以我們找到肩胛骨，往上走，我們會感覺到由於提肩胛肌而產生的這個小結節。\u003Cbr /\u003E治療點就在該區域的正上方。所以是 er-sc。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110507-er-sc-l1.jpeg\" alt=\"er-sc-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110511-er-sc-t1.jpeg\" alt=\"er-sc-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110516-er-sc-t2.jpeg\" alt=\"er-sc-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110521-er-sc-t3.jpeg\" alt=\"er-sc-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110525-er-sc-t4.jpeg\" alt=\"er-sc-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者將手放在頸後\u003Cbr /\u003E擠壓肘關節越過中線\u003Cbr /\u003E向中線推\u003Cbr /\u003E患者可能感覺背部的尖銳疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（手置頸後、肘向中線）：我讓患者手置於頸後，輕推肘靠近中線（非向後），患者背後可能感到銳痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010646-move-sc-er.jpeg\" alt=\"move-sc-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010651-move-sc-er2.jpeg\" alt=\"move-sc-er2\" /\u003E\u003C/p\u003E"

    "question": "er-hu",
    "answer": "\u003Cp\u003Eer-hu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：肩胛棘外側開始拱起處下方、棘下肌肌腱\u003C/li\u003E\u003Cli\u003E如何找到：肩胛棘向外走到開始拱起處再往下，感覺彈撥與1.5cm僵硬帶\u003C/li\u003E\u003Cli\u003E臨床意義：肩膀深部劇烈放射痛，是肩問題重要點\u003C/li\u003E\u003Cli\u003E推薦手法：手肘處理\u003C/li\u003E\u003Cli\u003E動作驗證：向外推抗阻，檢查三角肌周圍疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於棘下肌的末端。我們會穿過三角肌，試圖找到小圓肌的末端，但最好的目標是在肩峰弓的起點，肩胛棘下方。你會透過三角肌感覺到棘下肌的纖維，它像一個半英寸（大約一公分半）的僵硬結構，位於棘下肌肌腱結束、進入肩袖之前的地方。這個點的疼痛可能非常劇烈，並在肩膀內部產生大量放射痛，非常尖銳。因此，肩膀問題是其典型癥狀。你可以用指關節按壓，但用手肘處理這個點會更好。\u003C/p\u003E\u003Cp\u003Eer-hu 位於肩胛骨棘下肌（infraspinatus）的肌腱。我會先找到肩胛棘，沿著肩胛棘向外緣走到開始拱起的地方，再往下；在此處會感覺到一個「snapping」，那就是棘下肌肌腱，此處即為 er-hu。\u003C/p\u003E\u003Cp\u003Eer-hu 位於岡下肌的肌腱中。\u003Cbr /\u003E所以我們找到肩胛岡，當它開始呈弧形時，我們走到下方，會感覺到一個彈撥感，那就是岡下肌的肌腱。\u003Cbr /\u003E那就是 er-hu。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110509-er-hu-l1.jpeg\" alt=\"er-hu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110516-er-hu-t1.jpeg\" alt=\"er-hu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110522-er-hu-t2.jpeg\" alt=\"er-hu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110528-er-hu-t3.jpeg\" alt=\"er-hu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110533-er-hu-t4.jpeg\" alt=\"er-hu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-hu vs er-hu\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260607030639-re-hu-vs-er-hu.jpeg\" alt=\"re-hu vs er-hu\" /\u003E\u003C/p\u003E\u003Cp\u003E外旋讓患者向外側推\u003Cbr /\u003E查看三角肌周圍是否有疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（外推）：我請患者向外推，常於三角肌區出現疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010617-move-hu-er.jpeg\" alt=\"move-hu-er\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eer-cu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：肱三頭肌末端、肱橈肌後側（負責旋後部分）\u003C/li\u003E\u003Cli\u003E如何找到：三頭肌末端，感覺肱筋膜緊繃處\u003C/li\u003E\u003Cli\u003E臨床意義：手肘痛、類似滑囊炎痛，在活動時會大幅增加。\u003C/li\u003E\u003Cli\u003E推薦手法：對方趴，手心向下，頭向出，在三頭肌出面條坑切入向對方身體方向摔，縱向，\u003Cmark\u003E試圖將作為肱橈肌起點的筋膜擠壓到肱骨邊緣\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：自己雙手合十鉗實對方手腕，叫對方旋後相關抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E從這裡可以看到，肱橈肌對於旋後動作有重要的共同作用。因此，這個點的目標是肱橈肌在旋後動作中的特定部分。我們停在肱三頭肌肌腱的一側，進行縱向處理，試圖將作為肱橈肌起點的筋膜擠壓到肱骨邊緣。你可以感覺到這裡的結締組織有多僵硬，這就是你的目標。進行縱向處理，感受肱肌筋膜的質地。典型的疼痛是手肘痛，類似於滑囊炎的疼痛，在活動時會大幅增加。\u003C/p\u003E\u003Cp\u003Eer-cu 位於肱三頭肌末端。我會沿著肱橈肌（brachioradialis）走向，並注意其後側部位有助於前臂的旋後（supination）。在靠近肱三頭肌側的該段肌肉位置，通常能感覺到肱筋膜的緊繃或僵硬；此處即為 er-cu。\u003C/p\u003E\u003Cp\u003Eer-cu，我們走到三頭肌的末端。\u003Cbr /\u003E我們必須屈曲肱橈肌，而且你知道，肱橈肌的後側部分負責旋後。\u003Cbr /\u003E所以正好是三頭肌側邊的這部分肌肉，在這個水平高度，你會感覺到肱筋膜的僵硬。所以那就是 er-cu。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110504-er-cu1.jpeg\" alt=\"er-cu1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110508-er-cu-t1.jpeg\" alt=\"er-cu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110514-er-cu-t2.jpeg\" alt=\"er-cu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E我們固定住手部\u003Cbr /\u003E讓患者旋後檢查外旋\u003Cbr /\u003E然後旋前 檢查的是內旋\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（旋前旋後）：我將手固定在中性位，請患者做旋後以檢查 Extra，做旋前以檢查 Intra。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010612-move-cu-er.jpeg\" alt=\"move-cu-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010617-move-cu-ir.jpeg\" alt=\"move-cu-ir\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eer-ca\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：前臂近中1/3、伸指肌群中央\u003C/li\u003E\u003Cli\u003E如何找到：前臂近中1/3正中，避開肱橈肌與尺側伸腕肌\u003C/li\u003E\u003Cli\u003E臨床意義：手肘、手腕、手指問題\u003C/li\u003E\u003Cli\u003E推薦手法：縱向\u003C/li\u003E\u003Cli\u003E動作驗證：伸指抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位在伸指肌，基本上位於近端和中端三分之一交界處。我們要避開肱橈肌和尺側伸腕肌，專注於中間的所有肌肉。在這裡，你需要縱向處理，以保持與這些結構的走向一致。如你所知，這個區域的神經分佈非常豐富，所以疼痛感可能非常強烈，並伴隨大量向手臂下方放射的感覺。這個點對於手肘、手腕和手指的問題都非常重要，而且可能相當僵硬，需要一些時間才能解決。\u003C/p\u003E\u003Cp\u003Eer-ca 位於食指的遠端指骨上方，定位在近端與中段三分之一之間。我會避開尺側伸腕肌（extensor carpi ulnaris）與肱橈肌（brachioradialis）；在該條件下的指定區域，即為 er-ca。\u003C/p\u003E\u003Cp\u003Eer-ca 位於食指遠端指骨的上方（此處語誤，實指前臂中段）。\u003Cbr /\u003E所以我們處於近端和中三分之一之間。\u003Cbr /\u003E好的，我們必須避開尺側腕伸肌。我們必須避開肱橈肌。\u003Cbr /\u003E所以就在這裡我們有 er-ca。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110511-er-ca-l1.jpeg\" alt=\"er-ca-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110516-er-ca-t1.jpeg\" alt=\"er-ca-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110521-er-ca-t2.jpeg\" alt=\"er-ca-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110526-er-ca-t3.jpeg\" alt=\"er-ca-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110530-er-ca-t4.jpeg\" alt=\"er-ca-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E握住患者手部\u003Cbr /\u003E患者做一個旋後\u003Cbr /\u003E然後我們向外轉 患者需要旋前抗阻\u003Cbr /\u003E然後我們向外轉 患者需要旋前抗阻（檢查的是內旋-腕部）\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（滾動測試）：我握住患者手進行「向內滾動」，患者做旋後（即 Extra）；再「向外滾動」，患者做旋前（即 Intra）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010652-move-ca-er.jpeg\" alt=\"move-ca-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010600-move-ca-ir.jpeg\" alt=\"move-ca-ir\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eer-di\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：第2-3與3-4掌骨間深層筋膜（環繞屈指肌肌腱）\u003C/li\u003E\u003Cli\u003E如何找到：掌骨間凹陷處，盡量深入筋膜\u003C/li\u003E\u003Cli\u003E臨床意義：向最痛手指放射\u003C/li\u003E\u003Cli\u003E推薦手法：指關節尖端縱向\u003C/li\u003E\u003Cli\u003E動作驗證：伸開所有手指抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點是環繞屈指肌肌腱的深層筋膜（Visceral Lamina）。基本上，你需要在第二、三掌骨之間，以及第三、四掌骨之間的凹陷處進行處理。要注意，你不想挫傷肌腱間的連結韌帶（Intertendinous Junction），而是要停留在凹陷處。在這裡縱向處理，只處理筋膜。如果你在這裡操作，可能會感覺到一個主要的彈響，但那只是肌腱，不是我們要找的。所以，盡可能深入這個凹陷處，用指關節的尖端處理這個區域。放射痛會傳到患者主訴最疼痛的手指部位。隨著時間推移，它會變得比較柔軟。這裡可能有一個或兩個點位。\u003C/p\u003E\u003Cp\u003Eer-di 位於掌間肌（interosseous）之間的兩個位置：一個在第二與第三掌骨之間，另一個在第三與第四掌骨之間。操作時需注意避開伸肌腱間聯合（intertendinous junction）的「snappy」，並確保定位在肌肉上方。因為有兩個定位點，一個在這一側，另一個則在對側相對位置。\u003C/p\u003E\u003Cp\u003Eer-di，我們處於第二和第三掌骨、以及第三和第四掌骨之間的骨間肌。\u003Cbr /\u003E我們必須注意避免腱間結合（腱聯合）的彈撥，並保持在肌肉的正上方。\u003Cbr /\u003E所以有兩個點，一個會在這個水平高度，另一個會正好在另一側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110508-er-di-l1.jpeg\" alt=\"er-di-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110514-er-di-l2.jpeg\" alt=\"er-di-l2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110519-er-di-t1.jpeg\" alt=\"er-di-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110525-er-di-t2.jpeg\" alt=\"er-di-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E外旋抗阻伸開所有的手指\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EExtra（全指伸展抗阻）：請患者全指伸展並對抗阻力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010656-move-di-er.jpeg\" alt=\"move-di-er\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003E與例子，同時在需要處加入段落與標題，並以台灣常用字句表達。\u003Cbr /\u003E中線在軀幹的特殊性\u003Cbr /\u003E在軀幹上，中線的概念相當特別。就位置而言，「點」位於軀幹的正中央，沒有「右」與「左」之分，而是分為前方（前側）與後方（後側）。因此在軀幹，中線並非純粹的「運動線」，而是一條「感知與對齊」的線。唯一的例外是 me-cp1，它仍作為運動向量且是 la-cp1 的拮抗點；從此之後在軀幹就不再以運動為主，也不再有左右之分，而是以前側與後側來區分。\u003Cbr /\u003E這點非常重要，因為許多人容易混淆。請記得：在軀幹，中線非常關鍵，尤其在第三級課程中，我們大量處理視覺－身體（visuosomatic）相關議題與部分視覺問題。之後我會逐一說明各中線點的定位、檢查、典型放射與臨床應用。\u003C/p\u003E\u003Cp\u003E臨床提示與操作綜述\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E軀幹的中線以「感知對齊」為主，除 me-cp1 外不作為運動向量，採前側與後側定位，無左右之分。\u003C/li\u003E\u003Cli\u003E第三級課程重點在正中線的內臟筋膜連結與視覺－身體問題，因此正中線是「內臟－身體代償」的起點。\u003C/li\u003E\u003Cli\u003E觸診策略多採「多指尖全域掃查＋指關節長軸／橫向處理」，遇到高度僵硬時以手肘先「熱開」組織再精細辨識。\u003C/li\u003E\u003Cli\u003E典型病人回饋包含暈眩、失穩、呼吸壓迫、內臟深處疼痛、針刺樣瞬痛、肩僵硬、腕肘牽涉痛、足底筋膜炎樣痛等。\u003C/li\u003E\u003Cli\u003E「怕癢」是受器敏感化的指標，在僵硬區域，輕觸即痛或搔癢均提示陽性反應。\u003C/li\u003E\u003Cli\u003E四肢的中線回歸機械運動向量，與外側線互為拮抗；定位與處理需注意神經血管走行，並以長軸平行方式保護組織。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E側面動作序列與其他序列一樣，由 la-cp1 開始。值得注意的是，在側面序列的分析中，左右兩側互為拮抗肌群，這與我們在生物力學模型中解釋過的情況不同。一般來說，一側的側面肌群會與另一側（對側）的側面肌群互為拮抗，但第一耦合點是個例外，它的拮抗肌群是同側的 me-cp1。從 la-cp2 一直到 la-pv 的點，拮抗肌群則變為對側的側面肌群。\u003C/p\u003E"

var srsData={};
var filteredData=qaData.slice();
var currentQ=null;
var studyMode="srs";
var answerVisible=false;
var storageOk=false;
var SRS_KEY="srs_"+"CC 點練習".replace(/\W/g,"_").slice(0,40);

function pad2(n){return n<10?"0"+n:""+n;}
function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function addDays(s,n){var d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function ivText(days){
  if(days<=0)return "重學";
  if(days===1)return "1天";
  if(days<7)return days+"天";
  if(days<30)return Math.round(days/7)+"週";
  return Math.round(days/30)+"月";
}
function stripHtml(s){return s.replace(/<[^>]*>/g,"");}
function filterModalList(list,qSearch,aSearch){
  return list.filter(function(item){
    var qOk=!qSearch||item.question.toLowerCase().indexOf(qSearch.toLowerCase())!==-1;
    var aOk=!aSearch||stripHtml(item.answer).toLowerCase().indexOf(aSearch.toLowerCase())!==-1;
    return qOk&&aOk;
  });
}

function chkStorage(){try{localStorage.setItem("_t","1");localStorage.removeItem("_t");storageOk=true;}catch(e){storageOk=false;}}
function saveSrs(){if(!storageOk)return;try{localStorage.setItem(SRS_KEY,JSON.stringify(srsData));}catch(e){}}
function loadSrs(){if(!storageOk)return;try{var d=localStorage.getItem(SRS_KEY);if(d)srsData=JSON.parse(d);}catch(e){srsData={};}}

function getCard(q){
  if(!srsData[q])srsData[q]={interval:0,reps:0,ef:2.5,nextReview:null,total:0};
  return srsData[q];
}
function getStatus(q){
  var c=getCard(q);
  if(!c.nextReview)return "new";
  if(c.interval>=21)return "mastered";
  if(c.nextReview<=todayStr())return "due";
  return "upcoming";
}

function sm2(card,quality){
  var ef=card.ef||2.5, reps=card.reps||0, iv=card.interval||0;
  var nef,niv,nreps;
  if(quality<3){
    nef=Math.max(1.3,ef-0.2); niv=1; nreps=0;
  } else {
    nef=Math.max(1.3,ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)));
    nreps=reps+1;
    if(reps===0){
      niv=(quality===5?4:quality===4?2:1);
    } else if(reps===1){
      niv=(quality===5?Math.round(6*nef):quality===3?4:6);
    } else {
      niv=Math.round(iv*nef);
      if(quality===3)niv=Math.max(1,Math.round(niv*0.7));
      if(quality===5)niv=Math.round(niv*1.3);
    }
  }
  return {interval:niv,reps:nreps,ef:nef};
}
function previewAll(q){
  var c=getCard(q);
  return {1:sm2(c,1).interval,3:sm2(c,3).interval,4:sm2(c,4).interval,5:sm2(c,5).interval};
}
function applyRating(q,quality){
  var card=getCard(q);
  var r=sm2(card,quality);
  card.interval=r.interval; card.reps=r.reps; card.ef=r.ef;
  card.nextReview=addDays(todayStr(),quality<3?0:r.interval);
  card.total=(card.total||0)+1;
  saveSrs();
}

function updateStats(){
  var tot=filteredData.length,nw=0,due=0,mast=0;
  filteredData.forEach(function(item){
    var st=getStatus(item.question);
    if(st==="new")nw++;
    else if(st==="due")due++;
    else if(st==="mastered")mast++;
  });
  document.getElementById("totalCount").textContent=tot;
  document.getElementById("newCount").textContent=nw;
  document.getElementById("dueCount").textContent=due;
  document.getElementById("mastCount").textContent=mast;
  document.getElementById("progBar").style.width=(tot>0?Math.round((mast/tot)*100):0)+"%";
}

function getPool(){
  if(studyMode==="srs"){
    var due=[],nw=[];
    filteredData.forEach(function(item){
      var st=getStatus(item.question);
      if(st==="due")due.push(item);
      else if(st==="new")nw.push(item);
    });
    return due.concat(nw);
  }
  return filteredData;
}

function hideAnswer(){
  document.getElementById("answerContent").classList.remove("show");
  document.getElementById("ratingWrap").classList.remove("show");
  document.getElementById("showAnsBtn").textContent="顯示答案";
  answerVisible=false;
}
function toggleAnswer(){
  if(!currentQ)return;
  if(answerVisible){hideAnswer();}
  else{
    document.getElementById("answerContent").classList.add("show");
    document.getElementById("ratingWrap").classList.add("show");
    document.getElementById("showAnsBtn").textContent="隱藏答案";
    answerVisible=true;
    updateHints(currentQ.question);
  }
}
function updateHints(q){
  var iv=previewAll(q);
  document.getElementById("hint-1").textContent="重學";
  document.getElementById("hint-3").textContent=ivText(iv[3]);
  document.getElementById("hint-4").textContent=ivText(iv[4]);
  document.getElementById("hint-5").textContent=ivText(iv[5]);
}
function onRating(quality){
  if(!currentQ)return;
  applyRating(currentQ.question,quality);
  drawQuestion();
}

function setSrsInfo(q){
  var el=document.getElementById("srsInfo");
  if(!q){el.style.display="none";el.innerHTML="";return;}
  var card=getCard(q); var st=getStatus(q);
  var labels={"new":"🆕 新卡片","due":"📅 到期複習","upcoming":"✅ 排程中","mastered":"🏆 已掌握"};
  var html='<span class="srs-badge st-'+st+'">'+labels[st]+'</span>';
  if(st!=="new"){
    html+='<span class="srs-meta">間隔 '+card.interval+'天&nbsp;·&nbsp;複習 '+card.total+'次&nbsp;·&nbsp;EF '+card.ef.toFixed(2)+'</span>';
    if(card.nextReview)html+='<span class="srs-meta">下次複習：'+card.nextReview+'</span>';
  } else {
    html+='<span class="srs-meta">從未複習</span>';
  }
  if(studyMode==="srs"){
    html+='<span class="srs-meta">（待學 '+getPool().length+' 題）</span>';
  }
  el.innerHTML=html; el.style.display="flex";
}

function drawQuestion(){
  hideAnswer();
  var pool=getPool();
  if(pool.length===0){
    var msg=studyMode==="srs"
      ?"🎉 今日所有卡片已複習完畢！請明日再來，或切換「隨機練習」繼續練習。"
      :"🎉 目前篩選範圍無符合題目。";
    document.getElementById("question").innerHTML=msg;
    document.getElementById("answerContent").innerHTML="";
    document.getElementById("showAnsWrap").style.display="none";
    setSrsInfo(null); currentQ=null; updateStats(); return;
  }
  var item;
  if(studyMode==="srs"){
    var dueOnly=pool.filter(function(i){return getStatus(i.question)==="due";});
    var src=(dueOnly.length>0&&Math.random()<0.8)?dueOnly:pool;
    item=src[Math.floor(Math.random()*src.length)];
  } else {
    item=pool[Math.floor(Math.random()*pool.length)];
  }
  currentQ=item;
  document.getElementById("question").innerHTML=item.question;
  document.getElementById("answerContent").innerHTML=item.answer;
  document.getElementById("showAnsWrap").style.display="block";
  setSrsInfo(item.question); updateStats();
}

function setMode(mode){
  studyMode=mode;
  document.getElementById("modeRndBtn").classList.toggle("active",mode==="random");
  document.getElementById("modeSrsBtn").classList.toggle("active",mode==="srs");
  updateStats();
  drawQuestion();
}

function applyFilter(){
  var pat=document.getElementById("filterInput").value;
  if(!pat.trim()){filteredData=qaData.slice();updateStats();drawQuestion();return;}
  try{var re=new RegExp(pat,"i");filteredData=qaData.filter(function(q){return re.test(q.question);});updateStats();drawQuestion();}catch(e){}
}
function clearFilter(){document.getElementById("filterInput").value="";filteredData=qaData.slice();updateStats();drawQuestion();}

function doReset(){
  srsData={};saveSrs();currentQ=null;
  updateStats();
  document.getElementById("resetModal").classList.remove("open");
  drawQuestion();
}

function toggleModalQA(idx,type){
  var ans=document.getElementById(type+"-ans-"+idx);
  var btn=document.getElementById(type+"-btn-"+idx);
  if(!ans||!btn)return;
  var show=!ans.classList.contains("show");
  ans.classList.toggle("show",show);
  btn.textContent=show?"隱藏答案":"顯示答案";
}
function buildList(list,type){
  if(!list.length)return'<div class="no-results">（無符合結果）</div>';
  return list.map(function(item,i){
    var c=getCard(item.question),st=getStatus(item.question);
    var meta=st==="new"
      ?"新卡片（從未複習）"
      :("間隔 "+c.interval+"天 · EF "+c.ef.toFixed(2)+(c.nextReview?" · 下次 "+c.nextReview:""));
    var cls="question-item"+(st==="mastered"?" is-mast":"");
    return '<div class="'+cls+'">'
      +'<div class="question-header">'
      +'<div class="question-text">'+item.question+'<div class="srs-mini">'+meta+'</div></div>'
      +'<button id="'+type+"-btn-"+i+'" class="btn btn-sm qa-tog" data-type="'+type+'" data-idx="'+i+'">顯示答案</button>'
      +'</div>'
      +'<div id="'+type+"-ans-"+i+'" class="question-answer">'+item.answer+'</div>'
      +'</div>';
  }).join("");
}

function renderAllModal(){
  var q=document.getElementById("allQSearch").value;
  var a=document.getElementById("allASearch").value;
  var base=filteredData.slice();
  var list=filterModalList(base,q,a);
  var suffix=(q||a)?" / "+base.length:"";
  document.getElementById("allCount2").textContent="全部題目（"+list.length+suffix+" 題）";
  document.getElementById("allList").innerHTML=buildList(list,"all");
}
function showAllModal(){
  document.getElementById("allQSearch").value="";
  document.getElementById("allASearch").value="";
  renderAllModal();
  document.getElementById("allModal").classList.add("open");
}
function renderDueModal(){
  var q=document.getElementById("dueQSearch").value;
  var a=document.getElementById("dueASearch").value;
  var base=filteredData.filter(function(item){var st=getStatus(item.question);return st==="due"||st==="new";});
  var list=filterModalList(base,q,a);
  var suffix=(q||a)?" / "+base.length:"";
  document.getElementById("dueCount2").textContent="今日待學（"+list.length+suffix+" 題）";
  document.getElementById("dueList").innerHTML=buildList(list,"due");
}
function showDueModal(){
  document.getElementById("dueQSearch").value="";
  document.getElementById("dueASearch").value="";
  renderDueModal();
  document.getElementById("dueModal").classList.add("open");
}
function renderMastModal(){
  var q=document.getElementById("mastQSearch").value;
  var a=document.getElementById("mastASearch").value;
  var base=filteredData.filter(function(item){return getStatus(item.question)==="mastered";});
  var list=filterModalList(base,q,a);
  var suffix=(q||a)?" / "+base.length:"";
  document.getElementById("mastCount2").textContent="已掌握（"+list.length+suffix+" 題）";
  document.getElementById("mastList").innerHTML=buildList(list,"mast");
}
function showMastModal(){
  document.getElementById("mastQSearch").value="";
  document.getElementById("mastASearch").value="";
  renderMastModal();
  document.getElementById("mastModal").classList.add("open");
}
function setupModal(modal){
  modal.addEventListener("click",function(e){
    if(e.target===modal){modal.classList.remove("open");return;}
    if(e.target.classList.contains("qa-tog"))
      toggleModalQA(parseInt(e.target.getAttribute("data-idx"),10),e.target.getAttribute("data-type"));
  });
}

chkStorage(); loadSrs(); updateStats();
document.getElementById("showAnsBtn").addEventListener("click",toggleAnswer);
var _rbs=document.querySelectorAll(".r-btn");
for(var _ri=0;_ri<_rbs.length;_ri++){
  (function(btn){
    btn.addEventListener("click",function(){
      onRating(parseInt(btn.getAttribute("data-q"),10));
    });
  })(_rbs[_ri]);
}
document.getElementById("modeRndBtn").addEventListener("click",function(){setMode("random");});
document.getElementById("modeSrsBtn").addEventListener("click",function(){setMode("srs");});
document.getElementById("resetBtn").addEventListener("click",function(){document.getElementById("resetModal").classList.add("open");});
document.getElementById("confirmResetBtn").addEventListener("click",doReset);
document.getElementById("cancelResetBtn").addEventListener("click",function(){document.getElementById("resetModal").classList.remove("open");});
document.getElementById("showAllBtn").addEventListener("click",showAllModal);
document.getElementById("showDueBtn").addEventListener("click",showDueModal);
document.getElementById("showMastBtn").addEventListener("click",showMastModal);
document.getElementById("closeAllBtn").addEventListener("click",function(){document.getElementById("allModal").classList.remove("open");});
document.getElementById("closeDueBtn").addEventListener("click",function(){document.getElementById("dueModal").classList.remove("open");});
document.getElementById("closeMastBtn").addEventListener("click",function(){document.getElementById("mastModal").classList.remove("open");});
document.getElementById("allQSearch").addEventListener("input",renderAllModal);
document.getElementById("allASearch").addEventListener("input",renderAllModal);
document.getElementById("dueQSearch").addEventListener("input",renderDueModal);
document.getElementById("dueASearch").addEventListener("input",renderDueModal);
document.getElementById("mastQSearch").addEventListener("input",renderMastModal);
document.getElementById("mastASearch").addEventListener("input",renderMastModal);
document.getElementById("filterBtn").addEventListener("click",applyFilter);
document.getElementById("clearFilterBtn").addEventListener("click",clearFilter);
document.getElementById("filterInput").addEventListener("keydown",function(e){if(e.key==="Enter")applyFilter();});
setupModal(document.getElementById("resetModal"));
setupModal(document.getElementById("allModal"));
setupModal(document.getElementById("dueModal"));
setupModal(document.getElementById("mastModal"));
try{
  drawQuestion();
}catch(e){
  console.error("drawQuestion 失敗：", e);
  var qEl=document.getElementById("question");
  if(qEl) qEl.textContent="⚠️ 初始化失敗，請開啟瀏覽器 Console 查看錯誤："+e.message;
}

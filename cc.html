    "question": "me-cp3r",
    "answer": "\u003Cp\u003Eme-cp3r\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：枕骨下方、項韌帶附著處、直肌群之間\u003C/li\u003E\u003Cli\u003E如何找到：枕骨下方正中，感覺凹陷或彈撥感\u003C/li\u003E\u003Cli\u003E臨床意義：失去穩定感、開車不安、頸部安全感不足\u003C/li\u003E\u003Cli\u003E推薦手法：指關節左右觸診\u003C/li\u003E\u003Cli\u003E動作驗證：無\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cp3r 位於枕骨下方，項韌帶（nuchal ligament）附著處間、直肌群之間。以指關節左右觸診，辨識是否有緊繃索狀；建議病人先屈頸以利檢查與處理。典型回饋是病人主述近三個月開車比以往更費力與不安，需要格外注意左右查看，日常走動也反覆確認自身穩定；不一定感到眩暈，但多是失去穩定與安全感。這個反應常見且效果顯著，會在第三級深入討論。\u003Cbr /\u003E在第三級中，整條正中線是主要內臟筋膜與插入筋膜由內臟連到肌骨系統的核心。也就是說，中線是「內臟－身體（visceral-somatic）」代償的起點，我們會詳述其臨床意義\u003C/p\u003E\u003Cp\u003E這個點位在枕骨區域，是頸韌帶（nuchal ligament）的附著點。在這裡，我們觸診時若感覺到一個凹陷處，或是有緊繃、彈撥的感覺，就代表頸韌帶有張力或僵硬的問題需要處理。\u003C/p\u003E\u003Cp\u003Eme-cp3r 將位於枕骨區域的項韌帶止點處。\u003Cbr /\u003E所以你會感覺到一個凹陷，相反地，如果你感覺到彈撥感，那就是項韌帶的張力、僵硬度，這是必須進行治療的。\u003Cbr /\u003E所以這是 Medio caput 3 retrostans。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060503-me-cp3r-l1.jpeg\" alt=\"me-cp3r-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060507-me-cp3r-t1.jpeg\" alt=\"me-cp3r-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060512-me-cp3r-t2.jpeg\" alt=\"me-cp3r-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E向內是一條感知鏈 所以沒有動作\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial：為感知中線，不進行動作。\u003C/li\u003E\u003C/ul\u003E"

    "question": "me-cla",
    "answer": "\u003Cp\u003Eme-cla\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：胸骨柄頂部上表面，多向交叉的結締組織網絡\u003C/li\u003E\u003Cli\u003E如何找到：胸骨柄頂部上表面，向尾側輕推感覺覆蓋筋膜\u003C/li\u003E\u003Cli\u003E臨床意義：喉嚨痛、喉部黏稠感\u003C/li\u003E\u003Cli\u003E推薦手法：食指疊中指向尾側（頭方向）輕推壓（表淺），需要時係條坑內兩邊推\u003C/li\u003E\u003Cli\u003E動作驗證：無\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cla 在胸骨柄（manubrium）頂端上方的結締組織交叉點。目的不是進入膝窩（popliteal troph），而是向下推壓上方組織，感受胸骨柄上的結締組織網絡。胸鎖乳突肌在此匯聚，但重點是多向交叉的結締組織。以雙指尖評估並施治，癥狀包括喉嚨痛與喉部黏稠感。\u003C/p\u003E\u003Cp\u003E這個點位在胸骨柄（manubrium）的頂部，但實際上是在其上表面。操作時，我們需要向尾側（caudal）施力，才能感覺到覆蓋該區域的筋膜，這個點位非常表淺，不需要深壓。\u003C/p\u003E\u003Cp\u003Eme-cla 將位於胸骨柄的頂部，但它實際上是上表面。\u003Cbr /\u003E所以，你必須向尾側推壓，以感知覆蓋該區域的筋膜。\u003Cbr /\u003E而且你完全不需要按得太深。\u003Cbr /\u003E所以這是 me-cla。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070520-me-cl-a-l1.jpeg\" alt=\"me-cl-a-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070528-me-cl-a-t1.jpeg\" alt=\"me-cl-a-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070533-me-cl-a-t2.jpeg\" alt=\"me-cl-a-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E是一條感知鏈沒有動作\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial：為中線感知，不進行動作。\u003C/li\u003E\u003C/ul\u003E"

    "answer": "\u003Cp\u003Eme-pva\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：腹白線自肚臍至恥骨（遠端較常見，有錐肌）\u003C/li\u003E\u003Cli\u003E如何找到：肚臍到恥骨之間橫向觸診，找僵硬區\u003C/li\u003E\u003Cli\u003E臨床意義：內臟深處疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：先十雙手指並排在腹白線上垂直腹白線找最僵硬點，找到後用指節或肘摔，方向垂直腹白線\u003C/li\u003E\u003Cli\u003E動作驗證：無\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-pva 沿白線自臍至恥骨。單關節纖維為錐肌（pyramidalis，位於恥骨上方、張力白線的小肌），雙關節向量為腹直肌（rectus abdominis）。以多指尖沿白線左右觸診，找出僵硬區以指關節左右處理；可能為一點或兩點，遠端（靠近恥骨）更常見，因為有肌纖維參與。可引發典型的「身體－內臟」疼痛，病人於內臟深處感痛。第三級會深入討論此處與「脊索（rakis）」以及「重複動脈（duplical artery）」的關聯，並說明其向骨盆與內臟區域的廣泛放射。\u003C/p\u003E\u003Cp\u003E此點位依然在腹白線上，介於肚臍與恥骨之間。要記得，在遠端會有錐狀肌（pyramidalis），所以我們必須橫向觸診。如果感覺到僵硬，就代表此點位呈陽性。點位大約在中間的位置。\u003C/p\u003E\u003Cp\u003Eme-pva 仍然會位於肚臍和恥骨之間的腹白線。\u003Cbr /\u003E記住，在遠端我們會有錐狀肌。\u003Cbr /\u003E所以我們必須橫向觸診它。\u003Cbr /\u003E如果你感覺到僵硬，這就是該點呈陽性的信號。\u003Cbr /\u003E所以 me-pva，就在正中間延伸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070522-me-pv-a-l1.jpeg\" alt=\"me-pv-a-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070527-me-pv-a-t1.jpeg\" alt=\"me-pv-a-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070532-me-pv-a-t2.jpeg\" alt=\"me-pv-a-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070536-me-pv-a-t3.jpeg\" alt=\"me-pv-a-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070541-me-pv-a-t4.jpeg\" alt=\"me-pv-a-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070546-me-pv-a-t5.jpeg\" alt=\"me-pv-a-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E沒有向內運動 因為向內是一條感知鏈\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial：為中線感知，不進行動作。\u003C/li\u003E\u003C/ul\u003E"

    "answer": "\u003Cp\u003Eme-pvr\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：薦骨上方，棘上韌帶延續\u003C/li\u003E\u003Cli\u003E如何找到：薦骨上方左右觸診，感覺繩索彈跳感即是\u003C/li\u003E\u003Cli\u003E臨床意義：薦骨沈重感（如壓石頭）\u003C/li\u003E\u003Cli\u003E推薦手法：趴，先十隻手手指並排在薦骨上摸中間有無snapping（\u003Cmark\u003E棘上韌帶薦骨區\u003C/mark\u003E），找到一最硬的地方後，一隻手固定屁股上方，另一隻手指關節左右撥處理\u003C/li\u003E\u003Cli\u003E動作驗證：無\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-pvr 位於薦骨上或薦骨面。正常不應觸到薦棘韌帶（sacrospinal ligament）的連續感；若以指頭左右觸診有明顯「繩索彈跳」感，即為薦棘韌帶。找到後以指關節處理，病人會感到針刺樣銳痛，典型主述是「薦骨上方像壓著一顆石頭」，不一定是下背痛，而是沈重感。治療後沈重感會逐步下降，可能很快，也可能需一段時間。\u003C/p\u003E\u003Cp\u003E這個點位在薦骨（sacrum）上方，是棘上韌帶的延伸。我們可以在這裡感覺到彈撥感，這種感覺就代表此點位為陽性。\u003C/p\u003E\u003Cp\u003Eme-pvr 將位於骶骨上方。\u003Cbr /\u003E它是棘上韌帶的延續。\u003Cbr /\u003E所以我們在這裡會感覺到彈撥感。\u003Cbr /\u003E那種彈撥感就是陽性點。\u003Cbr /\u003E所以我們將在這裡確認這個點，me-pvr。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070532-me-pv-r-l1.jpeg\" alt=\"me-pv-r-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070536-me-pv-r-t1.jpeg\" alt=\"me-pv-r-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070541-me-pv-r-t2.jpeg\" alt=\"me-pv-r-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070546-me-pv-r-t3.jpeg\" alt=\"me-pv-r-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E沒有向內運動 因為向內是一條感知鏈\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial：為中線感知，不進行動作。\u003C/li\u003E\u003C/ul\u003E"

    "answer": "\u003Cp\u003Eme-cx\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：股薄肌近中1/3，由內收長肌單關節 + 股薄肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：近端至中段交界，請患者抗阻內收感覺隆起處\u003C/li\u003E\u003Cli\u003E臨床意義：恥骨痛、內收肌痛、膝痛\u003C/li\u003E\u003Cli\u003E推薦手法：手肘長軸\u003C/li\u003E\u003Cli\u003E動作驗證：雙膝向中線擠壓抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cx 位於股薄肌（gracilis）上與內收肌筋膜，單關節纖維為內收長肌（adductor longus），雙關節向量為股薄肌。定位在近端至中段的交界，請病人以三指定位、做主動內收以觸到股薄肌，再以指關節沿長軸觸診；治療用手肘更省力。典型癥狀為恥骨區疼痛（pubalgia）、內收肌痛、臀後側痛，並可牽涉至膝痛。\u003C/p\u003E\u003Cp\u003E這個點位位於股薄肌（gracilis）的近端與中段三分之一交界處。我們可以請對方用腿抵抗我們的手，會感覺到肌肉隆起，那裡就是確切的點位，位置就在股三角（triangle of Scarpa）的外側。\u003C/p\u003E\u003Cp\u003Eme-cx 將位於股薄肌中，處於近端和中三分之一之間。\u003Cbr /\u003E所以，你可以請患者用手對抗你的阻力，你會感覺到肌肉變大。\u003Cbr /\u003E所以那正是那個點，就在斯卡帕氏三角（股三角）的外側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070500-me-cx-l1.jpeg\" alt=\"me-cx-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070505-me-cx-t1.jpeg\" alt=\"me-cx-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070511-me-cx-t2.jpeg\" alt=\"me-cx-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070515-me-cx-t3.jpeg\" alt=\"me-cx-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者擠壓膝蓋這個部位\u003Cbr /\u003E患者可能會在恥骨區域抱怨疼痛\u003Cbr /\u003E或是大腿內側\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（擠膝）：我以手作為阻力，請患者將雙膝向中線擠壓；患者可能在恥骨或大腿內側出現疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120631-move-cx-me.jpeg\" alt=\"move-cx-me\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eme-ge\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：股薄肌中遠1/3\u003C/li\u003E\u003Cli\u003E如何找到：股薄肌中遠1/3交界處\u003C/li\u003E\u003Cli\u003E臨床意義：膝關節問題、深蹲銳痛\u003C/li\u003E\u003Cli\u003E推薦手法：沿長軸\u003C/li\u003E\u003Cli\u003E動作驗證：踝部抗阻內收或外展\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-ge 位於股薄肌的中段至遠段之間。半腱肌（semitendinosus）作為半月板相關成分，股薄肌遠端作為「二頭肌」成分（原文用語沿用）。沿長軸工作，疼痛可局部、近端或遠端擴散。典型為膝關節問題，並在特定動作（如深蹲等）出現銳痛。\u003C/p\u003E\u003Cp\u003E此點位位於股薄肌的中段與遠端三分之一交界處。它同樣在肌肉上，所以我們會感覺到肌肉的結構。\u003C/p\u003E\u003Cp\u003Eme-ge 將位於股薄肌的中三分之一和遠端三分之一之間。\u003Cbr /\u003E同樣地，它是在肌肉上方，所以你會感知到肌肉，並對該結構進行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070557-me-ge-l1.jpeg\" alt=\"me-ge-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070503-me-ge-t1.jpeg\" alt=\"me-ge-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070508-me-ge-t2.jpeg\" alt=\"me-ge-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070513-me-ge-t3.jpeg\" alt=\"me-ge-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070519-me-ge-t4.jpeg\" alt=\"me-ge-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者抗阻進行內收用你的手頂住患者的小腿\u003Cbr /\u003E患者可能感覺膝蓋內側有疼痛\u003Cbr /\u003E然後讓患者做相反的方向的動作 向外側推\u003Cbr /\u003E患者可能會感覺膝蓋外側痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（內側加壓外展）：我穩定患者，請其做外展並對抗我的阻力，通常會在膝內側邊緣出現疼痛。\u003C/li\u003E\u003Cli\u003ELateral（外側加壓內推）：我在踝部提供阻力，請患者向外側推，患者會在膝外側的張力處感到疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120605-move-ge-me.jpeg\" alt=\"move-ge-me\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120610-move-ge-la.jpeg\" alt=\"move-ge-la\" /\u003E\u003C/p\u00     "answer": "\u003Cp\u003Eme-ta\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：腓腸肌內側頭肌腱交界，由比目魚肌單關節 + 拇長屈肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：內側腓腸肌肌腹與肌腱交界處上方\u003C/li\u003E\u003Cli\u003E臨床意義：足跟痛、足底筋膜炎、抽筋\u003C/li\u003E\u003Cli\u003E推薦手法：專注該區縱向\u003C/li\u003E\u003Cli\u003E動作驗證：全腳趾屈曲維持\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-ta 位於腓腸肌內側肌腱的肌腱交界（musculotendinous junction）。單關節為比目魚肌（soleus），雙關節向量為拇長屈肌（flexor hallucis longus）。治療需專注該區，不要觸及其他結構；之後的操作姿勢將於下一場介紹。典型癥狀為足跟痛、足底筋膜炎樣痛、局部抽筋，或腓腸肌拉傷、撕裂史。請緊鄰肌腱交界上方處理。\u003C/p\u003E\u003Cp\u003E這個點位在內側腓腸肌（gastrocnemius medialis）的肌腱與肌肉交界處。我們找到肌肉後，就在這個高度的交界處進行操作。\u003C/p\u003E\u003Cp\u003Eme-ta 將位於腓腸肌內側頭的肌腱結合處。\u003Cbr /\u003E所以，我們感知肌肉，並將精確地在這個水平高度的肌腱結合處進行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070503-me-ta-l1.jpeg\" alt=\"me-ta-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070511-me-ta-t1.jpeg\" alt=\"me-ta-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070516-me-ta-t2.jpeg\" alt=\"me-ta-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070521-me-ta-t3.jpeg\" alt=\"me-ta-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070526-me-ta-t4.jpeg\" alt=\"me-ta-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E向內-向外 踝部 向外用足部外側緣行走\u003Cbr /\u003E向內用足部內側緣行走\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial／Lateral（邊緣行走）：Medial 為沿足內緣行走；Lateral 為沿足外緣行走。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120639-move-ta-la.jpeg\" alt=\"move-ta-la\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120646-move-ta-me.jpeg\" alt=\"move-ta-me\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eme-pe\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：外展拇肌起點（跟骨內側足弓肌腱處附近）\u003C/li\u003E\u003Cli\u003E如何找到：跟骨前方，感覺皮下結締組織結合處\u003C/li\u003E\u003Cli\u003E臨床意義：足底不適、足底筋膜炎\u003C/li\u003E\u003Cli\u003E推薦手法：側臥，上腳曲抬腿70度，下腳也曲但腳掌和床邊平行，兩隻腳不貼對方，指關節或手肘斜摔（足弓&lt;-&gt;阿基里斯腱方向）。組織非常僵硬，指關節可能無法感知，需先以手肘熱開組織以辨識質地再治療。\u003C/li\u003E\u003Cli\u003E動作驗證：患者站立，只有腳跟掂地，全趾屈曲並維持 5 秒；患者常在足底（plantar ridge）出現抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-pe 此處的單羽狀纖維為骨間肌（interosseous），雙羽狀纖維為趾長屈肌（flexor digitorum longus）。在肌起點以指關節、手肘觸診與治療，方向需平行肌腱與神經，較安全且有效。病人採側臥；若組織非常僵硬，指關節可能無法感知，需先以手肘熱開組織以辨識質地再治療。典型癥狀為足部過敏（原文「pain in the allergies」沿用語義為足部不適），也常可用於足底筋膜炎。\u003C/p\u003E\u003Cp\u003E此點位位於外展拇肌（abductor hallucis）的起點。我們先找到跟骨（calcaneus），然後稍微移動，一旦感覺到皮下有一些組織結構，那就是結締組織與外展拇肌肌群的結合處。\u003C/p\u003E\u003Cp\u003Eme-pe將位於外展拇肌的起點。\u003Cbr /\u003E所以我們找到跟骨，我們稍微移動，一旦你感覺到一些結構、一些皮下組織，那就是與外展拇肌肌群連在一起的結締組織。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070520-me-pe-l1.jpeg\" alt=\"me-pe-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070527-me-pe-t1.jpeg\" alt=\"me-pe-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070533-me-pe-t2.jpeg\" alt=\"me-pe-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070537-me-pe-t3.jpeg\" alt=\"me-pe-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070542-me-pe-t4.jpeg\" alt=\"me-pe-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260602060651-me-pe-td.jpeg\" alt=\"me-pe-td\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者做一個完全的腳趾屈曲\u003Cbr /\u003E保持五秒患者可能會感覺腳掌抽筋\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（全趾屈曲保持）：我請患者全趾屈曲並維持 5 秒；患者常在足底（plantar ridge）出現抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010602-move-pe-me.jpeg\" alt=\"move-pe-me\" /\u003E\u003C/p\u003E"

    "question": "me-sc",
    "answer": "\u003Cp\u003Eme-sc\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：前鋸肌在肋骨的附著處（2–3根肋骨）\u003C/li\u003E\u003Cli\u003E如何找到：沿腋前線觸診2–3根肋骨（乳頭同高同低少少位置找）最僵硬處即是，\u003Cmark\u003E它可能出現在不同的附著點上，因此我們必須觸診肋骨上的這三個附著點。\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：冷凍肩、上背重大問題，若病人怕癢（ticklish），幾乎可預期此點呈陽性。\u003C/li\u003E\u003Cli\u003E推薦手法：側躺，雙腳曲膝，上手打橫同身體成90度角（90度角後位置會變成比乳頭高一點，因為乳頭皮移高左，但根據肋骨位置作準），由背闊肌凹位開始\u003Cmark\u003E沿肋骨方向\u003C/mark\u003E停留在肌纖維上摔\u003C/li\u003E\u003Cli\u003E動作驗證：對方握拳直手舉手90度向前，我推佢拳向後作抗阻測試\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-sc 位於前鋸肌（serratus anterior），雙關節向量來自胸大肌與背闊肌（纖維交叉）。沿腋前線，於 2–3 根肋骨的前鋸肌附著處觸診，手法需沿肋骨方向並停留在肌纖維上，避免瘀傷骨膜。此點可伴隨肩活動受限（冷凍肩、僵硬肩），亦可導致上背重大問題。臨床上病人跌倒撞擊手臂，背後疼痛的原始來源可能在此。多以側臥檢查；若病人怕癢（ticklish），幾乎可預期此點呈陽性。全身的「怕癢」是受器閾值下降的表徵：在高度僵硬區，輕觸即痛、搔癢感即為指標。\u003C/p\u003E\u003Cp\u003E此點位位於前鋸肌（serratus anterior）附著在肋骨上的地方。\u003Cmark\u003E它可能出現在不同的附著點上，因此我們必須觸診肋骨上的這三個附著點。\u003C/mark\u003E雖然我將標示點畫在中間，但這三個點位中的任何一個都有可能。\u003C/p\u003E\u003Cp\u003Eme-sc 將位於前鋸肌在肋骨上的止點處。\u003Cbr /\u003E它可能在不同的區域，可能在其中一個、另一個，或再另一個止點。\u003Cbr /\u003E所以你必須在肋骨上觸診這三個地方。\u003Cbr /\u003E所以，這個點可以是其中的任何一個，我把它標在中間，但它可以是其中的任何一個。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070551-me-sc-l1.jpeg\" alt=\"me-sc-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070557-me-sc-t1.jpeg\" alt=\"me-sc-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070503-me-sc-t2.jpeg\" alt=\"me-sc-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070507-me-sc-t3.jpeg\" alt=\"me-sc-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070511-me-sc-t4.jpeg\" alt=\"me-sc-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070517-me-sc-t5.jpeg\" alt=\"me-sc-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070522-me-sc-t6.jpeg\" alt=\"me-sc-t6\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者手臂朝前\u003Cbr /\u003E抗阻對抗你的推力\u003Cbr /\u003E檢查的是前鋸肌\u003Cbr /\u003E另一手扶助患者的肩胛骨區域\u003Cbr /\u003E查看有無疼痛或是無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（手臂前推抗阻）：我請患者手臂前推、對抗我由肩胛下緣施加的向後推力，以檢測前鋸肌功能；觀察是否有無力或疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010603-move-sc-me.jpeg\" alt=\"move-sc-me\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010608-move-sc-me2.jpeg\" alt=\"move-sc-me2\" /\u003E\u003C/p\u003E"

    "question": "me-hu",
    "answer": "\u003Cp\u003Eme-hu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：腋窩末端、臂內側肌間隔近中1/3，神經血管鞘上方\u003C/li\u003E\u003Cli\u003E如何找到：腋窩末端感覺肌間隔近中1/3處，自己兩隻手做v字手指掂手指變成一個菱形，手指掂手指個位放腋下，cc點在下角。\u003C/li\u003E\u003Cli\u003E臨床意義：在處理中肘、中肩胛後，此點可能自行改善；否則它會加入肩部問題。\u003C/li\u003E\u003Cli\u003E推薦手法：躺，手外展45度，掌心向上，一隻手頂住對方上臂外側，另一隻手用指節平行肌間隔打圈摔。\u003Cmark\u003E此處下方只有神經與血管，因此操作要安靜、柔和，以圓滑滑行方式感知筋隔質地。\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：對方站立，手外展略低於90度，掌心向前，我捉住對方手肘上少少近上臂，對方下內收抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-hu 位於肌間隔（septa）近端至中段交界的末端。此處下方只有神經與血管，因此操作要安靜、柔和，以圓滑滑行方式感知筋隔質地。單關節纖維為喙肱肌（coracobrachialis），雙關節向量為胸大肌。臨床上常見處理 me-cu、me-sc 後，此點可能自行改善；否則可能產生肩關節問題。\u003C/p\u003E\u003Cp\u003E這個點位位於腋窩（axillary cavity）的末端，在肱骨區域的臂內側肌間隔（intermuscular septa）的近端與中段三分之一交界處，就在神經血管束（neurovascular sheath）的正上方。\u003C/p\u003E\u003Cp\u003Eme-hu 將位於腋窩的末端，處於臂部肌間隔近端中三分之一之間，正好位於神經血管鞘上方。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070502-me-hu-l1.jpeg\" alt=\"me-hu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070507-me-hu-t1.jpeg\" alt=\"me-hu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070513-me-hu-t2.jpeg\" alt=\"me-hu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070518-me-hu-t3.jpeg\" alt=\"me-hu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070525-me-hu-t4.jpeg\" alt=\"me-hu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E抗阻點在上臂\u003Cbr /\u003E患者做內收的的動作檢查是否有疼痛和無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（向下推抗阻）：我請患者向下推並給予阻力，檢查腋窩區的疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010633-move-hu-me.jpeg\" alt=\"move-hu-me\" /\u003E\u003C/p\u003E"

    "question": "me-cu",
    "answer": "\u003Cp\u003Eme-cu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：臂內側肌間隔中遠1/3，緊貼肱肌\u003C/li\u003E\u003Cli\u003E如何找到：臂內側中遠1/3交界，感覺緊貼肱肌處\u003C/li\u003E\u003Cli\u003E臨床意義：兩神經之間，常見於過度使用\u003C/li\u003E\u003Cli\u003E推薦手法：長軸指關節\u003C/li\u003E\u003Cli\u003E動作驗證：手腕抗阻內收\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cu 位於近／中／遠段的交界處之間，單關節為喙肱肌，雙關節向量為尺側腕屈肌（flexor carpi ulnaris）的肱骨纖維。下方是肱肌（brachialis），即使介於兩條神經之間，向下仍可接觸肌肉。由於在兩條神經之間工作，建議沿長軸以指關節治療；不要擔心神經，按壓時神經會張開，神經外膜（epineurium）能避免摩擦。不過，若病人已有麻木，治療可能加重該麻木。沿長軸的指關節為較容易的方式。\u003C/p\u003E\u003Cp\u003E這個點位在臂內側肌間隔的中段與遠端三分之一交界處，緊貼著肱肌（brachialis）。\u003C/p\u003E\u003Cp\u003Eme-cu 將位於肌間隔的中三分之一和遠端三分之一之間，緊貼著肱肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070507-me-cu1.jpeg\" alt=\"me-cu1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070512-me-cu-t1.jpeg\" alt=\"me-cu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070518-me-cu-t2.jpeg\" alt=\"me-cu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E手腕處抗阻內收讓患者將手臂向內\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（中線下推）：我在手腕中段施阻，請患者向下推。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010626-move-cu-me.jpeg\" alt=\"move-cu-me\" /\u003E\u003C/p\u003E"

    "question": "me-ca",
    "answer": "\u003Cp\u003Eme-ca\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：\u003Cmark\u003E尺側屈腕肌肌腱肌肉交界\u003C/mark\u003E（中段1/3、尺骨內側）\u003C/li\u003E\u003Cli\u003E如何找到：尺骨內側中段，感覺肌腱肌肉交界處。此點較難，因為肌腹位於尺骨內側偏中面，不太在前面。高度大約在前臂分為六等分，手肘1至手肘6計的話的第三分，\u003C/li\u003E\u003Cli\u003E臨床意義：腕痛，也影響肘部\u003C/li\u003E\u003Cli\u003E推薦手法：如果躺，曲手，上臂貼床，手指指天花板，自己一隻手捉手腕另一隻手垂直摔，\u003Cmark\u003E或更好做法是趴，手心向上，沿尺骨垂直平行手臂摔。\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：對方曲肘90度掌心向上，手指向前，一隻手托住前臂橈側，另一隻手頂住佢手指尾，第五掌骨抗阻做純尺偏\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-ca 以尺側腕屈肌（flexor carpi ulnaris）為最佳目標（單關節），雙關節向量是小指屈肌（flexor digitorum minimi）。定位在肌腱交界處，沿長軸工作。此點較難，因為肌腹位於尺骨內側偏中面，不太在前面；建議病人體型較大時，俯臥、手臂置側，以手肘沿長軸觸診。可處理腕部問題，也常影響肘部。\u003C/p\u003E\u003Cp\u003E此點位位於尺側屈腕肌（flexor carpi ulnaris）上，在肌腱與肌肉交界處的近端。通常在中段三分之一處，尺骨的內側。\u003C/p\u003E\u003Cp\u003Eme-ca 將位於尺側偏腕屈肌（尺側腕屈肌）中，處於肌腱結合處的近端。\u003Cbr /\u003E所以通常在中三分之一處，位於尺骨的內側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070557-me-ca-l1.jpeg\" alt=\"me-ca-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E躺姿\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060518-me-ca-t-a.jpeg\" alt=\"me-ca-t-a\" /\u003E\u003C/p\u003E\u003Cp\u003E趴姿\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070502-me-ca-t1.jpeg\" alt=\"me-ca-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070508-me-ca-t2.jpeg\" alt=\"me-ca-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070512-me-ca-t3.jpeg\" alt=\"me-ca-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070517-me-ca-t4.jpeg\" alt=\"me-ca-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E在第五掌骨處抗阻\u003Cbr /\u003E尺側外展 向內-腕部\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（純尺偏抗阻）：我在第五掌骨施阻，請患者做純尺偏。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010606-move-ca-me.jpeg\" alt=\"move-ca-me\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010616-move-ca-me.jpeg\" alt=\"move-ca-me\" /\u003E\u003C/p\u003E"

    "question": "me-di",
    "answer": "\u003Cp\u003Eme-di\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：小魚際\u003Cmark\u003E內側緣\u003C/mark\u003E + 近端1/3==、小指外展肌上\u003C/li\u003E\u003Cli\u003E如何找到：小魚際內側緣，抗阻外展感覺肌肉隆起處\u003C/li\u003E\u003Cli\u003E臨床意義：向手指廣泛放射疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：躺，手掌向天，一隻手固定手腕，另一隻手星形多方向指節摔\u003C/li\u003E\u003Cli\u003E動作驗證：站，曲肘，上臂貼身體，手指指前，掌心向內，自己卜尸人大手指在對方手手指內，叫對方收起所有手指抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-di 此處單關節為掌長肌（palmaris longus），特別是小指屈肌（flexor digitorum minimi）。此點非常小，可請病人主動或抗阻外展，小肌腹會鼓起以利定位；位於小魚際隆起近端三分之一的內緣。以「星形」多方向操作。典型為向手指廣泛放射的疼痛。\u003C/p\u003E\u003Cp\u003E此點位位於小魚際肌群（hypothenar eminence）的內側邊緣，在小指展肌（abductor digiti minimi）上。我們可以請對方做出對抗動作，會感覺到肌肉變大，那裡就是確切的點位。\u003C/p\u003E\u003Cp\u003Eme-di 將位於小魚際的內側邊緣，處於小指展肌（此處指 abductor digiti minimi）中。\u003Cbr /\u003E所以我們請患者對抗阻力，你會感覺到肌肉變大。那正是那個點。所以我們在這裡有 Medial digiti。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070534-me-di-l1.jpeg\" alt=\"me-di-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070542-me-di-t1.jpeg\" alt=\"me-di-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531070547-me-di-t2.jpeg\" alt=\"me-di-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E抗阻收起五指\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（全指內收抗阻）：請患者所有手指做內收，我檢查力量。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010609-move-di-me.jpeg\" alt=\"move-di-me\" /\u003E\u003C/p\u003E"
  },

    "question": "la-cp1",
    "answer": "\u003Cp\u003Ela-cp1\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：外眼角下方眼輪匝肌，由單關節外直肌 + 雙關節眼輪匝肌組成\u003C/li\u003E\u003Cli\u003E如何找到：眼眶外下方，按住眼輪匝肌橫向滑動，感覺彈撥感即是\u003C/li\u003E\u003Cli\u003E臨床意義：功能性斜視、頭痛及偏頭痛\u003C/li\u003E\u003Cli\u003E推薦手法：雙指交疊、指節或指骨45度按壓\u003C/li\u003E\u003Cli\u003E動作驗證：半月形移動檢查外轉追視\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於外眼角，包含了作為單關節纖維的眼外直肌（Rectus Lateralis），以及作為雙關節向量的眼輪匝肌（Orbicularis Oculi）。\u003Cbr /\u003E您可以將手指放在略低於眼眶邊緣的位置，就能感覺到眼輪匝肌橫向的纖維束。治療時，可以用雙指交疊、指節，或更建議用指骨進行按壓。請測試看看哪個方向，例如稍微傾斜的角度，能達到最好的效果。這個點對於處理功能性斜視、頭痛及偏頭痛非常有效，也能緩解因不協調感所引發的疼痛。\u003C/p\u003E\u003Cp\u003E我在眼睛下方、眼匝肌（orbicularis oculi）所在的側邊進行定位，位置在眼眶下方的水平線之下、外側。當指尖施以45度方向的輕觸或滑動時，會感到來自眼匝肌的「彈跳感／打嗝樣的滑動感」，這就是我所稱的 la-cp1。\u003C/p\u003E\u003Cp\u003Ela-cp1 將會位於眼輪匝肌中。\u003Cbr /\u003E就在眼線下方的外側，你會感覺到因為眼輪匝肌而產生的彈撥感。\u003Cbr /\u003E所以這裡我們有 la-cp1。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050505-la-cp1-l1.jpeg\" alt=\"la-cp1-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050514-la-cp1-t1.jpeg\" alt=\"la-cp1-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050519-la-cp1-t2.jpeg\" alt=\"la-cp1-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050524-la-cp1-t3.jpeg\" alt=\"la-cp1-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E向外和向內-頭部1\u003Cbr /\u003E做一個半月形運動 左右各一次\u003Cbr /\u003E檢查右邊\u003Cbr /\u003E向外-頭部1\u003Cbr /\u003E左側的向內-頭部1\u003Cbr /\u003E看眼睛的情況\u003Cbr /\u003E這樣檢查的向外-頭1左側和向內-頭1右側\u003Cbr /\u003E另一邊同理\u003Cbr /\u003E檢查患者的眼球活動是否正常\u003Cbr /\u003E盡量往遠端活動手指\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral／Medial（半月弧追視）：我以半月形軌跡帶動手指至右側與左側，檢查右側外轉（latero）與左側內轉（medio）的追視反應。根據患者注視方向，我在本次檢查中先做左外轉與右內轉，並於相反側重複檢查，觀察雙眼同步性及可追視的最遠範圍。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110538-move-me-la-cp1a.jpeg\" alt=\"move-me-la-cp1a\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110556-move-me-la-cp1b.jpeg\" alt=\"move-me-la-cp1b\" /\u003E\u003C/p\u003E"
  },

    "question": "la-cp2",
    "answer": "\u003Cp\u003Ela-cp2\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：顳肌中央（側面腱膜位置），由單關節顳肌 + 雙關節帽狀腱膜組成\u003C/li\u003E\u003Cli\u003E如何找到：\u003Cmark\u003E三指放在顳部，讓患者咬牙，感覺最厚實處即是\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：頭痛與偏頭痛\u003C/li\u003E\u003Cli\u003E推薦手法：假設整左邊，躺，叫對方擰頭向右邊45度，自己企床頭位，一隻手放係佢頭右頭頂床加頂住佢個頭，另一隻手沿後腦向眼球方向摔\u003C/li\u003E\u003Cli\u003E動作驗證：一隻手掌心貼顳肌，另一隻手掌心貼下顎，食指掂耳仔，被動擠壓推下顎，比較兩側終末感\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於顳肌（Temporalis）的中央，也就是「側面腱膜」（Lateral Aponeurosis）的位置。單關節纖維是顳肌，雙關節向量則是帽狀腱膜（Galea Aponeurotica）。帽狀腱膜覆蓋了整個頭部，並連結了五個張力肌群：額肌（Frontalis）、耳前肌（Auricularis Anterior）、耳上肌（Auricularis Superior）、耳後肌（Auricularis Posterior）與枕肌（Occipitalis）。\u003Cbr /\u003E要找到這個點，可以將三根手指放在顳部，請對方咬緊牙關，感受顳肌收縮時最厚實的區域。治療時，應以橫向或斜向的方式進行，以產生足夠的摩擦力。\u003C/p\u003E\u003Cp\u003E我以三指放在顳肌（temporalis）中央，請患者咬緊牙齒以利觸感增強。此時可感覺到該部位的肌肉在此層次變得較厚，我以此來辨識外翼肌（lateral pterygoid） (la-cp2) 的所在。\u003C/p\u003E\u003Cp\u003Ela-cp2 位於顳肌的中心。\u003Cbr /\u003E所以你可以放三隻手指，請患者咬緊牙關，你會感覺到肌肉在這個水平高度變厚。\u003Cbr /\u003E所以就在這裡，我們確認出 Lateral pterygoid (la-cp2) 。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050511-la-cp2-l1.jpeg\" alt=\"la-cp2-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050515-la-cp2-t1.jpeg\" alt=\"la-cp2-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050520-la-cp2-t2.jpeg\" alt=\"la-cp2-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050525-la-cp2-t3.jpeg\" alt=\"la-cp2-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E牽拉下頜\u003Cbr /\u003E做一個被動的擠壓下頜關節\u003Cbr /\u003E這是左側一次做一遍\u003Cbr /\u003E然後做另一側\u003Cbr /\u003E末端感覺需要是一樣的\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（顳肌伸展）：我以被動方式擠壓下顎，測試單側顳肌伸展，接著換側，比較終末感是否一致且平順。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100643-move-cp2-la.jpeg\" alt=\"move-cp2-la\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100647-move-cp2-la2.jpeg\" alt=\"move-cp2-la2\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "la-cp3",
    "answer": "\u003Cp\u003Ela-cp3\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：咬肌筋膜正中央，由單關節咬肌 + 雙關節笑肌組成\u003C/li\u003E\u003Cli\u003E如何找到：患者咬牙，摸咬肌前後邊界，正中間最厚或彈撥處即是\u003C/li\u003E\u003Cli\u003E臨床意義：夜間磨牙、牙齒敏感、TMJ 問題\u003C/li\u003E\u003Cli\u003E推薦手法：前後方向橫向摩擦（避開向上刺激腮腺）\u003C/li\u003E\u003Cli\u003E動作驗證：三指節放入嘴中張口，檢查是否疼痛或無法完成\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於咬肌筋膜（Masseter Fascia）上，單關節纖維是咬肌（Masseter），雙關節向量則是笑肌（Risorius）。\u003Cbr /\u003E尋找此點的簡單方法是將三指放在咬肌上，請對方咬緊牙齒，感受其前後邊界，然後在正中間進行處理。在此處治療時，採用前後方向的橫向摩擦非常重要，需避免向上的摩擦，以免刺激到下方的腮腺（Parotid Gland）而導致分離或發炎。對於有夜間磨牙（Bruxism）習慣的人來說，這個點通常非常僵硬，處理後能有效改善癥狀。此點與前述的點一樣，疼痛感可能會傳導至牙齒，對於那些牙齒對冷敏感或疼痛，但牙醫又找不出原因的個案，這是一個值得嘗試的處理點。\u003C/p\u003E\u003Cp\u003E在目標肌肉的範圍內，我以兩側邊界為參考，選擇正中間進行觸診。於此位置會感到肌肉有明顯的「彈跳」或滑動感，這個中點即是我所標示的 la-cp3。\u003C/p\u003E\u003Cp\u003Ela-cp3 將會位於肌肉上方。\u003Cbr /\u003E所以，我們有這條肌肉的兩個邊界，而我們想直接走到正中間。\u003Cbr /\u003E你會感覺到這條肌肉的彈撥感。所以這裡我們有 la-cp3。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050502-la-cp3-l1.jpeg\" alt=\"la-cp3-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050509-la-cp3-t1.jpeg\" alt=\"la-cp3-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050514-la-cp3-t2.jpeg\" alt=\"la-cp3-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050521-la-cp3-t3.jpeg\" alt=\"la-cp3-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E雙側牽拉顳肌\u003Cbr /\u003E讓患者放三個指關節在嘴里\u003Cbr /\u003E觀察患者是否有疼痛或無法張口的情況\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（雙側顳肌伸展）：我請患者以三個指節寬度嘗試置入口中，觀察是否能達成、是否有疼痛或不能完成。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100638-move-cp3-la.jpeg\" alt=\"move-cp3-la\" /\u003E\u003C/p\u003E"
  },

    "question": "la-cl",
    "answer": "\u003Cp\u003Ela-cl\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：鎖骨與胸骨末端交會處，由中斜角肌單關節 + SCM 雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：SCM 近中1/3，偏鎖骨端交會處\u003C/li\u003E\u003Cli\u003E臨床意義：頭痛、偏頭痛與頸痛\u003C/li\u003E\u003Cli\u003E推薦手法：指骨沿縱向\u003C/li\u003E\u003Cli\u003E動作驗證：頸部側彎（目光正前方），輕壓檢查終末感與疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於鎖骨與胸骨末端交會處的區域。單關節肌是中斜角肌（Middle Scalene），雙關節肌則是胸鎖乳突肌（Sternocleidomastoid）。\u003Cbr /\u003E處理時，應靠近鎖骨的近端三分之一處，並偏向其前方，這個位置對於頭部的側向彎曲有最大的影響。建議使用指骨沿著縱向進行按壓。這個點能有效改善頭痛、偏頭痛以及頸部疼痛。\u003C/p\u003E\u003Cp\u003E我以胸鎖乳突肌（SCM）的胸骨端與鎖骨端交會處為定位依據，整體位置大約在 SCM 的近端到中段的三等分之間。主要的摩擦（friction）操作會偏向鎖骨端，此處即為我稱作的 la-cl。\u003C/p\u003E\u003Cp\u003Ela-cl 是胸鎖乳突肌（SCM）的胸骨端和鎖骨端匯合的地方。\u003Cbr /\u003E所以基本上它位於這條胸鎖乳突肌的近端和中三分之一之間。\u003Cbr /\u003E所以就在這裡，摩擦主要會針對鎖骨端來進行。\u003Cbr /\u003E所以我們這裡有 la-cl。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050515-la-cl-l1.jpeg\" alt=\"la-cl-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050521-la-cl-t1.jpeg\" alt=\"la-cl-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050526-la-cl-t2.jpeg\" alt=\"la-cl-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E要求患者頭部側屈\u003Cbr /\u003E然後回到中立位\u003Cbr /\u003E可以輕微的牽拉一下\u003Cbr /\u003E查看末端感覺以及有無疼痛\u003Cbr /\u003E對側同理\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（側彎）：我請患者頸部向一側側彎、目光維持正前方，若無痛，我會輕壓局部以檢查終末感或是否誘發疼痛；需雙側重複。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100612-move-cl-la.jpeg\" alt=\"move-cl-la\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100616-move-cl-la2.jpeg\" alt=\"move-cl-la2\" /\u003E\u003C/p\u003E"

    "question": "la-th",
    "answer": "\u003Cp\u003Ela-th\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：肩胛骨下角下方三角區、髂肋肌，由棘間肌單關節 + 胸髂肋肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：手貼身體，先找到肩胛骨下角，向內側移動直到碰到豎脊肌的側緣，再稍微向外移動。順著肋骨的方向觸診，您會感覺到一個突起，那就是髂肋肌。\u003C/li\u003E\u003Cli\u003E臨床意義：長時間舉臂者、呼吸影響、局部痙攣\u003C/li\u003E\u003Cli\u003E推薦手法：趴，指節或手肘尺骨\u003Cmark\u003E外下到內上45度摔\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：\u003Cmark\u003E手臂盡量外移，腰也要側，觀察肘部是否越過身體中線\u003C/mark\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點可能有些難找。它位於由斜方肌（Trapezius）和闊背肌（Latissimus Dorsi）構成、肩胛骨下角下方的三角區域內。單關節肌是棘間肌（Interspinalis），雙關節肌是胸髂肋肌（Thoracic Iliocostalis）。\u003Cbr /\u003E尋找方法是：先找到肩胛骨下角，向內側移動直到碰到豎脊肌（Erector Spinae）的側緣，再稍微向外移動。順著肋骨的方向觸診，您會感覺到一個突起，那就是髂肋肌。您可以使用指節或手肘尺骨的平坦部分，沿著縱向進行處理。此點對於需要長時間舉臂的音樂家（如小提琴手）非常重要，也可能影響呼吸。疼痛通常是局部的痙攣感，但很容易傳導至肩膀、喉嚨甚至頸部，引發緊繃感。\u003C/p\u003E\u003Cp\u003E我先找到肩胛骨下緣，再尋至外側邊界或棘脊（rachispina）所在走向，之後把手指置於肋間隙。以約45度方向進行觸診時，會出現「彈跳感」，那通常來自骶肋肌群中的髂肋肌（iliocostalis）。在這個設定下，我將此點標示為 la-th。\u003C/p\u003E\u003Cp\u003Ela-th，我們正在尋找肩胛骨的下角。\u003Cbr /\u003E我們將尋找外側緣或脊柱。\u003Cbr /\u003E我們把手指放進肋間隙。\u003Cbr /\u003E當我們以 45 度角進行觸診時，會感覺到彈撥感。\u003Cbr /\u003E這種彈撥感就是髂肋肌。\u003Cbr /\u003E所以就在這裡，我們將會找到 la-th。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050548-la-th-l1.jpeg\" alt=\"la-th-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050500-la-th-l2.jpeg\" alt=\"la-th-l2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050507-la-th-t1.jpeg\" alt=\"la-th-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050513-la-th-t2.jpeg\" alt=\"la-th-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050517-la-th-t3.jpeg\" alt=\"la-th-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050522-la-th-t4.jpeg\" alt=\"la-th-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050527-la-th-t5.jpeg\" alt=\"la-th-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者盡量伸出手臂\u003Cbr /\u003E檢查肘關節是否跨過中線\u003Cbr /\u003E這意味著他可以拉伸髂肋肌\u003Cbr /\u003E所以這是向外-胸部的正常功能\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（手臂外移最大化）：請患者將手臂向外移動至最大，觀察肘部是否越過身體中線（肚臍）；若能達成，表示可拉伸髂肋肌，視為外側胸廓之適應。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100605-move-th-la.jpeg\" alt=\"move-th-la\" /\u003E\u003C/p\u003E"

    "question": "la-lu",
    "answer": "\u003Cp\u003Ela-lu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：腰方肌側緣（第12肋與髂脊之間），由腰方肌單關節 + 髂肋肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：第12肋與髂脊中間深壓，感覺方形阻力即為腰方肌外側面\u003C/li\u003E\u003Cli\u003E臨床意義：久坐後站起下背痛\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E對方側躺背向自己，上腳同下腳都曲膝，上腳放係下腳後，上腳膝掂下腳膕窩，對方舉手貼頭側再抓住床頭。自己一隻手前臂中間掂佢側面腋後，掌心掂側面胸骨，另一隻手橫向用肘摔。最好用手肘來觸診。\u003C/mark\u003E如果用指節治療就另一隻手固定對方手肘。\u003C/li\u003E\u003Cli\u003E動作驗證：企，單手沿身側滑下，檢查手指是否越過腓骨，應該要雙邊對稱。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於腰方肌（Quadratus Lumborum）的側緣。單關節肌是腰方肌，雙關節肌則是髂肋肌（Iliocostalis）。\u003Cbr /\u003E無論對方是仰臥或俯臥，您都可以進行評估與處理。最有效的方式是使用尺骨按壓，雖然也可以用指節，但可能較為困難。在第十二肋骨與髂骨脊之間有足夠的空間可以深入，但此處的治療面積相當寬，建議嘗試用手肘以不同角度來精準處理。許多下背痛都與此點有關，特別是久坐後站起時引發的疼痛。\u003C/p\u003E\u003Cp\u003E在腰部，我以髂脊與第12肋之間為界，向深層探入直到摸到方形腰肌（quadratus lumborum）的外側面。此即我所定義的 la-lu。\u003C/p\u003E\u003Cp\u003Ela-lu 將會位於腰方肌，也就是在髂脊和第 12 肋骨之間。\u003Cbr /\u003E我們將往深處按壓，直到感覺到腰方肌的外側表面。\u003Cbr /\u003E所以這就是 la-lu。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050557-la-lu-l1.jpeg\" alt=\"la-lu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050502-la-lu-t1.jpeg\" alt=\"la-lu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050507-la-lu-t2.jpeg\" alt=\"la-lu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050511-la-lu-t3.jpeg\" alt=\"la-lu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050517-la-lu-t4.jpeg\" alt=\"la-lu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E十分簡單 讓患者向一邊側屈\u003Cbr /\u003E查看患者的手有無越過腓骨\u003Cbr /\u003E一側 然後檢查對側\u003Cbr /\u003E這個動作也應該是雙側對稱的\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（側彎滑手）：我請患者單手沿身側滑下，檢查手指是否可觸及或越過腓骨位置；雙側需對稱。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/t     "question": "la-pv",
    "answer": "\u003Cp\u003Ela-pv\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：髂後上棘與大轉子中點、臀中肌後緣，由臀中肌單關節 + 臀大肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：連接 PSIS 與大轉子中點，側躺深壓感覺後緣即是\u003C/li\u003E\u003Cli\u003E臨床意義：坐骨神經痛、下背與髖痛\u003C/li\u003E\u003Cli\u003E推薦手法：側躺用髂骨橫向處理\u003C/li\u003E\u003Cli\u003E動作驗證：單腿向外側擡起維持5秒，檢查臀部是否抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於大轉子（Greater Trochanter）與後上髂脊（Posterior Superior Iliac Spine）之間，基本上就是臀中肌（Gluteus Medius）的後緣。單關節部分是臀中肌，雙關節部分則來自臀大肌（Gluteus Maximus），因為必須穿過臀大肌才能觸及臀中肌的後緣。\u003Cbr /\u003E最簡單的處理方式是讓對方側躺，雙膝微彎交疊。使用您的髂骨進行治療。有時因為脂肪層太厚或組織過於僵硬，可能不易感覺到緻密化的點。此時可以請對方稍微彎曲膝蓋，以舒適為原則，然後對著纖維邊緣的方向進行橫向處理。這個點對於坐骨神經痛、下背痛、髖部疼痛及臀部疼痛非常重要。典型的癥狀是久坐後站起時的下背痛。\u003C/p\u003E\u003Cp\u003E我以後上髂棘（PSIS）與股骨大轉子（greater trochanter）連線的中點作為參考，於此中點可觸及臀中肌（gluteus medius）的後緣。該位置即是我標示的 la-pv。\u003C/p\u003E\u003Cp\u003Ela-pv 將位於髂後上棘與大轉子的中間，就在正中間。\u003Cbr /\u003E你會感覺到臀中肌的後緣。\u003Cbr /\u003E這就是 la-pv。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050521-la-pv-l1.jpeg\" alt=\"la-pv-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050527-la-pv-t1.jpeg\" alt=\"la-pv-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050533-la-pv-t2.jpeg\" alt=\"la-pv-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050538-la-pv-t3.jpeg\" alt=\"la-pv-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050543-la-pv-t4.jpeg\" alt=\"la-pv-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E一樣先固定患者的軀體\u003Cbr /\u003E患者的手放在你的肩膀上\u003Cbr /\u003E然後讓患者把腿向外側擡起\u003Cbr /\u003E保持五秒\u003Cbr /\u003E患者可能感覺臀肌有抽筋\u003Cbr /\u003E因為該肌筋膜單元的異常\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（單側擡腿保持）：我讓患者將手臂支撐在我肩上以增加穩定，單腿向外擡起如同 Trendelenburg，維持 5 秒；由於筋膜單元活化，患者常在臀部出現類抽筋感。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120641-move-pv-la.jpeg\" alt=\"move-pv-la\" /\u003E\u003C/p\u003E"

    "question": "la-cx",
    "answer": "\u003Cp\u003Ela-cx\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：髂前上棘正下方\u003Cmark\u003E闊筋膜張肌中央\u003C/mark\u003E，由臀小肌單關節 + 闊筋膜張肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：髂前上棘正下方明顯肌腹中央即是\u003C/li\u003E\u003Cli\u003E臨床意義：疼痛劇烈並向下傳至整條腿\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E側躺，對方面向自己，雙腳曲膝 45 或 80 度，一隻手前臂放 ITB 至掌心貼大轉子，另一隻手用手肘橫向或斜向（肘在第一隻手拇指食指作固定防止走位）\u003C/mark\u003E，用指節觸診。\u003C/li\u003E\u003Cli\u003E動作驗證：對方雙手搭自己肩膀，腿向外展幾下來激活 TFL，檢查抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於闊筋膜張肌（Tensor Fasciae Latae）上。單關節肌是臀小肌（Gluteus Minimus），雙關節肌是闊筋膜張肌。\u003Cbr /\u003E此點位於前上髂脊正下方的一個隆起區域，觸感相當堅實。您可以用手肘以橫向或斜向進行處理，指節則可用於觸診。無論對方是仰臥或側躺，都可以處理此點。此處的疼痛可能非常劇烈，並會向下擴散至整條腿，典型的癥狀會涵蓋整個側面區域。\u003C/p\u003E\u003Cp\u003E我先找到前上髂棘（ASIS），其下方有明顯的肌腹，即髂脛束張肌（tensor fasciae latae）。我會選擇其肌腹中央作為定位，這就是我稱的 la-cx。\u003C/p\u003E\u003Cp\u003Ela-cx 將會位於股膜張肌（闊筋膜張肌）上方。所以我們找到髂前上棘，就在正下方我們有這塊肌腹，也就是闊筋膜張肌。我們想要正好在它的正中間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050519-la-cx-l1.jpeg\" alt=\"la-cx-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050526-la-cx-t1.jpeg\" alt=\"la-cx-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050531-la-cx-t2.jpeg\" alt=\"la-cx-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050537-la-cx-t3.jpeg\" alt=\"la-cx-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050543-la-cx-t4.jpeg\" alt=\"la-cx-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050548-la-cx-t5.jpeg\" alt=\"la-cx-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E是一個彈動的側屈 讓患者首先穩定自己\u003Cbr /\u003E腿部垂直向外踢\u003Cbr /\u003E雙手放在你肩上\u003Cbr /\u003E這樣患者可以激活闊筋膜張肌\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（側向彈性弓箭步）：患者扶穩後，將腿向外側拉出，足尖朝前、足背上擡，以強化闊筋膜張肌；若於該處出現抽筋即為陽性反應。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120626-move-cx-la.jpeg\" alt=\"move-cx-la\" /\u003E\u003C/p\u003E"

    "question": "la-ge",
    "answer": "\u003Cp\u003Ela-ge\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：大轉子與股骨外髁中點、闊筋膜（IT band）上，由股外側肌單關節 + 闊筋膜張肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：大轉子與外髁中點，按闊筋膜粗糙表面即是\u003C/li\u003E\u003Cli\u003E臨床意義：膝痛，也影響髖部\u003C/li\u003E\u003Cli\u003E推薦手法：縱向或斜向，感受組織粗糙面\u003C/li\u003E\u003Cli\u003E動作驗證：踝部抗阻外展，檢查膝外側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於大腿外側的闊筋膜（Fascia Lata）上，介於股骨大轉子與外髁的中點。單關節纖維是股外側肌（Vastus Lateralis），雙關節向量是闊筋膜張肌。\u003Cbr /\u003E治療的目標是恢復組織間的滑動，因此重點不在於觸及骨頭，而是要去感受闊筋膜粗糙的表面。我們熟知的髂脛束（IT Band）其實就是闊筋膜較厚實的部分，在解剖時幾乎無法將其單獨分離出來。請嘗試沿著縱向或斜向進行處理，感受組織的品質與粗糙程度。癥狀通常出現在膝蓋，但有時也會影響到髖部。\u003C/p\u003E\u003Cp\u003E在股骨大轉子與膝部髁（condylus）之間取中點，位置落在闊筋膜（fascia lata）之上，並對準髂脛束（IT band）的加厚加強帶。於此層次，我可找到 la-ge。\u003C/p\u003E\u003Cp\u003Ela-ge 將位於大轉子和股骨髁的中間。\u003Cbr /\u003E所以我們直接走到正中間，在闊筋膜上方，處於髂脛束（IT band）增厚的部位。\u003Cbr /\u003E在這個水平高度，我們將會找到 la-ge，就在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050504-la-ge-l1.jpeg\" alt=\"la-ge-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050509-la-ge-t1.jpeg\" alt=\"la-ge-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050514-la-ge-t2.jpeg\" alt=\"la-ge-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050518-la-ge-t3.jpeg\" alt=\"la-ge-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050523-la-ge-t4.jpeg\" alt=\"la-ge-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050529-la-ge-t5.jpeg\" alt=\"la-ge-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者抗阻進行內收用你的手頂住患者的小腿\u003Cbr /\u003E患者可能感覺膝蓋內側有疼痛\u003Cbr /\u003E然後讓患者做相反的方向的動作 向外側推\u003Cbr /\u003E患者可能會感覺膝蓋外側痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial（內側加壓外展）：我穩定患者，請其做外展並對抗我的阻力，通常會在膝內側邊緣出現疼痛。\u003C/li\u003E\u003Cli\u003ELateral（外側加壓內推）：我在踝部提供阻力，請患者向外側推，患者會在膝外側的張力處感到疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120605-move-ge-me.jpeg\" alt=\"move-ge-me\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120610-move-ge-la.jpeg\" alt=\"move-ge-la\" /\u003E\u003C/p\u003E"

    "question": "la-ta",
    "answer": "\u003Cp\u003Ela-ta\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：小腿中1/3，由第三腓骨肌單關節 + 伸趾長肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：小腿中段，感覺腓骨前方或上方肌肉\u003C/li\u003E\u003Cli\u003E臨床意義：腳踝問題，也可能引發膝痛\u003C/li\u003E\u003Cli\u003E推薦手法：縱向避開骨膜\u003C/li\u003E\u003Cli\u003E動作驗證：沿足外側緣行走\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點的單關節纖維是第三腓骨肌（Peroneus Tertius），雙關節肌是伸趾長肌（Extensor Digitorum Longus）。它大約位於小腿的中段三分之一處，有時會更高，介於近端與中段三分之一之間，目標是處理肌腱與肌肉交界處的上方。\u003Cbr /\u003E治療時必須盡力避免直接摩擦腓骨的骨膜。可以讓對方側躺，沿著縱向用手肘處理，有時可以區分兩條肌肉，有時則會同時處理到。這個點對於腳踝問題非常常見，但也可能引發膝蓋的問題。\u003C/p\u003E\u003Cp\u003E在小腿的中段三分之一範圍內，此點可能位於趾長伸肌（extensor digitorum longus，位於腓骨前方），或位於短腓骨肌（fibularis brevis，腓骨上方）。兩者皆可能呈現陽性觸診反應。為避免刺激或瘀傷骨膜（periosteum），我在此處必須沿肌纖維長軸方向進行處理。此即 la-ta。\u003C/p\u003E\u003Cp\u003Ela-ta 將位於小腿的中三分之一。\u003Cbr /\u003E它可能在趾長伸肌中，也就是正好在腓骨前方；或者它可能在腓骨短肌中，正好在腓骨上方。\u003Cbr /\u003E所以不論是哪一種，這個點都可能是陽性的。\u003Cbr /\u003E它必須進行縱向操作，以避免傷及骨膜。\u003Cbr /\u003E所以這是 la-ta。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050509-la-ta-l1.jpeg\" alt=\"la-ta-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050515-la-ta-t1.jpeg\" alt=\"la-ta-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050520-la-ta-t2.jpeg\" alt=\"la-ta-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050524-la-ta-t3.jpeg\" alt=\"la-ta-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050529-la-ta-t4.jpeg\" alt=\"la-ta-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E向內-向外 踝部 向外用足部外側緣行走\u003Cbr /\u003E向內用足部內側緣行走\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial／Lateral（邊緣行走）：Medial 為沿足內緣行走；Lateral 為沿足外緣行走。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120639-move-ta-la.jpeg\" alt=\"move-ta-la\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120646-move-ta-me.jpeg\" alt=\"move-ta-me\" /\u003E\u003C/p\u003E"

    "question": "la-pe",
    "answer": "\u003Cp\u003Ela-pe\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：第2-3或3-4蹠骨間近端，由背側骨間肌單關節 + 伸趾長肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：足背第2-3或3-4蹠骨間近端，感覺骨間空間阻力\u003C/li\u003E\u003Cli\u003E臨床意義：前足弓刺痛、莫頓氏神經瘤、足底痙攣\u003C/li\u003E\u003Cli\u003E推薦手法：指節尖端縱向深入\u003C/li\u003E\u003Cli\u003E動作驗證：擠壓足弓前段，檢查疼痛或抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於第二與第三、以及第三與第四蹠骨之間。單關節纖維是背側骨間肌（Dorsal Interosseous Muscle），雙關節向量是伸趾長肌。\u003Cbr /\u003E您需要盡可能深入這兩個蹠骨間的空隙。雖然這裡的空間不像「足前點」（Antepes）那麼大，無法深入到同樣的程度，但還是要嘗試用指節的尖端，沿著縱向進行處理。請注意使用指節的方向，確保能輕易地停留在骨頭之間，避免造成骨膜的瘀傷。這個點對於前足弓的刺痛、類似莫頓氏神經瘤（Morton&#39;s Neuroma）的癥狀、腳趾麻木以及足底區域的痙攣都很常見\u003C/p\u003E\u003Cp\u003E在足背，我於第二、第三蹠骨之間或第三、第四蹠骨之間，盡量靠近近端處尋找此點。在空間受限的情況下，其實在較近端層次就可以找到 la-pe。我傾向選擇第二、第三蹠骨之間，但第三、第四之間同樣可作為此點的選項。\u003C/p\u003E\u003Cp\u003Ela-pe 將位於第二和第三蹠骨之間，或者在第三和第四蹠骨之間，盡可能靠近近端。\u003Cbr /\u003E在這種情況下空間沒有那麼大，所以光是在這個水平高度我們就能找到 la-pe。\u003Cbr /\u003E我會把它標在第二和第三蹠骨之間，但這個點也可以在第三和第四蹠骨之間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050507-la-pe-l1.jpeg\" alt=\"la-pe-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050522-la-pe-t1.jpeg\" alt=\"la-pe-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050533-la-pe-t2.jpeg\" alt=\"la-pe-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者擡起腳掌\u003Cbr /\u003E用手擠壓患者的腳掌\u003Cbr /\u003E檢查足弓前半部分有無疼痛或是抽筋\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（足弓前段擠壓）：我請患者放鬆，擠壓足部以檢查終末感；若在足弓前段出現銳痛即為陽性。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010658-move-pe-la.jpeg\" alt=\"move-pe-la\" /\u003E\u003C/p\u003E"

    "question": "la-sc",
    "answer": "\u003Cp\u003Ela-sc\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：後斜角肌與斜方肌上緣交會處（頸根部），包含肩胛舌骨肌單關節 + 斜方肌雙關節\u003C/li\u003E\u003Cli\u003E如何找到：頸根部同時接近後斜角肌與斜方肌上緣，\u003Cmark\u003E目標結構是斜方肌\u003C/mark\u003E，但在其下方會感覺到另一條如繩索般的後斜角肌。\u003C/li\u003E\u003Cli\u003E臨床意義：頭痛、偏頭痛、肩膀與頸痛（非常常見）\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E對方坐椅，單手托側頭，手肘放床邊向斜前方，企係佢背後，用肘打橫摔\u003C/mark\u003E，不要向前摔，因為前面方有臂神經叢。\u003C/li\u003E\u003Cli\u003E動作驗證：手臂舉過150度向下抗阻，檢查無力或疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點包含由肩胛舌骨肌（Omohyoid）組成的單關節部分，以及由斜方肌組成的雙關節部分。當兩者交會時，即為此點。在處理時，您也會感覺到下方的後斜角肌（Scalenus Posterior）。\u003Cbr /\u003E您的目標結構是斜方肌，但在其下方會感覺到另一條如繩索般的後斜角肌，而肩胛舌骨肌則從更深處穿過。不過，您可以將斜方肌和後斜角肌作為定位的標誌。建議以縱向或微斜向進行處理。請避免向前傾倒，因為下方有臂神經叢（Brachial Plexus）。由於此區可能相當僵硬，推薦使用手肘。用指節可以輕易觸診，有此問題的人通常會有頭痛、偏頭痛、肩膀問題及頸部疼痛，是相當常見的點。\u003C/p\u003E\u003Cp\u003E我在頸部基底處，同時接近斜角肌後束（scalenus posterior）與斜方肌上緣進行接觸，兩者交會的區域即為 lla-sc；因此我會從頸根部入手，著重於斜角肌後束的層次進行定位。\u003C/p\u003E\u003Cp\u003Ela-sc 將位於後斜角肌以及斜方肌的上緣。\u003Cbr /\u003E所以我們想在脖子根部同時接近這兩者。\u003Cbr /\u003E所以 la-sc 將會在這裡，處於後斜角肌的水平高度。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050530-la-sc-l1.jpeg\" alt=\"la-sc-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050535-la-sc-t1.jpeg\" alt=\"la-sc-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050540-la-sc-t2.jpeg\" alt=\"la-sc-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050545-la-sc-t3.jpeg\" alt=\"la-sc-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050550-la-sc-t4.jpeg\" alt=\"la-sc-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E要求患者将手臂举起150°\u003Cbr /\u003E激活斜方肌以及后斜角肌\u003Cbr /\u003E将手臂向下压\u003Cbr /\u003E患者抗阻\u003Cbr /\u003E如果患者此处有问题 可能会无力或是疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（手臂過 150 度）：我請患者將手臂抬過 150 度以活化斜方肌與後斜角肌；我向下推手臂，若患者無法維持，代表外側肩胛測試陽性，有無力或疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010658-move-sc-la.jpeg\" alt=\"move-sc-la\" /\u003E\u003C/p\u003E"

    "question": "la-hu",
    "answer": "\u003Cp\u003Ela-hu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：肩峰下方、肱二頭肌長頭後方（中三角肌前少少），由三角肌側部單關節 + 肱二頭肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：肩峰弓下方、肱二頭肌長頭後方\u003C/li\u003E\u003Cli\u003E臨床意義：手臂上舉90度時針刺感：當覆蓋溝槽的膠原纖維過於僵硬，摩擦到結節或肱二頭肌長頭肌腱時所產生的刺痛。\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E對方側躺，雙腳曲膝45度，上手手心在大腿外側，自己前臂在他手臂外側上，另一隻手用手肘在二頭長頭後上下摔，用第一隻手指縫幫助固定防止移位。\u003C/mark\u003E肘縱向穿過三角肌，有時需要相當深，才能觸及固定肌腱於溝槽內的膠原纖維。\u003C/li\u003E\u003Cli\u003E動作驗證：手臂外展低於90度抗阻，檢查疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於肩峰下方，肱二頭肌長頭肌腱或三角肌側部的後方。單關節部分是三角肌側部（Deltoid Lateral Part），雙關節部分是肱二頭肌（Biceps Brachii）。\u003Cbr /\u003E治療時，應在肱二頭肌長頭的後方進行輕微的縱向處理。您需要將指節或手肘深入三角肌的肌束之間，有時需要相當深，才能觸及固定肌腱於溝槽內的膠原纖維。一個典型的癥狀是：當手臂上舉至九十度時，會感覺到一陣針刺感，然後消失。這個微小的刺痛感，正是處理此點的重要原因。需要說明的是，這並非所有肩膀問題的根源，它主要針對這個特定的癥狀，也就是當覆蓋溝槽的膠原纖維過於僵硬，摩擦到結節或肱二頭肌長頭肌腱時所產生的刺痛。由於需要穿過三角肌，通常必須使用手肘進行處理。\u003C/p\u003E\u003Cp\u003E我先辨識肩峰弧（acromion arch）的位置，再概略定位肱二頭肌長頭（long head of biceps）的走向。操作時，我會維持在肩峰弧下方、並位於肱二頭肌長頭的後方，沿著三角肌（deltoid）纖維的長軸進行縱向處理。此處即是 la-hu。\u003C/p\u003E\u003Cp\u003Ela-hu，我們找到肩峰弓。\u003Cbr /\u003E我們大概找出肱二頭肌長頭所在的位置。\u003Cbr /\u003E我們想保持在肩峰弓下方，且在肱二頭肌長頭的後方。\u003Cbr /\u003E我們想在三角肌纖維之間進行縱向操作。\u003Cbr /\u003E這裡我們有 la-hu。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050535-la-hu-l1.jpeg\" alt=\"la-hu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050540-la-hu-t1.jpeg\" alt=\"la-hu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050544-la-hu-t2.jpeg\" alt=\"la-hu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050549-la-hu-t3.jpeg\" alt=\"la-hu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050553-la-hu-t4.jpeg\" alt=\"la-hu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者擡起手臂小於90°\u003Cbr /\u003E在患者的上臂抗阻 檢查是否有疼痛\u003Cbr /\u003E對抗我們的阻力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（低於 90 度外展抗阻）：我在肘上方施加阻力，請患者維持手臂外展低於 90 度以對抗。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010627-move-hu-la.jpeg\" alt=\"move-hu-la\" /\u003E\u003C/p\u003E"

    "question": "la-cu",
    "answer": "\u003Cp\u003Ela-cu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：臂部外側肌間隔末端，肱橈肌在肌間隔的起點\u003C/li\u003E\u003Cli\u003E如何找到：臂肌間隔末端，感覺索狀結構即是\u003C/li\u003E\u003Cli\u003E臨床意義：手肘疼痛，也影響肩膀\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E躺，少曲肘，掌心貼在 an-me-lu 處，一隻手捉住對方手腕，另一隻手用手肘或指節縱向摔。\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：直手，手心向前，外展45度，，我一手搭對方對側肩膀，另一隻手在對方手腕上，叫對方拇指朝上外展抗阻，檢查肘外側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於肱橈肌（Brachioradialis）在肌間膈（Intermuscular Septum）的起點。這個位置常有解剖學上的變異，有時肱橈肌的起點非常高，甚至與三角肌融合；有時則會有一些膠原纖維。此處的單關節肌是肱橈肌，雙關節肌是橈側伸腕長肌（Extensor Carpi Radialis Longus）。\u003Cbr /\u003E請沿著此區域進行縱向處理。您可能會感覺到一條肌束在滑動，這代表有問題存在。持續處理後，它會變得比較柔軟。典型的癥狀是手肘疼痛，但有時也會影響到肩膀。\u003C/p\u003E\u003Cp\u003E在肘部，我尋找肱橈肌（brachioradialis）的起始端，該處位於臂部肌間隔（intermuscular septum）的末端。當我摸到像「索狀」的結構，即肱橈肌的起源處時，便確認此點為 la-cu。\u003C/p\u003E\u003Cp\u003Ela-cu 位於肌間隔的末端，在肱橈肌的起點處。\u003Cbr /\u003E所以，我們想感覺到這條索狀物，這正是肱橈肌的起點。\u003Cbr /\u003E那個區域就是我們所說的 la-cu。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050535-la-cu-l1.jpeg\" alt=\"la-cu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050544-la-cu-t1.jpeg\" alt=\"la-cu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050549-la-cu-t2.jpeg\" alt=\"la-cu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050554-la-cu-t3.jpeg\" alt=\"la-cu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050558-la-cu-t4.jpeg\" alt=\"la-cu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E患者手臂外展 在手腕處抗阻\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（拇指朝上抗阻）：我請患者拇指朝上維持姿勢，在手腕處施加阻力，觀察肘外側疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010621-move-cu-la.jpeg\" alt=\"move-cu-la\" /\u003E\u003C/p\u003E"

    "question": "la-ca",
    "answer": "\u003Cp\u003Ela-ca\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：前臂近端1/3段正中（前臂分六段的話，近手肘方向的1/6位置）、肱橈肌後緣（肱橈肌與橈側伸腕肌之間），由橈側伸腕短肌單關節 + 橈側伸腕長肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：前臂近端1/3正中，肱橈肌後緣\u003C/li\u003E\u003Cli\u003E臨床意義：手腕痛與手肘痛\u003C/li\u003E\u003Cli\u003E推薦手法：躺的話掌心向天，一隻手固定手腕，另一隻手指節縱向摔；\u003Cmark\u003E側躺的話上手掌心血前，前臂橈側向天，前臂尺側中段掂自己骨盤外側，自己一隻手固定對方手腕，另一隻手垂直手肘縱向摔。\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：90度曲肘，上臂貼身體，前臂手心向天花板，手指指前，自己一隻手托佢前臂中段內側，另一隻手在對方第二掌骨外，叫對方抗阻做純橈偏\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個區域非常敏感，疼痛感可能十分尖銳。我們治療的目標是單關節的橈側伸腕短肌（Extensor Carpi Radialis Brevis）與雙關節的橈側伸腕長肌。此點大約在前臂近端三分之一的中點，基本上是在肱橈肌與橈側伸腕肌之間，也就是肱橈肌的後緣。\u003Cbr /\u003E請沿著此區域縱向處理，並確保不要滑到前臂的後側區域。可以讓對方側躺或仰臥，手腕稍微旋前。這個點有時很難處理，因為肌肉會大幅移動，所以需要透過手腕的尺側偏移來穩定它。典型的癥狀是手腕疼痛，但也會引發手肘疼痛。\u003C/p\u003E\u003Cp\u003E在前臂近端三分之一、正中線附近，我以肱橈肌後緣作為定位標記。在該後緣區域，即可找到 la-ca。\u003C/p\u003E\u003Cp\u003Ela-ca，我們將會位於前臂的近端三分之一，正好在正中間。\u003Cbr /\u003E所以，在肱橈肌的後緣，我們將會有 la-ca。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050558-la-ca-l1.jpeg\" alt=\"la-ca-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050539-la-ca-t1.jpeg\" alt=\"la-ca-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050545-la-ca-t2.jpeg\" alt=\"la-ca-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050550-la-ca-t3.jpeg\" alt=\"la-ca-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050554-la-ca-t4.jpeg\" alt=\"la-ca-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050500-la-ca-t5.jpeg\" alt=\"la-ca-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050505-la-ca-t6.jpeg\" alt=\"la-ca-     "question": "la-di",
    "answer": "\u003Cp\u003Ela-di\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：第2掌骨近端1/3內側、骨間肌，由第一骨間肌單關節 + 橈側伸腕肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：合谷向手指方向多少少，\u003Cmark\u003E第二掌骨骨膜，靠近1 2 指掌間肌的第二指掌間肌\u003C/mark\u003E，掌骨近端內側，沿骨間肌感覺縱向結構\u003C/li\u003E\u003Cli\u003E臨床意義：手部抽筋、食指疼痛、板機指\u003C/li\u003E\u003Cli\u003E推薦手法：對方躺，手指方向同腳平行，掌心向內，自己一隻手捉住佢手腕，另一隻垂直深入平行手掌用指節摔，對方會感覺到一股針刺感穿過整隻手。\u003C/li\u003E\u003Cli\u003E動作驗證：對方90度手，手指2345指前，掌心向內，拇指指上，自己向下按對方食指，檢查魚際抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點的單關節纖維是第一骨間肌（First Interosseous），雙關節向量是橈側伸腕肌（Extensor Carpi Radialis）。它位於第二掌骨的近端三分之一、靠手掌側的側面。\u003Cbr /\u003E處理方向是縱向的，位置與傳統穴位略有不同，稍微偏向內側。您需要順著與手掌平行的方向，垂直深入。對方會感覺到一股針刺感穿過整隻手。這個點對於手部抽筋、第二指疼痛，甚至是板機指等癥狀都非常常見。\u003C/p\u003E\u003Cp\u003E在手部，我於第二蹠骨近端、靠內側的位置尋找此點，位置在掌間骨（interosseous）近端之前，並需沿肌纖維長軸進行操作。我在此處標示為 la-di 。\u003C/p\u003E\u003Cp\u003Ela-di 將位於第二掌骨的內側，在骨間肌的近端，進行縱向操作。\u003Cbr /\u003E所以這是 la-di 。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050502-la-di-l1.jpeg\" alt=\"la-di-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050510-la-di-t1.jpeg\" alt=\"la-di-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531050515-la-di-t2.jpeg\" alt=\"la-di-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E患者抗阻張開五指 檢查肌力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral（拇指外側壓力）：我請患者伸直手、擡起拇指，於拇指外側（靠近指甲側）施加壓力；患者在魚際（thenar eminence）可能出現抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010603-move-di-la.jpeg\" alt=\"move-di-la\" /\u003E\u003C/p\u003E"

    "question": "ir-cp1",
    "answer": "\u003Cp\u003Eir-cp1\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：眉毛正下方眼眶上緣（滑車位置）\u003C/li\u003E\u003Cli\u003E如何找到：眉毛下方沿骨性邊界向上推壓，感覺阻力處即是\u003C/li\u003E\u003Cli\u003E臨床意義：頭痛、功能性斜視\u003C/li\u003E\u003Cli\u003E推薦手法：躺，一隻手護額頭，另一隻手在眉毛外下指腹外下向內上推上推向骨下緣（眼眶外側操作）\u003C/li\u003E\u003Cli\u003E動作驗證：自己手指在\u003Cmark\u003E外下回到中間\u003C/mark\u003E，檢查雙眼同步性\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位基本上位於眼眶的上緣，也就是滑車（trochlea）的位置。操作時，我們要在眉毛正下方施作，目的是要確認眶上肌（supraorbital muscle）是否有異常。請用指尖向上推，但要小心避免對眼睛造成瘀傷。\u003Cbr /\u003E手法上，請保持在眼眶的外側操作，因為內側有另一條神經經過。我們要在眼眶上緣，向著上方的方向施力。這個點位對於處理頭痛和功能性斜視等典型癥狀非常重要\u003C/p\u003E\u003Cp\u003E此點位於眉毛下方。我以手指沿骨性邊界向上推壓，強調需「推向骨頭邊緣」的觸診方式，以找到精確位置。\u003C/p\u003E\u003Cp\u003Eir-cp1 位於眉毛下方。\u003Cbr /\u003E在這種情況下，你會想要貼著骨頭邊緣推動來進行觸診。\u003Cbr /\u003E所以你要往上推。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090511-ir-cp1-l1.jpeg\" alt=\"ir-cp1-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090518-ir-cp1-t1.jpeg\" alt=\"ir-cp1-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090537-ir-cp1-t2.jpeg\" alt=\"ir-cp1-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090543-ir-cp1-t3.jpeg\" alt=\"ir-cp1-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E患者隨著你的手指向下看\u003Cbr /\u003E然後回來\u003Cbr /\u003E如果你想的話\u003Cbr /\u003E你可以將手指靠近鼻尖同時檢查雙側\u003Cbr /\u003E然後手指拿回 檢查雙側的協同性\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra：患者向下追視後回到中線，必要時我會將手指靠近鼻樑再往外移，以同時檢查雙眼的同步性。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120643-move-ir-cp1a.jpeg\" alt=\"move-ir-cp1a\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120655-move-ir-cp1b.jpeg\" alt=\"move-ir-cp1b\" /\u003E\u003C/p\u003E"

    "question": "ir-cp2",
    "answer": "\u003Cp\u003Eir-cp2\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：耳前肌（耳朵正前方）\u003C/li\u003E\u003Cli\u003E如何找到：耳朵正前方，感覺小肌束或微小彈撥感即是\u003C/li\u003E\u003Cli\u003E臨床意義：耳朵內部、耳部、TMJ 放射痛\u003C/li\u003E\u003Cli\u003E推薦手法：指關節頂端精準處理\u003C/li\u003E\u003Cli\u003E動作驗證：握住耳朵向後推壓，檢查終末感與疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eir-cp2 指的是耳前肌（auricularis anterior）。這是一條位於耳朵前方的小肌肉，理論上負責將耳朵向前拉，但實際上它更像是一個帽狀腱膜（galea aponeurotica）的張力調節者。\u003Cbr /\u003E這個點非常小，要緊貼著耳朵尋找。當你感覺到一個微小的彈撥感時，就代表找到了。請不要和顳肌（temporalis）肌腱的前緣搞混了。施作時，建議使用指關節的頂端，因為這個點非常小，可能只有三毫米寬，而且感覺會非常銳利。此處的異常可能會引起耳朵內部、耳部或顳顎關節（TMJ）的放射性疼痛。\u003C/p\u003E\u003Cp\u003E此點對應耳前的前耳肌（auricularis anterior）。我在耳前觸摸到一個小的肌束，即為需要治療的點，位置明確在耳前小束上。\u003C/p\u003E\u003Cp\u003Eir-cp2 是耳前肌。\u003Cbr /\u003E所以就在耳朵正前方，你會感覺到一小束肌肉。\u003Cbr /\u003E那就是你必須治療的點，就在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090557-ir-cp2-l1.jpeg\" alt=\"ir-cp2-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090503-ir-cp2-t1.jpeg\" alt=\"ir-cp2-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090508-ir-cp2-t2.jpeg\" alt=\"ir-cp2-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090513-ir-cp2-t3.jpeg\" alt=\"ir-cp2-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090518-ir-cp2-t4.jpeg\" alt=\"ir-cp2-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E將耳朵向後擠壓\u003Cbr /\u003E把手放在這里 向後推耳朵\u003Cbr /\u003E看耳周肌群的緊張程度 以及有無疼痛、尖銳疼痛、僵硬感\u003Cbr /\u003E查看末端感覺 應該是左右對稱的\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（耳向後擠壓）：我以手握住患者耳朵，向後推以測試前耳肌（auricularis anterior）是否平順自由，並詢問是否有疼痛、刺痛或僵硬；同時檢查終末感（end feel）且比較兩側是否對稱。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100633-move-cp2-ir.jpeg\" alt=\"move-cp2-ir\" /\u003E\u003C/p\u003E"

    "question": "ir-cp3",
    "answer": "\u003Cp\u003Eir-cp3\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：下頜骨後方內側緣、內翼肌末端\u003C/li\u003E\u003Cli\u003E如何找到：\u003Cmark\u003E下頜骨末端到耳仔，骨後\u003C/mark\u003E，下頜骨垂直部分內側緣，盡量靠近耳朵處，\u003Cmark\u003E向鼻子方向推壓，也就是向前推，不要往內壓\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：TMJ 功能障礙、耳朵疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：整右邊時，頭轉左邊，企床頭，一隻手撐床一頂佢佢頭左邊，另一手指節直摔，指關節沿骨緣上下滑動，\u003Cmark\u003E朝鼻子方向施力\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：叫\u003Cmark\u003E對方下顎偏向一側後，一隻手放下顎線，另一隻手放對側顳肌位，抗阻回到中線\u003C/mark\u003E，檢查疼痛、抽筋或無力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E顱內點三的位置比較不好找，它位於下頷骨（mandible）的後方，靠近下頷骨的內側緣。最佳的施作方式是從後方往前推，施力方向要朝著鼻子，而不是朝向內側。\u003Cbr /\u003E你需要仔細感受翼下頷韌帶（pterygomandibularis）與內翼肌（medial pterygoid）延伸下來的筋膜，這才是真正的目標。試著在下頷骨的垂直部分，盡量靠近耳朵的地方，用指關節沿著骨緣上下（頭顱至尾椎方向）滑動，同時力量要朝向鼻子。這個點位對於處理顳顎關節功能障礙和耳朵疼痛非常常見。\u003C/p\u003E\u003Cp\u003E此點位於咬肌內側與下顎垂直支的內側緣，描述為「在 digodeo medialis 的末端」（原文指涉可能為咬肌／顎部相關內側結構）。我會到達能觸及的最高處，並以「向鼻側」的方向推壓；此外，定位上在腮腺（parotid gland）後方。\u003C/p\u003E\u003Cp\u003Eir-cp3 位於內翼肌（翼內肌）的末端。\u003Cbr /\u003E也就是在下頜骨垂直部分的內側緣。\u003Cbr /\u003E所以，你想要觸及你能達到的最高區域，並且你要朝著這個方向往鼻子的方向推。位於腮腺的後方。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090526-ir-cp3-l1.jpeg\" alt=\"ir-cp3-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090534-ir-cp3-t1.jpeg\" alt=\"ir-cp3-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090541-ir-cp3-t2.jpeg\" alt=\"ir-cp3-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090552-ir-cp3-t3.jpeg\" alt=\"ir-cp3-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E看下頜關節在抗組下能否回到中立位\u003Cbr /\u003E所以要求患者\u003Cbr /\u003E讓他將下頜向一側活動\u003Cbr /\u003E然後讓患者對抗你的手\u003Cbr /\u003E檢查是否有疼痛 抽筋 以及無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（下顎回中線抗阻）：我請患者將下顎偏向一側，我施加阻力，讓患者往回推以評估疼痛、抽筋或無力；雙側皆需測試。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100620-move-cp3-ir.jpeg\" alt=\"move-cp3-ir\" /\u003E\u003C/p\u003E"
  },

    "question": "ir-cl",
    "answer": "\u003Cp\u003Eir-cl\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：SCM 鎖骨端止點、鎖骨正上方，可摸到明顯肌束。\u003Cmark\u003E可以在兩條肌肉之間的凹陷處施作，但鎖骨末端是最關鍵的位置。\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E如何找到：沿鎖骨向上摸到 SCM 止點正上方，\u003Cmark\u003E感覺明顯纖維束即是該處\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：放射痛範圍廣（頸側甚至後側），並影響肩胛舌骨肌\u003C/li\u003E\u003Cli\u003E推薦手法：橫向手法：躺，一隻手固定額頭，另一隻手沿鎖骨用指節摔\u003C/li\u003E\u003Cli\u003E動作驗證：手心鎖定顴骨，請患者向後推回到中立位，檢查疼痛或無力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頸內點位於胸鎖乳突肌（SCM）末端與鎖骨的連接處。你可以在兩條肌肉之間的凹陷處施作，但鎖骨末端是最關鍵的位置。這個點位也會影響到肩胛舌骨肌（omohyoidus）。\u003Cbr /\u003E施作時建議用橫向的手法，你會感覺到此處的筋膜覆蓋了許多不同的結構。它所引起的放射痛範圍很廣，可能遍及頸部的側面，甚至是後側。\u003C/p\u003E\u003Cp\u003E此點在胸鎖乳突肌（SCM）鎖骨端的肌肉附著處，位於鎖骨上方。我能在此感覺到一個肌束，這就是需要處理的結構。\u003C/p\u003E\u003Cp\u003Eir-cl 將會位於胸鎖乳突肌（SCM）鎖骨端的止點處，就在鎖骨正上方。\u003Cbr /\u003E所以你會感覺到像是一個肌束。這就是你必須操作的結構。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090532-ir-cl-l1.jpeg\" alt=\"ir-cl-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090542-ir-cl-t1.jpeg\" alt=\"ir-cl-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090547-ir-cl-t2.jpeg\" alt=\"ir-cl-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090552-ir-cl-t3.jpeg\" alt=\"ir-cl-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E可以從剛才的姿勢開始 手放在顴骨上\u003Cbr /\u003E患者抗阻回到中立位 檢查疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（鎖定顴骨後推抗阻）：在上述姿勢下，我鎖定顴骨，讓患者往後推，檢查是否出現無力或疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100600-move-cl-ir.jpeg\" alt=\"move-cl-ir\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100607-move-cl-ir2.jpeg\" alt=\"move-cl-ir2\" /\u003E\u003C/p\u003E"
  },

    "answer": "\u003Cp\u003Eir-th\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：鎖骨中線或乳頭下方，\u003Cmark\u003E胸大肌下緣和腹外斜交界\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E如何找到：沿鎖骨或乳頭水平線，在胸大肌下緣第一個肋間找筋膜融合處\u003C/li\u003E\u003Cli\u003E臨床意義：胸部劇烈疼痛並上下放射\u003C/li\u003E\u003Cli\u003E推薦手法：躺，指關節橫向\u003C/li\u003E\u003Cli\u003E動作驗證：患者交叉手置頭後，自己一隻手穿過三角放在肩膀上固定肩膀，另一隻手放對側前臂近肘，叫對方向前頂\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E胸內點位於胸大肌（pectoral major）下緣的正下方，與鎖骨在同一條線上，低於乳頭。請在肋間隙中尋找，你會感覺到胸大肌的筋膜纖維與腹外斜肌（oblique muscle）融合在一起。\u003Cbr /\u003E在這個位置，使用指關節進行橫向施作，並保持在第一個可觸及的肋間隙。此處的疼痛可能非常劇烈，並且會向上或向下放射。\u003C/p\u003E\u003Cp\u003E此點可沿鎖骨或乳頭的水平線定位，位於胸大肌下方。我在胸大肌附著處，連接至斜腹肌的筋膜位置進行工作；治療點在此，並且「於肋骨間」操作。\u003C/p\u003E\u003Cp\u003Eir-th，你可以與鎖骨或乳頭保持在同一條線上，並停留在胸大肌的正下方。\u003Cbr /\u003E你想要在胸大肌附著於走向腹外斜肌的筋膜處進行操作。\u003Cbr /\u003E所以，這個點就在這裡，而你想要在肋骨之間進行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090529-ir-th-l1.jpeg\" alt=\"ir-th-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090539-ir-th-t1.jpeg\" alt=\"ir-th-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090546-ir-th-t2.jpeg\" alt=\"ir-th-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E患者雙手放在頭後\u003Cbr /\u003E讓患者頂住你的手\u003Cbr /\u003E看患者有無疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（雙手置頭後、上半身固定）：我固定患者上半身，請其向手部方向推以檢查肋骨層面的抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100654-move-th-ir.jpeg\" alt=\"move-th-ir\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100600-move-th-ir.jpeg\" alt=\"move-th-ir\" /\u003E\u003C/p\u003E"

    "question": "ir-lu",
    "answer": "\u003Cp\u003Eir-lu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：\u003Cmark\u003E第11肋尖端前方\u003C/mark\u003E、腹內斜肌與腹外斜肌交界（腹內斜肌邊緣）\u003C/li\u003E\u003Cli\u003E如何找到：先摸到第11肋，再往前方深壓到腹斜肌之間，感覺肌束即是\u003C/li\u003E\u003Cli\u003E臨床意義：下背痛、上背痛、頸痛、內臟問題，容易假陰性\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E側躺向自己，上腳在下腳後，手舉高上臂貼頭側\u003C/mark\u003E，自己一手護對方肩，一手用手肘\u003Cmark\u003E肋骨方向摔\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：對方交叉手手肘指斜下，讓患者先外旋，然後固定雙肩，對方抗阻向中線轉身看患者有無疼痛和無力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腰內點可能相當難找。它位於第十一根肋骨頭的正前方，基本上是腹內斜肌（obliquus internus）與腹外斜肌（obliquus externus）的交界處。雖然腹橫肌（transversal）在更深層，但我們的目標是腹內斜肌的邊緣。\u003Cbr /\u003E施作時，以第十一根肋骨作為地標，但不要壓迫到它。在肋骨前方，順著肋骨的方向施力，同時避免壓到肋骨或髂骨。這個點位很容易出現假陰性（false negative）的判斷，所以如果不確定，請用所有指尖仔細觸診，並進行雙側比較。你也可以讓患者側躺，直接用手肘來處理。腰內點對於許多下背痛、上背痛，甚至是頸部疼痛都非常重要，更不用說它對所有內臟問題的影響了。\u003C/p\u003E\u003Cp\u003E此點在第 11 肋尖端前方。我先辨識第 11 肋，再於外斜腹與內斜腹之間的層面進行觸診；此處可感覺到一個肌束，即為要處理的位置。\u003C/p\u003E\u003Cp\u003Eir-lu 位於第 11 肋骨尖端的前方。\u003Cbr /\u003E所以，我們確認出第 11 肋骨，而我們想要在腹外斜肌和腹內斜肌之間的表面進行操作。\u003Cbr /\u003E你將能夠在那裡感覺到像是一個肌束。\u003Cbr /\u003E所以，ir-lu 就會在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090529-ir-lu-l1.jpeg\" alt=\"ir-lu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090540-ir-lu-t1.jpeg\" alt=\"ir-lu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090546-ir-lu-t2.jpeg\" alt=\"ir-lu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090550-ir-lu-t3.jpeg\" alt=\"ir-lu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者轉身 你的手固定住患者的骨盆\u003Cbr /\u003E讓患者向後看\u003Cbr /\u003E你可以輕微的擠壓一下 看有無疼痛\u003C/p\u003E\u003Cp\u003E內旋的檢查\u003Cbr /\u003E讓患者抗阻向中線轉身\u003Cbr /\u003E看患者有無疼痛和無力\u003Cbr /\u003E對側同理\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（軀幹扭轉）：我以雙手固定胸前，固定骨盆後請患者做軀幹扭轉並「回頭看身後」，我可輕壓以檢查是否有特異性疼痛；在 Intra 測試中，我固定肩部，讓患者以阻力方式回到中線，評估疼痛、無力，並於對側重複。\u003C/li\u003E\u003C/ul\u003E\u003C!--![move-lu-ir-er1](https://github.com/piccture74/twpic/raw/master/images/20260601120639-move-lu-ir-er1.jpeg)![move-lu-ir-er2](https://github.com/piccture74/twpic/raw/master/images/20260601120648-move-lu-ir-er2.jpeg)![move-lu-ir-er3](https://github.com/piccture74/twpic/raw/master/images/20260601120655-move-lu-ir-er3.jpeg)--\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120602-move-lu-ir-er4.jpeg\" alt=\"move-lu-ir-er4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120613-move-lu-ir-er5.jpeg\" alt=\"move-lu-ir-er5\" /\u003E\u003C/p\u003E"

    "question": "ir-pv",
    "answer": "\u003Cp\u003Eir-pv\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：\u003Cmark\u003E腋中線大轉子的前方，TFL 後方\u003C/mark\u003E，目標為臀小肌\u003C/li\u003E\u003Cli\u003E如何找到：大轉子前方、髂脊下方闊筋膜張肌後方的凹陷處\u003C/li\u003E\u003Cli\u003E臨床意義：髖部深層疼痛、大腿內收肌區域疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E讓患者背自向己，將膝蓋向前彎曲，手肘尖端，方向平行 TFL，可以用另一隻手放在大轉子上或腰上，肘在拇指和食指中間摔防止走位\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：對方雙手放在你肩上，讓患者軀幹保持不動，大角度旋轉骨盆\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E骨盆內點位於臀小肌（gluteus minimus）。它在髂骨脊（iliac crest）下方，闊筋膜張肌（tensor fasciae latae）的後方。你會找到一個小凹陷，可以從這裡接觸到深層的臀中肌（gluteus medius），這才是真正的目標。\u003Cbr /\u003E一個簡單的處理方式是讓患者將膝蓋向前彎曲，這樣可以更容易地接觸到該點。雖然可以用指關節頂端施作，但我更推薦使用手肘的尖端，因為此處的筋膜可能非常深且僵硬。許多髖部深層疼痛、大腿內收肌區域的疼痛，都可能與這個點位有關。\u003C/p\u003E\u003Cp\u003E此點位於大轉子前方、腋中線位置，並在髂脊下方、闊筋膜張肌（tensor fasciae latae）後方。我在此找到一個「孔」（空隙），此空隙可使我到達臀小肌（gluteus minimus），這是此治療的目標\u003C/p\u003E\u003Cp\u003Eir-pv 將位於腋中線大轉子的前方，而我們將處於髂脊下方、闊筋膜張肌的後方。\u003Cbr /\u003E所以就在這裡，我們會發現一個凹陷。\u003Cbr /\u003E這個凹陷將能讓你觸及臀小肌，這就是本次治療的目標。\u003Cbr /\u003E所以是 ir-pv。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090554-ir-pv-l1.jpeg\" alt=\"ir-pv-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090500-ir-pv-t1.jpeg\" alt=\"ir-pv-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090506-ir-pv-t2.jpeg\" alt=\"ir-pv-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090511-ir-pv-t3.jpeg\" alt=\"ir-pv-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090515-ir-pv-t4.jpeg\" alt=\"ir-pv-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090521-ir-pv-t5.jpeg\" alt=\"ir-pv-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者固定肩膀\u003Cbr /\u003E雙手放在你肩上\u003Cbr /\u003E讓患者旋轉骨盆 盡量大的角度\u003Cbr /\u003E所以軀幹保持不動\u003Cbr /\u003E你可以用手提示他\u003Cbr /\u003E患者可能感覺有抽筋\u003C/p\u003E\u003Cp\u003E內旋-骨盆 我們先穩定住患者的骨盆\u003Cbr /\u003E然後讓患者抗阻回到中立位\u003Cbr /\u003E檢查有無疼痛和無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（骨盆扭轉）：我固定患者肩部避免軀幹代償，請其盡量扭轉骨盆；若患者於骨盆區域主訴不適，我記錄於相應分類。在 Intra 測試中，我穩定骨盆並請患者以阻力向後回位，觀察無力、疼痛等癥狀。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120607-move-pv-er.jpeg\" alt=\"move-pv-er\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120622-move-pv-er2.jpeg\" alt=\"move-pv-er2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120631-move-pv-ir.jpeg\" alt=\"move-pv-ir\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120636-move-pv-ir2.jpeg\" alt=\"move-pv-ir2\" /\u003E\u003C/p\u003E"

    "question": "ir-cx",
    "answer": "\u003Cp\u003Eir-cx\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：縫匠肌內側緣近中1/3\u003C/li\u003E\u003Cli\u003E如何找到：請患者被動內旋髖，感覺縫匠肌內側緣即是\u003C/li\u003E\u003Cli\u003E臨床意義：膝痛、髖痛、下背痛\u003C/li\u003E\u003Cli\u003E推薦手法：手肘縱向\u003C/li\u003E\u003Cli\u003E動作驗證：屈膝擡腿後被動內旋，檢查終末感\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E髖內點可能非常難找，但它非常重要。我們要處理的是縫匠肌（sartorius）的內側緣，大約在近端與中段三分之一處，或是整個中段三分之一的位置。內收長肌（adductor longus）和內收短肌（adductor brevis）也可能是目標的一部分。\u003Cbr /\u003E你必須感覺到縫匠肌，甚至可能觸及到股內側肌（vastus intermedius）。施作時要沿著脛骨方向，避免掉入由內收肌群構成的「內收肌三角區」（adductor triangle），因為那裡有重要的血管和神經。請務必保持在肌肉的邊緣操作。最好的方法是讓患者被動地內旋髖關節，使縫匠肌處於張力下，這樣更容易辨識和觸診。使用手肘沿著縫匠肌的邊緣縱向施作。這個點位對於改善膝蓋痛、髖部疼痛及下背痛有很好的效果。\u003C/p\u003E\u003Cp\u003E此點在縫匠肌（sartorius）內側緣，介於近端三分之一與中段三分之一之間，但也可能更遠至「中段附近」。我先觸到縫匠肌的邊緣，並在該區與闊筋膜（partial lata，原文指涉闊筋膜張肌/闊筋膜相關結構）一起處理。\u003C/p\u003E\u003Cp\u003Eir-cx 將位於縫匠肌的內側緣，處於近端和中三分之一之間，但它也可以稍微再遠一點，大約在中間位置。\u003Cbr /\u003E所以，你想要感覺到縫匠肌的邊緣，然後你將與闊筋膜（此處語誤說成 partial lata，實指 fascia lata）一起對該區域進行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090524-ir-cx-l1.jpeg\" alt=\"ir-cx-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090529-ir-cx-t1.jpeg\" alt=\"ir-cx-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090534-ir-cx-t2.jpeg\" alt=\"ir-cx-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090539-ir-cx-t3.jpeg\" alt=\"ir-cx-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090543-ir-cx-t4.jpeg\" alt=\"ir-cx-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090549-ir-cx-t6.jpeg\" alt=\"ir-cx-t6\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090555-ir-cx-t7.jpeg\" alt=\"ir-cx-t7\" /\u003E\u003C/p\u003E\u003Cp\u003E患者擡起膝蓋\u003Cbr /\u003E被動做一個髖部內旋\u003Cbr /\u003E檢查一下末端感覺\u003Cbr /\u003E對側同理\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra（內旋）：患者屈膝擡起後，我以被動方式內旋下肢，於雙側檢查終末感。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120621-move-cx-ir.jpeg\" alt=\"move-cx-ir\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eir-ge\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：股內側肌正中央\u003C/li\u003E\u003Cli\u003E如何找到：股內側肌正中心處\u003C/li\u003E\u003Cli\u003E臨床意義：張力向下傳至膝蓋，典型膝痛\u003C/li\u003E\u003Cli\u003E推薦手法：各方向施作，\u003Cmark\u003E躺時向外摔對側，一手撑床時頂住小腿上部，另一手肘斜外摔。側躺就向自自己，下腿曲90度，上腿曲45度，上腿膝頭掂下腿小腿肚，摔下腿\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：下肢三段式屈曲時內側疼痛是內旋-膝部，也可以把重心放在其中一側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E股內點相當容易找到。它位於股內側肌（vastus medialis）的正中央。你可以在肌肉中間向各個方向施作。這個區域的整個表面都與闊筋膜（fascia lata）完全融合，因此會有大量的張力向下傳遞至膝蓋。順帶一提，此處的典型疼痛也正好就出現在膝蓋。\u003C/p\u003E\u003Cp\u003E此點位於股內側肌（vastus medialis）的正中央。我辨識該肌肉，然後直達中心處，即可找到此點。\u003C/p\u003E\u003Cp\u003Eir-ge 就在股內側肌的正中心。\u003Cbr /\u003E所以你確認出這塊肌肉，直接走到正中心，你就會找到 intrajenual，就在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090549-ir-ge-l1.jpeg\" alt=\"ir-ge-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090554-ir-ge-t1.jpeg\" alt=\"ir-ge-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090559-ir-ge-3.jpeg\" alt=\"ir-ge-3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090504-ir-ge-t3.jpeg\" alt=\"ir-ge-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531090511-ir-ge-t4.jpeg\" alt=\"ir-ge-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E用一個深蹲的動作可以檢查膝部的水平面情況\u003Cbr /\u003E患者感覺疼痛\u003Cbr /\u003E外側膝蓋 是外旋-膝部\u003Cbr /\u003E內側疼痛是內旋-膝部\u003Cbr /\u003E然後讓患者將重量放在一側 另一側\u003Cbr /\u003E檢查是否有特殊的疼痛或無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EIntra／Extra（深蹲水平面評估）：透過完整深蹲，我能在水平面評估膝部問題；若疼痛在膝外側為 Extra，內側為 Intra。我亦可推動患者重心至一側，觀察是否出現特定疼痛或無力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120600-move-ge-ir-er.jpeg\" alt=\"move-ge-ir-er\" /\u003E\u003C/p\u003E"

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC 點練習</title>
    <style>
        :root{--primary:#4361ee;--primary-light:#4895ef;--secondary:#3f37c9;--bg:#f0f4ff;--card:#ffffff;--text:#212529;--err:#d00000;--warn:#e67700;--info:#1971c2;--mast:#5c3db8;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.7;color:var(--text);background:var(--bg);padding:0.5rem 0;}
        .container{max-width:100%;width:100%;padding:0;}
        h1{font-size:1.8rem;font-weight:700;color:var(--primary);text-align:center;margin:0.5rem 0;}
        .stats{display:flex;gap:0.2rem;margin:0.5rem 0;flex-wrap:nowrap;}
        .stat-item{background:var(--card);border-radius:8px;padding:0.4rem 0.15rem;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center;flex:1;}
        .stat-label{font-size:0.7rem;color:#6c757d;}
        .stat-value{font-size:1.25rem;font-weight:700;color:var(--primary);}
        .sv-new{color:var(--info);} .sv-due{color:var(--warn);} .sv-mast{color:var(--mast);}
        .prog-wrap{height:5px;background:#dee2e6;border-radius:3px;margin:0.3rem 0;overflow:hidden;}
        .prog-bar{height:100%;background:linear-gradient(90deg,var(--primary),#7048e8);border-radius:3px;transition:width .5s ease;width:0%;}
        .btn{background:var(--primary);color:#fff;border:none;padding:0.6rem 0.9rem;border-radius:6px;cursor:pointer;font-size:0.95rem;font-weight:500;transition:background .2s,transform .15s;}
        .btn:hover{background:var(--secondary);transform:translateY(-1px);}
        .btn:active{transform:translateY(0);}
        .btn-err{background:var(--err);}.btn-err:hover{background:#b00000;}
        .btn-sec{background:#6c757d;}.btn-sec:hover{background:#5a6268;}
        .btn-sm{padding:0.35rem 0.6rem;font-size:0.82rem;}
        .mode-row{display:flex;gap:0.35rem;margin:0.5rem 0;}
        .mode-btn{flex:1;padding:0.55rem 0.5rem;border-radius:6px;border:2px solid transparent;background:#e9ecef;color:#495057;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
        .mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(67,97,238,.35);}
        .mode-btn:not(.active):hover{background:#dee2e6;}
        .controls{display:flex;gap:0.2rem;margin:0.5rem 0;}
        .controls .btn{flex:1;white-space:nowrap;min-width:0;text-align:center;padding:0.6rem 0.3rem;}
        .filter-row{display:flex;gap:0.35rem;margin:0.5rem 0;align-items:stretch;}
        .filter-row .btn{flex-shrink:0;white-space:nowrap;}
        .filter-input{flex:1;min-width:0;padding:0.55rem 0.75rem;border-radius:6px;border:1px solid rgba(67,97,238,.35);font-size:0.93rem;font-family:Menlo,Monaco,Consolas,monospace;background:#fff;color:var(--text);}
        .filter-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(67,97,238,.18);}
        .filter-input::placeholder{font-family:"Noto Sans TC",-apple-system,sans-serif;color:#aaa;}
        .question-box{background:var(--card);border-radius:10px;padding:0.85rem 0.25rem;margin:0.5rem 0;box-shadow:0 2px 8px rgba(0,0,0,.07);}
        .question{font-size:1.35rem;font-weight:600;color:var(--primary);margin-bottom:0.6rem;}
        .question img,.answer-content img,.question-text img,.question-answer img{max-width:100%;height:auto;display:block;margin:0.5rem 0;border-radius:6px;}
        .srs-info{display:none;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.55rem;}
        .srs-badge{display:inline-flex;align-items:center;gap:0.2rem;font-size:0.73rem;padding:2px 9px;border-radius:10px;font-weight:700;letter-spacing:.3px;}
        .st-new{background:rgba(25,113,194,.12);color:var(--info);}
        .st-due{background:rgba(230,119,0,.13);color:var(--warn);}
        .st-upcoming{background:rgba(56,176,0,.12);color:#2b8a00;}
        .st-mastered{background:rgba(92,61,184,.12);color:var(--mast);}
        .srs-meta{font-size:0.71rem;color:#868e96;}
        .show-ans-wrap{text-align:center;margin:0.5rem 0;}
        .answer-content{display:none;background:rgba(67,97,238,.08);border-left:4px solid var(--primary);padding:0.6rem 0.5rem;border-radius:0 8px 8px 0;margin-top:0.6rem;}
        .answer-content.show{display:block;}
        .answer-content ul,.answer-content ol{padding-left:1.4rem;}
        .answer-content li{margin-bottom:0.4rem;}
        .answer-content p{margin-bottom:0.5rem;}
        .answer-content p:last-child{margin-bottom:0;}
        .rating-wrap{display:none;margin-top:0.8rem;}
        .rating-wrap.show{display:block;}
        .rating-label{font-size:0.75rem;color:#868e96;text-align:center;margin-bottom:0.5rem;line-height:1.5;}
        .rating-label strong{color:#495057;}
        .rating-row{display:flex;gap:0.3rem;}
        .r-btn{flex:1;min-width:0;padding:0.6rem 0.15rem;border:none;border-radius:9px;cursor:pointer;color:#fff;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:0 2px 8px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s,filter .15s;}
        .r-btn:hover{transform:translateY(-3px);box-shadow:0 5px 14px rgba(0,0,0,.22);}
        .r-btn:active{transform:translateY(0);filter:brightness(.88);}
        .r-again{background:linear-gradient(150deg,#e03131,#c92a2a);}
        .r-hard{background:linear-gradient(150deg,#e67700,#d9480f);}
        .r-good{background:linear-gradient(150deg,#2f9e44,#2b8a3e);}
        .r-easy{background:linear-gradient(150deg,#1971c2,#1864ab);}
        .r-icon{font-size:1.15rem;}
        .r-text{font-size:0.88rem;}
        .r-hint{font-size:0.67rem;font-weight:600;opacity:.92;background:rgba(255,255,255,.2);padding:1px 6px;border-radius:4px;white-space:nowrap;letter-spacing:.2px;}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:flex-start;padding:1rem 0;overflow-y:auto;}
        .modal.open{display:flex;}
        .modal-content{background:var(--card);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.2);padding:1rem 0.4rem;max-width:100%;width:100%;}
        .modal-title{font-size:1.3rem;font-weight:700;color:var(--primary);text-align:center;margin-bottom:0.6rem;}
        .modal-buttons{display:flex;justify-content:center;gap:0.75rem;margin-top:1rem;flex-wrap:wrap;}
        .modal-search-row{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.65rem;}
        .modal-search-group{display:flex;flex-direction:column;gap:0.2rem;}
        .modal-search-label{font-size:0.72rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#868e96;margin-bottom:0.15rem;}
        .modal-search{width:100%;padding:0.48rem 0.75rem;border-radius:6px;border:1px solid rgba(67,97,238,.25);font-size:0.88rem;background:#f8f9ff;color:var(--text);transition:border-color .2s,box-shadow .2s;}
        .modal-search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(67,97,238,.15);background:#fff;}
        .no-results{text-align:center;color:#adb5bd;font-size:0.9rem;padding:1.2rem 0;}
        .q-count{font-weight:700;margin-bottom:0.6rem;text-align:center;}
        .q-count.cd{color:var(--warn);} .q-count.cm{color:var(--mast);} .q-count.ca{color:var(--primary);}
        .question-list{display:flex;flex-direction:column;gap:0.5rem;}
        .question-item{background:rgba(67,97,238,.05);border-left:4px solid var(--primary);padding:0.6rem 0.4rem;border-radius:0 8px 8px 0;font-size:0.93rem;}
        .question-item.is-mast{border-color:var(--mast);background:rgba(92,61,184,.05);}
        .question-header{display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;flex-wrap:wrap;}
        .question-text{flex:1;font-weight:500;}
        .srs-mini{font-size:0.69rem;color:#868e96;margin-top:3px;}
        .question-answer{display:none;margin-top:0.6rem;padding:0.6rem 0.4rem;background:rgba(255,255,255,.9);border-radius:5px;border:1px solid rgba(67,97,238,.2);}
        .question-answer.show{display:block;}
        .question-answer ul,.question-answer ol{margin:0;padding-left:1.4rem;}
        .question-answer li{margin-bottom:0.4rem;}
        .question-answer p{margin-bottom:0.5rem;}
        .question-answer p:last-child{margin-bottom:0;}
        h4{font-size:1.0rem;font-weight:700;color:var(--secondary);margin:0.85rem 0 0.3rem;padding-bottom:0.18rem;border-bottom:1px solid rgba(67,97,238,.2);}
        h5{font-size:0.95rem;font-weight:700;color:var(--primary);margin:0.65rem 0 0.25rem;}
        h6{font-size:0.88rem;font-weight:600;color:#555;margin:0.5rem 0 0.2rem;}
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0.65rem 0;border-radius:6px;}
        table{width:100%;border-collapse:collapse;font-size:0.88rem;min-width:260px;}
        thead tr{background:rgba(67,97,238,.13);}
        th{padding:0.45rem 0.6rem;text-align:left;font-weight:700;color:var(--primary);border:1px solid rgba(67,97,238,.25);white-space:nowrap;}
        td{padding:0.42rem 0.6rem;border:1px solid rgba(67,97,238,.15);vertical-align:top;}
        tr:nth-child(even) td{background:rgba(67,97,238,.04);}
        pre{background:#f4f6ff;border-radius:6px;padding:0.7rem 0.85rem;overflow-x:auto;margin:0.55rem 0;border:1px solid rgba(67,97,238,.14);font-size:0.85rem;}
        code{font-family:Menlo,Monaco,Consolas,monospace;font-size:0.87em;background:rgba(67,97,238,.09);padding:1px 5px;border-radius:3px;}
        pre code{background:transparent;padding:0;font-size:inherit;}
        blockquote{border-left:3px solid var(--primary-light);margin:0.55rem 0;padding:0.45rem 0.85rem;background:rgba(67,97,238,.05);border-radius:0 6px 6px 0;color:#444;}
        blockquote p{margin:0;}
        mark{background:rgba(255,214,0,.45);color:inherit;padding:0 3px;border-radius:3px;font-style:normal;}
        @media(max-width:600px){h1{font-size:1.3rem;}.stat-label{font-size:0.62rem;}.stat-value{font-size:1rem;}.stat-item{padding:0.3rem 0.1rem;}.question{font-size:1.05rem;}.btn{padding:0.5rem 0.55rem;font-size:0.82rem;}.controls{flex-wrap:wrap;}.controls .btn{flex:1 1 calc(50% - 0.1rem);min-width:0;}.r-icon{font-size:.95rem;}.r-text{font-size:.75rem;}.r-hint{font-size:.6rem;}th,td{padding:0.35rem 0.4rem;font-size:0.82rem;}.modal-search-row{grid-template-columns:1fr;}}
    </style>
</head>
<body>
<div class="container">
    <h1>CC 點練習</h1>
    <div class="stats">
        <div class="stat-item"><div class="stat-label">總題數</div><div id="totalCount" class="stat-value">0</div></div>
        <div class="stat-item"><div class="stat-label">新卡片</div><div id="newCount" class="stat-value sv-new">0</div></div>
        <div class="stat-item"><div class="stat-label">今日到期</div><div id="dueCount" class="stat-value sv-due">0</div></div>
        <div class="stat-item"><div class="stat-label">已掌握</div><div id="mastCount" class="stat-value sv-mast">0</div></div>
    </div>
    <div class="prog-wrap"><div id="progBar" class="prog-bar"></div></div>
    <div class="filter-row">
        <input type="text" id="filterInput" class="filter-input" placeholder="Regex 篩選題目（例如 ^什麼 | keyword）…">
        <button id="filterBtn" class="btn">篩選</button>
        <button id="clearFilterBtn" class="btn btn-sec">清除篩選</button>
    </div>
    <div class="mode-row">
        <button id="modeRndBtn" class="mode-btn">🎲 隨機練習</button>
        <button id="modeSrsBtn" class="mode-btn active">📅 間隔複習（SM-2）</button>
    </div>
    <div class="controls">
        <button id="resetBtn" class="btn">重設進度</button>
        <button id="showAllBtn" class="btn btn-sec">查看全部題目</button>
        <button id="showDueBtn" class="btn btn-sec">查看到期題目</button>
        <button id="showMastBtn" class="btn btn-sec">查看已掌握</button>
    </div>
    <div class="question-box">
        <div id="srsInfo" class="srs-info"></div>
        <div id="question" class="question"></div>
        <div id="showAnsWrap" class="show-ans-wrap" style="display:none">
            <button id="showAnsBtn" class="btn">顯示答案</button>
        </div>
        <div id="answerContent" class="answer-content"></div>
        <div id="ratingWrap" class="rating-wrap">
            <div class="rating-label"><strong>評估此題難度</strong> -- 系統將依 SM-2 間隔重複算法安排下次複習時間</div>
            <div class="rating-row">
                <button class="r-btn r-again" data-q="1"><span class="r-icon">🔴</span><span class="r-text">再學</span><span class="r-hint" id="hint-1">重學</span></button>
                <button class="r-btn r-hard"  data-q="3"><span class="r-icon">🟠</span><span class="r-text">困難</span><span class="r-hint" id="hint-3">--</span></button>
                <button class="r-btn r-good"  data-q="4"><span class="r-icon">🟢</span><span class="r-text">良好</span><span class="r-hint" id="hint-4">--</span></button>
                <button class="r-btn r-easy"  data-q="5"><span class="r-icon">⭐</span><span class="r-text">容易</span><span class="r-hint" id="hint-5">--</span></button>
            </div>
        </div>
    </div>
</div>

<div id="resetModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">確定要重設？</div>
        <p style="text-align:center;margin-bottom:.5rem">這將清除所有 SM-2 學習進度（間隔、複習次數、難度係數），此操作<strong>無法撤銷</strong>。</p>
        <div class="modal-buttons"><button id="confirmResetBtn" class="btn btn-err">確定重設</button><button id="cancelResetBtn" class="btn">取消</button></div>
    </div>
</div>

<div id="allModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">全部題目</div>
        <div class="modal-search-row">
            <div class="modal-search-group"><div class="modal-search-label">🔍 題目關鍵字</div><input type="text" id="allQSearch" class="modal-search" placeholder="搜尋題目…"></div>
            <div class="modal-search-group"><div class="modal-search-label">🔍 答案關鍵字</div><input type="text" id="allASearch" class="modal-search" placeholder="搜尋答案…"></div>
        </div>
        <div id="allCount2" class="q-count ca"></div>
        <div id="allList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeAllBtn" class="btn">關閉</button></div>
    </div>
</div>

<div id="dueModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">今日待學題目</div>
        <div class="modal-search-row">
            <div class="modal-search-group"><div class="modal-search-label">🔍 題目關鍵字</div><input type="text" id="dueQSearch" class="modal-search" placeholder="搜尋題目…"></div>
            <div class="modal-search-group"><div class="modal-search-label">🔍 答案關鍵字</div><input type="text" id="dueASearch" class="modal-search" placeholder="搜尋答案…"></div>
        </div>
        <div id="dueCount2" class="q-count cd"></div>
        <div id="dueList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeDueBtn" class="btn">關閉</button></div>
    </div>
</div>

<div id="mastModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">已掌握題目</div>
        <div class="modal-search-row">
            <div class="modal-search-group"><div class="modal-search-label">🔍 題目關鍵字</div><input type="text" id="mastQSearch" class="modal-search" placeholder="搜尋題目…"></div>
            <div class="modal-search-group"><div class="modal-search-label">🔍 答案關鍵字</div><input type="text" id="mastASearch" class="modal-search" placeholder="搜尋答案…"></div>
        </div>
        <div id="mastCount2" class="q-count cm"></div>
        <div id="mastList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeMastBtn" class="btn">關閉</button></div>
    </div>
</div>

<script>
var qaData=[
  {
    "question": "an-cp1",
    "answer": "\u003Cp\u003Ean-cp1\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：瞳孔正下方、眼輪匝肌之上，由單關節下直肌 + 雙關節眼輪匝肌匯聚於特農氏筋膜\u003C/li\u003E\u003Cli\u003E如何找到：瞳孔正下方約1指寬處，按住眼輪匝肌輕輕滑動，感覺輕微阻力或小條索即是\u003C/li\u003E\u003Cli\u003E臨床意義：眼睛內部／眼後痛、偏頭痛\u003C/li\u003E\u003Cli\u003E推薦手法：雙指指節單方向輕柔施作，讓組織變軟\u003C/li\u003E\u003Cli\u003E動作驗證：眼睛向下追視（兩手距離），重複兩次，觀察是否平順無震顫\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位位於瞳孔正下方，覆蓋在眼輪匝肌之上。它是由單關節的「下直肌」與雙關節的「眼輪匝肌」纖維匯集而成，兩者最終 converged 於「特農氏筋膜」（Fascia of Tenon）。\u003Cbr /\u003E在操作時，我會使用雙指指節進行評估與觸診，並朝單一方向施作，目標是讓此處的結構變得更為柔軟。這個點位對於處理眼睛內部或眼後的疼痛，例如偏頭痛等癥狀，非常有幫助。\u003C/p\u003E\u003Cp\u003Ean-cp1 位於眼輪匝肌內，就在眼睛周圍。要定位這個點，我們需要在瞳孔正下方、眼輪匝肌之上找到它。我們可以從這個位置直接進行處理。我會將點定位在正下方這裡。\u003C/p\u003E\u003Cp\u003Ean-cp1 位於眼輪匝肌中，也就是眼睛周圍。\u003Cbr /\u003E我們必須定位這個點，該點位於瞳孔正下方、眼輪匝肌之上。\u003Cbr /\u003E因此，我們可以直接在那個位置接近這個點，我們將在下方的這個地方定位該點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120508-an-cp1-l1.jpeg\" alt=\"an-cp1-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120519-an-cp1-t1.jpeg\" alt=\"an-cp1-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120526-an-cp1-t2.jpeg\" alt=\"an-cp1-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E頭部1的動作檢查是將你的手指放在患者面前兩個手的距離\u003Cbr /\u003E要求患者眼睛跟著你的手指向下看\u003Cbr /\u003E檢查眼球活動是否順暢\u003Cbr /\u003E可以做兩次\u003Cbr /\u003E確保眼球向上 向下活動正常\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（向下追視）：我在患者面前、約兩手距離處移動手指，請患者眼睛往下追視。需要確認瞳孔移動是否平滑、無異常震顫；我會重複至少兩次，檢查下行與回到上方的動作是否順暢。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110518-move-an-cp1.jpeg\" alt=\"move-an-cp1\" /\u003E\u003C/p\u003E"
  },

    "question": "an-cp2",
    "answer": "\u003Cp\u003Ean-cp2\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：顴骨突下方、與瞳孔同一垂直線，由單關節提上唇肌 + 雙關節口輪匝肌組成\u003C/li\u003E\u003Cli\u003E如何找到：沿瞳孔線向下到顴骨突，按住笑肌區滑動，最緊處通常在鼻子外側邊緣\u003C/li\u003E\u003Cli\u003E臨床意義：牙痛、鼻竇炎、臉部緊繃\u003C/li\u003E\u003Cli\u003E推薦手法：一隻手固定額頭，另一隻手指節外下至內上45度朝顴骨方向施作，避免直接朝向鼻子，因為最緊繃的點通常位於鼻子的外側邊緣\u003C/li\u003E\u003Cli\u003E動作驗證：請患者做深笑表情，觀察對稱性及是否有抖動或抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位同樣與瞳孔在同一條垂直線上，但位置在顴骨下方。這裡的肌筋膜單位是由單關節的「提上唇肌」與雙關節的「口輪匝肌」共同組成。\u003Cbr /\u003E操作時，我會朝著顴骨的方向，以大約四十五度的角度施作，避免直接朝向鼻子，因為最緊繃的點通常位於鼻子的外側邊緣。這個點位對於處理牙齒疼痛、鼻竇炎等相關癥狀特別重要。\u003C/p\u003E\u003Cp\u003Ean-cp2 的位置在顴突下方，並與瞳孔在同一條線上。我們確實可以感覺到這個點，它就在顴肌或笑肌的正下方，也就是這裡。\u003C/p\u003E\u003Cp\u003Ean-cp2 定位於顴骨突下方，與瞳孔呈一直線。\u003Cbr /\u003E所以我們確實可以感知到這個點，就在你有顴肌或笑肌的正下方。所以就在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120512-an-cp2-l1.jpeg\" alt=\"an-cp2-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120520-an-cp2-t1.jpeg\" alt=\"an-cp2-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120526-an-cp2-t2.jpeg\" alt=\"an-cp2-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E向前-頭部2是要求患者做一個微笑動作\u003Cbr /\u003E這樣激活所有的肌肉 觀察對稱性\u003Cbr /\u003E看有沒有任何抖動 肌肉抽筋\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（深笑）：我請患者做「深笑」，以活化顏面肌群，觀察對稱性、是否有抖動或抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100605-move-cp2-an.jpeg\" alt=\"move-cp2-an\" /\u003E\u003C/p\u003E"

    "question": "an-cp3",
    "answer": "\u003Cp\u003Ean-cp3\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：下頜骨內側緣，由二腹肌肌腱纖維組成，與下頜舌骨肌匯集並由頸筋膜連結\u003C/li\u003E\u003Cli\u003E如何找到：摸下頜骨內側緣，往後滑到二腹肌附著處，同時感覺到兩條肌肉\u003C/li\u003E\u003Cli\u003E臨床意義：TMJ 功能障礙、肌肉痙攣、關節彈響\u003C/li\u003E\u003Cli\u003E推薦手法：沿下頜骨內側緣縱向按壓，並在附著點進行摩擦\u003C/li\u003E\u003Cli\u003E動作驗證：手托下顎下方，請患者張口抗阻，觀察是否有抽筋或疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位位於下頷骨的內側緣，由「二腹肌」的肌腱纖維組成。在這裡，兩條肌肉的纖維匯集，並由「頸筋膜」作為連結。\u003Cbr /\u003E操作時，我會沿著下頷骨內側緣進行縱向的按壓，並在二腹肌的附著點上進行摩擦。這個點位對於處理顳顎關節功能障礙（TMJ dysfunction）、肌肉痙攣或關節彈響等問題有顯著效果。\u003C/p\u003E\u003Cp\u003E第三個穴點位於下頷骨的邊緣下方，緊鄰著下頷舌骨肌與二腹肌。我會將點精確地定位在這個水平面上，如此一來便可以同時感覺到這兩條肌肉。\u003C/p\u003E\u003Cp\u003Ean-cp3 位於下頜骨邊緣下方。\u003Cbr /\u003E緊貼著下頜舌骨肌和二腹肌。\u003Cbr /\u003E所以我們將把這個點精確地定位在這個水平高度，以便你能同時感知到這兩塊肌肉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120537-an-cp3-l1.jpeg\" alt=\"an-cp3-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120544-an-cp3-t1.jpeg\" alt=\"an-cp3-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120549-an-cp3-t2.jpeg\" alt=\"an-cp3-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者張嘴抗組\u003Cbr /\u003E把手放在下頜下面 讓患者推你\u003Cbr /\u003E檢查有無抽筋、疼痛等\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（張口抗阻）：我在下顎下方托住，請患者張口並對抗我的阻力，觀察是否出現抽筋或痙攣。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100606-move-cp3-an.jpeg\" alt=\"move-cp3-an\" /\u003E\u003C/p\u003E"

    "question": "an-cl",
    "answer": "\u003Cp\u003Ean-cl\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：環狀軟骨外側、SCM 胸骨端上方，由舌骨下肌單關節纖維 + SCM 雙關節纖維組成\u003C/li\u003E\u003Cli\u003E如何找到：摸到 SCM 胸骨端，在其正上方與環狀軟骨同一水平找到凹陷或緊繃點\u003C/li\u003E\u003Cli\u003E臨床意義：後頸痛常見隱藏來源\u003C/li\u003E\u003Cli\u003E推薦手法：躺，\u003Cmark\u003E站床頭\u003C/mark\u003E，一隻手護額頭，另一隻手指節額狀面入，直摔，淺層斜向縱向手法\u003C/li\u003E\u003Cli\u003E動作驗證：一隻手在上背，一隻手掌置額頭，請患者頸部前推抗阻，檢查疼痛或無力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這是個很常見的點位，位於環狀軟骨的外側，胸鎖乳突肌胸骨端的上方。它由「舌骨下肌」的單關節纖維與「胸鎖乳突肌」的雙關節纖維匯集而成。\u003Cbr /\u003E雖然此處緊繃很少直接引起頸部前方的疼痛，但卻是造成後頸疼痛的常見原因。操作時，我會沿著肌肉纖維進行縱向施作，手法必須非常淺層，避免滑脫而壓迫到氣管，因此操作方向會是斜向的。\u003C/p\u003E\u003Cp\u003Ean-cl 位於胸鎖乳突肌（SCM）胸骨端的中央位置。首先，我會找出胸鎖乳突肌的胸骨端，然後在它的正上方，與環狀軟骨同一縱向水平上定位此點。\u003C/p\u003E\u003Cp\u003Ean-cl 將位於胸鎖乳突肌（SCM）胸骨端的正中間。\u003Cbr /\u003E因此，我們確認胸鎖乳突肌的胸骨端，並將該點定位在正上方，在縱向上與環狀軟骨處於同一水平高度。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120538-an-cl-l1.jpeg\" alt=\"an-cl-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120543-an-cl-t1.jpeg\" alt=\"an-cl-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120549-an-cl-t2.jpeg\" alt=\"an-cl-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者的頭對抗你的手\u003Cbr /\u003E有無任何疼痛、無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（前屈抗阻）：我以手掌作為阻力，請患者頸部前推，檢查力量、疼痛或無力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100636-move-cl-an.jpeg\" alt=\"move-cl-an\" /\u003E\u003C/p\u003E"

    "question": "an-th",
    "answer": "\u003Cp\u003Ean-th\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：\u003Cmark\u003E胸廓上方、胸大肌下方與腹直肌鞘線內側三角區\u003C/mark\u003E，由胸骨肌單關節與腹直肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：找胸大肌下緣、腹直肌鞘線與肋骨形成的三角區，在中間多方向滑動找最卡方向\u003C/li\u003E\u003Cli\u003E臨床意義：胸悶、肋間抽筋、頸上背痛\u003C/li\u003E\u003Cli\u003E推薦手法：躺，指節時一隻手固定肩膀，另一隻手星狀多方向摔，肘時一隻手撐床放佢頭隔離，另一隻手多方向摔\u003C/li\u003E\u003Cli\u003E動作驗證：坐，一隻手放後胸腰交界，一隻手直手放 me-cl 位置頂住，請患者做小幅度仰臥起坐（手置胸前）抗阻，檢查抽筋、無力或異常，躺做也可以\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位位於胸廓上方，與腹直肌鞘在同一條線上。這裡的結構比較特別，是由從胸大肌向下延伸的肌纖維，與腹直肌鞘反向交錯而成。簡單來說，此處是來自四面八方膠原纖維的匯集點。\u003Cbr /\u003E組織結構上，單關節纖維來自「胸骨肌」，雙關節纖維則來自「腹直肌」。操作時，我會用指節進行星狀的觸診，每個方向都可能是有效的處理方向。如果患者體型較為壯碩，有時我也會使用手肘進行操作。此點位對於處理胸悶、肌肉痙攣、肋間抽筋等胸前不適，以及頸部與上背痛都很有幫助。\u003C/p\u003E\u003Cp\u003E我們可以在胸廓上方、胸大肌下方，以及腹直肌鞘線的內側找到 an-th。在這個由三者構成的三角形區域中，您會看到來自胸大肌的肌纖維朝著多個不同方向伸展。我們就在那裡，順著造成最多活動受限的方向，便能找到 an-th。\u003C/p\u003E\u003Cp\u003E我們可以在肋骨架上方、胸大肌下方，以及腹直肌鞘線的內側找到 an-th。\u003Cbr /\u003E所以在這個三角形的中間，你會看到來自胸大肌、朝多個方向延伸的肌肉纖維。\u003Cbr /\u003E因此在那個地方，在產生最多限制的方向上，我們將會找到 an-th。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120555-an-th-l1.jpeg\" alt=\"an-th-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120500-an-th-t1.jpeg\" alt=\"an-th-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120504-an-th-t2.jpeg\" alt=\"an-th-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120509-an-th-t3.jpeg\" alt=\"an-th-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120514-an-th-t4.jpeg\" alt=\"an-th-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者做一個類卷腹\u003Cbr /\u003E手放在胸部\u003Cbr /\u003E做一個小卷腹抗阻\u003Cbr /\u003E也可以仰臥位做\u003Cbr /\u003E查看是否有疼痛 抽筋 無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（小型仰臥起坐）：我請患者雙手放在胸前，進行小幅度仰臥起坐並加上阻力（可在仰臥位），觀察是否有抽筋、無力或感覺異常。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100635-move-th-an.jpeg\" alt=\"move-th-an\" /\u003E\u003C/p\u003E"

    "question": "an-lu",
    "answer": "\u003Cp\u003Ean-lu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：肚臍高度腹直肌鞘，由腹直肌單關節與腹斜肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：在肚臍水平腹白線兩側按壓，找張力最大處\u003C/li\u003E\u003Cli\u003E臨床意義：腹部痙攣、下背痛、上背痛\u003C/li\u003E\u003Cli\u003E推薦手法：橫向或45度摩擦\u003C/li\u003E\u003Cli\u003E動作驗證：請患者後伸，檢查是否單側偏、疼痛及雙側對稱性\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位位於腹直肌鞘的中心，大約在肚臍的高度。此處的單關節纖維來自「腹直肌」，雙關節纖維則來自「腹斜肌」。\u003Cbr /\u003E操作時，我會在各個方向上施作，以釋放增厚的腹直肌鞘張力。此點位不僅能處理腹部的痙攣或臟器疼痛，對於緩解下背痛與上背痛也同樣有效。\u003C/p\u003E\u003Cp\u003Ean-lu  位於腹直肌鞘上，與肚臍在同一水平。我會希望以橫向、四十五度角的方式進行操作，藉此在腹直肌鞘上產生摩擦。在這個水平上，點位的方向可以朝下四十五度或朝上四十五度，取決於哪裡感覺到較大的阻力。\u003C/p\u003E\u003Cp\u003Ean-lu 就在肚臍水平高度的腹直肌鞘正上方。\u003Cbr /\u003E所以我們想以 45 度角橫向進行操作，以便在腹直肌鞘上產生摩擦。\u003Cbr /\u003E所以在這個水平高度，這個點的方向可以偏向下 45 度或偏向上 45 度，取決於你在哪裡找到更多的限制。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120554-an-lu-l1.jpeg\" alt=\"an-lu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120559-an-lu-l2.jpeg\" alt=\"an-lu-l2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120504-an-lu-l3.jpeg\" alt=\"an-lu-l3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120510-an-lu-t1.jpeg\" alt=\"an-lu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120515-an-lu-t2.jpeg\" alt=\"an-lu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120520-an-lu-t3.jpeg\" alt=\"an-lu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120525-an-lu-t4.jpeg\" alt=\"an-lu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531120530-an-lu-t5.jpeg\" alt=\"an-lu-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者向後伸 觀察是否單側\u003Cbr /\u003E後伸過度 雙側是否對稱 以及有無疼痛\u003Cbr /\u003E雙側下肢是否站立對稱\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（後伸）：我檢查患者在後伸時是否偏向單側、是否疼痛、對稱性是否良好。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120630-move-lu-an.jpeg\" alt=\"move-lu-an\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-ta\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：脛前肌中心（近中1/3交界）\u003Cmark\u003E臏骨下方同腳背上方的中點，肌腹上，由脛前肌單關節 + 伸趾長肌雙關節組成\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E如何找到：脛骨脊外側，感覺脛前肌外側緣彈撥處\u003C/li\u003E\u003Cli\u003E臨床意義：腳踝前側問題，也影響腳跟與阿基里斯腱\u003C/li\u003E\u003Cli\u003E推薦手法：躺，一隻手捉腳腕，另一手指節上下摔；\u003Cmark\u003E或用肘，另一手掌心貼前小腿前方，用虎口限制肘上下摔位置防止過界\u003C/mark\u003E，縱向避開脛骨\u003C/li\u003E\u003Cli\u003E動作驗證：足跟行走保持直線，檢查背屈或小腿疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這是另一個容易變得非常僵硬的點位，位於「脛前肌」上方。單關節部分是「脛前肌」，雙關節部分則是「伸趾長肌」，兩者在此匯集，並與「小腿前筋膜」有重要連結。\u003Cbr /\u003E位置大約在肌肉肌腱交界處，可能是近端三分之一與中段三分之一之間，或是中段三分之一處，取決於肌肉長度，基本上就是在脛前肌的中心。操作時，我會沿著肌肉縱向施作，並小心避開脛骨，以免造成骨膜的瘀傷。要完全停留在肌肉上方有時是個挑戰，因為這個點位可能非常僵硬。我們透過超音波觀察到，此處的筋膜增厚有時會影響到脛前肌的肌內膜與肌束膜，使組織呈現高迴音性。此點位典型的癥狀是腳踝前側的問題，但也可能引發腳跟、阿基里斯腱的疼痛。\u003C/p\u003E\u003Cp\u003Ean-ta 位於脛前肌上，介於脛前肌的中點與近端三分之一段之間。這裡會因肌肉的長度與尺寸而有輕微的解剖學差異。我會停留在脛骨脊的外側，an-ta 就會在這一區。當範圍較大時，它可能會更偏向外側一些。因此，an-ta 的確切位置會在這個水平。\u003C/p\u003E\u003Cp\u003Ean-ta 位於脛骨前肌上方，介於脛骨前肌的中點，以及近端和中三分之一之間。\u003Cbr /\u003E所以。這有輕微的解剖學變異，取決於肌肉的長度和大小。\u003Cbr /\u003E所以我們就停在脛骨脊的外側正上方，在這個區域就會是 an-ta。\u003Cbr /\u003E當分離（或病變）範圍較大時，它可以再往外側一點。\u003Cbr /\u003E所以 an-ta 就會精確地位於這個水平高度。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010508-an-ta-l1.jpeg\" alt=\"an-ta-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010513-an-ta-t1.jpeg\" alt=\"an-ta-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010518-an-ta-t2.jpeg\" alt=\"an-ta-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010522-an-ta-t3.jpeg\" alt=\"an-ta-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010527-an-ta-t4.jpeg\" alt=\"an-ta-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E向前-踝部是讓患者用腳跟走路\u003Cbr /\u003E盡量保持同一直線\u003Cbr /\     "answer": "\u003Cp\u003Ean-pe\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：第1與第2蹠骨間近端，由伸拇短肌單關節 + 伸拇長肌雙關節組成，有第三支持帶\u003C/li\u003E\u003Cli\u003E如何找到：第1-2蹠骨間盡量近端，感覺彈響處即是\u003C/li\u003E\u003Cli\u003E臨床意義：大腳趾疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：指節尖端縱向\u003C/li\u003E\u003Cli\u003E動作驗證：大腳趾背屈抗阻，檢查疼痛、無力或抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位包含兩個部分：單關節的「伸拇短肌」與雙關節的「伸拇長肌」。位置在第一與第二蹠骨之間，盡量往近端尋找。這裡有一個被稱為「第三支持帶」的結構，是足背筋膜的增厚處，觸診時會感覺到一個彈響，而那正是需要處理的地方。\u003Cbr /\u003E我會使用指節尖端進行縱向施作，並注意避開骨膜。這個點位對於處理大腳趾疼痛非常有效，但其疼痛也可能向上傳導。\u003C/p\u003E\u003Cp\u003Ean-pe 將位於第一與第二蹠骨之間，盡可能靠近近端的位置。因為在這裡，我們有足部的第三楔狀骨。我會嘗試盡可能地向近端移動，直到那裡還有空間為止。我們將處理骨間肌。所以，an-pe 就在這裡。\u003C/p\u003E\u003Cp\u003Ean-pe（前足）將位於第一和第二蹠骨之間，並盡可能靠近近端。\u003Cbr /\u003E因為就在這裡，我們有在這種情況下（腳上）被稱為踝關節第三跗骨支持帶的結構。\u003Cbr /\u003E所以我們試圖盡可能向近端移動，直到那裡有空間為止。\u003Cbr /\u003E我們將對骨間進行操作。所以 an-pe 就在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010556-an-pe-l1.jpeg\" alt=\"an-pe-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010501-an-pe-t1.jpeg\" alt=\"an-pe-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010506-an-pe-t2.jpeg\" alt=\"an-pe-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010518-an-pe-t3.jpeg\" alt=\"an-pe-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者用大腳趾抗阻\u003Cbr /\u003E檢查疼痛 無力 抽筋等癥狀\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（拇趾背屈抗阻）：我請患者拇趾背屈並給予阻力，檢查是否有無力、疼痛或抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010639-move-pe-an.jpeg\" alt=\"move-pe-an\" /\u003E\u003C/p\u003E"

    "question": "an-sc",
    "answer": "\u003Cp\u003Ean-sc\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：喙突遠端、\u003Cmark\u003E胸小肌外側緣\u003C/mark\u003E，由胸小肌單關節 + 胸大肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：找到喙突，向下移動，\u003Cmark\u003E穿過胸大肌感覺彈撥的胸小肌外側緣\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：肩膀問題、上背痛、手臂傳導痛\u003C/li\u003E\u003Cli\u003E推薦手法：一隻手伸直以床頭或床邊支撑，另一隻手用指節或肘，外下至內上摔\u003C/li\u003E\u003Cli\u003E動作驗證：一隻手 在對方背部，另一隻手在肩膀前，叫對方肩膀向前推向前推抗阻，檢查無力或疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這是個很常見的點位，位於喙突的遠端，目標是尋找「胸小肌」的外側緣。這裡的單關節部分是「胸小肌」，雙關節部分則是「胸大肌」，兩者在此匯集。\u003Cbr /\u003E操作方法是先找到喙突，向遠端移動，辨識出胸小肌，並對其進行處理。這個點位對於處理肩膀問題、上背痛，甚至是手臂的傳導痛都很有幫助。\u003C/p\u003E\u003Cp\u003E肩胛前點位於胸小肌的外側緣。我會先尋找喙突，從喙突處可以想像胸小肌從那裡延伸出來。要感覺到胸小肌，最簡單的方法是觸診其外側緣。我們必須感覺到一個穿過胸大肌的彈撥感，那個結構就是胸小肌連同肋腋筋膜。這就是我們要處理的點，an-sc。\u003C/p\u003E\u003Cp\u003E然後，an-sc（前肩胛）將位於胸小肌的外側邊緣。\u003Cbr /\u003E所以我們尋找喙突。從喙突，我們可以想像胸小肌從那裡延伸出來。\u003Cbr /\u003E感知胸小肌的簡單方法是觸診其外側邊緣。\u003Cbr /\u003E所以我們必須透過胸大肌感覺到一種彈撥感。\u003Cbr /\u003E那個結構就是胸小肌以及喙鎖胸筋膜。\u003Cbr /\u003E這就是我們將要治療的點，an-sc。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010555-an-sc-l1.jpeg\" alt=\"an-sc-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010505-an-sc-l2.jpeg\" alt=\"an-sc-l2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010511-an-sc-t1.jpeg\" alt=\"an-sc-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010520-an-sc-t2.jpeg\" alt=\"an-sc-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010526-an-sc-t3.jpeg\" alt=\"an-sc-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010530-an-sc-t4.jpeg\" alt=\"an-sc-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010535-an-sc-t5.jpeg\" alt=\"an-sc-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010542-an-sc-t6.jpeg\" alt=\"an-sc-t6\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010548-an-sc-t7.jpeg\" alt=\"an-sc-t7\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者肩膀向前\u003Cbr /\u003E你用手頂住患者的背部\u003Cbr /\u003E檢查有無無力或疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（肩向前推）：我請患者將肩向前帶，並在肩胛中段停止背部，檢查力量、無力與疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010629-move-sc-an.jpeg\" alt=\"move-sc-an\" /\u003E\u003C/p\u003E"

    "question": "an-hu",
    "answer": "\u003Cp\u003Ean-hu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：三角肌前側、\u003Cmark\u003E肱二頭肌長短頭之間\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E如何找到：三角肌前區正中央，摸到肱二頭肌長短頭之間的溝\u003C/li\u003E\u003Cli\u003E臨床意義：肩關節問題、非特定肩痛\u003C/li\u003E\u003Cli\u003E推薦手法：躺，\u003Cmark\u003E稍微靠近肱二頭肌短頭\u003C/mark\u003E，指節上下摔，肘：一手斜撑床頭，另一隻手縱向摔，穿過三角肌\u003C/li\u003E\u003Cli\u003E動作驗證：對方握拳90度曲肘，上臂貼自己，拳心向天，自己一隻手放對方肩上，另一手放前臂前方近肘，叫對方向前推臂抗阻，檢查疼痛或無力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位位於肱二頭肌的長短頭之間，在三角肌的前側。我希望觸及單羽狀的「喙肱肌」以及雙羽狀的「肱二頭肌」。在這個位置，同時也能感覺到胸大肌的纖維。\u003Cbr /\u003E操作時，我會沿著肌肉縱向施作，穿過三角肌，並稍微靠近肱二頭肌短頭。患者的癥狀通常與肩關節有關，但這個點位對於處理非特定動作引發的疼痛也很有幫助。\u003C/p\u003E\u003Cp\u003Ean-hu 位於肱二頭肌短頭與長頭之間，就在三角肌前區的正中央。\u003C/p\u003E\u003Cp\u003Ean-hu 位於肱二頭肌短頭與肱二頭肌長頭之間，正好在中間，處於三角肌的前側區域。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010558-an-hu-l1.jpeg\" alt=\"an-hu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010506-an-hu-t1.jpeg\" alt=\"an-hu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010511-an-hu-t2.jpeg\" alt=\"an-hu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010516-an-hu-t3.jpeg\" alt=\"an-hu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010521-an-hu-t4.jpeg\" alt=\"an-hu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E患者屈肘向前推臂\u003Cbr /\u003E患者可能在肱骨節段感覺有疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（前拉抗阻）：我請患者彎肘，向前拉手臂，我在肱骨層面給阻力；若患者於肱骨處出現疼痛，記錄為 Ante。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010606-move-hu-an.jpeg\" alt=\"move-hu-an\" /\u003E\u003C/p\u003E"

    "question": "an-cu",
    "answer": "\u003Cp\u003Ean-cu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：三角肌末端、\u003Cmark\u003E肱二頭肌長頭上方\u003C/mark\u003E，由肱肌單關節 + 肱二頭肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：三角肌末端、肱二頭肌長頭上方，感覺僵硬處\u003C/li\u003E\u003Cli\u003E臨床意義：手肘癥狀，也常導致肩膀疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：躺，指節摔或；\u003Cmark\u003E肘時一隻手捉住手腕，控制對方隻手貼實佢身體或外展45度\u003C/mark\u003E，縱向摔肌肉\u003C/li\u003E\u003Cli\u003E動作驗證：屈肘，肘向下，手指向後，手心向下，同時輕壓手腕和掌背中間靠近前臂，前側痛為陽性\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個常見的點位位於三角肌的末端，恰好在肱二頭肌（特別是長頭）的上方。這裡的單關節部分是「肱肌」，雙關節部分是「肱二頭肌」，兩者在此匯集。\u003Cbr /\u003E此點位可能相當僵硬。操作時我會沿著肌肉縱向施作，避免壓迫到深層的骨膜，所以手法會停留在肌肉上方，沿著橈骨的平坦部分進行。這個點位除了會引發手肘的癥狀，也經常導致肩膀的疼痛，處理此處能大幅改善許多肩部問題。\u003C/p\u003E\u003Cp\u003Ean-cu 位於三角肌的末端。我會向上移動到肱二頭肌上方，並且會更著重於外側部分，也就是與肱二頭肌長頭相連的部分。在這個水平上，沿著縱向我會找到 an-cu 這個點。\u003C/p\u003E\u003Cp\u003Ean-cu 位於三角肌的末端，我們向上走到肱二頭肌上方，並在更偏外側的部分進行操作，即與肱二頭肌長頭相連的部分。\u003Cbr /\u003E所以在這個水平高度，縱向上我們將會找到 Antecubital 這個點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010500-an-cu-l1.jpeg\" alt=\"an-cu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010507-an-cu-t1.jpeg\" alt=\"an-cu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010512-an-cu-t2.jpeg\" alt=\"an-cu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010518-an-cu-t3.jpeg\" alt=\"an-cu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010523-an-cu-t4.jpeg\" alt=\"an-cu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010527-an-cu-t5.jpeg\" alt=\"an-cu-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E肘部可以同時檢查 患者屈肘\u003Cbr /\u003E然後你用手輕微的將他的手推向肩膀\u003Cbr /\u003E檢查肘部的前側是否有疼痛\u003Cbr /\u003E如果有的話是向前-肘部陽性\u003Cbr /\u003E如果後側疼痛則是向後-肘部\u003C/p\u003E\u003Cul\u003E     "question": "an-ca",
    "answer": "\u003Cp\u003Ean-ca\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：\u003Cmark\u003E（肘［1/3］^［2/3］手腕）偏橈側（橈側腕屈肌外側，再外係肱橈肌）\u003C/mark\u003E由橈側屈腕肌單關節 + 屈指淺肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：前臂近中1/3偏橈側，摸到斜向條索與彈撥感即是\u003C/li\u003E\u003Cli\u003E臨床意義：看似手腕痛，實則對手肘、肩膀與下往上代償極有效\u003C/li\u003E\u003Cli\u003E推薦手法：指節的話多方向，尺骨操作最容易，一隻手斜撑床一隻手用肘單方向摔\u003C/li\u003E\u003Cli\u003E動作驗證：90度曲肘，上臂貼自己，手指向前，掌心向上擡起前臂，一隻手擋住前臂後面，\u003Cmark\u003E另一隻手於第二掌骨施壓讓對方做腕屈抗阻\u003C/mark\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這個點位非常普遍，許多過度使用者都會有陽性反應。它由兩個部分組成：單關節的「橈側屈腕肌」與雙關節的「屈指肌」。兩者匯集在前臂近端與中段三分之一之間，位置稍微偏向橈側。我需要觸及「屈指淺肌」，會感覺到一條斜向的條索狀組織。\u003Cbr /\u003E這個點位介於前臂的近端與中段三分之一之間，可以用指節操作，但用尺骨會更容易。患者主要會抱怨手腕疼痛，但你會驚訝地發現，處理這個點位對於改善手肘甚至肩膀的問題有多麼顯著的效果，特別是在由下往上代償的個案中。\u003C/p\u003E\u003Cp\u003Ean-ca 將位於屈指淺肌近端與中段三分之一處之間。我希望在這個水平感覺到一個彈撥感，因為屈指淺肌有其特定的走向。這就是 an-ca。\u003C/p\u003E\u003Cp\u003Ean-ca 將位於指淺屈肌的近端和中三分之一之間。\u003Cbr /\u003E所以，我們想在這個水平高度感覺到像彈撥一樣的感覺，因為指淺屈肌有這個特定的方向。\u003Cbr /\u003E所以，這就是 an-ca。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010503-an-ca-l1.jpeg\" alt=\"an-ca-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010512-an-ca-t1.jpeg\" alt=\"an-ca-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010521-an-ca-t2.jpeg\" alt=\"an-ca-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010527-an-ca-t3.jpeg\" alt=\"an-ca-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010532-an-ca-t4.jpeg\" alt=\"an-ca-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010537-an-ca-t5.jpeg\" alt=\"an-ca-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010542-an-ca-t6.jpeg\" alt=\"an-ca-t6\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010547-an-ca-t7.jpeg\" alt=\"an-ca-t7\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010551-an-ca-t8.jpeg\" alt=\"an-ca-t8\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者擡起前臂 手掌朝上\u003Cbr /\u003E在第二掌骨這里施加壓力\u003Cbr /\u003E這樣的動作檢查的是患者的屈肌\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte（掌心向上、第二跖骨壓力）：我請患者前伸手臂、掌心向上，於第二掌骨施壓以測試腕部叢（plexus del scarpis）；患者需做屈腕加橈偏。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010639-move-ca-an.jpeg\" alt=\"move-ca-an\" /\u003E\u003C/p\u003E"

    "question": "an-di",
    "answer": "\u003Cp\u003Ean-di\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：大魚際近端1/3\u003Cmark\u003E靠近第1掌骨\u003C/mark\u003E，由屈拇短肌單關節 + 屈拇長肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：大魚際近端，感覺兩條縱向結構，靠近第一掌骨\u003C/li\u003E\u003Cli\u003E臨床意義：疼痛傳導至大拇指，有時手腕痛\u003C/li\u003E\u003Cli\u003E推薦手法：躺，\u003Cmark\u003E同對方握手，扭到佢腕直到個cc點向天\u003C/mark\u003E，近用指節縱向摔\u003C/li\u003E\u003Cli\u003E動作驗證：90度曲肘，上臂貼自己，前臂手指指前，\u003Cmark\u003E掌心向上，擡起大拇指於指甲外側向下施壓\u003C/mark\u003E，檢查大魚際抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位位於大魚際肌。我們需要處理肌筋膜單位的單關節部分，即「屈拇短肌」，以及雙關節部分，即「屈拇長肌」。兩者匯集在大魚際肌的近端三分之一處，非常靠近第一掌骨。\u003Cbr /\u003E操作時，我會貼近骨頭進行縱向施作。患者通常會感覺到疼痛傳導至大拇指，有時也可能引發手腕的疼痛。\u003C/p\u003E\u003Cp\u003Ean-di 位於拇指隆起的內側，非常靠近第一掌骨，我們有兩條縱向的結構。這就是 an-di。\u003C/p\u003E\u003Cp\u003Ean-di 位於大魚際的外側，非常靠近第一掌骨，我們有兩條垂直縱向的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010539-an-di-l1.jpeg\" alt=\"an-di-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010544-an-di-t1.jpeg\" alt=\"an-di-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010550-an-di-t2.jpeg\" alt=\"an-di-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531010555-an-di-t3.jpeg\" alt=\"an-di-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E患者伸出手 擡起手至\u003Cbr /\u003E擡起大拇指 我們施加一個壓力\u003Cbr /\u003E在大拇指的外側 指甲邊緣\u003Cbr /\u003E患者可能感覺大魚際的抽筋\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte／Retro（全指外展抗阻）：我請患者所有手指外展並以小指作為阻力測試；患者於小魚際（hypothenar eminence）出現抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010636-move-di-an.jpeg\" alt=\"move-di-an\" /\u003E\u003C/p\u003E"

    "question": "re-cp1",
    "answer": "\u003Cp\u003Ere-cp1\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：眉毛末端內側、皺眉肌中，由單關節上直肌 + 雙關節眼輪匝肌匯聚\u003C/li\u003E\u003Cli\u003E如何找到：摸眉毛尾端內側，按眉弓下方輕滑，感覺小條索即是\u003C/li\u003E\u003Cli\u003E臨床意義：眼後頭痛與延伸至前臂的放射痛\u003C/li\u003E\u003Cli\u003E推薦手法：指關節輕柔處理，避開眶上神經\u003C/li\u003E\u003Cli\u003E動作驗證：眼睛向上追視，重複兩次，檢查震顫或抽動\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位在眉毛末端的內側、靠近鼻側。操作時務必避免傷到此處穿出的神經（orbicular nerve）。此點的單關節纖維是上直肌（superior rectus），雙關節纖維是眼輪匝肌（orbicularis oculi）。兩者匯聚形成 Retro Capo 1，對眼後頭痛與延伸至前臂的疼痛特別有效。\u003C/p\u003E\u003Cp\u003E我將 re-cp1 定位在皺眉肌位置，也就是眼輪匝肌之下、眉毛下方。我會注意不要碰到眶上神經的出口，並保持更內側的路徑。這個層次需要以觸診確認，我會在確定點位後留下標記，位置就在這裡。\u003C/p\u003E\u003Cp\u003Ere-cp1 將會位於皺眉肌中，也就是在眼輪匝肌下方、眉毛下方。\u003Cbr /\u003E所以，我們要確保不要碰觸到眶上神經穿出的地方，而是要保持偏向內側。\u003Cbr /\u003E所以這就是你必須觸診並碰觸 re-cp1 的水平高度。\u003Cbr /\u003E因此我們將留下一個點，精確地就在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020500-re-cp1-p1.jpeg\" alt=\"re-cp1-p1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020506-re-cp1-t1.jpeg\" alt=\"re-cp1-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020510-re-cp1-t2.jpeg\" alt=\"re-cp1-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E要求患者跟著手指向上看\u003Cbr /\u003E檢查眼球是否有震顫 有抖動\u003Cbr /\u003E兩次\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（向上追視）：請患者眼睛往上追視，同樣觀察是否有震顫、抽動或眼瞼痙攣；此測試也重複兩次。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110528-move-re-cp1.jpeg\" alt=\"move-re-cp1\" /\u003E\u003C/p\u003E"

    "question": "re-cp2",
    "answer": "\u003Cp\u003Ere-cp2\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：額肌、瞳孔垂直線向上至額骨結節，由額肌 + 帽狀腱膜組成\u003C/li\u003E\u003Cli\u003E如何找到：沿\u003Cmark\u003E瞳孔線向上摸到額骨最凸處，做十字滑動找最僵硬方向\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：緊張型頭痛與偏頭痛\u003C/li\u003E\u003Cli\u003E推薦手法：一隻手護住一邊額頭上方到耳上，一隻手指關節多方向十字摔\u003C/li\u003E\u003Cli\u003E動作驗證：讓患者擡起眉毛，觀察擡頭紋和額肌的活動情況，\u003Cmark\u003E沒有皺紋的地方是病理性的\u003C/mark\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點位於額肌（frontalis），單關節肌為額肌，雙關節向量為帽狀腱膜（galea aponeurotica，亦有提及為「galacapitis」的廣泛頭部結構）。額肌作為帽狀腱膜的張力來源之一，容易引發緊張型頭痛與偏頭痛。定位方式：以瞳孔為垂直基準線向上，在額骨結節（frontal tuberosity）找到此點。治療時需向各方向操作，確實處理額肌的所有纖維。\u003Cbr /\u003E我傾向使用指關節操作，這是治療此點的最佳方式。\u003C/p\u003E\u003Cp\u003Ere-cp2 位於額肌上，我會沿著瞳孔的垂直線向上，對應到額結節（前額結節）的高度。在這裡，我會做交叉測試（Cross）並檢查各個方向的張力，找出最為明顯的方向，然後在此放置 re-cp2。\u003C/p\u003E\u003Cp\u003Ere-cp2 將會位於額肌中。\u003Cbr /\u003E所以你向上走到與瞳孔呈一直線、在額結節的水平高度。\u003Cbr /\u003E就在這裡，你必須做一個交叉並檢查所有方向，看看哪一個是最糟糕的（限制最大的）。\u003Cbr /\u003E所以就在這裡，我們將標記 re-cp2。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020536-re-cp2-p1.jpeg\" alt=\"re-cp2-p1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020541-re-cp2-l1.jpeg\" alt=\"re-cp2-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020545-re-cp2-t2.jpeg\" alt=\"re-cp2-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者擡起眉毛\u003Cbr /\u003E觀察擡頭紋和額肌的活動情況\u003Cbr /\u003E沒有皺紋的地方是病理性的\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（擡眉與皺額）：請患者上提眉毛並做額肌的皺摺；我檢查是否為水平且對稱。較平坦的區域可能提示病理。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100611-move-cp2-re.jpeg\" alt=\"move-cp2-re\" /\u003E\u003C/p\u003E"

    "question": "re-cp3",
    "answer": "\u003Cp\u003Ere-cp3\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：枕骨底部兩側、\u003Cmark\u003E小後頭直肌附著處\u003C/mark\u003E，由單羽狀小後直肌 + 雙羽狀外直肌組成\u003C/li\u003E\u003Cli\u003E如何找到：枕骨下方，盡量靠近枕骨但避開骨膜，感覺緊繃處即是\u003C/li\u003E\u003Cli\u003E臨床意義：枕部放射痛、頭痛與偏頭痛\u003C/li\u003E\u003Cli\u003E推薦手法：對方坐椅子，雙手枕頭趴床；一隻手護住後腦，另一隻手指節橫向手法貼近枕骨摔，著重影響結締組織\u003C/li\u003E\u003Cli\u003E動作驗證：\u003Cmark\u003E請患者仰頭看天花板，可一隻手托後頸，另一隻手輕壓額頭\u003C/mark\u003E檢查枕骨是否出現銳痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位在枕骨底部兩側、各直肌頭匯聚於枕骨下緣之處。單羽狀肌為小後直肌（rectus capitis posterior minor），雙羽狀肌為外直肌（rectus capitis lateralis）。此處可影響小後直肌的張力，經常出現枕部放射痛，對頭痛與偏頭痛具療效。治療以橫向（transversal）為主，著重於影響結締組織。\u003C/p\u003E\u003Cp\u003Ere-cp3  在枕骨下方，位於小後頭直肌的附著處。我會盡量靠近枕骨，但避免壓傷骨膜。就在這個位置，可以確認 re-cp3 。\u003C/p\u003E\u003Cp\u003ERetrocaput 3（後頭3）將正好位於枕骨下方、頭後小直肌的止點處。\u003Cbr /\u003E所以，你要盡可能靠近枕骨，但不要碰傷骨膜。\u003Cbr /\u003E所以就在這裡，你有 re-cp3 。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020514-re-cp3-l1.jpeg\" alt=\"re-cp3-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E頭後小直肌位置\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260605100639-RCPM.jpeg\" alt=\"RCPM\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020518-re-cp3-t1.jpeg\" alt=\"re-cp3-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020524-re-cp3-t2.jpeg\" alt=\"re-cp3-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者看屋頂\u003Cbr /\u003E頸部後伸\u003Cbr /\u003E可以輕柔的按壓一下額頭區域\u003Cbr /\u003E看一下枕骨區域有無尖銳疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（頸伸看天花板）：我請患者仰頭伸展頸部，並可在額部施以輕微推力，同時檢查枕部是否出現銳痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100610-move-cp3-re.jpeg\" alt=\"move-cp3-re\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100616-move-cp3-re.jpeg\" alt=\"move-cp3-re\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ere-cl\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：C5–C6 豎脊肌中，由多裂肌（單關節）與最長肌（雙關節）組成\u003C/li\u003E\u003Cli\u003E如何找到：\u003Cmark\u003E從斜方肌下方進入，撥開斜方肌後摸到深層豎脊肌緊繃束\u003C/mark\u003E，若斜方肌過厚或僵硬，也可隔著斜方肌處理。\u003C/li\u003E\u003Cli\u003E臨床意義：頸痛與頭痛\u003C/li\u003E\u003Cli\u003E推薦手法：對方坐椅子，雙手枕頭趴床；一隻手護住後腦，另一隻手指額狀面橫向推開斜方肌，再指節多方向摔\u003C/li\u003E\u003Cli\u003E動作驗證：企，一隻手掌心護住對方 me-cla 位，另一隻手放對方後腦，請患者向後推頸部抗阻，觀察疼痛或無力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位大致在 C5–C6，存在些微解剖差異。目標肌群為：多裂肌（multifidus，單關節）與最長肌（longissimus，雙關節）。理想路徑是自斜方肌下方進入以達到中間區域，避免穿越斜方肌；若斜方肌過厚或僵硬，可穿越處理。可用指關節作縱向或橫向斜向操作，以找出最僵硬的方向。此點對頸痛與頭痛都有幫助。\u003C/p\u003E\u003Cp\u003Ere-cl 位於 C5–C6 之間。我會嘗試從斜方肌下方到達豎脊肌，方式是從後方略微提起斜方肌，進入深部到達該點。\u003C/p\u003E\u003Cp\u003Ere-cl 將位於 C5 至 C6 之間。\u003Cbr /\u003E所以你試著走到斜方肌下方以觸及豎脊肌。\u003Cbr /\u003E所以這個點可以從正後方觸及，就像你試著擡起斜方肌，然後你就能觸及到那裡的點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020511-re-cl-l1.jpeg\" alt=\"re-cl-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020516-re-cl-t1.jpeg\" alt=\"re-cl-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020521-re-cl-t2.jpeg\" alt=\"re-cl-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者向後抗組 看有無疼痛無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（後伸抗阻）：請患者向後推頸部，觀察阻力、無力或疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601100640-move-cl-re.jpeg\" alt=\"move-cl-re\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ere-th\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：\u003Cmark\u003E胸椎後凸頂峰、豎脊肌正中線\u003C/mark\u003E，由胸多裂肌 + 胸最長肌組成\u003C/li\u003E\u003Cli\u003E如何找到：摸\u003Cmark\u003E胸椎後凸最明顯處\u003C/mark\u003E（通常 T4），正中線找緊繃肌束\u003C/li\u003E\u003Cli\u003E臨床意義：許多上背與頸部疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：趴。指節多方向或手肘，一隻手撑床邊，另一隻手肘多方向施力。最好指節觸診，手肘治療\u003C/li\u003E\u003Cli\u003E動作驗證：站，\u003Cmark\u003E自己手放佢頭上1cm\u003C/mark\u003E，請患者挺胸，挺直背部降低後凸，睇下佢嘗試掂時脊旁肌是否抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點屬功能性定位，受胸椎後凸峰值影響，通常在 T4，但可能稍高或稍低。單關節纖維為胸段多裂肌，雙關節向量為胸最長肌（longissimus thoracis）。定位在豎脊肌群的中線上。可用指關節觸診，但治療建議使用肘部，並以多方向施力。許多上背與頸部疼痛都與此點相關。\u003C/p\u003E\u003Cp\u003E我在胸椎的後凸峰（胸椎後凸最明顯、使用過度的地方）尋找目標點，保持在正中線，聚焦在豎脊肌的中段。如果在中段能觸到緊繃的束狀組織，那就是定位點。re-th 就位於胸椎後凸頂端的豎脊肌中線位置。\u003C/p\u003E\u003Cp\u003Ere-th，我們正在尋找脊椎後凸的頂峰，也就是過度使用最嚴重的地方。\u003Cbr /\u003E你想停在正中間，並觀察豎脊肌的部分。\u003Cbr /\u003E所以如果你在豎脊肌中間感覺到一條緊繃的肌束，這就是那個點。\u003Cbr /\u003E所以 re-th 將會正好位於脊椎後凸頂峰的豎脊肌正中間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020502-re-th-l1.jpeg\" alt=\"re-th-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020507-re-th-t1.jpeg\" alt=\"re-th-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020515-re-th-t2.jpeg\" alt=\"re-th-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020519-re-th-t3.jpeg\" alt=\"re-th-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020524-re-th-t4.jpeg\" alt=\"re-th-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020529-re-th-t5.jpeg\" alt=\"re-th-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020533-re-th-t6.jpeg\" alt=\"re-th-t6\"     "answer": "\u003Cp\u003Ere-lu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：胸腰交界（常在 T12–L1）、豎脊肌正中，由多裂肌 + 最長肌組成\u003C/li\u003E\u003Cli\u003E如何找到：摸胸椎後凸與腰椎前凸交界處，正中線找緊繃束\u003C/li\u003E\u003Cli\u003E臨床意義：下背與上背痛\u003C/li\u003E\u003Cli\u003E推薦手法：手肘\u003C/li\u003E\u003Cli\u003E動作驗證：請患者盡量前彎，觀察下背左右張力是否一致及有無疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位在腰前凸與胸後凸交會處，仍在豎脊肌中線。單關節纖維為多裂肌，雙關節纖維為最長肌。可能位於 T12，也可能在 L1–L2，或 T11–T10，視後凸與前凸的交界而定。此點對下背與上背痛均可發揮良好效果。\u003C/p\u003E\u003Cp\u003E我在腰椎前凸與胸椎後凸的交界處尋找 re-lu，通常在 T12–L1 的高度。我會將點位放在豎脊肌的正中位置。\u003C/p\u003E\u003Cp\u003Ere-lu，我們正在尋找脊椎前凸與後凸交界的地方。\u003Cbr /\u003E所以這個水平高度可能是 T12、L1。\u003Cbr /\u003E我們在豎脊肌的正中間有一個 re-lu。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020521-re-lu-l1.jpeg\" alt=\"re-lu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020524-re-lu-l2.jpeg\" alt=\"re-lu-l2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020555-re-lu-t1.jpeg\" alt=\"re-lu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020557-re-lu-t2.jpeg\" alt=\"re-lu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020500-re-lu-t3.jpeg\" alt=\"re-lu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020504-re-lu-t4.jpeg\" alt=\"re-lu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020507-re-lu-t5.jpeg\" alt=\"re-lu-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020509-re-lu-t6.jpeg\" alt=\"re-lu-t6\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者盡量前屈\u003Cbr /\u003E看兩側張力是否一致\u003Cbr /\u003E在下背部區域 以及檢查有無疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u0     "question": "re-pv",
    "answer": "\u003Cp\u003Ere-pv\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：髂腰韌帶\u003C/li\u003E\u003Cli\u003E如何找到：在\u003Cmark\u003E髂脊上方、豎脊肌外側\u003C/mark\u003E小三角區深壓\u003C/li\u003E\u003Cli\u003E臨床意義：下背痛與下肢放射痛\u003C/li\u003E\u003Cli\u003E推薦手法：趴，手肘深層外上至內下方向摔（沿住髂脊邊），要壓深啲\u003C/li\u003E\u003Cli\u003E動作驗證：雙手握拳放在髂後上棘上，向前推骨盆，檢查 L5-S1 是否疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位於髂腰韌帶（iliolumbar ligament），此韌帶不易觸及；需在髂脊上方、背闊肌（latissimus dorsi）外側，沿小三角空隙深入以接近目標。此處單關節纖維為多裂肌，雙關節向量為最長肌。可治療下背痛與延伸至下肢的疼痛。此點相當深，建議以肘部操作，注意避免在髂脊處撞擊骨膜（periosteum）。\u003C/p\u003E\u003Cp\u003Ere-pv 需要對抗髂腰韌帶。我會在後上髂棘的上方、髂脊之上，且位於豎脊肌外側的區域進入。操作時，我會盡可能向內、向深，以顱--尾方向施力。re-pv 就在這裡。\u003C/p\u003E\u003Cp\u003Ere-pv，我們必須緊貼著髂腰韌帶。\u003Cbr /\u003E所以它位於髂後上棘上方、髂脊上方，在豎脊肌的外側。\u003Cbr /\u003E我們試著以頭側向尾側的方向，盡可能向深處及內側探入。\u003Cbr /\u003E所以就在這裡，我們有 re-pv。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020533-re-pv-l1.jpeg\" alt=\"re-pv-l1\" /\u003E\u003C/p\u003E\u003Cp\u003EPSIS 外上，髂脊上方，背闊肌上\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260602120641-re-pv-l2.jpeg\" alt=\"re-pv-l2\" /\u003E\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020523-re-pv-t1.jpeg\" alt=\"re-pv-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020526-re-pv-t2.jpeg\" alt=\"re-pv-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E見佢無點摸 PSIS，似係摸到條髂脊邊，再摸埋條 ES 外側就到（髂脊上方，貼住 ES 外邊）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020529-re-pv-t3.jpeg\" alt=\"re-pv-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020533-re-pv-t4.jpeg\" alt=\"re-pv-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020536-re-pv-t5.jpeg\" alt=\"re-pv-t5\" /\u003E\u003C/p\u003E\u003Cp     "question": "re-cx",
    "answer": "\u003Cp\u003Ere-cx\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：薦結節韌帶，由臀大肌單關節 + 股二頭肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：坐骨結節與薦骨中點，感覺彈撥感即是\u003C/li\u003E\u003Cli\u003E臨床意義：髖部與下肢相關疼痛\u003C/li\u003E\u003Cli\u003E推薦手法：對方側躺背向自己，上腳曲膝擡腿 60 度，下腳直膝，一隻手固定對方骨盆外側，另一隻手用肘不同方向\u003C/li\u003E\u003Cli\u003E動作驗證：對方雙手放你肩上，直膝向後伸髖，檢查臀部是否抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位在薦結節韌帶（sacrotuberous ligament），該韌帶是臀大肌後部纖維的起源之一，並作用於骨盆後傾（retroversion）。此處單關節肌為臀大肌（gluteus maximus），雙關節為股二頭肌（biceps femoris），二者在此匯聚。可用縱向、橫向、斜向多方向處理，建議以肘部並配合特定體位以便充分進入與治療。常見癥狀包含髖部與下肢相關疼痛。\u003C/p\u003E\u003Cp\u003Ere-cx 位於薦結節韌帶。我會先找出坐骨結節與薦骨，然後在兩者之間的中點觸診，感到如同「彈跳」的手感，那就是薦結節韌帶；此韌帶是臀大肌後側部分的起始處。確認後向後推壓，即為 Retro 點；re-cx 就在此。\u003C/p\u003E\u003Cp\u003Ere-cx 將會位於骶結節韌帶中。\u003Cbr /\u003E所以我們找到坐骨結節，我們找到骶骨，我們走到中間，我們會感覺到一種彈撥感。\u003Cbr /\u003E這就是骶結節韌帶，它是臀大肌後側部分的起點。推壓以尋找 Retro。所以 re-cx 就在這裡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020523-re-cx-l1.jpeg\" alt=\"re-cx-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020528-re-cx-t1.jpeg\" alt=\"re-cx-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020533-re-cx-t2.jpeg\" alt=\"re-cx-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020538-re-cx-t3.jpeg\" alt=\"re-cx-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020542-re-cx-t4.jpeg\" alt=\"re-cx-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020547-re-cx-t5.jpeg\" alt=\"re-cx-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020553-re-cx-t6.jpeg\" alt=\"re-cx-t6\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者雙手放在床面或是你肩上腿向後伸直\u003Cbr /\u003E患者可能會感覺臀部有     "answer": "\u003Cp\u003Ere-ge\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：股二頭肌內側緣中點，由股二頭肌短頭單關節 + 半腱肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：臀大肌下緣與膕窩中點，進入股二頭肌長頭內側緣\u003C/li\u003E\u003Cli\u003E臨床意義：抽筋、膝痛、下背、髖關節問題\u003C/li\u003E\u003Cli\u003E推薦手法：趴，縱向，\u003Cmark\u003E沿縱向操作並自內側向外推進，以維持在長頭的中間邊緣\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：單腳企屈膝讓腳跟貼近臀部並維持 5 秒，檢查膕繩肌抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位於股二頭肌的內側緣。單關節纖維為股二頭肌短頭（short head of biceps femoris），雙關節為半腱肌（semitendinosus）。尋點方法：於臀大肌下緣與膕窩之間的中點，進入股二頭肌長頭的內側緣，沿縱向操作並自內側向外推進，以維持在長頭的中間邊緣。此點對抽筋、膝痛效果佳，也可改善下背痛與髖關節問題。\u003C/p\u003E\u003Cp\u003Ere-ge 在股二頭肌的內側邊界中點。我會先辨識內側緣，並以縱向方式觸診，即可確認 re-ge 的位置。\u003C/p\u003E\u003Cp\u003Ere-ge 位於股二頭肌的內側邊緣，處於中點。\u003Cbr /\u003E所以我們感知其內側邊緣，並進行縱向觸診。\u003Cbr /\u003E所以就在這裡，我們可以確認 re-ge。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020550-re-ge-l1.jpeg\" alt=\"re-ge-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020554-re-ge-t1.jpeg\" alt=\"re-ge-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020500-re-ge-t2.jpeg\" alt=\"re-ge-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020504-re-ge-t3.jpeg\" alt=\"re-ge-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020509-re-ge-t4.jpeg\" alt=\"re-ge-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020514-re-ge-t5.jpeg\" alt=\"re-ge-t5\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者彎曲膝蓋\u003Cbr /\u003E用力向後彎曲 患者可能會感覺膕繩肌抽筋\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（屈膝貼臀）：患者屈膝讓腳跟貼近臀部並維持 5 秒；常引發大腿後側（腘繩肌）抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120654-move-ge-re.jpeg\" alt=\"move-ge-re\" /\u003E\u003C/p\u003E"

    "question": "re-ta",
    "answer": "\u003Cp\u003Ere-ta\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：腓腸肌外側頭肌腱交界處\u003C/li\u003E\u003Cli\u003E如何找到：沿外側邊界進入，感覺肌腱交界處\u003C/li\u003E\u003Cli\u003E臨床意義：阿基里斯腱、足跟痛，也可能頸痛、膝痛\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E趴，拉低個人令佢腳背貼床邊\u003C/mark\u003E，手肘直摔，縱向避開內側頭\u003C/li\u003E\u003Cli\u003E動作驗證：足尖行走，詢問是否有牽拉或疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位在腓骨外側肌（peroneus lateralis）的肌腱交界處。單羽狀纖維為比目魚肌（soleus），雙羽狀纖維為腓腸肌外側頭（gastrocnemius lateral belly）。觸診時沿肌腱交界作較多的縱向觸診，以避免滑落到腓腸肌內側頭（gastrocnemius medialis）。常見疼痛包含阿基里斯腱與足跟痛，亦可能出現頸痛、膝痛與肘窩疼痛。\u003C/p\u003E\u003Cp\u003Ere-ta 位於腓腸肌外側頭的肌腱交界處。我會避免碰觸到內側頭，沿外側邊界進入，並在該處以縱向手法操作。\u003C/p\u003E\u003Cp\u003Ere-ta 是腓腸肌外側頭的肌腱結合處。\u003Cbr /\u003E所以要避免碰觸到內側頭，繞過邊緣並在那裡進行縱向操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020556-re-ta-l1.jpeg\" alt=\"re-ta-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020502-re-ta-t1.jpeg\" alt=\"re-ta-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531020507-re-ta-t2.jpeg\" alt=\"re-ta-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E向後-踝部 用腳尖走路\u003Cbr /\u003E詢問患者是否有拉扯感 疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（足尖行走）：患者以足尖行走，我詢問是否有牽拉、緊繃或其他不適。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601120624-move-ta-re.jpeg\" alt=\"move-ta-re\" /\u003E\u003C/p\u003E"

    "question": "re-pe",
    "answer": "\u003Cp\u003Ere-pe\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：在跟骨與第5蹠骨之間，靠近第5蹠骨一點，由小趾外展肌單關節 + 腓骨短肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：第五蹠骨偏近端或跟骨與第五蹠骨之間，感覺小趾外展肌僵硬處\u003C/li\u003E\u003Cli\u003E臨床意義：第五蹠骨扭傷痛、延伸至趾部的疼痛，以及類似足底筋膜炎的表現\u003C/li\u003E\u003Cli\u003E推薦手法：趴，一隻腳青蛙腳45度，脛骨內側和足弓貼床，尺骨或指關節斜向與垂直腳掌摔\u003C/li\u003E\u003Cli\u003E動作驗證：\u003Cmark\u003E要試果隻腳後退半步\u003C/mark\u003E、抬起足跟，讓重量落在第五跖骨，檢查小趾區域銳痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位在足外側，略靠近第五蹠骨近端，介於跟骨與第五蹠骨之間。單關節纖維為小趾外展肌（abductor digiti minimi），雙關節向量為腓骨短肌（peroneus brevis）。小趾外展肌的緊繃可清楚觸及；治療時偏向外側，尋找會「彈跳」的緊繃結構。可用指關節觸診，以尺骨（ulna）進行治療，方向略帶斜向與垂直。典型癥狀包含第五蹠骨扭傷痛、延伸至趾部的疼痛，以及類似足底筋膜炎的表現。\u003C/p\u003E\u003Cp\u003E我會尋找第五蹠骨並偏近近端定位。也可以在跟骨與第五蹠骨之間操作，目標是感受趾小肌（外展小趾肌）的僵硬度。此處即可找到 Retro 點；若使用尺骨（前臂尺側）或指關節施力，則可更貼近目標結構，依需要調整靠近程度。\u003C/p\u003E\u003Cp\u003Ere-pe。所以我們正在尋找第五蹠骨。我們保持在更偏近端的位置。我們甚至可以停在跟骨和第五蹠骨之間，因為我們想感覺到小趾展肌的僵硬度。所以就在那裡，我們可以找到 Retro，但我們甚至可以保持得更近，這取決於你是使用尺骨（手肘）還是指關節。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030515-re-pe-l1.jpeg\" alt=\"re-pe-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030523-re-pe-t1.jpeg\" alt=\"re-pe-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030528-re-pe-t2.jpeg\" alt=\"re-pe-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030535-re-pe-t3.jpeg\" alt=\"re-pe-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030541-re-pe-t4.jpeg\" alt=\"re-pe-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者左腳往後邁半步\u003Cbr /\u003E我們檢查的是左腳\u003Cbr /\u003E患者擡起腳跟 將重量壓在第五跖骨上\u003Cbr /\u003E患者可能感覺小指有尖銳疼痛\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（半步後退負重於第五跖骨）：檢查左足時，我請患者後退半步、擡起足跟，讓重量落在第五跖骨；患者在趾短屈肌群（adductor digitorum 指示的區域）常有銳痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010643-move-pe-re.jpeg\" alt=\"move-pe-re\" /\u003E\u003C/p\u003E"

    "question": "re-sc",
    "answer": "\u003Cp\u003Ere-sc\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：C7 與肩胛棘中點、菱形肌上緣\u003C/li\u003E\u003Cli\u003E如何找到：\u003Cmark\u003E趴，手自然放下，找到 C7 與肩胛棘中點，觸診感覺彈撥邊緣即是\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：頸部、手臂與上背多種癥狀\u003C/li\u003E\u003Cli\u003E推薦手法：趴，自己企係床頭邊，一隻手撑床邊，另一隻手用手肘垂直菱形肌肌腹摔（組織常僵硬）\u003C/li\u003E\u003Cli\u003E動作驗證：企，肩胛骨向後靠攏維持，檢查中背是否緊張或抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位在 C7 與肩胛棘之間的中段。單羽狀纖維為菱形肌（rhomboid），雙羽狀向量為斜方肌中束（middle fibers of trapezius）。兩者關聯密切，取位於 C7 與肩胛棘之間的中點可同時處理此雙向量。可坐姿或俯臥位治療，建議以肘部，因組織常相當僵硬。疼痛可能向上延伸至頸部、向下至手臂，及上背多種癥狀。\u003C/p\u003E\u003Cp\u003Ere-sc 位於小菱形肌的上緣。我會先找到 C7，再找到肩胛骨的棘，兩者之間取中點並進行觸診；當摸到像是邊界、帶有「彈跳」感的結構，即為 re-sc。\u003C/p\u003E\u003Cp\u003Ere-sc 是小圓肌（或小菱形肌，此處指 rhomboid minor 菱形肌）的上邊緣。\u003Cbr /\u003E所以我們找到 C7，我們找到肩胛骨上的肩胛岡，我們走到中點並進行觸診。\u003Cbr /\u003E我們會感覺到一個邊緣、一種彈撥感。\u003Cbr /\u003E那就是 re-sc。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030520-re-sc-l1.jpeg\" alt=\"re-sc-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030524-re-sc-t1.jpeg\" alt=\"re-sc-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030529-re-sc-t2.jpeg\" alt=\"re-sc-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030533-re-sc-t3.jpeg\" alt=\"re-sc-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030537-re-sc-t4.jpeg\" alt=\"re-sc-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者向後縮肩胛骨\u003Cbr /\u003E患者會感覺中間有緊張\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（肩胛後收）：患者盡力將肩胛骨靠攏並維持 5 秒；常在背部中段出現抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010633-move-sc-re.jpeg\" alt=\"move-sc-re\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ere-hu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：三角肌後緣、肩胛棘下方。單關節纖維為大圓肌，雙關節向量為三角肌與肱三頭肌長頭\u003C/li\u003E\u003Cli\u003E如何找到：肩胛骨內側緣沿肩胛棘向外，直到感覺三角肌後緣彈撥\u003C/li\u003E\u003Cli\u003E臨床意義：肩部與手臂放射痛\u003C/li\u003E\u003Cli\u003E推薦手法：趴，肘：自己企一側床頭角，橫向肘摔；指節橫向摔：自己企床頭，另一隻手輕輕固定對側肩膀，\u003Cmark\u003E留意自己前臂方向係摔的方向\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：對方握拳90度曲肘，上臂貼自己，拳心向天，自己一隻手放放方前肩，另一手放鷹嘴上方搜明叫對方向後推臂抗阻，檢查疼痛或無力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位在三角肌後束、靠近棘下肌、肩胛棘下方。單關節纖維為大圓肌（teres major），雙關節向量為三角肌與肱三頭肌長頭（deltoid and long head of triceps）。定位技巧：由肩胛骨內側緣沿肩胛棘走向外側緣，即可觸及三角肌後緣，此處是此筋膜單元的重要組成。典型疼痛在肩部，也可能向下延伸至手臂，並可上行回到肩部。\u003C/p\u003E\u003Cp\u003Ere-hu 位於三角肌的後側邊界。我會先摸到肩胛骨與其棘，向外側移動直到感覺到邊界與彈跳感，這裡就是三角肌後緣；此處為負責後移動作（retroposition）的運動單元所在。\u003C/p\u003E\u003Cp\u003Ere-hu 是三角肌的後邊緣。\u003Cbr /\u003E所以你找到肩胛骨、肩胛骨的肩胛岡，你向外側移動，直到你感覺到一個邊緣的彈撥感。\u003Cbr /\u003E這就是三角肌的後邊緣，這裡有負責後伸動作的運動單位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030527-re-hu-l1.jpeg\" alt=\"re-hu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030532-re-hu-t1.jpeg\" alt=\"re-hu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030536-re-hu-t2.jpeg\" alt=\"re-hu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030541-re-hu-t3.jpeg\" alt=\"re-hu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030546-re-hu-t4.jpeg\" alt=\"re-hu-t4\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-hu vs er-hu\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260607030639-re-hu-vs-er-hu.jpeg\" alt=\"re-hu vs er-hu\" /\u003E\u003C/p\u003E\u003Cp\u003E一樣的動作向後抗阻\u003Cbr /\u003E查看是否有疼痛或無力\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（後推抗阻）：我請患者向後推手臂，觀察肩部是否出現牽拉或疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010610-move-hu-re.jpeg\" alt=\"move-hu-re\" /\u003E\u003C/p\u003E"

    "question": "re-cu",
    "answer": "\u003Cp\u003Ere-cu\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：三角肌平面、肱三頭肌\u003Cmark\u003E外側頭\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E如何找到：\u003Cmark\u003E三角肌末端，向後移動到肱三頭肌外側頭\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E臨床意義：肘部疼痛，也影響肩部\u003C/li\u003E\u003Cli\u003E推薦手法：趴，\u003Cmark\u003E手臂外展90度，掌心向下\u003C/mark\u003E，沿手臂縱向用肘摔（保持在三角肌水平，避免傷橈神經）\u003C/li\u003E\u003Cli\u003E動作驗證：屈肘，肘向下，手指向後，手心向下，同時輕壓手腕和掌背中間靠近前臂，後側痛為陽性\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E定位於三角肌平面水平、肱三頭肌外側頭所在。單關節組成為肱三頭肌外側頭，雙關節為肱三頭肌長頭。治療時需縱向操作，並高度注意橈神經（radial nerve）在此經過：務必維持在三角肌水平，不要往下，因在此區域橈神經由後往前橫向通過。維持縱向操作可避免「彈出」肌肉與神經受傷；若位置過低，可能傷到神經。此點可引發肘部疼痛，也會影響肩部疼痛。\u003C/p\u003E\u003Cp\u003E在 re-cu，我會尋找三角肌的末端，然後沿著肱三頭肌外側頭的後方往後移動並以縱向方式操作。要特別注意遠端有一條橈神經斜向穿過，因此處理時應保持在三角肌水平、沿縱向進行。\u003C/p\u003E\u003Cp\u003Ere-cu。\u003Cbr /\u003E我們正在尋找三角肌的末端。\u003Cbr /\u003E我們向後移動到肱三頭肌的外側頭上方，並進行縱向操作。\u003Cbr /\u003E請注意，在遠端你有一條斜向延伸的橈神經，所以要保持在三角肌水平高度進行縱向操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030523-re-cu-l1.jpeg\" alt=\"re-cu-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030527-re-cu-t1.jpeg\" alt=\"re-cu-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030532-re-cu-t2.jpeg\" alt=\"re-cu-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030536-re-cu-t3.jpeg\" alt=\"re-cu-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E肘部可以同時檢查 患者屈肘\u003Cbr /\u003E然後你用手輕微的將他的手推向肩膀\u003Cbr /\u003E檢查肘部的前側是否有疼痛\u003Cbr /\u003E如果有的話是向前-肘部陽性\u003Cbr /\u003E如果後側疼痛則是向後-肘部\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte／Retro（屈肘同時測試）：我請患者屈肘，同時以手輕壓手掌靠近前臂；若疼痛在肘前方為 Ante，若在鷹嘴（olecranon）為 Retro。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010658-move-cu-an-re.jpeg\" alt=\"move-cu-an-re\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010604-move-cu-an-re2.jpeg\" alt=\"move-cu-an-re2\" /\u003E\u003C/p\u003E"

    "question": "re-ca",
    "answer": "\u003Cp\u003Ere-ca\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：尺側伸腕肌，位置在中間或（手指［1/3］^［1/3］［1/3］手肘），肌腱交界\u003C/li\u003E\u003Cli\u003E如何找到：尺骨外側，中段或中遠1/3交界處\u003C/li\u003E\u003Cli\u003E臨床意義：腕痛，也可能造成肘痛\u003C/li\u003E\u003Cli\u003E推薦手法：\u003Cmark\u003E趴，手擡至頭上，掌手貼床，縱向用指節或手肘摔，貼尺骨邊\u003C/mark\u003E\u003C/li\u003E\u003Cli\u003E動作驗證：站，曲肘90度，上臂貼身體，手指向前，掌手向上，自己一隻手固定對方前臂上，另一隻手擋住對方手背，叫對方手背向下抗阻\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點較難、且可能很深。主要目標為屈腕尺側肌（flexor carpi ulnaris）的單關節部分；其雙關節組成為源自肱骨的肌纖維。治療時沿尺骨作縱向操作；由於此肌可能較小，需將患者手擡至頭上，形成輕度仰掌（supination），讓伸腕尺側肌（extensor carpi ulnaris）更容易辨識並以指關節接觸。沿尺骨小心操作，避免撞擊尺骨骨膜。常見定位在中三分之一、近端肌腱交界處。此點可引起腕痛，也可能造成肘痛。\u003C/p\u003E\u003Cp\u003Ere-ca 位於尺側伸腕肌，位置在尺骨外側。點位可能在中段三分之一，或介於中段與遠端三分之一之間的肌腱交界處。這裡就是 re-ca。\u003C/p\u003E\u003Cp\u003Ere-ca 將會位於尺側伸腕肌中。\u003Cbr /\u003E所以，它位於尺骨的外側。\u003Cbr /\u003E它可以位於中三分之一處，或者位於中三分之一與遠端三分之一之間的肌腱結合處。\u003Cbr /\u003E所以，這就是 re-ca。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030525-re-ca-l1.jpeg\" alt=\"re-ca-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030529-re-ca-t1.jpeg\" alt=\"re-ca-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030534-re-ca-t2.jpeg\" alt=\"re-ca-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030539-re-ca-t3.jpeg\" alt=\"re-ca-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030544-re-ca-t4.jpeg\" alt=\"re-ca-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E推患者的第五掌骨\u003Cbr /\u003E所以患者要做的是尺側外展\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ERetro（第五掌骨壓力）：我於第五掌骨施壓，患者需做伸腕加尺偏。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010644-move-ca-re.jpeg\" alt=\"move-ca-re\" /\u003E\u003C/p\u003E"

    "question": "re-di",
    "answer": "\u003Cp\u003Ere-di\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：小魚際近端1/3外側\u003C/li\u003E\u003Cli\u003E如何找到：小魚際外側近端1/3，感覺僵硬結構\u003C/li\u003E\u003Cli\u003E臨床意義：第五指牽拉感與小魚際痛\u003C/li\u003E\u003Cli\u003E推薦手法：星形多方向\u003C/li\u003E\u003Cli\u003E動作驗證：張開五指抗阻（尤其是第五指），檢查小魚際抽筋\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此點的筋膜觸發由小趾（手第五指）相關肌群構成：單關節為小指外展肌（adductor digiti minimi；原文以此命名），雙關節為小指屈肌（flexor digitorum minimi）。兩者在小魚際隆起（hypothenar eminence）近端、中側匯聚。治療時從此角度切入，沿掌側、沿第五掌骨縱向操作。患者常感覺第五指有被牽拉的緊張感，典型疼痛即在該處。\u003C/p\u003E\u003Cp\u003Ere-di 位於小魚際隆起的外側、近側三分之一。我會在第五掌骨前方以縱向方式操作；在這個水平，即可找到 Retro 點。\u003C/p\u003E\u003Cp\u003Ere-di 將會位於小魚際的外側，近端三分之一處。\u003Cbr /\u003E我們在第五掌骨前方進行縱向操作。\u003Cbr /\u003E在這個水平高度我們有 Retro，你。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030525-re-di-l1.jpeg\" alt=\"re-di-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030530-re-di-t1.jpeg\" alt=\"re-di-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030534-re-di-t2.jpeg\" alt=\"re-di-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531030539-re-di-t3.jpeg\" alt=\"re-di-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E讓患者張開五指\u003Cbr /\u003E讓患者第五手指對抗阻力\u003Cbr /\u003E患者可能感覺小魚際的抽筋\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAnte／Retro（全指外展抗阻）：我請患者所有手指外展並以小指作為阻力測試；患者於小魚際（hypothenar eminence）出現抽筋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260601010643-move-di-re.jpeg\" alt=\"move-di-re\" /\u003E\u003C/p\u003E"

    "question": "me-cp1",
    "answer": "\u003Cp\u003Eme-cp1\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：雙眼內眥、眼輪匝肌緊貼鼻外側，由單關節內直肌 + 雙關節眼輪匝肌組成\u003C/li\u003E\u003Cli\u003E如何找到：\u003Cmark\u003E眼鏡鼻墊位置\u003C/mark\u003E，感覺微小隆起即是\u003C/li\u003E\u003Cli\u003E臨床意義：眼痛、鼻痛、乾眼、額竇放射\u003C/li\u003E\u003Cli\u003E推薦手法：躺，企係佢床頭邊，一隻手護對方額頭，另一隻手疊指或指關節橫向摔\u003C/li\u003E\u003Cli\u003E動作驗證：\u003Cmark\u003E半月形移動檢查內轉追視\u003C/mark\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cp1 位於雙眼的內眥。此處的單關節纖維以內直肌為主，雙關節向量則為眼輪匝肌。身體姿勢上幾乎是面對鼻樑，點位很小，約在眼鏡鼻托接觸鼻樑的微小束狀處。治療時可用雙指尖或指關節精準處理這個小點；病人可能在鼻部出現強烈放射。此點可用於眼痛、鼻痛、乾眼，以及額竇（frontal sinusoid）相關的放射癥狀。若有外傷或手術史，這個點更常見。\u003Cbr /\u003E這是軀幹中唯一具有「機械運動拮抗」功能的中線點，為外側 capua 1 的拮抗點。自此之後，中線在軀幹不再負責運動，改以前側與後側描述。\u003C/p\u003E\u003Cp\u003E這個點位位於眼輪匝肌（orbicularis）中，緊貼著鼻子的外側邊緣，基本上就是眼鏡鼻墊會接觸到的地方。當我們觸摸此處時，可以感覺到一個微小的隆起，這就是 me-cp1 的位置。\u003C/p\u003E\u003Cp\u003Eme-cp1 仍然位於眼輪匝肌中，緊貼著鼻子的外側邊緣。\u003Cbr /\u003E基本上就是眼鏡接觸鼻子的位置。\u003Cbr /\u003E就在這裡，你會感覺到一個微小的突起。\u003Cbr /\u003E那就是我們的 me-cp1。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060528-me-cp1-l1.jpeg\" alt=\"me-cp1-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060533-me-cp1-t1.jpeg\" alt=\"me-cp1-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060538-me-cp1-t2.jpeg\" alt=\"me-cp1-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060542-me-cp1-t3.jpeg\" alt=\"me-cp1-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060546-me-cp1-t4.jpeg\" alt=\"me-cp1-t4\" /\u003E\u003C/p\u003E\u003Cp\u003E向外和向內-頭部1\u003Cbr /\u003E做一個半月形運動 左右各一次\u003Cbr /\u003E檢查右邊\u003Cbr /\u003E向外-頭部1\u003Cbr /\u003E左側的向內-頭部1\u003Cbr /\u003E看眼睛的情況\u003Cbr /\u003E這樣檢查的向外-頭1左側和向內-頭1右側\u003Cbr /\u003E另一邊同理\u003Cbr /\u003E檢查患者的眼球活動是否正常\u003Cbr /\u003E盡量往遠端活動手指\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELateral／Medial（半月弧追視）：我以半月形軌跡帶動手指至右側與左側，檢查右側外轉（latero）與左側內轉（medio）的追視反應。根據患者注視方向，我在本次檢查中先做左外轉與右內轉，並於相反側重複檢查，觀察雙眼同步性及可追視的最遠範圍。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110538-move-me-la-cp1a.jpeg\" alt=\"move-me-la-cp1a\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531110556-move-me-la-cp1b.jpeg\" alt=\"move-me-la-cp1b\" /\u003E\u003C/p\u003E"

    "question": "me-cp2a",
    "answer": "\u003Cp\u003Eme-cp2a\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：人中正中央（鼻下唇上正中線），由提上唇肌為主 + 顴肌雙關節向量\u003C/li\u003E\u003Cli\u003E如何找到：鼻子下方、嘴唇上方正中線\u003C/li\u003E\u003Cli\u003E臨床意義：牙套或矯正後牙齒緊痛、敏感、磨牙\u003C/li\u003E\u003Cli\u003E推薦手法：躺，一隻手固定額頭，另一隻手關節左右觸診/摔\u003C/li\u003E\u003Cli\u003E動作驗證：無（感知中線）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cp2a 位於頭與軀幹的前方正中，沒有右左之分，點就在鼻與上唇之間。單關節纖維以提上唇肌（levator labii superioris）為主，雙關節向量為顴肌（zygomaticus）。此點通常不處理機械性問題，較常見於長期配戴牙套、接受多次手術或齒顎矯正後，病人出現牙齒緊張、疼痛敏感，並可能誘發磨牙；此處高張力會形成惡性循環。檢查時可在左右以指關節觸診，若可觸及僵硬束狀為陽性；觸不到則為陰性。\u003C/p\u003E\u003Cp\u003E此點位在身體正中線上，位於鼻子下方、嘴唇上方，就在人中的正中央。\u003C/p\u003E\u003Cp\u003Eme-cp2a 正好位於嘴唇上方、鼻子下方的正中線上，就在正中間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060556-me-cp2a-l1.jpeg\" alt=\"me-cp2a-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060503-me-cp2a-t1.jpeg\" alt=\"me-cp2a-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060512-me-cp2a-t2.jpeg\" alt=\"me-cp2a-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E向內沒有動作 因為是一條感知鏈\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial：此為感知中線（line of perception），不進行動作。\u003C/li\u003E\u003C/ul\u003E"

    "question": "me-cp2r",
    "answer": "\u003Cp\u003Eme-cp2r\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：前額正中線、顱縫下方\u003C/li\u003E\u003Cli\u003E如何找到：前額正中縫下方，感覺球狀突起或纖維束\u003C/li\u003E\u003Cli\u003E臨床意義：暈眩、失穩、平衡感不足\u003C/li\u003E\u003Cli\u003E推薦手法：多指尖掃查整片區域\u003C/li\u003E\u003Cli\u003E動作驗證：無\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cp2r 位於額頭正中線。此點可引發與額肌（frontalis）相關的張力，並向帽狀腱膜（galea aponeurotica）擴散。觸診時不應觸到束狀物；若可觸及即為陽性。以多指尖同時掃查整片區域，若找到束狀即行處理。病人常感到暈眩、失穩與平衡感不足。\u003C/p\u003E\u003Cp\u003E這個點位同樣在身體正中線上，位於前額，就在顱骨縫線的下方。觸摸時會感覺到一個球狀的突起，這就是 me-cp2r。\u003C/p\u003E\u003Cp\u003E而 me-cp2r 則會位於前額的正中線上，就在這裡的縫合線下方。\u003Cbr /\u003E好的，你會感覺到像是一個纖維束。\u003Cbr /\u003E好的，那個結構就是 me-cp2r。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060545-me-cp2r-l1.jpeg\" alt=\"me-cp2r-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060556-me-cp2r-t1.jpeg\" alt=\"me-cp2r-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060503-me-cp2r-t2.jpeg\" alt=\"me-cp2r-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060509-me-cp2r-t3.jpeg\" alt=\"me-cp2r-t3\" /\u003E\u003C/p\u003E"

    "question": "me-cp3a",
    "answer": "\u003Cp\u003Eme-cp3a\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E位置與組成：下頜正中腱縫（raphae），由顎舌骨肌單關節 + 二腹肌雙關節組成\u003C/li\u003E\u003Cli\u003E如何找到：下巴下方正中縫，輕彈檢查是否有僵硬或彈撥感\u003C/li\u003E\u003Cli\u003E臨床意義：復發性喉嚨痛、咽喉緊勒或痙攣\u003C/li\u003E\u003Cli\u003E推薦手法：指關節左右輕彈\u003C/li\u003E\u003Cli\u003E動作驗證：無\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cp3a 位於下頷正中腱縫（raphae）。單關節成分為顎舌骨肌（mylohyoid），雙關節向量為二腹肌（digastric）。此處為正中一點，可用指關節左右輕彈檢查是否有筋隔感；無則陰性，有則陽性。典型放射是直達扁桃體與咽喉的尖銳感，可對復發性喉嚨痛、咽喉緊勒或痙攣感等癥狀有效。\u003C/p\u003E\u003Cp\u003E此點位位於下巴下方，在內側舌骨肌（medial hyoids）之間的縫隙（raphe）中。我們會在此處感受是否有任何聲響或僵硬感，以判斷縫隙的狀況。\u003C/p\u003E\u003Cp\u003Eme-cp3a  將位於下頜舌骨肌之間的縫（raphae）。\u003Cbr /\u003E所以，我們保持在下巴下方，我們將去感覺這個縫是否有任何喀啦聲、任何因僵硬而產生的彈撥感。\u003Cbr /\u003E這就是 me-cp3a 。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060538-me-cp3a-l1.jpeg\" alt=\"me-cp3a-l1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060546-me-cp3a-t1.jpeg\" alt=\"me-cp3a-t1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060552-me-cp3a-t2.jpeg\" alt=\"me-cp3a-t2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260531060557-me-cp3a-t3.jpeg\" alt=\"me-cp3a-t3\" /\u003E\u003C/p\u003E\u003Cp\u003E向內是一條感知鏈 所以沒有動作\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EMedial：為感知中線，不進行動作。\u003C/li\u003E\u003C/ul\u003E"

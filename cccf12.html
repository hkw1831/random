    "question": "RE-LA-CP 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E顳肌前緣\u003C/li\u003E\u003Cli\u003E頭頂到耳輪中點\u003C/li\u003E\u003Cli\u003E枕骨粗隆和耳輪\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EGB13，本神穴\u003C/li\u003E\u003Cli\u003EGB17，正營穴\u003C/li\u003E\u003Cli\u003EGB19，腦空穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E牙痛，耳鳴，眼周通，視覺混亂，頭痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-頭cf點由3個點構成：第一個在顳窩的前緣，眉毛上方；第二個在頭頂高點與頭旋上緣的中點；第三個在乳突的外側緣\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090453-Me-la-cp.jpeg\" alt=\"Me-la-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 1, 2 和 3 CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cp 2 CF 位於頭頂，re-cp 2、me-cp 2r和 er-cp 2 CC 的牽引力匯合處\u003C/li\u003E\u003Cli\u003Ere-me-cp 1 CF 位於髮際線上，從此處控制 me-cp 1 和 re-cp 1的CC\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 CF 位於枕骨隆突的一側，re-cp 3 和 me-cp 3rCC 的牽引力匯合處\u003C/li\u003E\u003Cli\u003E注意：黃色三角形代表 re-la-cp\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010535-re-me-cp-location.jpeg\" alt=\"re-me-cp-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 1 CF 解剖位置和紅色橫截面線。\u003C/p\u003E\u003Cp\u003E頭顱在紅線水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cp 1 CF 位於眉毛的中間部分\u003C/li\u003E\u003Cli\u003Ere-la-cp 1 CF 位於眉毛中間上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010520-re-la-cp-location1.jpeg\" alt=\"re-la-cp-location1\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 2 CF 解剖位置。\u003C/p\u003E\u003Cp\u003E筋膜在運動知覺中的作用可以從帽狀腱膜張肌的排列推斷出來。\u003C/p\u003E\u003Cp\u003E這些肌肉以這樣一種方式維持了帽狀腱膜的基礎張力，即使是頭部在三個空間平面中的任何一個平面上的細微運動也可以活化感受噐。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cp 1 連接到 me-cp 1 和 re-cp 1 CC\u003C/li\u003E\u003Cli\u003Ere-me-cp 2位於頭頂，前後和側向牽引力匯聚處。\u003C/li\u003E\u003Cli\u003Ean-me-cp 1 連接到 me-cp 1和 an-ср СС\u003C/li\u003E\u003Cli\u003E耳廓肌肉斜牽引帽狀腱鞘\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 連接到 me-cp 3r 和 re-cp 3 CC\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010552-re-me-cp-location2.jpeg\" alt=\"re-me-cp-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 2解剖位置和橫截面線\u003C/p\u003E\u003Cp\u003E顱骨穿過上頜骨的斜截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cp 2 CF 位於顱骨頂端\u003C/li\u003E\u003Cli\u003Ere-la-cp 2 CF 位於頂骨的隆起處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010536-re-la-cp-location2.jpeg\" alt=\"re-la-cp-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 3 CF 解剖位置•\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E帽狀腱膜，切片強調覆蓋顳肌的顱骨上筋膜。\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 CF 位於枕骨突的側邊，帽狀腱膜與頸筋膜和枕肌也附著在此。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-cp-location3.jpeg\" alt=\"re-me-cp-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 3 CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E顱骨通過下領骨的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cp 3 CF 位於 SCM 的附著處，在乳突水平。\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 CF 位於頂葉隆突的側邊\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010550-re-la-cp-location3.jpeg\" alt=\"re-la-cp-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用中指和食指的指尖進行觸診驗證，而使用指關節進行治療更容易。\u003Cbr /\u003E此點可在眉毛中間的上方找到，或者在額頭的中間，或者靠近髮際線處（針灸穴位 GB14 • 15) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010526-re-la-cp1-treatment.jpeg\" alt=\"re-la-cp1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿或俯臥，頭靠在治療床上。治療師在頭骨上尋找與頂骨突起相對應的緻密點，然後鬆動該點直到彈性恢復（針灸穴位 GB 17-18) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010542-re-la-cp2-treatment.jpeg\" alt=\"re-la-cp2-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿或俯臥，頭靠在治療床上。治療師尋找乳突後方和上方最敏感的點，然後用指關節操作此點，直到疼痛消失（針灸穴位GB 19 • GB 11) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010557-re-la-cp3-treatment.jpeg\" alt=\"re-la-cp3-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）位于颞肌前缘，额骨、顶骨和蝶骨连接处的冠状缝上。\u003Cbr /\u003E2） 颅顶高点和耳轮连线的中点。\u003Cbr /\u003E3）枕骨粗隆和耳轮连线的中点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070545-re-la-cp-o-pave.jpeg\" alt=\"re-la-cp-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，头转向一侧，治疗师用指节松解颞前区筋膜。治疗第二个子单元时，可取同一体位，而治疗第三个子单元时患者最好取坐位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070551-re-la-cp-o-treatment.jpeg\" alt=\"re-la-cp-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-CP 障礙",
    "answer": "\u003Cp\u003Ere-la-cp 1 融合中心 （CF）的功能障礙。\u003Cbr /\u003E這三個 re-la-cp CF 有以下共同的適應症：頭痛、眩暈和心因性障礙。\u003Cbr /\u003Ere-la-cp 1 CF 具有以下特定或局部適應症：眶緣疼痛、視力障礙、眼瞼痙攣和眼瞼下垂。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010555-re-la-cp1-cp.jpeg\" alt=\"re-la-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 2融合中心（CF）的功能障礙\u003Cbr /\u003E頭骨的 CF 會影響帽狀腱膜的彈性，這是感知三維空間以及自己身體的基本要素。來自 re-la-cp 2 CF 的傳入訊息的改變會導致身體和心理平衡的紊亂。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010501-re-la-cp2-cp.jpeg\" alt=\"re-la-cp2-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 3融合中心（CF）的功能障礙。\u003Cbr /\u003E顳骨的乳突部分。乳突為二腹肌、頭夾肌和胸鎖乳突肌附著處。此穴位適用於聽覺障礙（耳鳴、中耳炎）和頸椎僵直。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010507-re-la-cp3-cp.jpeg\" alt=\"re-la-cp3-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E牙痛、头痛、耳鸣，咀嚼也出现问题。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E头痛是多发的问题之一。感觉器官位于颅骨内，为正常行使功能，要求其筋膜维持完好的基础张力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070540-re-la-cp-o-cp.jpeg\" alt=\"re-la-cp-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-CL 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頭夾肌上，平頸2/3\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ETE17，翳風穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頭、面、頸部不適\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-頸cf點位於頭夾肌的乳突腱上，對應針灸的翳風穴（TE 17）及枕下肌群的觸發點（TP）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090458-Me-la-cl.jpeg\" alt=\"Me-la-cl\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cl CF 位於斜方肌和胸鎖乳突肌之間的溝\u003C/li\u003E\u003Cli\u003Ere-me-cl CF 位於頸部項韌帶的一側，從第一頸椎（針灸穴位 VG 15） 延伸到第七頸椎（針灸穴位 VG 14) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010553-re-me-cl-location.jpeg\" alt=\"re-me-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cI CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E頸部在第五頸椎水平橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cl CF 位於斜方肌和提肩胛肌之間的溝中\u003C/li\u003E\u003Cli\u003Ere-me-cl CF 位於頸部項韌帶的側邊\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520090534-re-la-cl-location.jpeg\" alt=\"re-la-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514100545-re-la-cl3.jpeg\" alt=\"re-la-cl3\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514100548-re-la-cl4.jpeg\" alt=\"re-la-cl4\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cl 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿，額頭靠在治療床上。此CF 的操作是在位於提肩胛肌後方的夾肌和半棘肌的筋膜上進行（針灸穴位 LI 17）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520090540-re-la-cl-pave-treatment.jpeg\" alt=\"re-la-cl-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）如果触诊时发现CF 比节段性 CC 更致密，则以操作此CF 先，因力解决此点同时能影响其他两个点。\u003Cbr /\u003E有痛感的运动：患者会提到当颈部旋转和伸展时肩部疼痛加剧（用推挤试验鉴别椎间盘病变）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080528-re-la-cl-o-pave.jpeg\" alt=\"re-la-cl-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取坐位，头部置于手上，筋膜治疗师用指节在乳突上的多束肌肉止点上操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080533-re-la-cl-o-treatment.jpeg\" alt=\"re-la-cl-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-CL 障礙",
    "answer": "\u003Cp\u003Ere-la-cl 融合中心 （CF）的功能障礙。\u003Cbr /\u003Ere-la-cl CF 的緻密化導致頸部僵硬，有時會導致上肢疼痛和感覺異常。此CF 的緻密化通常會導致沿同名對角線的張力代償。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520090515-re-la-cl-cp.jpeg\" alt=\"re-la-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cl 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E治療師將患者的頭部向前外側移動時，向左和向右移動，患者被要求覺察他們感到最大壓力的位置。當僅有單側有緊繃感，表示此為緻密的部份。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520090520-re-la-cl-move-p.jpeg\" alt=\"re-la-cl-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cl 融合中心（CF）的主動動作驗證\u003Cbr /\u003E治療師將一手放在患者的頭部，並在患者向後側向移動頭部和頸部時施加阻力。然後在另一側重複相同的動作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520090527-re-la-cl-move-a.jpeg\" alt=\"re-la-cl-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E乳突和颈部后侧和外侧疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E对于一般颈强直，可处理后-颈（re-cl）、外-颈（la-cl）的CC 以及后-外-颈（re-la-cl）的 CF，因为胸锁乳突肌（外）和部分竖脊肌（后）会在此处汇聚。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080524-re-la-cl-o-cp.jpeg\" alt=\"re-la-cl-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-TH 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛骨內側緣，斜方肌下緣，ER-TH（魄戶穴）下，LA-TH（膈關穴）上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL44，神堂穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛骨和胸部疼痛及內臟牽涉痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點位於斜方肌的下緣，對應針灸的膈關穴（BL 46）。\u003C/p\u003E\u003Cp\u003E此cf點位於第七胸椎水平的斜方肌下緣上，對應針灸神堂穴 （BL44）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090402-Me-la-th.jpeg\" alt=\"Me-la-th\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 1,2和3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 1 CF 上的 re-me-cl CF 的牽引力\u003C/li\u003E\u003Cli\u003Ere-me-th 1 CF 位於第一至三節胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於第四至第七胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-la-th CF 位於肩胛骨下角水平\u003C/li\u003E\u003Cli\u003Ere-me-th 3 CF 位於第8 至第 11 胸椎棘突側面\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010519-re-me-th-location.jpeg\" alt=\"re-me-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 2 CF 位於 me-th 和 re-th 的 CC之間，在胸棘肌的中間。\u003C/li\u003E\u003Cli\u003Ere-me-th 1 和 re-me-th 3 CF 位於胸椎的起點和棘肌終點。\u003C/li\u003E\u003Cli\u003E三個 re-me-th CF 作用於 re-th 和 me-thr 的 CC，對抗 an-me-th CF \u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於 re-th 和 me-th r 的 CC 之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此圖中，後向序列的胸最長肌已被移除，以突顯 re-me-th 動作序列的脊肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010537-re-me-th-location2.jpeg\" alt=\"re-me-th-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 1 CF 位於第一至三節胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於胸最長肌 （re-th）的肌腹和胸椎棘突（me-th）之間\u003C/li\u003E\u003Cli\u003Ere-me-th 3 CF 與胸脊肌，在這張照片中被胸最長肌覆蓋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010554-re-me-th-location3.jpeg\" alt=\"re-me-th-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-th 解剖位置。\u003C/p\u003E\u003Cp\u003E胸部第五胸椎的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th CF 位於胸椎棘突和豎脊肌之間\u003C/li\u003E\u003Cli\u003Ere-la-th CF 位於斜方肌邊界下方，肩胛骨内側。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100509-re-la-th-location.jpeg\" alt=\"re-la-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514060547-Re-la-th1.jpeg\" alt=\"Re-la-th1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514060550-Re-la-th2.jpeg\" alt=\"Re-la-th2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-th 融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師透過觸診斜方肌的下緣和延伸至闊背肌的筋膜來尋找緻密點，可以用指關節或肘部（針灸穴位 BL 45-46）進行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100524-re-la-th-pave-treatment.jpeg\" alt=\"re-la-th-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）此CF 位于外旋-胸节段的CC下方，外-胸CC 的上方，解剖上讲，是位于斜方肌下缘。\u003Cbr /\u003E有痛感的运动：患者会讲到背部旋转和伸展过度时疼痛加剧（用Kemp 试验评估椎间盘疾病）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080519-re-la-th-o-pave.jpeg\" alt=\"re-la-th-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，手臂伸展于两侧；治疗师松解斜方肌下缘，持续操作最敏感的点。传导痛的分布范围和治疗外旋-胸CC 时所触发的疼痛位置相似。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080523-re-la-th-o-treatment.jpeg\" alt=\"re-la-th-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-TH 障礙",
    "answer": "\u003Cp\u003Ere-la-th 融合中心 （CF）的功能障礙。\u003Cbr /\u003E背痛，主要在單側，可能延伸到頸部、肩部或下背部的同側。肩胛骨間區域或肩胛骨下角以下的劇烈刺痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520090546-re-la-th-cp.jpeg\" alt=\"re-la-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-th 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E治療師站在患者身後，將患者的胸部拉向一側，以拉伸背部區域的外側筋膜。如果髂肋肌筋膜緻密，那麼患者會感覺到被拉伸的一側有緊繃或疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520090551-re-la-th-move-p.jpeg\" alt=\"re-la-th-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-th 融合中心 （CF）的主動動作驗證\u003Cbr /\u003E當治療師施加阻力時，患者將肩胛骨向後推向一側。在這種抵抗阻力期間，患者可能會經歷某種類型的肩胛間痙攣或力量喪失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100502-re-la-th-move-a.jpeg\" alt=\"re-la-th-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E伸展，侧屈和旋转时出现背痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E只有该部位四层肌肉的筋膜之间滑动完好，才能保证运动时不伴有痉挛或刺痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080515-re-la-th-o-cp.jpeg\" alt=\"re-la-th-o-cp\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-LU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E背闊肌中點，下後鋸肌上緣，肋骨上髂肋肌附著點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL50，胃倉穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E下背痛，臀部痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點位於豎脊肌旁的第十二肋上，對應針灸的胃倉穴 （BL 50）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090407-Me-la-lu.jpeg\" alt=\"Me-la-lu\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-lu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-lu 1 CF 位於 re-lu 和 me-lu 的CC中間，在第一和第二腰椎水平。\u003C/li\u003E\u003Cli\u003Ere-la-lu CF 位於第12根肋骨，腰方肌附著處。\u003C/li\u003E\u003Cli\u003Ere-me-lu 2 CF 位於第3 和第4腰椎棘突側邊，多裂肌上方。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010556-re-me-lu-location.jpeg\" alt=\"re-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-lu CF 解剖位置。\u003C/p\u003E\u003Cp\u003E胃部繫膜穿過第二腰椎橫斷面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-lu CF 位於腰椎棘突和豎脊肌之間\u003C/li\u003E\u003Cli\u003Ere-la-lu CF 位於腹腰三層筋膜融合點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100534-re-la-lu-location.jpeg\" alt=\"re-la-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514060521-Re-la-lu2.jpeg\" alt=\"Re-la-lu2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-lu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。使用食指關節，在第12根肋骨下方操作，此處為腰方肌和後下鋸肌附著點（針灸穴位 BL 50）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100541-re-la-lu-pave-treatment.jpeg\" alt=\"re-la-lu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）此CF 位于背阔肌中部，后下锯肌上缘上，骼肋肌的肋骨止点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080544-re-la-lu-o-pave.jpeg\" alt=\"re-la-lu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，治疗师用指节或肘部松解多个肌肉层面，在阻力最大的点上持续做。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080549-re-la-lu-o-treatment.jpeg\" alt=\"re-la-lu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-LU 障礙",
    "answer": "\u003Cp\u003Ere-la-lu 融合中心（CF）的功能障礙。\u003Cbr /\u003E患者可能會被診斷為腰痛，但在詢問病史時發現疼痛普遍發生在一側，且在後向一外向一外旋的運動策略中會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100512-re-la-lu-cp.jpeg\" alt=\"re-la-lu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-lu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E治療師將一手放在患者的肩膀上，另一手放在髂嵴上，然後將軀幹向前推向一側。要求患者報告他們是否感到下背部一側疼痛。在另一側也要進行同樣的動作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100517-re-la-lu-move-p.jpeg\" alt=\"re-la-lu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-lu CF抵抗阻力的運動驗證。\u003Cbr /\u003E對患者的肩胛骨施加阻力，然後要求患者將軀幹向後移到同一側。該測試驗證了 re-la-Iu CF 的強度。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100527-re-la-lu-pave-a.jpeg\" alt=\"re-la-lu-pave-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC点\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E扭转、侧屈及伸展时出现腰痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E筋膜之间的纤维化会在相关肌筋膜\u003Cbr /\u003E单元中产生一系列干扰，而不是节段性CC的特定疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080540-re-la-lu-o-cp.jpeg\" alt=\"re-la-lu-o-cp\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-PV 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髂後上棘下，外側緣上，平第二骶孔\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL53，胞肓穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E骶髂關節紊亂，坐骨神經痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點位於髂後上棘旁。它對應針灸的胞肓穴（BL 53）。治療這個cf 點可以解決某些坐骨神經痛®，還可以提高骶骼韌帶的筋膜流動性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090412-Me-la-pv.jpeg\" alt=\"Me-la-pv\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pv 1和2CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pv 1 CF 位於在第一和第二薦骨孔連線上\u003C/li\u003E\u003Cli\u003Ere-me-pv 2 CF 位於第3和第4薦骨孔上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010542-re-me-pv-location.jpeg\" alt=\"re-me-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pv 1和2CF 解剖位置。\u003C/p\u003E\u003Cp\u003E下腹通過恥骨聯合的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pv CF 位於薦骨棘突和薦髂關節之間\u003C/li\u003E\u003Cli\u003Ere-la-pv CF 位於髂後上棘和下棘側邊，臀大肌的終止點處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100504-re-la-pv-location.jpeg\" alt=\"re-la-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514060518-Re-la-pv1.jpeg\" alt=\"Re-la-pv1\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pv 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或側臥。治療師於髂後上棘的外緣操作，以對後薦髂韌帶的上部有所作用（針灸穴位 BL 53）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100555-re-la-pv-pave-treatment.jpeg\" alt=\"re-la-pv-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pv 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師操作後薦髂韌帶的下部。\u003Cbr /\u003E該韌帶起源於外側薦骨並嵌入髂骨後緣，位於薦後棘之間的空間（針灸穴位 BL 30）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100512-re-la-pv-pave-treatment.jpeg\" alt=\"re-la-pv-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）后-盆（re-pv）的CC位于骼后上棘内侧，外-盆（re-pv）的ce 点位于臀大肌上缘，此CF 位于骼后上棘外缘。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080526-re-la-pv-o-pave.jpeg\" alt=\"re-la-pv-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E此CF 常和骨盆-外的CC一同治疗。\u003Cbr /\u003E为此，患者侧卧，以便治疗师交替操作臀大肌（外-盆）及后-外-盆的CF。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080531-re-la-pv-o-treatment.jpeg\" alt=\"re-la-pv-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-PV 障礙",
    "answer": "\u003Cp\u003Ere-la-pv 融合中心（CF）的功能障礙。\u003Cbr /\u003E患者抱怨臀部和大腿疼痛，當他們坐著或不得不長時間站立時會加劇。診斷可能是薦骼關節炎。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100541-re-la-pv-cp.jpeg\" alt=\"re-la-pv-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E re-la-pv 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E要求患者將手從同側大腿外側下滑。在這個動作中，re-la-pv CF 被壓縮；因此，如果CF 緻密，則可能會在薦髂關節中引發疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100546-re-la-pv-move-a.jpeg\" alt=\"re-la-pv-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC点\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E由于止于此区域的韧带受牵拉而引起骶骨痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E竖脊肌纤维、臀中肌纤维及臀大肌纤维止于髂后上棘，这些肌肉在躯干伸展时必须同步运动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080521-re-la-pv-o-cp.jpeg\" alt=\"re-la-pv-o-cp\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-CX 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E坐骨結節外側與大轉子之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL.36，承扶穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E坐骨神經痛，膕繩肌緊張\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-髖cf點位於坐骨結節外側與大轉子之間。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的承扶穴（BL36）。治療這個 cf 點可以減輕 Cyriax 法用注射來治療的臀下滑囊炎，以及 Maigne 法用被動拉伸來治療的轉子滑囊炎。這些方法當然會有好的效果，但它們針對的是炎癥而不是引起炎癥的原因--肌筋膜失衡。\u003C/p\u003E\u003Cp\u003E雙側後-外--髖cf點位於環繞臀大肌下部的膠原纖維上，這些螺旋形纖維與髂脛束、臀中肌及腹外斜肌的筋膜相連。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090422-Me-la-cx.jpeg\" alt=\"Me-la-cx\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cx CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cx CF 位於大轉子和坐骨結節，臀摺的一半。\u003C/li\u003E\u003Cli\u003Ere-me-cx CF 位於尾骨的側邊\u003C/li\u003E\u003Cli\u003Ere-me-ge CF 的遠近端牽引力在 re-me-cx 動作過程中轉化為協同作用\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010551-re-me-cx-location.jpeg\" alt=\"re-me-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cx CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E大腿橫截面圖，垂直股骨頸的軸線。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cx CF 位於尾骨的側邊，臀大肌的邊界。\u003C/li\u003E\u003Cli\u003Ere-la-cx CF 位於坐骨結節和大轉子之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100525-re-la-cx-location.jpeg\" alt=\"re-la-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514070521-Re-la-cx2.jpeg\" alt=\"Re-la-cx2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cx 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師用肘部尋找坐骨結節和大轉子之間的緻密和敏感點。然後沿著溝縱向操作該點（針灸穴位 BL 36）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100531-re-la-cx-pave-treatment.jpeg\" alt=\"re-la-cx-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）指尖力度很难深入肌肉团块，治疗师需用肘关节触诊这个 CF。\u003Cbr /\u003E有痛感的运动：患者主诉侧卧时（梨状肌牵拉试验）可感觉到大腿明显紧张。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080515-re-la-cx-o-pave.jpeg\" alt=\"re-la-cx-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧并屈曲下肢，治疗师用肘关节操作坐骨结节外侧，直至症状缓解。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080520-re-la-cx-o-treatment.jpeg\" alt=\"re-la-cx-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-GE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股二頭肌肌腱遠端內側\u003C/li\u003E\u003Cli\u003E腓腸肌外側近端，腓骨頭後\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL38，浮郄穴\u003C/li\u003E\u003Cli\u003EBL55，合陽穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E膝後外側疼痛，股二頭肌肌腱炎，外側半月板損傷\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-膝融合中心由兩個點構成：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一個在股二頭肌的遠端肌腱上，\u003C/li\u003E\u003Cli\u003E第二個在腓腸肌外側頭的近端。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腓腸肌的外側頭參與膝關節的後向運動及外向穩定。此cf點對應針灸的委中穴（BL 40）和浮郄穴（BL 38）（膝陽關 /GB 33）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090428-Me-la-ge.jpeg\" alt=\"Me-la-ge\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ge 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-ge 1 CF 位於股二頭肌的肌腱通道上\u003C/li\u003E\u003Cli\u003Ere-la-ge 2 CF 位於外側腓腸肌近端處，作用於膝關節後向動作。\u003C/li\u003E\u003Cli\u003Ere-la-ta CF 的遠近端牽引力在 re-la-ge 動作過程中轉化為協同作用\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010520-re-me-ge-location.jpeg\" alt=\"re-me-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ge 1 和2 CF 解剖位置。\u003C/p\u003E\u003Cp\u003E膝部通過股骨髁的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-ge CF 位於腓腸肌（内側頭）、半腱肌和半膜肌上方\u003C/li\u003E\u003Cli\u003Ere-la-ge CF 位於腓腸肌（外側頭）和蹠肌上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100541-re-la-ge-location.jpeg\" alt=\"re-la-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514070501-Re-la-ge3.jpeg\" alt=\"Re-la-ge3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ge 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師使用食指的指關節在股二頭肌遠端肌腱上尋找膕肌外側近端的任何緻密點，然後將這部份的膕肌支持帶沿縱向操作（針灸穴位 BL 38、39）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100531-re-la-ge1-pave-treatment.jpeg\" alt=\"re-la-ge1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ge 2融合中心（CF）的治療。\u003Cbr /\u003E患者俯臥。治療師將指關節放在外側腓腸肌的肌腱通道上，一旦確定緻密化，就在橫向操作該點（針灸穴位 BL 55）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100548-re-la-ge2-treatment.jpeg\" alt=\"re-la-ge2-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）位于股二头肌远侧肌腱中部；\u003Cbr /\u003E2） 外侧腓肠肌近侧，腓骨头后侧。\u003Cbr /\u003E有痛感的运动：患者主诉在过伸膝关节时能感觉到肌肉阻力（膝关节过伸试验，用于评估半月板病）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080533-re-la-ge-o-pave.jpeg\" alt=\"re-la-ge-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E熟练的手极为敏感，能快速找到阻力更强的点位，操作此点位直到组织恢复顺滑，且不需患者通过描述加以引导。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080539-re-la-ge-o-treatment.jpeg\" alt=\"re-la-ge-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-GE 障礙",
    "answer": "\u003Cp\u003Ere-la-ge 融合中心（CF）的功能障礙。\u003Cbr /\u003E膝關節後外側部位疼痛和腫脹。下肢功能障礙。患者感覺他們的膝蓋僵硬且受束縛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100520-re-la-ge-cp.jpeg\" alt=\"re-la-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ge 融合中心 （CF）的動作驗證\u003Cbr /\u003E患者仰臥或站姿。與 re-la-ge 1和2 CF 相連的筋膜之緻密化在縮短過程中比在延長過程中更容易顯現。因此，患者被要求最大限度地彎曲膝蓋，無論是躺著還是從站姿下\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100524-re-la-ge-move.jpeg\" alt=\"re-la-ge-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC点\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E膝部、小腿及大腿疼痛，或见于单节段，或见于三个节段。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E腓肠肌和股二头肌都有张力性纤维附着在胭窝支持带上，这个支持带发挥了筋膜连结的作用，使这两块肌肉能同步活动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080527-re-la-ge-o-cp.jpeg\" alt=\"re-la-ge-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-TA 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E跟腱和腓骨肌之間\u003C/li\u003E\u003Cli\u003E腓骨長肌和腓骨短肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL59，跗陽穴\u003C/li\u003E\u003Cli\u003EGB39，懸鐘穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腓骨肌腱炎，踝關節失穩\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090436-Me-la-ta.jpeg\" alt=\"Me-la-ta\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-ta 1 CF 位於跟腱和腓骨邊界之間\u003C/li\u003E\u003Cli\u003Ere-la-ta 2 CF 位於外踝近端，腓骨後方。\u003C/li\u003E\u003Cli\u003Ere-me-ta 1 CF 位於跟腱和屈趾肌之間的溝中\u003C/li\u003E\u003Cli\u003Ere-me-ta 2 CF 位於與上述相同的溝中，但稍遠一些。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010548-re-me-ta-location.jpeg\" alt=\"re-me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cp\u003E腿部下三分之一在踝骨上方的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-ta CF 位於覆蓋屈肌肌腱的支持帶上\u003C/li\u003E\u003Cli\u003Ere-la-ta CF 位於覆蓋兩塊腓骨肌的支持帶上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120558-re-la-ta-location.jpeg\" alt=\"re-la-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 1融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥或俯臥。治療師觸診驗證在腓骨後方進行，對著腓骨長肌和短肌的肌腱通道進行治療（針灸穴位 BL 59）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120548-re-la-ta1-pave-treatment.jpeg\" alt=\"re-la-ta1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師的指關節來操作覆蓋腓骨長肌和短肌的筋膜的後部和遠端部（針灸穴位 GB 39）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120504-re-la-ta2-pave-treatment.jpeg\" alt=\"re-la-ta2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E此融合中心有两个子单元：\u003Cbr /\u003E1）在跟腱与腓侧筋膜腔室之间\u003Cbr /\u003E2）位于排骨长肌与腓骨短肌肌腱上\u003Cbr /\u003E有痛感的运动：患者主诉踝关节外侧失稳（内翻试验或被动牵拉跟腓韧带）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080524-re-la-ta-o-pave.jpeg\" alt=\"re-la-ta-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E腓骨肌引起足外翻，有时同步介人，有时不同步。筋膜张力来调节这种同步-异步现象，然而如果此张力不完善，就会产生摩擦，后续伴发炎症。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080529-re-la-ta-o-treatment.jpeg\" alt=\"re-la-ta-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-TA 障礙",
    "answer": "\u003Cp\u003Ere-la-ta 融合中心 （CF）的功能障礙\u003Cbr /\u003E下肢緊繃且無力。腳踝運動不協調。此為腳踝扭傷的後果。脛跗關節韌帶鬆弛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120536-re-la-ta-cp.jpeg\" alt=\"re-la-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 融合中心 （CF）的被動動作驗證\u003Cbr /\u003Ere-la-ta 1 和 2 CF 與 re-la-pe 1 • 2 和 3 CF\u003Cbr /\u003E的動作驗證相同，但患者在小腿外側最能感覺到張力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120541-re-la-ta-move-p.jpeg\" alt=\"re-la-ta-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC点\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E踝关节疼痛，腓骨肌肌腱炎，坐骨神经样疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E踝前支持带连接腓骨肌，或与向后外移动踝关节的力相联系。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080519-re-la-ta-o-cp.jpeg\" alt=\"re-la-ta-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-PE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E外踝與跟腱之間\u003C/li\u003E\u003Cli\u003E跟腱外側\u003C/li\u003E\u003Cli\u003E外課最高點下\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL60，昆侖穴\u003C/li\u003E\u003Cli\u003EBL61，仆參穴\u003C/li\u003E\u003Cli\u003EBL62，申脈穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E足跟痛，跟腱炎，外踝痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-足cf點由位於外踝後的3個點構成：第一個位於腓骨肌上支持帶，第二個在跟腱附著點的外側，而第三個在腓骨肌下支持帶上。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的昆侖（經穴）、仆參、申脈和金門穴（BL 60、61、62 和63）。筋膜手法治療師必須在最敏感、致密的點上操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090443-Me-la-pe.jpeg\" alt=\"Me-la-pe\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 2 解剖位置。\u003Cbr /\u003Ere-me-pe 2 CF 位於跟骨粗隆的内側表面，\u003Cbr /\u003E屈肌支持帶中間束的附著點。在某種程度上，這一層與伸肌的支持帶相連。\u003Cbr /\u003E屈肌支持帶分為兩層：一層與小腿深筋膜和腓骨支持帶相連；另一層與小腿筋膜的淺層相連，後者在後面環繞小腿三頭肌肌腱，在前面以環形方式與屈肌支持帶相連。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E屈肌支持帶覆蓋三角韌帶和跗骨隧道\u003C/li\u003E\u003Cli\u003E屈肌的淺層支持帶嵌入拇外展肌：這深層可嵌入足底方肌。\u003C/li\u003E\u003Cli\u003E足距的屈肌支持帶包含在肌筋膜内，與筋膜一樣，它由兩個薄層組成，一個淺的和一個深的。這些層板與形成腓骨支持帶的兩個層板相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010534-re-me-pe-location2.jpeg\" alt=\"re-me-pe-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E足部在距骨、舟狀骨和骰骨的水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-pe CF 位於腓骨短肌和長肌腱之間\u003C/li\u003E\u003Cli\u003Ere-me-pe CF 位於脛後肌和外展拇肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120536-re-la-pe-location.jpeg\" alt=\"re-la-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 1、23CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-pe 1 CF 位於腓骨上支持帶\u003C/li\u003E\u003Cli\u003Ere-la-pe 3 CF 位於腓骨下支持帶\u003C/li\u003E\u003Cli\u003Ere-la-pe 2 CF 位於腓骨的中間支持帶\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120556-re-la-pe-location2.jpeg\" alt=\"re-la-pe-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-pe 3 CF 位於外踝下方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120513-re-la-pe-location3.jpeg\" alt=\"re-la-pe-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師用指尖尋找腓骨骨膜上部的緻密點。該支持帶是雙層的：深層與小腿深筋膜相連，淺層與小腿淺層相連（針灸穴位 BL 60）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120542-re-la-pe1-pave-treatment.jpeg\" alt=\"re-la-pe1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。腓骨支持帶的中間帶嵌入跟骨的外側表面，是由兩個腓骨肌肉形成的兩個骨纖維通道（針灸穴位 BL 61）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120503-re-la-pe2-pave-treatment.jpeg\" alt=\"re-la-pe2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師使用中指的指尖尋找腓骨下支持帶的任何緻密變化，此支持帶在十字形支持帶上方連續（針灸穴位 BL 62）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120519-re-la-pe3-pave-treatment.jpeg\" alt=\"re-la-pe3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E此融合中心包括三个子单元以对上腓骨支持带和下腓骨支持带产生\u003Cbr /\u003E影响：\u003Cbr /\u003E1）外踝与跟腱之间；\u003Cbr /\u003E2）跟腱的骨性止点同水平外侧；\u003Cbr /\u003E3）外踝尖正下方。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080518-re-la-pe-o-pave.jpeg\" alt=\"re-la-pe-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E在触诊检查中，选取某个子单元集中进行较长时间操作。螺旋线起自手足，因此这些节段的CF 能协助诊断哪条螺旋线发生功能障碍。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080523-re-la-pe-o-treatment.jpeg\" alt=\"re-la-pe-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-PE 障礙",
    "answer": "\u003Cp\u003Ere-la-pe 融合中心（CF）的功能障礙。\u003Cbr /\u003E支持帶的主要功能是透過與高爾基氏肌腱器官相互作用來協調運動。腓骨上支持帶根據距骨節段的位置使肌腱的角度改變，而下支持帶根據前足的位置與肌腱相互作用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120517-re-la-pe-cp.jpeg\" alt=\"re-la-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E患者仰臥。為了被動拉伸腓骨支持帶，治療師牢牢抓住患者的前足，並向內側和背側移動。患者可能會感到腳外側有疼痛的緊繃感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120522-re-la-pe-move-p.jpeg\" alt=\"re-la-pe-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E患者仰臥。從上述最大伸展位置，要求患者抵抗阻力向下和向外移動他們的腳，從而活化 re-la-pe CF •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120529-re-la-pe-move-a.jpeg\" alt=\"re-la-pe-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC点\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E足痛，类坐骨神经痛，肌腱炎，痛性营养不良以及肌腱端病。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E跟骨是小腿三头肌及足部肌肉的附着点，多条支持带分布于此，表明了它在整个下肢周围运动结构中的重要性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080513-re-la-pe-o-cp.jpeg\" alt=\"re-la-pe-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-SC 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E岡上肌筋膜中點；\u003C/li\u003E\u003Cli\u003E肩鎖韌帶和遠端\u003C/li\u003E\u003Cli\u003E岡上肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI12，秉風穴\u003C/li\u003E\u003Cli\u003ELI16，巨骨穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩鎖關節疼痛，岡上肌疼痛，頸椎疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-肩 cf點位於岡上窩的內側部，斜方肌與肩胛提肌共同作於肩胛骨，可以將肩胛骨上提及後移。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090448-Me-la-sc.jpeg\" alt=\"Me-la-sc\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-sc 1, 2 和 re-la-sc 1,2CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-sc 1 CF 位於斜方肌的前緣，沿著乳頭線。\u003C/li\u003E\u003Cli\u003Ere-la-sc 2 CF 位於肩鎖關節上方\u003C/li\u003E\u003Cli\u003Ere-me-sc 1 CF位於棘上窩内側\u003C/li\u003E\u003Cli\u003Ere-me-sc 2 CF 位於棘上窩中央\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010532-re-me-sc-location.jpeg\" alt=\"re-me-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-sc 1 and 2 CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E第二胸椎水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-sc CF 位於棘上窩内側緣\u003C/li\u003E\u003Cli\u003Ere-la-sc 2 CF 位於肩鎖韌帶上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120541-re-la-sc-location.jpeg\" alt=\"re-la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-sc 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿。對位於斜方肌在鎖骨終止點上方的筋膜進行觸診驗證和治療。透過從肌肉的中心向前移動來進行治療（針灸穴位 GB21) \u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120528-re-la-sc1-pave-treatment.jpeg\" alt=\"re-la-sc1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-sc 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿。治療師用指關節操作肩鎖韌帶，直到患者主述疼痛，包括任何牽涉的疼痛，已經消失（針灸穴位 LI 16）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120548-re-la-sc2-pave-treatment.jpeg\" alt=\"re-la-sc2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）冈上肌筋膜中部；\u003Cbr /\u003E2）肩锁韧带。\u003Cbr /\u003E有痛感的运动：被动抬肩之后，患者无法抗阻维持姿势，且手臂会突然坠落（肩坠落试验，用于鉴别肩袖病变）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070515-re-la-sc-o-pave.jpeg\" alt=\"re-la-sc-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取坐位，治疗师操作上述的一个或两个点位。不同数字位于不同结构，代表不同子单元。这些子单元的作用是在肱骨超过90°时协调肱骨和肩胛骨的运动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070522-re-la-sc-o-treatment.jpeg\" alt=\"re-la-sc-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-SC 障礙",
    "answer": "\u003Cp\u003Ere-la-sc 融合中心 （CF）的功能障礙。\u003Cbr /\u003E肩鎖關節疼痛。上肢疲勞感。孟唇或肩峰下夾擠。鎖骨或肱骨骨折後，肩部力量喪失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120518-re-la-sc-cp.jpeg\" alt=\"re-la-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-sc 融合中心 （CF）的動作驗證\u003Cbr /\u003E為了驗證 re-la-sc 1 和 2 CF 的動作，要求患者抬起伸展的手臂。如果存在肩鎖夾擠，則當患者運動到最後程度時會感到疼痛。\u003Cbr /\u003EO&#39;Brien 驗證肩鎖關節功能障礙的測試可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120522-re-la-sc-move.jpeg\" alt=\"re-la-sc-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E诊断为肩周炎或冈上肌肌腱损伤的肩关节疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E冈上肌筋膜的近端与后-肩和外-肩的CC连接，其远端延伸至肩袖上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070512-re-la-sc-o-cp.jpeg\" alt=\"re-la-sc-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-HU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E三角肌後外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ETE13，臑會穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩部疼痛，肩袖損傷\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-肱cf點位於三角肌附著點的後側近端，是肱骨後伸（後）與外向運動力的匯聚處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090453-Me-la-hu.jpeg\" alt=\"Me-la-hu\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 和 re-la-hu CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-hu CF 位於三角肌後肌腱上，後向、外向和外旋動作匯聚在此筋膜。\u003C/li\u003E\u003Cli\u003Ere-me-hu CF位於腋窩上方，朝向肱三頭肌的長頭。\u003C/li\u003E\u003Cli\u003E來目 re-me-cu 和 re-me-ca CF 的遠近側牽引力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010554-re-me-hu-location.jpeg\" alt=\"re-me-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-hu CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E穿過肱骨頭的斜截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-hu CF 位於三角肌遠端肌腱的後方\u003C/li\u003E\u003Cli\u003Ere-me-hu CF 位於三頭肌長頭肌腱、三角肌和大圓肌之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010510-re-la-hu-location.jpeg\" alt=\"re-la-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-hu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師可站在患者的後面或前面，將肘部放在三角肌肱骨附著處的後方，以便在橫向上操作筋膜（針灸穴位 TE 13）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-la-hu-pave-treatment.jpeg\" alt=\"re-la-hu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E三角肌后侧缘，远端肌腱上。\u003Cbr /\u003E有痛感的运动：当患者上臂向后、向外活动时，肩部疼痛尤其明显（Jobe\u003Cbr /\u003E试验，用于评估冈上肌）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070555-re-la-hu-o-pave.jpeg\" alt=\"re-la-hu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，外展手臂，治疗师将肘部或指节置于三角肌后-外肌腱部分，操作此处使组织更顺滑。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070559-re-la-hu-o-treatment.jpeg\" alt=\"re-la-hu-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-HU 障礙",
    "answer": "\u003Cp\u003Ere- la-hu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E在進行外向動作、後向和外旋動作時肩部疼痛。la-hu、re-hu 和 er-hu 肌筋膜單元的肌腱附著處匯聚到此 CF上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010549-re-la-hu-cp.jpeg\" alt=\"re-la-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-hu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E為了拉伸 re-la-hu CF 的筋膜，治療師抓住患者的肘部，將他們的手臂移動到屈曲、內收和內旋。用於評估肩袖損傷的霍金測試（Hawkin&#39;s test）可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010553-re-la-hu-move-p.jpeg\" alt=\"re-la-hu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-hu 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E患者站姿。當患者在外展 90°伸展孟肱關節時，治療師會施加阻力。其類似於 Jobe 氏測試來評估棘上肌的功能。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010501-re-la-hu-move-a.jpeg\" alt=\"re-la-hu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E后伸和外展运动时肩痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E三角肌参与了肱骨的很多运动，因而其腱区范围十分广泛。实现伸展及外展的作用力汇聚在后-外区域。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070549-re-la-hu-o-cp.jpeg\" alt=\"re-la-hu-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-CU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E橈側腕長、短伸肌間溝\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ETE9，四瀆穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肱骨外上課炎，肘伸、腕伸無力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-肘cf點位於肱骨外髁與鷹嘴之間的溝內。在這里，它管理由肱三頭肌肌腱（後）完成的肘部後向運動，以及由肱橈肌（外）完成的外向運動。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090403-Me-la-cu.jpeg\" alt=\"Me-la-cu\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cu CF 位於尺側伸腕肌和伸指肌之間的溝中，緊靠肘肌的遠端。\u003C/li\u003E\u003Cli\u003E來自 re-la-di 和 re-la-ca 的 CF 的遠近端牽引力\u003C/li\u003E\u003Cli\u003Ere-me-cu CF 位於鷹嘴和内上髁之間的尺骨溝中\u003C/li\u003E\u003Cli\u003E遠近側牽引力來自re-me-ca CF\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010503-re-me-cu-location.jpeg\" alt=\"re-me-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cu CF 解剖位置和横截面線\u003C/p\u003E\u003Cp\u003E肘部在鷹嘴水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cu CF 位於鷹嘴和内側上髁之間，尺神經鞘上。\u003C/li\u003E\u003Cli\u003Ere-la-cu CF 位於肘肌下方，伸指肌方向。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010513-re-la-cu-location.jpeg\" alt=\"re-la-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cu 融合中心（CF）的觸診驗證與治療\u003Cbr /\u003E患者俯臥。治療師將食指的指關節放在肘肌和伸指肌之間的溝中，直接遠離外上髁，並漸進式地操作這個點，這通常特別疼痛（針灸穴位 LI 11）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010519-re-la-cu-pave-treatment.jpeg\" alt=\"re-la-cu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E在桡侧伸腕短肌和腕伸长肌后方的缝隙中，位于前臂筋膜后方的橫向及斜行纤维构成的支持带上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070516-re-la-cu-o-pave.jpeg\" alt=\"re-la-cu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，手臂伸展于两侧；以外髁炎为例，此CF 常与后-肘和外-肘的CC一起操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070523-re-la-cu-o-treatment.jpeg\" alt=\"re-la-cu-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-LA-CU 障礙",
    "answer": "\u003Cp\u003Ere-la-cu 融合中心 （CF）的功能障礙\u003Cbr /\u003E疼痛部位對應於 er-ca 肌筋膜單元的感知中心 （CP）和橈神經皮支的出現點，後外側腕部象限。腕部和肘部動作障礙。\u003Cbr /\u003E在頸臂痛的情況下，前臂外側有針刺感，在 re-la-cl 和 re-la-cu 的 CF 之間交替治療很有用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010556-re-la-cu-cp.jpeg\" alt=\"re-la-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E治療師將患者的手推向其肩膀來執行被動動作驗證。患者可能會覺得 re-la-cu 和 re-la-ca 部位疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010500-re-la-cu-move-p.jpeg\" alt=\"re-la-cu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cu 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E治療師要求患者前臂用力伸展、外展和外旋。re-la-cu CF 的緻密化導致了明顯或無聲的疼痛而造成的強度損失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010506-re-la-cu-move-a.jpeg\" alt=\"re-la-cu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛位置：\u003Cbr /\u003E前臂及肘关节疼痛，尤其在两条力线的交汇处。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E任何一个CF的功能障碍都会在多个位置引起疼痛，因为CF 连接到多个肌筋膜单元，也连接在支持带上。而支持带又连接了不同区域。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070507-re-la-cu-o-cf.jpeg\" alt=\"re-la-cu-o-cf\" /\u003E\u003C/p\u003E"
  },

    "question": "RE-LA-CA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E指伸肌和拇伸肌間溝附近近端和遠端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ETE5，外關穴\u003C/li\u003E\u003Cli\u003ELI6，偏歷穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E手腕外側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-腕cf點位於橈側腕伸肌（後）與拇長展肌（外）之間的溝槽內\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090409-Me-la-ca.jpeg\" alt=\"Me-la-ca\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ca 1, 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-ca 1 CF 位於肱橈肌肌腱和橈側伸腕肌之間\u003C/li\u003E\u003Cli\u003Ere-la-ca 2 CF 位於伸指肌和外展拇長肌的肌腱通道\u003C/li\u003E\u003Cli\u003Ere-me-ca 1 CF 位於尺側伸腕肌和尺骨間溝中\u003C/li\u003E\u003Cli\u003Ere-me-ca 2 CF 位於尺骨莖突和伸肌支持帶上緣之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010538-re-me-ca-location.jpeg\" alt=\"re-me-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ca 1,2 CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E前臂遠端橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-ca CF 位於尺側伸肌腱和伸小指肌腱之間\u003C/li\u003E\u003Cli\u003Ere-la-ca CF 位於橈側伸肌腱和伸拇肌之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010525-re-la-ca-location.jpeg\" alt=\"re-la-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ca 1 融合中心 （CF）的觸診驗證與治療\u003Cbr /\u003E患者俯臥。觸診驗證和治療是在筋膜上進行的，此筋膜延伸到伸拇短肌和外展拇長肌的肌腱通道，靠近伸肌支持帶（針灸穴位LI 7) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010513-re-la-ca1-pave-treatment.jpeg\" alt=\"re-la-ca1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ca 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或俯臥。治療師使用食指關節來操作在肱橈肌遠端肌腱和伸拇短肌之間延伸的筋膜，可以旋轉患者的前臂以方便識別此點（針灸穴位 LI6、TE 6）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010531-re-la-ca2-pave-treatment.jpeg\" alt=\"re-la-ca2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）指伸肌和拇短伸肌之间的缝隙的近端\u003Cbr /\u003E2）同一缝隙的远端\u003Cbr /\u003E引起疼痛的动作：当手腕尺侧偏移（Finkelstein 试验，用于检查拇外展肌肌腱炎）时，疼痛加重。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070537-re-la-ca-o-pave.jpeg\" alt=\"re-la-ca-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，将手掌置于治疗床上；治疗师将指节置于上述位点，在伸肌之间的缝隙中，使胶原纤维活化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070541-re-la-ca-o-treatment.jpeg\" alt=\"re-la-ca-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-CA 障礙",
    "answer": "\u003Cp\u003Ere-la-ca 融合中心（CF）的功能障礙。\u003Cbr /\u003E拇指伸展動作緊張和無力。狄奎凡氏症（DeQuervain&#39;s disease）。拇指伸展期間，有類似板機指感的纖維化。手腕橈側腫脹。該區域對應於 la-ca 肌筋膜單元的感知中心（CP）和橈神經皮支的點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010502-re-la-ca-cp.jpeg\" alt=\"re-la-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ca 融合中心 （CF）的動作驗證\u003Cbr /\u003E患者在主動尺偏或被動手腕橈側拉伸時抱怨手腕橈側酸痛。Finkelstein 氏的測試，其包括拇指彎曲時手腕的尺側偏斜，可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010507-re-la-ca-move.jpeg\" alt=\"re-la-ca-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心和相关CC点\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E腕部桡侧疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E此融合中心位于拇长伸肌和拇长展\u003Cbr /\u003E肌肌腱结合处，后-腕的CC 和外-腕的 CC 节则位于这些肌肉近端上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070533-re-la-ca-o-cp.jpeg\" alt=\"re-la-ca-o-cp\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-DI 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拇指外展，在手腕橈側伸肌肌腱上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI5，陽溪穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拇指疼痛，腕掌關節炎\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-指cf點位於解剖學上的鼻煙窩，橈骨莖突的遠端。從這里它控制著拇長、短伸肌（後）和拇長展肌（外）的肌腱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090413-Me-la-di.jpeg\" alt=\"Me-la-di\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-di 和 re-la-di 的 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E向近端方向牽引 re-la-di CF\u003C/li\u003E\u003Cli\u003Ere-la-di 1 CF 位於伸肌支持帶的下部靠近橈骨側，在伸肌腱和外展拇肌腱上。\u003C/li\u003E\u003Cli\u003Ere-la-di 2 CF 位於靠近第2 指掌關節\u003C/li\u003E\u003Cli\u003Ere-me-di 1 CF 位於腕骨之間，在伸肌支持帶的尺骨部份\u003C/li\u003E\u003Cli\u003Ere-me-di 2 CF 位於第4和第5指之間的指間聯合處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010508-re-me-di-location.jpeg\" alt=\"re-me-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-di 1 CF 解剖位置和橫截面線\u003C/p\u003E\u003Cp\u003E豌豆骨、頭狀骨和舟狀骨的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-di 1 CF，在伸肌支持帶遠端，尺骨區域。\u003C/li\u003E\u003Cli\u003Ere-la-di 1 CF 在伸肌支持帶遠端，橈骨區域。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010538-re-la-di-location.jpeg\" alt=\"re-la-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-di 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或仰臥。治療師用指尖檢查手部解剖鼻煙壺內的筋膜。然後用食指的指關節操作緻密點（針灸穴位 LI 5）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010528-re-la-di1-pave-treatment.jpeg\" alt=\"re-la-di1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-di 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或坐著。治療師用指尖檢查位於緊鄰第二掌骨頭空間中的筋膜；然後用食指的指關節操作緻密點（針灸穴位 LI3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010544-re-la-di2-pave-treatment.jpeg\" alt=\"re-la-di2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）位于腕背的桡侧，拇指竖起时，该点位于拇长伸肌和伸拇短肌肌腱之间的腔隙。\u003Cbr /\u003E引起疼痛的动作：患者可能主诉拇指基底部失稳\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070534-re-la-di-o-pave.jpeg\" alt=\"re-la-di-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧或取坐位，治疗师将指节力度深入至两肌腱之间以松解支持带纤维。\u003Cbr /\u003E注意：治疗此 CF-点可与后-指和外-指cc 点的治疗相结合。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070539-re-la-di-o-treatment.jpeg\" alt=\"re-la-di-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-DI 障礙",
    "answer": "\u003Cp\u003Ere-la-di 融合中心 （CF）的功能障礙。\u003Cbr /\u003E手部第 1和第2指功能受限、手部小肌肉痙攣、第一掌指關節骨關節炎和腱鞘炎。複雜性局部疼痛症候群（CRPS）或反射性交感神經營養不良或痛覺神經營養不良症候群或灼痛或 Sudeck 氏症候群。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-la-di-cp.jpeg\" alt=\"re-la-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere- la-di 1 融合中心 （CF）的被動-主動動作驗證。\u003Cbr /\u003E為了測試伸肌支持帶和肌腱的彈性，治療師將患者的拇指放在拳頭內，然後拉緊手腕，並要求患者從這個位置伸出手指抵抗阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010521-re-la-di-move.jpeg\" alt=\"re-la-di-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E位于腕部，具体定位在两条线的交点。\u003Cbr /\u003E功能的障碍的起源或 CF：\u003Cbr /\u003E背侧支持带从手的尺侧（后方）延伸至桡侧（外），把拇指和四指展开的动作联合在一起；若缺乏此协同作用，就会引起某个或多个手指疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070527-re-la-di-o-cp.jpeg\" alt=\"re-la-di-o-cp\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-CP 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E發際線到頭頂的中點\u003C/li\u003E\u003Cli\u003E稍微低於頭頂\u003C/li\u003E\u003Cli\u003E頭頂至枕骨粗隆中點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL5，五處穴\u003C/li\u003E\u003Cli\u003EBL6，承光穴\u003C/li\u003E\u003Cli\u003EBL7，通天穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頭部沈重，眼周酸痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內-頭cf點由3個點組成：第一個位於前額與頭頂的中點；第二個在頭頂的旁邊；第三個稍高於枕外隆凸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090424-Re-me-cp.jpeg\" alt=\"Re-me-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 1, 2 和 3 CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cp 2 CF 位於頭頂，re-cp 2、me-cp 2r和 er-cp 2 CC 的牽引力匯合處\u003C/li\u003E\u003Cli\u003Ere-me-cp 1 CF 位於髮際線上，從此處控制 me-cp 1 和 re-cp 1的CC\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 CF 位於枕骨隆突的一側，re-cp 3 和 me-cp 3rCC 的牽引力匯合處\u003C/li\u003E\u003Cli\u003E注意：黃色三角形代表 re-la-cp\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010535-re-me-cp-location.jpeg\" alt=\"re-me-cp-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 1 CF 解剖位置和紅色橫截面線。\u003C/p\u003E\u003Cp\u003E頭顱在紅線水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cp 1 CF 位於眉毛的中間部分\u003C/li\u003E\u003Cli\u003Ere-la-cp 1 CF 位於眉毛中間上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010520-re-la-cp-location1.jpeg\" alt=\"re-la-cp-location1\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 2 CF 解剖位置。\u003C/p\u003E\u003Cp\u003E筋膜在運動知覺中的作用可以從帽狀腱膜張肌的排列推斷出來。\u003C/p\u003E\u003Cp\u003E這些肌肉以這樣一種方式維持了帽狀腱膜的基礎張力，即使是頭部在三個空間平面中的任何一個平面上的細微運動也可以活化感受噐。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cp 1 連接到 me-cp 1 和 re-cp 1 CC\u003C/li\u003E\u003Cli\u003Ere-me-cp 2位於頭頂，前後和側向牽引力匯聚處。\u003C/li\u003E\u003Cli\u003Ean-me-cp 1 連接到 me-cp 1和 an-ср СС\u003C/li\u003E\u003Cli\u003E耳廓肌肉斜牽引帽狀腱鞘\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 連接到 me-cp 3r 和 re-cp 3 CC\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010552-re-me-cp-location2.jpeg\" alt=\"re-me-cp-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 2解剖位置和橫截面線\u003C/p\u003E\u003Cp\u003E顱骨穿過上頜骨的斜截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cp 2 CF 位於顱骨頂端\u003C/li\u003E\u003Cli\u003Ere-la-cp 2 CF 位於頂骨的隆起處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010536-re-la-cp-location2.jpeg\" alt=\"re-la-cp-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 3 CF 解剖位置•\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E帽狀腱膜，切片強調覆蓋顳肌的顱骨上筋膜。\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 CF 位於枕骨突的側邊，帽狀腱膜與頸筋膜和枕肌也附著在此。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-cp-location3.jpeg\" alt=\"re-me-cp-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 3 CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E顱骨通過下領骨的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cp 3 CF 位於 SCM 的附著處，在乳突水平。\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 CF 位於頂葉隆突的側邊\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010550-re-la-cp-location3.jpeg\" alt=\"re-la-cp-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師一旦指尖確定了緻密點，使用指關節來治療該點，施加治療額肌所需的最小壓力（針灸穴位 BL 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010541-re-me-cp1-pave-treatment.jpeg\" alt=\"re-me-cp1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師將食指的指關節放在頭部中線的一側，即頭骨的頂部，然後尋找滑動減少的最敏感點並對其進行操作直到它軟化（針灸穴位 BL 6-7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010559-re-me-cp2-pave-treatment.jpeg\" alt=\"re-me-cp2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 3 融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐著，額頭靠在床上。治療師用一手穩定患者的頭部，並用另一手的指關節操作枕肌的小纖維（針灸穴位 BL9）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-me-cp3-pave-treatment.jpeg\" alt=\"re-me-cp3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E从眼睛开始，逐渐向后：\u003Cbr /\u003E1）发际与颅顶高点连线的中点；\u003Cbr /\u003E2） 颅顶高点的外侧和后侧；\u003Cbr /\u003E3）颅顶与枕骨隆凸连线的中点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080534-re-me-cp-o-pave.jpeg\" alt=\"re-me-cp-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，下颌置于手上，治疗师用指间关节或指尖推拿各层组织（头皮、帽状腱膜、头皮浅筋膜），使各层之间可自由滑动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080540-re-me-cp-o-treatment.jpeg\" alt=\"re-me-cp-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-CP 障礙",
    "answer": "\u003Cp\u003Ere-me-cp 1融合中心 （CF）的功能障礙。\u003Cbr /\u003E此 CF 與靠近鼻子和眼睛的 CC 相互作用；\u003Cbr /\u003E因此，會導致於眼睛和鼻子的功能障礙，如眼痛和鼻炎、臉部淋巴充血和前額痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-cp1-cp.jpeg\" alt=\"re-me-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 2融合中心 （CF）的功能障礙。\u003Cbr /\u003E維持帽狀腱膜張力的小肌肉功能不能由一個動作驗證評估。此 CF 的功能障礙表現為眩暈、頭部沉重的感覺，以及神經和心理障礙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010521-re-me-cp2-cp.jpeg\" alt=\"re-me-cp2-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 3 融合中心 （CF）的功能障礙。\u003Cbr /\u003Ere-me-cp 3 CF 的緻密化可引起枕骨粗隆下方的疼痛和緊張、頸部和整個脊柱的僵硬、枕骨頭痛、癱瘓、中風和心理障礙，例如對自己身體的感知改變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010528-re-me-cp3-cp.jpeg\" alt=\"re-me-cp3-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E头痛，眼痛和（或）头皮痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E外伤可导致帽状腱膜与颅顶筋膜粘连，还能引起各种头皮感觉异常。\u003Cbr /\u003E注意：所谓的"内"（me），是指整个身体的中轴线。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080529-re-me-cp-o-cp.jpeg\" alt=\"re-me-cp-o-cp\" /\u003E\u003C/p\u003E"
  },

    "question": "RE-ME-CL 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E脖子中點，項韌帶兩側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL10，天柱穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頸部和枕骨區域疼痛，眩暈\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點緊鄰項韌帶，它對應針灸的天柱穴（BL 10）及 Cyriax 法中的中央脫位（central dislocation）處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090430-Re-me-cl.jpeg\" alt=\"Re-me-cl\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cl CF 位於斜方肌和胸鎖乳突肌之間的溝\u003C/li\u003E\u003Cli\u003Ere-me-cl CF 位於頸部項韌帶的一側，從第一頸椎（針灸穴位 VG 15） 延伸到第七頸椎（針灸穴位 VG 14) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010553-re-me-cl-location.jpeg\" alt=\"re-me-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cI CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E頸部在第五頸椎水平橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cl CF 位於斜方肌和提肩胛肌之間的溝中\u003C/li\u003E\u003Cli\u003Ere-me-cl CF 位於頸部項韌帶的側邊\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520090534-re-la-cl-location.jpeg\" alt=\"re-la-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿，額頭擱在手上。治療師使用食指的指關節進行的。項韌帶的筋膜結構堅固，因此需要長時間的深度治療（針灸穴位 JJ cl1-7) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010500-re-me-cl-pave-treatment.jpeg\" alt=\"re-me-cl-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）斜向按压触诊项韧带。重点检查颈部中间，但考虑个体差异，也需关注近侧和远侧区域。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080511-re-me-cl-o-pave.jpeg\" alt=\"re-me-cl-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E项韧带侧面可触诊到组织改变和变态反应，集中松解此处。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080517-re-me-cl-o-treatment.jpeg\" alt=\"re-me-cl-o-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "RE-ME-CL 障礙",
    "answer": "\u003Cp\u003Ere-me-cl 融合中心（CF）的功能障礙。\u003Cbr /\u003Ere-me-cl 的CF 對於恢復頸部韌帶的彈性非常有幫助。頸部韌帶的剛性代償了頭部，而引起頭痛，以及在背部引發沿脊柱的疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010534-re-me-cl-cp.jpeg\" alt=\"re-me-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl 融合中心 （CF）被動動作驗證。\u003Cbr /\u003E治療師將患者的頭部向前輕輕推向右側，然後向左側；要求患者指出感到最緊繃的地方。只有一側的緊繃感表明了緻密的部份。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010539-re-me-cl-move-p.jpeg\" alt=\"re-me-cl-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl 融合中心 （CF）主動動作驗證\u003Cbr /\u003E治療師要求患者將頭部向後以拉緊頸部項韌帶。有時，頸部會感到疼痛，因為頸部項韌帶的僵硬會對嵌入該韌帶內的感受器產生異常牽引力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010545-re-me-cl-move-a.jpeg\" alt=\"re-me-cl-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E颈部捻发音，颈背痛或第7颈椎处疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E多条肌肉止于两侧项韧带，韧带的纤维变性会抑制主动肌活化，同时也抑制拮抗肌，这导致颈项肌肉同步挛缩\u003Cbr /\u003E或僵硬。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080507-re-me-cl-o-cp.jpeg\" alt=\"re-me-cl-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-TH 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ET2-T3\u003C/li\u003E\u003Cli\u003ET4-T6\u003C/li\u003E\u003Cli\u003ET7-T11兩側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EEX-B2，夾脊穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E背部僵硬酸痛，頸椎屈曲困難，深呼吸僵硬\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內一胸3cf點位於第八、第九胸椎棘突與豎脊肌的肌束之間。它對應\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090434-Re-me-th.jpeg\" alt=\"Re-me-th\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 1,2和3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 1 CF 上的 re-me-cl CF 的牽引力\u003C/li\u003E\u003Cli\u003Ere-me-th 1 CF 位於第一至三節胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於第四至第七胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-la-th CF 位於肩胛骨下角水平\u003C/li\u003E\u003Cli\u003Ere-me-th 3 CF 位於第8 至第 11 胸椎棘突側面\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010519-re-me-th-location.jpeg\" alt=\"re-me-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 2 CF 位於 me-th 和 re-th 的 CC之間，在胸棘肌的中間。\u003C/li\u003E\u003Cli\u003Ere-me-th 1 和 re-me-th 3 CF 位於胸椎的起點和棘肌終點。\u003C/li\u003E\u003Cli\u003E三個 re-me-th CF 作用於 re-th 和 me-thr 的 CC，對抗 an-me-th CF \u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於 re-th 和 me-th r 的 CC 之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此圖中，後向序列的胸最長肌已被移除，以突顯 re-me-th 動作序列的脊肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010537-re-me-th-location2.jpeg\" alt=\"re-me-th-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 1 CF 位於第一至三節胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於胸最長肌 （re-th）的肌腹和胸椎棘突（me-th）之間\u003C/li\u003E\u003Cli\u003Ere-me-th 3 CF 與胸脊肌，在這張照片中被胸最長肌覆蓋。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010554-re-me-th-location3.jpeg\" alt=\"re-me-th-location3\" /\u003E\u003Cbr /\u003Ere-la-th 解剖位置。\u003C/p\u003E\u003Cp\u003E胸部第五胸椎的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th CF 位於胸椎棘突和豎脊肌之間\u003C/li\u003E\u003Cli\u003Ere-la-th CF 位於斜方肌邊界下方，肩胛骨内側。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100509-re-la-th-location.jpeg\" alt=\"re-la-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師將指關節放在第一至第三節胸椎的棘突側邊，尋找需要治療的點。該穴位對應 JJ th 1-3（縮寫JJ代表 Jia= 鞘附近，Ji=椎骨：這個詞大約在 2000年前由中國醫師華佗使用）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010525-re-me-th1-pave-treatment.jpeg\" alt=\"re-me-th1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 2融合中心 （CF）的觸診驗證\u003Cbr /\u003E患者俯臥。治療師將食指的指關節放在第4-7 胸椎棘突與胸最長肌，尋找並治療最緻密的點（針灸穴位 JJ th 4-7）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010543-re-me-th2-pave-treatment.jpeg\" alt=\"re-me-th2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 3 融合中心 （CF）的觸\u003Cbr /\u003E診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師用指尖沿著兩條椎旁溝，同時測試左右兩側的 CF，來觸診驗證 re-\u003Cbr /\u003Eme-th CF。然後將治療集中在一個 CF（針灸穴位 JJ 8-11）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010508-re-me-th3-pave-treatment.jpeg\" alt=\"re-me-th3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）第2.3胸椎旁；\u003Cbr /\u003E2） 第4-6胸椎旁；\u003Cbr /\u003E3）第7-11 胸椎旁。\u003Cbr /\u003E有痛感的运动：患者主诉，向前弯腰时椎旁肌肉紧张（Lhermitte 征）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080555-re-me-th-o-pave.jpeg\" alt=\"re-me-th-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，仅当组织长期病变时，治疗师才用肘部处理，否则用指节松解骶棘肌和棘突间凹槽内的组织。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080501-re-me-th-o-treatment.jpeg\" alt=\"re-me-th-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-TH 障礙",
    "answer": "\u003Cp\u003Ere-me-th 融合中心 （CF）的功能障礙。\u003Cbr /\u003E胸椎骨骺間關節疾病。脊柱的背痛和全身疼痛。肩部疼痛隨著胸椎旁肌肉的伸展而減輕。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010502-re-me-th-cp.jpeg\" alt=\"re-me-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 融合中心 （CF）被動動作驗證。\u003Cbr /\u003E治療師使用的手法和項韌帶測試相同。然而，張力應現在集中在下方，沿著胸椎的棘上韌帶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010506-re-me-th-move-p.jpeg\" alt=\"re-me-th-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 融合中心 （CF）主動動\u003Cbr /\u003E作驗證。\u003Cbr /\u003E要求患者將頸部和胸部向後抵抗阻力，會引發單側或雙側疼痛。觸診驗證將確定疼痛是由後内向序列還是後内向對角線引起的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010513-re-me-th-move-a.jpeg\" alt=\"re-me-th-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E背痛，脊柱炎，退行性关节疾病，脊柱后凸。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E处理脊柱短肌肌群，可缓解冈下肌和\u003Cbr /\u003E棘下韧带（内-胸）的疼痛及变态反应。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080551-re-me-th-o-cp.jpeg\" alt=\"re-me-th-o-cp\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-LU 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EL1-L2\u003C/li\u003E\u003Cli\u003EL3-L4兩側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EEX-B-2，夾脊穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腰椎區域僵硬酸痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內-腰1cf點位於第十二胸椎旁，而後-內-腰2 cf 點位於第二、第三腰椎旁。這些點對應針灸中位於豎脊肌內側的奇穴。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090439-Re-me-lu.jpeg\" alt=\"Re-me-lu\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-lu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-lu 1 CF 位於 re-lu 和 me-lu 的CC中間，在第一和第二腰椎水平。\u003C/li\u003E\u003Cli\u003Ere-la-lu CF 位於第12根肋骨，腰方肌附著處。\u003C/li\u003E\u003Cli\u003Ere-me-lu 2 CF 位於第3 和第4腰椎棘突側邊，多裂肌上方。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010556-re-me-lu-location.jpeg\" alt=\"re-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-lu CF 解剖位置。\u003C/p\u003E\u003Cp\u003E胃部繫膜穿過第二腰椎橫斷面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-lu CF 位於腰椎棘突和豎脊肌之間\u003C/li\u003E\u003Cli\u003Ere-la-lu CF 位於腹腰三層筋膜融合點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100534-re-la-lu-location.jpeg\" alt=\"re-la-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-lu 1 融合中心 （CF）的觸診驗證和治療\u003Cbr /\u003E患者俯臥。該區域的肌肉觸診相當困難。然而，即使疼痛和筋膜僵硬的微小差異也足以讓治療師在 re-lu 的 CC或 re-me-lu 1（針灸穴位 JJ lu 1-2） 的CF 之間進行選擇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010544-re-me-lu1-pave-treatment.jpeg\" alt=\"re-me-lu1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-lu 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師將食指的指關節放在第三和第四腰椎棘突的側邊，並尋找敏感點。用肘部進行治療（針灸穴位 JJIu3-4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010508-re-me-lu2-pave-treatment.jpeg\" alt=\"re-me-lu2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）第1、2腰椎的棘突和竖脊肌之间的沟；\u003Cbr /\u003E2）第3、4腰椎棘突侧面的沟。\u003Cbr /\u003E有痛感的运动：患者呈坐位，将下肢放在凳子上，坐骨神经痛加重（Slump\u003Cbr /\u003E试验，用于评估椎间盘突出）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080500-re-me-lu-o-pave.jpeg\" alt=\"re-me-lu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，治疗师用肘自沟内侧向竖脊肌群的方向横向松解，不要直接推拿这些肌肉（见后-腰）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080504-re-me-lu-o-treatment.jpeg\" alt=\"re-me-lu-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-LU 障礙",
    "answer": "\u003Cp\u003Ere-me-lu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E腰痛。與 re-me-th一樣，這些腰椎CF 主要作用於内部功能素亂，它們對應於針灸的後蜀穴。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010529-re-me-lu-cp.jpeg\" alt=\"re-me-lu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-lu 融合中心 （CF）主動動作驗證。\u003Cbr /\u003E治療師要求患者向前彎曲以將棘上韌帶置於張力之下。如果沒有引起疼痛，則可以增加輕微的壓力以進一步拉伸，這可能會突出棘上韌帶的酸痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010536-re-me-lu-move-a.jpeg\" alt=\"re-me-lu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E腰痛，脊柱强直，腰椎小关节疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E此CF 协调了棘上韧带（内）的伸缩与椎旁肌收缩（后）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080556-re-me-lu-o-cp.jpeg\" alt=\"re-me-lu-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-PV 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ES1-S4骶孔上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL31-34，八膠穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腰痛，骶髂關節和腹股溝、下腹區域疼痛、尾骨痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內-盆融合中心由兩個點組成：第一個位於第一、第二骶後孔上；第二個位於第三、第四骶後孔上。\u003C/p\u003E\u003Cp\u003E這些點對應針灸的小腸俞、膀胱俞、中膂俞、上膠穴、次膠穴、中膠穴（BL 27、28、29、31、32, 33).\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090444-Re-me-pv.jpeg\" alt=\"Re-me-pv\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pv 1和2CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pv 1 CF 位於在第一和第二薦骨孔連線上\u003C/li\u003E\u003Cli\u003Ere-me-pv 2 CF 位於第3和第4薦骨孔上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010542-re-me-pv-location.jpeg\" alt=\"re-me-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pv 1和2CF 解剖位置。\u003C/p\u003E\u003Cp\u003E下腹通過恥骨聯合的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pv CF 位於薦骨棘突和薦髂關節之間\u003C/li\u003E\u003Cli\u003Ere-la-pv CF 位於髂後上棘和下棘側邊，臀大肌的終止點處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100504-re-la-pv-location.jpeg\" alt=\"re-la-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pv 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師將食指的指關節放在第一和第二薦骨孔上，尋找緻密和敏感的點。一旦確定該點，就會對其進行操作，直到它完全被處理好（針灸穴位 BL 31-32或 JJ pv1-2) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010526-re-me-pv1-pave-treatment.jpeg\" alt=\"re-me-pv1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pv 2 融合中心 （CF）的觸診驗證與治療\u003Cbr /\u003E患者俯臥。為了更有效地檢查這些筋膜結構，治療師可以要求患者橫臥治療床上，臀部在床上方（針灸穴位 BL 33 或 JJ pv\u003Cbr /\u003E3-4) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010548-re-me-pv2     "answer": "\u003Cp\u003Ere-me-ge 融合中心 （CF）的功能障礙。\u003Cbr /\u003E膝蓋的運動受損。膕窩腫脹的感覺有時歸因於貝克囊腫。膝關節內側有脂肪沉積，常見於中年女性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010559-re-me-ge-cp.jpeg\" alt=\"re-me-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ge 融合中心 （CF）被動動作驗證。\u003Cbr /\u003E治療師用一手向上和向外抬起患者腿，同時用另一手保持膝蓋伸展。若膕筋膜緻密化，則患者會感到膝蓋後內側部位過度拉伸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010504-re-me-ge-move-p.jpeg\" alt=\"re-me-ge-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E膝痛，尤其是内侧。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E小腿三头肌近端和大腿肌肉远端协同运动使膝关节屈曲，胭筋膜在两个运动中起桥梁作用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090520-re-me-ge-o-cp.jpeg\" alt=\"re-me-ge-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-HU 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E三角肌遠端前外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI14，臂臑穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩峰撞擊綜合征、肩峰下滑囊炎等，手臂前外側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-肱cf點位於三角肌附著點的近端前部。在這里，它影響三角肌的外展部分和胸大肌的屈曲部分。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090450-An-la-hu.jpeg\" alt=\"An-la-hu\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-hu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-hu CF 位於胸大肌前向、内向、內旋運動的肌腱通道內\u003C/li\u003E\u003Cli\u003Ean-me-hu CF 受到來自 an-me-cu CF 的牽引力\u003C/li\u003E\u003Cli\u003Ean-la-hu CF 位於三角肌遠端肌腱的前外側\u003C/li\u003E\u003Cli\u003Ean-la-hu CF 受到來目 an-la-cu 的 CF的牽引力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070557-an-me-hu-location.jpeg\" alt=\"an-me-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-hu 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E穿過肱骨頭矢狀斜截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-hu 的 CF 位於三角肌遠端肌腱前面\u003C/li\u003E\u003Cli\u003Ean-me-hu CF 位於胸大肌腱上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070532-an-la-hu-location.jpeg\" alt=\"an-la-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-hu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師用食指關節來檢查三角肌遠端附著處的CF。可以使用肘部治療此點，因為這通常是慢性緻密點（針灸穴位LI14 • LU 3) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-la-hu-pave-treatment.jpeg\" alt=\"an-la-hu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）通过检查三角肌肌腱的前-外部分来找到引发患者症状复发的点位。\u003Cbr /\u003E有痛感的运动：当患者前举或外展手臂时，肩前部疼痛加剧（Neer 试验，用于检查肩峰撞击综合征）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100553-an-la-hu-o-pave.jpeg\" alt=\"an-la-hu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧，治疗师可交替松解此 CF\u003Cbr /\u003E和外-肱CC，这两个点通常与孟肱关节功能障碍有关。如有致密纤维化，可令患者改为仰卧，并改用肘部对此\u003Cbr /\u003ECF 进行治疗，如右图所示。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100558-an-la-hu-o-treatment.jpeg\" alt=\"an-la-hu-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-HU 障礙",
    "answer": "\u003Cp\u003Ean-la-hu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E肩部疼痛，難以抬起手臂。上肢前側運動時的僵硬，有時會出現在骨折後或偏癱的患者中。Neer 氏評估肩峰下夾擠的測試可能是陽性的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070514-an-la-hu-cp.jpeg\" alt=\"an-la-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-hu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003Ean-la-sc 和 an-la-hu 的 CF 功能可以透過牽拉來測試；患者的手臂被移到其背後，來到肱骨向後且内收的位置。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070518-an-la-hu-move-p.jpeg\" alt=\"an-la-hu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-hu 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者站姿。治療師站在患者身後，請患者嘗試向上和向外移動上肢（肱骨前側）時，在患者的手腕上施加阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070525-an-la-hu-move-a.jpeg\" alt=\"an-la-hu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E肩周炎，肩峰下撞击症。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E如果三角肌筋膜不能协调三角肌的外展（外）和屈曲（前）的力量，那么其中一种肌力将占优势，导致肱骨过度向上运动，引起肩峰下撞击症。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100548-an-la-hu-o-cp.jpeg\" alt=\"an-la-hu-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-CU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E外側肌間隔遠端；肱二頭肌肌腱外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI13，手五里穴；LU5，尺澤穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩部到肘外側疼痛，肱骨外上髁炎\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-肘cf點位於肘橫紋的外側部。肱二頭肌和肱肌（前）、旋前圓肌（內旋）和肱橈肌（外）的矢量力都匯聚於此點，這些矢量力可以穩定肘關節。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090456-An-la-cu.jpeg\" alt=\"An-la-cu\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cu CF 位於橈側屈腕肌、掌長肌和旋前圓肌的肌腱上\u003C/li\u003E\u003Cli\u003Ean-me-cu CF 受到來自 an-me-ca CF 的牽引力\u003C/li\u003E\u003Cli\u003Ean-la-cu CF 位於二頭肌腱和肱橈肌之間的溝中\u003C/li\u003E\u003Cli\u003Ean-la-cu CF 受到來自an-la-ca CF 的牽引力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070509-an-me-cu-location.jpeg\" alt=\"an-me-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 的 CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E肘部在鷹嘴的水平橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cu 的 CF 位於肱二頭肌肌腱外側和肱橈肌内側\u003C/li\u003E\u003Cli\u003Ean-me-cu 的 CF 位於旋前圓肌和手指屈肌的聯合處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-la-cu-location.jpeg\" alt=\"an-la-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用食指的指關節來鬆動肘筋膜，其位於肱二頭肌肌腱（針灸穴位 LU5）的橈側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070545-an-la-cu-pave-treatment.jpeg\" alt=\"an-la-cu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）外侧肌间隔的远侧；\u003Cbr /\u003E2）肱二头肌腱外侧。\u003Cbr /\u003E有痛感的运动：整个肱二头肌疼痛，当患者上举或外展手臂时疼痛会加剧（仰掌心测试 Palm-up test，用于评估肱二头肌长头损伤）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090555-an-la-cu-o-pave.jpeg\" alt=\"an-la-cu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指间关节检查半月形的筋膜，它从肘横纹延展至外侧肌间隔；此筋膜的前部更多地参与了肘的前向运动，而外侧部分则参与了外向运动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090500-an-la-cu-o-treatment.jpeg\" alt=\"an-la-cu-o-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "AN-LA-CU 障礙",
    "answer": "\u003Cp\u003Ean-la-cu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E上髁炎 （epicondylitis）。手臂運動受限。手臂前部疼痛，類似於肩周炎（scapulohumeral periarthritis) •\u003Cbr /\u003E手掌朝上用於評估肱二頭肌長頭病變的測試可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070522-an-la-cu-cp.jpeg\" alt=\"an-la-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E透過旋轉患者的手腕來進行被動動作驗證。\u003Cbr /\u003E患者可能會感到手肘（肘部）或肩部的前外側部疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070527-an-la-cu-move-p.jpeg\" alt=\"an-la-cu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E此主動動作驗證是要求患者向上和向外移動前臂並抵抗阻力。如果同時對雙上肢進行測試，則更容易偵測到力量的差異。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-la-cu-move-a.jpeg\" alt=\"an-la-cu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E上髁炎，肩周炎，臂神经痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E肱二头肌参与屈肘（前）和肩外展（外）。因此，其筋膜改变可影响到肩和肘。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090551-an-la-cu-o-cp.jpeg\" alt=\"an-la-cu-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-CA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E橈動脈溝近端和遠端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELU7，列缺穴\u003C/li\u003E\u003Cli\u003ELU8，經渠穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腱鞘炎，腕掌關節炎\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前--外一腕cf點位於屈肌支持帶的止點、拇長屈肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090401-An-la-ca.jpeg\" alt=\"An-la-ca\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ca 1 和 2 CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-ca 1 CF 位於 掌長肌腱和尺側屈腕肌之間的筋膜上\u003C/li\u003E\u003Cli\u003Ean-me-ca 2 CF 位於屈肌支持帶的近端\u003C/li\u003E\u003Cli\u003Ean-me-di 1 CF 從遠端方向牽引 an-me-ca 2 CF\u003C/li\u003E\u003Cli\u003Ean-la-ca 1 CF 位於橈動脈溝近端\u003C/li\u003E\u003Cli\u003Ean-la-ca 2 CF 位於橈動脈溝，遠端屈肌支持帶上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070527-an-me-ca-location.jpeg\" alt=\"an-me-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ca 1 和2的CF 解剖位置以及橫截面線\u003C/p\u003E\u003Cp\u003E前臂下段的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ca 的 CF 位於橈動脈溝，靠近橈側屈腕肌腱。\u003C/li\u003E\u003Cli\u003Ean-me-ca 的 CF 位於尺動脈溝，尺側屈肌腱之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070504-an-la-ca-location.jpeg\" alt=\"an-la-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ca 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師沿著橈骨莖突（針灸穴位 LU 7） 方向延伸到肱橈肌的肌腱通道的筋膜上進行觸診驗證和治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070548-an-la-ca1-pave-treatment.jpeg\" alt=\"an-la-ca1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ca 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用食指的指尖在腕部水平的橈動脈上的筋膜尋找緻密化，用指關節來鬆動緻密點（針灸穴位 LU8）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070511-an-la-ca2-pave-treatment.jpeg\" alt=\"an-la-ca2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）桡动脉沟的近端；\u003Cbr /\u003E2）桡动脉沟的远端，拇长屈肌腱上。\u003Cbr /\u003E有痛感的运动：患者主诉，拇指外展时腕桡侧疼痛（舟骨移位试验，用于评估舟骨-月骨失稳）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090500-an-la-ca-o-pave.jpeg\" alt=\"an-la-ca-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指间关节触诊，并松解桡动脉沟的近端和远端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090506-an-la-ca-o-treatment.jpeg\" alt=\"an-la-ca-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-LA-CA 障礙",
    "answer": "\u003Cp\u003Ean-la-ca 融合中心 （CF）的功能障礙。\u003Cbr /\u003E手腕和手部的緊張和無力〔這是 an-ca 肌筋膜單元的感知中心（CP）〕。手掌和前三個手指的針刺感。這也是正中神經皮神經出現的點。舟狀骨移位試驗可能呈陽性或可能存在舟月關節不穩定。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-la-ca-cp.jpeg\" alt=\"an-la-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ca 融合中心 （CF）的動作驗證。\u003Cbr /\u003E若此CF 功能障礙，當手腕向前外側轉動時，患者應會感到前臂筋膜的緊張和疼痛，且這種疼痛可延伸到手腕。當治療師前外側腕施加阻力時，會覺得患者的力量很弱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070538-an-la-ca-move.jpeg\" alt=\"an-la-ca-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位；\u003Cbr /\u003E第1掌骨骨关节炎，腕关节痛，肌腱炎。\u003Cbr /\u003E功能障碍的起源或 CF 点：\u003Cbr /\u003E拇长屈肌（前）肌腱和拇长展肌（外）肌腱在下方经过，并被各自的韧带分隔。如果韧带僵硬，那么肌肉上的肌腱结构就会以异常方式激活，并影响关节。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090556-an-la-ca-o-cp.jpeg\" alt=\"an-la-ca-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-DI 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E大魚際底部，腕橫紋外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELU9，太淵穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拇指根部疼痛，拇指屈肌腱鞘炎，舟狀骨月骨不穩，關節炎\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-指cf點位於屈肌支持帶的橈側端，在握攏手指及拇指前-外向運動時，受到來自大、小魚際的牽引力。\u003C/p\u003E\u003Cp\u003Ean-la-di 患仰臥。治療師使用指關節來操作位於食指掌指關節的掌面之結絡組綴。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090407-An-la-di.jpeg\" alt=\"An-la-di\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-di 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-di CF 從遠端方向牽引 an-me 的對角線\u003C/li\u003E\u003Cli\u003Ean-me-di 1 CF 位於屈肌支持帶内側，小魚際隆起的起點。\u003C/li\u003E\u003Cli\u003Ean-me-di 2 CF 位於第四和第五個手指間聯合處\u003C/li\u003E\u003Cli\u003Ean-la-di CF 位於屈肌支持帶橈骨遠端處，大魚際肌隆起 的起點。\u003C/li\u003E\u003Cli\u003Ean-la-di 2 CF 位於第三和第四手指之間的指間聯合處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070536-an-me-di-location.jpeg\" alt=\"an-me-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-di 1 的CF 位置和橫截面線。\u003C/p\u003E\u003Cp\u003E豌豆骨、頭狀骨和舟狀骨的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-di 1融合中心位於舟狀骨上方和外展拇短肌的起點\u003C/li\u003E\u003Cli\u003Ean-me-di 1 的 CF 位於外展小指肌的包覆筋膜中\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070549-an-la-di-location.jpeg\" alt=\"an-la-di-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-la-di 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用食指的指關節來操作與大魚際肌（針灸穴位 LU 9）相連的屈肌支持帶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-la-di1-pave-treatment.jpeg\" alt=\"an-la-di1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-di 2融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用指關節來操作位於食指掌指關節的掌面之結締組織。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070557-an-la-di2-pave-treatment.jpeg\" alt=\"an-la-di2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）此CF位于掌侧腕横纹外侧。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090507-an-la-di-o-pave.jpeg\" alt=\"an-la-di-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师松解其屈肌支持带外侧部，如果发现阻力尤其明显的点位，则集中对这些点位进行深层松解。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090511-an-la-di-o-treatment.jpeg\" alt=\"an-la-di-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-DI 障礙",
    "answer": "\u003Cp\u003Ean- la-di 融合中心 （CF）的功能障礙。\u003Cbr /\u003E拇指根部的疼痛（腕掌骨關節炎）與 an-la-di 1 CF 相關，而拇指的指骨疼痛與an-di 的 CC 相關。拇指對掌動作引發的疼痛則與 an-la-di 2 CF 有關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070518-an-la-di-cp.jpeg\" alt=\"an-la-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean- la-di 融合中心 （CF）的被動一主動動作驗證。\u003Cbr /\u003E藉由在患者拇指上形成槓桿，治療師將患者的手指延伸到終端。如果 an-la-di 1 CF 變緻密，則拇指根部會感到劇烈疼痛。在這個姿勢，要求患者向前和向內移動他們的拇指。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070525-an-la-di-move.jpeg\" alt=\"an-la-di-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E位于鱼际和手掌的疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E部分掌腱膜和鱼际肌起于掌长肌腱和屈肌韧带；这些筋膜结构的纤维化会导致手指精细运动失调。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090502-an-la-di-o-cp.jpeg\" alt=\"an-la-di-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-CP 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鼻孔外側\u003C/li\u003E\u003Cli\u003E鼻唇溝中點\u003C/li\u003E\u003Cli\u003E下巴和下唇溝之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI20，迎香穴；\u003C/li\u003E\u003Cli\u003EGV26，水溝穴；\u003C/li\u003E\u003Cli\u003ECV24，承漿穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：上下唇疼痛，牙齒疼痛；牙關緊閉，言語障礙\u003C/p\u003E\u003Cp\u003E前-內--頭cf點有3個：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一個在鼻翼旁；\u003C/li\u003E\u003Cli\u003E第二個從鼻唇溝延伸到上牙齦\u003C/li\u003E\u003Cli\u003E第三個從下頦溝延至下牙齦。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090455-An-me-cp.jpeg\" alt=\"An-me-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 1,2和3CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAn-me-cp 1 CF 位於鼻翼根部，me-cp 1和an-cp 1的CC 牽引力匯聚處。\u003C/li\u003E\u003Cli\u003Ean-me-cp 2 CF 位於上領肌肉上方，me-cp 2和 an-cp 2的CC的牽引力匯聚於此。\u003C/li\u003E\u003Cli\u003Ean-me-cp 3 CF 位於下領肌肉，來自 me-cp 3和 an-cp 3的CC的牽引力匯聚處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060521-an-me-cp-location.jpeg\" alt=\"an-me-cp-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 1的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E顱骨的橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cp 1 的 CF位於額骨上縁\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 • 2 和 1CF 位於將顱骨一分為二的中線上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060550-an-la-cp1-location.jpeg\" alt=\"an-la-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 2 CF 解剖位置。\u003Cbr /\u003Ean-me-cp 2的CF 位於提上唇鼻翼肌。此CF協調或調控位於額肌上的 an-cp 2和位於鼻唇溝中的 me-cp 2的CC。在口腔外緣和頦部和鼻唇縫，降口角肌、提口角肌和頰肌形成一種支持帶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060542-an-me-cp-location2.jpeg\" alt=\"an-me-cp-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E穿過上顎的顱骨斜截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cp 1的CF 位於鼻翼側邊\u003C/li\u003E\u003Cli\u003Ean-me-cp 2的CF 位於上顎犬齒根部\u003C/li\u003E\u003Cli\u003Ean-la-cp 2 的 CF位於顴骨下緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060511-an-la-cp2-location.jpeg\" alt=\"an-la-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 3 CF 解剖位置。\u003Cbr /\u003Ean-me-cp 3 CF 位於下巴筋膜，二腹肌前腹的延續（me-cp 3）。\u003Cbr /\u003Ean-me-cp 3 CF 的另一個向量问 an-cp 3的CC，即為下領舌骨和舌下肌筋膜延伸。\u003Cbr /\u003E通過頸闊肌，an-me-cp 3 CF 對 an-me-cl 施加頭側牽引力。在遠端，頸闊肌與胸大肌纖肌肉維結合 （an-me-sc CF 和 an-me-th CF) 。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-an-me-cp-location3.jpeg\" alt=\"an-me-cp-location3\" /\u003E\u003C/p\u003E\u003Cp\u003E穿過下領骨的顱骨橫截面圖。\u003C/p\u003E\u003Cp\u003Ean-la-cp 3的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cp 3的CF 位於降口角肌（depressoranguli oris） 和下領犬齒的根部\u003C/li\u003E\u003Cli\u003Ean-la-cp 3的CF 位於咬肌前緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060531-an-la-cp3-location.jpeg\" alt=\"an-la-cp3-location\" /\u003E\u003Cbr /\u003Ean-me-cp 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用中指或食指的指尖進行治療，一指疊加在另一指上面。對鼻翼側邊進行操作（針灸穴位 ST 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060529-an-me-cp1-pave-treatment.jpeg\" alt=\"an-me-cp1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。用食指疊加在中指指尖靠在上顎犬齒的根部，並操作緻密點，直到任何過度敏感反應消失（針灸穴位 ST 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060549-an-me-cp2-pave-treatment.jpeg\" alt=\"an-me-cp2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 3融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。將食指疊加於中指，操作在下領犬齒的根部，直到緻密化消失（針灸穴位 EX 5) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060507-an-me-cp3-pave-treatment.jpeg\" alt=\"an-me-cp3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E触诊：\u003Cbr /\u003E1）在鼻翼基底部\u003Cbr /\u003E2） 在鼻唇沟中点\u003Cbr /\u003E3）在下巴和下唇之间的沟槽里\u003Cbr /\u003E注意：松解部位扩展到了牙龈上，最敏感的点位持续治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120546-an-me-cp-o-pave.jpeg\" alt=\"an-me-cp-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，当鼻、嘴或牙齿出现问题时，治疗师用指尖来处理这些CF点，一旦确定颗粒化最严重的点位，首先松解浅筋膜组织，其次松解牙龈深筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120551-an-me-cp-o-treatment.jpeg\" alt=\"an-me-cp-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-CP 障礙",
    "answer": "\u003Cp\u003Ean-me-cp 融合中心 （CF）的功能障礙。\u003Cbr /\u003E面部麻痺或痙攣，尤其是：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E• an-me-cp 1：眼瞼痙攣或眼險下垂。\u003C/li\u003E\u003Cli\u003E• an-me-cp 2：提口角肌和上唇方肌麻痺。\u003C/li\u003E\u003Cli\u003E• an-me-cp 3：降口角肌和下唇方肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060552-an-me-cp-cp.jpeg\" alt=\"an-me-cp-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 1融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者坐姿或站姿。為了測試眼輪匝肌和提上唇肌、鼻翼肌肉的正常功能，要求患者用力閉上雙眼（眼科領域，an-me-cp 1）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060559-an-me-cp1-move-a.jpeg\" alt=\"an-me-cp1-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 2和3融合中心（CF）的主動動作驗證。\u003Cbr /\u003E要求患者吹氣（an-me-cp 2上領和鼻部）。\u003Cbr /\u003E在下巴水平，頸闊肌的内側束跨越來自對側的肌束，外側束將它們連接到下領角肌和下唇方肌 （an-me-cp 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060510-an-me-cp2-3-move-a.jpeg\" alt=\"an-me-cp2-3-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E嗅觉紊乱，牙科问题，牙关紧闭症\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E松解笑肌与口轮匝肌浅层。操作下颚和牙齿周围的胶原纤维束深层。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120541-an-me-cp-o-cp.jpeg\" alt=\"an-me-cp-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-CL 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E胸鎖乳突肌在胸骨上的附著點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EST10，水突穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E喉嚨嘶啞，斜頸\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內一頸cf點位於胸鎖乳突肌胸骨腱上。\u003C/p\u003E\u003Cp\u003E它對應針灸的水突穴（ST 10）及Maigne 法中的前側頸椎信號點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090401-An-me-cl.jpeg\" alt=\"An-me-cl\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cl CF 位於SCM 肌肉前方，在下頜角韌帶上。\u003C/li\u003E\u003Cli\u003Ean-me-cl CF 位於胸鎖乳突肌胸骨端的肌腱通道上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070532-an-me-cl-location.jpeg\" alt=\"an-me-cl-location\" /\u003E\u003Cbr /\u003Ean-la-cl 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E頸部在第五頸椎的水平橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cl 的 CF 位於下頜角韌帶上\u003C/li\u003E\u003Cli\u003Ean-me-cl CF 位於胸鎖乳突肌的胸骨部分\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060554-an-la-cl-location.jpeg\" alt=\"an-la-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl CF 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用指尖進行觸診，因為肌腱通道水平的筋膜結構相當堅固（針灸穴位 ST 10），使用食指的指關節進行比較適當。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070541-an-me-cl-pave-treatment.jpeg\" alt=\"an-me-cl-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）触诊比较胸锁乳突肌的两个远端肌腱，内-颈CC 位于下方，在胸骨窝内。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120522-an-me-cl-o-pave.jpeg\" alt=\"an-me-cl-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师横向松解胸锁乳突肌胸骨侧肌腱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120528-an-me-cl-o-treatment.jpeg\" alt=\"an-me-cl-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-ME-CL 障礙",
    "answer": "\u003Cp\u003Ean-me-cl 融合中心（CF）的功能障礙。\u003Cbr /\u003E軀幹中的 CF 主要涉及内部功能障礙。然而，本書僅描述與肌肉骨骼功能障礙相關的部分。an-me-cl CF 的緻密化可以導致頸椎僵直。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070508-an-me-cl-cp.jpeg\" alt=\"an-me-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl 融合中心 （CF）的被動動作驗證\u003Cbr /\u003E患者站姿。將患者的頭部向後稍微向右移動，然後向左移動，並詢問患者哪裡感到最大的緊張。只有頸部一側的緊張感與緻密部分相對應。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070513-an-me-cl-move-p.jpeg\" alt=\"an-me-cl-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E治療師將手放在患者的頭上，在患者試圖在前中間方向移動他們的脖子時，施加一定的阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070525-an-me-cl-move-a.jpeg\" alt=\"an-me-cl-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E躯干的前-内点位主要表明出现了内脏紊乱，而在本文中要检查它们与肌肉骨骼器官的关联性。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E此点的指征之一是先天性斜颈。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120518-an-me-cl-o-cp.jpeg\" alt=\"an-me-cl-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-TH 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E劍突旁，第1、3、5肋間溝\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI26：或中穴；K124：靈墟穴；KI22，步廊穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E胸口壓迫，呼吸短促，前屈受限\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內-胸1cf點位於胸骨旁，第二肋間隙。此點通過胸大肌與胸小肌筋膜連接到本螺旋。\u003C/p\u003E\u003Cp\u003E前-內-胸3 cf點位於胸骨旁的第五肋間隙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090406-An-me-th.jpeg\" alt=\"An-me-th\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 1,2和3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cl CF 在頭側方向牽引\u003C/li\u003E\u003Cli\u003Ean-me-th 1 CF 位於第一和第二肋間\u003C/li\u003E\u003Cli\u003Ean-me-th 2 CF 位於第三和第四肋間\u003C/li\u003E\u003Cli\u003Ean-me-th 3 CF 位於第五肋間隙，劍突側邊。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070521-an-me-th-location.jpeg\" alt=\"an-me-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-th 2 CF 位於第三和第四肋間，在胸骨的側邊，在前向、内向和内旋一胸部 CC之間。\u003C/li\u003E\u003Cli\u003Ean-la-th 1 和2 CF 位於前鋸肌到腹外斜肌的肌腱通道中\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070538-an-me-th-location2.jpeg\" alt=\"an-me-th-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E深筋膜的淺層，其中包含左、右胸大肌。\u003C/li\u003E\u003Cli\u003Ean-me-th 3 CF 與胸大肌（me-th） 和腹直肌（an-th） 的嵌入肌腱相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070507-an-me-th-location.jpeg\" alt=\"an-me-th-location\" /\u003E\u003Cbr /\u003Ean-la-th CF 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E胸部在第五胸椎的水平的横截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-th 的CF 位於胸骨和肋軟骨\u003C/li\u003E\u003Cli\u003Ean-la-th 的 CF 位於前鋸肌筋膜上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060522-an-la-th-location.jpeg\" alt=\"an-la-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用食指的指關節觸診胸鎖關節區域，尋找最敏感的部位；一旦定位，操作直到緻密化消失（針灸穴位 KI 27-26) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070527-an-me-th1-pave-treatment.jpeg\" alt=\"an-me-th1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師將食指和無名指的指尖或食指的指關節放在第三肋間區域，並尋找需要治療的最緻密韌帶（針灸穴位 KI 25-24) \u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070549-an-me-th2-pave-treatment.jpeg\" alt=\"an-me-th2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師在第五肋間附近，用指尖觸診與劍突韌帶相連的緻密筋膜。然後用指關節操作最緻密的點，直到局部敏感性消失（針灸穴位 KI 23-22）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070513-an-me-th3-pave-treatment.jpeg\" alt=\"an-me-th3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E触诊：\u003Cbr /\u003E1）在第1 和第2肋间，紧邻胸骨；\u003Cbr /\u003E2） 在第3和第4肋间，紧邻胸骨；\u003Cbr /\u003E3）第5肋间隙，剑突侧面。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120547-an-me-th-o-pave.jpeg\" alt=\"an-me-th-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师推拿胸骨旁软组织直至其恢复滑动性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120552-an-me-th-o-treatment.jpeg\" alt=\"an-me-th-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-TH 障礙",
    "answer": "\u003Cp\u003Ean-me-th 融合中心（CF）的功能障礙。\u003Cbr /\u003E胸肋關節紊亂。胸骨後緊繃感或緊張感：前胸區瀰漫性疼痛。an-me-th 1 CF 的緻密化會導致胸鎖關節疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070503-an-me-th-cp.jpeg\" alt=\"an-me-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 融合中心 （CF）的被動動作驗證\u003Cbr /\u003E患者站姿。為了拉緊胸骨旁韌帶，治療師站在患者身後，將一隻手放在患者的胸骨上，同時用另一隻手推動腰部區域。要求患者描述他們經歷的任何疼痛或緊張。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070508-an-me-th-move-p.jpeg\" alt=\"an-me-th-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者站姿。從上述前内向對角線最大伸展位置，當治療師在胸骨上施加阻力時，要求患者胸部向前移動\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070515-an-me-th-move-a.jpeg\" alt=\"an-me-th-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E胸骨后疼痛，胸部压迫感，焦虑，骨膜炎。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E两个胸大肌止于胸骨（内侧），腹直肌从下方施加牵引力，有时它和胸骨肌相连续（前侧）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120543-an-me-th-o-cp.jpeg\" alt=\"an-me-th-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-LU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E劍突到肚臍的腹白線外側：劍突下；劍突與肚臍之間；平肚臍\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI21，幽門穴\u003C/li\u003E\u003Cli\u003EKI19，陰都穴\u003C/li\u003E\u003Cli\u003EK116，肓俞穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腹壁、胃腸痙攣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內-腰cf點由3個點組成，分布在劍突與臍之間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090411-An-me-lu.jpeg\" alt=\"An-me-lu\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 1, 2和3 CF 解剖位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-lu 1 CF 位於劍突的遠端和側邊。它協調胸骨和腹直肌的第一肌腱之間的纖維參與。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070522-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 2 CF 解剖位置。\u003Cbr /\u003Ean-me-lu 2 CF 位於臍上白線中間側邊。白線是腹筋膜三層的融合線：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一層包圍腹外斜肌\u003C/li\u003E\u003Cli\u003E第二層包圍腹內斜肌和腹直肌\u003C/li\u003E\u003Cli\u003E第三層包裹著腹橫\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 3 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-lu 3 CF 位於白線的側邊，稍靠近到肚臍。在這個筋膜點協調腹直肌第二和第三腱劃 （tendinous inscriptions）之間的肌纖維。\u003C/li\u003E\u003Cli\u003E如果腹部筋膜的一部分被分離並手動向外拉，牽引力會傳播到腹直肌鞘和下面的肌肉。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070556-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-lu 1 and 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E上腹區域在第二腰椎的水平的橫截面圖。\u003C/p\u003E\u003Cp\u003Ean-me-lu 的 CF 位於白線和腹直肌鞘之間\u003Cbr /\u003Ean-la-lu CF 的位於腹直肌鞘和腹斜肌融合線之閰\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060516-an-la-lu-location.jpeg\" alt=\"an-la-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。將指尖放在劍突的側面和遠端，並尋找最痛的點。操作時，建議經常換手並像鑿子一樣使用關節（針灸穴位 KI 21-20) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070528-an-me-lu1-pave-treatment.jpeg\" alt=\"an-me-lu1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用指尖或食指的指關節，在白線的中間和側面尋找一個緻密和敏感的點。一旦確定，就可用指關節或肘部（針灸穴位 KI 19-18）進行治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070545-an-me-lu2-pave-treatment.jpeg\" alt=\"an-me-lu2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 3融合中心 （CF）的觸診驗證與治療\u003Cbr /\u003E患者仰臥。治療師將指關節或肘部靠在臍帶近端和一側的白線上，並進行緻密化治療，直到滑動改善。同時，患者應感到疼痛減輕（針灸穴位 KI 17-16）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070503-an-me-lu3-pave-treatment.jpeg\" alt=\"an-me-lu3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E触诊：\u003Cbr /\u003E1）剑状正下方；\u003Cbr /\u003E2） 在剑状与肚脐的正中间，腹白线外侧；\u003Cbr /\u003E3）肚脐上缘附近。\u003Cbr /\u003E注意：第一张图片中的箭头向第二个亚单元的汇聚。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120524-an-me-lu-o-pave.jpeg\" alt=\"an-me-lu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指关节在上述点中寻找弹性最小的一点，推拿直至恢复滑动性。\u003Cbr /\u003E注意：本图演示的是针对第二个点的治疗，对于其他两点，治疗方法同上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120529-an-me-lu-o-treatment.jpeg\" alt=\"an-me-lu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-LU 障礙",
    "answer": "\u003Cp\u003Ean-me-lu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E腹痛通常會蔓延到腰部。感覺腹部腫脹或緊張。為了代償腹部筋膜的限制，軀幹姿勢可能會有輕微的前傾。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070502-an-me-lu-cp.jpeg\" alt=\"an-me-lu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 融合中心（CF）的被動動作驗證。\u003Cbr /\u003E患者站姿。治療師用一手向後移動患者的胸部，同時用另一手穩定骨盆，拉伸前側腰部區域。如果臍上腹直肌鞘緻密，則患者主訴上腹部區域疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070507-an-me-lu-move-p.jpeg\" alt=\"an-me-lu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E從上述最大伸展位置，對患者的胸骨施加阻力，並要求患者向前移動軀幹。患者可能會感到後腰疼痛或全身無力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070515-an-me-lu-move-a.jpeg\" alt=\"an-me-lu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E腹壁疼痛，肌紧张感。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E腹部筋膜感知到内部器官的紧张，就会基于内部变化调整腹斜肌的弹性。\u003Cbr /\u003E当这种适应功能缺失时，患者就会有紧张感或者肿胀感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120519-an-me-lu-o-cp.jpeg\" alt=\"an-me-lu-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-PV 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E從肚臍到恥骨聯合的腹白線外側；臍下；肚臍和恥骨聯合之間；恥骨聯合上緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI15，中注穴\u003C/li\u003E\u003Cli\u003EKI13，氣穴穴\u003C/li\u003E\u003Cli\u003EKI11，橫骨穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E下腹腔疼痛，膀胱或生殖器官紊亂\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內一盆cf點由3個點組成，都靠近腹白線，位於臍與恥骨之間（第一個點在近端，第二個在中間，第三個在遠端），組成了前-內一盆cf點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090415-An-me-pv.jpeg\" alt=\"An-me-pv\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 1,2和3CF解剖位置。\u003Cbr /\u003Ean-me-pv 1 CF 在肚臍遠端和白線側邊。\u003Cbr /\u003E此 CF 通過腹直肌鞘協調 an-pv 和 me-pv 肌筋膜單元。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070537-an-me-pv-location.jpeg\" alt=\"an-me-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 2 CF 解剖位置•\u003Cbr /\u003Ean-me-pv 2 CF 位於肚臍和恥骨之間，稍微靠近臍下白線的側邊。此CF 控制腹直肌的前向動作和錐肌 （pyramidalis muscle）的内向動作，錐肌也被稱為白線的張力線。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070553-an-me-pv-location2.jpeg\" alt=\"an-me-pv-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 3 CF 解剖位置。\u003Cbr /\u003E腹外斜肌、腹斜肌和腹橫肌腱膜融合線，位於腹直肌的側邊。\u003Cbr /\u003Ean-me-pv 3 CF 接近恥骨，正好在錐肌上(me-pv) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070511-an-me-pv-location.jpeg\" alt=\"an-me-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pv 1和2的CF 解剖位置以及橫截面線。\u003Cbr /\u003E位於恥骨嵴水平的下腹部橫切面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pv 的 CF 位於白線和腹直肌鞘之間\u003C/li\u003E\u003Cli\u003Ean-la-pv 的 CF 位於腹直肌鞘、腹斜肌和腹橫肌三個筋膜融合線的側面。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060548-an-la-pv-location.jpeg\" alt=\"an-la-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用指尖或食指的指關節來操作這個位於臍下的穴位。而針對更健壯的患者，可使用肘部治療，但這個治療方式較無法精確（針灸穴位 KI 15）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070543-an-me-pv1-pave-treatment.jpeg\" alt=\"an-me-pv1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 2融合中心 （CF）觸診和治療\u003Cbr /\u003E患者仰臥。治療師從臍下白線的中間開始觸診驗證，然後在頭側和尾側方向將觸診延伸幾厘米。處理僅限於已確定的單個緻密點（針灸穴位 KI 14-13）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070500-an-me-pv2-pave-treatment.jpeg\" alt=\"an-me-pv2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 3融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。檢查恥骨上區域，該區域通常很敏感，因為它有豐富的神經支配。因此，在決定治療點的選擇時，應考慮緻密化，而非敏感性（針灸穴位 KI 12-11）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070518-an-me-pv3-pave-treatment.jpeg\" alt=\"an-me-pv3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E触诊：\u003Cbr /\u003E1）脐孔下缘上；\u003Cbr /\u003E2） 在脐和耻骨间的中心，腹白线外侧；\u003Cbr /\u003E3）耻骨上缘上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120525-an-me-pv-o-pave.jpeg\" alt=\"an-me-pv-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧。可参考既往病历，但最重要的是通过触诊精确定位有效松解的位置。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120530-an-me-pv-o-treatment.jpeg\" alt=\"an-me-pv-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-me-pv 融合中心 （CF）的功能障礙。\u003Cbr /\u003E下腹部出現尖銳刺痛和痙攣。腹部下部有緊繃感或腫脹感。肚臍下方緊張\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070519-an-me-pv-cp.jpeg\" alt=\"an-me-pv-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 融合中心（CF）的被動動作驗證\u003Cbr /\u003E患者站姿。治療師用一手穩定患者的右肩胛骨 並用另一手向後拉患者骨盆。如果臍下直肌鞘區域緻密，患者主訴下腹部疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070524-an-me-pv-move-p.jpeg\" alt=\"an-me-pv-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者站姿。當患者將手下滑大腿內側時，治療師會在肩部施加阻力。也應在另一側重複相同的測試。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070530-an-me-pv-move-a.jpeg\" alt=\"an-me-pv-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E对于大骨盆，肠道可能是引起紧张感的原因，而对于小骨盆，膀胱和生殖器官则是引起紧张感的原因。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E"容器"的纤维化使它不能适应内容物的变化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120520-an-me-pv-o-cp.jpeg\" alt=\"an-me-pv-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-CX 障礙",
    "answer": "\u003Cp\u003Ean-me-cx 融合中心（CF）的功能障礙。\u003C/p\u003E\u003Cp\u003E恥骨骨炎，腹股溝疼痛，懷疑腹股溝疝氣，内收肌附著點病變。如果患者將大腿向後和向外側移動，從而拉伸 an-me-cx CF（Ely 氏測試），腹股溝區域的疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070540-an-me-cx-cp.jpeg\" alt=\"an-me-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cx 融合中心 （CF）的主動動作驗證。\u003C/p\u003E\u003Cp\u003E患者仰臥。緻密化也可在縮短的位置顯現。\u003Cbr /\u003E治療師要求患者用雙手將膝蓋彎曲並帶向胸部；這種動作會引發腹股溝區域的疼痛或障礙感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070546-an-me-cx-move-a.jpeg\" alt=\"an-me-cx-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cx 融合中心 （CF）的主動動作驗證。\u003C/p\u003E\u003Cp\u003E患者仰臥。主動運動驗證是透過對患者的腳施加阻力來進行的，因為他們試圖將伸展的肢體移動到屈曲和內收。有時，這種動作並不痛苦，但可能會發現患者的肌肉很虛弱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070552-an-me-cx-move-a-2.jpeg\" alt=\"an-me-cx-move-a-2\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E耻骨疼痛，腹股沟疝疼痛，内收肌肌腱端病。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E耻骨肌（前）和股薄肌（内）始于耻骨（Cooper 韧带），此外，内收长肌的近端肌腱与腹外斜肌相连，形成"前耻骨"复合体。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120502-an-me-cx-o-cp.jpeg\" alt=\"an-me-cx-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-GE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E半腱肌和股中間肌之間的凹陷；\u003C/li\u003E\u003Cli\u003E股薄肌縫匠肌和半腱肌肌腱之間；\u003C/li\u003E\u003Cli\u003E脛骨髁下抵於腓腸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESP10，血海穴；\u003C/li\u003E\u003Cli\u003ESP9，陰陵泉穴；\u003C/li\u003E\u003Cli\u003ESP8，地機穴相關問題：脛骨內側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內一膝cf點由3個點構成：第一個在髕骨上緣的內側，第二個在內側副韌帶上，而第三個在脛骨髁下方，位於嵌入脛骨內側面上部的肌腱處（鵝足）。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的地機、陰陵泉和血海穴（SP8、9 和10），以及 Maigne 法所提出的在腰第三、第四皮節形成的蜂窩織炎斑 （cellulitis plaque）®。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090427-An-me-ge.jpeg\" alt=\"An-me-ge\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 1,2 和3CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-ge 1 CF 位於股內側肌的肌腱通道\u003C/li\u003E\u003Cli\u003Ean-me-ge 2 CF 位於內側副韌帶\u003C/li\u003E\u003Cli\u003Ean-me-ge 3 CF 位於鵝足肌腱上方\u003C/li\u003E\u003Cli\u003Ean-me-ge 3 CF 受到 an-me-ta CF 的牽引，這驗證了對角線的連接。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070531-an-me-ge-location.jpeg\" alt=\"an-me-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 2 CF 解剖位置。\u003Cbr /\u003Ean-me-ge CF 位於内側髕骨支持帶上，與股内側肌的肌纖維和縫匠肌的肌腱延伸直接相連。\u003Cbr /\u003Ean-la-ge CF 位於髕骨外側支持帶上，與股外側肌的肌纖維和髂脛束的前延伸直接相連。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070548-an-me-ge-location2.jpeg\" alt=\"an-me-ge-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 3 CF 解剖位置。\u003C/p\u003E\u003Cp\u003Ean-me-ge 3 CF位於鵝足肌腱之間：縫匠肌（ir-ge）、股薄肌（me-ge） 和髕骨支持帶（an-ge) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070512-an-me-ge-location3.jpeg\" alt=\"an-me-ge-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ge 1 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E股骨的遠端三分之一處橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ge 1的CF位於股外側肌的肌腱通道\u003C/li\u003E\u003Cli\u003Ean-me-ge 1 AJ CF 位於股内側肌的肌腱通道\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060522-an-la-ge-location.jpeg\" alt=\"an-la-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ge 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E膝蓋在股骨髁水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ge 2 CF 位於髕骨支持帶的外側束\u003C/li\u003E\u003Cli\u003Ean-me-ge 2 CF 位於内側髕骨支持帶\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060540-an-la-ge-location2.jpeg\" alt=\"an-la-ge-location2\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-me-ge 1 融合中心 （CF）的治療。\u003C/p\u003E\u003Cp\u003E患者仰臥。治療師將指關節放在股內側肌的肌腱通道上，在髕骨上緣之上，並尋找最緻密和最敏感的點（針灸穴位 SP 10）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070537-an-me-ge1-pave-treatment.jpeg\" alt=\"an-me-ge1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 2融合中心 （CF）的觸診驗證與治療。\u003C/p\u003E\u003Cp\u003E患者仰臥。沿著關節內側緣探索筋膜結構：\u003Cbr /\u003E內側副韌帶、髕骨支持帶和關節囊。由於直接創傷或固定，這些結構可能已變得纖維化（針灸穴位LV 8）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070556-an-me-ge2-pave-treatment.jpeg\" alt=\"an-me-ge2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 3 融合中心 （CF）的觸診驗證與治療。\u003C/p\u003E\u003Cp\u003E患者仰臥。使用指尖來識別不適合刺激高爾基氏腱器官的鵝足肌腱的任何增厚纖維。一旦識別出這些增厚的纖維，就可用食指的指關節來治療（針灸穴位 SP 8-9）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070526-an-me-ge3-pave-treatment.jpeg\" alt=\"an-me-ge3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）半腱肌和股内侧肌之间的凹陷处；\u003Cbr /\u003E2）胫骨内侧的鹅足肌腱（股薄肌，缝匠肌，半腱肌）之间；\u003Cbr /\u003E3）胫骨髁下，邻近腓肠肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120558-an-me-ge-o-pave.jpeg\" alt=\"an-me-ge-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧，便于诊治膝内侧，治疗师用指关节触诊，找到累及更严重的子单元。此时必须仔细，因为微小的纤维束有时甚至都可以阻碍肌腱之间的滑动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120504-an-me-ge-location.jpeg\" alt=\"an-me-ge-location\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-GE 障礙",
    "answer": "\u003Cp\u003Ean-me-ge 融合中心（CF）的功能障礙。\u003C/p\u003E\u003Cp\u003E膝關節疼痛，屈伸不協調。股內側肌痙攣。\u003Cbr /\u003E關節邊緣或鵝足肌腱區域出現摩擦聲。膝關節活動受阻。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070511-an-me-ge-cp.jpeg\" alt=\"an-me-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 融合中心 （CF）的被動動作驗證。\u003C/p\u003E\u003Cp\u003E患者仰臥・治療師將患者的下肢向外和向下移動，把膝蓋的前內側部分置於張力之下。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070517-an-me-ge-move-p.jpeg\" alt=\"an-me-ge-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E患者仰臥。從上述位置，治療師要求患者伸展膝蓋並向上和向内。被動拉伸測試或主動收縮都可能出現疼痛，但治療後不應再出現這種疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070524-an-me-ge-move-a.jpeg\" alt=\"an-me-ge-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E膝盖关节内缘疼痛和胫骨髁疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E稳定膝部内侧的肌腱（内）在鹅足囊\u003Cbr /\u003E汇聚，膝盖的支持带和四头肌（前）相延续，也在此点汇聚。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120552-an-me-ge-o-cp.jpeg\" alt=\"an-me-ge-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-TA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E小腿遠端1/3處脛骨後內側；\u003C/li\u003E\u003Cli\u003E伸肌支持帶\u003Cbr /\u003E中醫穴位：\u003C/li\u003E\u003Cli\u003ELR5，蠡溝穴；\u003C/li\u003E\u003Cli\u003ESP6，三陰交穴\u003Cbr /\u003E相關問題：\u003C/li\u003E\u003Cli\u003E踝關節不穩定\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內-踝cf點位於伸肌上支持帶的內側。此處的支持帶可以在脛骨上滑動，並連接了脛骨前肌與脛骨後肌的張力，以完成踝部的前向與內向運動。\u003C/p\u003E\u003Cp\u003E此 cf點對應針灸的蠡溝穴（LR 5）和三陰交穴（SP6）。\u003C/p\u003E\u003Cp\u003E後一內一踝cf點位於跟腱的內側緣，在跟腱與脛骨之間的溝內。由小腿三頭肌、足趾屈肌、足𧿹長屈肌形成的後向與內向運動矢量匯聚於此。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090432-An-me-ta.jpeg\" alt=\"An-me-ta\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ta 1,2 融合中心 （CF）解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-ta 1 CF 位於脛骨内側表面\u003C/li\u003E\u003Cli\u003Ean-me-ta 2 CF 位於脛骨後緣的後方\u003C/li\u003E\u003Cli\u003Ean-la-ta 1 CF 位於腓骨遠端三分之一的前方\u003C/li\u003E\u003Cli\u003Ean-la-ta 2 CF 位於第三腓骨肌於腓骨的附著處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070514-an-me-ta-location.jpeg\" alt=\"an-me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ta 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E下肢遠端三分之一在踝骨上方的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ta 的 CF 位於淺層伸肌支持帶上\u003C/li\u003E\u003Cli\u003Ean-me-ta 的 CF 位於脛骨内側緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060557-an-la-ta-location.jpeg\" alt=\"an-la-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ta 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師在脛骨的內側表面進行觸診驗證和治療，在伸肌支持帶上緣穿過骨膜的水平處（針灸穴位 LV 5、SP7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070500-an-me-ta1-pave-treatment.jpeg\" alt=\"an-me-ta1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ta 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。為了尋找緻密點，治療師用食指的指關節穿透脛骨後面的溝。由於該區域存在隱靜脈和其他敏感組織（針灸穴位 SP6），因此不應長時間操作此點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070521-an-me-ta2-pave-treatment.jpeg\" alt=\"an-me-ta2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E触诊：\u003Cbr /\u003E1）伸肌上支持带水平的胫骨内侧缘后部；\u003Cbr /\u003E2）在胫骨远端；此区受损后仍会存在局部变态反应，只有当筋膜滑动性恢复时才会消退。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120540-an-me-ta-o-pave.jpeg\" alt=\"an-me-ta-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指间关节或中指指尖治疗 CF，此点在胫骨远端 1/3的内缘上。治疗此点后，此处可能会形成长达1个月的结缔组织修复性增厚。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120545-an-me-ta-o-treatment.jpeg\" alt=\"an-me-ta-o-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "AN-ME-TA 障礙",
    "answer": "\u003Cp\u003Ean-me-ta 融合中心 （CF）的功能障礙。\u003Cbr /\u003E下肢緊張和無力。融合中心（CF）的功能活動，脛跗關節失能，脛骨肌腱炎。在某些情況下，由於支持帶纖維化，空凹足、扁平足和馬蹄内翻足可能與小腿肌肉不協調有關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070548-an-me-ta-cp.jpeg\" alt=\"an-me-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ta 融合中心 （CF）的動作驗證。\u003Cbr /\u003E患者仰臥。運動驗證和 an-me-pe CF 相同。\u003Cbr /\u003E此處 CF 若不正常，患者可能會感到小腿或足部的張力更大。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070553-an-me-ta-move.jpeg\" alt=\"an-me-ta-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E踝关节疼痛，胫骨内骨膜变态反应。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E伸肌上支持带越过胫骨骨膜，将源于伸肌（前）的张力与屈肌（内）的力联系起来，从而得以进行前-内组合运动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120536-an-me-ta-o-cp.jpeg\" alt=\"an-me-ta-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-PE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E脛骨前肌肌腱和踝骨之間；\u003C/li\u003E\u003Cli\u003E脛骨前肌肌腱溝內側，內踝前側\u003C/li\u003E\u003Cli\u003E第一跖骨基底部\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELR4 中封穴；\u003C/li\u003E\u003Cli\u003ESP5 商丘六；\u003C/li\u003E\u003Cli\u003ESP4 公孫穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E足前中部疼痛，高足弓\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前--內一足cf點由3個點構成：第一個在內踝與脛骨前肌肌腱之間，第二個在內踝尖前方，而第三個在脛骨前肌位於第一跖骨基底及內側楔骨的附著點上\u003C/p\u003E\u003Cp\u003E此cf 點對應針灸的中封穴（LR 4）、商丘與公孫穴（SP 5、4），以及 Cyriax法給出的前脛距韌帶損傷的適應點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090437-An-me-pe.jpeg\" alt=\"An-me-pe\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 1,2和3CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pe 1 CF 位於伸肌支持帶上束\u003C/li\u003E\u003Cli\u003Ean-me-pe 2 CF 位於支持帶的下束\u003C/li\u003E\u003Cli\u003Ean-me-pe 3 CF 位於脛前肌的終止點處\u003C/li\u003E\u003Cli\u003E形成an-me-pe CF 的足部肌肉在遠端方向牽引前内向對角線\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070519-an-me-pe-location.jpeg\" alt=\"an-me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pe CF 位於伸肌支持帶的上束和下束，靠近內踝前緣：\u003Cul\u003E\u003Cli\u003Ean-me-pe 1 CF 位於十字支持帶上束的内部。\u003C/li\u003E\u003Cli\u003Ean-me-pe 2 CF 位於同支持帶下束的内部。\u003C/li\u003E\u003Cli\u003Ean-me-pe 3 CF 位於支持帶下束的附著處。\u003C/li\u003E\u003C/ul\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-me-pe-location2.jpeg\" alt=\"an-me-pe-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 1 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E足部在距骨、舟狀骨和骰骨的水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-pe 1的CF 位於伸肌支持帶的外側束\u003C/li\u003E\u003Cli\u003Ean-me-pe 的CF 位於伸肌支持帶的内側束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060531-an-la-pe-location.jpeg\" alt=\"an-la-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 2的CF 解剖位置以及和CC（協調中心）的相對關係。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-pe 1 CF 位於伸肌支持帶上，靠近外踝。\u003C/li\u003E\u003Cli\u003Ean-la-pe 2的CF 位於第4和第5蹠骨之間，靠近它們的基部。\u003C/li\u003E\u003Cli\u003Ean-la-pe 3的 CF 位於第4 和第5之間的蹠骨，靠近蹠骨頭部。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060548-an-la-pe-location2.jpeg\" alt=\"an-la-pe-location2\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-me-pe 3 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pe 3 CF 位於脛骨前肌附著於内側楔形骨和第一蹠骨的位置\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070552-an-me-pe-location3.jpeg\" alt=\"an-me-pe-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 1、2和3CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pe CF 從近 - 遠端方向牽引\u003C/li\u003E\u003Cli\u003Ere-me-pe 1 CF 位於屈肌支持帶上束\u003C/li\u003E\u003Cli\u003Ere-me-pe 3 CF 位於屈肌支持帶下束\u003C/li\u003E\u003Cli\u003Ere-me-pe 2 CF 位於屈肌支持帶的中間束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-me-pe-location.jpeg\" alt=\"re-me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 1融合中心 （CF）的治療。\u003Cbr /\u003E患者仰臥或側臥。將指關節放在伸肌支持帶的上束，靠近脛前肌腱，並操作最緻密和最敏感的點（針灸穴位 LV4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070526-an-me-pe-treatment.jpeg\" alt=\"an-me-pe-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或側臥。用指關節尋找和再現患者描述的踝關節疼痛的點。繼續操作直到疼痛消失（針灸穴位 SP5）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-me-pe2-pave-treatment.jpeg\" alt=\"an-me-pe2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或側臥。治療師將指關節放在伸肌支持帶的上束，靠近脛前肌腱，並治療最緻密和最敏感的點（針灸穴位 SP 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070500-an-me-pe3-pave-treatment.jpeg\" alt=\"an-me-pe3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E触诊：\u003Cbr /\u003E1）胫前肌腱内侧沟中，内踝前；\u003Cbr /\u003E2）胫前肌腱和内踝尖之间的沟中；\u003Cbr /\u003E3）在第1跖骨的基底部，内侧楔骨前。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120500-an-me-pe-o-pave.jpeg\" alt=\"an-me-pe-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，外旋腿部，治疗师使用指关节在胫前肌远端的止点寻找治疗点，然后沿肌腱寻至支持带。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120508-an-me-pe-o-treatment.jpeg\" alt=\"an-me-pe-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-PE 障礙",
    "answer": "\u003Cp\u003Ean-me-pe 融合中心 （CF）的功能障礙。\u003Cbr /\u003E支持帶通過與高爾基氏腱器官相互作用，在協調運動方面發揮著重要作用。伸肌支持帶的上束根據距骨的位置改變伸肌腱的角度，而下束根據前足的位置在肌腱上相互作用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070502-an-me-pe-cp.jpeg\" alt=\"an-me-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E患者仰臥。治療師握住患者的前腳並向外和向下伸展。患者報告他們是否感到腳踝和前足內側區域疼痛或僅感到緊張。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070507-an-me-pe-move-p.jpeg\" alt=\"an-me-pe-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者仰臥。治療師從上述最大伸展位置，要求患者在前中間方向上和向內移動他們的腳，以抵抗來自治療師施加的阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070513-an-me-pe-move-a.jpeg\" alt=\"an-me-pe-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E足痛，踝关节功能障碍，肌腱炎。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E畸形足或马蹄内翻足，高弓足或扁平足，表明足和腿的肌肉作为一个整体的协同作用出现问题，而不是某一肌肉出现问题。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120556-an-me-pe-o-cp.jpeg\" alt=\"an-me-pe-o-cp\" /\u003E\u003C/p\u003E"
  },

    "question": "AN-ME-SC 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鎖骨中線上\u003C/li\u003E\u003Cli\u003E第2和3肋骨溝\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EST15，屋翳穴\u003C/li\u003E\u003Cli\u003EST16，膺窗穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩部局部疼痛或彌漫性疼痛，手臂感覺異常，胸廓出口綜合征\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內-肩cf點位於胸大肌胸骨部的中心（第二肋間隙），在這里它同步隊鎖-腋筋膜（前、內旋）與胸大肌筋膜（內）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090444-An-me-sc.jpeg\" alt=\"An-me-sc\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-sc 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-sc 1 CF 位於胸小肌上段的肌腱通道上\u003C/li\u003E\u003Cli\u003Ean-me-sc 2 CF 靠近胸小肌中段的肌腱通道\u003C/li\u003E\u003Cli\u003Ean-la-sc 1 CF 位於中斜角肌\u003C/li\u003E\u003Cli\u003Ean-la-sc 2 CF 位於鎖骨上窩\u003C/li\u003E\u003Cli\u003E肩胛的 CF 受到來自肱骨的牽引力，然後分布到頸部的肌筋膜單元，反之亦然。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070541-an-me-sc-location.jpeg\" alt=\"an-me-sc-location\" /\u003E\u003Cbr /\u003Ean-la-sc 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E第二胸椎水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-sc 2 的 CF位於臂神經叢前方\u003C/li\u003E\u003Cli\u003Ean-me-cl 的 CF 位於SCM前方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060514-an-la-sc-location.jpeg\" alt=\"an-la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-sc 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥，治療師站在同側或對側。觸診驗證與治療在胸筋膜上進行，位置在第二肋間隙（針灸穴位 ST 14、15）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070530-an-me-sc1-pave-treatment.jpeg\" alt=\"an-me-sc1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-sc 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。使用指尖進行觸診驗證（PaVe），並使用食指關節來治療 an-me-sc 2 CF 所在的第三肋間（針灸穴位 ST 16）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070552-an-me-sc2-pave-treatment.jpeg\" alt=\"an-me-sc2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）在第2肋间隙，锁骨中线处；\u003Cbr /\u003E2） 在第3肋间隙处。\u003Cbr /\u003E有痛感的运动：患者主诉，当试图触摸对侧肩部时，痛感加剧（Yocum 试验，用于诊断肩峰下撞击综合征）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120528-an-me-sc-o-pave.jpeg\" alt=\"an-me-sc-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指间关节来重建\u003Cbr /\u003E滑动性，即肌内（各束胸大肌之间）与肌间（在胸小肌的肋上止点和胸大肌之间）的顺畅滑动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120533-an-me-sc-o-treatment.jpeg\" alt=\"an-me-sc-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-HU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第四肋間溝\u003C/li\u003E\u003Cli\u003E胸大肌肌腱近端外側或下方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EGB22，淵腋穴\u003C/li\u003E\u003Cli\u003ESP19，胸鄉穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩部疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內一肱cf點位於腋窩支持帶的胸壁緣，在這里它管理胸大肌、啄肱肌（前）及背闊肌（內）間的協同®。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090449-An-me-hu.jpeg\" alt=\"An-me-hu\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-hu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-hu CF 位於胸大肌前向、内向、內旋運動的肌腱通道內\u003C/li\u003E\u003Cli\u003Ean-me-hu CF 受到來自 an-me-cu CF 的牽引力\u003C/li\u003E\u003Cli\u003Ean-la-hu CF 位於三角肌遠端肌腱的前外側\u003C/li\u003E\u003Cli\u003Ean-la-hu CF 受到來目 an-la-cu 的 CF的牽引力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070557-an-me-hu-location.jpeg\" alt=\"an-me-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-hu 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E穿過肱骨頭矢狀斜截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-hu 的 CF 位於三角肌遠端肌腱前面\u003C/li\u003E\u003Cli\u003Ean-me-hu CF 位於胸大肌腱上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070532-an-la-hu-location.jpeg\" alt=\"an-la-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-hu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。使用指尖進行觸診驗證（PaVe），並使用食指關節或肘部來治療連接腋前壁肌腱的筋膜（針灸穴位 GB 23）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070507-an-me-hu-pave-treatment.jpeg\" alt=\"an-me-hu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）胸大肌肌腱的外侧和近端；\u003Cbr /\u003E2）锁骨-喙突-腋筋膜上的第4肋间隙处。\u003Cbr /\u003E有痛感的运动：患者主诉当手臂向后和向外移动时（恐惧试验，用于诊断复发性肩关节半脱位），肩关节向前半脱位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120544-an-me-hu-o-pave.jpeg\" alt=\"an-me-hu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指节抵住胸大肌肌腱近侧缘（1），并用拇指或中指指尖抵住肋间隙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120550-an-me-hu-o-treatment.jpeg\" alt=\"an-me-hu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-HU 障礙",
    "answer": "\u003Cp\u003Ean-me-hu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E難以抬起手臂。有腋窩腫脹和受限的感覺。\u003Cbr /\u003E孟肱關節不穩定。用於評估復發性半脫位的恐懼測試（Apprehension test）可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070540-an-me-hu-cp.jpeg\" alt=\"an-me-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-hu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E患者站姿。an-me-hu CF 的任何錯誤功能都透過向上和向後拉患者的手臂來測試。孟肱關節的完𤨣運動範圍受到腋前壁筋膜彈性降低而限制。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070545-an-me-hu-move-p.jpeg\" alt=\"an-me-hu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-hu 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E治療師握住患者的手腕，並要求他們將手移向對面的肩膀。這種動作會導致執行肱骨前內向動作序列的肌肉收縮。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070551-an-me-hu-move-a.jpeg\" alt=\"an-me-hu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E腋部及其正下方手臂的疼痛及肿胀。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E胸筋膜包绕胸大肌，整合锁骨部分（前）与内部（内旋）和下部（内）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120538-an-me-hu-o-cp.jpeg\" alt=\"an-me-hu-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-CU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肱骨內上髁的肌腱附著點之間（旋前圓肌、尺側腕屈肌和指屈肌）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EHT3，少海穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肱骨內上課炎（高爾夫球肘）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前一內--肘cf點位於手臂的前內側，旋前圓肌（內旋）、尺側腕屈肌（內）與指屈肌（前）匯合處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090454-An-me-cu.jpeg\" alt=\"An-me-cu\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cu CF 位於橈側屈腕肌、掌長肌和旋前圓肌的肌腱上\u003C/li\u003E\u003Cli\u003Ean-me-cu CF 受到來自 an-me-ca CF 的牽引力\u003C/li\u003E\u003Cli\u003Ean-la-cu CF 位於二頭肌腱和肱橈肌之間的溝中\u003C/li\u003E\u003Cli\u003Ean-la-cu CF 受到來自an-la-ca CF 的牽引力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070509-an-me-cu-location.jpeg\" alt=\"an-me-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 的 CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E肘部在鷹嘴的水平橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cu 的 CF 位於肱二頭肌肌腱外側和肱橈肌内側\u003C/li\u003E\u003Cli\u003Ean-me-cu 的 CF 位於旋前圓肌和手指屈肌的聯合處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-la-cu-location.jpeg\" alt=\"an-la-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用食指關節來操作支持帶的膠原纖維，這些膠原纖維延伸到肌肉的共同肌腱上，執行肘部的前向、内向和内旋的動作策略（針灸穴位 HT 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070515-an-me-cu-pave-treatment.jpeg\" alt=\"an-me-cu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E找到止于内上髁前方区域中不同肌肉的肌腱纤维化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120514-an-me-cu-o-pave.jpeg\" alt=\"an-me-cu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，伸直手臂，治疗师重建筋膜基质的滑动性，使胶原纤维可自由滑动并适应牵拉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120520-an-me-cu-o-treatment.jpeg\" alt=\"an-me-cu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-CU 障礙",
    "answer": "\u003Cp\u003Ean-me-cu 融合中心 （CF）的功能障礙\u003Cbr /\u003E手臂動作笨拙。前臂的尺側感覺異常。上肢震顫、痙攣和抽搐。內上髁疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070550-an-me-cu-cp.jpeg\" alt=\"an-me-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E患者站姿。治療師用一手握住患者的肘部，另一手在手腕上施加槓桿作用，拉緊內側上髁肌肉。旋前圓肌和屈肌在被動拉伸過程中可能會很痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070556-an-me-cu-move-p.jpeg\" alt=\"an-me-cu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cu 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E此主動動作驗證是要求患者向前和向內移動他們的前臂，並抵抗放置在手腕的阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070503-an-me-cu-move-a.jpeg\" alt=\"an-me-cu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E内上髁炎，肌腱炎。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E肱二头肌（前）向中部的尺骨部位延伸出腱膜纤维，此处也是内侧肌间隔覆盖区域，同时也是尺侧腕屈肌的起点；这样的向量组合确保了肘部弯曲时内侧的稳定性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260528120508-an-me-cu-o-cp.jpeg\" alt=\"an-me-cu-o-cp\" /\u003E\u003C/p\u003E"

g src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070534-an-me-ca2-pave-treatment.jpeg\" alt=\"an-me-ca2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）在前臂远端1/3 处，在桡侧腕屈肌腱和掌长肌之间；\u003Cbr /\u003E2） 相同的两肌腱之间，略朝向尺骨远端方向。\u003Cbr /\u003E有痛感的运动：患者主诉手腕过度伸展或弯曲加重手部异常感觉（Phalen\u003Cbr /\u003E试验，用于诊断腕管综合征）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527110511-an-me-ca-o-pave.jpeg\" alt=\"an-me-ca-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，双手手心向上置于体侧，治疗师检查这一点，其常导致夜间感觉异常（腕管综合征）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527110517-an-me-ca-o-treatment.jpeg\" alt=\"an-me-ca-o-treatment\" /\u003E\u003C/p\u003E"

src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070543-an-me-di2-pave-treatment.jpeg\" alt=\"an-me-di2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）在腕横纹上，大鱼际和小鱼际之间的正中位置。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527110502-an-me-di-o-pave.jpeg\" alt=\"an-me-di-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧或坐位，治疗师使用指关节推拿腕橫纹的中心点，即触诊加重患者症状的点位。此点也是在诊断腕管综合征时需要考虑的点位之一。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527110509-an-me-di-o-treatment.jpeg\" alt=\"an-me-di-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean- me-di 融合中心 （CF）的功能障礙。\u003Cbr /\u003E手和手指疼痛，尤其是小指。手指的運動缺乏協調性，抓握能力弱，尺側手指有疼痛和針刺感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070514-an-me-di-cp.jpeg\" alt=\"an-me-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-di 融合中心（CF）的被動主動動作驗證。\u003Cbr /\u003E患者站立。將患者的手指伸展到末端，握住小指做為槓桿。從這個位置開始，治療師對手指的尺側施加阻力，並要求患者向内和向下移動他們的手（an-me-ir）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070519-an-me-di-move-p.jpeg\" alt=\"an-me-di-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心和相关CC点\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E手指感觉异常，腕部疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E鱼际肌是止于屈肌支持带的主要肌肉，其收缩控制着拇对掌或前-内-指的运动。握住一个物体需要拇指和其他手指的协同作用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527110557-an-me-di-o-cp.jpeg\" alt=\"an-me-di-o-cp\" /\u003E\u003C/p\u003E"

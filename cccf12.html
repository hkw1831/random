  {
    "question": "ME-CA 障礙",
    "answer": "\u003Cp\u003Eme-ca 筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於尺側屈腕肌嵌入豌豆骨的位置（附著點病變）。\u003Cbr /\u003E疼痛可能會沿著尺側屈腕肌腱延伸（肌腱病變）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010505-me-ca-cp.jpeg\" alt=\"me-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ca 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者不能用手腕做費力的運動，特別是使用尺側屈腕肌的動作時，例如拉繩子。\u003Cbr /\u003E想提醒讀者疼痛會抑制肌肉收縮。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010510-me-ca-pamo.jpeg\" alt=\"me-ca-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E当尺侧腕屈肌肌腱有疼痛时，豌豆骨非常敏感，即使轻微触碰（也可感受到）\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E肌腱及附着点高敏感，因肌纤维的异常张力引起非生理学方向的牵拉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100511-me-ca-o-cp.jpeg\" alt=\"me-ca-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E测试包括拉紧尺侧腕屈肌，无论是肌肉主动收缩，被动牵拉或是偶尔不留神的运动，都会加剧疼痛。患者如果能够演示日常生活能够加重其疼痛的特异性动作，是非常有用的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100516-me-ca-o-move.jpeg\" alt=\"me-ca-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-DI 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第1骨間肌背側\u003C/li\u003E\u003Cli\u003ELI4，合谷穴\u003C/li\u003E\u003Cli\u003E第1背側骨間肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E手指的外向運動（分開手指）由單關節肌（骨間背側肌）和雙關節肌（拇長展肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的ce 點在第一骨間背側肌上，就在獲蓋拇長展肌肌腱並延伸到其他手指骨間肌的筋膜上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090444-La-di.jpeg\" alt=\"La-di\" /\u003E\u003C/p\u003E\u003Cp\u003E後側手節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-di 位於尺骨上的手掌筋膜，單關節（外展小指肌）和雙關節（伸小指肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-di 位於骨間筋膜上，單關節（第一骨間肌）和雙關節（橈側伸腕肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-di 位於第五指的肌腱附近，單關節（蚓狀肌）和雙關節（伸指長肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110503-re-di-location.jpeg\" alt=\"re-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一背側骨間肌終止於第二手指的橈側。\u003C/li\u003E\u003Cli\u003E它的筋膜延續到中指和無名指的骨間。\u003C/li\u003E\u003Cli\u003E拇指和小指的伸肌腱則沒有附著在背側骨間肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-la-di-location.jpeg\" alt=\"la-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E手在掌骨水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-di 的 CC 位於外展小指肌上方；這塊肌肉的運動軌跡與伸小指肌的動作一致。\u003C/li\u003E\u003Cli\u003Eer-di 的 CC 位於手背筋膜上，準確地說是在圍繞著伸指肌腱的淺層隔膜上。\u003C/li\u003E\u003Cli\u003Ela-di 的CC 位於第一背側骨間肌上，其筋膜與覆蓋另一骨間肌的深隔膜相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080508-er-di-location.jpeg\" alt=\"er-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-di 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E此協調中心的觸診驗證是在第一背側骨間肌上進行的，更準確地說，是抵著第一和第二手指之間的筋膜（連合間筋膜）（intercommissural fascia） 上進行（針灸穴位 LI 4 • LI3 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010540-la-di-pave.jpeg\" alt=\"la-di-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-di 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥或坐位，治療師經常與其他協調中心聯合鬆動此協調中心，因此，治療的擺位可能會有所不同；例如，如果 la-di的 CC 的治療與 la-sc 的CC連動進行，那麼患者處於坐位的情況下進行操作。壓力適中，沿縱向進行。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010550-la-di-treatment.jpeg\" alt=\"la-di-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧或取坐位，治疗师一手紧握固定患者的手，另一手用指间关节作用于第1和第2掌骨间的筋膜上。\u003Cbr /\u003E需要患者配合确认导致疼痛症状的点是否位于手法操作的中心部位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010547-la-di-o-treatment.jpeg\" alt=\"la-di-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-DI 障礙",
    "answer": "\u003Cp\u003Ela-di 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E疼痛位於第二指和中指的指骨處。當疼痛持續存在一段時間，這些指骨會發生關節炎變形。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010527-la-di-cp.jpeg\" alt=\"la-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-di 肌筋膜單元的疼痛動作\u003Cbr /\u003E患者表示無法張開手指，並且手感覺僵硬和笨拙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010531-la-di-pamo.jpeg\" alt=\"la-di-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E所有手指的指间关节疼痛和动作的不协调，手指从中线外展过程中（外向运动）表现得尤其明显。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E拇指和示指之间的筋膜与指背深筋膜延续，指背深筋膜覆盖骨间背侧肌（外展肌）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010539-la-di-o-cp.jpeg\" alt=\"la-di-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E治疗师对患者的示指和小指加阻力，以阻抗患者伸展手指的试图外展或张开。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010543-la-di-o-move.jpeg\" alt=\"la-di-o-move\" /\u003E\u003C/p\u003E"
  },

    "question": "ME-DI 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E小魚際肌腹上\u003C/li\u003E\u003Cli\u003EHT8，少府穴\u003C/li\u003E\u003Cli\u003E小指屈肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E手指的內向運動（向中線並攏手指）由單關節肌（骨間掌側肌、小指對掌肌）和雙關節肌（掌長肌--大、小魚際的肌肉止於此肌的腱膜上）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在掌短肌和小指屈肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090451-Me-di.jpeg\" alt=\"Me-di\" /\u003E\u003C/p\u003E\u003Cp\u003E手部節段掌面協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-di CC 位於魚際隆起處，單關節（屈拇短肌）與雙關節（屈拇長肌）向量匯合處。\u003C/li\u003E\u003Cli\u003Eme-di 的 CC 位於小魚際隆起處，單關節（掌骨間肌）和雙關節（屈肌小指）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-di 的 CC 位於手掌的中心，在那裡單關節（蚓狀肌）和雙關節關節（屈肌）向量會聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090529-an-di-location.jpeg\" alt=\"an-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E掌短肌和屈指短肌嵌入到橫腕韌帶的尺側。屈拇短肌起源於同一韌帶的橈側。當拇指與小指接觸時，橫韌帶和掌骨間肌筋膜使參與指間運動（me-di）的肌肉同步。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010522-me-di-location.jpeg\" alt=\"me-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E右手在掌骨的水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-di 的CC 位於掌短肌 （palmarisbrevis）和屈小指短肌 （flexor digitiminimi brevis）上方；後者的筋膜延續在掌骨間肌（palmar interosseous muscles）上進行手指内收。\u003C/li\u003E\u003Cli\u003Eir-di 的CC 位於手掌腱膜上，對應於中指的淺屈肌和深屈肌的肌腱。\u003C/li\u003E\u003Cli\u003ECC 位於大魚際筋膜上，覆蓋外展\u003C/li\u003E\u003Cli\u003E姆指肌 （abductor pollicis） 和屈拇指短肌 （flexor pollicis brevis）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070529-ir-di-location.jpeg\" alt=\"ir-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-di 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證位於小魚際肌隆起的筋膜，位於第五掌骨（針灸穴位 HT 8）的底部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010517-me-di-pave.jpeg\" alt=\"me-di-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-di協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。使用食指指關節來治療 me-di的CC，另一隻手穩定患者的手（此處末顯示治療師的穩定手，以便清楚地看到正在操作的手）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010528-me-di-treatment.jpeg\" alt=\"me-di-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧或坐位，治疗师利用指间关节透过小鱼肌的小肌肉间，定位，然后治疗条索样的筋膜\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100538-me-di-o-treatment.jpeg\" alt=\"me-di-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-DI 障礙",
    "answer": "\u003Cp\u003Eme-di 筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於第五掌骨區域，以及指間關節。\u003Cbr /\u003E小指有這種疼痛的患者經常說：「我才意識到小指在手勢中的重要性」。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010509-me-di-cp.jpeg\" alt=\"me-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-di 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E此肌筋膜單元的張力代償會阻礙第五指的內收，也會導致第二和第四指向中線移動的無力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010513-me-di-pamo.jpeg\" alt=\"me-di-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛位点或 CP：\u003Cbr /\u003E小指和手掌的疼痛\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E手指如同细微可移动的天线一般，它们的活动通过手部小肌群来调节；小鱼际筋膜与内收肌协同工作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100527-me-di-o-cp.jpeg\" alt=\"me-di-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动验证\u003Cbr /\u003E手的抓或握是复合运动，涉及手指的内收、向前运动和内旋；当出现功能障碍时，应分别针对这些成分进行检测。测试内收动作（骨间掌侧肌）要求患者对抗阻力将伸展的手指内收。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100533-me-di-o-move.jpeg\" alt=\"me-di-o-move\" /\u003E\u003C/p\u003E"
  },

    "question": "AN-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E眼窩下緣，眼輪匝肌下方纖維上，瞳孔正下方\u003C/li\u003E\u003Cli\u003EST1，承泣穴\u003C/li\u003E\u003Cli\u003E眼下直肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部（頭）前向運動有3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的下直肌，其ce 點位於眼球與眶下緣中點之間；\u003C/li\u003E\u003Cli\u003E2=顳肌，其cc 點在鼻翼的外側；\u003C/li\u003E\u003Cli\u003E3=二腹肌前腹，其ce 點在下頷體的下緣上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E逢接這些的要素是面筋膜，其張力來自鎮隔肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070404-An-cp1.jpeg\" alt=\"An-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E眼部節段協調中心的比較性觸診\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 1的CC位於眼球及眶上嵴之間；單關節（上斜肌的滑車）及雙關節向量（眼輪匝肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Eme-cp 1的CC 位於內側眼臉韌帶，其中單關節（內直肌）及雙關節（眼輪匝肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 1的CC位於瞳孔下方並與瞳孔對齊，單關節（直肌下）和特定向量（眼球）匯合。Tenon&#39;s 囊筋膜將這些向量連接起來。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070540-an-cp1-location.jpeg\" alt=\"an-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E牽引眼輪匝肌（orbicularis oculi）上的耳前肌(anterior auricular muscle) (ir-cp 1-2) •\u003C/li\u003E\u003Cli\u003E牽引眼輪匝肌的上唇方肌顴骨部分（zygomatic portion of the quadratus labii supe-rioris) (an-cp 1-2) •\u003C/li\u003E\u003Cli\u003E上唇方肌的角部（angular portion of the quadratus labii superioris），在内側臉韌帶 (medial palpebral ligament) 和口輪匝肌的内側縫之間延伸（me-cp 1-2）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060520-me-cp1-location.jpeg\" alt=\"me-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E矢狀面和下方横截面中的眼球球狀筋膜 (Fasciae of the bulbus oculi) •\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 1 的CC 連接到上斜肌的筋膜，通過它的肌腱，位於眼眶上部的滑車（向下旋轉眼睛）。\u003C/li\u003E\u003Cli\u003Ean-cp 1的CC 與下直肌筋膜相連。\u003C/li\u003E\u003Cli\u003Eme-cp 1 的CC 與内直肌和眼球筋膜的眼眶肌腱，即眼球囊膜〔Tenon（特農）氏膜〕相關。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060501-ir-cp1-location.jpeg\" alt=\"ir-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cp 1 協調中心（CC）的觸診驗證。\u003Cbr /\u003E將食指或中指的指尖放在眼眶下緣下方以進行觸診驗證，尋找緻密化及傳導痛。CC位於與瞳孔對齊的位置（針灸穴位 ST 2）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070535-an-cp1-pave.jpeg\" alt=\"an-cp1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cp 1的協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E將食指的指尖（並疊加中指來加強）放置在眼眶下緣下方，並執行輕微的摩擦（1），直到局部疼痛及任何傳導痛消失為止。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070545-an-cp1-treatment.jpeg\" alt=\"an-cp1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E用示指、中指指腹对向眼轮下缘，进行轻摩擦，确定是否存在组织改变，并注意牵涉痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070518-an-cp-1-o-treatment.jpeg\" alt=\"an-cp-1-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-CP1 障礙",
    "answer": "\u003Cp\u003Ean-cp 1 肌筋膜單位的疼痛部位和感知中心（CP）。\u003Cbr /\u003E由於球嚢筋膜（fascia bulbi or Tenon&#39;s fascia） 的緻密化，造成下眼瞼的問題，眼輪匝肌和下直肌之間協調問題。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070525-an-cp1-cp.jpeg\" alt=\"an-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cp 1肌筋膜單元的疼痛運動(PaMo) •\u003Cbr /\u003E當患者向下看，同時保持脖子正直時，會感到複視或歪斜感。可能存在相對於對側 的輕微下眼瞼下垂。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070530-an-cp1-pamo.jpeg\" alt=\"an-cp1-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E眼裂下缘功能异常，不能下视。\u003Cbr /\u003E起源或 CC：\u003Cbr /\u003E由于球筋膜或Tenon 囊的变异，使得眼轮匝肌与下直肌协同性缺失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070505-an-cp-1-o-cp.jpeg\" alt=\"an-cp-1-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E嘱患者下视但不能屈颈，注意双眼运动是否同步。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070512-an-cp-1-o-move.jpeg\" alt=\"an-cp-1-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E眉毛內側1/3，眼眶外，眶上孔之上\u003C/li\u003E\u003Cli\u003EBL2，攢竹穴\u003C/li\u003E\u003Cli\u003E眼上直肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部（頭）的後向運動由3個次級肌筋膜單元組成：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的上直肌，其cc 點位於眼眉的內側緣；\u003C/li\u003E\u003Cli\u003E2=額肌，其cc 點在額肌的中心；\u003C/li\u003E\u003Cli\u003E3=枕肌，其cc 點在枕肌與豎脊肌之間的部位。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這3個部分由帽狀腱膜協調統一，其張力來自之前提到的肌肉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070413-Re-cp1.jpeg\" alt=\"Re-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著眼節段進行協調中心的比較\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 1的CC 位於眉毛的内緣，單關節肌（上直肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 1的CC 位於外眥上，單關節（外直肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp 1的CC位於眼球 （bulbus oculi）和眼眶下緣之間，單關節（下斜肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100530-re-cp-1-location.jpeg\" alt=\"re-cp-1-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E牽拉來自向後的額肌和向前的眼輪匝肌或皺眉肌（re-cp 1-2）。\u003C/li\u003E\u003Cli\u003E牽拉來自向外的顳肌和向内的眼外直肌(la-cp 1-2) •\u003C/li\u003E\u003Cli\u003E帽狀腱膜的牽拉來自斜向的耳上肌和下斜肌以及眼輪匝肌的反向張力（er-cp 1-2）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060509-la-cp1-location.jpeg\" alt=\"la-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E矢狀面和下方橫截面中的眼球球筋膜 (Fasciae of the bulbus oculi) •\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 1 的CC 位於提上眼臉肌 （levatorpalpebrae superioris）筋膜和上直肌。\u003C/li\u003E\u003Cli\u003Eer-cp 1 的CC 連接到下斜肌，使眼睛向一側旋轉。\u003C/li\u003E\u003Cli\u003Ela-cp 1 的CC，外直肌周圍的筋膜形成眶外肌腱，附著於外側眼眶。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060529-er-cp1-location.jpeg\" alt=\"er-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 1協調中心（CC）的觸診驗證。\u003Cbr /\u003Ere-cp 1 協調中心位於眉毛內側末端上方的凹陷處，內眥正上方（針灸穴位 BL 2）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100524-re-cp-1-pave.jpeg\" alt=\"re-cp-1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 1協調中心（CC）的治療。患者仰臥。\u003Cbr /\u003E放置拇指或食指的指尖，由中指加強。根據使用的指尖，治療師可以站在床的側面或頂部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100536-re-cp-1-treatment.jpeg\" alt=\"re-cp-1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E让患者仰卧，治疗师把两个示指的指尖放在眉毛的内侧缘，以方便对这两个协调中心进行比较性的触诊，而只针对有牵涉痛的致密化的协调中心进行治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090543-re-cp1-o-treatment.jpeg\" alt=\"re-cp1-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-CP1 障礙",
    "answer": "\u003Cp\u003Ere-cp 1 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E上直肌失能。上眼瞼下垂。近視、夜盲症、眼睛發紅。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100513-re-cp-1-cp.jpeg\" alt=\"re-cp-1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 1 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者向上看時會受困於複視或斜視。這種疾病通常與顱神經功能障礙有關。然而，有時是由於Tenon 筋膜缺乏協調，導致兩眼不同步。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100518-re-cp-1-pamo.jpeg\" alt=\"re-cp-1-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或CP：\u003Cbr /\u003E在上眼睑和眼上直肌\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E在眼球或Tenon 囊的筋膜处，眼上直肌纤维与眼睑上部及眼轮匝肌纤维相结合。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090533-re-cp1-o-cp.jpeg\" alt=\"re-cp1-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让患者向上凝视，观察明确是否存在双眼对称性问题或某只眼睛问题突出\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090538-re-cp1-o-move.jpeg\" alt=\"re-cp1-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-CP2 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E眼窩下緣下方，小顴骨肌上，朝向顴骨下緣\u003C/li\u003E\u003Cli\u003EST3，巨膠穴\u003C/li\u003E\u003Cli\u003E顴肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070421-An-cp2.jpeg\" alt=\"An-cp2\" /\u003E\u003C/p\u003E\u003Cp\u003E上頜節段協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 2 CC 位於耳輪的前面，其中單關節（耳前肌）及雙關節（顳肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 2的CC位於臉頰的中間，這裡是單關節（提上唇肌 levator labii superioris\u003C/li\u003E\u003Cli\u003E及雙關節（口角肌 anguli oris） 的向量匯合點。\u003C/li\u003E\u003Cli\u003Eme-cp 2的CC位於鼻唇溝 nasolabial sulcus 的中心，單關節（提上唇鼻翼肌 levatorlabii superior alaeque nasi） 及雙關節（顴肌的翼頭 alar head of zygomaticus） 的向量會合點。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070537-an-cp2-location.jpeg\" alt=\"an-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E翼狀肌在頭側和尾側方向牽引耳前肌（ir-cp 2-3) °\u003C/li\u003E\u003Cli\u003E唇方肌（quadratus labii）向上牽引上唇，頸闊肌 （platysma） 則是向下牽引（an-cp2-3) 。\u003C/li\u003E\u003Cli\u003E口輪匝肌向上牽引唇內側纖維彈性板，頸闊肌内側纖維向下牽引（me-cp 2-3）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-me-cp2-location.jpeg\" alt=\"me-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E顱骨斜切面圖（從後到前）。註解：級別上頜骨的高度低於後顱骨水平。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cp 2的CC位於上領骨和顴骨之間，在提上唇肌 （levator labii superioris muscle）上方。\u003C/li\u003E\u003Cli\u003Eme-cp 2的CC 位於兩上領骨中間的鼻唇溝 （nasolabial sulcus）中。me-cp 2後側的 CC 位於兩塊額肌之間。\u003C/li\u003E\u003Cli\u003Eir-cp 2的CC 位於耳輪和耳屏（tragus）之間，在開口時形成的凹陷的上部。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060556-ir-cp2-locatoon.jpeg\" alt=\"ir-cp2-locatoon\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-cp 2 協調中心（CC）的觸診驗證。\u003Cbr /\u003E使用食指或中指的指尖沿著顴肌尋找有傳導痛的痛點。此點在瞳孔延伸到嘴角的線上（針灸穴位 ST 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070532-an-cp2-pave.jpeg\" alt=\"an-cp2-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cp 2的協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E用一隻手穩定患者的頭部，然後用另一隻手的食指指尖疊加中指，在筋膜上執行輕微的摩擦（2），直到疼痛消失。在治療過程中，治療師可以站在患者一側，也可以站在治療床的頭側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070543-an-cp2-treatment.jpeg\" alt=\"an-cp2-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E应用示指对向颧肌的纤维横向治疗，进行摩擦，持续治疗至疼痛消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070509-an-cp2-o-treatment.jpeg\" alt=\"an-cp2-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-CP2 障礙",
    "answer": "\u003Cp\u003Ean-cp 2的疼痛部位及感知中心(CP) •\u003Cbr /\u003E上唇無力，無法口含唾液（流涎），嘴唇下垂是由於眼輪閘肌與顴肌之間缺乏協調性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070523-an-cp2-cp.jpeg\" alt=\"an-cp2-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cp 2 的疼痛動作（PaMo）。\u003Cbr /\u003E患者在微笑或說話時無法揚高無力側的上唇，也無法口含唾液，導致流口水。若沒直接受到無力問題影響的人，在長時間微笑時，會導致面部抽筋。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070527-an-cp2-pamo.jpeg\" alt=\"an-cp2-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E上唇麻木，流涎过量。\u003Cbr /\u003E起源或 CC：\u003Cbr /\u003E由于筋膜改变而产生了眼轮匝肌和颧肌的协同异常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070559-an-cp2-o-cp.jpeg\" alt=\"an-cp2-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E嘱患者微笑，观察是否存在双侧嘴唇不对称。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070503-an-cp2-o-move.jpeg\" alt=\"an-cp2-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-CP2 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003ERE-CP1上方稍外側，近發際線，額肌上\u003C/li\u003E\u003Cli\u003EBL4，曲差穴\u003C/li\u003E\u003Cli\u003E額肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070428-re-cp2.jpeg\" alt=\"re-cp2\" /\u003E\u003C/p\u003E\u003Cp\u003E在頭顱節段進行協調中心的比較\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 2位於前額的上部，單關節（額肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp 2位於耳輪上方，單關節（耳上肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 2位於顳筋膜上，單關節（顳肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070523-re-cp2-location.jpeg\" alt=\"re-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E來自耳上肌的向上牽拉和耳後肌的向後牽拉 (er-cp 2-3) •\u003C/li\u003E\u003Cli\u003E帽狀腱膜的牽拉來自於前側的額肌以及後側的枕肌 （re-cp 2-3）。\u003C/li\u003E\u003Cli\u003E深筋膜的向上牽拉來自於顳肌，向下牽拉來自於嚼肌 （la-cp 2-3）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060503-la-cp2-location.jpeg\" alt=\"la-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E顱骨穿過上頜骨的斜切面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 2的CC 位於額肌上（CC高於其所在位置）。\u003C/li\u003E\u003Cli\u003Ela-cp 2的CC 位於顳肌上方，其筋膜與咬肌的筋膜連續（如圖所示）。\u003C/li\u003E\u003Cli\u003Eer-cp 2的CC位於耳上肌，在耳朶的外軟骨（耳廓）上方。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060547-er-cp2-location.jpeg\" alt=\"er-cp2-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ere-cp 2協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在髮際線附近進行，在沿著 re-cp 1的垂直線上。\u003Cbr /\u003E有時候，觸診時可以在偏外側發現筋膜的緻密化（針灸穴位 BL 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070517-re-cp2-pave.jpeg\" alt=\"re-cp2-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 2協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E使用食指的指關節在 re-cp 2中產生摩擦。這種摩擦會產生熱，從而改變筋膜基質的稠度。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070528-re-cp2-treatment.jpeg\" alt=\"re-cp2-tratement\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E让患者仰卧位，治疗师治疗后-头2的肌筋膜位点，治疗更致密化及更疼痛侧的位点，直到症状减轻。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090501-re-cp2-o-treatment.jpeg\" alt=\"re-cp2-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-CP2 障礙",
    "answer": "\u003Cp\u003Ere-cp 2肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E前額疼痛或沉重感。由於枕額肌對帽狀腱膜的異常緊張而導致的不穩定或缺乏平衡感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070508-re-cp2-cp.jpeg\" alt=\"re-cp2-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 2肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E單側額肌的不對稱無力，會導致前額出現不對稱的皺紋。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070512-re-cp2-pamo.jpeg\" alt=\"re-cp2-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E疼痛在额窦或患者经常有鼻塞感。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E在额头筋膜处，通过大量胶原纤维向下连到鼻子，向上连接到颅骨骨膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090551-re-cp2-o-cp.jpeg\" alt=\"re-cp2-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动验证\u003Cbr /\u003E让患者皱起额头测试额肌的张力，注意双侧是否存在差异。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090555-re-cp2-o-move.jpeg\" alt=\"re-cp2-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-CP3 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E下頜，二腹肌前1/3上，下頜舌骨肌上\u003C/li\u003E\u003Cli\u003EST5，大迎穴\u003C/li\u003E\u003Cli\u003E二腹肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070441-An-cp3.jpeg\" alt=\"An-cp3\" /\u003E\u003C/p\u003E\u003Cp\u003E下領節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 3的CC位於下領骨的一側，單關節（翼肌 pterygoid）及雙關節（莖舌骨肌stylohyoid） 的向量會合點。\u003C/li\u003E\u003Cli\u003Eme-cp 3的CC 位於中央縫 central raphe 上，單關節（頦舌骨肌 mylohyoid）和雙關節（二腹肌 digastric） 的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 3的CC位於下領骨下方，單關節（頦舌骨肌 mylohyoid）和雙關節（二腹肌 digastric） 的向量會合點・頸筋膜連接這些。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070526-an-cp3-location.jpeg\" alt=\"an-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頸部白線牽拉下頷舌骨肌的正中纖維縫和胸骨上切跡中心 （me-cp 3, me-cl）。\u003C/li\u003E\u003Cli\u003E尾側方向的牽引力由胸鎖乳突肌（此處未圖示）和由二腹肌往頭端方向牽引（an-cl和 аn-ср 3) •\u003C/li\u003E\u003Cli\u003E莖突舌骨肌的牽引力往頭側方向和由肩胛舌骨肌往尾側方向 （ir-cp 3 和 ir-cl）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060531-me-cp3-location.jpeg\" alt=\"me-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E下領骨和口咽水平的顱骨橫截\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cp 3的CC 位於下領骨下方，下領舌骨肌（mylohyoid）和二腹肌 （digastricmuscles） 的筋膜上。\u003C/li\u003E\u003Cli\u003Eir-cp 3的CC 位於下頜骨的後緣，咬肌筋膜在此處與翼內側筋膜相連。\u003C/li\u003E\u003Cli\u003Eme-cp 3 的CC 位於下領舌骨肌的中縫。me-cp 3後側的 CC 位於頸部頂韌帶（nuchal ligament）附著於枕骨哭突（occipitalprotuberance）下方。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060549-ir-cp3-location.jpeg\" alt=\"ir-cp3-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-cp 3 協調中心（CC）的觸診驗證。\u003Cbr /\u003E食指及疊加中指的指尖位於下領骨的下側緣下方，位於下領骨角與下巴的中間（針灸穴位 ST 5）。觸診最敏感的位置。建議在另一側相同的CC 做比較觸診。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070522-an-cp3-pave.jpeg\" alt=\"an-cp3-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cp 3協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，頭部稍轉向另一側。\u003Cbr /\u003E使用指關節在下頜骨邊界下方的頦舌骨肌筋膜上施加中等壓力（3）。如有必要，治療師用另一隻手將患者的頭部保持固定。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070532-an-cp3-treatment.jpeg\" alt=\"an-cp3-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取仰卧位；治疗师用示指和中指的指尖放在二腹肌前部，位于下颌骨体部下方。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070559-an-cp3-o-treatment.jpeg\" alt=\"an-cp3-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-CP3 障礙",
    "answer": "\u003Cp\u003Ean-cp 3 的疼痛部位及感知中心 (CP) •\u003Cbr /\u003E顳頜關節功能紊亂或下頜骨疼痛。舌頭肌肉缺乏協調感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070512-an-cp3-cp.jpeg\" alt=\"an-cp3-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cp 3 的疼痛動作（PaMo）。\u003Cbr /\u003E患者表示張開口時顳頜關節有歪斜或響聲。其他時候，張開口受到限制或舌頭的運動受阻。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070516-an-cp3-pamo.jpeg\" alt=\"an-cp3-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E颞下颌关节，张口时可疼痛或发出"咔哒声"。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E筋膜改变或僵硬导致咬肌和二腹肌之间的协调性丧失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070548-an-cp3-o-cp.jpeg\" alt=\"an-cp3-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E嘱患者张口，注意下颌骨的任何运动偏移。咬肌僵硬或二腹肌力量变弱等都可能限制下颌张开。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070553-an-cp3-o-move.jpeg\" alt=\"an-cp3-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-CP3 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E枕骨粗隆，豎脊肌在枕骨上的附著點上\u003C/li\u003E\u003Cli\u003EBL9，玉枕穴\u003C/li\u003E\u003Cli\u003E枕肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070448-Re-cp3.jpeg\" alt=\"Re-cp3\" /\u003E\u003C/p\u003E\u003Cp\u003E在後側下領節段肌進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 3 位於枕骨粗隆下方，單關節（枕骨肌）和雙關節（豎脊肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp3 位於乳突，其中單關節（耳後肌）和雙關節（胸鎖乳突肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 3位於嚼肌筋膜上，單關節（嚼肌）和雙關節（笑肌）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070549-re-cp3-location.jpeg\" alt=\"re-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E顳顎韌帶的牽拉來自往頭側的嚼肌和往尾側的胸鎖乳突肌 （la-cp 3, la-cl）。\u003C/li\u003E\u003Cli\u003E頸筋膜的牽拉來自往頭側的耳肌和往尾側的頸夾肌以及胸鎖乳突肌（er-cp 3, er-cl) •\u003C/li\u003E\u003Cli\u003E牽拉來自往頭側的枕肌以及往尾側的豎脊肌 (re-cp 3 和 re-cl) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060502-la-cp3-location.jpeg\" alt=\"la-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E頭部在下領骨和口咽水平的橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cp 3 的CC 位於咬肌（masseter） 的肌腹上，其筋膜通過共同的懸帶與內側翼肌的筋膜相連。\u003C/li\u003E\u003Cli\u003Eer-cp 3的CC 位於枕骨上的胸鎖乳突肌和頭夾肌 （splenius capitis muscles） 的附著處。\u003C/li\u003E\u003Cli\u003Ere-cp 3的CC 位於斜方肌和頭半棘肌（semispinalis capitis） 的枕骨嵌入處，位於頭夾肌的深處。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060548-er-cp3-location.jpeg\" alt=\"er-cp3-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ere-cp 3 協調中心（CC）的觸診驗證。\u003Cbr /\u003E將指尖放在豎脊肌附著於枕骨位置上並尋找該點。當緻密度增加時，這個協調中心通常在觸診時會產生疼痛放射到前額（針灸穴位 BL 10）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070543-re-cp3-pave.jpeg\" alt=\"re-cp3-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 3 協調中心（CC）的治療。\u003Cbr /\u003E患者坐著，頭靠在手上。\u003Cbr /\u003E用指關節在枕骨粗隆下方和外側來鬆動顱頂筋膜，左右邊交替治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070556-re-cp3-treatment.jpeg\" alt=\"re-cp3-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E让患者坐着，头搭在手上。治疗师用指间关节从枕骨粗隆外侧治疗颅骨筋膜，双侧交替进行。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090544-re-cp3-o-treatment.jpeg\" alt=\"re-cp3-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-CP3 障礙",
    "answer": "\u003Cp\u003Ere-cp 3 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E枕骨區域疼痛，頭皮超敏；頭部沉重和頸部僵硬的感覺。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070534-re-cp3-cp.jpeg\" alt=\"re-cp3-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 3 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E向上看時，患者感到枕部肌肉緊蹦和疼痛；\u003Cbr /\u003E有時，這個動作會給患者帶來眩暈或迷失方向的感覺。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070538-re-cp3-pamo.jpeg\" alt=\"re-cp3-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E疼痛发生在头顶，头皮会非常敏感，并且有沉重感。当向上看时，头痛和头晕还会加重。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E枕骨粗隆水平的颅骨筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090535-re-cp3-o-cp.jpeg\" alt=\"re-cp3-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让病人仰头向上凝视，注意是否会产生头晕目眩或是否有颈部关节活动范围受限。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090539-re-cp3-o-move.jpeg\" alt=\"re-cp3-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-CL 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸鎖乳突肌前側緣，平甲狀軟骨水平\u003C/li\u003E\u003Cli\u003EST9，人迎穴\u003C/li\u003E\u003Cli\u003E胸鎖乳突肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E領部的前向運動（仰臥位將頭拾起及頸前伸）由單關節肌（頸長肌）和雙關節肌（胸鎖乳突肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在胸鎖乳突肌的前緣、甲狀軟骨的外側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070455-An-cl.jpeg\" alt=\"An-cl\" /\u003E\u003C/p\u003E\u003Cp\u003E頸部節段前側協調中心的比較性動作驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cl 的CC 位於甲狀腺軟骨的一側，在此單關節（舌下肌）及雙關節向量（胸鎖乳突肌）匯聚。\u003C/li\u003E\u003Cli\u003Eir-cl 的CC位於鎖骨上方，在此單關節（肩胛舌骨肌）及雙關節向量（胸鎖乳突肌的鎖骨頭）匯聚。\u003C/li\u003E\u003Cli\u003Eme-cl 的CC 位於胸骨窩，由胸鎖乳突肌的胸骨部形成的向量匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080537-an-cl-location.jpeg\" alt=\"an-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩舌骨肌 （omohyoid）對中頸椎板施加向上牽引，肋間筋膜（ir-cl，ir-th） 向下牽引。\u003C/li\u003E\u003Cli\u003E由胸骨上帶（me-cl, me-th） 連接的頸椎和腰椎白線之間的張力。\u003C/li\u003E\u003Cli\u003E胸骨旁筋膜的張力由胸鎖乳突肌在頭側牽引，尾側則源自腹直肌 （an-cl，an-th）的起點。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120541-me-cl-a-location.jpeg\" alt=\"me-cl-a-location\" /\u003E\u003C/p\u003E\u003Cp\u003E頸部的橫截面圖，在第5節頸椎的水平，從上方往下看。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cl 的 CC 位於胸鎖乳突肌的鎖骨端和胸骨端之間，對應於舌骨的中間肌腱。\u003C/li\u003E\u003Cli\u003Ean-cl 的CC 位於胸鎖乳突肌的前緣，在甲狀軟骨水平高度\u003C/li\u003E\u003Cli\u003Eme-cl 前側的 CC 位於胸骨窩。me-cl 後側的 CC 位於頸部韌帶附著於第 7頸椎的位置。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060520-Ir-cl-location.jpeg\" alt=\"Ir-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cl 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E將其食指或中指的指尖放在胸鎖乳突肌的前緣，位於甲狀軟骨的高度（紅色虛線）（ST 9），並尋找緻密化或收縮的肌纖維。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080531-an-cl-pave.jpeg\" alt=\"an-cl-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cl 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E觸診延伸在胸鎖乳突肌上的筋膜。當患者有針刺感覺時，治療師將用指關節及中等強度的壓力治療此點（3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080546-an-cl-treatment.jpeg\" alt=\"an-cl-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取仰卧位；治疗师于甲状软骨水平触诊胸锁乳突肌前缘肌筋膜，确定致密化区域后，用指间关节或指尖进行治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070559-an-cl-o-treatment.jpeg\" alt=\"an-cl-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-CL 障礙",
    "answer": "\u003Cp\u003Ean-cl 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛發生在頸部的前半部（主動肌）或在頸部的後半部（拮抗肌的肌筋膜單元）。頭痛經常與頸部疼痛有相關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080515-an-cl-cp.jpeg\" alt=\"an-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cl 肌筋膜單元的疼痛動作 (PaMo)\u003Cbr /\u003E當患者出現以下情況時，疼痛會加劇：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E站立時低頭看著鞋子。\u003C/li\u003E\u003Cli\u003E仰臥時抬起頭。\u003C/li\u003E\u003Cli\u003E將下巴與胸骨接觸或夾向胸骨。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080522-an-cl-pamo.jpeg\" alt=\"an-cl-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003C/p\u003E\u003Cp\u003E疼痛部位或 CP：\u003Cbr /\u003E病人疼痛主诉位于前颈部（主动肌）或颈后部（拮抗肌）。\u003C/p\u003E\u003Cp\u003E功能障碍起源或 CC：\u003Cbr /\u003E由于脊椎是颈部所有肌肉的唯一骨性支撑，因此颈前部筋膜的改变可能引起后颈部的疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070549-an-cl-o-cp.jpeg\" alt=\"an-cl-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E病人仰卧位抬头时疼痛明显。病人站立时向下看或屈颈困难，例如下巴触碰胸骨困难。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526070553-an-cl-o-move.jpeg\" alt=\"an-cl-o-move\" /\u003E\u003C/p\u003E"

    "question": "RE-CL 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003EC5-C6水平，斜方肌下，豎脊肌邊緣\u003C/li\u003E\u003Cli\u003ESI16，天窗穴\u003C/li\u003E\u003Cli\u003E多裂肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頸部後向運動（將頸向後移動）由單關節肌（頸部的多裂肌）和雙關節肌（頸半棘肌、頸最長肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在第六頸椎水平的豎脊肌群上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070403-Re-cl.jpeg\" alt=\"Re-cl\" /\u003E\u003C/p\u003E\u003Cp\u003E在後側頸節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cl 位於胸鎖乳突肌筋膜上，單關節（中斜角肌）和雙關節（胸鎖乳突肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cl 位於第3 頸椎的橫突上，單關節（頸夾肌）和雙關節（提肩胛肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ere-cl 位於第 6 頸椎水平高度，單關節（多裂肌）和雙關節（最長肌）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100532-re-cl-location.jpeg\" alt=\"re-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E深筋膜的牽拉來自於往頭側的頭半棘肌，以及往尾側的胸半棘肌 （re-cl, re-th）。\u003C/li\u003E\u003Cli\u003E中層深筋膜的牽拉來自往頭側的頭夾肌，以及往尾側的頸夾肌和後鋸肌（er-cl, er-th) •\u003C/li\u003E\u003Cli\u003E外側筋膜的牽拉來自於往頭側的頭後大直和小直肌，以及往尾側的胸髂肋肌（la-cl，la-th) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010523-la-cl-location.jpeg\" alt=\"la-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在第5 頸椎水平向上看的頸部橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cl 的CC 位於胸鎖乳突肌腹的中心，在甲狀軟骨水平。\u003C/li\u003E\u003Cli\u003Eer-cl 的CC 與提肩胛肌有關，其筋膜與後斜角肌的筋膜一起向前延伸。\u003C/li\u003E\u003Cli\u003Ere-cl 的CC位於頸夾肌（splenius cervicis）、頭夾肌 （splenius capitis） 和頭半棘肌 （semispinalis capitis） 上，可在斜方肌和提肩胛肌之間的溝中觸診到。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070507-er-cl-location.jpeg\" alt=\"er-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cl 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E治療師用手指向内側撥開上斜方肌的外側邊緣，以到達下方的豎脊肌，檢查第六頸椎水平高度附近的頸筋膜（針灸穴位 SI 16) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100526-re-cl-pave.jpeg\" alt=\"re-cl-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cl 協調中心（CC）的治療。\u003Cbr /\u003E患者坐著，額頭靠在床上。\u003Cbr /\u003E一旦到達觸診驗證中確認的點，就會在縱向和橫向上對其進行鬆動。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100539-re-cl-treatment.jpeg\" alt=\"re-cl-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E让患者坐着，头放在治疗桌上。治疗师用示指的指间关节由外侧穿过第\u003Cbr /\u003E5、第6颈椎，针对肌纤维（竖脊肌）进行从外侧到内侧或横向的治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090505-re-cl-o-treatment.jpeg\" alt=\"re-cl-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-CL 障礙",
    "answer": "\u003Cp\u003Ere-cl 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E沿著頸椎延伸的疼痛；頸部感覺異常；異 常的強直性頸部反射；眼睛疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100516-re-cl-cp.jpeg\" alt=\"re-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cl 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者表示脖子感覺僵硬。當被要求向上看時，可能後伸運動角度受限，抑或感覺疼痛加劇。在這些受試者中，頸椎前凸經常被拉直。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100522-re-cl-pamo.jpeg\" alt=\"re-cl-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E在后颈部区域的疼痛或感觉异常，向肩膀和手臂放射。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E如果项筋膜不能协调止于枕骨的颈部各肌肉的话，上颈椎之间可能产生活动异常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090555-re-cl-o-cp.jpeg\" alt=\"re-cl-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让患者颈部后伸，观察是否存在代偿性差异。有时，增加被动牵张，对于克服疼痛躲避而引起的活动受限可能是非常有效的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090500-re-cl-o-move.jpeg\" alt=\"re-cl-o-move\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-TH 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸廓下緣，腹直肌與胸大肌交匯處\u003C/li\u003E\u003Cli\u003EST19，不容穴\u003C/li\u003E\u003Cli\u003E胸大肌下部\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E胸部的前向運動（仰臥位將胸部擡起）由單關節肌（胸骨肌）和雙關節肌（胸大肌和腹直肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點位於胸骨外側的腹直肌鞘與胸大肌交匯部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070409-An-th.jpeg\" alt=\"An-th\" /\u003E\u003C/p\u003E\u003Cp\u003E前側胸部節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-th 的CC位於胸骨，由兩個胸大肌組成的向量在此處匯聚。\u003C/li\u003E\u003Cli\u003Eir-th 的 CC 位於乳房下方，這裡是單關節（肋間肌）及雙關節向量（胸大肌下部）的匯合處。\u003C/li\u003E\u003Cli\u003Ean-th 的CC 位於劍突的一側，單關節（胸骨肌）及雙關節向量（腹直肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080523-an-th-location.jpeg\" alt=\"an-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拉緊臍上白線，其上方錨定至胸骨，下方錨定至腹直肌鞘（me-th, me-lu） 的肌腱交叉處。\u003C/li\u003E\u003Cli\u003E前鋸肌在頭側方向牽引，而腹斜肌本身（ir-th，ir-lu）向尾端方向施加的腹斜肌筋膜牽引。\u003C/li\u003E\u003Cli\u003E胸大肌在頭側方向牽引腹直肌鞘，在同一腹直肌（an-th, an-lu） 的肌腱交叉處向尾側牽引腹直肌鞘。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090507-me-th-a-location.jpeg\" alt=\"me-th-a-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在第三胸椎水平的胸壁的横截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-th 後側的 CC 位於胸椎的棘上韌帶(supraspinous ligaments) 上。me-th 的前側 CC 位於穿過胸骨的韌帶上。\u003C/li\u003E\u003Cli\u003Eir-th 的CC 位於乳房下方，在胸大肌筋膜和腹斜肌筋膜之間的通道上。\u003C/li\u003E\u003Cli\u003Ean-th 的CC位於劍突側邊肋骨上，腹直肌在肋骨的附著處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060557-ir-th-location.jpeg\" alt=\"ir-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-th 協調中心（CC）的觸診驗證。\u003Cbr /\u003E使用食指或中指的指尖在腹直肌的肋骨接入附近尋找筋膜緻密化。該點位於緊靠胸腔（彎曲的虛線）的下邊界的上方（針灸穴位 ST 18近端，ST 19）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080518-an-th-pave.jpeg\" alt=\"an-th-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-th 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E使用肘部，或者如果患者較瘦，則使用指關節，治療師對腹直肌筋膜施加摩擦，直到局部和傳導的疼痛消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080530-an-th-treatment.jpeg\" alt=\"an-th-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师用示指和中指的指间关节，抵住腹直肌外侧面的肋骨下缘。对强壮的病人，可用肘关节对这个CC进行治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080518-an-th-o-treatment.jpeg\" alt=\"an-th-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-TH 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E豎脊肌上，T4-T6水平\u003C/li\u003E\u003Cli\u003EBL14，厥陰俞穴\u003C/li\u003E\u003Cli\u003E胸最長肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E胸部的後向運動（將胸過伸）由單關節肌（胸段的多裂肌）和雙關節肌（胸最長肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在第四胸椎水平的豎脊肌群上。來自這個ce 點的牽涉痛和緊張最常表現在第七頸椎水平，如圖中所示。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070417-Re-th.jpeg\" alt=\"Re-th\" /\u003E\u003C/p\u003E\u003Cp\u003E後側胸節段進行協調中心的比較性觸出診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eer-th 位於肩骨水平高度，單關節（後上鋸肌）和雙關節（髂肋肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-th 位於第4 胸椎水平高度，單關節（胸多裂肌）和雙關節（最長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-th 位於第8 和第 10肋骨之間，單關節（棘突間肌）和雙關節（胸髂肋肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100550-re-th-location.jpeg\" alt=\"re-th-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鋸筋膜的牽拉來自於往頭側方向的後上鋸肌和往尾側方向的下後上鋸肌 （er-th, er-lu) •\u003C/li\u003E\u003Cli\u003E深筋膜的牽拉來自於往頭側的頸脊肌和往尾側的脊肌 （re-th 和 re-lu）。\u003C/li\u003E\u003Cli\u003E胸腰筋膜外側部分的牽拉來自於往頭側的髂肋肌和往尾側的腰方肌 （la-th 和 la-lu) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010534-la-th-location.jpeg\" alt=\"la-th-location\" /\u003E\u003Cbr /\u003E第2胸椎水平的胸壁橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-th 的 CC 位於沿髂肋肌 （iliocostalis muscle） 嵌入第7、8和9肋骨的更遠側處。\u003C/li\u003E\u003Cli\u003Ere-th 的 CC 位於斜方肌和豎脊肌上方，在第4 和第5胸椎的水平。\u003C/li\u003E\u003Cli\u003Eer-th 的 CC 位於菱形肌和後上鋸肌(serratus posterior superior muscles）上方，與闊背肌一起向前延伸。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070546-er-th-location.jpeg\" alt=\"er-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-th 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E治療師將食指的指節放在豎脊肌頂點，在背部曲線的最高點（大約在第4和第5棘突的一側），緩慢移動，找出最緻密的點（針灸穴位 BL 14、BL 15d）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100545-re-th-pave.jpeg\" alt=\"re-th-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-th 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，雙臂沿兩側伸展。使用肘部來鬆動先前透過觸診驗證確定的點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100555-re-th-treatment.jpeg\" alt=\"re-th-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧位；治疗师用肘关节抵在第4 胸椎水平的竖脊肌肌腹处，缓慢转换压力（方向），明确向腰部及颈背部牵涉痛的位点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090539-re-th-o-treatment.jpeg\" alt=\"re-th-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ere-th 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E背痛通常被胸椎的僵硬所掩蓋。脊柱變形、胸椎壓迫感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100531-re-th-cp.jpeg\" alt=\"re-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-th 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E由於椎旁肌肉的筋膜不適應這種動作，患者在肩膀後縮時表示肩胛間疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100535-re-th-pamo.jpeg\" alt=\"re-th-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼病部位或 CP：\u003Cbr /\u003E患者自称肩部疼痛，但当被要求指出具体的疼痛部位时，实际指向上胸椎处。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E第4胸椎水平的胸部筋膜改变，常导致上胸椎的活动异常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090528-re-th-o-cp.jpeg\" alt=\"re-th-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E动作验证\u003Cbr /\u003E要求患者尽力伸展背部；胸椎僵硬的病人常只能做肩胛骨双侧内收的动作，而胸椎后凸不变。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090533-re-th-o-move.jpeg\" alt=\"re-th-o-move\" /\u003E\u003C/p\u003E"

    "question": "AN-LU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E肚臍水平，腹直肌上\u003C/li\u003E\u003Cli\u003EST25，天樞穴\u003C/li\u003E\u003Cli\u003E腹直肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腰部的前向運動（從仰臥位坐起）由單關節肌（腹直肌在兩個健性附著點之間延伸的纖維）和雙關節肌（腹斜肌和腹橫肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在臍外側的腹直肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070423-An-lu.jpeg\" alt=\"An-lu\" /\u003E\u003C/p\u003E\u003Cp\u003E腰部節段前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-lu 的CC 位於第11 肋骨下方，單關節（腹橫肌）及雙關節向量（腹斜肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-lu 的CC位於臍上方的白線上，具有感知作用。\u003C/li\u003E\u003Cli\u003Ean-lu 的CC 位於肚臍的一側，在那裡單關節（腹直肌）及雙關節向量（腹斜肌）會聚。腹筋膜連接這些向量。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080551-an-lu-location.jpeg\" alt=\"an-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腹白線的臍上束由腹外斜肌往頭側方向拉緊，而臍下束是由錐肌（pyramidalis muscle）（me-lu，me-pv） 往尾側拉緊。\u003C/li\u003E\u003Cli\u003E腹直肌鞘由肌腱交叉點往頭側方向牽引，然而在髂肌則往尾端方向牽引（an-lu，an-pv) •\u003C/li\u003E\u003Cli\u003E腹外斜肌筋膜將肌肉本身往頭側牽拉，然而臀中肌和臀小肌則往尾端方向牽拉（ir-lu • ir-pv) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090556-me-lu-a-location.jpeg\" alt=\"me-lu-a-location\" /\u003E\u003C/p\u003E\u003Ch4\u003E中腹區緊鄰肚臍下方的橫截面圖\u003Cbr /\u003E- me-lu 後側的CC 位於腰椎的棘上韌帶上方；me-lu 的前側CC在臍上白線（su-praumbilical linea alba) 上•\u003Cbr /\u003E- ir-lu 的 CC 位於第 11 肋骨，腹斜肌的起點。\u003Cbr /\u003E- an-lu 的CC位於腹直肌鞘上，肚臍的旁邊。\u003C/h4\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060542-ir-lu-location.jpeg\" alt=\"ir-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-lu 協調中心（CC） 的觸診驗證。\u003Cbr /\u003E用後四指的指尖或指關節按壓臍部位置的腹直肌鞘（紅色虛線），尋找最收縮的點。\u003Cbr /\u003E很難在腹部找到緻密點，而較容易找到收縮的肌肉帶（針灸穴位 ST 23 p、ST 24、ST 25 遠端）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080545-an-lu-pave.jpeg\" alt=\"an-lu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-lu 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E用肘部在臍部位置的腹直肌鞘或筋膜上施加摩擦。有時，傳導痛會向恥骨方向延伸，有時會向劍突方向延伸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080558-an-lu-treatment.jpeg\" alt=\"an-lu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E根据患者体格，治疗师使用指间关节或肘关节在平脐水平抵住腹直肌鞘，牵涉痛可能延伸到耻骨联合或剑突。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080540-an-lu-o-treatment.jpeg\" alt=\"an-lu-o-treatment\" /\u003E\u003C/p\u003E"

\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100557-re-lu-pave.jpeg\" alt=\"re-lu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-lu 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，雙臂沿兩側伸展。\u003Cbr /\u003E用肘部鬆動胸腰交界處的筋膜，一路到第一和第二腰椎的一側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100508-re-lu-treatment.jpeg\" alt=\"re-lu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，治疗师应用肘关节抵第1腰椎水平的竖脊肌肌腹，改变压力方向，寻找向骶骨部牵涉的痛点。触诊对侧，对比疼痛特点、形态的改变。\u003Cbr /\u003E如果是单侧的筋膜改变，则只进行单侧治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090509-re-lu-o-treatment.jpeg\" alt=\"re-lu-o-treatment\" /\u003E\u003C/p\u003E"

260518080516-an-pv-pave.jpeg\" alt=\"an-pv-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-pv 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E將肘部或指關節放在腹直肌的外側，並將他們的壓力導向髂肌，等到任何腹壁高張力消退後才開始操作。治療師可以從CC 的同一側或從對側治療這個點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080528-an-pv-treatment.jpeg\" alt=\"an-pv-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师将肘关节或者指间关节置于骼肌中部，在开始进行深部手法治疗前先等待腹壁放松。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080523-an-pv-o-treatment.jpeg\" alt=\"an-pv-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-PV 障礙",
    "answer": "\u003Cp\u003Ere-pv 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E薦骼關節區域單側或雙側疼痛，伴有局部 和牽涉痛。脊椎底部有疲勞感、下肢疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100501-re-pv-cp.jpeg\" alt=\"re-pv-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-pv 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E當患者向前彎曲時，由於牽拉到僵硬的筋膜，或當弓起背部進行向心運動時，患者會感到腰薦部和薦髂部疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100507-re-pv-pamo.jpeg\" alt=\"re-pv-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E如果遭受不平衡性扭伤，骶髂部位可能在单侧或双侧发生炎症，伴随局部疼痛或牵涉性疼痛。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E该类型失衡大部分由髂腰韧带（CC）纤维化导致的，位于第5腰椎和髂后上棘之间。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090531-re-pv-o-cp.jpeg\" alt=\"re-pv-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E动作测试\u003Cbr /\u003E该测试类似于腰部的测试，但是要求患者用双手将盆骨向前推，着重强调骶髂的活动性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090536-re-pv-o-move.jpeg\" alt=\"re-pv-o-move\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师将肘关节抵在第5腰椎和骼后上棘之间的沟部，等待患者放松，然后缓慢开始横向治疗深层的胶原纤维结构。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090541-re-pv-o-treatment.jpeg\" alt=\"re-pv-o-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "AN-CX 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿近端1/3前側，縫匠肌內側，腰大肌筋膜上\u003C/li\u003E\u003Cli\u003ESP12，沖門穴\u003C/li\u003E\u003Cli\u003E恥骨肌、縫匠肌附近\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E髖部（關節）的前向運動（將大腿向前移）由單關節肌（恥骨肌、長收肌）和雙關節肌（髂腰肌、闊筋膜張肌、縫匠肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在恥骨肌外側及髂腰肌上，位於腹股溝韌帶下方\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070459-An-cx.jpeg\" alt=\"An-cx\" /\u003E\u003C/p\u003E\u003Cp\u003E髖部節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cx 的CC 位於腹股溝韌帶的遠端，單關節（内收長肌）和雙關節向量（髂腰肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-cx 的CC 位於股薄肌/內收肌上，單關節（内收長肌）和雙關節向量（股薄肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-cx 的 CC 位於 Scarpa 三角形（股三角形）的頂點，在那裡單關節（恥骨肌）和雙關節向量（内收大肌）匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090516-an-cx-location.jpeg\" alt=\"an-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E通過内收肌的起點向近端方向牽引内收肌筋膜，並通過嵌入這些相同的肌肉（me-cx、me-ge） 向遠端方向牽引内收肌筋膜。\u003C/li\u003E\u003Cli\u003E骼腰肌對闊深筋膜（deep fascia lata）的近端牽引和股中間肌（an-cx, an-ge）的遠端牽引。\u003C/li\u003E\u003Cli\u003E恥骨肌對股骨内收肌膜（内收肌管上的筋膜）和肌間隔施加近端牽引力，而股内側肌施加遠端牽引力 （ir-cx，ir-ge）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090532-me-cx-location.jpeg\" alt=\"me-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E大腿近端在股骨頸水平的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cx 的 CC 位於骼腰肌腱膜，在縫匠肌鞘的内側。\u003C/li\u003E\u003Cli\u003Eir-cx 的 CC 位於恥骨筋膜的末端部分，覆蓋在内收長肌和内收短肌的筋膜上。\u003C/li\u003E\u003Cli\u003Eme-cx 的 CC 位於股薄肌鞘，反過來，它涵蓋了内收大肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060546-ir-cx-location.jpeg\" alt=\"ir-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cx 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E將指尖置於縫匠肌鞘內側、腹股溝韌帶下方和股骨脈搏外側（針灸穴位 SP 12），以尋找髂腰肌筋膜的任何緻密化和跳躍症狀（Jump sign）（患者對按壓的反應）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090511-an-cx-pave.jpeg\" alt=\"an-cx-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cx 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E將肘尖置於縫匠肌內側，摩擦股直肌和髂腰肌的筋膜，直至局部和傳導痛消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090523-an-cx-treatment.jpeg\" alt=\"an-cx-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，下肢伸展，治疗师将指间关节置于缝匠肌鞘的内侧，在腹股沟\u003Cbr /\u003E韧带下方，对着骼腰筋膜的方向施加摩擦力。注意：该区域有淋巴结及静脉走行，要避免用力过大。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080511-an-cx-o-treatment.jpeg\" alt=\"an-cx-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-CX 障礙",
    "answer": "\u003Cp\u003Ean-cx 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E大腿前部區域的障礙和疼痛。由腹股溝區劇烈疼痛或沿股直肌延伸的疼痛所引起的跛行。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090556-an-cx-cp.jpeg\" alt=\"an-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cx 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E在當大腿向前（髖屈曲）肌肉纖維縮短時，或在拉伸期間，當患者將大腿向後移動（髖伸展）時，疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090504-an-cx-pamo.jpeg\" alt=\"an-cx-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E大腿前部疼痛，向上抬腿时疼痛加剧，例如上台阶。\u003Cbr /\u003E起源或 CC：\u003Cbr /\u003E在骼耻筋膜上，它结合了单关节纤维（耻骨肌）及双关节纤维（髂腰肌，缝匠肌）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080501-an-cx-o-cp.jpeg\" alt=\"an-cx-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E患者站立，向前及向后主动用力摆动，肌纤维受牵拉（向后运动）或短缩（向前运动）均可能加重疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080505-an-cx-o-move.jpeg\" alt=\"an-cx-o-move\" /\u003E\u003C/p\u003E"

    "question": "RE-CX 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E坐骨結節和髂後上棘中點稍下，骶結節韌帶上\u003C/li\u003E\u003Cli\u003EBL30，白環前穴\u003C/li\u003E\u003Cli\u003E臀大肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E談部的後向運動（將大腿向後移動）由單關節肌（臀大肌的結節部）和雙關節肌（半腱肌，起自微結節韌帶部的股二頭肌、半膜肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的ce 點在臀大肌嵌入微結節韌帶處\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070406-Re-cx.jpeg\" alt=\"Re-cx\" /\u003E\u003C/p\u003E\u003Cp\u003E後側髖節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cx 位於薦結節韌帶上，單關節（臀大肌）和雙關節（股二頭肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-cx 位於闊筋膜張肌上，單關節（臀小肌）和雙關節（闊筋膜張肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-cx 位於外旋肌的筋膜上，單關節（梨狀肌）和雙關節（臀大肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100553-re-cx-location.jpeg\" alt=\"re-cx-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髂脛束的牽拉來自於近端的闊筋膜張肌和遠端的股四頭肌中的股外側肌（la-cx, la-ge) •\u003C/li\u003E\u003Cli\u003E後側闊筋膜的牽拉來自近端的臀大肌和遠端的膕旁肌 （re-cx, re-ge）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的臀中肌和遠端的股二頭肌短頭（er-cx, er-ge）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010516-la-cx-location.jpeg\" alt=\"la-cx-location\" /\u003E\u003Cbr /\u003E大腿近端在股骨頸水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cx 的CC 位於闊筋膜張肌的筋膜上，該筋膜不中斷地延伸至臀中肌和臀小肌。\u003C/li\u003E\u003Cli\u003Eer-cx 的CC 位於梨狀肌上方，其筋膜在臀中肌上向上延伸，在兩個孖肌（gemelli） 向下延伸。\u003C/li\u003E\u003Cli\u003Ere-cx 的CC 位於臀大肌的筋膜上，在深層與薦結節韌帶 （sacrotuberous ligament）聯合，薦結節韌帶是膕旁肌的起源。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070526-er-cx-location.jpeg\" alt=\"er-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cx 協調中心（CC）的觸診驗證。\u003Cbr /\u003E鑑於臀大肌的密度較高，該協調中心的觸診驗證可用指關節進行。重要的是，治療師沿著薦結節韌帶（紅色虛線）的區間進行觸診験證（針灸穴位 BL 30）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100549-re-cx-pave.jpeg\" alt=\"re-cx-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cx 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，患側向上，臀部處於半屈曲位置。\u003Cbr /\u003E將肘部放在薦結節韌帶的近端部分，鬆動它以產生局部發炎來造就更多彈性組織的構成。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100559-re-cx-treatment.jpeg\" alt=\"re-cx-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧位，痛侧髋关节朝上，呈半屈曲位。治疗师将肘关节置于骶结节韧带近端，横向治疗，直至疼痛消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090506-re-cx-o-treatment.jpeg\" alt=\"re-cx-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-CX 障礙",
    "answer": "\u003Cp\u003Ere-cx 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛一路沿著膕旁肌。坐著時臀大肌疼痛、會陰部感覺異常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100535-re-cx-cp.jpeg\" alt=\"re-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cx 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者的疼痛在大腿快速向後移動時（由於筋膜縮短）或大腿快速向前移動時加劇（由於筋膜拉伸）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100539-re-cx-pamo.jpeg\" alt=\"re-cx-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E疼痛沿胭绳肌延伸或仅局限于臀部。\u003Cbr /\u003E功能障碍的起源或 CC；\u003Cbr /\u003E臀大肌和胭绳肌均起源于骶结节韧带，因而，其纤维化均能诱发这两块肌肉的功能障碍。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090557-re-cx-o-cp.jpeg\" alt=\"re-cx-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E相关后向髋节段肌筋膜单元的收缩（髋关节主动伸展）或牵张（髋关节的主动屈曲）均可验证其张力失衡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090500-re-cx-o-move.jpeg\" alt=\"re-cx-o-move\" /\u003E\u003C/p\u003E"

    "question": "AN-GE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿中段1/3內，股直肌外側緣\u003C/li\u003E\u003Cli\u003EST32，伏兔穴\u003C/li\u003E\u003Cli\u003E股四頭肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E膝部的前向運動（將膝前移）由單關節肌（股內側肌、股中間肌、股外側肌）和雙關節肌（股直肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在股中聞肌上，位於大腿中部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070413-An-ge.jpeg\" alt=\"An-ge\" /\u003E\u003C/p\u003E\u003Cp\u003E膝部前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-ge 的 CC 位於大腿的中點，單關節（股四頭肌）和雙關節向量（股直肌）匯聚於此。\u003C/li\u003E\u003Cli\u003Eme-ge 的CC 位於覆蓋内收肌或 subsartorial canal (vastoadductor membrane) 的筋膜上，單關節（半腱肌）和雙關節向量（股薄肌遠端）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-ge 的CC 位於股内側肌的肌腹上，單關節 （vastus medialis） 和雙關節向量（sartorius）匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090509-an-ge-location.jpeg\" alt=\"an-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股薄肌對内側小腿筋膜進行近端牽引，比目魚肌（me-ge, me-ta） 進行遠端牽引。\u003C/li\u003E\u003Cli\u003E股内側肌和縫匠肌對小腿内側淺筋膜進行近端牽引，脛後肌和脛前肌（ir-ge, ir-ta）進行遠端牽引。\u003C/li\u003E\u003Cli\u003E由股四頭肌肌腱施加的前小腿筋膜的近端牽引，以及由伸趾肌（an-ge, an-ta） 施加的遠端牽引。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090516-me-ge-location.jpeg\" alt=\"me-ge-location\" /\u003E\u003Cbr /\u003E大腿中間 1/3 水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-ge 的CC 位於股內側肌的肌腹上方，筋膜在後方與縫匠肌筋膜相結合。\u003C/li\u003E\u003Cli\u003Ean-ge 的 CC 位於分隔股直肌和股外側肌的隔膜上，並與股中間肌的筋膜結合。\u003C/li\u003E\u003Cli\u003Eme-ge 的CC位於股内收肌膜上，起源於内收大肌，穿過縫匠肌下方，覆蓋血管，止於股内側肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060535-ir-ge-location.jpeg\" alt=\"ir-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ge 協調中心（CC）的觸診驗證。\u003Cbr /\u003E將食指關節放在髕骨和腹股溝韌帶中間的股直肌外側（紅色虛線），並檢查筋膜是否有任何緻密化或傳導痛的再現（針灸穴位ST 32) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090557-an-ge-pave.jpeg\" alt=\"an-ge-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ge 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E使用肘尖像鑿子一樣來操作筋膜的緻密點。深層摩擦的方向可以是縱向或橫向於肌肉纖維的方向。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090516-an-ge-treatment.jpeg\" alt=\"an-ge-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师将指间关节或肘关节置于髌骨和腹股沟韧带连线中点的水平，股直肌外侧的阔筋膜上，触诊筋膜的变化及引起膝部牵涉痛的点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080505-an-ge-o-treatment.jpeg\" alt=\"an-ge-o-treatment\" /\u003E\u003C/p\u003E"

cture74/twpic/raw/master/images/20260518100549-re-ge-pave.jpeg\" alt=\"re-ge-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-ge 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥。\u003Cbr /\u003E將肘部放在臀線和膕窩褶皺之間的中段處，施加摩擦，尤其是在股二頭肌的筋膜上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100559-re-ge-treatment.jpeg\" alt=\"re-ge-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧位，治疗师将肘关节置于臀横纹和胭横纹连线正中水平，股二头肌筋膜上进行摩擦治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090546-re-ge-o-treatment.jpeg\" alt=\"re-ge-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ere-ge 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛在膕窩或周圍的肌腱；有時候會出現貝克氏嚢腫（Baker&#39;s cyst）、大腿後部夜間抽筋。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100540-re-ge-cp.jpeg\" alt=\"re-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-ge 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者在彎曲膝蓋（主動運動）、蹲下時（被動壓縮）或過度伸直膝蓋（牽拉）時可能會感到膕窩疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100545-re-ge-pamo.jpeg\" alt=\"re-ge-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E胭窝及其周围肌腱疼痛；可能伴见囊肿（贝克囊肿）。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E当覆于胭窝上的肌肉收缩牵拉胭窝筋膜方向错误时，最初表现为疼痛，继而产生囊肿以纠正其异常牵拉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090536-re-ge-o-cp.jpeg\" alt=\"re-ge-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E嘱患者屈膝收缩胭绳肌（主动运动）、下蹲（被动运动）或者膝过伸（牵张）。主动收缩时，常会诱发改变的胭绳肌发生肌痉挛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090541-re-ge-o-move.jpeg\" alt=\"re-ge-o-move\" /\u003E\u003C/p\u003E"

    "question": "AN-TA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E小腿中段1/3內，脛骨前肌肌腹上\u003C/li\u003E\u003Cli\u003EST37，上巨虛穴\u003C/li\u003E\u003Cli\u003E脛骨前肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E踝部的前向運動（足背伸）由單關節肌（脛骨前肌》）和雙關節肌（足𧿹長伸肌、趾長伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070426-An-ta.jpeg\" alt=\"An-ta\" /\u003E\u003C/p\u003E\u003Cp\u003E踝部節段前内側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-ta 的 CC 位於脛骨內側緣的後方，單關節（脛後肌）和雙關節向量（屈趾肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-ta 的 CC 位於比目魚肌肌腹的内側部分，單關節（比目魚肌）和雙關節向量（屈趾長肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Ean-ta 的CC 位於前隔室的中間，其中單關節（脛前肌）和雙關節向量（伸趾肌）匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090551-an-ta-location.jpeg\" alt=\"an-ta-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E伸趾肌向近端方向而伸𧿹短肌（an-ta，an-pe） 向遠端方向牽引足背筋膜。\u003C/li\u003E\u003Cli\u003E兩條脛骨肌向近端方向，外展𧿹肌（ir-ta，ir-pe）向遠端方向牽引内側小腿筋膜。\u003C/li\u003E\u003Cli\u003E透過比目魚肌向近端方向，足底肌肉（me-ta, me-pe） 向遠端方向牽引足内側深筋膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090535-me-ta-location.jpeg\" alt=\"me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003E右小腿中間 1/3 和遠端 1/3 處的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-ta 的CC 位於伸𧿹長肌筋膜上方，位於脛前肌和伸趾肌之間。\u003C/li\u003E\u003Cli\u003Eir-ta 的CC 位於脛骨後緣；脛後肌和屈趾肌的筋膜也延伸到該區域。\u003C/li\u003E\u003Cli\u003Eme-ta 的 CC 位於將腓腸肌與比目魚肌分開的筋膜的内側。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060529-ir-ta-location.jpeg\" alt=\"ir-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ta 協調中心 （CC） 的觸診驗證。\u003Cbr /\u003E根據不同差異對象的研究 an-ta 的協調中心，在小腿的中間、脛骨前緣外側（紅色虛線）、脛前肌和伸趾長肌之間（針灸穴位 ST 37 p • ST 38 • ST 39 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090546-an-ta-pave.jpeg\" alt=\"an-ta-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ta 協調中心 （CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E將肘放在這個CC 上，因為要根據緻密化的慢性程度，可能需要持續操作三到四分鐘。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090558-an-ta-treatment.jpeg\" alt=\"an-ta-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧位，下肢伸展，治疗师将指间关节或肘关节置于伸肌的最高点，即小腿中点处，通常疼痛会立即传导至有症状的区域（前踝处）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080533-an-ta-o-treatment.jpeg\" alt=\"an-ta-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-ta 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E踝部前側的障礙：脛前肌或伸趾長肌肌腱病變。脛距關節扭傷或骨折的結果。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090536-an-ta-cp.jpeg\" alt=\"an-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ta 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者反應在行走時腳踝前部的疼痛，無論是在前隔室縮短（背屈）還是延長（蹠屈）期間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090540-an-ta-pamo.jpeg\" alt=\"an-ta-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E在踝关节的前方（胫前肌肌腱炎或趾伸肌肌腱炎），扭伤或踝关节的骨折。\u003Cbr /\u003E起源或 CC：\u003Cbr /\u003E当变异或重叠的肌筋膜单元在非生理模式下工作时，伸肌就会发生炎症。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080524-an-ta-o-cp.jpeg\" alt=\"an-ta-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让患者先后使用脚尖和足跟行走，以确定肌筋膜单元在收缩（短缩）及牵伸时疼痛是否会加重。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080528-an-ta-o-move.jpeg\" alt=\"an-ta-o-move\" /\u003E\u003C/p\u003E"

    "question": "RE-TA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E小腿中段1/3內，腓腸肌外側靠近肌腱處\u003C/li\u003E\u003Cli\u003EBL58，飛揚穴\u003C/li\u003E\u003Cli\u003E比目魚肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E踝部的後向運動（踮腳尖）由單關節肌（比目魚肌）和雙關節肌（腓腸肌、趾長屈肌和腓骨肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 CC 點在小腿中點，小腿三頭肌上，稍偏向腓骨肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070432-Re-ta.jpeg\" alt=\"Re-ta\" /\u003E\u003C/p\u003E\u003Cp\u003E後側踝節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-ta 位於小腿後側的中間，這裡是單關節（比目魚肌）和雙關節（腓腸肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-ta 位於前腔室的外側緣，單關節（第三腓骨肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-ta 位於腓骨肌的腔室，單關節（腓骨短肌）和雙關節（腓骨長肌）的向量交匯處。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100530-re-ta-location.jpeg\" alt=\"re-ta-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/li\u003E\u003Cli\u003E足背筋膜的牽拉來自於近端的伸趾肌和遠端的背側骨間肌。（la-ta, la-pe）。\u003C/li\u003E\u003Cli\u003E支持帶的牽拉來自於近端的腓肌群和遠端的伸趾短肌（er-ta, er-di）。\u003C/li\u003E\u003Cli\u003E足部外側筋膜腔室的牽拉來自於近端的小腿三頭肌和遠端的外展小趾肌。（re-ta, re-pe) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010516-la-ta-location.jpeg\" alt=\"la-ta-location\" /\u003E\u003Cbr /\u003E右小腿中間 1/3 和遠端 1/3的橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-ta 的CC 位於隔膜中，該隔膜將包含在伸趾長肌和腓骨短肌（peroneus brevis ）内的外向運動單元結合在一起。\u003C/li\u003E\u003Cli\u003Eer-ta的 CC 位於肌間隔膜上，肌間隔膜連接腓骨長肌和腓骨短肌内的外轉肌筋膜單元。\u003C/li\u003E\u003Cli\u003Ere-ta 的CC 位於外側腓腸肌的筋膜上，或是圍繞著内側腓腸肌、比目魚肌和蹠肌 (plantaris) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070506-er-ta-location.jpeg\" alt=\"er-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-ta 協調中心（CC）的觸診驗證。\u003Cbr /\u003E該協調中心的觸診驗證在腓腸肌的肌腱通道中進行，在外側腓腸肌下方或兩個肌腹之間（針灸穴位 BL 56 p、BL 57、BL 58 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100523-re-ta-pave.jpeg\" alt=\"re-ta-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-ta 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥。\u003Cbr /\u003E用肘部施加約2或3公斤的壓力，在大約三公分的範圍內雙向移動，頻率為每\u003Cbr /\u003E秒兩次擺動。這個點可以操作五分鐘，中間有短暫的停頓。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100536-re-ta-treatment.jpeg\" alt=\"re-ta-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧位，治疗师应用肘关节置于腓肠肌内、外侧肌头中间的小腿三头肌肌腱结合处，强调更指向腓肠肌外侧头方向。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090515-re-ta-o-treatment.jpeg\" alt=\"re-ta-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-TA 障礙",
    "answer": "\u003Cp\u003Ere-ta 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E阿基里斯腱發炎、足跟周圍炎症、足底筋膜炎、足跟骨刺和著骨點病變。小腿和腳痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100512-re-ta-cp.jpeg\" alt=\"re-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-ta 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E在阿基里斯腱發炎的情況下，患者表示他們無法踮起腳尖走路。在著骨點病變或跟骨骨膜炎症的情況下，患者無法用腳後跟負重。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100517-re-ta-pamo.jpeg\" alt=\"re-ta-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E跟腱炎、足跟痛、足底筋膜炎等都是该肌筋膜单元功能障碍的典型表现之一。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E如果跟腱腱鞘对位异常，可使其发炎；而相关肌纤维的非同步收缩，可引发腱鞘对位异常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090504-re-ta-o-cp.jpeg\" alt=\"re-ta-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E嘱病人用脚尖着地行走（适用于腱鞘炎）或者用脚跟着地行走（适用于足跟骨刺或骨膜疼痛）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090510-re-ta-o-move.jpeg\" alt=\"re-ta-o-move\" /\u003E\u003C/p\u003E"

    "question": "AN-PE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第1-2趾骨之間，廻短伸肌筋膜上\u003C/li\u003E\u003Cli\u003ELR3，太沖穴\u003C/li\u003E\u003Cli\u003E拇短伸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部的前向運動（將足拾起/足大趾向上向前移動）由單關節肌（足短伸肌）和雙關節肌（足姆長伸肌和趾長伸肌）的纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在足與短伸肌上，位於第一、第二跖骨間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070440-An-pe.jpeg\" alt=\"An-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E足部前内側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-pe 的CC 位於舟狀骨下方，單關節（骨間肌）和雙關節向量（屈趾肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-pe 的CC 位於外展拇短肌肌腹内側，單關節（外展𧿹短肌）和雙關節向量（屈𧿹長肌）在此匯合。\u003C/li\u003E\u003Cli\u003Ean-pe 的CC 位於第一蹠骨間隙的基部，單關節（伸𧿹短肌）和雙關節向量（伸𧿹長肌）匯合處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090546-an-pe-location.jpeg\" alt=\"an-pe-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股薄肌腱位於鵝足 （pes anserinus） 的深處。\u003C/li\u003E\u003Cli\u003E小腿深筋膜的深層在足部與深層肌肉層相連。\u003C/li\u003E\u003Cli\u003E足底骨間肌與深筋膜和屈趾長肌（me-pe）的肌腱相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100539-me-pe-location.jpeg\" alt=\"me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在蹠骨水平的足部橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-pe 的CC 位於内踝下方，狀骨 （navicular bone）前下緣凹陷處。\u003C/li\u003E\u003Cli\u003Ean-pe 的 CC 位於連接伸短肌和伸趾長肌腱的筋膜上。\u003C/li\u003E\u003Cli\u003Eir-pe 的 CC 位於覆蓋外展𧿹肌的筋膜上，並繼續延伸到屈𧿹短肌和長肌（肌腱）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060528-ir-pe-location.jpeg\" alt=\"ir-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-pe 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E將食指或中指的指尖放在患者的第一和第二蹠骨之間，並尋找在伸𧿹短肌筋膜是否有緻密點 （LV 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090541-an-pe-pave.jpeg\" alt=\"an-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-pe 協調中心 （CC）的治療。\u003Cbr /\u003E將患者的腳放在治療床上，治療師摩擦在足背上伸𧿹短肌的筋膜，直到局部和傳導痛消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090552-an-pe-treatment.jpeg\" alt=\"an-pe-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E如存在𧿹趾无力，则治疗可能延伸至腰部，如只有局部疼痛，则应用指间关节治疗𧿹短伸肌筋膜就够了。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080527-an-pe-o-treatment.jpeg\" alt=\"an-pe-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-PE 障礙",
    "answer": "\u003Cp\u003Ean-pe 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E第一腳趾（𧿹趾）的蹠趾關節和指間關節障礙。伸𧿹長肌和伸𧿹短肌腱病變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090531-an-pe-cp.jpeg\" alt=\"an-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-pe 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者反應前足在背屈力量不足（無力），更常見的是大腳趾本身背屈無力。其他時候，患者會出現大腳趾關節活動受限和感覺異常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090536-an-pe-pamo.jpeg\" alt=\"an-pe-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E在第1足趾（𧿹趾）的跖趾关节及趾间关节处；可能有𧿹长伸肌腱炎或𧿹短伸肌腱炎。\u003Cbr /\u003E起源或 CC：\u003Cbr /\u003E在足背的筋膜处，该处为单关节肌（趾短伸肌）和双关节肌（𧿹长伸肌）的肌纤维连接处。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080517-an-pe-o-cp.jpeg\" alt=\"an-pe-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E同时测定两个𧿹趾的抗阻背伸张力，有时会是疼痛，有时是无力，活动范围受限或感觉异常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080522-an-pe-o-move.jpeg\" alt=\"an-pe-o-move\" /\u003E\u003C/p\u003E"

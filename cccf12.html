    "question": "ER-GE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿中下1/3交界處，股二頭肌短頭，髂脛束後方\u003C/li\u003E\u003Cli\u003EGB32，中瀆穴\u003C/li\u003E\u003Cli\u003E股二頭肌短頭\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E膝部的外旋運動（將膝關節的脛骨外課向外旋轉）由單關節肌（股二頭肌短頭）和雙關節肌（股二頭肌長頭）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的ce 點在股二頭肌短頭位於外側肌間隔的起點上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080431-Er-ge.jpeg\" alt=\"Er-ge\" /\u003E\u003C/p\u003E\u003Cp\u003E後側膝節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-ge 位於膕旁肌之間的溝上，單關節（股二頭肌短頭）和雙關節（半腱肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-ge 位於髂脛束的中間，單關節（外側大肌）和雙關節（闊筋膜張肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-ge 位於外側肌間隔，其中單關節（股二頭肌短頭）和雙關節（股二頭肌長頭）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100553-re-ge-location.jpeg\" alt=\"re-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髂脛束的牽拉來自於近端的闊筋膜張肌和遠端的伸趾長肌 （la-ge, la-ta）。\u003C/li\u003E\u003Cli\u003E外側小腿筋膜的牽拉來自於近端的股二頭肌和遠端的腓骨肌 （er-ge, er-ta）。\u003C/li\u003E\u003Cli\u003E膕筋膜的牽拉來自於近端的膕旁肌和來自尾端的腓腸肌 （re-ge, re-ta）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010517-la-ge-location.jpeg\" alt=\"la-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E右大腿中間 1/3 水平處的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-ge 的CC 位於髂脛束或闊筋膜張肌腱上，位於股外側肌之上。\u003C/li\u003E\u003Cli\u003Eer-ge 的CC 位於股外側肌間隔上方，股二頭肌短頭的起源處。\u003C/li\u003E\u003Cli\u003Ere-ge 的 CC 位於連接股二頭肌長頭與半腱肌和半膜肌的筋膜上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070536-er-ge-location.jpeg\" alt=\"er-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-ge 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E在股二頭肌短頭起點水平的大腿中間三分之一與遠端三分之一之間的通道進行觸診驗證（針灸穴位 GB 32）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070530-er-ge-pave.jpeg\" alt=\"er-ge-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-ge 協調中心 （CC）的治療。\u003Cbr /\u003E患者俯臥，膝蓋略微彎曲。\u003Cbr /\u003E將部放在股外側肌和股二頭肌之間的溝中，並在股二頭肌短頭的起點處操作。\u003Cbr /\u003E治療開始時力道宜適中，但應逐漸增加至強力道。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070542-er-ge-treatment.jpeg\" alt=\"er-ge-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，膝关节弯曲，治疗师将肘抵在股二头肌肌腹远侧1/3处。治疗开始前，先触诊查找上述引起膝痛的点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070554-er-ge-o-treatment.jpeg\" alt=\"er-ge-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eer-ta 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E外踝周圍疼痛。足跟痛，腓骨肌腱病。小腿外側疼痛或痙攣。下肢癱瘓。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070548-er-ta-cp.jpeg\" alt=\"er-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-ta 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者抱怨腳踝僵硬，腳後跟外側難以承重。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070553-er-ta-pamo.jpeg\" alt=\"er-ta-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E腓骨肌腱鞘炎或伴有创伤后痛性肌萎缩的踝关节疼痛。\u003Cbr /\u003E功能障碍起源或 CC；\u003Cbr /\u003E踝关节扭伤，常累及腓侧肌筋膜，但小腿中部无痛感，可见踝关节功能障碍。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070539-er-ta-o-cp.jpeg\" alt=\"er-ta-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动验证\u003Cbr /\u003E请患者外旋足部，对抗外部阻力；如果腓骨肌腱发炎则运动受阻，但如果踝关节疼痛源于伸肌，则做此运动时患者不会感到疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070543-er-ta-o-move.jpeg\" alt=\"er-ta-o-move\" /\u003E\u003C/p\u003E"

    "question": "IR-PE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第1跖骨基底部，廻內收肌上\u003C/li\u003E\u003Cli\u003ESP3，太白穴\u003C/li\u003E\u003Cli\u003E外展肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部的內旋運動（前足向內或向里傾斜，尤其是足大趾）由單關節肌（足𧿹展肌）和雙關節肌（足𧿹長屈肌）的纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在足𧿹展肌的前部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080453-Ir-pe.jpeg\" alt=\"Ir-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E足部前内側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-pe 的CC 位於舟狀骨下方，單關節（骨間肌）和雙關節向量（屈趾肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-pe 的CC 位於外展拇短肌肌腹内側，單關節（外展𧿹短肌）和雙關節向量（屈𧿹長肌）在此匯合。\u003C/li\u003E\u003Cli\u003Ean-pe 的CC 位於第一蹠骨間隙的基部，單關節（伸𧿹短肌）和雙關節向量（伸𧿹長肌）匯合處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090546-an-pe-location.jpeg\" alt=\"an-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股薄肌腱位於鵝足 （pes anserinus） 的深處。\u003C/li\u003E\u003Cli\u003E小腿深筋膜的深層在足部與深層肌肉層相連。\u003C/li\u003E\u003Cli\u003E足底骨間肌與深筋膜和屈趾長肌（me-pe）的肌腱相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100539-me-pe-location.jpeg\" alt=\"me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在蹠骨水平的足部橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-pe 的CC 位於内踝下方，狀骨 （navicular bone）前下緣凹陷處。\u003C/li\u003E\u003Cli\u003Ean-pe 的 CC 位於連接伸短肌和伸趾長肌腱的筋膜上。\u003C/li\u003E\u003Cli\u003Eir-pe 的 CC 位於覆蓋外展𧿹肌的筋膜上，並繼續延伸到屈𧿹短肌和長肌（肌腱）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060528-ir-pe-location.jpeg\" alt=\"ir-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-pe 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E在第一蹠骨的底部，外展𧿹肌 （abductorhallucis muscle）上進行觸診驗證。患者側臥，腳外側靠在床上（針灸穴位 SP3、SP 2d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060523-ir-pe-pave.jpeg\" alt=\"ir-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-pe 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥。治療師站在腳邊，用食指或肘部觸診外展足𧿹肌的筋膜隔室。面對急性疼痛的患者時力道應該很小，而當存在慢性纖維化時所需要的力道可能很大。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060534-ir-pe-treatment.jpeg\" alt=\"ir-pe-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取侧卧位并将足外侧缘放在治疗床上，治疗师使用指间关节在患者足内侧进行治疗。若手法治疗效果不好，将患者转至医师处进一步检查以排除痛风、疲劳性骨折等其他引起本症状的病因。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060511-ir-pe-o-treatment.jpeg\" alt=\"ir-pe-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "IR-PE 障礙",
    "answer": "\u003Cp\u003Eir-pe 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E由於蹠趾關節 （metatarsophalangeal joint）退化過程引起的僵硬導致大腳趾關節疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060512-ir-pe-cp.jpeg\" alt=\"ir-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-pe 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者主訴大腳趾有一定程度的負重困難；這種僵硬在早上或走路後會更加明顯。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060517-ir-pe-pamo.jpeg\" alt=\"ir-pe-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E有时，病人用他们的足外侧触地行走，以避免大𧿹趾负重（𧿹外翻）。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E足内侧间隔的纤维化导致𧿹展肌痉挛，并继发畸形。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060557-ir-pe-o-cp.jpeg\" alt=\"ir-pe-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动验证\u003Cbr /\u003E病人的步态变化往往很显著，但是最好在治疗之前进行足内侧缘和第1跖趾关节的负重测试。治疗后立即再测。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060502-ir-pe-o-move.jpeg\" alt=\"ir-pe-o-move\" /\u003E\u003C/p\u003E"

    "question": "ER-PE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E趾短伸肌上\u003C/li\u003E\u003Cli\u003EGB40，丘墟穴\u003C/li\u003E\u003Cli\u003E趾短伸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部的外旋運動（將前足向外移動）由單關節肌（趾短伸肌）和雙關節肌（腓背長肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在趾短伸肌上，外踝的遠端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080412-Er-pe.jpeg\" alt=\"Er-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E外側腳節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eer-pe 位於十字伸肌支持帶下方，單關節（伸趾短肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-pe 位於腳的外側筋膜腔室，單關節（外展小趾肌）和雙關節（腓骨短肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-pe 位於第2、3、4蹠骨頭，其中單關節（背側骨間肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100551-re-pe-location.jpeg\" alt=\"re-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E背側骨間肌與伸趾短肌以及長肌腱相連。\u003C/li\u003E\u003Cli\u003E第二個腳趾有來自兩個背側骨間肌附著，一個外側、一個內側，而第三和第四個腳趾只有來自外側部分的附著點（la-pe）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010519-la-pe-location.jpeg\" alt=\"la-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E足部在蹠骨 （metatarsals） 水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-pe 的 CC 位於外展小趾肌的筋膜上，然後與屈小趾肌相連，再接續到小腿三頭肌 （triceps surae） 的筋膜。\u003C/li\u003E\u003Cli\u003Eer-pe 的CC 位於更近端，在伸趾短肌的肌腹上；該肌肉的筋膜與足背側筋膜的中層（middle lamina ofthe dorsal fascia）相連。\u003C/li\u003E\u003Cli\u003Ela-pe 的CC 位於更遠側，在足背筋膜的深部，與足背骨間肌（dorsal interossei muscles) 相連•\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070550-er-pe-location.jpeg\" alt=\"er-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-pe 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在伸趾短肌上進行觸診驗證，沿著從外踝延伸到最後兩個腳趾之間的線（針灸穴位 GB 40) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070545-er-pe-pave.jpeg\" alt=\"er-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-pe 協調中心 （CC）的治療。\u003Cbr /\u003E患者側臥或仰臥，腳板平放。\u003Cbr /\u003E治療師站在側邊，用指關節在伸趾短肌的肌腹上操作。即使這是一塊小肌肉，力道也應該適中，因為此筋膜的纖維化通常很難處理。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070556-er-pe-treatment.jpeg\" alt=\"er-pe-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者将足内侧置于床上，治疗师将指关节放在趾短伸肌上，依据患者的感受对发生变化的点进行触诊。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070514-er-pe-o-treatment.jpeg\" alt=\"er-pe-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "IR-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E鎖骨下肌內1/3處\u003C/li\u003E\u003Cli\u003EK127，俞府穴\u003C/li\u003E\u003Cli\u003E鎖骨下肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的內旋運動（將關節孟的面移向前下方）由單關節肌（領骨下肌）和雙關節肌（胸大肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc點在鎖骨中段的下方，鎖骨下肌肌腹上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080419-Ir-sc.jpeg\" alt=\"Ir-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E肩胛節段前部的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-sc 的CC 位於鎖骨內側部分下方，單關節（鎖骨下肌）和雙關節向量（胸大肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Ean-sc 的 CC 位於胸小肌的肌腹上方，單關節（胸小肌）和雙關節向量（胸大肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-sc 的 CC 位於腋中線的前方，單關節（前鋸肌）和雙關節向量（胸大肌和闊背肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090534-an-sc-location.jpeg\" alt=\"an-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鎖骨下肌向近端方向，而肩胛下肌 （ir-hu）向遠端方向牽引鎖骨腋筋膜 （ir-sc）。\u003C/li\u003E\u003Cli\u003E胸小肌 （an-sc）向近端方向，而肱二頭肌短頭（an-hu） 向遠端方向牽引胸筋膜。\u003C/li\u003E\u003Cli\u003E由闊背肌和前鋸肌（me-sc） 牽引内側腋窩筋膜，由上臂肌肉（me-hu）牽引外側腋筋膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120521-me-sc-location.jpeg\" alt=\"me-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003E腋窩前後圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-sc 的CC位於鎖骨下肌，其筋膜延續包含：\u003Cul\u003E\u003Cli\u003E下面是鎖骨腋筋膜（clavicoracoaxillaryfascia）、腋深筋膜 （deep axillary fascia）和肩胛下筋膜（subscapularis fascia) \u003C/li\u003E\u003Cli\u003E上面是中頸筋膜 （middle cervical fascia），其中包含了肩胛舌骨肌（Omohyoid muscle)\u003C/li\u003E\u003C/ul\u003E\u003C/li\u003E\u003Cli\u003Ean-sc 的CC 位於胸骨，an-sc 的CC 位於胸小肌和胸大肌的筋膜上，胸大肌的筋膜與三角肌的筋膜在外側相連。\u003C/li\u003E\u003Cli\u003Eme-sc 的CC 位於腋淺筋膜上，連接胸大肌和闊背肌；這些肌肉的筋膜在斜方肌筋膜 （la-sc）上方延續。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060512-ir-sc-location.jpeg\" alt=\"ir-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-sc 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在鎖骨的中間三分之一（紅色虛線）對著鎖骨下肌（針灸穴位 ST 13）進行觸診驗證。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060504-ir-sc-pave.jpeg\" alt=\"ir-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-sc 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。將指關節放在鎖骨的中間位置，並找出引起患者症狀的點。在鎖骨下方以輕的力道進行縦向操作（2）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070515-ir-sc-treatment.jpeg\" alt=\"ir-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取仰卧位，治疗师把指间关节放在锁骨中段1/3处触诊诱发患者症状的点。筋膜手法治疗不能矫正胸锁错位，但能减轻疼痛并改善关节活动度。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060516-ir-sc-o-treatment.jpeg\" alt=\"ir-sc-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "IR-SC 障礙",
    "answer": "\u003Cp\u003Eir-sc 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E胸鎖骨或肩鎖骨脫位後的鎖骨疼痛。肋間神經痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060554-ir-sc-cp.jpeg\" alt=\"ir-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-sc 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E由於胸鎖關節腫脹、疼痛，有時突出，患 者難以將手伸向對側肩部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060559-ir-sc-pamo.jpeg\" alt=\"ir-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E胸锁关节肿胀、疼痛和突出。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E锁骨下肌从第1肋骨延伸到锁骨；当其筋膜发生致密化时，肌电图检查提示，该肌的张力高于正常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060506-ir-sc-o-cp.jpeg\" alt=\"ir-sc-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请病人把手放到对侧的肩膀上，这种内旋会增加锁骨向胸骨的闭合、滑动导致的疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060510-ir-sc-o-move.jpeg\" alt=\"ir-sc-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ER-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E岡上窩內側，斜方肌上部外側，肩胛提肌肌腹\u003C/li\u003E\u003Cli\u003ETE15，天膠穴\u003C/li\u003E\u003Cli\u003E肩胛提肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的外旋運動（關節盂擡高及向外旋轉）由單關節肌（前鋸肌下部）和雙關節肌（斜方肌上部）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的ce 點位於肩胛內角上，在這里前鋸肌的筋膜匯入肩胛提肌的筋膜（肩胛提肌涉及外旋-頸）和斜方肌上部纖維。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080429-Er-sc.jpeg\" alt=\"Er-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E後側肩胛節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-sc 位於斜方肌的前緣，單關節（肩胛舌骨肌）和雙關節（斜方肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-sc 位於肩胛骨上角上方，單關節（提肩胛肌）和雙關節（斜方肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-sc 位於肩胛骨和脊椎之間的中點，單關節（菱形肌）和雙關節（中斜方肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110517-re-sc-location.jpeg\" alt=\"re-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛筋膜的牽拉來自於往頭側的斜方肌以及遠端方向的三角肌（la-sc, la-hu）。\u003C/li\u003E\u003Cli\u003E提肩胛肌向頭側方向牽拉，棘上肌、棘下肌和三角肌向遠側方向牽拉（er-sc, er-hu) •\u003C/li\u003E\u003Cli\u003E三角肌筋膜的牽拉來自於向内方向的斜方肌和菱形肌群，和來自遠端方向的三角肌嵌入肩胛骨的部分（re-sc, re-hu）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010540-la-sc-location.jpeg\" alt=\"la-sc-location\" /\u003E\u003Cbr /\u003E腋窩的前後截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-sc 的CC 位於斜方肌的上緣，在肩胛骨抬高的過程中，它作用於兩個關節：胸鎖關節和肩鎖關節。\u003C/li\u003E\u003Cli\u003Eer-sc 的CC 位於肩胛上角的提肩胛肌的起點，頸筋膜中層（middle lamina of the cervical fascia） 也起源於此。\u003C/li\u003E\u003Cli\u003Ere-sc 的CC 位於斜方肌的内側部分，正好在小菱形肌或大菱形肌上方。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070503-er-sc-location.jpeg\" alt=\"er-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-sc 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在肩胛骨上角上方進行，以提肩胛肌（紅色虛線）為起點（針灸穴位 TE 15）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070558-er-sc-pave.jpeg\" alt=\"er-sc-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-sc 協調中心（CC）的治療。\u003Cbr /\u003E患者坐著，頭靠在另一隻手上。站在患者身後，用肘部操作在肩胛提肌的起點。因為必須克服斜方肌的阻力，所以力道必須相當大。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070510-er-sc-treatment.jpeg\" alt=\"er-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取坐位，治疗师将肘置于斜方肌后侧区域，即肩胛骨上角上方。有时该治疗点在肩胛提肌远端上缘，更接近头端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070509-er-sc-o-treatment.jpeg\" alt=\"er-sc-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ER-SC 障礙",
    "answer": "\u003Cp\u003Eer-sc 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E肩胛骨頂部疼痛，常會延伸到頸部或上肢。肩膀沉重的感覺通常也會蔓延到手臂。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070546-er-sc-cp.jpeg\" alt=\"er-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-sc 肌筋膜單元的疼痛動作 (PaMo)\u003Cbr /\u003E提肩胛肌筋膜的纖維化，導致肩胛骨和頸部之間或肩胛骨和肱骨外旋之間的協同動作不同步。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070552-er-sc-pamo.jpeg\" alt=\"er-sc-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP；\u003Cbr /\u003E颈痛、肩胛、肩膀；疼痛从颈部延伸至手臂。\u003Cbr /\u003E功能障碍起源或 CC点：\u003Cbr /\u003E肩胛提肌筋膜纤维化，导致肩外旋运动时颈部、肩胛骨和肱骨运动不协调。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070501-er-sc-o-cp.jpeg\" alt=\"er-sc-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E令患者每次单手越过头触摸胸椎，即使患者声称两侧感觉相同，也要注意观察其双手能够到达的水平。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070505-er-sc-o-move.jpeg\" alt=\"er-sc-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "IR-HU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E喙肱肌上，胸大肌肌腱下，上臂內側\u003C/li\u003E\u003Cli\u003EPC2，天泉穴\u003C/li\u003E\u003Cli\u003E肩胛下肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肱骨的內旋運動（肩部向內旋轉）由單關節肌（肩胛下肌）和雙關節肌（胸大肌和背闊肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在胸大肌肌腱下、啄鎖筋膜上。該筋膜延續到肩胛下肌（此肌肉不能通過手法直接觸及）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080436-Ir-hu.jpeg\" alt=\"Ir-hu\" /\u003E\u003C/p\u003E\u003Cp\u003E肱部節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-hu CC 位於三角肌一胸肌溝，單關節（喙肱肌）和雙關節向量（肱二頭肌）交匯處。\u003C/li\u003E\u003Cli\u003Eir-hu 的CC 位於肩旋轉袖內旋肌上，單關節（肩胛下肌）和雙關節向量（闊背肌）匯聚於此。\u003C/li\u003E\u003Cli\u003Eme-hu 的CC 位於腋外側部分的基部，在此處單關節（喙肱肌）和雙關節向量（胸大肌）匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090522-an-hu-location.jpeg\" alt=\"an-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前向- 肱部（an-hu）肌筋膜序列向近端方向，而前向-肘部（an-cu） 肌筋膜序列向遠端方向牽引筋膜。\u003C/li\u003E\u003Cli\u003E内向- 肱部（me-hu） 肌筋膜序列向近端方向，内向-肘部（me-cu）肌筋膜序列向遠端方向牽引内側肌間隔。\u003C/li\u003E\u003Cli\u003E肩胛下肌和喙肱肌（ir-hu）對内側肌間隔向内牽引，旋前圓肌（ir-cu）向遠端牽引。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010556-me-hu-location.jpeg\" alt=\"me-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E肩部肱骨頭水平斜切面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-hu 的CC 位於將胸大肌的鎖骨部分與三角肌的鎖骨部分開的溝。\u003C/li\u003E\u003Cli\u003Eir-hu 的CC位於覆蓋胸大肌、肩胛下肌和喙肱肌腱的筋膜上。\u003C/li\u003E\u003Cli\u003Eme-hu的CC 位於將肱三頭肌長頭連接到喙肱肌和肱二頭肌短頭的筋膜上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070549-ir-hu-location.jpeg\" alt=\"ir-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-hu 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E尋找肱骨内旋肌（肩胛下肌、闊背肌、胸大肌、喙肱肌）肌腱之間最緻密的點（針灸穴位 PC 2）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070542-ir-hu-pave.jpeg\" alt=\"ir-hu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-hu 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，手臂輕微外展。\u003Cbr /\u003E用指關節或肘部與嵌入肱骨近端三分之一的内旋肌「袖套」產生摩擦。\u003Cbr /\u003E這裡的力道必須是中等強度，因為它會將肌腱壓在肱骨上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070555-ir-hu-treatment.jpeg\" alt=\"ir-hu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧位，治疗师将指间关节或肘部放在内旋肌腱上，在开始操作之前探索该区域内改变最明显的位点；定位越准确，症状改善就会越迅速。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060538-ir-hu-o-treatment.jpeg\" alt=\"ir-hu-o-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "IR-HU 障礙",
    "answer": "\u003Cp\u003Eir-hu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E肩周炎 (scapulohumeral periarthritis) 肱骨前區疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070532-ir-hu-cp.jpeg\" alt=\"ir-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-hu 肌筋膜單元的疼痛動作 (PaMo)\u003Cbr /\u003E患者抱怨肩部前部疼痛，當進行肱骨内旋運動時疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070537-ir-hu-pamo.jpeg\" alt=\"ir-hu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E肩前部。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E胸大肌、背阔肌、肩胛下肌全部参与肩部内旋；这些矢量的中心位于它们在肱骨附着点处的下部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060529-ir-hu-o-cp.jpeg\" alt=\"ir-hu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E送动测试\u003Cbr /\u003E患者屈曲肘关节，试图对抗前臂的阻力内旋前臂；有时疼痛加重，也可能发现双上肢力量的差异。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060533-ir-hu-o-move.jpeg\" alt=\"ir-hu-o-move\" /\u003E\u003C/p\u003E"

    "question": "ER-HU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E肱骨頭水平，三角肌後束\u003C/li\u003E\u003Cli\u003ETE14，肩膠穴\u003C/li\u003E\u003Cli\u003E小圓肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肱骨的外旋運動（上臀向外旋轉）由單關節肌（小圓肌、岡下肌）和雙關節肌（止於肩胛岡的三角肌後部）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在岡下肌和小圓肌的肌腹上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080444-Er-hi.jpeg\" alt=\"Er-hi\" /\u003E\u003C/p\u003E\u003Cp\u003E後側肱節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-hu 位於大結節的前方，單關節（外側三角肌）和雙關節（肱二頭肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-hu 位於旋轉肌袖上方，單關節（棘下肌）和雙關節（三角肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-hu 位於肩胛骨棘突的尾端，單關節（大圓肌）和雙關節（三角肌和肱三頭肌長頭）的向量交匯處。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110550-re-hu-location.jpeg\" alt=\"re-hu-location\" /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/li\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的三角肌和遠端的肱橈肌（la-hu, la-cu）。\u003C/li\u003E\u003Cli\u003E臂筋膜的牽拉來自於近端附著於肩胛棘上的三角肌和遠端的三頭肌 （re-hu, re-cu）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的斜向牽拉來自於外旋動作單元，包含上方的三角肌和下方肱橈肌和旋後肌 (er-hu, er-cu) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010551-la-hu-location.jpeg\" alt=\"la-hu-location\" /\u003E\u003Cbr /\u003E肩膀在肱骨頭水平的斜截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-hu 的CC位於三角肌外側筋膜上，在三角肌下囊和筋膜水平處，覆蓋棘上肌腱和肱二頭肌長頭。\u003C/li\u003E\u003Cli\u003Eer-hu 的CC位於肩外旋的三塊肌肉上，包含：三角肌嵌入肩胛骨處、棘下肌和小圓肌的部分。\u003C/li\u003E\u003Cli\u003Ere-hu 的 CC 與肩伸展的四塊肌肉相連，包含：三角肌後部、大圓肌、肱三頭肌長頭和闊背肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070510-er-hu-location.jpeg\" alt=\"er-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-hu 協調中心 （CC） 的觸診驗證。\u003Cbr /\u003E在肱骨頭的水平上進行觸診驗證，在三角肌中線的後面。請患者在站立的姿勢下觸診驗證會更容易（針灸穴位 TE 14）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070505-er-hu-pave.jpeg\" alt=\"er-hu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-hu 協調中心 （CC）的治療。\u003Cbr /\u003E患者側臥，需治療的手臂向前平放。\u003Cbr /\u003E站在患者面前，用肘部與外旋肌袖產生摩擦。力道應該是中等強度，因為即使它沒有施加在緻密點上，在該區域強大的力道會引起疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070517-er-hu-treatment.jpeg\" alt=\"er-hu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者健侧侧卧，治疗师将肘关节或指关节置于肩袖背侧，根据患者感觉，触诊引起症状的部位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070542-er-hu-o-treatment.jpeg\" alt=\"er-hu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "ER-HU 障礙",
    "answer": "\u003Cp\u003Eer-hu 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E肩部後外側區域的疼痛在夜間最為明顯。\u003Cbr /\u003E手臂無力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070555-er-hu-cp.jpeg\" alt=\"er-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-hu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者主訴當梳理頭髮或進行將手朝向對側肩膀的拮抗運動時，疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070500-er-hu-pamo.jpeg\" alt=\"er-hu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E疼痛部位通常位于肱盂关节区附近。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E除询问疼痛部位外，询问哪种运动最疼痛也有助于追踪病因，例如患者无法够到车内的安全带（肩外旋时）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070533-er-hu-o-cp.jpeg\" alt=\"er-hu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者伸展双臂，对抗前臂的阻力。\u003Cbr /\u003E有时该运动不会引起疼痛，但可明显感受到两侧上肢力量的不同。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070537-er-hu-o-move.jpeg\" alt=\"er-hu-o-move\" /\u003E\u003C/p\u003E"

    "question": "IR-CU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E前臂近端1/3內，旋前圓肌上\u003C/li\u003E\u003Cli\u003EPC3，曲澤穴\u003C/li\u003E\u003Cli\u003E旋前圓肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的內旋運動（橈骨頭旋前）由單關節肌（旋前圓肌）和雙關節肌（橈側腕屈肌和掌長肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在旋前圓肌上，肘橫紋中點的下方。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080451-Ir-cu.jpeg\" alt=\"Ir-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E肘部節段前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cu 的 CC 位於肱二頭肌肌腹部的外側部分，單關節（肱肌）和雙關節（肱二頭肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-cu 的 CC 位於內側肌間膈，單關節（喙肱肌）和雙關節向量（起始於肱骨的尺側屈腕肌纖維）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-cu 的 CC 位於肘部屈摺痕線的中央，單關節（旋前圓肌）和雙關節向量（掌長肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090505-an-cu-location.jpeg\" alt=\"an-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肱二頭肌向近端方向，而橈側屈腕肌（an-cu, an-ca）向遠端方向施加牽引力。\u003C/li\u003E\u003Cli\u003E喙肱肌在近端方向，而尺側屈腕肌（me-cu, me-ca） 在遠端方向牽引隔膜。\u003C/li\u003E\u003Cli\u003E旋前圓肌向近端方向，旋前方肌（ir-cu,ir-ca）向遠端方向施加牽引力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010550-me-cu-location.jpeg\" alt=\"me-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E上臂在遠端 1/3的水平橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cu 的CC 位於前臂筋膜；肱肌的外側纖維將此點更向外側移。\u003C/li\u003E\u003Cli\u003Eir-cu 的CC 位於更遠的位置，因為它與旋前圓肌的筋膜有關。\u003C/li\u003E\u003Cli\u003Eme-cu 的 CC 位於内側肌間隔上，而後者又與尺神經鞘結合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070554-ir-cu-location.jpeg\" alt=\"ir-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在前臂近三分之一處，旋前圓肌 （pronator teres muscle）（紅色虚線）（針灸穴位 PC3） 上進行觸診驗證。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070544-ir-cu-pave.jpeg\" alt=\"ir-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cu 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，手臂沿身體一側伸展。\u003Cbr /\u003E使用食指關節作為一個小鑿子，在橫向上向旋前圓肌筋膜的緻密處搓開。\u003Cbr /\u003E力道最初應該較輕，然後變得適中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070501-ir-cu-treatment.jpeg\" alt=\"ir-cu-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "IR-CU 障礙",
    "answer": "\u003Cp\u003Eir-cu 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E內側上髁炎或高爾夫球肘。手臂內側區域疼痛，向下延伸至手掌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070534-ir-cu-cp.jpeg\" alt=\"ir-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cu 肌筋膜單元的疼痛動作\u003Cbr /\u003E例如，當擰乾一塊布時，患者會感到肘部疼痛。通常這種施力會導致手指麻木或針刺。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070539-ir-cu-pamo.jpeg\" alt=\"ir-cu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E在肱骨内上髁疼痛，类似于内-肘筋膜单元导致的牵涉痛。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E引发疼痛的动作（如转动钥匙）帮助鉴别涉及哪些肌筋膜单元。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060506-ir-cu-o-cp.jpeg\" alt=\"ir-cu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请病人抗阻内旋（旋前）前臂，阻力置于前臂远端1/3处，以激活旋前圆肌而不是旋前方肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060510-ir-cu-o-move.jpeg\" alt=\"ir-cu-o-move\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E病人仰卧，手臂放松、放在桌上，治疗师于肘横纹下方沿着旋前圆肌触诊寻找最敏感点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060519-ir-cu-o-treatment.jpeg\" alt=\"ir-cu-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ER-CU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E肱三頭肌肌腱外側緣，上臂遠端1/3內\u003C/li\u003E\u003Cli\u003ETE10，天井穴\u003C/li\u003E\u003Cli\u003E旋後肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的外旋運動（橈骨頭水平的旋後動作）由單關節肌（旋後肌）和雙關節肌（止於橈骨粗隆的肱二頭肌、肱橈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點位於來自外側肌間隔的旋後肌起點上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080457-Er-cu.jpeg\" alt=\"Er-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E肘節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cu 位於肱三頭肌的外側筋膜上，單關節（肱三頭肌外側頭）和雙關節（肱三頭肌長頭）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-cu 位於外側肌間隔，單關節（肱橈肌）和雙關節（橈側伸腕長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-cu 位於外側肌間隔和鷹嘴突之間，單關節（旋後肌）和雙關節（肱橈肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110552-re-cu-location.jpeg\" alt=\"re-cu-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前臂筋膜的牽拉來自於近端的肱三頭肌和遠端的尺側伸腕肌（re-cu, re-ca）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的三角肌和遠端的橈側伸腕長肌和肱橈肌（la-cu, la-ca) •\u003C/li\u003E\u003Cli\u003E骨間膜的牽拉來自於近端的旋後肌和遠端的伸拇長肌、外展拇長肌（er-cu, er-ca）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010547-la-cu-location.jpeg\" alt=\"la-cu-location\" /\u003E\u003Cbr /\u003E上臂下 1/3水平處的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cu 的 CC 位於更遠的位置。它位於外 側肌間隔中，位於肱橈肌的起點。\u003C/li\u003E\u003Cli\u003Eer-cu 的 CC 位於更遠端，在肱三頭肌肌腱與肱橈肌和旋後肌（supinator） 的筋膜連續。\u003C/li\u003E\u003Cli\u003Ere-cu的CC 位於與肱三頭肌的肌束膜和肌内膜相連的後外側上臂筋膜上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080556-er-cu-location.jpeg\" alt=\"er-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在肱三頭肌肌腱進行觸診驗證，方向朝向肱橈肌和旋後肌的起點（針灸穴位 TE 10) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080551-er-cu-pave.jpeg\" alt=\"er-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cu 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，手臂伸直，手掌朝下。\u003Cbr /\u003E治療師站在患者的側邊，對著肱三頭肌腱的外側邊緣進行操作。\u003Cbr /\u003E力道適中，因為被操作的組織是皮下組織。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080502-er-cu-treatment.jpeg\" alt=\"er-cu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，双臂置于体侧，治疗师将指关节置于患者的肱三头肌肌腱，触诊筋膜和外侧肌间隔（旋后肌和肱桡肌起始处）较为致密的点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070539-er-cu-o-treatment.jpeg\" alt=\"er-cu-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eer-cu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E鷹嘴突（olecranon）疼痛甚至會延伸至外上髁，與橈側伸腕肌的附著點病變（enthesopathy of the extensor carpi radialis)相似。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080541-er-cu-cp.jpeg\" alt=\"er-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者主訴肘部疼痛，主要是在前臂外旋或旋後時疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080546-er-cu-pamo.jpeg\" alt=\"er-cu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E疼痛位于桡骨头或外上髁附近。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E能使这种"上髁炎"状疾病加剧的不是提重物（见外-肘），而是上肢的转动（旋后肌和肱桡肌）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070529-er-cu-o-cp.jpeg\" alt=\"er-cu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动验证\u003Cbr /\u003E请患者对抗阻力，从手掌旋前位旋转前臂使掌心向上。有时也可用其他的运动验证，但为了确认治疗部位以及比较治疗前后的疗效，在治疗前找出疼痛和无力部位十分重要。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070534-er-cu-o-move.jpeg\" alt=\"er-cu-o-move\" /\u003E\u003C/p\u003E"

    "question": "IR-CA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E前臂中段1/3內，中線偏橈側，掌長肌和橈側腕屈肌之間\u003C/li\u003E\u003Cli\u003EPC4，郄門穴\u003C/li\u003E\u003Cli\u003E旋前方肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腕部的內旋運動（下尺橈關節旋前）由單關節肌（旋前方肌）和雙關節肌（肱橈肌、橈側腕屈肌和掌長肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在旋前方肌的近端（掌長肌與橈側腕屈肌肌腱之間）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080403-Ir-ca.jpeg\" alt=\"Ir-ca\" /\u003E\u003C/p\u003E\u003Cp\u003E腕部節段前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-ca 的 CC 位於橈側屈腕肌的外側，單關節（橈側屈腕肌）和雙關節（趾屈肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-ca 的 CC 位於掌長肌腱上，單關節（旋前方肌）和雙關節（掌長肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-ca 的 CC 位於尺側屈腕肌腱上，單關節（尺側屈腕肌）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090546-an-ca-location.jpeg\" alt=\"an-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E橈側屈腕肌在大魚際肌筋膜上的近端牽引力，而拇短肌（an-ca, an-di） 在遠端方向的牽引力。\u003C/li\u003E\u003Cli\u003E尺側屈腕肌對小魚際筋膜施加近端牽引力，而掌短肌則施加遠端牽引力（me-ca，me-di) •\u003C/li\u003E\u003Cli\u003E由掌長肌向近端方向和由蚓狀肌（ir-ca, ir-di） 向遠端方向牽引掌腱膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010523-me-ca-location.jpeg\" alt=\"me-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003E前臂上四分之一的邊界的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-ca 的 CC 位於尺側屈腕肌（flexor carpi uInaris） 的肌腱通道上，如圖所示。\u003C/li\u003E\u003Cli\u003Ean-ca 的 CC 位於分隔橈側屈腕肌肌腹和掌長肌的隔膜上。\u003C/li\u003E\u003Cli\u003Eir-cu 的 CC 位於旋前圓肌上，其遠端筋膜在深處與旋前方肌（pronatorquadratus）（ir-ca）的筋膜相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070524-ir-ca-location.jpeg\" alt=\"ir-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-ca 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E在掌長肌腱（palmaris longus）和橈側屈腕肌 （flexor carpi radialis）（紅色虛線）（針灸穴位 PC 4）之間的前臂中段進行觸診驗證。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070519-ir-ca-pave.jpeg\" alt=\"ir-ca-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-ca 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，手臂沿身體一側伸展。治療師從同側工作，用肘部產生深度摩擦，以鬆動屈肌的三個筋膜平面。根據患者體型，力道可以是中等或強。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070531-ir-ca-treatment.jpeg\" alt=\"ir-ca-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，手臂放松、放在治疗床上，治疗师将肘部中段置于患者前臂，即屈指肌的肌腹上，慢慢地向远端移动直到出现手腕、手指的发麻或针刺样疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060523-ir-ca-o-treatment.jpeg\" alt=\"ir-ca-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "IR-CA 障礙",
    "answer": "\u003Cp\u003Eir-ca 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E手指屈肌肌腱病。中指的扳機指，手上的針刺感（腕隧道）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070508-ir-ca-cp.jpeg\" alt=\"ir-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-ca肌筋膜單元的疼痛動作(PaMo)\u003Cbr /\u003E患者主訴手指僵硬，尤其是在夜間和早晨。\u003Cbr /\u003E與這種僵硬相關的是在旋前或將手壓在桌子上時，手腕也會疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070513-ir-ca-pamo.jpeg\" alt=\"ir-ca-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP\u003Cbr /\u003E筋膜单元功能障碍导致手指而不是手腕的牵涉痛（针刺感，腱鞘炎）\u003Cbr /\u003E功能障碍的起源；或 CC\u003Cbr /\u003E指深、指浅屈肌和旋前方肌于前臂远端1/3处腱肌结合，腕部旋前障碍有可能来源于此区域。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060513-ir-ca-o-cp.jpeg\" alt=\"ir-ca-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E腕关节和手指的内旋动作一部分由拇长屈肌、指屈肌驱动。在患者手内旋的过程中施加阻力可以测试这些肌肉的弹性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060517-ir-ca-o-move.jpeg\" alt=\"ir-ca-o-move\" /\u003E\u003C/p\u003E"

    "question": "ER-CA 位置",

ve.jpeg\" alt=\"er-ca-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-ca 協調中心 （CC）的治療。\u003Cbr /\u003E患者俯臥，手臂沿身體一側伸展。\u003Cbr /\u003E使用指關節或肘部在伸指肌的肌腹上操作，直到獲得筋膜的流動性。力道應該是中等強度，因為當這個區域變緻密時會非常痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080539-er-ca-treatment.jpeg\" alt=\"er-ca-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，手掌置于床面；治疗师用指间关节或肘置于前臂中部，即伸肌肌腹之上；如果患者无法忍受这种诊疗姿势，也可将手臂置于头顶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070510-er-ca-o-treatment.jpeg\" alt=\"er-ca-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eer-ca 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E腕部疼痛，常伴有囊腫存在伸指肌腱鞘中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080516-er-ca-cp.jpeg\" alt=\"er-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-ca 肌筋膜單元的疼痛動作 (PaMo)\u003Cbr /\u003E患者主述當手指伸肌腱有張力，尤其是與旋轉相關運動時，手腕疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080522-er-ca-pamo.jpeg\" alt=\"er-ca-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E伸指肌腱囊肿，手腕伸展-外旋时疼痛。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E指长伸肌、拇长伸肌参与手腕外旋，在肌腹上的手法旨在改善肌腱病变，失衡代偿有时会形成囊肿。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070501-er-ca-o-cp.jpeg\" alt=\"er-ca-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者外旋手腕对抗阻力，或把手背抵在诊疗床上，指出哪条肌腱更疼痛；有时是指伸肌和拇伸肌肌腱（外旋），有时是尺侧伸\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070505-er-ca-o-move.jpeg\" alt=\"er-ca-o-move\" /\u003E\u003C/p\u003E"

    "question": "IR-DI 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E掌心，第2-4骨間肌\u003C/li\u003E\u003Cli\u003EPC8，勞宮穴\u003C/li\u003E\u003Cli\u003E蚓狀肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E手指的內旋運動（這里考慮的是手指屈曲時涉及內旋，而抓握動作組合則在有關運動組合的章節中分析）由單關節肌（蚓狀肌）和雙關節肌（指長、短屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080417-Ir-di.jpeg\" alt=\"Ir-di\" /\u003E\u003C/p\u003E\u003Cp\u003E手部節段掌面協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-di CC 位於魚際隆起處，單關節（屈拇短肌）與雙關節（屈拇長肌）向量匯合處。\u003C/li\u003E\u003Cli\u003Eme-di 的 CC 位於小魚際隆起處，單關節（掌骨間肌）和雙關節（屈肌小指）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-di 的 CC 位於手掌的中心，在那裡單關節（蚓狀肌）和雙關節關節（屈肌）向量會聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090529-an-di-location.jpeg\" alt=\"an-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E掌短肌和屈指短肌嵌入到橫腕韌帶的尺側。屈拇短肌起源於同一韌帶的橈側。當拇指與小指接觸時，橫韌帶和掌骨間肌筋膜使參與指間運動（me-di）的肌肉同步。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010522-me-di-location.jpeg\" alt=\"me-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E右手在掌骨的水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-di 的CC 位於掌短肌 （palmarisbrevis）和屈小指短肌 （flexor digitiminimi brevis）上方；後者的筋膜延續在掌骨間肌（palmar interosseous muscles）上進行手指内收。\u003C/li\u003E\u003Cli\u003Eir-di 的CC 位於手掌腱膜上，對應於中指的淺屈肌和深屈肌的肌腱。\u003C/li\u003E\u003Cli\u003ECC 位於大魚際筋膜上，覆蓋外展\u003C/li\u003E\u003Cli\u003E姆指肌 （abductor pollicis） 和屈拇指短肌 （flexor pollicis brevis）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070529-ir-di-location.jpeg\" alt=\"ir-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-di 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E手掌腱膜的觸診驗證允許治療師辨識連接到掌骨的序列點。因為這塊肌肉的腱膜延伸到手指的肌腱中，觸診必須延伸到所有五個指骨的底部（針灸穴位 PC 8）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070522-ir-di-pave.jpeg\" alt=\"ir-di-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-di 協調中心 （CC）的治療。\u003Cbr /\u003E患者仰臥，手背靠在治療平面上。\u003Cbr /\u003E為了到達小的掌骨間肌和蚓狀肌（lumbrical muscles），治療師不能用手穿透掌腱膜 （palmar aponeurosis）；因此，必須在拇指内收肌的邊界和中間三個手指的掌骨韌帶上進行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070541-ir-di-treatment.jpeg\" alt=\"ir-di-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师用指关节或肘关节在病人的手掌，缓慢滑动施压寻找主要阻力点；松解索条状结缔组织需要产生足够热量，因此往往需要多次治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060530-ir-di-o-treatment.jpeg\" alt=\"ir-di-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "IR-DI 障礙",
    "answer": "\u003Cp\u003Eir-di 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E扳機指，也稱為狹窄性腱鞘炎 （stenosing tenosynovitis），由圍繞肌腱的滑膜鞘收緊引起。Dupuytren 症候群，由手掌腱膜的 纖維增生型病變引起。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070512-ir-di-cp.jpeg\" alt=\"ir-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-di 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者主述說，手的閉合會引起中指或無名指劇烈疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070517-ir-di-pamo.jpeg\" alt=\"ir-di-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E此筋膜单元异常的主要表现就是第\u003Cbr /\u003E3、第4 指的肌腱挛缩（Duputryen 挛缩）\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E由于掌腱膜筋膜的纤维化，手指保持永久性屈曲位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060522-ir-di-o-cp.jpeg\" alt=\"ir-di-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E由于腱挛缩，手指不能完全伸展；由于存在肌腱炎，手指不能完全屈曲。\u003Cbr /\u003E在这两种情况下掌长肌（和旋前圆肌有共同起点）的功能受限。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060525-ir-di-o-move.jpeg\" alt=\"ir-di-o-move\" /\u003E\u003C/p\u003E"

    "question": "ER-DI 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第2-4骨間肌背側\u003C/li\u003E\u003Cli\u003ETE3，中渚穴\u003C/li\u003E\u003Cli\u003E蚓狀肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E指部（手指）的外旋運動由單關節肌（蚓狀肌）和雙關節肌（指伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在骨間背側肌上。背側筋膜協調精細的手指動作，同時手腕的筋膜協調手腕與手指的強力動作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080423-Er-di.jpeg\" alt=\"Er-di\" /\u003E\u003C/p\u003E\u003Cp\u003E後側手節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-di 位於尺骨上的手掌筋膜，單關節（外展小指肌）和雙關節（伸小指肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-di 位於骨間筋膜上，單關節（第一骨間肌）和雙關節（橈側伸腕肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-di 位於第五指的肌腱附近，單關節（蚓狀肌）和雙關節（伸指長肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110503-re-di-location.jpeg\" alt=\"re-di-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一背側骨間肌終止於第二手指的橈側。\u003C/li\u003E\u003Cli\u003E它的筋膜延續到中指和無名指的骨間。\u003C/li\u003E\u003Cli\u003E拇指和小指的伸肌腱則沒有附著在背側骨間肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-la-di-location.jpeg\" alt=\"la-di-location\" /\u003E\u003Cbr /\u003E手在掌骨水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-di 的 CC 位於外展小指肌上方；這塊肌肉的運動軌跡與伸小指肌的動作一致。\u003C/li\u003E\u003Cli\u003Eer-di 的 CC 位於手背筋膜上，準確地說是在圍繞著伸指肌腱的淺層隔膜上。\u003C/li\u003E\u003Cli\u003Ela-di 的CC 位於第一背側骨間肌上，其筋膜與覆蓋另一骨間肌的深隔膜相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080508-er-di-location.jpeg\" alt=\"er-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-di 協調中心 （CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E在手背尺骨與橈骨分隔處，朝向尺骨部分進行觸診驗證（紅色虛線將兩個部份分開）（針灸穴位 TE 3、TE 2d）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080503-er-di-pave.jpeg\" alt=\"er-di-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-di 協調中心 （CC）的治療。\u003C/p\u003E\u003Cp\u003E患者俯臥，手掌平放。用指關節治療第 3和第4與第4 和第5掌骨之間的背側筋膜。力道應該很輕，因為這個區域的筋膜很容易觸診。操作沿著骨間溝進行縱向治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080514-er-di-treatment.jpeg\" alt=\"er-di-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，手臂置于体侧；治疗师用指间关节在第4 和第5手指背侧筋膜，或第3和第4 掌骨；当此点消除，即可验证此前引起疼痛的运动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070519-er-di-o-treatment.jpeg\" alt=\"er-di-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "LA-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E外眼角下緣，眼輪匝肌外側纖維上\u003C/li\u003E\u003Cli\u003EGB1，瞳子膠穴\u003C/li\u003E\u003Cli\u003E眼外直肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的外向運動分為3個次級肌筋膜單元\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的外直肌，其cc 點在外眼角上；\u003C/li\u003E\u003Cli\u003E2=顳肌，其cc 點在此肌肉的中心；\u003C/li\u003E\u003Cli\u003E3=咬肌，其ce 點在該肌肉的中心。顳肌和咬肌的筋膜延伸到這兩塊肌肉上，在閉合下頜的動作中將兩塊肌肉的作用整合到一起。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080427-La-cp1.jpeg\" alt=\"La-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著眼節段進行協調中心的比較\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 1的CC 位於眉毛的内緣，單關節肌（上直肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 1的CC 位於外眥上，單關節（外直肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp 1的CC位於眼球 （bulbus oculi）和眼眶下緣之間，單關節（下斜肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100530-re-cp-1-location.jpeg\" alt=\"re-cp-1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E牽拉來自向後的額肌和向前的眼輪匝肌或皺眉肌（re-cp 1-2）。\u003C/li\u003E\u003Cli\u003E牽拉來自向外的顳肌和向内的眼外直肌(la-cp 1-2) •\u003C/li\u003E\u003Cli\u003E帽狀腱膜的牽拉來自斜向的耳上肌和下斜肌以及眼輪匝肌的反向張力（er-cp 1-2）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060509-la-cp1-location.jpeg\" alt=\"la-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E矢狀面和下方橫截面中的眼球球筋膜 (Fasciae of the bulbus oculi) •\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 1 的CC 位於提上眼臉肌 （levatorpalpebrae superioris）筋膜和上直肌。\u003C/li\u003E\u003Cli\u003Eer-cp 1 的CC 連接到下斜肌，使眼睛向一側旋轉。\u003C/li\u003E\u003Cli\u003Ela-cp 1 的CC，外直肌周圍的筋膜形成眶外肌腱，附著於外側眼眶。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060529-er-cp1-location.jpeg\" alt=\"er-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp 1 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E通過觸診眼眶外側邊界，接近外側眼角，來觸診驗證此 CC 點（針灸穴位 GB1）。\u003Cbr /\u003E透過觸診兩邊來驗證，因為有可能是對側直肌的筋膜緻密化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060504-la-cp1-pave.jpeg\" alt=\"la-cp1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp 1 協調中心（CC）的治療。\u003Cbr /\u003E病人仰臥。站在患者頭側或者是側邊並目以外向（如箭頭所示）的方向輕輕摩擦。\u003Cbr /\u003E施壓在這個點上的力道應該非常輕（1）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060514-la-cp1-treatment.jpeg\" alt=\"la-cp1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指尖触及患者双眼外眦。由于一侧外直肌的张力过高，对侧外直肌就会显现出张力减弱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120508-la-cp1-o-treatment.jpeg\" alt=\"la-cp1-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "LA-CP1 障礙",
    "answer": "\u003Cp\u003Ela-cp 1 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E來源不明的眼睛疼痛。側視時眼睛不協 調。溢淚症、復發性結膜炎。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060554-la-cp1-cp.jpeg\" alt=\"la-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp1肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E此肌筋膜單元的張力代償導致視力聚焦不佳，患者表示看單側的時候會有複視的症狀。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060559-la-cp1-pamo.jpeg\" alt=\"la-cp1-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源：\u003Cbr /\u003E疼痛部位或 CP（感知中心）：\u003Cbr /\u003E侧视时双眼不协调，灼痛感\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E如果眼球筋膜或Tenon 囊纤维化，就无法使得眼外直肌的收缩和眼内直肌的放松同步化\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120553-la-cp1-o-cp.jpeg\" alt=\"la-cp1-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让患者眼睛向左向右看，观察双眼不同步的情况。病人或许一开始能控制眼睛运动，但是很快就会感到一只眼睛的疲劳和丧失协调性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120559-la-cp1-o-move.jpeg\" alt=\"la-cp1-o-move\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E內眼角內側，抵於鼻骨\u003C/li\u003E\u003Cli\u003EBL1，睛明穴\u003C/li\u003E\u003Cli\u003E眼內直肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的內向運動（將頭保持在平面中央上）可以劃分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1 上眼的內直肌，其ce 點在內眼角上；\u003C/li\u003E\u003Cli\u003E2=在下領骨中點的下領舌骨肌的縫隙，其cc點在下頦下面；\u003C/li\u003E\u003Cli\u003E3=項韌帶枕部附著處，其cc 點在枕外隆凸下。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080434-Me-cp1.jpeg\" alt=\"Me-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E眼部節段協調中心的比較性觸診\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 1的CC位於眼球及眶上嵴之間；單關節（上斜肌的滑車）及雙關節向量（眼輪匝肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Eme-cp 1的CC 位於內側眼臉韌帶，其中單關節（內直肌）及雙關節（眼輪匝肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 1的CC位於瞳孔下方並與瞳孔對齊，單關節（直肌下）和特定向量（眼球）匯合。Tenon&#39;s 囊筋膜將這些向量連接起來。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070540-an-cp1-location.jpeg\" alt=\"an-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E牽引眼輪匝肌（orbicularis oculi）上的耳前肌(anterior auricular muscle) (ir-cp 1-2) •\u003C/li\u003E\u003Cli\u003E牽引眼輪匝肌的上唇方肌顴骨部分（zygomatic portion of the quadratus labii supe-rioris) (an-cp 1-2) •\u003C/li\u003E\u003Cli\u003E上唇方肌的角部（angular portion of the quadratus labii superioris），在内側臉韌帶 (medial palpebral ligament) 和口輪匝肌的内側縫之間延伸（me-cp 1-2）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060520-me-cp1-location.jpeg\" alt=\"me-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E矢狀面和下方横截面中的眼球球狀筋膜 (Fasciae of the bulbus oculi) •\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 1 的CC 連接到上斜肌的筋膜，通過它的肌腱，位於眼眶上部的滑車（向下旋轉眼睛）。\u003C/li\u003E\u003Cli\u003Ean-cp 1的CC 與下直肌筋膜相連。\u003C/li\u003E\u003Cli\u003Eme-cp 1 的CC 與内直肌和眼球筋膜的眼眶肌腱，即眼球囊膜〔Tenon（特農）氏膜〕相關。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060501-ir-cp1-location.jpeg\" alt=\"ir-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cp 1協調中心（CC）的觸診驗證。\u003Cbr /\u003E這個 CC 的觸診驗證是用食指的指尖進行的。這種類型的觸診驗證讓治療師能夠感覺到眼内囊附近筋膜的滑動（針灸穴位 BL1) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060515-me-cp1-pave.jpeg\" alt=\"me-cp1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cp 1協調中心（CC）的治療。\u003Cbr /\u003E用食指的指尖鬆動筋膜，對鼻骨產生摩擦，同時用另一隻手穩定患者的頭部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060526-me-cp1-treatment.jpeg\" alt=\"me-cp1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧位，用指尖触诊检查并比较双侧内眼角，一旦确定敏感的一侧后，只需要松动这一侧。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100555-me-cp1-o-treatment.jpeg\" alt=\"me-cp1-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Eme-cp 1 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E疼痛位於眼球内眼角上方，靠近眼眶内側緣。眼淚分泌過多（流淚）、眼睛發紅和視力模糊。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060506-me-cp1-cp.jpeg\" alt=\"me-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cp 1 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E由於眼内直肌的缺陷，患者主述向左或向右看時出現複視。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060510-me-cp1-pamo.jpeg\" alt=\"me-cp1-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP（感知中心）：\u003Cbr /\u003E创伤后一侧的内直肌无法与对侧的外直肌同步工作\u003Cbr /\u003E功能障碍的起源或 CC（协调中心）：\u003Cbr /\u003E除神经控制外，用于协调两眼之间运动的筋膜连接也很必要。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100545-me-cp1-o-cp.jpeg\" alt=\"me-cp1-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E询问病人在向左或向右注视是否有复视，注意观察运动中的眼球的任何不对称情况。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100550-me-cp1-o-move.jpeg\" alt=\"me-cp1-o-move\" /\u003E\u003C/p\u003E"

    "question": "LA-CP2 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E顳肌上，約與咬肌對齊的位置\u003C/li\u003E\u003Cli\u003EST8，頭維穴\u003C/li\u003E\u003Cli\u003E顳肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080440-La-cp2.jpeg\" alt=\"La-cp2\" /\u003E\u003C/p\u003E\u003Cp\u003E在頭顱節段進行協調中心的比較\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 2位於前額的上部，單關節（額肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp 2位於耳輪上方，單關節（耳上肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 2位於顳筋膜上，單關節（顳肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070523-re-cp2-location.jpeg\" alt=\"re-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E來自耳上肌的向上牽拉和耳後肌的向後牽拉 (er-cp 2-3) •\u003C/li\u003E\u003Cli\u003E帽狀腱膜的牽拉來自於前側的額肌以及後側的枕肌 （re-cp 2-3）。\u003C/li\u003E\u003Cli\u003E深筋膜的向上牽拉來自於顳肌，向下牽拉來自於嚼肌 （la-cp 2-3）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060503-la-cp2-location.jpeg\" alt=\"la-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E顱骨穿過上頜骨的斜切面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 2的CC 位於額肌上（CC高於其所在位置）。\u003C/li\u003E\u003Cli\u003Ela-cp 2的CC 位於顳肌上方，其筋膜與咬肌的筋膜連續（如圖所示）。\u003C/li\u003E\u003Cli\u003Eer-cp 2的CC位於耳上肌，在耳朶的外軟骨（耳廓）上方。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060547-er-cp2-location.jpeg\" alt=\"er-cp2-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ela-cp 2協調中心（CC）的觸診驗證。\u003Cbr /\u003E從顳肌的中心點開始觸診驗證這個協調中心，為了辨認這個點的位置，請患者咬牙，這個協調中心位於顳肌的肌腹處（針灸穴位 ST 8）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-la-cp2-pave.jpeg\" alt=\"la-cp2-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp 2協調中心（CC）的治療。\u003Cbr /\u003E患者仰躺頭旋轉至對側，可站在患者的頭的後側或者頭的側邊，施加摩擦手法到觸診驗證時確認的點位，摩擦的方向依據指關節感覺組織的阻力為主。如果患者出現神經痛，應該減弱壓力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060510-la-cp2-treatment.jpeg\" alt=\"la-cp2-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，头转向一侧，治疗师用指间关节作用于颞肌中心部位，触按该区直至定位到会牵涉致牙痛的位点。\u003Cbr /\u003E谨记要缓慢地在该点（敏感点）进行手法操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120547-la-cp2-o-treatment.jpeg\" alt=\"la-cp2-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "LA-CP2 障礙",
    "answer": "\u003Cp\u003Ela-cp 2 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E上頷骨或牙齒疼痛、三叉神經痛、單邊頭痛（偏頭痛）。顏面麻痺、眼睛發癢。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060549-la-cp2-cp.jpeg\" alt=\"la-cp2-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp 2肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E此肌筋膜單元的張力代償造成視覺上的下頷骨外側偏移，或者在顳顎關節會有聲響（例如：喀拉、碰、刺耳聲）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060554-la-cp2-pamo.jpeg\" alt=\"la-cp2-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E非牙齿原因引起的牙疼，其神经痛的根源可能是三叉神经颞区头痛。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E颞肌的痉挛可以沿其筋膜传播，而该筋膜又与牙齿的牙周韧带相连续。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120537-la-cp2-o-cp.jpeg\" alt=\"la-cp2-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E治疗师用一手固定住患者头部，用另一只手向对侧移动下颌骨。在该图片中，左侧颞区筋膜被被动牵张，而右侧筋膜则被挤压。某些情况下，筋膜受压会使疼痛加剧。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120541-la-cp2-o-move.jpeg\" alt=\"la-cp2-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CP2 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E下巴下中點，下頜舌骨肌上\u003C/li\u003E\u003Cli\u003ECV23，廉泉穴\u003C/li\u003E\u003Cli\u003E下頜舌骨肌中縫\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080446-Me-cp2.jpeg\" alt=\"Me-cp2\" /\u003E\u003C/p\u003E\u003Cp\u003E上頜節段協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 2 CC 位於耳輪的前面，其中單關節（耳前肌）及雙關節（顳肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 2的CC位於臉頰的中間，這裡是單關節（提上唇肌 levator labii superioris\u003C/li\u003E\u003Cli\u003E及雙關節（口角肌 anguli oris） 的向量匯合點。\u003C/li\u003E\u003Cli\u003Eme-cp 2的CC位於鼻唇溝 nasolabial sulcus 的中心，單關節（提上唇鼻翼肌 levatorlabii superior alaeque nasi） 及雙關節（顴肌的翼頭 alar head of zygomaticus） 的向量會合點。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070537-an-cp2-location.jpeg\" alt=\"an-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E翼狀肌在頭側和尾側方向牽引耳前肌（ir-cp 2-3) °\u003C/li\u003E\u003Cli\u003E唇方肌（quadratus labii）向上牽引上唇，頸闊肌 （platysma） 則是向下牽引（an-cp2-3) 。\u003C/li\u003E\u003Cli\u003E口輪匝肌向上牽引唇內側纖維彈性板，頸闊肌内側纖維向下牽引（me-cp 2-3）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-me-cp2-location.jpeg\" alt=\"me-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E顱骨斜切面圖（從後到前）。註解：級別上頜骨的高度低於後顱骨水平。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cp 2的CC位於上領骨和顴骨之間，在提上唇肌 （levator labii superioris muscle）上方。\u003C/li\u003E\u003Cli\u003Eme-cp 2的CC 位於兩上領骨中間的鼻唇溝 （nasolabial sulcus）中。me-cp 2後側的 CC 位於兩塊額肌之間。\u003C/li\u003E\u003Cli\u003Eir-cp 2的CC 位於耳輪和耳屏（tragus）之間，在開口時形成的凹陷的上部。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060556-ir-cp2-locatoon.jpeg\" alt=\"ir-cp2-locatoon\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cp 2協調中心（CC）的解診驗證。\u003Cbr /\u003E在内側唇裂或人中（針灸穴位 Du或GV26）的中心進行觸診驗證。此穴位的治療適應症多與内在或心因性功能障礙有關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060526-me-cp2-pave-treatment.jpeg\" alt=\"me-cp2-pave-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "ME-CP2r 位置",
    "answer": "\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E帽狀腱膜（galea capiti）的中線張力來源，由兩個額肌前部拉緊，後部由枕肌和豎脊肌 （me-cp 2r 和 me-cp 3r）拉緊。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060537-me-cp2r-location.jpeg\" alt=\"me-cp2r-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cp 2r 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在前額上進行，顱骨中線和髮際線相交處（針灸穴位 GV 24）・此穴位的治療適應症與内在和心因性功能障礙有關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060546-me-cp2r-pave-treatment.jpeg\" alt=\"me-cp2r-pave-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "LA-CP3 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E咬肌肌腹上\u003C/li\u003E\u003Cli\u003EST6，頰車穴\u003C/li\u003E\u003Cli\u003E咬肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080452-La-cp3.jpeg\" alt=\"La-cp3\" /\u003E\u003C/p\u003E\u003Cp\u003E在後側下領節段肌進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 3 位於枕骨粗隆下方，單關節（枕骨肌）和雙關節（豎脊肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp3 位於乳突，其中單關節（耳後肌）和雙關節（胸鎖乳突肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 3位於嚼肌筋膜上，單關節（嚼肌）和雙關節（笑肌）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070549-re-cp3-location.jpeg\" alt=\"re-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E顳顎韌帶的牽拉來自往頭側的嚼肌和往尾側的胸鎖乳突肌 （la-cp 3, la-cl）。\u003C/li\u003E\u003Cli\u003E頸筋膜的牽拉來自往頭側的耳肌和往尾側的頸夾肌以及胸鎖乳突肌（er-cp 3, er-cl) •\u003C/li\u003E\u003Cli\u003E牽拉來自往頭側的枕肌以及往尾側的豎脊肌 (re-cp 3 和 re-cl) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060502-la-cp3-location.jpeg\" alt=\"la-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E頭部在下領骨和口咽水平的橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cp 3 的CC 位於咬肌（masseter） 的肌腹上，其筋膜通過共同的懸帶與內側翼肌的筋膜相連。\u003C/li\u003E\u003Cli\u003Eer-cp 3的CC 位於枕骨上的胸鎖乳突肌和頭夾肌 （splenius capitis muscles） 的附著處。\u003C/li\u003E\u003Cli\u003Ere-cp 3的CC 位於斜方肌和頭半棘肌（semispinalis capitis） 的枕骨嵌入處，位於頭夾肌的深處。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060548-er-cp3-location.jpeg\" alt=\"er-cp3-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ela-cp 3協調中心（CC）的觸診驗證。\u003Cbr /\u003E協調中心的觸診驗證直接於嚼肌的肌腹上，和 la-cp 2在同一條直線上（紅色虛線）（針灸穴位 ST 6）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060557-la-cp3-pave.jpeg\" alt=\"la-cp3-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp 3協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E站在頭後方或一側，施加壓力於腮腺咬肌筋膜，位於嚼肌的中心，建議使用中等壓力（3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060508-la-cp3-treatment.jpeg\" alt=\"la-cp3-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，头转向对侧。治疗师用指间关节作用于咬肌中心部位，为了准确定位该点，在操作时要求患者咬牙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120538-la-cp3-o-treatment.jpeg\" alt=\"la-cp3-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CP3 障礙",
    "answer": "\u003Cp\u003Ela-cp 3肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E疼痛位在顳顎關節，特別是咀嚼的時候。\u003Cbr /\u003E其他症狀如顳顎關節的異常聲音、半月板的位移以及三叉神經痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060547-la-cp3-cp.jpeg\" alt=\"la-cp3-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp 3 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E當患者張開嘴巴的時候，下頷骨偏移至一側，通常打開也十分受限。患者可能感受到臉部腫脹感，以及唾液分泌的困擾。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060551-la-cp3-pamo.jpeg\" alt=\"la-cp3-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP；\u003Cbr /\u003E咔哒声和啪啪声是常见迹象，可能引发下颌关节活动受限、疼痛和咀嚼困难。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E咬肌是颞下颌关节的主要运动肌，因此一旦该处的肌筋膜发生变化就会产生不协调现象。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120527-la-cp3-o-cp.jpeg\" alt=\"la-cp3-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者张口，观察有无口角向一侧偏移，或者测量一下上下牙齿之间的距离。患者也可用自己的2~3个指自行测量。推荐在治疗前后均进行该测量。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120531-la-cp3-o-move.jpeg\" alt=\"la-cp3-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-СР3 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E枕骨粗隆下，項韌帶起點\u003C/li\u003E\u003Cli\u003EGV16，風府穴\u003C/li\u003E\u003Cli\u003E上項線\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080401-Me-cp3.jpeg\" alt=\"Me-cp3\" /\u003E\u003C/p\u003E\u003Cp\u003E下領節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 3的CC位於下領骨的一側，單關節（翼肌 pterygoid）及雙關節（莖舌骨肌stylohyoid） 的向量會合點。\u003C/li\u003E\u003Cli\u003Eme-cp 3的CC 位於中央縫 central raphe 上，單關節（頦舌骨肌 mylohyoid）和雙關節（二腹肌 digastric） 的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 3的CC位於下領骨下方，單關節（頦舌骨肌 mylohyoid）和雙關節（二腹肌 digastric） 的向量會合點・頸筋膜連接這些。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070526-an-cp3-location.jpeg\" alt=\"an-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頸部白線牽拉下頷舌骨肌的正中纖維縫和胸骨上切跡中心 （me-cp 3, me-cl）。\u003C/li\u003E\u003Cli\u003E尾側方向的牽引力由胸鎖乳突肌（此處未圖示）和由二腹肌往頭端方向牽引（an-cl和 аn-ср 3) •\u003C/li\u003E\u003Cli\u003E莖突舌骨肌的牽引力往頭側方向和由肩胛舌骨肌往尾側方向 （ir-cp 3 和 ir-cl）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060531-me-cp3-location.jpeg\" alt=\"me-cp3-location\" /\u003E\u003C/p\u003E\u003Ch4\u003E下領骨和口咽水平的顱骨橫截\u003Cbr /\u003E- an-cp 3的CC 位於下領骨下方，下領舌骨肌（mylohyoid）和二腹肌 （digastricmuscles） 的筋膜上。\u003Cbr /\u003E- ir-cp 3的CC 位於下頜骨的後緣，咬肌筋膜在此處與翼內側筋膜相連。\u003Cbr /\u003E- me-cp 3 的CC 位於下領舌骨肌的中縫。me-cp 3後側的 CC 位於頸部頂韌帶（nuchal ligament）附著於枕骨哭突（occipitalprotuberance）下方。\u003C/h4\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060549-ir-cp3-location.jpeg\" alt=\"ir-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cp 3 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證沿著從下巴延伸到舌骨的線進行，或者更準確地說，在下頷舌骨中縫（Ren 或 針灸穴位 CV 23）上進行。這個穴位的治療作用於舌頭的僵硬。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070506-me-cp3-pave-treatment.jpeg\" alt=\"me-cp3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧位，治疗师用示指和中指的指尖从下巴中点的下方触至舌骨上区；有时，一些肌肉纤维的痉挛可导致内向被牵拉至一侧。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100535-me-cp2-o-treatment.jpeg\" alt=\"me-cp2-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-СР3 障礙",
    "answer": "\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E舌与唇相关肌肉的不协调运动可引起构音障碍与吞咽障碍\u003Cbr /\u003E功能障碍起源或协调中心 CC：\u003Cbr /\u003E舌包含了三层肌肉和与之连接的筋膜，都与下颌舌骨肌缝相延续，此点较易触诊到。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100525-me-cp2-o-cp.jpeg\" alt=\"me-cp2-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E要求患者伸舌，并从右侧移动到左侧，观察两侧偏差。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100530-me-cp2-o-move.jpeg\" alt=\"me-cp2-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-СР3r 位置",
    "answer": "\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E項韌帶 （nuchal ligament） 是頸椎的棘上韌帶；它上面連接到正中頸線，下面連接到第七頸椎 （me-cp 3r，me-cl r）的棘突。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070518-me-cp3r-location.jpeg\" alt=\"me-cp3r-location\" /\u003E\u003C/p\u003E\u003Cp\u003E下領骨和口咽水平的顱骨橫截\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cp 3的CC 位於下領骨下方，下領舌骨肌（mylohyoid）和二腹肌 （digastricmuscles） 的筋膜上。\u003C/li\u003E\u003Cli\u003Eir-cp 3的CC 位於下頜骨的後緣，咬肌筋膜在此處與翼內側筋膜相連。\u003C/li\u003E\u003Cli\u003Eme-cp 3 的CC 位於下領舌骨肌的中縫。me-cp 3後側的 CC 位於頸部頂韌帶（nuchal ligament）附著於枕骨哭突（occipitalprotuberance）下方。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060549-ir-cp3-location.jpeg\" alt=\"ir-cp3-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eme-cp 3r 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證沿枕骨突起下方的中線進行，在髮際線（針灸穴位 GV 16）的水平。結合 la-cl 和 la-sc 治療該穴位對平衡障礙有用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070527-me-cp3r-pave-treatment.jpeg\" alt=\"me-cp3r-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者前额伏于手臂上，治疗师触诊枕骨粗隆下、项韧带附着处。CC 位于两侧竖脊肌之间的凹陷处。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100505-me-cp3-o-treatment.jpeg\" alt=\"me-cp3-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-СР3r 障礙",
    "answer": "\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E头痛，眩晕，不稳定感，颈部僵硬\u003Cbr /\u003E功能障碍的起源或协调中心 CC：\u003Cbr /\u003E一方面，小脑依赖紧张性颈反射来维持平衡；项韧带将颈部肌肉分成左右两侧，协调两侧的张力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100554-me-cp3-o-cp.jpeg\" alt=\"me-cp3-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E要证明两侧的不平衡状况，运动测试并不是必需的；例如，在冠状面上，颈部偏离中立位可表明胸锁乳突肌一侧纤维化，并常伴随项韧带的改变。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100559-me-cp3-o-move.jpeg\" alt=\"me-cp3-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CL 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸鎖乳突肌胸骨束與鎖骨束匯合處，平甲狀軟骨水平\u003C/li\u003E\u003Cli\u003ELI18，扶突穴\u003C/li\u003E\u003Cli\u003E斜角肌外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頸部的外向運動（頸側屈）由單關節肌（中斜角肌）和雙關節肌（胸鎖乳突肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在胸鎖乳突肌的外側，與甲狀軟骨水平。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080408-La-cl.jpeg\" alt=\"La-cl\" /\u003E\u003C/p\u003E\u003Cp\u003E在後側頸節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cl 位於胸鎖乳突肌筋膜上，單關節（中斜角肌）和雙關節（胸鎖乳突肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cl 位於第3 頸椎的橫突上，單關節（頸夾肌）和雙關節（提肩胛肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ere-cl 位於第 6 頸椎水平高度，單關節（多裂肌）和雙關節（最長肌）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100532-re-cl-location.jpeg\" alt=\"re-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E深筋膜的牽拉來自於往頭側的頭半棘肌，以及往尾側的胸半棘肌 （re-cl, re-th）。\u003C/li\u003E\u003Cli\u003E中層深筋膜的牽拉來自往頭側的頭夾肌，以及往尾側的頸夾肌和後鋸肌（er-cl, er-th) •\u003C/li\u003E\u003Cli\u003E外側筋膜的牽拉來自於往頭側的頭後大直和小直肌，以及往尾側的胸髂肋肌（la-cl，la-th) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010523-la-cl-location.jpeg\" alt=\"la-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在第5 頸椎水平向上看的頸部橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cl 的CC 位於胸鎖乳突肌腹的中心，在甲狀軟骨水平。\u003C/li\u003E\u003Cli\u003Eer-cl 的CC 與提肩胛肌有關，其筋膜與後斜角肌的筋膜一起向前延伸。\u003C/li\u003E\u003Cli\u003Ere-cl 的CC位於頸夾肌（splenius cervicis）、頭夾肌 （splenius capitis） 和頭半棘肌 （semispinalis capitis） 上，可在斜方肌和提肩胛肌之間的溝中觸診到。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070507-er-cl-location.jpeg\" alt=\"er-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cl 協調中心（CC）的觸診験證。\u003Cbr /\u003E此協調中心的觸診驗證在胸鎖乳突肌的兩頭之間，與甲狀軟骨為同一高度（紅色虛線）（針灸穴位 IC 18）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010518-la-cl-pave.jpeg\" alt=\"la-cl-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cl 協調中心（CC）的治療。\u003Cbr /\u003E患者仰躺，頭微微往對側轉。將指關節放置在胸鎖乳突肌的鎖骨以及胸骨肌腹上，像是手上抓著鑿刀施加摩擦在緻密點上。\u003Cbr /\u003E因為這裡有供應大腦的血管，經過胸鎖乳突肌下，此處僅可使用中等壓力治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010531-la-cl-treatment.jpeg\" alt=\"la-cl-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，头转向对侧。治疗师用指间关节作用于胸锁乳突肌外侧缘上与甲状软骨平齐处，横向治疗肌筋膜纤维。该点可牵涉疼痛至头部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120516-la-cl-o-treatment.jpeg\" alt=\"la-cl-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CL 障礙",
    "answer": "\u003Cp\u003Ela-cl 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E有時疼痛位於臉部，或者在耳後、脖子痛 （頸椎疼痛）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010509-la-cl-cp.jpeg\" alt=\"la-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cl 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E此筋膜單元的張力代償阻礙了脖子的向外屈曲。由於這個動作較不常自主執行，患者通常只有感覺脖子或頭部疼痛，同時可能有吞嚥功能的困難。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010514-la-cl-pamo.jpeg\" alt=\"la-cl-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E头痛，偏头痛，眼睛沉重感，太阳穴跳痛感，大量流泪。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E尽管有许多原因可以导致上述症状，但是肌张力（异常）是常见的诱因。\u003Cbr /\u003E如果手法操作可以缓解肌紧张，解决该症状，那么就可以避免其他更多更费钱的检查。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120506-la-cl-o-cp.jpeg\" alt=\"la-cl-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者侧屈颈部，以观察是否有代偿性运动。治疗师也可通过被动牵拉患者颈部来测试肌筋膜的弹性，评估颈部活动范围以及疼痛防御策略。\u003Cbr /\u003E主动和被动测试均推荐应用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120511-la-cl-o-move.jpeg\" alt=\"la-cl-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CL 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸骨上切跡\u003C/li\u003E\u003Cli\u003ECV22，天突穴\u003C/li\u003E\u003Cli\u003E胸骨肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頸部的內向運動（將頸與重力線對齊）在前面由頸白線或頸前筋膜中縫調節。這條線的cc 點位於胸骨上切跡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080414-Me-cl.jpeg\" alt=\"Me-cl\" /\u003E\u003C/p\u003E\u003Cp\u003E頸部節段前側協調中心的比較性動作驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cl 的CC 位於甲狀腺軟骨的一側，在此單關節（舌下肌）及雙關節向量（胸鎖乳突肌）匯聚。\u003C/li\u003E\u003Cli\u003Eir-cl 的CC位於鎖骨上方，在此單關節（肩胛舌骨肌）及雙關節向量（胸鎖乳突肌的鎖骨頭）匯聚。\u003C/li\u003E\u003Cli\u003Eme-cl 的CC 位於胸骨窩，由胸鎖乳突肌的胸骨部形成的向量匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080537-an-cl-location.jpeg\" alt=\"an-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩舌骨肌 （omohyoid）對中頸椎板施加向上牽引，肋間筋膜（ir-cl，ir-th） 向下牽引。\u003C/li\u003E\u003Cli\u003E由胸骨上帶（me-cl, me-th） 連接的頸椎和腰椎白線之間的張力。\u003C/li\u003E\u003Cli\u003E胸骨旁筋膜的張力由胸鎖乳突肌在頭側牽引，尾側則源自腹直肌 （an-cl，an-th）的起點。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120541-me-cl-a-location.jpeg\" alt=\"me-cl-a-location\" /\u003E\u003C/p\u003E\u003Cp\u003E頸部的橫截面圖，在第5節頸椎的水平，從上方往下看。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cl 的 CC 位於胸鎖乳突肌的鎖骨端和胸骨端之間，對應於舌骨的中間肌腱。\u003C/li\u003E\u003Cli\u003Ean-cl 的CC 位於胸鎖乳突肌的前緣，在甲狀軟骨水平高度\u003C/li\u003E\u003Cli\u003Eme-cl 前側的 CC 位於胸骨窩。me-cl 後側的 CC 位於頸部韌帶附著於第 7頸椎的位置。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060520-Ir-cl-location.jpeg\" alt=\"Ir-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cl 協調中心（CC）的觸診驗證和治療。\u003Cbr /\u003E患者仰臥。此 CC 的觸診驗證和治療是相同的。\u003Cbr /\u003E這些韌帶結構非常小：因此，用指尖來滑動它們就足夠了。該點位於胸骨上切跡（針灸穴位 CV 22）的中心。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120553-me-cl-a-pave-treatment.jpeg\" alt=\"me-cl-a-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E前部的治疗\u003Cbr /\u003E内-颈的治疗：\u003Cbr /\u003E病人仰卧位，治疗师用指尖在胸骨上切迹触诊并治疗胸锁乳突肌胸骨端的肌筋膜问题。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100516-me-cp-o-treatment-a.jpeg\" alt=\"me-cp-o-treatment-a\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CL 障礙",
    "answer": "\u003Cp\u003E前部与后部的疼痛部位\u003Cbr /\u003E内-颈的疼痛部位：\u003Cbr /\u003E触诊胸骨上切迹处是否有结节感。\u003Cbr /\u003E内-颈-背侧的疼痛部位：\u003Cbr /\u003E颈6-7 棘上韧带有灼烧感。\u003Cbr /\u003E注：由于躯干部位内向运动筋膜没有相关运动测试，第二和第三张照片显示了相关位点的治疗手段。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100511-me-cp-o-cp.jpeg\" alt=\"me-cp-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CLr 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E頸段棘上韌帶全部觸診，找到致密點\u003C/li\u003E\u003Cli\u003EGV14，大椎穴\u003C/li\u003E\u003Cli\u003E頸7棘間韌帶\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E領部的內向運動在後面由項韌帶調節。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在此韌帶上，因為該韌帶有感知頸部空間位置的作用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080419-Me-cl-r.jpeg\" alt=\"Me-cl-r\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cp\u003E棘上韌帶是項韌帶在胸部的延續，它們也是與棘突間的連續性韌帶；它們一起提供垂直感知和軀幹的定位 （me-cl, me-th）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120505-me-cl-r-location.jpeg\" alt=\"me-cl-r-location\" /\u003E\u003C/p\u003E\u003Cp\u003E頸部的橫截面圖，在第5節頸椎的水平，從上方往下看。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cl 的 CC 位於胸鎖乳突肌的鎖骨端和胸骨端之間，對應於舌骨的中間肌腱。\u003C/li\u003E\u003Cli\u003Ean-cl 的CC 位於胸鎖乳突肌的前緣，在甲狀軟骨水平高度\u003C/li\u003E\u003Cli\u003Eme-cl 前側的 CC 位於胸骨窩。me-cl 後側的 CC 位於頸部韌帶附著於第 7頸椎的位置。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060520-Ir-cl-location.jpeg\" alt=\"Ir-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme- cl r 協調中心 （CC）的觸診驗證和治療。\u003Cbr /\u003E患者坐著，額頭放在手上。在頸韌帶嵌入第七頸椎和第一胸椎（針灸穴位 GV 14）的水平方向上橫向操作棘上韌帶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120515-me-cl-r-pave-treatment.jpeg\" alt=\"me-cl-r-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E后部治疗\u003Cbr /\u003E内-颈-背侧的治疗：\u003Cbr /\u003E患者坐位并将头放置于双手上，治疗师针对第7颈椎上下的棘上韧带进行手法治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100523-me-cp-o-treatment-p.jpeg\" alt=\"me-cp-o-treatment-p\" /\u003E\u003C/p\u003E"

    "question": "ME-CLr 障礙",
    "answer": "\u003Cp\u003E前部与后部的疼痛部位\u003Cbr /\u003E内-颈的疼痛部位：\u003Cbr /\u003E触诊胸骨上切迹处是否有结节感。\u003Cbr /\u003E内-颈-背侧的疼痛部位：\u003Cbr /\u003E颈6-7 棘上韧带有灼烧感。\u003Cbr /\u003E注：由于躯干部位内向运动筋膜没有相关运动测试，第二和第三张照片显示了相关位点的治疗手段。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100511-me-cp-o-cp.jpeg\" alt=\"me-cp-o-cp\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-TA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E跟腱和趾屈肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI7，覆溜穴\u003C/li\u003E\u003Cli\u003EKI3，太溪穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E踝關節後內側疼痛，足跟疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-踝cf點位於腓骨長短肌肌腱上。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的外丘和懸鐘穴（GB 36 和39）。該點的致密化可以導致脛距關節的僵化，Maigne 法建議用快速牽引（swift traction） 手法來緩解。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090403-Re-me-ta.jpeg\" alt=\"Re-me-ta\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-ta 1 CF 位於跟腱和腓骨邊界之間\u003C/li\u003E\u003Cli\u003Ere-la-ta 2 CF 位於外踝近端，腓骨後方。\u003C/li\u003E\u003Cli\u003Ere-me-ta 1 CF 位於跟腱和屈趾肌之間的溝中\u003C/li\u003E\u003Cli\u003Ere-me-ta 2 CF 位於與上述相同的溝中，但稍遠一些。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010548-re-me-ta-location.jpeg\" alt=\"re-me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cp\u003E腿部下三分之一在踝骨上方的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-ta CF 位於覆蓋屈肌肌腱的支持帶上\u003C/li\u003E\u003Cli\u003Ere-la-ta CF 位於覆蓋兩塊腓骨肌的支持帶上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120558-re-la-ta-location.jpeg\" alt=\"re-la-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 1融合中心 （CF）的觸診\u003Cbr /\u003E患者側臥。治療師沿著脛骨和跟腱之間的溝進行觸診驗證。一旦確定緻密點，就可以使用肘部對其進行操作（針灸穴位 KI7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010535-re-me-ta1-pave-treatment.jpeg\" alt=\"re-me-ta1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 2融合中心 （CF）的觸診\u003Cbr /\u003E患者側臥。治療師用食指的指關節尋找 re-me-ta 2 CF 的緻密化，它與前一個（針灸穴位 KI 8） 位於同一溝中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010556-re-me-ta2-pave-treatment.jpeg\" alt=\"re-me-ta2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）跟腱与趾屈肌之间凹陷中；\u003Cbr /\u003E2）上述凹陷的远端。\u003Cbr /\u003E有痛感的运动：患者感觉踝关节内部失稳（外翻试验，用于检查三角骨或内侧韧带的正确位置）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090550-re-me-ta-o-pave.jpeg\" alt=\"re-me-ta-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，治疗师用指关节按压，使力渗透于跟腱前方的缝隙中，使粘连或纤维化的点可以活动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090559-re-me-ta-o-treatment.jpeg\" alt=\"re-me-ta-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-TA 障礙",
    "answer": "\u003Cp\u003Ere-me-ta 融合中心 （CF）的功能障礙\u003Cbr /\u003E下肢緊張和無力。腳踝運動不協調。跟骨骨膜過度敏感反應，通常與跟腱附著點病變有關。反覆踝關節扭傷後屈肌支持帶纖維化導致踝關節不穩。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010524-re-me-ta-cp.jpeg\" alt=\"re-me-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 融合中心 （CF）被動性動作驗證。\u003Cbr /\u003E與 re-me-pe CF 動作驗證相同。根據哪種 CF 引起的功能障礙有關，患者會在小腿或足部感受到更大的張力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010528-re-me-ta-move-p.jpeg\" alt=\"re-me-ta-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E足部运动不协调，足跟内侧疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E足部向后运动需要小腿三头肌（后-踝）和趾屈肌（内-足，内-踝）同步运动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090546-re-me-ta-o-cp.jpeg\" alt=\"re-me-ta-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-PE 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E內踝和跟腱之間\u003C/li\u003E\u003Cli\u003E跟骨上韌帶附著點內側\u003C/li\u003E\u003Cli\u003E跟骨頂下方口\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI4，大鐘穴\u003C/li\u003E\u003Cli\u003EKI5，水泉穴\u003C/li\u003E\u003Cli\u003EKI6，照海穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E足底筋膜炎，足跟痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內-足cf點位於內踝與跟腱之間，它由3個點組成：第一個在屈肌支持帶的上緣，第二個在跟腱附著點的內側，而第三個在支持帶的下緣，正對內踝的下方。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的大鐘、水泉和照海穴（KI4、5和6，經脈的絡穴），從這里開始，一條縱向的絡脈和一條橫向的絡脈分別去到膀胱經）。Cyriax 法在此定位了3個治療脛骨後肌鞘的部位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090407-Re-me-pe.jpeg\" alt=\"Re-me-pe\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 1、2和3CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pe CF 從近 - 遠端方向牽引\u003C/li\u003E\u003Cli\u003Ere-me-pe 1 CF 位於屈肌支持帶上束\u003C/li\u003E\u003Cli\u003Ere-me-pe 3 CF 位於屈肌支持帶下束\u003C/li\u003E\u003Cli\u003Ere-me-pe 2 CF 位於屈肌支持帶的中間束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-me-pe-location.jpeg\" alt=\"re-me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 2 解剖位置。\u003Cbr /\u003Ere-me-pe 2 CF 位於跟骨粗隆的内側表面，\u003Cbr /\u003E屈肌支持帶中間束的附著點。在某種程度上，這一層與伸肌的支持帶相連。\u003Cbr /\u003E屈肌支持帶分為兩層：一層與小腿深筋膜和腓骨支持帶相連；另一層與小腿筋膜的淺層相連，後者在後面環繞小腿三頭肌肌腱，在前面以環形方式與屈肌支持帶相連。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E屈肌支持帶覆蓋三角韌帶和跗骨隧道\u003C/li\u003E\u003Cli\u003E屈肌的淺層支持帶嵌入拇外展肌：這深層可嵌入足底方肌。\u003C/li\u003E\u003Cli\u003E足距的屈肌支持帶包含在肌筋膜内，與筋膜一樣，它由兩個薄層組成，一個淺的和一個深的。這些層板與形成腓骨支持帶的兩個層板相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010534-re-me-pe-location2.jpeg\" alt=\"re-me-pe-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E足部在距骨、舟狀骨和骰骨的水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-pe CF 位於腓骨短肌和長肌腱之間\u003C/li\u003E\u003Cli\u003Ere-me-pe CF 位於脛後肌和外展拇肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120536-re-la-pe-location.jpeg\" alt=\"re-la-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 3 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pe 3 CF 位於屈肌（或繖狀）支持帶的下束\u003C/li\u003E\u003Cli\u003Ere-me-pe 1 CF 位於屈肌支持帶上束\u003C/li\u003E\u003Cli\u003Ere-me-pe 2 CF 位於支持帶的中間束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010552-re-me-pe-location3.jpeg\" alt=\"re-me-pe-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 1融合中心（CF）的治療。\u003Cbr /\u003E患者俯臥或側臥。為了找出緻密點，治療師使用指關節在內踝後緣和跟腱前緣之間，在高於跟骨的位置將其找出（針灸穴位KI 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010522-re-me-pe1-pave-treatment.jpeg\" alt=\"re-me-pe1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或側臥。治療師使用指關節，尋找跟骨內側表面上的緻密點。一旦確定緻密點就會將其鬆動，直到感覺到緻密化被解決（針灸穴位 KI 4-5）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010539-re-me-pe1-pave-treatment.jpeg\" alt=\"re-me-pe1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或側臥。治療師用指關節找出內踝髁以下的支持帶的任何變化。一旦確定緻密化之處，其就會被輕輕地鬆動（針灸穴位KI 6)\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010500-re-me-pe3-pave-treatment.jpeg\" alt=\"re-me-pe3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）内踝与小腿三头肌肌腱之间；\u003Cbr /\u003E2）跟结节上小腿三头肌腱止点内侧；\u003Cbr /\u003E3）内踝尖正下方。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090537-re-me-pe-o-pave.jpeg\" alt=\"re-me-pe-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，足外侧贴于床面，治疗师用指关节在跟腱内侧韧带触压，寻找细小结节点，这样治疗范围可从前述三点缩小至一点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090542-re-me-pe-o-treatment.jpeg\" alt=\"re-me-pe-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-PE 障礙",
    "answer": "\u003Cp\u003Ere-me-pe 融合中心（CF）的功能障礙。\u003Cbr /\u003E複雜性局部疼痛症候群（CRPS）或反射性交感神經營養不良或痛覺神經營養不良症候群或灼痛或 Sudeck 氏症候群等。脛跗關節功能障礙、足痛和跟骨或足底痛，常歸因於足底筋膜炎、跗骨隧道、足跟骨刺等。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010554-re-me-pe-cp.jpeg\" alt=\"re-me-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe CF 被動動作驗證。\u003Cbr /\u003E患者仰臥。向外和向上伸展患者的前足，以拉緊屈肌支持帶。這種支持帶也被戲稱為繖狀「韌帶」（laciniate &#39;igament&#39;），不應與三角韌帶混淆。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010559-re-me-pe-move-p.jpeg\" alt=\"re-me-pe-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 融合中心 （CF）主動動作驗證。\u003Cbr /\u003E患者仰臥。治療師從上述 re-me-pe CF 的最大伸展位置，治療師要求患者向內和向下移動他們的腳以活化屈肌，其肌腱在屈肌支持帶下方通過。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-pe-move-a.jpeg\" alt=\"re-me-pe-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E足底筋膜炎，跟骨骨刺，肌腱炎。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E跖腱膜与跟腱相连续，所以小腿三头肌张力过大可引起足底软组织发炎。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090533-re-me-pe-o-cp.jpeg\" alt=\"re-me-pe-o-cp\" /\u003E\u003C/p\u003E"
  },

    "question": "RE-ME-SC 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛骨內側緣，小菱形肌肌腱上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI13，曲垣穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩臂疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內一肩cf點位於小菱形肌（後）的肩胛骨附著處，同時斜方肌的水平纖維也附著於此，該纖維引發肩胛骨內向運動。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090415-Re-me-sc.jpeg\" alt=\"Re-me-sc\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-sc 1, 2 和 re-la-sc 1,2CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-sc 1 CF 位於斜方肌的前緣，沿著乳頭線。\u003C/li\u003E\u003Cli\u003Ere-la-sc 2 CF 位於肩鎖關節上方\u003C/li\u003E\u003Cli\u003Ere-me-sc 1 CF位於棘上窩内側\u003C/li\u003E\u003Cli\u003Ere-me-sc 2 CF 位於棘上窩中央\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010532-re-me-sc-location.jpeg\" alt=\"re-me-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-sc 1 and 2 CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E第二胸椎水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-sc CF 位於棘上窩内側緣\u003C/li\u003E\u003Cli\u003Ere-la-sc 2 CF 位於肩鎖韌帶上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120541-re-la-sc-location.jpeg\" alt=\"re-la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere- me-sc 1融合中心（CF）治療。\u003Cbr /\u003E患者坐著，頭靠在手上。治療師使用指關節或肘部來移動棘上窩的內側緣，在棘上肌的筋膜與小菱形肌的筋膜連接處（針灸穴位 SI 13) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010521-re-me-sc1-treatment.jpeg\" alt=\"re-me-sc1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-sc 2融合中心（CF）治療。\u003Cbr /\u003E患者坐姿。治療師使用食指指關節或肘部來操作 reme-sc 2 CF。該點位於棘上窩（針灸穴位 SI 12）的中心。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010538-re-me-sc2-treatment.jpeg\" alt=\"re-me-sc2-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）因多个点位可引起肩和（或）颈部疼痛，所以肩痛出现时，单凭触诊检查也可确定所需治疗点位。\u003Cbr /\u003E有痛感的运动：患者主诉，头转向患侧时的颈椎后伸，可诱发疼痛向下扩散至同侧手臂［椎间孔挤压试验（Spurling），用于评估颈椎神经根］。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080547-re-me-sc-o-pave.jpeg\" alt=\"re-me-sc-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者坐位，治疗师用肘尖或指间关节顶在肩胛骨上角和内侧缘，并依据患者感觉，探查引起肩部或头和（或）颈牵涉痛的点位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080553-re-me-sc-o-treatment.jpeg\" alt=\"re-me-sc-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ere-me-sc 融合中心 （CF）的功能障礙。\u003Cbr /\u003E疲倦、針刺和上肢力量喪失。這些症狀通常被定義為「頸臂痛」。患者告知每當他們將頸部朝向同一側伸展和旋轉時，症狀會加重。Spurling 神經根疼痛的試驗可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010508-re-me-sc-cp.jpeg\" alt=\"re-me-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-sc 触合中心 （CF） 動作驗證。\u003Cbr /\u003E治療師要求患者向上和向後移動伸展的手臂。如果 re-me-sc CF 僅在一側緻密，那麼這動作會在肩胛骨的上部內側或整個肩部區域引起受限或疼痛的感覺。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010512-re-me-sc-move.jpeg\" alt=\"re-me-sc-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E肩痛扩展至上肢（颈臂神经痛）\u003Cbr /\u003E功能的障碍的起源或 CF：\u003Cbr /\u003E功能障碍的起源或 CF：小菱形肌（后-肩）和起于冈下窝内侧的前锯肌上部（内-肩）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080543-re-me-sc-o-cp.jpeg\" alt=\"re-me-sc-o-cp\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-HU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛岡下\u003C/li\u003E\u003Cli\u003E岡下肌凹陷上緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI11，天宗穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩臂疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後一內-肱cf點位於腋後部，肱骨伸肌、內收肌及旋轉肌的矢量力匯聚於此。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090421-Re-me-hu.jpeg\" alt=\"Re-me-hu\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 和 re-la-hu CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-hu CF 位於三角肌後肌腱上，後向、外向和外旋動作匯聚在此筋膜。\u003C/li\u003E\u003Cli\u003Ere-me-hu CF位於腋窩上方，朝向肱三頭肌的長頭。\u003C/li\u003E\u003Cli\u003E來目 re-me-cu 和 re-me-ca CF 的遠近側牽引力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010554-re-me-hu-location.jpeg\" alt=\"re-me-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-hu CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E穿過肱骨頭的斜截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-hu CF 位於三角肌遠端肌腱的後方\u003C/li\u003E\u003Cli\u003Ere-me-hu CF 位於三頭肌長頭肌腱、三角肌和大圓肌之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010510-re-la-hu-location.jpeg\" alt=\"re-la-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥，手臂外展。治療師用食指的指關節尋找緻密化，然後用肘部治療肱三頭肌長頭、大圓肌和三角肌後束的肌腱纖維（針灸穴位 SI9、10）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010500-re-me-hu-pave-treatment.jpeg\" alt=\"re-me-hu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）肩胛冈以下，冈下窝上部。\u003Cbr /\u003E有痛感的运动：患者主诉后伸时疼痛，例如手摸裤子后兜或者是系文胸\u003Cbr /\u003E时（手臂后举检查（lift-off test），用于评估肩胛下肌功能）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080505-re-me-hu-o-pave.jpeg\" alt=\"re-me-hu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，治疗师像用橡皮擦一样，用指间关节前后松解冈下肌肌筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080510-re-me-hu-o-treatment.jpeg\" alt=\"re-me-hu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-HU 障礙",
    "answer": "\u003Cp\u003Ere-me-hu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E孟肱關節疼痛。患者告知難以將手移到褲子後的口袋或伸手到後面扣緊胸罩。評估肩胛下肌病變的 Lift-off 測試可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010537-re-me-hu-cp.jpeg\" alt=\"re-me-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E治療師將患者的手臂抬高至末端範圍，以拉緊與胸大肌、大圓肌（内旋動作）、三角肌與肩胛骨（内向動作）相連的後側腋窩筋膜和肱三頭肌長頭（後向動作）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010542-re-me-hu-move-p.jpeg\" alt=\"re-me-hu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 融合中心 （CF）主動動作驗證。\u003Cbr /\u003E患者站姿。治療師要求患者將手放在背後，觀察活動是否受到限制。伸向背部時，患側手比健側手的活動度低。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010547-re-me-hu-move-a.jpeg\" alt=\"re-me-hu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E手后伸及内收时（手置于背后）肩周炎症状加重\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E冈下肌肌筋膜连接着背阔肌、大圆肌和其他参与肱骨内收及向后运动的肌肉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080500-re-me-hu-o-cp.jpeg\" alt=\"re-me-hu-o-cp\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-CU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E尺神經溝近端抵於肱三頭肌肌腱；\u003C/li\u003E\u003Cli\u003E內側課和鷹嘴之間的凹陷\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ETE11，清冷淵穴\u003C/li\u003E\u003Cli\u003ESI8，小海穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E尺神經綜合征，內側森、手腕、小指感覺異常\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內-肘cf點位於肱三頭肌肌腱的內側，在內上髁和鷹嘴之間。在這里，它控制附著於內側肌間隔的內收肌，以及肱三頭肌的伸展部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090427-Re-me-cu.jpeg\" alt=\"Re-me-cu\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cu CF 位於尺側伸腕肌和伸指肌之間的溝中，緊靠肘肌的遠端。\u003C/li\u003E\u003Cli\u003E來自 re-la-di 和 re-la-ca 的 CF 的遠近端牽引力\u003C/li\u003E\u003Cli\u003Ere-me-cu CF 位於鷹嘴和内上髁之間的尺骨溝中\u003C/li\u003E\u003Cli\u003E遠近側牽引力來自re-me-ca CF\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010503-re-me-cu-location.jpeg\" alt=\"re-me-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cu CF 解剖位置和横截面線\u003C/p\u003E\u003Cp\u003E肘部在鷹嘴水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cu CF 位於鷹嘴和内側上髁之間，尺神經鞘上。\u003C/li\u003E\u003Cli\u003Ere-la-cu CF 位於肘肌下方，伸指肌方向。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010513-re-la-cu-location.jpeg\" alt=\"re-la-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥，上肢微外展內旋，掌心朝上。治療師透過觸診驗證確定緻密點後，使用食指的指關節沿鷹嘴突和内上髁之間的溝操作尺神經鞘（針灸穴位 SI 8）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-cu-pave-treatment.jpeg\" alt=\"re-me-cu-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1）纤维化可发生在尺神经沟近端，近内侧肱三头肌肌腱；\u003Cbr /\u003E2） 有时纤维化也发生在肱骨内上髁和鹰嘴之间的尺神经沟内。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080536-re-me-cu-o-pave.jpeg\" alt=\"re-me-cu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，治疗师触诊肘关节后内区域，尤其是尺骨鹰嘴和内上髁之间区域。必须注意，松解筋膜结构时要避免刺激到神经。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080542-re-me-cu-o-treatment.jpeg\" alt=\"re-me-cu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-CU 障礙",
    "answer": "\u003Cp\u003Ere-me-cu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E手臂運動受損，前臂尺側感覺異常。上肢震顫、痙攣和抽搐。內側上髁疼痛。由於内側肌間隔過度牽拉，造成尺神經半脫位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010543-re-me-cu-cp.jpeg\" alt=\"re-me-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E為了拉伸內側肘筋膜或後內向對角線，透過將患者的手腕向同側肩部移動來進行被動動作驗證。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010550-re-me-cu-move-p.jpeg\" alt=\"re-me-cu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E主動動作驗證是伸肘進行。患者被要求逆著治療師施力方向在內側移動時向内旋轉他們的手。如果測試是雙側同時進行的，則還可評估兩個肢體之間的力量差異。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010557-re-me-cu-move-a.jpeg\" alt=\"re-me-cu-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E内上髁炎，腕及手指尺侧感觉异常。\u003Cbr /\u003E功能的障碍的起源或 CF：\u003Cbr /\u003E功能障碍的起源或 CF：可能是尺神经半脱位，或由内侧间隔紧张引起，或由上髁后尺神经沟内不规则纤维化引起。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080532-re-me-cu-o-cp.jpeg\" alt=\"re-me-cu-o-cp\" /\u003E\u003C/p\u003E"
  },

ges/20260520010543-re-me-ca2-pave-treatment.jpeg\" alt=\"re-me-ca2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊检查\u003Cbr /\u003E1） 1指的是位于伸肌腱上的后-内-腕 CF的近端子单元；\u003Cbr /\u003E2） 2指的是位于腕尺侧伸肌腱的内侧的远端子单元。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080505-re-me-ca-o-pave.jpeg\" alt=\"re-me-ca-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，治疗师在松解后-内-腕的同时，交替操作后-腕及内-腕的 CC\u003Cbr /\u003E点，两个 CC位于肌腹上，CF 位于支持带和肌腱上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527080511-re-me-ca-o-treatment.jpeg\" alt=\"re-me-ca-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "來自肺部的轉移痛治療",
    "answer": "\u003Cul\u003E\u003Cli\u003E資料：患者主訴斜方肌和胸部的一側或兩側疼痛。\u003C/li\u003E\u003Cli\u003E假說：如果哮喘、咳嗽或先前的肺炎、胸膜炎等與這種疼痛有關，那麼治療師可能會假設與內臟一胸部器官筋膜單元有關。\u003C/li\u003E\u003Cli\u003E觸診驗證：觸診 an-me-th 1、2、an-la-th 1 - 2 CF 和 ir-sc ; re-me-th 1 、 re-la-th和左右兩邊的 er-SC。\u003C/li\u003E\u003Cli\u003E治療：治療師操作在最緻密化的融合中心（CF），直到患者不再感到任何疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260524110534-%E4%BE%86%E8%87%AA%E8%82%BA%E9%83%A8%E7%9A%84%E8%BD%89%E7%A7%BB%E7%97%9B%E6%B2%BB%E7%99%82.jpeg\" alt=\"來自肺部的轉移痛治療\" /\u003E\u003C/p\u003E"

var srsData={};
var filteredData=qaData.slice();
var currentQ=null;
var studyMode="random";
var answerVisible=false;
var storageOk=false;
var SRS_KEY="srs_"+"CC CF 點位隨機抽題卡".replace(/\W/g,"_").slice(0,40);

function pad2(n){return n<10?"0"+n:""+n;}
function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function addDays(s,n){var d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function ivText(days){
  if(days<=0)return "重學";
  if(days===1)return "1天";
  if(days<7)return days+"天";
  if(days<30)return Math.round(days/7)+"週";
  return Math.round(days/30)+"月";
}
function stripHtml(s){return s.replace(/<[^>]*>/g,"");}
function filterModalList(list,qSearch,aSearch){
  return list.filter(function(item){
    var qOk=!qSearch||item.question.toLowerCase().indexOf(qSearch.toLowerCase())!==-1;
    var aOk=!aSearch||stripHtml(item.answer).toLowerCase().indexOf(aSearch.toLowerCase())!==-1;
    return qOk&&aOk;
  });
}

function chkStorage(){try{localStorage.setItem("_t","1");localStorage.removeItem("_t");storageOk=true;}catch(e){storageOk=false;}}
function saveSrs(){if(!storageOk)return;try{localStorage.setItem(SRS_KEY,JSON.stringify(srsData));}catch(e){}}
function loadSrs(){if(!storageOk)return;try{var d=localStorage.getItem(SRS_KEY);if(d)srsData=JSON.parse(d);}catch(e){srsData={};}}

function getCard(q){
  if(!srsData[q])srsData[q]={interval:0,reps:0,ef:2.5,nextReview:null,total:0};
  return srsData[q];
}
function getStatus(q){
  var c=getCard(q);
  if(!c.nextReview)return "new";
  if(c.interval>=21)return "mastered";
  if(c.nextReview<=todayStr())return "due";
  return "upcoming";
}

function sm2(card,quality){
  var ef=card.ef||2.5, reps=card.reps||0, iv=card.interval||0;
  var nef,niv,nreps;
  if(quality<3){
    nef=Math.max(1.3,ef-0.2); niv=1; nreps=0;
  } else {
    nef=Math.max(1.3,ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)));
    nreps=reps+1;
    if(reps===0){
      niv=(quality===5?4:quality===4?2:1);
    } else if(reps===1){
      niv=(quality===5?Math.round(6*nef):quality===3?4:6);
    } else {
      niv=Math.round(iv*nef);
      if(quality===3)niv=Math.max(1,Math.round(niv*0.7));
      if(quality===5)niv=Math.round(niv*1.3);
    }
  }
  return {interval:niv,reps:nreps,ef:nef};
}
function previewAll(q){
  var c=getCard(q);
  return {1:sm2(c,1).interval,3:sm2(c,3).interval,4:sm2(c,4).interval,5:sm2(c,5).interval};
}
function applyRating(q,quality){
  var card=getCard(q);
  var r=sm2(card,quality);
  card.interval=r.interval; card.reps=r.reps; card.ef=r.ef;
  card.nextReview=addDays(todayStr(),quality<3?0:r.interval);
  card.total=(card.total||0)+1;
  saveSrs();
}

function updateStats(){
  var tot=filteredData.length,nw=0,due=0,mast=0;
  filteredData.forEach(function(item){
    var st=getStatus(item.question);
    if(st==="new")nw++;
    else if(st==="due")due++;
    else if(st==="mastered")mast++;
  });
  document.getElementById("totalCount").textContent=tot;
  document.getElementById("newCount").textContent=nw;
  document.getElementById("dueCount").textContent=due;
  document.getElementById("mastCount").textContent=mast;
  document.getElementById("progBar").style.width=(tot>0?Math.round((mast/tot)*100):0)+"%";
}

function getPool(){
  if(studyMode==="srs"){
    var due=[],nw=[];
    filteredData.forEach(function(item){
      var st=getStatus(item.question);
      if(st==="due")due.push(item);
      else if(st==="new")nw.push(item);
    });
    return due.concat(nw);
  }
  return filteredData;
}

function hideAnswer(){
  document.getElementById("answerContent").classList.remove("show");
  document.getElementById("ratingWrap").classList.remove("show");
  document.getElementById("showAnsBtn").textContent="顯示答案";
  answerVisible=false;
}
function toggleAnswer(){
  if(!currentQ)return;
  if(answerVisible){hideAnswer();}
  else{
    document.getElementById("answerContent").classList.add("show");
    document.getElementById("ratingWrap").classList.add("show");
    document.getElementById("showAnsBtn").textContent="隱藏答案";
    answerVisible=true;
    updateHints(currentQ.question);
  }
}
function updateHints(q){
  var iv=previewAll(q);
  document.getElementById("hint-1").textContent="重學";
  document.getElementById("hint-3").textContent=ivText(iv[3]);
  document.getElementById("hint-4").textContent=ivText(iv[4]);
  document.getElementById("hint-5").textContent=ivText(iv[5]);
}
function onRating(quality){
  if(!currentQ)return;
  applyRating(currentQ.question,quality);
  drawQuestion();
}

function setSrsInfo(q){
  var el=document.getElementById("srsInfo");
  if(!q){el.style.display="none";el.innerHTML="";return;}
  var card=getCard(q); var st=getStatus(q);
  var labels={"new":"🆕 新卡片","due":"📅 到期複習","upcoming":"✅ 排程中","mastered":"🏆 已掌握"};
  var html='<span class="srs-badge st-'+st+'">'+labels[st]+'</span>';
  if(st!=="new"){
    html+='<span class="srs-meta">間隔 '+card.interval+'天&nbsp;·&nbsp;複習 '+card.total+'次&nbsp;·&nbsp;EF '+card.ef.toFixed(2)+'</span>';
    if(card.nextReview)html+='<span class="srs-meta">下次複習：'+card.nextReview+'</span>';
  } else {
    html+='<span class="srs-meta">從未複習</span>';
  }
  if(studyMode==="srs"){
    html+='<span class="srs-meta">（待學 '+getPool().length+' 題）</span>';
  }
  el.innerHTML=html; el.style.display="flex";
}

function drawQuestion(){
  hideAnswer();
  var pool=getPool();
  if(pool.length===0){
    var msg=studyMode==="srs"
      ?"🎉 今日所有卡片已複習完畢！請明日再來，或切換「隨機練習」繼續練習。"
      :"🎉 目前篩選範圍無符合題目。";
    document.getElementById("question").innerHTML=msg;
    document.getElementById("answerContent").innerHTML="";
    document.getElementById("showAnsWrap").style.display="none";
    setSrsInfo(null); currentQ=null; updateStats(); return;
  }
  var item;
  if(studyMode==="srs"){
    var dueOnly=pool.filter(function(i){return getStatus(i.question)==="due";});
    var src=(dueOnly.length>0&&Math.random()<0.8)?dueOnly:pool;
    item=src[Math.floor(Math.random()*src.length)];
  } else {
    item=pool[Math.floor(Math.random()*pool.length)];
  }
  currentQ=item;
  document.getElementById("question").innerHTML=item.question;
  document.getElementById("answerContent").innerHTML=item.answer;
  document.getElementById("showAnsWrap").style.display="block";
  setSrsInfo(item.question); updateStats();
}

function setMode(mode){
  studyMode=mode;
  document.getElementById("modeRndBtn").classList.toggle("active",mode==="random");
  document.getElementById("modeSrsBtn").classList.toggle("active",mode==="srs");
  updateStats();
  drawQuestion();
}

function applyFilter(){
  var pat=document.getElementById("filterInput").value;
  if(!pat.trim()){filteredData=qaData.slice();updateStats();drawQuestion();return;}
  try{var re=new RegExp(pat,"i");filteredData=qaData.filter(function(q){return re.test(q.question);});updateStats();drawQuestion();}catch(e){}
}
function clearFilter(){document.getElementById("filterInput").value="";filteredData=qaData.slice();updateStats();drawQuestion();}

function doReset(){
  srsData={};saveSrs();currentQ=null;
  updateStats();
  document.getElementById("resetModal").classList.remove("open");
  drawQuestion();
}

function toggleModalQA(idx,type){
  var ans=document.getElementById(type+"-ans-"+idx);
  var btn=document.getElementById(type+"-btn-"+idx);
  if(!ans||!btn)return;
  var show=!ans.classList.contains("show");
  ans.classList.toggle("show",show);
  btn.textContent=show?"隱藏答案":"顯示答案";
}
function buildList(list,type){
  if(!list.length)return'<div class="no-results">（無符合結果）</div>';
  return list.map(function(item,i){
    var c=getCard(item.question),st=getStatus(item.question);
    var meta=st==="new"
      ?"新卡片（從未複習）"
      :("間隔 "+c.interval+"天 · EF "+c.ef.toFixed(2)+(c.nextReview?" · 下次 "+c.nextReview:""));
    var cls="question-item"+(st==="mastered"?" is-mast":"");
    return '<div class="'+cls+'">'
      +'<div class="question-header">'
      +'<div class="question-text">'+item.question+'<div class="srs-mini">'+meta+'</div></div>'
      +'<button id="'+type+"-btn-"+i+'" class="btn btn-sm qa-tog" data-type="'+type+'" data-idx="'+i+'">顯示答案</button>'
      +'</div>'
      +'<div id="'+type+"-ans-"+i+'" class="question-answer">'+item.answer+'</div>'
      +'</div>';
  }).join("");
}

function renderAllModal(){
  var q=document.getElementById("allQSearch").value;
  var a=document.getElementById("allASearch").value;
  var base=filteredData.slice();
  var list=filterModalList(base,q,a);
  var suffix=(q||a)?" / "+base.length:"";
  document.getElementById("allCount2").textContent="全部題目（"+list.length+suffix+" 題）";
  document.getElementById("allList").innerHTML=buildList(list,"all");
}
function showAllModal(){
  document.getElementById("allQSearch").value="";
  document.getElementById("allASearch").value="";
  renderAllModal();
  document.getElementById("allModal").classList.add("open");
}
function renderDueModal(){
  var q=document.getElementById("dueQSearch").value;
  var a=document.getElementById("dueASearch").value;
  var base=filteredData.filter(function(item){var st=getStatus(item.question);return st==="due"||st==="new";});
  var list=filterModalList(base,q,a);
  var suffix=(q||a)?" / "+base.length:"";
  document.getElementById("dueCount2").textContent="今日待學（"+list.length+suffix+" 題）";
  document.getElementById("dueList").innerHTML=buildList(list,"due");
}
function showDueModal(){
  document.getElementById("dueQSearch").value="";
  document.getElementById("dueASearch").value="";
  renderDueModal();
  document.getElementById("dueModal").classList.add("open");
}
function renderMastModal(){
  var q=document.getElementById("mastQSearch").value;
  var a=document.getElementById("mastASearch").value;
  var base=filteredData.filter(function(item){return getStatus(item.question)==="mastered";});
  var list=filterModalList(base,q,a);
  var suffix=(q||a)?" / "+base.length:"";
  document.getElementById("mastCount2").textContent="已掌握（"+list.length+suffix+" 題）";
  document.getElementById("mastList").innerHTML=buildList(list,"mast");
}
function showMastModal(){
  document.getElementById("mastQSearch").value="";
  document.getElementById("mastASearch").value="";
  renderMastModal();
  document.getElementById("mastModal").classList.add("open");
}
function setupModal(modal){
  modal.addEventListener("click",function(e){
    if(e.target===modal){modal.classList.remove("open");return;}
    if(e.target.classList.contains("qa-tog"))
      toggleModalQA(parseInt(e.target.getAttribute("data-idx"),10),e.target.getAttribute("data-type"));
  });
}

chkStorage(); loadSrs(); updateStats();
document.getElementById("showAnsBtn").addEventListener("click",toggleAnswer);
document.querySelectorAll(".r-btn").forEach(function(btn){
  btn.addEventListener("click",function(){onRating(parseInt(btn.getAttribute("data-q"),10));});
});
document.getElementById("modeRndBtn").addEventListener("click",function(){setMode("random");});
document.getElementById("modeSrsBtn").addEventListener("click",function(){setMode("srs");});
document.getElementById("resetBtn").addEventListener("click",function(){document.getElementById("resetModal").classList.add("open");});
document.getElementById("confirmResetBtn").addEventListener("click",doReset);
document.getElementById("cancelResetBtn").addEventListener("click",function(){document.getElementById("resetModal").classList.remove("open");});
document.getElementById("showAllBtn").addEventListener("click",showAllModal);
document.getElementById("showDueBtn").addEventListener("click",showDueModal);
document.getElementById("showMastBtn").addEventListener("click",showMastModal);
document.getElementById("closeAllBtn").addEventListener("click",function(){document.getElementById("allModal").classList.remove("open");});
document.getElementById("closeDueBtn").addEventListener("click",function(){document.getElementById("dueModal").classList.remove("open");});
document.getElementById("closeMastBtn").addEventListener("click",function(){document.getElementById("mastModal").classList.remove("open");});
document.getElementById("allQSearch").addEventListener("input",renderAllModal);
document.getElementById("allASearch").addEventListener("input",renderAllModal);
document.getElementById("dueQSearch").addEventListener("input",renderDueModal);
document.getElementById("dueASearch").addEventListener("input",renderDueModal);
document.getElementById("mastQSearch").addEventListener("input",renderMastModal);
document.getElementById("mastASearch").addEventListener("input",renderMastModal);
document.getElementById("filterBtn").addEventListener("click",applyFilter);
document.getElementById("clearFilterBtn").addEventListener("click",clearFilter);
document.getElementById("filterInput").addEventListener("keydown",function(e){if(e.key==="Enter")applyFilter();});
setupModal(document.getElementById("resetModal"));
setupModal(document.getElementById("allModal"));
setupModal(document.getElementById("dueModal"));
setupModal(document.getElementById("mastModal"));
drawQuestion();
</script>

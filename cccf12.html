  {
    "question": "RE-PE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第五跖骨基底部周圍\u003C/li\u003E\u003Cli\u003EBL64，京骨穴\u003C/li\u003E\u003Cli\u003E小趾展肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部（足）的後向運動（用足的外側部分蹬地----此筋膜間室與小腿三頭肌筋膜間室相連續）由單關節肌（小趾展肌、小趾短屈肌）和雙關節肌（起自短屈肌的起點，並止於第五跖骨基底的腓骨短肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在小趾短屈肌和小趾展肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070450-Re-pe.jpeg\" alt=\"Re-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E外側腳節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eer-pe 位於十字伸肌支持帶下方，單關節（伸趾短肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-pe 位於腳的外側筋膜腔室，單關節（外展小趾肌）和雙關節（腓骨短肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-pe 位於第2、3、4蹠骨頭，其中單關節（背側骨間肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100551-re-pe-location.jpeg\" alt=\"re-pe-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E背側骨間肌與伸趾短肌以及長肌腱相連。\u003C/li\u003E\u003Cli\u003E第二個腳趾有來自兩個背側骨間肌附著，一個外側、一個內側，而第三和第四個腳趾只有來自外側部分的附著點（la-pe）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010519-la-pe-location.jpeg\" alt=\"la-pe-location\" /\u003E\u003Cbr /\u003E足部在蹠骨 （metatarsals） 水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-pe 的 CC 位於外展小趾肌的筋膜上，然後與屈小趾肌相連，再接續到小腿三頭肌 （triceps surae） 的筋膜。\u003C/li\u003E\u003Cli\u003Eer-pe 的CC 位於更近端，在伸趾短肌的肌腹上；該肌肉的筋膜與足背側筋膜的中層（middle lamina ofthe dorsal fascia）相連。\u003C/li\u003E\u003Cli\u003Ela-pe 的CC 位於更遠側，在足背筋膜的深部，與足背骨間肌（dorsal interossei muscles) 相連•\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070550-er-pe-location.jpeg\" alt=\"er-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-pe 協調中心（CC）的觸診驗證。\u003Cbr /\u003E該協調中心的觸診驗證在第五蹠骨基底部的近端和遠端進行，在外展小趾肌的筋膜腔室上進行（針灸穴位 BL 64 p、BL 65、BL 66 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100546-re-pe-pave.jpeg\" alt=\"re-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-pe 協調中心（CC）的治療。\u003Cbr /\u003E患者處於俯臥位，腳的内緣放置在床上。\u003Cbr /\u003E將指關節放在腳的外側腔室並鬆動最緻密的筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100558-re-pe-treatment.jpeg\" alt=\"re-pe-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-PE 障礙",
    "answer": "\u003Cp\u003Ere-pe 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於腳的外部邊界。在慢性病例中，第五腳趾出現老繭或變形。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100535-re-pe-cp.jpeg\" alt=\"re-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-pe 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E如果患者的腳外側負重，患者會表示急性疼痛。在第五蹠骨骨折後，外展小趾肌經常會出現殘餘的鎭痛性收縮。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100541-re-pe-pamo.jpeg\" alt=\"re-pe-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛的部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E疼痛位于足的外侧缘，此处不能负重，患者只能用脚跟行走。慢性患者第5足趾可见胼胝体样改变。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E足外侧部的纤维化可导致小趾外展肌的痉挛，伴随外侧趾骨位置偏移。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090521-re-pe-o-cp.jpeg\" alt=\"re-pe-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E动作测试\u003Cbr /\u003E患者的步态可提示病变，但没有选择性。让患者足部负重，依次是足跟、前足、内侧和外侧边缘着地负重，以判断最疼痛的部位，这对于治疗后止痛效果的验证是很实用的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090527-re-pe-o-move.jpeg\" alt=\"re-pe-o-move\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧，足部外侧缘朝上，治疗师应用指间关节触诊第5趾骨头基底部来感受筋膜的变化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090532-re-pe-o-treatment.jpeg\" alt=\"re-pe-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E喙突下方，胸小肌肌腹上，三角肌與胸大肌之間\u003C/li\u003E\u003Cli\u003ELU1，中府穴\u003C/li\u003E\u003Cli\u003E胸小肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的前向運動（將肩胛骨向前向下移動）由單關節肌（胸小肌）和雙關節肌（胸大肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點位於啄突下的胸小肌肌腹。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070402-An-sc.jpeg\" alt=\"An-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E肩胛節段前部的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-sc 的CC 位於鎖骨內側部分下方，單關節（鎖骨下肌）和雙關節向量（胸大肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Ean-sc 的 CC 位於胸小肌的肌腹上方，單關節（胸小肌）和雙關節向量（胸大肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-sc 的 CC 位於腋中線的前方，單關節（前鋸肌）和雙關節向量（胸大肌和闊背肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090534-an-sc-location.jpeg\" alt=\"an-sc-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鎖骨下肌向近端方向，而肩胛下肌 （ir-hu）向遠端方向牽引鎖骨腋筋膜 （ir-sc）。\u003C/li\u003E\u003Cli\u003E胸小肌 （an-sc）向近端方向，而肱二頭肌短頭（an-hu） 向遠端方向牽引胸筋膜。\u003C/li\u003E\u003Cli\u003E由闊背肌和前鋸肌（me-sc） 牽引内側腋窩筋膜，由上臂肌肉（me-hu）牽引外側腋筋膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120521-me-sc-location.jpeg\" alt=\"me-sc-location\" /\u003E\u003Cbr /\u003E腋窩前後圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-sc 的CC位於鎖骨下肌，其筋膜延續包含：\u003Cul\u003E\u003Cli\u003E下面是鎖骨腋筋膜（clavicoracoaxillaryfascia）、腋深筋膜 （deep axillary fascia）和肩胛下筋膜（subscapularis fascia) \u003C/li\u003E\u003Cli\u003E上面是中頸筋膜 （middle cervical fascia），其中包含了肩胛舌骨肌（Omohyoid muscle)\u003C/li\u003E\u003C/ul\u003E\u003C/li\u003E\u003Cli\u003Ean-sc 的CC 位於胸骨，an-sc 的CC 位於胸小肌和胸大肌的筋膜上，胸大肌的筋膜與三角肌的筋膜在外側相連。\u003C/li\u003E\u003Cli\u003Eme-sc 的CC 位於腋淺筋膜上，連接胸大肌和闊背肌；這些肌肉的筋膜在斜方肌筋膜 （la-sc）上方延續。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060512-ir-sc-location.jpeg\" alt=\"ir-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-sc 協調中心（CC）的觸診驗證。\u003Cbr /\u003E將食指或中指的指尖置於喙突下方，在三角肌一胸大肌溝內側（紅色虛線），用來驗證胸小肌筋膜（針灸穴位 LU 1）的狀態。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090528-an-sc-pave.jpeg\" alt=\"an-sc-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-sc 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E用指關節探索喙突下方的溝，尋找深筋膜中最緻密的點，並且也傳導疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090541-an-sc-treatment.jpeg\" alt=\"an-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师将肘关节或者指间关节穿过嚎突下沟，针对引发疼痛的筋膜部位进行手法治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080509-an-sc-o-treatment.jpeg\" alt=\"an-sc-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-SC 障礙",
    "answer": "\u003Cp\u003Ean-sc 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E肩鎖關節外傷或扭傷的結果；胸小肌症候群。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090518-an-sc-cp.jpeg\" alt=\"an-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-sc 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E當患者將雙側肩胛骨同時前移時，可以看到左右肩胛節段之間的不對稱運動。其他時候，疼痛會出現在胸鎖關節或肩鎖關節。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090523-an-sc-pamo.jpeg\" alt=\"an-sc-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E肩锁关节外伤或扭伤；胸小肌综合征伴有臂丛放射。\u003Cbr /\u003E起源或 CC：\u003Cbr /\u003E在锁骨-隊突-腋筋膜处，此处结合了单关节纤维（胸小肌）及双关节纤维（胸大肌）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080557-an-sc-o-cp.jpeg\" alt=\"an-sc-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E患者双肩向前抬起，观察是否存在双侧不对称性；或者，要求患者同时用双臂向前推桌子（肩屈肌等长收缩）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080503-an-sc-o-move.jpeg\" alt=\"an-sc-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E菱形肌上，肩胛岡內側與C7的中點，平T2\u003C/li\u003E\u003Cli\u003ESI15，肩中前穴\u003C/li\u003E\u003Cli\u003E菱形肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的後向運動（肩胛骨在矢狀面向後移動）由單關節肌（大、小菱形肌）和雙關節肌（斜方肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 CC 點靠近大、小菱形肌肌腹，靠近兩塊肌肉的分隔處（如果有分界的話）（圖35）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070408-Re-sc.jpeg\" alt=\"Re-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E後側肩胛節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-sc 位於斜方肌的前緣，單關節（肩胛舌骨肌）和雙關節（斜方肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-sc 位於肩胛骨上角上方，單關節（提肩胛肌）和雙關節（斜方肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-sc 位於肩胛骨和脊椎之間的中點，單關節（菱形肌）和雙關節（中斜方肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110517-re-sc-location.jpeg\" alt=\"re-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛筋膜的牽拉來自於往頭側的斜方肌以及遠端方向的三角肌（la-sc, la-hu）。\u003C/li\u003E\u003Cli\u003E提肩胛肌向頭側方向牽拉，棘上肌、棘下肌和三角肌向遠側方向牽拉（er-sc, er-hu) •\u003C/li\u003E\u003Cli\u003E三角肌筋膜的牽拉來自於向内方向的斜方肌和菱形肌群，和來自遠端方向的三角肌嵌入肩胛骨的部分（re-sc, re-hu）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010540-la-sc-location.jpeg\" alt=\"la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003E腋窩的前後截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-sc 的CC 位於斜方肌的上緣，在肩胛骨抬高的過程中，它作用於兩個關節：胸鎖關節和肩鎖關節。\u003C/li\u003E\u003Cli\u003Eer-sc 的CC 位於肩胛上角的提肩胛肌的起點，頸筋膜中層（middle lamina of the cervical fascia） 也起源於此。\u003C/li\u003E\u003Cli\u003Ere-sc 的CC 位於斜方肌的内側部分，正好在小菱形肌或大菱形肌上方。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070503-er-sc-location.jpeg\" alt=\"er-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-sc 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E這個協調中心的觸診驗證在小菱形肌上進行的，位在肩胛骨棘突和第七頸椎之間的中點（針灸穴位 SI 14、SI 15p）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110511-re-sc-pave.jpeg\" alt=\"re-sc-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-sc 協調中心 （CC）的治療。\u003Cbr /\u003E患者坐姿。\u003Cbr /\u003E透過鬆動術，治療師試圖恢復斜方肌筋膜、小菱形肌筋膜和豎脊肌之間的滑動。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110523-re-sc-treatment.jpeg\" alt=\"re-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗方法\u003Cbr /\u003E病人坐位，治疗师用肘关节，置于肩胛骨的内上缘和第7颈椎中间，明确引发疼痛的位点，进行手法治疗，直到局部疼痛消失及牵涉痛减轻。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090504-re-sc-o-treatment.jpeg\" alt=\"re-sc-o-treatment\" /\u003E\u003C/p\u003E"

090517-an-hu-pave.jpeg\" alt=\"an-hu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-hu 協調中心 （CC）的治療。\u003Cbr /\u003E患者仰臥，前臂旋後。\u003Cbr /\u003E施加足夠的摩擦力到達三角肌的内筋膜。為了治療造成疼痛的最敏感點，治療師應該以患者的感覺為指導。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090530-an-hu-treatment.jpeg\" alt=\"an-hu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧位，双臂位于体侧，治疗师将指间关节置于三角肌前上部，寻找引发疼痛的筋膜改变最严重的部位，然后进行治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080556-an-hu-o-treatment.jpeg\" alt=\"an-hu-o-treatment\" /\u003E\u003C/p\u003E"

e\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-hu 協調中心 （CC）的治療。\u003Cbr /\u003E患者俯臥。\u003Cbr /\u003E將指關節或肘部放在三角肌附著在肩胛骨棘突的部分和下斜方肌之間，鬆動筋膜直到局部痛和牽涉痛消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110557-re-hu-treatment.jpeg\" alt=\"re-hu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E病人俯卧位，上臂外展，治疗师把肘关节置于病人的肱三头肌的长头腱和三角肌的肩胛骨附着部分之间的间隙上，通过肘关节向不同方向的手法治疗致密化的筋膜纤维。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526090523-re-hu-o-treatment.jpeg\" alt=\"re-hu-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E平三角肌止點水平，肱二頭肌肌腹上平\u003C/li\u003E\u003Cli\u003ELU4，俠白穴\u003C/li\u003E\u003Cli\u003E肱肌、肱二頭肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的前向運動（屈肘）由單關節肌（肱肌）和雙關節肌（肱二頭肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點位於肱二頭肌肌腹上方或稍偏外側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070429-An-cu.jpeg\" alt=\"An-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E肘部節段前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cu 的 CC 位於肱二頭肌肌腹部的外側部分，單關節（肱肌）和雙關節（肱二頭肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-cu 的 CC 位於內側肌間膈，單關節（喙肱肌）和雙關節向量（起始於肱骨的尺側屈腕肌纖維）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-cu 的 CC 位於肘部屈摺痕線的中央，單關節（旋前圓肌）和雙關節向量（掌長肌）在此處匯合。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090505-an-cu-location.jpeg\" alt=\"an-cu-location\" /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/li\u003E\u003Cli\u003E肱二頭肌向近端方向，而橈側屈腕肌（an-cu, an-ca）向遠端方向施加牽引力。\u003C/li\u003E\u003Cli\u003E喙肱肌在近端方向，而尺側屈腕肌（me-cu, me-ca） 在遠端方向牽引隔膜。\u003C/li\u003E\u003Cli\u003E旋前圓肌向近端方向，旋前方肌（ir-cu,ir-ca）向遠端方向施加牽引力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010550-me-cu-location.jpeg\" alt=\"me-cu-location\" /\u003E\u003Cbr /\u003E上臂在遠端 1/3的水平橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cu 的CC 位於前臂筋膜；肱肌的外側纖維將此點更向外側移。\u003C/li\u003E\u003Cli\u003Eir-cu 的CC 位於更遠的位置，因為它與旋前圓肌的筋膜有關。\u003C/li\u003E\u003Cli\u003Eme-cu 的 CC 位於内側肌間隔上，而後者又與尺神經鞘結合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070554-ir-cu-location.jpeg\" alt=\"ir-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cu 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E使用食指的指關節或指尖檢查 an-cu 的CC，觸診肱二頭肌的筋膜，於手臂的中線（紅色虛線）稍微偏外（針灸穴位 LU 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090500-an-cu-pave.jpeg\" alt=\"an-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cu 協調中心 （CC）的治療。\u003Cbr /\u003E患者仰臥，前臂旋後。\u003Cbr /\u003E用指關節或肘尖檢查肱二頭肌上肱筋膜中的緻密 CC。當患者感到肘部疼痛時，就會意識到為什麼治療師會在與他們感覺到症狀相距很遠的位置進行治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090512-an-cu-treatment.jpeg\" alt=\"an-cu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师首先用指间关节在三角肌远端肌腱止点水平探查肱二头肌上的臂筋膜，之后改用肘关节操作。常常只有当他们感到疼痛牵涉到肘部时，病人才会理解力何手法治疗施加于远离症状的区域。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080501-an-cu-o-treatment.jpeg\" alt=\"an-cu-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-cu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E肘部區域瀰漫性疼痛。橈骨頭骨折或脫位的結果，肘部部分運動受限。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090550-an-cu-cp.jpeg\" alt=\"an-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-cu 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者反應肘屈肌力量不足或無法用手觸摸肩膀。\u003Cbr /\u003E在治療前後測量中指尖與肩峰之間的距離是有幫助的。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090555-an-cu-pamo.jpeg\" alt=\"an-cu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E肘关节活动受限，常为无痛，可继发于骨折或桡骨头脱位。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E在致密化的臂筋膜内，使得单关节肌（肱肌）和双关节肌（肱二头肌和肱桡肌）肌纤维不能同步收缩。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080549-an-cu-o-cp.jpeg\" alt=\"an-cu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E通过要求患者触碰双肩，对比屈肘抵抗张力的力量或屈肘的活动度；很实用的一个方法是，在治疗前后测量对比中指指尖到肩峰的距离。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080555-an-cu-o-move.jpeg\" alt=\"an-cu-o-move\" /\u003E\u003C/p\u003E"

    "question": "RE-CU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E三角肌止點水平，肱三頭肌肌腹上\u003C/li\u003E\u003Cli\u003ETE12，消濼穴\u003C/li\u003E\u003Cli\u003E腦三頭肌短頭\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的後向運動（伸直或伸展肘關節）由單關節肌（肱三頭肌的內、外側頭及肘肌）和雙關節肌（膠三頭肌長頭）纖\u003Cbr /\u003E維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc點位於三角肌的附著點、肱三頭肌長頭和外側頭之間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070435-Re-cu.jpeg\" alt=\"Re-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E肘節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cu 位於肱三頭肌的外側筋膜上，單關節（肱三頭肌外側頭）和雙關節（肱三頭肌長頭）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-cu 位於外側肌間隔，單關節（肱橈肌）和雙關節（橈側伸腕長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-cu 位於外側肌間隔和鷹嘴突之間，單關節（旋後肌）和雙關節（肱橈肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110552-re-cu-location.jpeg\" alt=\"re-cu-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前臂筋膜的牽拉來自於近端的肱三頭肌和遠端的尺側伸腕肌（re-cu, re-ca）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的三角肌和遠端的橈側伸腕長肌和肱橈肌（la-cu, la-ca) •\u003C/li\u003E\u003Cli\u003E骨間膜的牽拉來自於近端的旋後肌和遠端的伸拇長肌、外展拇長肌（er-cu, er-ca）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010547-la-cu-location.jpeg\" alt=\"la-cu-location\" /\u003E\u003Cbr /\u003E上臂下 1/3水平處的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cu 的 CC 位於更遠的位置。它位於外 側肌間隔中，位於肱橈肌的起點。\u003C/li\u003E\u003Cli\u003Eer-cu 的 CC 位於更遠端，在肱三頭肌肌腱與肱橈肌和旋後肌（supinator） 的筋膜連續。\u003C/li\u003E\u003Cli\u003Ere-cu的CC 位於與肱三頭肌的肌束膜和肌内膜相連的後外側上臂筋膜上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080556-er-cu-location.jpeg\" alt=\"er-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E該協調中心的觸診驗證是針對肱三頭肌的外側頭（紅色虛線）進行，略低於三角肌粗隆（針灸穴位 TE 12）的水平高度。黃色線表示橈神經通路。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110546-re-cu-pave.jpeg\" alt=\"re-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cu 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，前臂放在床的一側。\u003Cbr /\u003E將肘部放在肱三頭肌（外側頭）的肌腹上，注意不要壓迫到橈神經。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110559-re-cu-treatment.jpeg\" alt=\"re-cu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E病人俯卧位，上臂轻松放在治疗台上，治疗师用肘关节置于三角肌远端\u003Cbr /\u003E止点水平的肱三头肌隆起的肌腹上，治疗此处的深筋膜。\u003Cbr /\u003E注意：避免压缩压迫桡神经。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100547-re-cu-o-treatment.jpeg\" alt=\"re-cu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-CU 障礙",
    "answer": "\u003Cp\u003Ere-cu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於鷹嘴突；患者不能完全伸展或彎曲肘部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110537-re-cu-cp.jpeg\" alt=\"re-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E在肘部伸直過程中出現了此肌筋膜單元的張力代償；患者報告說無法利用手臂的槓桿來執行伏地挺身。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110541-re-cu-pamo.jpeg\" alt=\"re-cu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位和疼痛的起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E这种肌筋膜单元的功能障碍决定了鹰嘴部的疼痛，或是屈肘和伸肘时的活动范围的受限。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E有时肱三头肌不同头之间存在不协调，或有时是其拮抗肌筋膜单元（前-肘）引发了原动肌筋膜单元（后-肘）的高张力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100535-re-cu-o-cp.jpeg\" alt=\"re-cu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动验证\u003Cbr /\u003E病人屈肘90°，抗阻伸肘，阻力置于前臂；注意肘部疼痛会加重或因使用力量的差异疼痛度不同。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100539-re-cu-o-move.jpeg\" alt=\"re-cu-o-move\" /\u003E\u003C/p\u003E"

    "question": "AN-CA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E肱橈肌和橈側腕屈肌間溝內，前臂近端1/3處\u003C/li\u003E\u003Cli\u003ELU6，孔最穴\u003C/li\u003E\u003Cli\u003E橈側腕屈肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腕部的前向運動（將手腕向前向外移動）由單關節肌（拇長屈肌）和雙關節肌（磽側腕屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在橈側腕屈肌肌腹的外側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070443-An-ca.jpeg\" alt=\"An-ca\" /\u003E\u003C/p\u003E\u003Cp\u003E腕部節段前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-ca 的 CC 位於橈側屈腕肌的外側，單關節（橈側屈腕肌）和雙關節（趾屈肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-ca 的 CC 位於掌長肌腱上，單關節（旋前方肌）和雙關節（掌長肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-ca 的 CC 位於尺側屈腕肌腱上，單關節（尺側屈腕肌）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090546-an-ca-location.jpeg\" alt=\"an-ca-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E橈側屈腕肌在大魚際肌筋膜上的近端牽引力，而拇短肌（an-ca, an-di） 在遠端方向的牽引力。\u003C/li\u003E\u003Cli\u003E尺側屈腕肌對小魚際筋膜施加近端牽引力，而掌短肌則施加遠端牽引力（me-ca，me-di) •\u003C/li\u003E\u003Cli\u003E由掌長肌向近端方向和由蚓狀肌（ir-ca, ir-di） 向遠端方向牽引掌腱膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010523-me-ca-location.jpeg\" alt=\"me-ca-location\" /\u003E\u003Cbr /\u003E前臂上四分之一的邊界的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-ca 的 CC 位於尺側屈腕肌（flexor carpi uInaris） 的肌腱通道上，如圖所示。\u003C/li\u003E\u003Cli\u003Ean-ca 的 CC 位於分隔橈側屈腕肌肌腹和掌長肌的隔膜上。\u003C/li\u003E\u003Cli\u003Eir-cu 的 CC 位於旋前圓肌上，其遠端筋膜在深處與旋前方肌（pronatorquadratus）（ir-ca）的筋膜相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070524-ir-ca-location.jpeg\" alt=\"ir-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ca 協調中心（CC）的觸診驗證。\u003Cbr /\u003E將食指的指尖或指關節放在前臂筋膜的上半部分，在橈側屈腕肌（縱向虛線）肌腹的外側部分（針灸穴位 LU 6）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090541-an-ca-pave.jpeg\" alt=\"an-ca-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ca 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E在縱向和橫向方向上施加深層摩擦。\u003Cbr /\u003E當處理慢性緻密化時，應使用肘尖，因為需要更長的時間來使筋膜流體化。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090552-an-ca-treatment.jpeg\" alt=\"an-ca-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E病人仰卧位，治疗师将指间关节或肘关节置于桡侧腕屈肌肌腹上，治疗前臂筋膜。这里的筋膜改变常显示为慢性表现，需要更长时间解决问题。\u003Cbr /\u003E因此，建议用肘关节进行治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080516-an-ca-o-treatment.jpeg\" alt=\"an-ca-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-CA 障礙",
    "answer": "\u003Cp\u003Ean-ca 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E橈側屈腕肌腱病灶。\u003Cbr /\u003E肌腱囊腫的發生是為補償和糾正肌肉的異常張力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090532-an-ca-cp.jpeg\" alt=\"an-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ca 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者在進行腕部橈向屈曲時感受劇烈疼痛。過了一段時間，疼痛會被手腕活動範圍的限制所抵消。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090537-an-ca-pamo.jpeg\" alt=\"an-ca-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP；\u003Cbr /\u003E由于肌张力的异常，沿桡侧腕屈肌肌腱可形成代偿性囊肿；与"写作手"相似，有时病人抱怨大拇指痛。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E在前臂肌筋膜内，位于单关节肌（桡侧腕屈肌）和双关节肌（拇长屈肌）肌纤维结合处。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080506-an-ca-o-cp.jpeg\" alt=\"an-ca-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E抗阻检查桡侧腕屈肌的力量。或者要求病人双手掌朝下置于桌面并用力向下推，随后要求病人指出最痛区域（桡侧腕屈肌肌腱）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080510-an-ca-o-move.jpeg\" alt=\"an-ca-o-move\" /\u003E\u003C/p\u003E"

    "question": "RE-CA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E前臂遠端1/3處，尺側腕伸肌與肌腱結合處，橈尺骨之間，抵於尺骨\u003C/li\u003E\u003Cli\u003ESI7，支正穴\u003C/li\u003E\u003Cli\u003E尺側腕伸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腕部的後向運動（腕背仲）由單關節肌（起於尺骨的尺側腕伸肌纖維）和雙關節肌（起於肱骨的尺側腕伸肌纖維）纖維\u003Cbr /\u003E完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在尺側腕伸肌的肌腹上，在那里，起於尺骨的纖維與起於肱骨的纖維匯合。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070449-Re-ca.jpeg\" alt=\"Re-ca\" /\u003E\u003C/p\u003E\u003Ch4\u003E後側腕節段進行協調中心的比較性觸診驗證\u003Cbr /\u003E- la-ca 位於兩個橈側伸腕肌之間的肌間隔上，其中單關節（橈側伸腕短肌）和雙關節（橈側伸腕長肌）的向量交匯 。\u003Cbr /\u003E- er-ca 位於背筋膜上，單關節（伸拇長肌）和雙關節（伸指肌）的向量交匯處。\u003Cbr /\u003E- re-ca 位於尺側伸腕肌上，單關節（尺側伸腕肌）和雙關節（源自肱骨的同一肌肉纖維）的向量交匯處。\u003C/h4\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110501-re-ca-location.jpeg\" alt=\"re-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前臂筋膜的牽拉來自於近端的橈側伸腕肌和遠端的骨間肌 （la-ca, la-di）。\u003C/li\u003E\u003Cli\u003E前臂筋膜的牽拉沿著整段伸指肌群（er-ca，er-di) •\u003C/li\u003E\u003Cli\u003E筋膜上的牽拉來自於近端的尺側伸腕肌和遠端的外展小指肌。（re-ca, re-di）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-la-ca-location.jpeg\" alt=\"la-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003E前臂在上四分之一處的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-ca 的 CC 位於更遠側覆蓋尺側伸腕肌的筋膜上；在這裡，它包含在肘肌 （anconeus muscle） 和伸小指肌之間。\u003C/li\u003E\u003Cli\u003Eer-ca 的 CC 位於更遠側，位於覆蓋伸指肌並連接到下面的旋後肌（supinator）的筋膜上。\u003C/li\u003E\u003Cli\u003Ela-ca 的 CC 位於橈側伸腕長肌的筋膜上，從肱橈肌延伸到橈側伸腕短肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080533-er-ca-location.jpeg\" alt=\"er-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-ca 協調中心（CC）的觸診驗證。\u003Cbr /\u003E協調中心的觸診驗證在前臂中間的遠端，從鷹嘴突到手腕中部畫一條線的内側進行觸診（針灸穴位 SI7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110553-re-ca-pave.jpeg\" alt=\"re-ca-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-ca 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥。\u003Cbr /\u003E當治療小肌肉時，應該使用食指的指關節，因為對肌肉内的緻密化具有更「手\u003Cbr /\u003E術性」或穿透性的作用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110507-re-ca-treatment.jpeg\" alt=\"re-ca-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗方法\u003Cbr /\u003E病人俯卧位，手臂置于体侧，治疗师将指间关节置于尺侧腕伸肌肌腱的腱肌结合处，进行治疗，直到深层筋膜滑动性良好。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100511-re-ca-o-treatment.jpeg\" alt=\"re-ca-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-CA 障礙",
    "answer": "\u003Cp\u003Ere-ca 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E尺側伸腕肌的肌腱和尺骨莖突感到疼痛。\u003Cbr /\u003E在骨折和打石膏固定後手腕的僵硬。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110539-re-ca-cp.jpeg\" alt=\"re-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-ca 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者在手腕運動時出現疼痛和僵硬。感覺手腕沉重，手指無力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110543-re-ca-pamo.jpeg\" alt=\"re-ca-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位和疼痛的起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E尺侧腕伸肌的肌腱炎相对罕见，但可表现为尺骨茎突高敏感性或有时表现为第5手指的高敏感性。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E肌腱或关节的炎症是肌纤维异常牵拉的结果，恢复肌纤维间的滑动性可消除肌腱之间的摩擦\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100501-re-ca-o-cp.jpeg\" alt=\"re-ca-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E治疗师用一只手固定病人的前臂，另一手向尺侧腕伸肌发力的反方向提供阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100506-re-ca-o-move.jpeg\" alt=\"re-ca-o-move\" /\u003E\u003C/p\u003E"

    "question": "AN-DI 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大魚際上，第一掌骨\u003C/li\u003E\u003Cli\u003ELU10，魚際中間穴\u003C/li\u003E\u003Cli\u003E拇短屈肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E拇指的前向運動（將拇指在矢狀面向前移動）由單關節肌（拇短屈肌和拇短展肌）和雙關節肌（拇長屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點位於大魚際隆起的外側偏近端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070456-An-di.jpeg\" alt=\"An-di\" /\u003E\u003C/p\u003E\u003Cp\u003E手部節段掌面協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-di CC 位於魚際隆起處，單關節（屈拇短肌）與雙關節（屈拇長肌）向量匯合處。\u003C/li\u003E\u003Cli\u003Eme-di 的 CC 位於小魚際隆起處，單關節（掌骨間肌）和雙關節（屈肌小指）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-di 的 CC 位於手掌的中心，在那裡單關節（蚓狀肌）和雙關節關節（屈肌）向量會聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090529-an-di-location.jpeg\" alt=\"an-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E掌短肌和屈指短肌嵌入到橫腕韌帶的尺側。屈拇短肌起源於同一韌帶的橈側。當拇指與小指接觸時，橫韌帶和掌骨間肌筋膜使參與指間運動（me-di）的肌肉同步。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010522-me-di-location.jpeg\" alt=\"me-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E右手在掌骨的水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-di 的CC 位於掌短肌 （palmarisbrevis）和屈小指短肌 （flexor digitiminimi brevis）上方；後者的筋膜延續在掌骨間肌（palmar interosseous muscles）上進行手指内收。\u003C/li\u003E\u003Cli\u003Eir-di 的CC 位於手掌腱膜上，對應於中指的淺屈肌和深屈肌的肌腱。\u003C/li\u003E\u003Cli\u003ECC 位於大魚際筋膜上，覆蓋外展\u003C/li\u003E\u003Cli\u003E姆指肌 （abductor pollicis） 和屈拇指短肌 （flexor pollicis brevis）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070529-ir-di-location.jpeg\" alt=\"ir-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-di 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E為了檢查大魚際內小肌肉之間的筋膜結構彈性，治療師將食指的指尖或指關節放在該區域的最頂處（針灸穴位 LU 10）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090524-an-di-pave.jpeg\" alt=\"an-di-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-di 協調中心 （CC）的治療\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E用一隻手穩定握住患者的拇指，並用另一隻手的食指指關節進行治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090535-an-di-treatment.jpeg\" alt=\"an-di-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E首先确认鱼际最致密化位点，治疗师以指间关节按摩此点，直到恢复组织流动性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526080539-an-di-o-treatment.jpeg\" alt=\"an-di-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-DI 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E小魚際外側，第5掌骨中間\u003C/li\u003E\u003Cli\u003ESI4，腕骨穴\u003C/li\u003E\u003Cli\u003E小指展肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E手指的後向運動（伸指的同時尺偏）由單關節肌（小指展肌）和雙關節肌（小\u003Cbr /\u003E指伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的ce 點在小指展肌上，位於第五掌骨基底，在這里尺側腕伸肌的腱性擴展部延伸到小魚際的隆起處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070402-Re-di.jpeg\" alt=\"Re-di\" /\u003E\u003C/p\u003E\u003Cp\u003E後側手節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-di 位於尺骨上的手掌筋膜，單關節（外展小指肌）和雙關節（伸小指肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-di 位於骨間筋膜上，單關節（第一骨間肌）和雙關節（橈側伸腕肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-di 位於第五指的肌腱附近，單關節（蚓狀肌）和雙關節（伸指長肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110503-re-di-location.jpeg\" alt=\"re-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一背側骨間肌終止於第二手指的橈側。\u003C/li\u003E\u003Cli\u003E它的筋膜延續到中指和無名指的骨間。\u003C/li\u003E\u003Cli\u003E拇指和小指的伸肌腱則沒有附著在背側骨間肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-la-di-location.jpeg\" alt=\"la-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003E手在掌骨水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-di 的 CC 位於外展小指肌上方；這塊肌肉的運動軌跡與伸小指肌的動作一致。\u003C/li\u003E\u003Cli\u003Eer-di 的 CC 位於手背筋膜上，準確地說是在圍繞著伸指肌腱的淺層隔膜上。\u003C/li\u003E\u003Cli\u003Ela-di 的CC 位於第一背側骨間肌上，其筋膜與覆蓋另一骨間肌的深隔膜相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080508-er-di-location.jpeg\" alt=\"er-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-di 協調中心（CC）的觸診驗證。\u003Cbr /\u003E該協調中心的觸診驗證在外展小指肌、第五掌骨（針灸穴位 SI 14、SI3 d）的中段和近端指骨的基底部進行。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110559-re-di-pave.jpeg\" alt=\"re-di-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-di 協調中心 （CC）的治療。患者俯臥。\u003Cbr /\u003E牢牢握住患者的手指，同時用食指的指關節鬆動小魚際肌的外側邊界。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110509-re-di-treatment.jpeg\" alt=\"re-di-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧位，上肢置于体侧，治疗师用一只手固定住患者所有手指，然后用另一只手在第5 掌骨基底部对小鱼际隆起处进行治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100556-re-di-o-treatment.jpeg\" alt=\"re-di-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-DI 障礙",
    "answer": "\u003Cp\u003Ere-di 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E整個手的動作普遍笨拙、伸小指肌的扳機指和肌腱炎。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110545-re-di-cp.jpeg\" alt=\"re-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-di 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者無法外展小指。這個動作以 FM 觀點不是外展，而是上肢向後的一部分。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110549-re-di-pamo.jpeg\" alt=\"re-di-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E第5手指的疼痛限制了一些特定的活动，比如握手，握拳。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E手部小肌肉使手指能够灵活活动，特别是小指展肌调节第5手指的运动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100545-re-di-o-cp.jpeg\" alt=\"re-di-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E可以通过主动抗阻或向各方向被动牵拉对第5 小指进行运动验证，主动收缩的运动通常是为了验证肌筋膜单元的活性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526100550-re-di-o-move.jpeg\" alt=\"re-di-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-CP 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E預弓上緣\u003C/li\u003E\u003Cli\u003E顴弓下緣\u003C/li\u003E\u003Cli\u003E咬肌前側緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI18，顴膠穴\u003C/li\u003E\u003Cli\u003ESI19，聽宮穴\u003C/li\u003E\u003Cli\u003EST7，下關穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：牙痛、臉頰或下頜關節疼痛、神經末梢麻痹、面癱\u003C/p\u003E\u003Cp\u003E此 cf 點由3個點組成：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一個在顴骨的上緣；\u003C/li\u003E\u003Cli\u003E第二個在顴骨之下；\u003C/li\u003E\u003Cli\u003E而第三個在咬肌的前面。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090451-An-la-cp.jpeg\" alt=\"An-la-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 1,2和3CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAn-me-cp 1 CF 位於鼻翼根部，me-cp 1和an-cp 1的CC 牽引力匯聚處。\u003C/li\u003E\u003Cli\u003Ean-me-cp 2 CF 位於上領肌肉上方，me-cp 2和 an-cp 2的CC的牽引力匯聚於此。\u003C/li\u003E\u003Cli\u003Ean-me-cp 3 CF 位於下領肌肉，來自 me-cp 3和 an-cp 3的CC的牽引力匯聚處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060521-an-me-cp-location.jpeg\" alt=\"an-me-cp-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 1的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E顱骨的橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cp 1 的 CF位於額骨上縁\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 • 2 和 1CF 位於將顱骨一分為二的中線上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060550-an-la-cp1-location.jpeg\" alt=\"an-la-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 2 CF 解剖位置。\u003Cbr /\u003Ean-me-cp 2的CF 位於提上唇鼻翼肌。此CF協調或調控位於額肌上的 an-cp 2和位於鼻唇溝中的 me-cp 2的CC。在口腔外緣和頦部和鼻唇縫，降口角肌、提口角肌和頰肌形成一種支持帶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060542-an-me-cp-location2.jpeg\" alt=\"an-me-cp-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E穿過上顎的顱骨斜截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cp 1的CF 位於鼻翼側邊\u003C/li\u003E\u003Cli\u003Ean-me-cp 2的CF 位於上顎犬齒根部\u003C/li\u003E\u003Cli\u003Ean-la-cp 2 的 CF位於顴骨下緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060511-an-la-cp2-location.jpeg\" alt=\"an-la-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 3 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cp 3 CF 位於下巴筋膜，二腹肌前腹的延續（me-cp 3）。\u003C/li\u003E\u003Cli\u003Ean-me-cp 3 CF 的另一個向量问 an-cp 3的CC，即為下領舌骨和舌下肌筋膜延伸。\u003C/li\u003E\u003Cli\u003E通過頸闊肌，an-me-cp 3 CF 對 an-me-cl 施加頭側牽引力。在遠端，頸闊肌與胸大肌纖肌肉維結合 （an-me-sc CF 和 an-me-th CF) 。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-an-me-cp-location3.jpeg\" alt=\"an-me-cp-location3\" /\u003E\u003C/p\u003E\u003Cp\u003E穿過下領骨的顱骨橫截面圖。\u003C/p\u003E\u003Cp\u003Ean-la-cp 3的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cp 3的CF 位於降口角肌（depressoranguli oris） 和下領犬齒的根部\u003C/li\u003E\u003Cli\u003Ean-la-cp 3的CF 位於咬肌前緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060531-an-la-cp3-location.jpeg\" alt=\"an-la-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用中指和食指的指尖進行觸診驗證，而使用指關節進行治療更容易。\u003Cbr /\u003E直接在顴弓上方進行操作（針灸穴位 GB 3) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-an-la-cp1-pave-treatment.jpeg\" alt=\"an-la-cp1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師將食指的指尖置於顴弓下緣下方，當患者張開和闔上嘴巴時，檢查下領髁（針灸穴位 ST 7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060521-an-la-cp2-pave-treatment.jpeg\" alt=\"an-la-cp2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。為了進行觸診驗證，治療師將食指的指尖放在咬肌的前緣。然後使用關節來操作該點，直到筋膜的基質完全軟化（針灸穴位 SI18）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060544-an-la-cp3-pave-treatment.jpeg\" alt=\"an-la-cp3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）颧骨上缘；\u003Cbr /\u003E2）颧骨下缘下的凹陷中；\u003Cbr /\u003E3）正对咬肌前缘的部位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100530-an-la-cp-o-pave.jpeg\" alt=\"an-la-cp-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师通过左右比较来检查这三个子单元。令患者开闭口以便触诊颞颌关节附近区域。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100535-an-la-cp-o-treatment.jpeg\" alt=\"an-la-cp-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-CP 障礙",
    "answer": "\u003Cp\u003Ean-la-cp 融合中心 （CF）的功能障礙。\u003Cbr /\u003Ean-me-cp 的 CF 協調眼睛和嘴唇的閉合以及鼻翼的降低，而三個 an-la-cp 的 CF 協調眼臉的張開、鼻孔的擴張和鼻翼的張開以及嘴巴開合。an-la-cp 2的CF 之治療可用於治療耳鳴和其他聽力障礙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060514-an-la-cp-cp.jpeg\" alt=\"an-la-cp-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 1 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E要求患者盡可能睜大雙眼（眼睛區域，an-la-cp 1），並觀察雙眼瞼是否睜開到相同的程度。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060524-an-la-cp1-move-a.jpeg\" alt=\"an-la-cp1-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 2 和3融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E要求患者盡可能張大嘴巴（上領和下領區域，an-la-cp 2、3）。咬肌筋膜或顳下領關節周圍筋膜的緻密化會限制這個動作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060534-an-la-cp2-3-move-a.jpeg\" alt=\"an-la-cp2-3-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E面部神经痛，颞下颌关节紊乱，面瘫。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E很多面部表情肌止于浅筋膜，而浅筋膜通过胶原蛋白细丝与皮肤连接，刺激该筋膜会影响肌肉张力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100524-an-la-cp-o-cp.jpeg\" alt=\"an-la-cp-o-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-CL 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E下頜骨角後側，胸鎖乳突肌前側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI17，天容穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E覆發性咽痛、頸部腺體發炎、耳鳴、頸部僵硬疼痛、喉部易激惹\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點位於下頜角與胸鎖乳突肌之間，對應針灸的天容穴（SI 17）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090458-An-la-cl.jpeg\" alt=\"An-la-cl\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cl CF 位於SCM 肌肉前方，在下頜角韌帶上。\u003C/li\u003E\u003Cli\u003Ean-me-cl CF 位於胸鎖乳突肌胸骨端的肌腱通道上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070532-an-me-cl-location.jpeg\" alt=\"an-me-cl-location\" /\u003E\u003Cbr /\u003Ean-la-cl 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E頸部在第五頸椎的水平橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cl 的 CF 位於下頜角韌帶上\u003C/li\u003E\u003Cli\u003Ean-me-cl CF 位於胸鎖乳突肌的胸骨部分\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060554-an-la-cl-location.jpeg\" alt=\"an-la-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cl 融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。在下頜角韌帶上進行觸診和治療，此韌帶從胸鎖乳突肌的前緣延伸到下頜角（針灸穴位 SI 17）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060500-an-la-cl-treatment.jpeg\" alt=\"an-la-cl-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）下颌角后，胸锁乳突肌前缘，正对下颌舌骨韧带。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100555-an-la-cl-o-pave.jpeg\" alt=\"an-la-cl-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指节按压下颌骨和胸锁乳突肌之间的凹陷，调整用力方向直到发生筋膜改变。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100502-an-la-cl-o-treatment.jpeg\" alt=\"an-la-cl-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-LA-CL 障礙",
    "answer": "\u003Cp\u003Ean-la-cl 融合中心 （CF）的功能障礙。\u003Cbr /\u003E緻密化導致了頸椎僵硬、打開下領骨的困難以及分配給吞嚥和發聲的肌肉的不協調。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060532-an-la-cl-cp.jpeg\" alt=\"an-la-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cl 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E將患者的頭部往後外側向左右移動，並要求患者告知哪裡感覺最緊繃。只有頸部一側的緊繃感的話，表示有緻密化的部分。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060539-an-la-cl-move-p.jpeg\" alt=\"an-la-cl-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cl 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E手放在患者的前額上，治療師在患者沿前外側方向移動頭部和頸部時施加阻力。同樣的測試也應在另一側重複。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060547-an-la-cl-move-a.jpeg\" alt=\"an-la-cl-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E颈痛，咽喉痛，颈部僵硬。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E外-颈CC位于胸锁乳突肌肌腹外侧，在其前方是前-颈 CC，在其近端是前-外-颈CF，协调前向和外向的力量。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100549-an-la-cl-o-cp.jpeg\" alt=\"an-la-cl-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-TH 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ER4肋間隙鎖骨中線和腋中線之間；\u003C/li\u003E\u003Cli\u003ER5肋間隙，前鋸肌與腹外斜肌交界處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E胸部壓迫感，彎腰、胸椎旋轉疼痛受限，肋間神經痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESP18，天溪穴\u003C/li\u003E\u003Cli\u003ESP17，食竇穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點位於前鋸肌與腹外斜肌間的移行處，在第四、第五肋間隙，於腋前線之前。對應針灸的乳中穴（ST17），以及Cyriax 法中的胸椎間盤脫位而引發癥狀的部位。\u003C/p\u003E\u003Cp\u003E此cf點位於前鋸肌筋膜上，第五肋間隙凹陷處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090405-An-la-th.jpeg\" alt=\"An-la-th\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 1,2和3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cl CF 在頭側方向牽引\u003C/li\u003E\u003Cli\u003Ean-me-th 1 CF 位於第一和第二肋間\u003C/li\u003E\u003Cli\u003Ean-me-th 2 CF 位於第三和第四肋間\u003C/li\u003E\u003Cli\u003Ean-me-th 3 CF 位於第五肋間隙，劍突側邊。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070521-an-me-th-location.jpeg\" alt=\"an-me-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-th 2 CF 位於第三和第四肋間，在胸骨的側邊，在前向、内向和内旋一胸部 CC之間。\u003C/li\u003E\u003Cli\u003Ean-la-th 1 和2 CF 位於前鋸肌到腹外斜肌的肌腱通道中\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070538-an-me-th-location2.jpeg\" alt=\"an-me-th-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E深筋膜的淺層，其中包含左、右胸大肌。\u003C/li\u003E\u003Cli\u003Ean-me-th 3 CF 與胸大肌（me-th） 和腹直肌（an-th） 的嵌入肌腱相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070507-an-me-th-location.jpeg\" alt=\"an-me-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-th CF 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E胸部在第五胸椎的水平的横截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-th 的CF 位於胸骨和肋軟骨\u003C/li\u003E\u003Cli\u003Ean-la-th 的 CF 位於前鋸肌筋膜上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060522-an-la-th-location.jpeg\" alt=\"an-la-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-th 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或側臥。治療師用指尖檢查腋中線前方的第四肋間，尋找最緻密的點。使用關節進行操作，直到該點完全軟化（針灸穴位SP 18) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060511-an-la-th-pave-treatment.jpeg\" alt=\"an-la-th-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-th 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或側臥。在第五和第六根肋骨的水平，治療師用指尖尋找前鋸肌上方筋膜緻密化的點（針灸穴位 SP 17、21）。一旦確定緻密化，就可以用食指的指關節進行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060530-an-la-th2-pave-treatment.jpeg\" alt=\"an-la-th2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）第4肋间隙，锁骨中线和腋中线之间的中点，乳头旁；\u003Cbr /\u003E2）第5肋间隙，前锯肌起点上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100525-an-la-th-o-pave.jpeg\" alt=\"an-la-th-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师通过触诊肋间隙找到颗粒状突出点位；第一子单元更多作用于乳房和淋巴腺，而第二子单元作用于延伸到单侧季胁区的疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100532-an-la-th-o-treatment.jpeg\" alt=\"an-la-th-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-LA-TH 障礙",
    "answer": "\u003Cp\u003Ean-la-th 融合中心（CF）的功能障礙。\u003Cbr /\u003E季肋區疼痛和胸部緊繃感。胸部的緊繃感一直延伸到背部。身體兩側肌肉無力或無力。\u003Cbr /\u003E在姿勢分析中，可能會出現胸廓向身體不適的一側移位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060547-an-la-th-cp.jpeg\" alt=\"an-la-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-th 融合中心 （CF）的動作驗證\u003Cbr /\u003E站在患者身後，治療師將患者的胸部向後拉到另一側。如果覆蓋胸部外側部分的筋膜緻密，那麼患者會在被牽拉的一側感到緊繃或無力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060553-an-la-th-move.jpeg\" alt=\"an-la-th-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E肋间神经病变，单侧尖锐痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E在胸部侧屈运动此 CF 与外-胸 CC一起工作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100519-an-la-th-o-cp.jpeg\" alt=\"an-la-th-o-cp\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-LA-LU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肋弓下緣鎖骨中線上；\u003C/li\u003E\u003Cli\u003E腹直肌鞘上緣肚臍與肋弓之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESP16，腹哀穴\u003C/li\u003E\u003Cli\u003EST23，太乙穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E季肋部疼痛、下背痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點在胸廓下（乳頭線上，位於臍的外側），腹直肌鞘旁。對應針灸的大橫穴（SP 15）、腹哀穴（SP 16），以及腹斜肌的觸發點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090410-An-la-lu.jpeg\" alt=\"An-la-lu\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 1, 2和3 CF 解剖位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-lu 1 CF 位於劍突的遠端和側邊。它協調胸骨和腹直肌的第一肌腱之間的纖維參與。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070522-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 2 CF 解剖位置。\u003Cbr /\u003Ean-me-lu 2 CF 位於臍上白線中間側邊。白線是腹筋膜三層的融合線：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一層包圍腹外斜肌\u003C/li\u003E\u003Cli\u003E第二層包圍腹內斜肌和腹直肌\u003C/li\u003E\u003Cli\u003E第三層包裹著腹橫\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 3 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-lu 3 CF 位於白線的側邊，稍靠近到肚臍。在這個筋膜點協調腹直肌第二和第三腱劃 （tendinous inscriptions）之間的肌纖維。\u003C/li\u003E\u003Cli\u003E如果腹部筋膜的一部分被分離並手動向外拉，牽引力會傳播到腹直肌鞘和下面的肌肉。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070556-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-lu 1 and 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E上腹區域在第二腰椎的水平的橫截面圖。\u003C/p\u003E\u003Cp\u003Ean-me-lu 的 CF 位於白線和腹直肌鞘之間\u003Cbr /\u003Ean-la-lu CF 的位於腹直肌鞘和腹斜肌融合線之閰\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060516-an-la-lu-location.jpeg\" alt=\"an-la-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-lu 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師將食指關節放在肋骨上方，將中指關節放在肋軟骨下方，這樣治療產生的摩擦也會涉及腹斜肌筋膜（針灸穴位SP 16) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060501-an-la-lu1-pave-treatment.jpeg\" alt=\"an-la-lu1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-lu 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用食指的指關節進行觸診驗證，一旦發現緻密化，可用肘部治療腹直肌鞘的側面（針灸穴位 SP 15）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060522-an-la-lu2-pave-treatment.jpeg\" alt=\"an-la-lu2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）锁骨中线与肋骨下缘的交点；\u003Cbr /\u003E2） 正对腹直肌鞘，在脐和肋缘的中点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100524-an-la-lu-o-pave.jpeg\" alt=\"an-la-lu-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用中指和无名指的指间关节按压肋骨边缘，保持肋骨位于两指指节之间，以免刺激骨膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100529-an-la-lu-o-treatment.jpeg\" alt=\"an-la-lu-o-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "AN-LA-PV 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腹直肌鞘外側/肚臍與恥骨之間；\u003C/li\u003E\u003Cli\u003E腹股溝韌上抵於恥骨結節\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EST27，大巨穴\u003C/li\u003E\u003Cli\u003EST30，氣沖穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腹痛，通常是單側臍下，往下肢放射，或下背痛，推間盤病變引起的放射痛，痛經等，坐下疼痛加劇\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-盆cf點包括兩個點：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E一個在腹直肌鞘上，恥骨與臍之間的中點，\u003C/li\u003E\u003Cli\u003E另一個在恥骨的外上緣。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E它對應針灸的大巨穴（ST 27）和氣沖穴（ST 30），以及Maigne 法指出的髂脊處的前支纖維肌痛的部位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090415-An-la-pv.jpeg\" alt=\"An-la-pv\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 1,2和3CF解剖位置。\u003Cbr /\u003Ean-me-pv 1 CF 在肚臍遠端和白線側邊。\u003Cbr /\u003E此 CF 通過腹直肌鞘協調 an-pv 和 me-pv 肌筋膜單元。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070537-an-me-pv-location.jpeg\" alt=\"an-me-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 2 CF 解剖位置•\u003Cbr /\u003Ean-me-pv 2 CF 位於肚臍和恥骨之間，稍微靠近臍下白線的側邊。此CF 控制腹直肌的前向動作和錐肌 （pyramidalis muscle）的内向動作，錐肌也被稱為白線的張力線。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070553-an-me-pv-location2.jpeg\" alt=\"an-me-pv-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 3 CF 解剖位置。\u003Cbr /\u003E腹外斜肌、腹斜肌和腹橫肌腱膜融合線，位於腹直肌的側邊。\u003Cbr /\u003Ean-me-pv 3 CF 接近恥骨，正好在錐肌上(me-pv) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070511-an-me-pv-location.jpeg\" alt=\"an-me-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pv 1和2的CF 解剖位置以及橫截面線。\u003Cbr /\u003E位於恥骨嵴水平的下腹部橫切面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pv 的 CF 位於白線和腹直肌鞘之間\u003C/li\u003E\u003Cli\u003Ean-la-pv 的 CF 位於腹直肌鞘、腹斜肌和腹橫肌三個筋膜融合線的側面。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060548-an-la-pv-location.jpeg\" alt=\"an-la-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pv 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E治療師操作腹部筋膜三層融合線，該融合線位於腹直肌側邊，從肚臍到腹股溝區的中線上（針灸穴位 SP 14）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060532-an-la-pv1-pave-treatment.jpeg\" alt=\"an-la-pv1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pv 2融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療方向從形成腹股溝管的腹部筋膜往恥骨聯合上緣進行操作（針灸穴位ST 30 • SP 13) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060555-an-la-pv2-pave-treatment.jpeg\" alt=\"an-la-pv2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）正对腹直肌鞘的外侧缘，在脐和耻骨之间的中点；\u003Cbr /\u003E2）正对着耻骨结节，位于腹股沟管上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100530-an-la-pv-o-pave.jpeg\" alt=\"an-la-pv-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，第一子单元用指节按摩腹直肌鞘，第二子单元按摩耻骨结节。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100536-an-la-pv-o-treatment.jpeg\" alt=\"an-la-pv-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-PV 障礙",
    "answer": "\u003Cp\u003Ean-la-pv 融合中心 （CF）的功能障礙。\u003Cbr /\u003E下腹區域劇烈疼痛或痙攣。下腹部有緊繃感或腫脹感。恥骨上有張力或緊繃。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060512-an-la-pv-cf.jpeg\" alt=\"an-la-pv-cf\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pv 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E當患者向前移動到一側時，要求患者指出感受到最大張力的部分。如果臍下腹直肌鞘緻密，則患者將指出其下腹的張力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060519-an-la-pv-move-a.jpeg\" alt=\"an-la-pv-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E脐下腹部疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E通常认为腹痛源于内脏，但实际上内脏很少受到神经刺激，而腹壁筋膜对张力变化却很敏感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100527-an-la-pv-o-cp.jpeg\" alt=\"an-la-pv-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-CX 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髂前上棘下方\u003C/li\u003E\u003Cli\u003E闊筋膜張肌與股直肌、縫匠肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EGB28，維道穴\u003C/li\u003E\u003Cli\u003E股直肌肌腱\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髖關節疼痛、大腿上部感覺失常，下背痛，大轉子滑囊炎等\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-髖cf點是下肢螺旋的一部分，根據執行動作的不同，它可以參與軀幹的短螺旋或長螺旋。\u003C/p\u003E\u003Cp\u003E前-外-髖cf點位於骼前上棘下方，在股直肌肌腱、縫匠肌肌腱（前一髖）與闊筋膜張肌（外--髖）之間。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的維道穴（GB 28）（位於帶脈上的穴位），以及 Cyriax 法中的一個治療大腿前部疼痛的部位®。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090422-An-la-cx.jpeg\" alt=\"An-la-cx\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cx 融合中心 （CF）解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cx CF 位於恥骨下支的側邊，來自me-cx（内收肌長肌和股薄肌）、an-cx和in-cx 肌筋膜單元的牽引匯聚於此。\u003C/li\u003E\u003Cli\u003Ean-la-cx CF 位於股直肌（an-cx）、縫匠肌和闊筋膜張肌之間的匯聚點。\u003C/li\u003E\u003Cli\u003Ean-me-cx CF 受到 an-me-ge CF 的牽引，並將這種牽引轉移到 an-me-pv CF針灸穴位 CV2）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070500-an-me-cx-location.jpeg\" alt=\"an-me-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cx 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cx CF 位於縫匠肌和闊筋膜張肌之間的溝中\u003C/li\u003E\u003Cli\u003Ean-me-cx CF 位於内收肌的恥骨附著處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060529-an-la-cx-location.jpeg\" alt=\"an-la-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cx 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用指關節在股直肌近端肌腱區域，縫匠肌和闊筋膜張肌之間，尋找一個緻密點（針灸穴位 ST 31）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060536-an-la-cx-pave-treatment.jpeg\" alt=\"an-la-cx-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）将肘放在骼前上棘的下方，在不同肌腱间移动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527110523-an-la-cx-o-pave.jpeg\" alt=\"an-la-cx-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧，治疗师用肘按摩肌腱和其上的支持带。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527110528-an-la-cx-o-treatment.jpeg\" alt=\"an-la-cx-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-CX 障礙",
    "answer": "\u003Cp\u003Ean-la-cx 融合中心 （CF）的功能障礙。\u003Cbr /\u003E由於股外側皮神經受刺激引起的大腿前外側區域疼痛和感覺異常。運動計劃的功能變弱和缺乏協調。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060509-an-la-cx-cp.jpeg\" alt=\"an-la-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cx 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E患者俯臥。在患者膝蓋彎曲的情況下，治療師向後和向内拉伸大腿。如果股直肌肌腱或闊筋膜張肌緻密，則患者會將骨盆從床上抬起以避免疼痛（Ely 氏測試）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060515-an-la-cx-move-p.jpeg\" alt=\"an-la-cx-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cx 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E患者仰臥。主動動作驗證是透過對整個伸展下肢的前側動作施加阻力來進行的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060522-an-la-cx-move-a.jpeg\" alt=\"an-la-cx-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E臀部痛，以及感觉异常性股痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E推动大腿做前向运动（缝匠肌，股直肌）和外向运动（阔筋膜张肌）的力汇聚于髂前上棘下；这些肌腱的汇聚并非偶然形成，是复杂运动中运动同步的必要条件。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527110517-an-la-cx-o-cp.jpeg\" alt=\"an-la-cx-o-cp\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-LA-GE 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髕骨外側！股外側肌上\u003C/li\u003E\u003Cli\u003E髕骨肌腱旁\u003C/li\u003E\u003Cli\u003E脛骨前肌在脛骨平面上的植入點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EST34，梁丘穴\u003C/li\u003E\u003Cli\u003EST35，犢異穴\u003C/li\u003E\u003Cli\u003EST36，足三里穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髕骨肌腱、膝關節失控，小腿疼痛無力感，下樓梯膝痛、久站膝痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-膝cf點由3個點構成：第一個在髕骨外上緣與股外側肌之間，第二個在髕腱外側，而第三個在排骨頭與脛骨粗隆之間。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的梁丘、犢鼻和足三里穴（ST 34、35 和 36），還對應髕骨半脫位或因髕骨支持帶紊亂引起的膝關節假性交鎖的治療部位\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090427-An-la-ge.jpeg\" alt=\"An-la-ge\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 1,2 和3CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-ge 1 CF 位於股內側肌的肌腱通道\u003C/li\u003E\u003Cli\u003Ean-me-ge 2 CF 位於內側副韌帶\u003C/li\u003E\u003Cli\u003Ean-me-ge 3 CF 位於鵝足肌腱上方\u003C/li\u003E\u003Cli\u003Ean-me-ge 3 CF 受到 an-me-ta CF 的牽引，這驗證了對角線的連接。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070531-an-me-ge-location.jpeg\" alt=\"an-me-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ge 2 CF 解剖位置。\u003Cbr /\u003Ean-me-ge CF 位於内側髕骨支持帶上，與股内側肌的肌纖維和縫匠肌的肌腱延伸直接相連。\u003Cbr /\u003Ean-la-ge CF 位於髕骨外側支持帶上，與股外側肌的肌纖維和髂脛束的前延伸直接相連。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070548-an-me-ge-location2.jpeg\" alt=\"an-me-ge-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ge 1 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E股骨的遠端三分之一處橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ge 1的CF位於股外側肌的肌腱通道\u003C/li\u003E\u003Cli\u003Ean-me-ge 1 AJ CF 位於股内側肌的肌腱通道\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060522-an-la-ge-location.jpeg\" alt=\"an-la-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ge 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E膝蓋在股骨髁水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ge 2 CF 位於髕骨支持帶的外側束\u003C/li\u003E\u003Cli\u003Ean-me-ge 2 CF 位於内側髕骨支持帶\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060540-an-la-ge-location2.jpeg\" alt=\"an-la-ge-location2\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-la-ge 3 的CF 解剖位置和大腿外側區域的闊筋膜張肌。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ge 1 的CF\u003C/li\u003E\u003Cli\u003Ean-la-ge 2 的 CF\u003C/li\u003E\u003Cli\u003Ean-la-ge 3 CF 位於脛前肌和伸趾長肌的近端肌腱之間，在股四頭肌肌腱的纖維延伸處。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060559-an-la-ge-location3.jpeg\" alt=\"an-la-ge-location3\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-la-ge 1 融合中心（CF）的治療。\u003Cbr /\u003E患者仰臥。用指尖沿著股外側肌的肌腱通道，準確地說是在髕骨上緣上方（針灸穴位 ST 34），尋找最緻密和最敏感的點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060530-an-la-ge1-treatment.jpeg\" alt=\"an-la-ge1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ge 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師沿著膝關節外側緣（外側副韌帶、髕骨支持帶和關節囊）觸診筋膜結構以治療任何緻密化的位置（針灸穴位 ST35) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060548-an-la-ge2-pave-treatment.jpeg\" alt=\"an-la-ge2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ge 3 融合中心 （CF）的觸診驗證與治療。\u003C/p\u003E\u003Cp\u003E患者仰臥。治療師使用指尖或指關節來檢查髂脛束的肌腱纖維和脛骨前肌是否有任何緻密組織（針灸穴位 ST 36）。這種增厚會刺激高爾基氏肌腱器官，導致肌腱不適。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060506-an-la-ge2-pave-treatment.jpeg\" alt=\"an-la-ge2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）髌骨上缘和外缘之间，股外侧肌止点；\u003Cbr /\u003E2）髌韧带外侧；\u003Cbr /\u003E3）胫骨粗隆外侧面胫骨前肌止点上。\u003Cbr /\u003E注意：第一子单元与前-内-膝的螺旋线相连续，但在纵向上它是附着于斜向胶原纤维的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100546-an-la-ge-o-pave.jpeg\" alt=\"an-la-ge-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，治疗师用指间关节按压，力度深入到胶原纤维与腱纤维之间，在小凹陷内寻找颗粒状组织。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100552-an-la-ge-o-treatment.jpeg\" alt=\"an-la-ge-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-GE 障礙",
    "answer": "\u003Cp\u003Ean-la-ge 融合中心 （CF）的功能障礙。\u003Cbr /\u003E膝關節前外側部位疼痛和腫脹。下肢功能障礙。患者感覺好像膝蓋周圍有一條緊繃帶，且關節是僵硬的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060558-an-la-ge-cp.jpeg\" alt=\"an-la-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ge 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者仰臥。為了拉緊筋膜和側副韌帶，治療師用一手向内拉患者的腳，同時用另一手將患者的膝蓋向外推。應注意由於這種內翻應力引起的關節邊緣間隙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060503-an-la-ge-move-a.jpeg\" alt=\"an-la-ge-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ge 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者仰臥。當治療師在足部施加阻力時，患者將伸展的腿向前外側移動。要求患者指出感到疼痛的點，或者是否有「軟腳」的感覺。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060511-an-la-ge-move-a-2.jpeg\" alt=\"an-la-ge-move-a-2\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E膝部的前-外痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E膝痛通常是由肌筋膜单元功能障碍引起，但有时由髌支持带与股四头肌（前）和股二头肌（外）运动不同步造成。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100543-an-la-ge-o-cp.jpeg\" alt=\"an-la-ge-o-cp\" /\u003E\u003C/p\u003E"

=\"https://github.com/piccture74/twpic/raw/master/images/20260519060505-an-la-ta2-pave-treatment.jpeg\" alt=\"an-la-ta2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）腓骨前缘，第3腓骨肌起点上；\u003Cbr /\u003E2）腓骨前缘，上支持带的胶原纤维上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100507-an-la-ta-o-pave.jpeg\" alt=\"an-la-ta-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧于治疗床上，放松小腿内侧，治疗师沿着腓骨前-外缘松解筋膜，操作较致密或颗粒状的点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100512-an-la-ta-o-treatment.jpeg\" alt=\"an-la-ta-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-la-ta 融合中心 （CF）的功能障礙。\u003Cbr /\u003E下肢緊繃和無力。腳踝運動不協調。腓骨骨膜過度敏感。這是腳踝扭傷的後果。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060533-an-la-ta-cp.jpeg\" alt=\"an-la-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ta 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003Ean-la-ta 1 和 2 CF 的動作驗證與對 an-la-pe 1、2和3 CF 描述的相同，但患者大多感到小腿外側緊繃。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060538-an-la-ta-move-a.jpeg\" alt=\"an-la-ta-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E此CF功能障碍会引起远侧疼痛，同时大多数 CF 因邻近关节或感知中心（CP），也会出现局部疼痛。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E足踝扭伤可造成伸肌鞘和第3腓骨肌拉伸，并引起支持带下的各种修复性粘连。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100503-an-la-ta-o-cp.jpeg\" alt=\"an-la-ta-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-PE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E外踝和趾伸肌肌腱之間；\u003C/li\u003E\u003Cli\u003E第4-5跖骨溝近端中點和遠端中點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EST41，解溪穴；\u003C/li\u003E\u003Cli\u003EGB41，足臨泣穴；\u003C/li\u003E\u003Cli\u003EGB42，地五會穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E踝關節扭傷，足部前外側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-足cf點由3個點構成：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一個在外踝與伸肌腱之間，\u003C/li\u003E\u003Cli\u003E第二個在第四跖骨基底，\u003C/li\u003E\u003Cli\u003E而第三個在第四跖骨頭水平。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點對應針灸的解溪和沖陽穴（ST 41、42）及地五會穴（GB 42）（前往大敦穴的絡脈由此發出），還對應 Cyriax法中用於治療跗骨間韌帶損傷的部位®。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090437-An-la-pe.jpeg\" alt=\"An-la-pe\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 1,2和3CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pe 1 CF 位於伸肌支持帶上束\u003C/li\u003E\u003Cli\u003Ean-me-pe 2 CF 位於支持帶的下束\u003C/li\u003E\u003Cli\u003Ean-me-pe 3 CF 位於脛前肌的終止點處\u003C/li\u003E\u003Cli\u003E形成an-me-pe CF 的足部肌肉在遠端方向牽引前内向對角線\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070519-an-me-pe-location.jpeg\" alt=\"an-me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pe CF 位於伸肌支持帶的上束和下束，靠近內踝前緣：\u003Cul\u003E\u003Cli\u003Ean-me-pe 1 CF 位於十字支持帶上束的内部。\u003C/li\u003E\u003Cli\u003Ean-me-pe 2 CF 位於同支持帶下束的内部。\u003C/li\u003E\u003Cli\u003Ean-me-pe 3 CF 位於支持帶下束的附著處。\u003C/li\u003E\u003C/ul\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-me-pe-location2.jpeg\" alt=\"an-me-pe-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 1 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E足部在距骨、舟狀骨和骰骨的水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-pe 1的CF 位於伸肌支持帶的外側束\u003C/li\u003E\u003Cli\u003Ean-me-pe 的CF 位於伸肌支持帶的内側束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060531-an-la-pe-location.jpeg\" alt=\"an-la-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 2的CF 解剖位置以及和CC（協調中心）的相對關係。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-pe 1 CF 位於伸肌支持帶上，靠近外踝。\u003C/li\u003E\u003Cli\u003Ean-la-pe 2的CF 位於第4和第5蹠骨之間，靠近它們的基部。\u003C/li\u003E\u003Cli\u003Ean-la-pe 3的 CF 位於第4 和第5之間的蹠骨，靠近蹠骨頭部。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060548-an-la-pe-location2.jpeg\" alt=\"an-la-pe-location2\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-la-pe 3的CF 解剖位置和腳的深背區筋膜。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-pe 1 的 CF\u003C/li\u003E\u003Cli\u003Ean-la-pe 2 的 CF\u003C/li\u003E\u003Cli\u003Ean-la-pe 3 的CF 位於第4 和第5蹠骨頭之間\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060509-an-la-pe-location3.jpeg\" alt=\"an-la-pe-location3\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean- la-pe 1 融合中心（CF）的治療。\u003Cbr /\u003E患者仰臥。治療師將指關節放在十字支持帶的上帶，對應於伸趾肌，並操作最緻密和最敏感的點（針灸穴位 ST 41、42）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060539-an-la-pe1-treatment.jpeg\" alt=\"an-la-pe1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用指尖尋找第四和第五蹠骨底部之間的緻密點，且繼續操作直到疼痛消失（針灸穴位 GB 41）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060556-an-la-pe2-pave-treatment.jpeg\" alt=\"an-la-pe2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用指尖或指節，操作在第四和第五腳趾的指關節根部，尋找疼痛與敏感的點（針灸穴位 GB 42・43）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060517-an-la-pe3-pave-treatment.jpeg\" alt=\"an-la-pe3-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）外踝与趾长伸肌腱之间；\u003Cbr /\u003E2）第45跖骨之间凹陷的近端；\u003Cbr /\u003E3）第4、5 跖骨之间凹陷的远端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100547-an-la-pe-o-pave.jpeg\" alt=\"an-la-pe-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者放松足部仰卧于治疗床上，治疗师松解十字韧带或第4、5 跖骨之间凹陷的足背筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100552-an-la-pe-o-treatment.jpeg\" alt=\"an-la-pe-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-LA-PE 障礙",
    "answer": "\u003Cp\u003Ean-la-pe 融合中心 （CF）的功能障礙。\u003Cbr /\u003E支持帶透過與高爾基體腱器官相互作用，在協調運動方面發揮著重要作用。伸肌支持帶的上束根據距骨的位置而改變肌腱的角度，而下束根據前足的位置與肌腱相互作用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060553-an-la-pe-cp.jpeg\" alt=\"an-la-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E患者仰臥。治療師抓住患者的前腳並向内與向下伸展。不論是否感到腳踝和前足外側區域疼痛或過度緊繃，均請患者告知。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060517-an-la-pe-move-p.jpeg\" alt=\"an-la-pe-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E患者仰臥。治療師從最大伸展位置，要求患者在前外側向上和向外移動他們的腳，抵抗治療師施加的阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060524-an-la-pe-move-a.jpeg\" alt=\"an-la-pe-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E足痛，脚趾、足痉挛，骨痂形成。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E伸肌下支持带与足背部筋膜相连续，任何纤维化都影响高尔基腱器官的功能，导致肌张力增高或降低。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100543-an-la-pe-o-cp.jpeg\" alt=\"an-la-pe-o-cp\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-SC 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鎖骨上窩，靠近頸部和鎖骨\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI17，天鼎穴\u003C/li\u003E\u003Cli\u003EST12，缺盆穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E放射性疼痛到手臂、肩胛和上胸段，胸廓出口綜合征\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-肩cf點位於鎖骨上窩，近斜方肌鎖骨附著處。它控制肩胛骨的外向運動或外展運動力量（斜方肌），以及前向運動力量（肩胛舌骨肌）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090442-An-la-sc.jpeg\" alt=\"An-la-sc\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-sc 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-sc 1 CF 位於胸小肌上段的肌腱通道上\u003C/li\u003E\u003Cli\u003Ean-me-sc 2 CF 靠近胸小肌中段的肌腱通道\u003C/li\u003E\u003Cli\u003Ean-la-sc 1 CF 位於中斜角肌\u003C/li\u003E\u003Cli\u003Ean-la-sc 2 CF 位於鎖骨上窩\u003C/li\u003E\u003Cli\u003E肩胛的 CF 受到來自肱骨的牽引力，然後分布到頸部的肌筋膜單元，反之亦然。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070541-an-me-sc-location.jpeg\" alt=\"an-me-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-sc 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E第二胸椎水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-sc 2 的 CF位於臂神經叢前方\u003C/li\u003E\u003Cli\u003Ean-me-cl 的 CF 位於SCM前方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060514-an-la-sc-location.jpeg\" alt=\"an-la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-sc 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用指尖在胸鎖乳突肌後緣後方的斜角肌筋膜上進行觸診驗證和治療（針灸穴位 LI 17）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060501-an-la-sc1-pave-treatment.jpeg\" alt=\"an-la-sc1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-sc 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師可使用食指和中指的指尖進行觸診和治療。指尖需要深入鎖骨上窩，沿著鎖骨上緣的一半，以尋找緻密點（針灸穴位 ST 12）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060521-an-la-sc2-pave-treatment.jpeg\" alt=\"an-la-sc2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E触诊验证\u003Cbr /\u003E1）触诊中斜角肌上方的纤维化；\u003Cbr /\u003E2）用示指插进锁骨上窝并对锁骨进行触诊（肋锁压迫）。\u003Cbr /\u003E患者主诉，颈部的后伸会加重手臂麻木（Adson 试验，用于评估胸廓出口\u003Cbr /\u003E综合征）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100516-an-la-sc-o-pave.jpeg\" alt=\"an-la-sc-o-pave\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者坐位，治疗师通过指尖触诊确定\u003Cbr /\u003E颈部纤维化点位后，就可以用食指指间关节进行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100521-an-la-sc-o-treatment.jpeg\" alt=\"an-la-sc-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-la-sc 融合中心 （CF）的功能障礙。\u003Cbr /\u003E上肢疲勞感。刺激臂叢神經。頸部肌肉痙攣，頸部運動僵硬。Adson 氏的胸廓出口症候群測試可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060544-an-la-sc-cp.jpeg\" alt=\"an-la-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-sc 融合中心 （CF）的動作驗證。\u003Cbr /\u003E類似於 Adson 的測試，是因頸肋或前、中肩胛肌緊張導致的鎖骨下動脈受壓的測試。治療師將患者的手臂向後移動（被動拉伸），同時將患者的頭部移動到另一側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060553-an-la-sc-move.jpeg\" alt=\"an-la-sc-move\" /\u003E\u003C/p\u003E\u003Cp\u003E融合中心及相关 CC\u003Cbr /\u003E疼痛部位：\u003Cbr /\u003E斜角肌综合征，颈肋异常伴有臂丛神经受压。\u003Cbr /\u003E功能障碍的起源或 CF：\u003Cbr /\u003E筋膜鞘将臂丛完全包裹，使其与周围分离，任何筋膜粘连都会阻碍神经传导。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100512-an-la-sc-o-cp.jpeg\" alt=\"an-la-sc-o-cp\" /\u003E\u003C/p\u003E"

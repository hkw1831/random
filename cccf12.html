  {
    "question": "LA-TH 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E豎脊肌與斜方肌外側，T8-T9水平的胸髂肋肌上\u003C/li\u003E\u003Cli\u003EBL46，膈關穴\u003C/li\u003E\u003Cli\u003E胸髂肋肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E胸部的外向運動（側屈）由單關節肌（棘突間肌、橫突間肌和肋間肌）和雙關節肌（鏘肪肌、斜方肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在斜方肌下緣之下的胸餎肋肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080427-La-th.jpeg\" alt=\"La-th\" /\u003E\u003C/p\u003E\u003Cp\u003E後側胸節段進行協調中心的比較性觸出診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eer-th 位於肩骨水平高度，單關節（後上鋸肌）和雙關節（髂肋肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-th 位於第4 胸椎水平高度，單關節（胸多裂肌）和雙關節（最長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-th 位於第8 和第 10肋骨之間，單關節（棘突間肌）和雙關節（胸髂肋肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100550-re-th-location.jpeg\" alt=\"re-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鋸筋膜的牽拉來自於往頭側方向的後上鋸肌和往尾側方向的下後上鋸肌 （er-th, er-lu) •\u003C/li\u003E\u003Cli\u003E深筋膜的牽拉來自於往頭側的頸脊肌和往尾側的脊肌 （re-th 和 re-lu）。\u003C/li\u003E\u003Cli\u003E胸腰筋膜外側部分的牽拉來自於往頭側的髂肋肌和往尾側的腰方肌 （la-th 和 la-lu) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010534-la-th-location.jpeg\" alt=\"la-th-location\" /\u003E\u003Cbr /\u003E第2胸椎水平的胸壁橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-th 的 CC 位於沿髂肋肌 （iliocostalis muscle） 嵌入第7、8和9肋骨的更遠側處。\u003C/li\u003E\u003Cli\u003Ere-th 的 CC 位於斜方肌和豎脊肌上方，在第4 和第5胸椎的水平。\u003C/li\u003E\u003Cli\u003Eer-th 的 CC 位於菱形肌和後上鋸肌(serratus posterior superior muscles）上方，與闊背肌一起向前延伸。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070546-er-th-location.jpeg\" alt=\"er-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-th 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E用中間三指的指尖或用指關節進行觸診驗證。從肩胛骨的下角開始，這個協調中心位於髂肋肌匯入肋骨的位置（針灸穴位 BL 48 • BL 49 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010529-la-th-pave.jpeg\" alt=\"la-th-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-th 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，手臂沿身體一側伸展。\u003Cbr /\u003E使用肘部在髂肋胸肌附著肋骨和胸腰筋膜隔室的位置施加摩擦，這裡肌肉層非常薄，因此只應施加適度的壓力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010540-la-th-treatment.jpeg\" alt=\"la-th-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，将双臂置于体侧，治疗师用肘关节作用于斜方肌下行纤维和背阔肌之间的间隔，靠近肩胛骨下角处。对骼肋肌腱嵌入附着点局部、变化最大的肌筋膜点进行\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120547-la-th-o-treatment.jpeg\" alt=\"la-th-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "LA-TH 障礙",
    "answer": "\u003Cp\u003Ela-th 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E疼痛位於後外側胸壁。它可以是單邊的或雙邊的，而且也可以是持續性或偶發性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010516-la-th-cp.jpeg\" alt=\"la-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-th 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E一般來說，胸痛會隨著咳嗽或拉伸髂肋肌的姿勢而加重，例如側屈或側臥。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010522-la-th-pamo.jpeg\" alt=\"la-th-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E一侧的疼痛可以牵涉到前面，有些时候可导致代偿性体位。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E髂肋肌筋膜由肌间隔将其与最长肌分隔开，该结构的纤维化可以被体位代偿所掩盖。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120538-la-th-o-cp.jpeg\" alt=\"la-th-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者侧弯胸部，将手高举过头并保持该姿势，以此来牵张骼肋肌纤维。\u003Cbr /\u003E该测试可进行主动运动或被动加压运动\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120542-la-th-o-move.jpeg\" alt=\"la-th-o-move\" /\u003E\u003C/p\u003E"

    "question": "ME-TH 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E整個胸骨尋找致密點\u003C/li\u003E\u003Cli\u003ECV16，中庭穴\u003C/li\u003E\u003Cli\u003E劍突\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前胸的內向運動是指胸骨筋膜在兩團胸大肌之間拉緊。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在胸骨上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080436-Me-th.jpeg\" alt=\"Me-th\" /\u003E\u003C/p\u003E\u003Cp\u003E前側胸部節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-th 的CC位於胸骨，由兩個胸大肌組成的向量在此處匯聚。\u003C/li\u003E\u003Cli\u003Eir-th 的 CC 位於乳房下方，這裡是單關節（肋間肌）及雙關節向量（胸大肌下部）的匯合處。\u003C/li\u003E\u003Cli\u003Ean-th 的CC 位於劍突的一側，單關節（胸骨肌）及雙關節向量（腹直肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080523-an-th-location.jpeg\" alt=\"an-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拉緊臍上白線，其上方錨定至胸骨，下方錨定至腹直肌鞘（me-th, me-lu） 的肌腱交叉處。\u003C/li\u003E\u003Cli\u003E前鋸肌在頭側方向牽引，而腹斜肌本身（ir-th，ir-lu）向尾端方向施加的腹斜肌筋膜牽引。\u003C/li\u003E\u003Cli\u003E胸大肌在頭側方向牽引腹直肌鞘，在同一腹直肌（an-th, an-lu） 的肌腱交叉處向尾側牽引腹直肌鞘。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090507-me-th-a-location.jpeg\" alt=\"me-th-a-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在第三胸椎水平的胸壁的横截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-th 後側的 CC 位於胸椎的棘上韌帶(supraspinous ligaments) 上。me-th 的前側 CC 位於穿過胸骨的韌帶上。\u003C/li\u003E\u003Cli\u003Eir-th 的CC 位於乳房下方，在胸大肌筋膜和腹斜肌筋膜之間的通道上。\u003C/li\u003E\u003Cli\u003Ean-th 的CC位於劍突側邊肋骨上，腹直肌在肋骨的附著處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060557-ir-th-location.jpeg\" alt=\"ir-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-th 協調中心（CC）的觸診驗證和治療。\u003C/p\u003E\u003Cp\u003E此CC 的觸診驗證和治療是相似的。治療師使用指關節，在相對於胸骨韌帶對齊的橫向方向上產生摩擦（近端針灸穴位 CV20、針灸穴位 CV 18、遠端針灸穴位 CV16) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090515-me-th-a-pave-treatment.jpeg\" alt=\"me-th-a-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E前部治疗\u003Cbr /\u003E内-胸节段的治疗：\u003Cbr /\u003E用中间三个手指尖沿着胸骨中缝触诊，在最痛点进行手法治疗。在评估量表中记录：内-胸1，胸骨柄上的CC；内-胸2，乳头之间的协调中心；\u003Cbr /\u003E内-胸3剑突上的协调中心。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110527-me-th-o-treatment-a.jpeg\" alt=\"me-th-o-treatment-a\" /\u003E\u003C/p\u003E"

    "question": "ME-THr 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸段棘上韌帶全部觸診，找到致密點\u003C/li\u003E\u003Cli\u003EGV12，身柱穴\u003C/li\u003E\u003Cli\u003E胸4棘間韌帶\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這些矢量力的cc 點位於第四胸椎棘上韌帶和棘間韌帶之上（所有軀幹上的內向運動 cc 點都有一個主要點和一些位於近端和遠端的次要點）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080444-Me-th-r.jpeg\" alt=\"Me-th-r\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003Cbr /\u003E腰椎的棘上韌帶是胸椎韌帶的延續。所有棘上韌帶都與椎旁肌肉的筋膜相連。在腰部區域，胸腰筋膜的一些膠原纖維從一側到另一側跨越棘上韌帶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090524-me-th-r-location.jpeg\" alt=\"me-th-r-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-th r 協調中心 （CC）的觸診驗證和治療。\u003Cbr /\u003E患者俯臥。用指關節刺入胸椎的棘突之間，橫向鬆動通過觸診確定為最敏感的韌帶部分（針灸穴位 GV 13p、GV11、GV9 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090532-me-th-r-pave-treatment.jpeg\" alt=\"me-th-r-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E后部治疗\u003Cbr /\u003E内-胸-背侧的治疗：\u003Cbr /\u003E躯干的内向运动筋膜单元对垂直方向的感觉有着重要的影响。在评估量表中，对协调中心的定义和记录\u003Cbr /\u003E如下：\u003Cbr /\u003E内-胸-背侧1,CC 位于第3胸椎韧带上的；内-胸-背侧2,CC位于第4\u003Cdel\u003E5胸椎韧带上；内-胸-背侧3,CC位于第7\u003C/del\u003E9胸椎韧带\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110535-me-th-o-treatment-p.jpeg\" alt=\"me-th-o-treatment-p\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E肋緣與髂脊之間的區域，腰方肌外側緣\u003C/li\u003E\u003Cli\u003EBL52，志室穴\u003C/li\u003E\u003Cli\u003E腰方肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腰部的外向運動（向一側側曲）由單關節肌（腰方肌）和雙關節肌（篠肋肌、 腹斜肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在腰方肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080452-La-lu.jpeg\" alt=\"La-lu\" /\u003E\u003C/p\u003E\u003Cp\u003E後側腰節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-lu 位於第一腰椎的水平高度，單關節（多裂肌）和雙關節（最長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-lu 位於第12肋下方，單關節（後下鋸肌）和雙關節（内斜肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-lu 位於豎脊肌鞘的一側，單關節（腰方肌）和雙關節（髂肋肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100502-re-lu-location.jpeg\" alt=\"re-lu-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腹內斜肌向頭側方向牽拉，臀中肌向尾側方向牽拉 （er-lu, er-pv）。\u003C/li\u003E\u003Cli\u003E胸腰筋膜的牽拉來自往頭側和尾側的骶棘肌(re-lu, re-pv) •\u003C/li\u003E\u003Cli\u003E外側腰薦筋膜的牽拉來自往頭側的腰方肌和往尾側的臀大肌 （la-lu, la-pv）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010538-la-lu-location.jpeg\" alt=\"la-lu-location\" /\u003E\u003Cbr /\u003E中腹區域在臍部正上方的水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-lu 的CC位於腰方肌筋膜上，與髂肋肌腱 （tendon of the iliocostalismuscle）相連。\u003C/li\u003E\u003Cli\u003Ere-lu 的CC 位於大部分多裂肌（multifidus）、最長肌 （longissimus）和脊肌 （spinalis） 上。肌間隔膜將這些肌肉的筋膜與髂肋肌分開。\u003C/li\u003E\u003Cli\u003Eer-lu的CC位於腹斜肌附著於第十二肋骨處。這些肌肉的筋膜在內側與後下鋸肌 （serratus posteriorinferior）的筋膜相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070521-er-lu-location.jpeg\" alt=\"er-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-lu 協調中心 （CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E為了能夠同時對 la-lu、re-lu 和 er-lu 協調中心進行比較觸診，對la-lu（針灸穴位 BL 52）的協調中心進行觸診驗證時，患者採俯臥位置。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010533-la-lu-pave.jpeg\" alt=\"la-lu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-lu 協調中心（CC）的治療。\u003C/p\u003E\u003Cp\u003E患者側臥，上肢高舉過頭。\u003Cbr /\u003E將肘部靠在腰方肌筋膜上，朝向骼嵴。由於腰方肌位於較深的位置，此處應施加較大的壓力，徒手鬆動在肋骨和髂嵴之間進行，因此只能以橫向施加（參考箭頭方向）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-la-lu-treatment.jpeg\" alt=\"la-lu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧，治疗师用肘关节置于第12\u003Cbr /\u003E肋和髂嵴之间，向近端和远端方向分别进行对抗腰方肌治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120518-la-lu-o-treatment.jpeg\" alt=\"la-lu-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ela-lu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E如果兩個 la-lu 肌筋膜單元緻密，則疼痛會在整個腰薦部區域。如果只有一個 la-lu 肌筋膜單元緻密，則疼痛會局限在一側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010525-la-lu-cp.jpeg\" alt=\"la-lu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-lu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E這個肌筋膜單元造成的張力代償會在筋膜被拉長或縮短時出現，當患者側睡時，疼痛在夜間加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010528-la-lu-pamo.jpeg\" alt=\"la-lu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位和起源\u003Cbr /\u003E疼痛部位或感知中心；\u003Cbr /\u003E腰痛、下腰痛、骶髂关节炎及其他各种局限在腰背部的疼痛，或发生在单侧，或较为少见的发生在双侧。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E筋膜纤维化决定了一侧或双侧腰方肌的痉挛，随之而来的是椎间盘压缩。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120509-la-lu-o-cp.jpeg\" alt=\"la-lu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者身体侧屈，上臂置于身体两侧，比较患者向左和向右运动，观察运动范围的差异，并询问患者在牵伸运动时是否感觉到两边有不同。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120514-la-lu-o-move.jpeg\" alt=\"la-lu-o-move\" /\u003E\u003C/p\u003E"

003C/p\u003E\u003Cp\u003E前部治疗\u003Cbr /\u003E内-腰的治疗：\u003Cbr /\u003E大家普遍认为内脏问题引发腹痛，然而，单独的腹肌紧张也常可引发。肌肉紧张可导致疼痛和肠道功能问题（内-腰1，剑突下方；内-腰2，剑突和肚脐之间；内-腰3，肚脐上方）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110544-me-lu-o-treatment-a.jpeg\" alt=\"me-lu-o-treatment-a\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E腰段棘上韌帶全部觸診，找到致密點\u003C/li\u003E\u003Cli\u003EGV4，命門穴\u003C/li\u003E\u003Cli\u003E腰2棘間韌帶\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這些力的 cc 點在腰的辣間韌帶上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090405-Me-lu-r.jpeg\" alt=\"Me-lu-r\" /\u003E\u003C/p\u003E\u003Cp\u003E後側骨盆節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-pv 位於髂腰韌帶上，單關節（多裂肌）和雙關節（最長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-pv 位於髂嵴的最高點（頂峰）下方，單關節（臀中肌）和雙關節（臀大肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-pv 位族臀大肌的上縁，單關節（臀中肌）和雙關節（臀大肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100520-re-pv-location.jpeg\" alt=\"re-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E中層深筋膜的牽拉來自於往頭側的臀中肌，以及往尾側的梨狀肌和孖肌。（er-pv，er-cx) •\u003C/li\u003E\u003Cli\u003E上層深筋膜的牽拉來自於往頭側的臀大肌和遠端方向的闊筋膜張肌 （la-pv, la-cx）。\u003C/li\u003E\u003Cli\u003E薦椎結節韌帶的牽拉來自於往頭側的骶棘肌和遠端方向的臀大肌 （re-pv, re-cx）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010538-la-pv-location.jpeg\" alt=\"la-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003E下腹區域在恥骨的水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-pv 的 CC 位於臀大肌的外緣，此肌肉的筋膜與臀中肌的外向運動單元連接。\u003C/li\u003E\u003Cli\u003Ere-pv 的CC 位於腰背腱膜上，覆蓋多裂肌和薦棘肌 （sacrospinal muscles）（髂肋肌和最長肌），也稱為豎脊肌。\u003C/li\u003E\u003Cli\u003Eer-pv 的CC 位於臀中肌的筋膜上，在其近端具有真正的腱膜外觀。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070552-er-pv-location.jpeg\" alt=\"er-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-lu r 協調中心 （CC）的觸診驗證和治療。\u003Cbr /\u003E患者俯臥。如果腰椎棘上韌帶特別疼痛，那麼治療師應該首先操作 re-lu 或 la-lu 的CC，因為該韌帶的超敏反應通常是由於椎旁肌肉組織的僵硬。隨後，如果韌帶仍然敏感（針灸穴位 VG 8p、VG6、VG 5d），則可以對其進行治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090523-me-lu-p-pave-treatment.jpeg\" alt=\"me-lu-p-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E后部治疗\u003Cbr /\u003E内-腰-背侧治疗：\u003Cbr /\u003E如患者棘上韧带非常敏感，在第一个疗程，间接治疗椎体旁附着于这些韧带上的肌肉；通过将肌肉弹性恢复，使得椎体和韧带的敏感性快速降低。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110555-me-lu-o-treatment-p.jpeg\" alt=\"me-lu-o-treatment-p\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E大轉子和髂後上棘的中點，臀大肌和臀中肌間溝，S2水平\u003C/li\u003E\u003Cli\u003EBL54，秩邊穴\u003C/li\u003E\u003Cli\u003E臀中肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E骨盆的外向運動（在負重時穩定骨盆）由單關節肌（臀中肌）和雙美節肌（臀大肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在臀大肌的上緣。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090413-La-pv.jpeg\" alt=\"La-pv\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E中層深筋膜的牽拉來自於往頭側的臀中肌，以及往尾側的梨狀肌和孖肌。（er-pv，er-cx) •\u003C/li\u003E\u003Cli\u003E上層深筋膜的牽拉來自於往頭側的臀大肌和遠端方向的闊筋膜張肌 （la-pv, la-cx）。\u003C/li\u003E\u003Cli\u003E薦椎結節韌帶的牽拉來自於往頭側的骶棘肌和遠端方向的臀大肌 （re-pv, re-cx）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010538-la-pv-location.jpeg\" alt=\"la-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-pv 協調中心（CC）的觸診驗證。\u003Cbr /\u003E最好在患者側臥時對這個協調中心進行觸診驗證，因為這個位置有利於與 la-lu 和 er-pv 的協調中心進行比較性觸診。la-pv 的CC位於臀大肌的上緣（針灸穴位 BL54) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010533-la-pv-pave.jpeg\" alt=\"la-pv-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-pv 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，治療師站在患者身後，並在臀大肌上經常收縮的點施加摩擦，壓力必須非常大（5），特別是健壯的患者。\u003Cbr /\u003E最初可以在相對於肌肉纖維的橫向方向上進行鬆動術，然後逐步探索所有的方向。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-la-pv-treatment.jpeg\" alt=\"la-pv-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧在非痛侧，筋膜治疗师用肘关节置于臀大肌上缘，位于股骨大转子和髂后上棘连线中点处，在纤维化最明显的点上进行治疗。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527120502-la-pv-o-treatment.jpeg\" alt=\"la-pv-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E肚臍到恥骨聯合之間區域全部觸診，找到致密點\u003C/li\u003E\u003Cli\u003ECV3，中極穴\u003C/li\u003E\u003Cli\u003E腹白線\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這些力的cc 點在拉緊腹白線的錐狀肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090421-Me-pv.jpeg\" alt=\"Me-pv\" /\u003E\u003C/p\u003E\u003Cp\u003E骨盆前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-pv 的 CC 位於髂嵴遠端，單關節（臀小肌）和雙關節向量（腹斜肌和闊筋膜張肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Ean-pv 的CC 位於髂前上棘內側，單關節（骼骨）和雙關節向量（腹斜肌和腹直肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-pv的CC位於白線的臍下束，單關節（錐肌）及雙關節向量（腹直肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080522-an-pv-location.jpeg\" alt=\"an-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E臍下白線，骨盆區；恥骨前方，一些股薄 肌纖維嵌入這條白線（me-pv，me-cx）。\u003C/li\u003E\u003Cli\u003E大腿水平的髂腰肌筋膜，與股內側肌筋膜連續不間斷（an-pv，an-cx）。\u003C/li\u003E\u003Cli\u003E臀小肌或闊筋膜張肌的筋膜，通過腹股溝韌帶與恥骨筋膜和内收大肌相連 （ir-pv, ir-cx) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090518-me-pv-a-location.jpeg\" alt=\"me-pv-a-location\" /\u003E\u003C/p\u003E\u003Cp\u003E下腹或恥骨上區緊接恥骨上方的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-pv後側的CC位於薦椎的棘上韌帶上；me-pv 的前側 CC 位於下腹白線。\u003C/li\u003E\u003Cli\u003Eir-pv 的CC 位於緊鄰髂嵴的遠端，在臀小肌和臂中肌的筋膜上。\u003C/li\u003E\u003Cli\u003Ean-pv 的CC 位於髂肌的方向，因為它與腹直肌協同作用，是骨盆前部的原動力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060538-ir-pv-location.jpeg\" alt=\"ir-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-pv 協調中心（CC）的觸診驗證和治療。\u003Cbr /\u003E患者仰臥・此CC 的觸診驗證是用指尖進行的，但使用指關節進行治療，因為該區域淺筋膜的厚度使其難以到達腹白線的深度（針灸穴位 VC 7p，VC5,VC3d）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090526-me-pv-a-pave-treatment.jpeg\" alt=\"me-pv-a-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E前部治疗\u003Cbr /\u003E内-盆2的治疗：\u003Cbr /\u003E根据受限方向，用指尖将腹白线向左或右牵拉。如同在胸部，确定并记录CC 如下：内-盆1，肚脐下的CC；内-盆2，肚脐下与耻骨联合上的两个点之间，内-盆3，耻骨联合上方的CC。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110501-me-pv-o-treatment-a.jpeg\" alt=\"me-pv-o-treatment-a\" /\u003E\u003C/p\u003E"

60519010511-la-cx-pave.jpeg\" alt=\"la-cx-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cx 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥在非患側，臀部略微彎曲。治療師站在患者面前，用肘部在觸診驗證過程中確定的點上施加摩擦。儘管闊筋膜張肌是一塊小肌肉，但壓力必須很大，因為這塊肌肉對於鬆動術而言特別頑強。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010521-la-cx-treatment.jpeg\" alt=\"la-cx-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者于非疼痛侧侧卧，治疗师将肘关节置于阔筋膜张肌肌腹上，对于影响深筋膜弹性的纤维性结节进行手法处理，同样处理内侧筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010541-la-cx-o-treatment.jpeg\" alt=\"la-cx-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "LA-CX 障礙",
    "answer": "\u003Cp\u003Ela-cx 肌筋膜單元的疼痛部位感知中心 （CP）。\u003Cbr /\u003E與闊筋膜張肌相關的痙攣、感覺異常和干擾、麻痛性股痛、髖部疼痛和下肢無力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010559-la-cx-cp.jpeg\" alt=\"la-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cx 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003Ela-cx 肌筋膜單元的張力代償患者會呈現軟腳無力，似乎無法支撐自己的體重。當髖關節外展疼痛時，會避免這種運動，導致關節運動範圍逐漸喪失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010504-la-cx-pamo.jpeg\" alt=\"la-cx-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E大腿外侧感觉异常，阔筋膜张肌的疼痛和痉挛感觉。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E股皮神经出现的感觉异常性疼痛可以是筋膜牵拉的结果，原因是阔筋膜张肌过度紧张。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010532-la-cx-o-cp.jpeg\" alt=\"la-cx-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E患者取站立位，外展疼痛下肢，阔筋膜张肌的痉挛会再现，或者可以观察到两侧髋关节活动范围不一致。在其他时候，疼痛会放射至整个外侧运动序列中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010536-la-cx-o-move.jpeg\" alt=\"la-cx-o-move\" /\u003E\u003C/p\u003E"

    "question": "ME-CX 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿內側近端1/3處，股薄肌上\u003C/li\u003E\u003Cli\u003ELR10，足五里穴\u003C/li\u003E\u003Cli\u003E內收肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E部的內向運動（大腿內收）由單關節肌（長收肌、短收肌和大收肌）和雙關節肌（股薄肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點位於股薄肌的前緣、近端1/3處\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090441-Me-cx.jpeg\" alt=\"Me-cx\" /\u003E\u003C/p\u003E\u003Cp\u003E髖部節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cx 的CC 位於腹股溝韌帶的遠端，單關節（内收長肌）和雙關節向量（髂腰肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-cx 的CC 位於股薄肌/內收肌上，單關節（内收長肌）和雙關節向量（股薄肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-cx 的 CC 位於 Scarpa 三角形（股三角形）的頂點，在那裡單關節（恥骨肌）和雙關節向量（内收大肌）匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090516-an-cx-location.jpeg\" alt=\"an-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E通過内收肌的起點向近端方向牽引内收肌筋膜，並通過嵌入這些相同的肌肉（me-cx、me-ge） 向遠端方向牽引内收肌筋膜。\u003C/li\u003E\u003Cli\u003E骼腰肌對闊深筋膜（deep fascia lata）的近端牽引和股中間肌（an-cx, an-ge）的遠端牽引。\u003C/li\u003E\u003Cli\u003E恥骨肌對股骨内收肌膜（内收肌管上的筋膜）和肌間隔施加近端牽引力，而股内側肌施加遠端牽引力 （ir-cx，ir-ge）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090532-me-cx-location.jpeg\" alt=\"me-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E大腿近端在股骨頸水平的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cx 的 CC 位於骼腰肌腱膜，在縫匠肌鞘的内側。\u003C/li\u003E\u003Cli\u003Eir-cx 的 CC 位於恥骨筋膜的末端部分，覆蓋在内收長肌和内收短肌的筋膜上。\u003C/li\u003E\u003Cli\u003Eme-cx 的 CC 位於股薄肌鞘，反過來，它涵蓋了内收大肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060546-ir-cx-location.jpeg\" alt=\"ir-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cx 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E尋找股薄肌筋膜腔室的緻密化進行觸診驗證。該點的觸診和治療也可以透過接近患者後側面來進行（針灸穴位 LV 10）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090527-me-cx-pave.jpeg\" alt=\"me-cx-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cx 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，患側靠床面。在 me-cx 的治療過程中，必須特別根據患者的感覺（例如針刺痛、牽涉痛）引導進行觸診驗證，因為該區域的脂肪組織很難清楚地感知緻密化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090538-me-cx-treatment.jpeg\" alt=\"me-cx-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者向疼痛一侧侧卧，筋膜治疗师将肘关节置于内收肌突起处，从股薄肌向内收肌移动，寻找改变最明显的点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110543-me-cx-o-treatment.jpeg\" alt=\"me-cx-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-CX 障礙",
    "answer": "\u003Cp\u003Eme-cx 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於腹股溝和恥骨區域，當患者大腿内收時，或者更常見的是，由於髖關節外展時股薄肌的拉伸，疼痛會加劇。恥骨痛和髖部疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090518-me-cx-cp.jpeg\" alt=\"me-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cx 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E當患者試圖將下肢内收時或突然牽拉內收肌群時，腹股溝和恥骨區的疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090522-me-cx-pamo.jpeg\" alt=\"me-cx-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E此筋膜功能障碍的最常见原因是耻骨水平的内收肌肌腱炎。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E运动员对于内收肌的过度使用，使得肌筋膜或者肌鞘纤维化，同时伴有肌腱牵拉失衡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110530-me-cx-o-cp.jpeg\" alt=\"me-cx-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E患者用力外展大腿，如果纤维化存在于阔筋膜张肌，会感觉到大腿外侧区域痉挛；如果纤维化存在于内收肌，会感觉大腿内侧区域被牵拉的疼痛感。另一种测试办法：要求患者将双脚牢固地站在地面上，并且同时内收双腿。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110537-me-cx-o-move.jpeg\" alt=\"me-cx-o-move\" /\u003E\u003C/p\u003E"
  },

    "question": "LA-GE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿外側中間，髂脛束上\u003C/li\u003E\u003Cli\u003EGB31，風市穴\u003C/li\u003E\u003Cli\u003E闊筋膜張肌-髂脛束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E膝部或膝關節的外向運動（防止膝關節的外向脫位）由單關節肌（股二頭肌短頭）和雙關節肌（股二頭肌長頭和闊筋膜張肌的諮脛束，這些肌肉的肌腱止於腓骨和脛骨）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在髂脛束上，靠近股二頭肌短頭的起點處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090447-La-ge.jpeg\" alt=\"La-ge\" /\u003E\u003C/p\u003E\u003Cp\u003E後側膝節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-ge 位於膕旁肌之間的溝上，單關節（股二頭肌短頭）和雙關節（半腱肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-ge 位於髂脛束的中間，單關節（外側大肌）和雙關節（闊筋膜張肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-ge 位於外側肌間隔，其中單關節（股二頭肌短頭）和雙關節（股二頭肌長頭）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100553-re-ge-location.jpeg\" alt=\"re-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髂脛束的牽拉來自於近端的闊筋膜張肌和遠端的伸趾長肌 （la-ge, la-ta）。\u003C/li\u003E\u003Cli\u003E外側小腿筋膜的牽拉來自於近端的股二頭肌和遠端的腓骨肌 （er-ge, er-ta）。\u003C/li\u003E\u003Cli\u003E膕筋膜的牽拉來自於近端的膕旁肌和來自尾端的腓腸肌 （re-ge, re-ta）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010517-la-ge-location.jpeg\" alt=\"la-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E右大腿中間 1/3 水平處的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-ge 的CC 位於髂脛束或闊筋膜張肌腱上，位於股外側肌之上。\u003C/li\u003E\u003Cli\u003Eer-ge 的CC 位於股外側肌間隔上方，股二頭肌短頭的起源處。\u003C/li\u003E\u003Cli\u003Ere-ge 的 CC 位於連接股二頭肌長頭與半腱肌和半膜肌的筋膜上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070536-er-ge-location.jpeg\" alt=\"er-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ge 協調中心（CC）的觸診驗證。\u003Cbr /\u003E為了與 la-cx 的協調中心進行比較，在患者側臥的情況下對 la-ge 的協調中心進行觸診驗證。\u003Cbr /\u003Ela-ge 的協調中心位於髂脛束上中段的大腿上（針灸穴位 GB 31）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010512-la-ge-pave.jpeg\" alt=\"la-ge-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ge 協調中心的治療 la-ge。\u003Cbr /\u003E患者側臥在非患側，臀部略微彎曲。治療師站在患者的後面或前面，對骼脛束施以操作。在相對於髂脛束的橫向方向上進行鬆動術。這對病人來說很痛苦；因此壓力應該適中（3），即使這可能會延長治療時間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010522-la-ge-treatment.jpeg\" alt=\"la-ge-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师固定好体位，使得他们自身重量可以分布到自由活动的手臂上。\u003Cbr /\u003E另一个上臂的肘关节置于患者的骼胫束中点上，然后治疗师移动肘关节直至定位到牵涉至膝痛的点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010531-la-ge-o-treatment.jpeg\" alt=\"la-ge-o-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "LA-GE 障礙",
    "answer": "\u003Cp\u003Ela-ge 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E髂脛束的腓骨附著處上有灼燒感、膝蓋外側疼痛、髕骨外側偏移。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010503-la-ge-cp.jpeg\" alt=\"la-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ge 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E這個肌筋膜單元的張力代償會導致膝蓋的橫向不穩定，膝蓋會無預警地軟腳。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010507-la-ge-pamo.jpeg\" alt=\"la-ge-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP；\u003Cbr /\u003E在髂胫束的腓骨侧嵌人部位出现的烧灼感、外侧膝关节疼痛、膝关节不稳定伴无力感。\u003Cbr /\u003E功能障碍的起源或协调中心；\u003Cbr /\u003E膝外侧的稳定性是由髂胫束、股二头肌和股外侧肌来提供的；在大腿的中部，阔筋膜会协调这三股肌束的矢量。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010522-la-ge-o-cp.jpeg\" alt=\"la-ge-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者做对抗足部阻力的下肢外展运动。有时候可以察觉到两侧下肢明显不同的肌力，而有时则可以观察到一侧膝关节明显松弛。可应用测力计来测量治疗前后的肌力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010527-la-ge-o-move.jpeg\" alt=\"la-ge-o-move\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-GE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿內側遠端1/3交界處，股薄肌上\u003C/li\u003E\u003Cli\u003ESP11，箕門穴\u003C/li\u003E\u003Cli\u003E股薄肌遠端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E膝部的內向運動（維持滕關節的內側穩定）由單關節肌（在腱性壓跡下的半腱肌遠端；此肌肉的肌腱止於脛骨的內側，穩定膝關節，防止內側脫位）和雙關節肌（股薄肌遠端，由來自同一肌肉近端的自身神經肌肉終板獨立支配）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在股薄肌和縫匠肌遠端之間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090453-Me-ge.jpeg\" alt=\"Me-ge\" /\u003E\u003C/p\u003E\u003Cp\u003E膝部前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-ge 的 CC 位於大腿的中點，單關節（股四頭肌）和雙關節向量（股直肌）匯聚於此。\u003C/li\u003E\u003Cli\u003Eme-ge 的CC 位於覆蓋内收肌或 subsartorial canal (vastoadductor membrane) 的筋膜上，單關節（半腱肌）和雙關節向量（股薄肌遠端）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-ge 的CC 位於股内側肌的肌腹上，單關節 （vastus medialis） 和雙關節向量（sartorius）匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090509-an-ge-location.jpeg\" alt=\"an-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股薄肌對内側小腿筋膜進行近端牽引，比目魚肌（me-ge, me-ta） 進行遠端牽引。\u003C/li\u003E\u003Cli\u003E股内側肌和縫匠肌對小腿内側淺筋膜進行近端牽引，脛後肌和脛前肌（ir-ge, ir-ta）進行遠端牽引。\u003C/li\u003E\u003Cli\u003E由股四頭肌肌腱施加的前小腿筋膜的近端牽引，以及由伸趾肌（an-ge, an-ta） 施加的遠端牽引。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090516-me-ge-location.jpeg\" alt=\"me-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E大腿中間 1/3 水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-ge 的CC 位於股內側肌的肌腹上方，筋膜在後方與縫匠肌筋膜相結合。\u003C/li\u003E\u003Cli\u003Ean-ge 的 CC 位於分隔股直肌和股外側肌的隔膜上，並與股中間肌的筋膜結合。\u003C/li\u003E\u003Cli\u003Eme-ge 的CC位於股内收肌膜上，起源於内收大肌，穿過縫匠肌下方，覆蓋血管，止於股内側肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060535-ir-ge-location.jpeg\" alt=\"ir-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ge 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證是在股薄肌前半部的溝中進行的。用食指的指關節尋找內收大肌筋膜中的點（針灸穴位 SP 11）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090509-me-ge-pave.jpeg\" alt=\"me-ge-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ge 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，患側腳靠床面。\u003Cbr /\u003E操作大腿遠端三分之一，對應於内收大肌膜。此穴位常用於小腿循環障礙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090521-me-ge-treatment.jpeg\" alt=\"me-ge-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者向疼痛侧侧卧，筋膜治疗师将肘部置于内收肌肌腹，从股薄肌向长收肌移动，寻找改变最明显的点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110551-me-ge-o-treatment.jpeg\" alt=\"me-ge-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "ME-GE 障礙",
    "answer": "\u003Cp\u003Eme-ge 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於膝蓋內側。內側膝關節坍塌，就好像内側副韌帶不再能夠穩定膝關節一樣。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090500-me-ge-cp.jpeg\" alt=\"me-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ge 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E當患者試圖將其下肢內收時，或者由於缺乏肌肉張力的保護，膝蓋內側韌帶突然被拉伸時，膝蓋內側的疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090504-me-ge-pamo.jpeg\" alt=\"me-ge-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E此筋膜单元的问题在老年人中较多见，随着纤维化增厚，导致膝关节内侧疼痛。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E随着老化，胫骨-股骨可能会发生对位异常，机体可能会用内向运动的肌筋膜单元的筋膜变化来代偿这种不平衡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110541-me-ge-o-cp.jpeg\" alt=\"me-ge-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E要求患者将足向内做抗阻运动，有时会发现出患者两侧力量的差异，急性期的患者，膝关节内侧线的疼痛会加重。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260526110546-me-ge-o-move.jpeg\" alt=\"me-ge-o-move\" /\u003E\u003C/p\u003E"

    "question": "LA-TA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E小腿中段1/3內靠上，腓骨上或稍前\u003C/li\u003E\u003Cli\u003EST40，豐隆穴\u003C/li\u003E\u003Cli\u003E趾長伸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E踝部的外向運動（將踝關節向外移動，最重要的是防止踝關節向內扭傷）由單關節肌（第三排骨肌）和雙關節肌（趾長伸肌）的纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc點在趾長伸肌上，位於第三排骨肌起點處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090400-La-ta.jpeg\" alt=\"La-ta\" /\u003E\u003C/p\u003E\u003Cp\u003E後側踝節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-ta 位於小腿後側的中間，這裡是單關節（比目魚肌）和雙關節（腓腸肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-ta 位於前腔室的外側緣，單關節（第三腓骨肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-ta 位於腓骨肌的腔室，單關節（腓骨短肌）和雙關節（腓骨長肌）的向量交匯處。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100530-re-ta-location.jpeg\" alt=\"re-ta-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/li\u003E\u003Cli\u003E足背筋膜的牽拉來自於近端的伸趾肌和遠端的背側骨間肌。（la-ta, la-pe）。\u003C/li\u003E\u003Cli\u003E支持帶的牽拉來自於近端的腓肌群和遠端的伸趾短肌（er-ta, er-di）。\u003C/li\u003E\u003Cli\u003E足部外側筋膜腔室的牽拉來自於近端的小腿三頭肌和遠端的外展小趾肌。（re-ta, re-pe) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010516-la-ta-location.jpeg\" alt=\"la-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003E右小腿中間 1/3 和遠端 1/3的橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-ta 的CC 位於隔膜中，該隔膜將包含在伸趾長肌和腓骨短肌（peroneus brevis ）内的外向運動單元結合在一起。\u003C/li\u003E\u003Cli\u003Eer-ta的 CC 位於肌間隔膜上，肌間隔膜連接腓骨長肌和腓骨短肌内的外轉肌筋膜單元。\u003C/li\u003E\u003Cli\u003Ere-ta 的CC 位於外側腓腸肌的筋膜上，或是圍繞著内側腓腸肌、比目魚肌和蹠肌 (plantaris) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070506-er-ta-location.jpeg\" alt=\"er-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ta 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在小腿的中段進行，在將伸趾長肌與腓骨肌肉分界的隔膜上。下肢半彎曲這個姿勢，允許治療師相對地觸診 la-ta、er-ta 和 re-ta（針灸穴位 ST 40）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010511-la-ta-pave.jpeg\" alt=\"la-ta-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ta 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，治療師站在病人的後面或前面，在病人感知疼痛起源的點上產生摩擦。\u003Cbr /\u003E小腿前部筋膜很容易觸及，因此適度的壓力（3）就足夠了。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010522-la-ta-treatment.jpeg\" alt=\"la-ta-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧，治疗师用示指和中指的指间关节紧邻腓骨前面，直接向趾长伸肌的肌腹按压，手法操作方向可以是纵向或横向。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010512-la-ta-o-treatment.jpeg\" alt=\"la-ta-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "LA-TA 障礙",
    "answer": "\u003Cp\u003Ela-ta 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E伸趾肌腱病變，由於反覆出現的微創傷導致腳踝外側肌腱的肌腱病變、小腿麻木。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010501-la-ta-cp.jpeg\" alt=\"la-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ta 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者無法用腳外緣行走，因為僵硬的外側筋膜的牽拉會引起腳踝的劇烈刺痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010506-la-ta-pamo.jpeg\" alt=\"la-ta-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位和起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E疼痛和运动障碍集中在外踝周围，这些异常状态常常是骨折或者扭伤的后遗症。\u003Cbr /\u003E功能障碍的起源或 CP：\u003Cbr /\u003E距骨的外向移位程度是由伸肌和第 3 腓骨肌来决定的。手法操作需要作用在这些肌筋膜结构上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010556-la-ta-o-cp.jpeg\" alt=\"la-ta-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者用足外侧缘走路，足心朝内。\u003Cbr /\u003E这会造成距骨外向运动的肌筋膜单位的紧张。在这种情况下，牵拉比收缩更能明显引出功能障碍。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010500-la-ta-o-move.jpeg\" alt=\"la-ta-o-move\" /\u003E\u003C/p\u003E"

    "question": "ME-TA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E小腿中段1/3，腓腸肌內側接近肌腱處\u003C/li\u003E\u003Cli\u003EKI9，築賓穴\u003C/li\u003E\u003Cli\u003E比目魚肌內側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E踝部的內向運動（向內移動踝關節）由單關節肌（脛骨後肌）和雙關節肌（小腿三頭肌、趾長屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在小腿三頭肌上，比目魚肌與腓腸肌內側頭匯合處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090406-Me-ta.jpeg\" alt=\"Me-ta\" /\u003E\u003C/p\u003E\u003Cp\u003E踝部節段前内側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-ta 的 CC 位於脛骨內側緣的後方，單關節（脛後肌）和雙關節向量（屈趾肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-ta 的 CC 位於比目魚肌肌腹的内側部分，單關節（比目魚肌）和雙關節向量（屈趾長肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Ean-ta 的CC 位於前隔室的中間，其中單關節（脛前肌）和雙關節向量（伸趾肌）匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090551-an-ta-location.jpeg\" alt=\"an-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E伸趾肌向近端方向而伸𧿹短肌（an-ta，an-pe） 向遠端方向牽引足背筋膜。\u003C/li\u003E\u003Cli\u003E兩條脛骨肌向近端方向，外展𧿹肌（ir-ta，ir-pe）向遠端方向牽引内側小腿筋膜。\u003C/li\u003E\u003Cli\u003E透過比目魚肌向近端方向，足底肌肉（me-ta, me-pe） 向遠端方向牽引足内側深筋膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090535-me-ta-location.jpeg\" alt=\"me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003E右小腿中間 1/3 和遠端 1/3 處的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-ta 的CC 位於伸𧿹長肌筋膜上方，位於脛前肌和伸趾肌之間。\u003C/li\u003E\u003Cli\u003Eir-ta 的CC 位於脛骨後緣；脛後肌和屈趾肌的筋膜也延伸到該區域。\u003C/li\u003E\u003Cli\u003Eme-ta 的 CC 位於將腓腸肌與比目魚肌分開的筋膜的内側。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060529-ir-ta-location.jpeg\" alt=\"ir-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ta 協調中心（CC）的觸診驗證。\u003Cbr /\u003E比CC 的觸診驗證是用食指的指關節，在小腿中段，内側腓腸肌與比目魚肌分界的空間中進行的（針灸穴位 KI9）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090530-me-ta-pave.jpeg\" alt=\"me-ta-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ta 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥。使用肘部進行操作，而為了更有效地校準壓力，治療師的另一隻手臂將身體的重量支撐在床上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090540-me-ta-treatment.jpeg\" alt=\"me-ta-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧，治疗师将肘关节或指关节置于腓肠肌和比目鱼肌之间，接近腱肌结合处，对该点缓慢地进行治疗，直到局部的高敏感性降低。治疗师也可以先用指间关节进行治疗，然后再换为肘关节。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090538-me-ta-o-treatment.jpeg\" alt=\"me-ta-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "ME-TA 障礙",
    "answer": "\u003Cp\u003Eme-ta 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於腳踝内側・小腿内側抽筋，屈𧿹長肌和屈趾長肌的肌腱病變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090521-me-ta-cp.jpeg\" alt=\"me-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ta 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E此筋膜單元的張力代償會導致跟腱内側部分的著骨點病變。患者主述，當在腳後跟的内側縁承重時會感到劇烈疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090525-me-ta-pamo.jpeg\" alt=\"me-ta-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E跟腱炎、腓肠肌内侧痉挛、足底筋膜炎、内踝关节扭伤，这些都是此筋膜单元最常见的功能障碍。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E胫跗不稳定产生的原因常位于腓肠肌内侧肌腹。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090527-me-ta-o-cp.jpeg\" alt=\"me-ta-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E要求患者以足内侧缘行走，观察在主动牵拉踝节段的内向运动的肌筋膜\u003Cbr /\u003E单元时，双足是否存在任何不对称情况。患者可能感觉到一侧足部比另一侧更僵硬。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090533-me-ta-o-move.jpeg\" alt=\"me-ta-o-move\" /\u003E\u003C/p\u003E"

    "question": "LA-PE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第2-3骨間肌背側\u003C/li\u003E\u003Cli\u003EST43，陷谷穴\u003C/li\u003E\u003Cli\u003E背側骨間肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部或腳的外向運動（腳趾偏離中線向外張開）由單關節肌（骨間背側肌）和雙關節肌（趾長、短伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在第三、第四骨間背側肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090412-La-pe.jpeg\" alt=\"La-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E外側腳節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eer-pe 位於十字伸肌支持帶下方，單關節（伸趾短肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-pe 位於腳的外側筋膜腔室，單關節（外展小趾肌）和雙關節（腓骨短肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-pe 位於第2、3、4蹠骨頭，其中單關節（背側骨間肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100551-re-pe-location.jpeg\" alt=\"re-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E背側骨間肌與伸趾短肌以及長肌腱相連。\u003C/li\u003E\u003Cli\u003E第二個腳趾有來自兩個背側骨間肌附著，一個外側、一個內側，而第三和第四個腳趾只有來自外側部分的附著點（la-pe）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010519-la-pe-location.jpeg\" alt=\"la-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E足部在蹠骨 （metatarsals） 水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-pe 的 CC 位於外展小趾肌的筋膜上，然後與屈小趾肌相連，再接續到小腿三頭肌 （triceps surae） 的筋膜。\u003C/li\u003E\u003Cli\u003Eer-pe 的CC 位於更近端，在伸趾短肌的肌腹上；該肌肉的筋膜與足背側筋膜的中層（middle lamina ofthe dorsal fascia）相連。\u003C/li\u003E\u003Cli\u003Ela-pe 的CC 位於更遠側，在足背筋膜的深部，與足背骨間肌（dorsal interossei muscles) 相連•\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070550-er-pe-location.jpeg\" alt=\"er-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-pe 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證將需要非常精確地進行，因為背側骨間肌非常小且位置較深（針灸穴位 ST43 • ST 42 p) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010513-la-pe-pave.jpeg\" alt=\"la-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-pe 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，腳放在治療床上。用食指的指關節穿透伸肌的肌腱，以找出筋膜深層的纖維化。足背筋膜很容易觸及，因此輕微的壓力足以使該組織流動化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010525-la-pe-treatment.jpeg\" alt=\"la-pe-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E该肌筋膜单位的协调中心在第2、3跖骨之间的足趾根部。手法操作着眼于恢复筋膜的流动性，有时可能压迫神经（Morton 神经瘤）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010501-la-pe-o-treatment.jpeg\" alt=\"la-pe-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ela-pe 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於前足，更準確地說，位於第二、第三和第四蹠骨頭下方，患者可能有腳背腫脹。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010559-la-pe-cp.jpeg\" alt=\"la-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-pe 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者表示無法用腳尖走路。此外，所有的 鞋子都感覺很緊，穿著會引起蹠骨疼痛。\u003Cbr /\u003E患者也難以移動腳趾。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010503-la-pe-pamo.jpeg\" alt=\"la-pe-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E该肌筋膜单位的功能障碍在大多数情况下会显现在拮抗肌肌筋膜单元（me-pe），即足底。第2和第3足趾的疼痛很少见。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E骨间背侧肌外展足趾，骨间掌侧肌内收足趾，这两组肌肉联系紧密。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010550-la-pe-o-cp.jpeg\" alt=\"la-pe-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E要确认该肌筋膜单位的功能，可以通过请患者用脚尖走路的主动运动方式来检查，或者被动地，通过挤压患者前脚掌以重现夹脚鞋的效果来检查。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010555-la-pe-o-move.jpeg\" alt=\"la-pe-o-move\" /\u003E\u003C/p\u003E"

    "question": "ME-PE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E跟骨與足舟骨之間，拇長屈肌和脛骨後肌筋膜\u003C/li\u003E\u003Cli\u003EKI2，然谷穴\u003C/li\u003E\u003Cli\u003E拇短屈肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部（足）的內向運動（內收足的同時加深縱向和橫向兩個足弓）由單關節肌（足底骨間肌、足𧿹短屈肌、起自足底長韌帶的足𧿹收肌斜頭）和雙關節肌（趾長屈肌、足𧿹長屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在脛骨後肌位於足舟骨的止點上，足𧿹短屈肌起於該肌腱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090433-Me-pe.jpeg\" alt=\"Me-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E足部前内側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-pe 的CC 位於舟狀骨下方，單關節（骨間肌）和雙關節向量（屈趾肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-pe 的CC 位於外展拇短肌肌腹内側，單關節（外展𧿹短肌）和雙關節向量（屈𧿹長肌）在此匯合。\u003C/li\u003E\u003Cli\u003Ean-pe 的CC 位於第一蹠骨間隙的基部，單關節（伸𧿹短肌）和雙關節向量（伸𧿹長肌）匯合處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090546-an-pe-location.jpeg\" alt=\"an-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股薄肌腱位於鵝足 （pes anserinus） 的深處。\u003C/li\u003E\u003Cli\u003E小腿深筋膜的深層在足部與深層肌肉層相連。\u003C/li\u003E\u003Cli\u003E足底骨間肌與深筋膜和屈趾長肌（me-pe）的肌腱相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100539-me-pe-location.jpeg\" alt=\"me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在蹠骨水平的足部橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-pe 的CC 位於内踝下方，狀骨 （navicular bone）前下緣凹陷處。\u003C/li\u003E\u003Cli\u003Ean-pe 的 CC 位於連接伸短肌和伸趾長肌腱的筋膜上。\u003C/li\u003E\u003Cli\u003Eir-pe 的 CC 位於覆蓋外展𧿹肌的筋膜上，並繼續延伸到屈𧿹短肌和長肌（肌腱）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060528-ir-pe-location.jpeg\" alt=\"ir-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-pe 協調中心 （CC） 的觸診驗證。\u003C/p\u003E\u003Cp\u003E觸診驗證直接在內踝下方（垂直線）和足底弓的起點（曲線）（針灸穴位 KI 2）探索這個 CC。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100529-me-pe-pave.jpeg\" alt=\"me-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-pe 協調中心（CC）的治療。\u003C/p\u003E\u003Cp\u003E患者側臥。將鷹嘴突放置在觸診驗證過程中發現緻密點上，然後橫向移動肘部進行治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100547-me-pe-treatment.jpeg\" alt=\"me-pe-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者侧卧，治疗师将指间关节或者肘关节置于跟骨和舟骨间沟，治疗导致症状的位点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090528-me-pe-o-treatment.jpeg\" alt=\"me-pe-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "ME-PE 障礙",
    "answer": "\u003Cp\u003Eme-pe 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於蹠骨下方，足底筋膜中。如果足弓太高或太平，患者的體重可能分佈不正確，導致足底發炎和疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100516-me-pe-cp.jpeg\" alt=\"me-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-pe 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E連接腳底肌肉的筋膜彈性降低會導致抽筋，無論是在主動運動期間還是由於寒冷、過度使用或不動都會痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100523-me-pe-pamo.jpeg\" alt=\"me-pe-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E此筋膜单元的功能障碍会导致足底痉挛，尤其当患者在寒冷或疲惫的情况下。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E在寒冷情况下，足底筋膜的紧张可导致痉挛，或导致足部小肌群的不协调从而产生炎症。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090518-me-pe-o-cp.jpeg\" alt=\"me-pe-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E要求患者通过收缩足底来收缩足内侧肌肉，如果存在任何纤维化，一般会立即产生痉挛，患者无法维持足部的收缩状态。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090522-me-pe-o-move.jpeg\" alt=\"me-pe-o-move\" /\u003E\u003C/p\u003E"
  },

    "question": "LA-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸鎖乳突肌和斜方肌之間，朝向斜角肌和頸基底部\u003C/li\u003E\u003Cli\u003ELI17，天鼎穴\u003C/li\u003E\u003Cli\u003E斜角肌外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的外向運動（肩胛帶上提一肱骨外展超過90°）由單關節肌（肩胛舌骨肌下腹）和雙關節肌（斜方肌上行纖維和胸鎖乳突肌鎖骨部）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在後斜角肌上，位於斜方肌與胸鎖乳突肌之間\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090443-La-sc.jpeg\" alt=\"La-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E後側肩胛節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-sc 位於斜方肌的前緣，單關節（肩胛舌骨肌）和雙關節（斜方肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-sc 位於肩胛骨上角上方，單關節（提肩胛肌）和雙關節（斜方肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-sc 位於肩胛骨和脊椎之間的中點，單關節（菱形肌）和雙關節（中斜方肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110517-re-sc-location.jpeg\" alt=\"re-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛筋膜的牽拉來自於往頭側的斜方肌以及遠端方向的三角肌（la-sc, la-hu）。\u003C/li\u003E\u003Cli\u003E提肩胛肌向頭側方向牽拉，棘上肌、棘下肌和三角肌向遠側方向牽拉（er-sc, er-hu) •\u003C/li\u003E\u003Cli\u003E三角肌筋膜的牽拉來自於向内方向的斜方肌和菱形肌群，和來自遠端方向的三角肌嵌入肩胛骨的部分（re-sc, re-hu）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010540-la-sc-location.jpeg\" alt=\"la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003E腋窩的前後截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-sc 的CC 位於斜方肌的上緣，在肩胛骨抬高的過程中，它作用於兩個關節：胸鎖關節和肩鎖關節。\u003C/li\u003E\u003Cli\u003Eer-sc 的CC 位於肩胛上角的提肩胛肌的起點，頸筋膜中層（middle lamina of the cervical fascia） 也起源於此。\u003C/li\u003E\u003Cli\u003Ere-sc 的CC 位於斜方肌的内側部分，正好在小菱形肌或大菱形肌上方。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070503-er-sc-location.jpeg\" alt=\"er-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-sc 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在斜方肌前方，後斜角肌的方向進行（針灸穴位 LI 16）。這個協調中心應該在患者坐著的情況下觸診，因為這個位置也允許與 re-sc 和 er-sc 的協調中心進行比較。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010534-la-sc-pave.jpeg\" alt=\"la-sc-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-sc 協調中心 （CC）的治療。\u003Cbr /\u003E患者坐著，治療師將肘部靠在斜方肌的前緣，也試圖涉及斜角肌的筋膜。初始壓力應該適中，以流動化斜方肌的筋膜，慢慢增加也達到斜角肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010545-la-sc-treatment.jpeg\" alt=\"la-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取坐位，后背倚靠在凳子上，筋膜治疗师用肘关节作用于斜方肌前缘，并同时涵盖中斜角肌部位。在手法操作过程中，如果出现疼痛传导至头部或者肩部，患者需要及时告知治疗师。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010502-la-sc-o-treatment.jpeg\" alt=\"la-sc-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-SC 障礙",
    "answer": "\u003Cp\u003Ela-sc 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於斜方肌的上升部分。第七頸椎棘突有灼燒感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010525-la-sc-cp.jpeg\" alt=\"la-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-sc 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者報告手臂側向抬高90°以上時無力。\u003Cbr /\u003E這個肌筋膜單元的功能障礙通常表現是一個肩部比另一個肩部更高和更多後縮。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010530-la-sc-pamo.jpeg\" alt=\"la-sc-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心；\u003Cbr /\u003E肩部沉重感、颈痛、第7颈椎处的烧灼感和头痛。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E延伸至项部的斜方肌上行纤维的任何改变可以被覆盖头皮的筋膜代偿，会激惹头部游离神经末梢。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010552-la-sc-o-cp.jpeg\" alt=\"la-sc-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E在双臂抬高外展超过90°的情况下，项部或者肩部疼痛加剧。如果主动运动不能诱发疼痛，就需要加上对抗性的阻力（进行检查）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010556-la-sc-o-move.jpeg\" alt=\"la-sc-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第3肋間隙，胸大肌在肋骨上的止點\u003C/li\u003E\u003Cli\u003ESP21，大包穴\u003C/li\u003E\u003Cli\u003E前鋸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的內向運動（內收肩胛骨）由單關節肌（前鋸肌）和雙關節肌（背闊肌和胸大肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在腋窩纖維腱弓（卵圓孔）的內側部分。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090449-Me-sc.jpeg\" alt=\"Me-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E肩胛節段前部的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-sc 的CC 位於鎖骨內側部分下方，單關節（鎖骨下肌）和雙關節向量（胸大肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Ean-sc 的 CC 位於胸小肌的肌腹上方，單關節（胸小肌）和雙關節向量（胸大肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-sc 的 CC 位於腋中線的前方，單關節（前鋸肌）和雙關節向量（胸大肌和闊背肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090534-an-sc-location.jpeg\" alt=\"an-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鎖骨下肌向近端方向，而肩胛下肌 （ir-hu）向遠端方向牽引鎖骨腋筋膜 （ir-sc）。\u003C/li\u003E\u003Cli\u003E胸小肌 （an-sc）向近端方向，而肱二頭肌短頭（an-hu） 向遠端方向牽引胸筋膜。\u003C/li\u003E\u003Cli\u003E由闊背肌和前鋸肌（me-sc） 牽引内側腋窩筋膜，由上臂肌肉（me-hu）牽引外側腋筋膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120521-me-sc-location.jpeg\" alt=\"me-sc-location\" /\u003E\u003Cbr /\u003E腋窩前後圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-sc 的CC位於鎖骨下肌，其筋膜延續包含：\u003Cul\u003E\u003Cli\u003E下面是鎖骨腋筋膜（clavicoracoaxillaryfascia）、腋深筋膜 （deep axillary fascia）和肩胛下筋膜（subscapularis fascia) \u003C/li\u003E\u003Cli\u003E上面是中頸筋膜 （middle cervical fascia），其中包含了肩胛舌骨肌（Omohyoid muscle)\u003C/li\u003E\u003C/ul\u003E\u003C/li\u003E\u003Cli\u003Ean-sc 的CC 位於胸骨，an-sc 的CC 位於胸小肌和胸大肌的筋膜上，胸大肌的筋膜與三角肌的筋膜在外側相連。\u003C/li\u003E\u003Cli\u003Eme-sc 的CC 位於腋淺筋膜上，連接胸大肌和闊背肌；這些肌肉的筋膜在斜方肌筋膜 （la-sc）上方延續。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060512-ir-sc-location.jpeg\" alt=\"ir-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-sc 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證直接在腋窩遠端、腋線（垂直線）前和胸大肌邊界後（曲線）尋找這個 CC（針灸穴位 GB 22）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120517-me-sc-pave.jpeg\" alt=\"me-sc-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-sc 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，手臂外展。操作已經透過觸診確定的點；治療師可以站立或坐著，可以在治療床的同側或對側工作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120527-me-sc-treatment.jpeg\" alt=\"me-sc-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧手臂外展，治疗师从腋下触诊至前锯肌，治疗患者最疼痛的位点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090511-me-sc-o-treatment.jpeg\" alt=\"me-sc-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-SC 障礙",
    "answer": "\u003Cp\u003Eme-sc 肌筋膜單元的疼痛部位及感知中心 （CP）。\u003Cbr /\u003E疼痛位於肩膀；患者常被診斷為肩周炎。\u003Cbr /\u003E如果肩胛骨内收肌筋膜緻密，則影響肩胛骨和肱骨的同步外展。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120504-me-sc-cp.jpeg\" alt=\"me-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-sc 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003Eme-sc CC 的緻密化在内收期間很少有症狀，而在肱骨外展期間經常引起肩峰下疼痛；這是由於肩胛骨缺乏同步和協調的抬高動作控制。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120509-me-sc-pamo.jpeg\" alt=\"me-sc-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E肩关节半脱位、翼状肩、肩部无力。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E肩胛骨很少表现为直接的疼痛，但其异常的运动常导致孟肱关节周围的疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090501-me-sc-o-cp.jpeg\" alt=\"me-sc-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E要求患者双手推墙。若一侧前锯肌弱，则该侧肩胛骨较对侧可见轻微的固定。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090505-me-sc-o-move.jpeg\" alt=\"me-sc-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-HU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E平肱骨頭，三角肌中東上\u003C/li\u003E\u003Cli\u003ELI15，肩偶穴\u003C/li\u003E\u003Cli\u003E三角肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肱骨的外向運動（上臂外展至90°）由單關節肌（三角肌中部和岡上肌）和雙關節肌（肱二頭肌長頭）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在三角肌上、大結節的前部（岡上肌止點處）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090455-La-hi.jpeg\" alt=\"La-hi\" /\u003E\u003C/p\u003E\u003Cp\u003E後側肱節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-hu 位於大結節的前方，單關節（外側三角肌）和雙關節（肱二頭肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-hu 位於旋轉肌袖上方，單關節（棘下肌）和雙關節（三角肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-hu 位於肩胛骨棘突的尾端，單關節（大圓肌）和雙關節（三角肌和肱三頭肌長頭）的向量交匯處。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110550-re-hu-location.jpeg\" alt=\"re-hu-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的三角肌和遠端的肱橈肌（la-hu, la-cu）。\u003C/li\u003E\u003Cli\u003E臂筋膜的牽拉來自於近端附著於肩胛棘上的三角肌和遠端的三頭肌 （re-hu, re-cu）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的斜向牽拉來自於外旋動作單元，包含上方的三角肌和下方肱橈肌和旋後肌 (er-hu, er-cu) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010551-la-hu-location.jpeg\" alt=\"la-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E肩膀在肱骨頭水平的斜截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-hu 的CC位於三角肌外側筋膜上，在三角肌下囊和筋膜水平處，覆蓋棘上肌腱和肱二頭肌長頭。\u003C/li\u003E\u003Cli\u003Eer-hu 的CC位於肩外旋的三塊肌肉上，包含：三角肌嵌入肩胛骨處、棘下肌和小圓肌的部分。\u003C/li\u003E\u003Cli\u003Ere-hu 的 CC 與肩伸展的四塊肌肉相連，包含：三角肌後部、大圓肌、肱三頭肌長頭和闊背肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070510-er-hu-location.jpeg\" alt=\"er-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-hu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在肱骨頭水平高度，三角肌外側束上進行。患者可以側臥；然而，如果正在執行比較性觸診驗證，則患者應該站立（針灸穴位 LI 15）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010546-la-hu-pave.jpeg\" alt=\"la-hu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-hu 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，手臂放在身側。用肘部鬆動三角肌，因為在這個肌筋膜單元中，疼痛通常是非常慢性的。施加到肌肉本身的壓力可能很大，而在二頭肌長頭肌腱上操作時，壓力應該很小。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010557-la-hu-treatment.jpeg\" alt=\"la-hu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者非疼痛侧侧卧，治疗师用肘关节或者指间关节置于三角肌上，对向肱二头肌肌腱长头。急性期不推荐在该点的操作，应在外向-肩胛节段和外向-肘节段进行手法治疗，以减轻外向沿线上的痉挛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010546-la-hu-o-treatment.jpeg\" alt=\"la-hu-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "LA-HU 障礙",
    "answer": "\u003Cp\u003Ela-hu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於三角肌的外側部分，有時它會向斜方肌或外上髁延伸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010538-la-hu-cp.jpeg\" alt=\"la-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-hu 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者表示無法外展手臂，然而前屈和後伸都不痛。肩峰下夾擠通常是由於肩胛外側 和肱骨外側的肌筋膜單元之間缺乏同步。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010541-la-hu-pamo.jpeg\" alt=\"la-hu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E疼痛有时候局限在协调中心下方（肱二头肌腱），有时会出现在三角肌腱远端（感知中心）。\u003Cbr /\u003E功能障碍的起源或协调中心；\u003Cbr /\u003E有三股肌束矢量汇聚于肩峰下：冈上肌、肱二头肌长头和三角肌的中间或外侧头。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010538-la-hu-o-cp.jpeg\" alt=\"la-hu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者抗阻力外展手臂，阻力置于肘部，当一侧手臂受累时，检查者可以明显感觉到两侧手臂力量的不同。\u003Cbr /\u003E在急性期，患者可能在无阻力情况下也不能完成这个动作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010542-la-hu-o-move.jpeg\" alt=\"la-hu-o-move\" /\u003E\u003C/p\u003E"

    "question": "ME-HU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E上臂中上1/3交界處，內側肌間隔上\u003C/li\u003E\u003Cli\u003EHT1，極泉穴\u003C/li\u003E\u003Cli\u003E喙肱肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肱骨的內向運動（內收上臂）由單關節肌（喙肱肌肌）和雙關節肌（肱二頭肌短頭和肱三頭肌長頭）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在腋窩纖維腱弓（卵圓孔）的外側部分。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090403-Me-hu.jpeg\" alt=\"Me-hu\" /\u003E\u003C/p\u003E\u003Cp\u003E肱部節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-hu CC 位於三角肌一胸肌溝，單關節（喙肱肌）和雙關節向量（肱二頭肌）交匯處。\u003C/li\u003E\u003Cli\u003Eir-hu 的CC 位於肩旋轉袖內旋肌上，單關節（肩胛下肌）和雙關節向量（闊背肌）匯聚於此。\u003C/li\u003E\u003Cli\u003Eme-hu 的CC 位於腋外側部分的基部，在此處單關節（喙肱肌）和雙關節向量（胸大肌）匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090522-an-hu-location.jpeg\" alt=\"an-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前向- 肱部（an-hu）肌筋膜序列向近端方向，而前向-肘部（an-cu） 肌筋膜序列向遠端方向牽引筋膜。\u003C/li\u003E\u003Cli\u003E内向- 肱部（me-hu） 肌筋膜序列向近端方向，内向-肘部（me-cu）肌筋膜序列向遠端方向牽引内側肌間隔。\u003C/li\u003E\u003Cli\u003E肩胛下肌和喙肱肌（ir-hu）對内側肌間隔向内牽引，旋前圓肌（ir-cu）向遠端牽引。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010556-me-hu-location.jpeg\" alt=\"me-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E肩部肱骨頭水平斜切面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-hu 的CC 位於將胸大肌的鎖骨部分與三角肌的鎖骨部分開的溝。\u003C/li\u003E\u003Cli\u003Eir-hu 的CC位於覆蓋胸大肌、肩胛下肌和喙肱肌腱的筋膜上。\u003C/li\u003E\u003Cli\u003Eme-hu的CC 位於將肱三頭肌長頭連接到喙肱肌和肱二頭肌短頭的筋膜上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070549-ir-hu-location.jpeg\" alt=\"ir-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-hu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證是在喙肱肌與內側肌間隔（垂直線）連續的部分上進行的。me-hu 的CC位於上臂近端三分之一和中間三分之一之間的交界處（曲線）（針灸穴位 HT 1）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010551-me-hu-pave.jpeg\" alt=\"me-hu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-hu 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，手臂外展，高舉過頭。\u003Cbr /\u003E操作喙肱肌筋膜和內側肌間隔，直到緻密化消失。因為此 CC 位於神經血管束上方，施作壓力應當適中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010503-me-hu-treatment.jpeg\" alt=\"me-hu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧并手臂上举，治疗师利用指间关节触诊上臂近端1/3 的内侧肌间隔上，横向治疗 CC直到症状消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090559-me-hu-o-treatment.jpeg\" alt=\"me-hu-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-HU 障礙",
    "answer": "\u003Cp\u003Eme-hu 筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於肩部的前側區域。診斷可以是撞擊（關節衝擊）、肩周炎、扭傷或拉傷後肌腱損傷或肌腱病變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010539-me-hu-cp.jpeg\" alt=\"me-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-hu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E該筋膜單元的張力代償，通常會在涉及用手抓握物體的動作期間，產生肱骨半脫位或肩部外側疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-me-hu-pamo.jpeg\" alt=\"me-hu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E此筋膜单元的功能障碍可造成孟肱不稳，而不是腋窝疼痛。腋窝疼痛相对罕见。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E腋筋膜协调胸大肌和背阔肌之间的张力。只有它们协调工作时，肱骨才能够内收且不至于半脱位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090549-me-hu-o-cp.jpeg\" alt=\"me-hu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E患者试着抗阻内收其上肢，治疗师将阻力加在肘关节上；观察患者肩关节，是否有肩关节半脱位现象。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090553-me-hu-o-move.jpeg\" alt=\"me-hu-o-move\" /\u003E\u003C/p\u003E"

  {
    "question": "LA-CU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E上臂遠端1/3內，外側肌間隔上，肱橈肌止點\u003C/li\u003E\u003Cli\u003ELI11，曲池穴\u003C/li\u003E\u003Cli\u003E肱橈肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的外向運動（外展手臂時固定或穩定肘關節）由單關節肌（肱橈肌）和雙關節肌（橈側腕長伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在肱橈肌上，於外上髁處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090408-La-cu.jpeg\" alt=\"La-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E肘節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cu 位於肱三頭肌的外側筋膜上，單關節（肱三頭肌外側頭）和雙關節（肱三頭肌長頭）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-cu 位於外側肌間隔，單關節（肱橈肌）和雙關節（橈側伸腕長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-cu 位於外側肌間隔和鷹嘴突之間，單關節（旋後肌）和雙關節（肱橈肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110552-re-cu-location.jpeg\" alt=\"re-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前臂筋膜的牽拉來自於近端的肱三頭肌和遠端的尺側伸腕肌（re-cu, re-ca）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的三角肌和遠端的橈側伸腕長肌和肱橈肌（la-cu, la-ca) •\u003C/li\u003E\u003Cli\u003E骨間膜的牽拉來自於近端的旋後肌和遠端的伸拇長肌、外展拇長肌（er-cu, er-ca）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010547-la-cu-location.jpeg\" alt=\"la-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E上臂下 1/3水平處的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cu 的 CC 位於更遠的位置。它位於外 側肌間隔中，位於肱橈肌的起點。\u003C/li\u003E\u003Cli\u003Eer-cu 的 CC 位於更遠端，在肱三頭肌肌腱與肱橈肌和旋後肌（supinator） 的筋膜連續。\u003C/li\u003E\u003Cli\u003Ere-cu的CC 位於與肱三頭肌的肌束膜和肌内膜相連的後外側上臂筋膜上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080556-er-cu-location.jpeg\" alt=\"er-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證進行在上臂遠端三分之一，外側肌間隔（紅色虛線），肱橈肌附著處（針灸穴位 LI 12）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010543-la-cu-pave.jpeg\" alt=\"la-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cu 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，手臂放在治療床上。使用指關節在縱向和橫向方向上對外側肌間隔施加摩擦。應注意不要在橈神經上鬆動。為避免對神經造成任何損傷，壓力應輕或適中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010552-la-cu-treatment.jpeg\" alt=\"la-cu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，手置于头上，治疗师用指间关节作用于筋膜上直到局部疼痛消失。该点痛感强烈，因此手法作用的压力大小需与患者的耐受度相一致。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010546-la-cu-o-treatment.jpeg\" alt=\"la-cu-o-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ela-cu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於外側肘部，有時延伸到肩部。在慢性病例中出現肘部屈曲或伸展的終端角度限制。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010535-la-cu-cp.jpeg\" alt=\"la-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E提重物（例如沉重的購物袋）時，上髁疼痛會加劇；當涉及 la-ca 的 協調中心時，手腕運動會加劇疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010538-la-cu-pamo.jpeg\" alt=\"la-cu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E肱骨外上髁炎（网球肘）是该筋膜单元最常见的功能障碍。\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E过度使用桡侧腕伸肌（可能）导致筋膜之间的结缔组织粘连。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010538-la-cu-o-cp.jpeg\" alt=\"la-cu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E患者有可能主诉当他试图从桌上拿起一个瓶子时会引起（肘部）疼痛，尽管这一运动是很有提示意义的。治疗前进行如图的运动检查是必需的，以便于量化治疗后的暂时效果。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010541-la-cu-o-move.jpeg\" alt=\"la-cu-o-move\" /\u003E\u003C/p\u003E"

    "question": "ME-CU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E上臂遠端中下1/3交界處，內側肌間隔上\u003C/li\u003E\u003Cli\u003EHT2，清靈穴\u003C/li\u003E\u003Cli\u003E尺側腕屈肌近端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的內向運動（內收過程中穩定肘關節）由單關節肌（連接肱骨和尺骨的尺側腕屈肌）和雙關節肌（連接肱骨和腕骨的尺側腕屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在尺側腕屈肌起點的內側肌間隔上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090414-Me-cu.jpeg\" alt=\"Me-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E肘部節段前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cu 的 CC 位於肱二頭肌肌腹部的外側部分，單關節（肱肌）和雙關節（肱二頭肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-cu 的 CC 位於內側肌間膈，單關節（喙肱肌）和雙關節向量（起始於肱骨的尺側屈腕肌纖維）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-cu 的 CC 位於肘部屈摺痕線的中央，單關節（旋前圓肌）和雙關節向量（掌長肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090505-an-cu-location.jpeg\" alt=\"an-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肱二頭肌向近端方向，而橈側屈腕肌（an-cu, an-ca）向遠端方向施加牽引力。\u003C/li\u003E\u003Cli\u003E喙肱肌在近端方向，而尺側屈腕肌（me-cu, me-ca） 在遠端方向牽引隔膜。\u003C/li\u003E\u003Cli\u003E旋前圓肌向近端方向，旋前方肌（ir-cu,ir-ca）向遠端方向施加牽引力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010550-me-cu-location.jpeg\" alt=\"me-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E上臂在遠端 1/3的水平橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cu 的CC 位於前臂筋膜；肱肌的外側纖維將此點更向外側移。\u003C/li\u003E\u003Cli\u003Eir-cu 的CC 位於更遠的位置，因為它與旋前圓肌的筋膜有關。\u003C/li\u003E\u003Cli\u003Eme-cu 的 CC 位於内側肌間隔上，而後者又與尺神經鞘結合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070554-ir-cu-location.jpeg\" alt=\"ir-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cu 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證 me-cu 在内側肌間隔（垂直線）上的 CC，恰好在上臂的中間三分之一和遠端三分之一之間的交界處（曲線）（針灸穴位 HT 2）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010545-me-cu-pave.jpeg\" alt=\"me-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cu 協調中心 （CC）的治療。\u003Cbr /\u003E根據治療計劃和與其他 CC的關聯，患者可以是仰臥，也可以是俯臥。操作内側肌間隔，注意避免將尺神經壓在肱骨上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010556-me-cu-treatment.jpeg\" alt=\"me-cu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，上肢外展，治疗师利用指尖沿着内侧肌间隔触诊，寻找引起症状的位点。注意：利用指关节治疗筋膜协调中心 CC 时，不要按压尺神经，仅处理筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527090529-me-cu-o-treatment.jpeg\" alt=\"me-cu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "LA-CA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E前臂近端1/3內，肱橈肌外側緣，橈側伸肌間溝內\u003C/li\u003E\u003Cli\u003ELI9，上廉穴\u003C/li\u003E\u003Cli\u003E橈側腕伸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腕部的外向運動（外展和後伸手腕）由單關節肌（附著於橈骨韌帶上的橈側腕伸肌）和雙關節肌（附著於肱骨的兩塊橈側腕伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在兩個橈側腕伸肌肌腹上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090421-La-ca.jpeg\" alt=\"La-ca\" /\u003E\u003C/p\u003E\u003Cp\u003E後側腕節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-ca 位於兩個橈側伸腕肌之間的肌間隔上，其中單關節（橈側伸腕短肌）和雙關節（橈側伸腕長肌）的向量交匯 。\u003C/li\u003E\u003Cli\u003Eer-ca 位於背筋膜上，單關節（伸拇長肌）和雙關節（伸指肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-ca 位於尺側伸腕肌上，單關節（尺側伸腕肌）和雙關節（源自肱骨的同一肌肉纖維）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110501-re-ca-location.jpeg\" alt=\"re-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前臂筋膜的牽拉來自於近端的橈側伸腕肌和遠端的骨間肌 （la-ca, la-di）。\u003C/li\u003E\u003Cli\u003E前臂筋膜的牽拉沿著整段伸指肌群（er-ca，er-di) •\u003C/li\u003E\u003Cli\u003E筋膜上的牽拉來自於近端的尺側伸腕肌和遠端的外展小指肌。（re-ca, re-di）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-la-ca-location.jpeg\" alt=\"la-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003E前臂在上四分之一處的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-ca 的 CC 位於更遠側覆蓋尺側伸腕肌的筋膜上；在這裡，它包含在肘肌 （anconeus muscle） 和伸小指肌之間。\u003C/li\u003E\u003Cli\u003Eer-ca 的 CC 位於更遠側，位於覆蓋伸指肌並連接到下面的旋後肌（supinator）的筋膜上。\u003C/li\u003E\u003Cli\u003Ela-ca 的 CC 位於橈側伸腕長肌的筋膜上，從肱橈肌延伸到橈側伸腕短肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080533-er-ca-location.jpeg\" alt=\"er-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ca 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在前臂的近端三分之一處進行。\u003Cbr /\u003E更準確地說，在橈側伸腕長肌與短肌和肱橈肌之間的溝中，沿著從外上髁到橈骨莖突的連線上。（針灸穴位 LI 10p、L19、LI8 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010539-la-ca-pave.jpeg\" alt=\"la-ca-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ca 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，手臂外展，手舉過頭頂。根據肌肉的厚度，使用指關節或肘部來對抗筋膜的纖維化。用肘部施加的壓力很強，因為它牽扯更大的接觸面：而用指關節施加的壓力適中，因為穿透得更深。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010550-la-ca-treatment.jpeg\" alt=\"la-ca-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E该肌筋膜单位的协调中心位于外向-肘节段的正下方。实际上，两桡侧伸肌群的近端纤维的作用是稳定肘关节外侧，而其远端纤维则干预腕关节的外向运动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010530-la-ca-o-treatment.jpeg\" alt=\"la-ca-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CA 障礙",
    "answer": "\u003Cp\u003Ela-ca 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於肘部（外上髁）和腕部（肌腱炎），上肢發麻刺痛和麻木。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010529-la-ca-cp.jpeg\" alt=\"la-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ca 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者表示，當舉起較輕的重量（例如瓶子）時，上髁會出現劇烈疼痛。在其他時候，也會感到手腕疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010534-la-ca-pamo.jpeg\" alt=\"la-ca-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或感知中心：\u003Cbr /\u003E疼痛和炎症会出现在拇长伸肌和拇长展肌上，或者在两条腕伸肌腱上（腕长伸肌和腕短伸肌）\u003Cbr /\u003E功能障碍的起源或协调中心：\u003Cbr /\u003E腕伸肌腱腱鞘炎提示了（其）肌腹筋膜的致密化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010522-la-ca-o-cp.jpeg\" alt=\"la-ca-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E治疗师一手握住前臂限制其运动，另一手阻抗腕关节外展运动。在急性期，沿肌腱发出的捻发音会伴随疼痛一起出现。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010526-la-ca-o-move.jpeg\" alt=\"la-ca-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E前臂遠端中下1/3交界處，尺側腕屈肌肌肉肌腱結合處\u003C/li\u003E\u003Cli\u003EHT4，靈道穴\u003C/li\u003E\u003Cli\u003E尺側腕屈肌遠端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腕部的內向運動（解剖學姿勢時手的尺偏）由單關節肌（起自尺骨的尺側腕屈肌）和雙關節肌（起自肱骨的尺側腕屈肌和小指屈肌）纖雛引發。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在尺側腕屈肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090428-Me-cu.jpeg\" alt=\"Me-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E腕部節段前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-ca 的 CC 位於橈側屈腕肌的外側，單關節（橈側屈腕肌）和雙關節（趾屈肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-ca 的 CC 位於掌長肌腱上，單關節（旋前方肌）和雙關節（掌長肌）向量在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-ca 的 CC 位於尺側屈腕肌腱上，單關節（尺側屈腕肌）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090546-an-ca-location.jpeg\" alt=\"an-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E橈側屈腕肌在大魚際肌筋膜上的近端牽引力，而拇短肌（an-ca, an-di） 在遠端方向的牽引力。\u003C/li\u003E\u003Cli\u003E尺側屈腕肌對小魚際筋膜施加近端牽引力，而掌短肌則施加遠端牽引力（me-ca，me-di) •\u003C/li\u003E\u003Cli\u003E由掌長肌向近端方向和由蚓狀肌（ir-ca, ir-di） 向遠端方向牽引掌腱膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010523-me-ca-location.jpeg\" alt=\"me-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003E前臂上四分之一的邊界的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-ca 的 CC 位於尺側屈腕肌（flexor carpi uInaris） 的肌腱通道上，如圖所示。\u003C/li\u003E\u003Cli\u003Ean-ca 的 CC 位於分隔橈側屈腕肌肌腹和掌長肌的隔膜上。\u003C/li\u003E\u003Cli\u003Eir-cu 的 CC 位於旋前圓肌上，其遠端筋膜在深處與旋前方肌（pronatorquadratus）（ir-ca）的筋膜相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070524-ir-ca-location.jpeg\" alt=\"ir-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ca 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證 me-ca 的 CC是在前臂的中間三分之一和遠端三分之一（曲線）之間的交界處進行的，沿著尺側屈腕肌腱（內側到垂直線）（針灸穴位 HT 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010518-me-ca-pave.jpeg\" alt=\"me-ca-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ca 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。透過交替使用左手和右手的肘部和指關節來鬆動這個 CC。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010530-me-ca-treatment.jpeg\" alt=\"me-ca-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧；治疗师治疗尺侧腕屈肌远端1/3（位点），直到筋膜的滑动完全恢复。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527100522-me-ca-o-treatment.jpeg\" alt=\"me-ca-o-treatment\" /\u003E\u003C/p\u003E"

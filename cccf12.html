<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC CF 點位隨機抽題卡</title>
    <style>
        :root{--primary:#4361ee;--primary-light:#4895ef;--secondary:#3f37c9;--bg:#f0f4ff;--card:#ffffff;--text:#212529;--err:#d00000;--warn:#e67700;--info:#1971c2;--mast:#5c3db8;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.7;color:var(--text);background:var(--bg);padding:0.5rem 0;}
        .container{max-width:100%;width:100%;padding:0;}
        h1{font-size:1.8rem;font-weight:700;color:var(--primary);text-align:center;margin:0.5rem 0;}
        .stats{display:flex;gap:0.2rem;margin:0.5rem 0;flex-wrap:nowrap;}
        .stat-item{background:var(--card);border-radius:8px;padding:0.4rem 0.15rem;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center;flex:1;}
        .stat-label{font-size:0.7rem;color:#6c757d;}
        .stat-value{font-size:1.25rem;font-weight:700;color:var(--primary);}
        .sv-new{color:var(--info);} .sv-due{color:var(--warn);} .sv-mast{color:var(--mast);}
        .prog-wrap{height:5px;background:#dee2e6;border-radius:3px;margin:0.3rem 0;overflow:hidden;}
        .prog-bar{height:100%;background:linear-gradient(90deg,var(--primary),#7048e8);border-radius:3px;transition:width .5s ease;width:0%;}
        .btn{background:var(--primary);color:#fff;border:none;padding:0.6rem 0.9rem;border-radius:6px;cursor:pointer;font-size:0.95rem;font-weight:500;transition:background .2s,transform .15s;}
        .btn:hover{background:var(--secondary);transform:translateY(-1px);}
        .btn:active{transform:translateY(0);}
        .btn-err{background:var(--err);}.btn-err:hover{background:#b00000;}
        .btn-sec{background:#6c757d;}.btn-sec:hover{background:#5a6268;}
        .btn-sm{padding:0.35rem 0.6rem;font-size:0.82rem;}
        .mode-row{display:flex;gap:0.35rem;margin:0.5rem 0;}
        .mode-btn{flex:1;padding:0.55rem 0.5rem;border-radius:6px;border:2px solid transparent;background:#e9ecef;color:#495057;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
        .mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(67,97,238,.35);}
        .mode-btn:not(.active):hover{background:#dee2e6;}
        .controls{display:flex;gap:0.2rem;margin:0.5rem 0;flex-wrap:wrap;}
        .filter-row{display:flex;gap:0.35rem;margin:0.5rem 0;align-items:stretch;}
        .filter-row .btn{flex-shrink:0;white-space:nowrap;}
        .filter-input{flex:1;min-width:0;padding:0.55rem 0.75rem;border-radius:6px;border:1px solid rgba(67,97,238,.35);font-size:0.93rem;font-family:Menlo,Monaco,Consolas,monospace;background:#fff;color:var(--text);}
        .filter-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(67,97,238,.18);}
        .filter-input::placeholder{font-family:"Noto Sans TC",-apple-system,sans-serif;color:#aaa;}
        .question-box{background:var(--card);border-radius:10px;padding:0.85rem 0.25rem;margin:0.5rem 0;box-shadow:0 2px 8px rgba(0,0,0,.07);}
        .question{font-size:1.35rem;font-weight:600;color:var(--primary);margin-bottom:0.6rem;}
        .question img,.answer-content img,.question-text img,.question-answer img{max-width:100%;height:auto;display:block;margin:0.5rem 0;border-radius:6px;}
        .srs-info{display:none;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.55rem;}
        .srs-badge{display:inline-flex;align-items:center;gap:0.2rem;font-size:0.73rem;padding:2px 9px;border-radius:10px;font-weight:700;letter-spacing:.3px;}
        .st-new{background:rgba(25,113,194,.12);color:var(--info);}
        .st-due{background:rgba(230,119,0,.13);color:var(--warn);}
        .st-upcoming{background:rgba(56,176,0,.12);color:#2b8a00;}
        .st-mastered{background:rgba(92,61,184,.12);color:var(--mast);}
        .srs-meta{font-size:0.71rem;color:#868e96;}
        .show-ans-wrap{text-align:center;margin:0.5rem 0;}
        .answer-content{display:none;background:rgba(67,97,238,.08);border-left:4px solid var(--primary);padding:0.6rem 0.5rem;border-radius:0 8px 8px 0;margin-top:0.6rem;}
        .answer-content.show{display:block;}
        .answer-content ul,.answer-content ol{padding-left:1.4rem;}
        .answer-content li{margin-bottom:0.4rem;}
        .answer-content p{margin-bottom:0.5rem;}
        .answer-content p:last-child{margin-bottom:0;}
        .rating-wrap{display:none;margin-top:0.8rem;}
        .rating-wrap.show{display:block;}
        .rating-label{font-size:0.75rem;color:#868e96;text-align:center;margin-bottom:0.5rem;line-height:1.5;}
        .rating-label strong{color:#495057;}
        .rating-row{display:flex;gap:0.3rem;}
        .r-btn{flex:1;min-width:0;padding:0.6rem 0.15rem;border:none;border-radius:9px;cursor:pointer;color:#fff;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:0 2px 8px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s,filter .15s;}
        .r-btn:hover{transform:translateY(-3px);box-shadow:0 5px 14px rgba(0,0,0,.22);}
        .r-btn:active{transform:translateY(0);filter:brightness(.88);}
        .r-again{background:linear-gradient(150deg,#e03131,#c92a2a);}
        .r-hard{background:linear-gradient(150deg,#e67700,#d9480f);}
        .r-good{background:linear-gradient(150deg,#2f9e44,#2b8a3e);}
        .r-easy{background:linear-gradient(150deg,#1971c2,#1864ab);}
        .r-icon{font-size:1.15rem;}
        .r-text{font-size:0.88rem;}
        .r-hint{font-size:0.67rem;font-weight:600;opacity:.92;background:rgba(255,255,255,.2);padding:1px 6px;border-radius:4px;white-space:nowrap;letter-spacing:.2px;}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:flex-start;padding:1rem 0;overflow-y:auto;}
        .modal.open{display:flex;}
        .modal-content{background:var(--card);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.2);padding:1rem 0.4rem;max-width:100%;width:100%;}
        .modal-title{font-size:1.3rem;font-weight:700;color:var(--primary);text-align:center;margin-bottom:0.6rem;}
        .modal-buttons{display:flex;justify-content:center;gap:0.75rem;margin-top:1rem;flex-wrap:wrap;}
        .modal-search-row{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.65rem;}
        .modal-search-group{display:flex;flex-direction:column;gap:0.2rem;}
        .modal-search-label{font-size:0.72rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#868e96;margin-bottom:0.15rem;}
        .modal-search{width:100%;padding:0.48rem 0.75rem;border-radius:6px;border:1px solid rgba(67,97,238,.25);font-size:0.88rem;background:#f8f9ff;color:var(--text);transition:border-color .2s,box-shadow .2s;}
        .modal-search:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(67,97,238,.15);background:#fff;}
        .no-results{text-align:center;color:#adb5bd;font-size:0.9rem;padding:1.2rem 0;}
        .q-count{font-weight:700;margin-bottom:0.6rem;text-align:center;}
        .q-count.cd{color:var(--warn);} .q-count.cm{color:var(--mast);} .q-count.ca{color:var(--primary);}
        .question-list{display:flex;flex-direction:column;gap:0.5rem;}
        .question-item{background:rgba(67,97,238,.05);border-left:4px solid var(--primary);padding:0.6rem 0.4rem;border-radius:0 8px 8px 0;font-size:0.93rem;}
        .question-item.is-mast{border-color:var(--mast);background:rgba(92,61,184,.05);}
        .question-header{display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;flex-wrap:wrap;}
        .question-text{flex:1;font-weight:500;}
        .srs-mini{font-size:0.69rem;color:#868e96;margin-top:3px;}
        .question-answer{display:none;margin-top:0.6rem;padding:0.6rem 0.4rem;background:rgba(255,255,255,.9);border-radius:5px;border:1px solid rgba(67,97,238,.2);}
        .question-answer.show{display:block;}
        .question-answer ul,.question-answer ol{margin:0;padding-left:1.4rem;}
        .question-answer li{margin-bottom:0.4rem;}
        .question-answer p{margin-bottom:0.5rem;}
        .question-answer p:last-child{margin-bottom:0;}
        h4{font-size:1.0rem;font-weight:700;color:var(--secondary);margin:0.85rem 0 0.3rem;padding-bottom:0.18rem;border-bottom:1px solid rgba(67,97,238,.2);}
        h5{font-size:0.95rem;font-weight:700;color:var(--primary);margin:0.65rem 0 0.25rem;}
        h6{font-size:0.88rem;font-weight:600;color:#555;margin:0.5rem 0 0.2rem;}
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0.65rem 0;border-radius:6px;}
        table{width:100%;border-collapse:collapse;font-size:0.88rem;min-width:260px;}
        thead tr{background:rgba(67,97,238,.13);}
        th{padding:0.45rem 0.6rem;text-align:left;font-weight:700;color:var(--primary);border:1px solid rgba(67,97,238,.25);white-space:nowrap;}
        td{padding:0.42rem 0.6rem;border:1px solid rgba(67,97,238,.15);vertical-align:top;}
        tr:nth-child(even) td{background:rgba(67,97,238,.04);}
        pre{background:#f4f6ff;border-radius:6px;padding:0.7rem 0.85rem;overflow-x:auto;margin:0.55rem 0;border:1px solid rgba(67,97,238,.14);font-size:0.85rem;}
        code{font-family:Menlo,Monaco,Consolas,monospace;font-size:0.87em;background:rgba(67,97,238,.09);padding:1px 5px;border-radius:3px;}
        pre code{background:transparent;padding:0;font-size:inherit;}
        blockquote{border-left:3px solid var(--primary-light);margin:0.55rem 0;padding:0.45rem 0.85rem;background:rgba(67,97,238,.05);border-radius:0 6px 6px 0;color:#444;}
        blockquote p{margin:0;}
        @media(max-width:600px){h1{font-size:1.3rem;}.stat-label{font-size:0.62rem;}.stat-value{font-size:1rem;}.stat-item{padding:0.3rem 0.1rem;}.question{font-size:1.05rem;}.btn{padding:0.5rem 0.55rem;font-size:0.82rem;}.controls{flex-wrap:nowrap;overflow-x:auto;}.controls .btn{flex:1;white-space:nowrap;}.r-icon{font-size:.95rem;}.r-text{font-size:.75rem;}.r-hint{font-size:.6rem;}th,td{padding:0.35rem 0.4rem;font-size:0.82rem;}.modal-search-row{grid-template-columns:1fr;}}
    </style>
</head>
<body>
<div class="container">
    <h1>CC CF 點位隨機抽題卡</h1>
    <div class="stats">
        <div class="stat-item"><div class="stat-label">總題數</div><div id="totalCount" class="stat-value">0</div></div>
        <div class="stat-item"><div class="stat-label">新卡片</div><div id="newCount" class="stat-value sv-new">0</div></div>
        <div class="stat-item"><div class="stat-label">今日到期</div><div id="dueCount" class="stat-value sv-due">0</div></div>
        <div class="stat-item"><div class="stat-label">已掌握</div><div id="mastCount" class="stat-value sv-mast">0</div></div>
    </div>
    <div class="prog-wrap"><div id="progBar" class="prog-bar"></div></div>
    <div class="filter-row">
        <input type="text" id="filterInput" class="filter-input" placeholder="Regex 篩選題目（例如 ^什麼 | keyword）…">
        <button id="filterBtn" class="btn">篩選</button>
        <button id="clearFilterBtn" class="btn btn-sec">清除篩選</button>
    </div>
    <div class="mode-row">
        <button id="modeRndBtn" class="mode-btn active">🎲 隨機練習</button>
        <button id="modeSrsBtn" class="mode-btn">📅 間隔複習（SM-2）</button>
    </div>
    <div class="controls">
        <button id="resetBtn" class="btn">重設進度</button>
        <button id="showAllBtn" class="btn btn-sec">查看全部題目</button>
        <button id="showDueBtn" class="btn btn-sec">查看到期題目</button>
        <button id="showMastBtn" class="btn btn-sec">查看已掌握</button>
    </div>
    <div class="question-box">
        <div id="srsInfo" class="srs-info"></div>
        <div id="question" class="question"></div>
        <div id="showAnsWrap" class="show-ans-wrap" style="display:none">
            <button id="showAnsBtn" class="btn">顯示答案</button>
        </div>
        <div id="answerContent" class="answer-content"></div>
        <div id="ratingWrap" class="rating-wrap">
            <div class="rating-label"><strong>評估此題難度</strong> -- 系統將依 SM-2 間隔重複算法安排下次複習時間</div>
            <div class="rating-row">
                <button class="r-btn r-again" data-q="1"><span class="r-icon">🔴</span><span class="r-text">再學</span><span class="r-hint" id="hint-1">重學</span></button>
                <button class="r-btn r-hard"  data-q="3"><span class="r-icon">🟠</span><span class="r-text">困難</span><span class="r-hint" id="hint-3">--</span></button>
                <button class="r-btn r-good"  data-q="4"><span class="r-icon">🟢</span><span class="r-text">良好</span><span class="r-hint" id="hint-4">--</span></button>
                <button class="r-btn r-easy"  data-q="5"><span class="r-icon">⭐</span><span class="r-text">容易</span><span class="r-hint" id="hint-5">--</span></button>
            </div>
        </div>
    </div>
</div>

<div id="resetModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">確定要重設？</div>
        <p style="text-align:center;margin-bottom:.5rem">這將清除所有 SM-2 學習進度（間隔、複習次數、難度係數），此操作<strong>無法撤銷</strong>。</p>
        <div class="modal-buttons"><button id="confirmResetBtn" class="btn btn-err">確定重設</button><button id="cancelResetBtn" class="btn">取消</button></div>
    </div>
</div>

<div id="allModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">全部題目</div>
        <div class="modal-search-row">
            <div class="modal-search-group"><div class="modal-search-label">🔍 題目關鍵字</div><input type="text" id="allQSearch" class="modal-search" placeholder="搜尋題目…"></div>
            <div class="modal-search-group"><div class="modal-search-label">🔍 答案關鍵字</div><input type="text" id="allASearch" class="modal-search" placeholder="搜尋答案…"></div>
        </div>
        <div id="allCount2" class="q-count ca"></div>
        <div id="allList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeAllBtn" class="btn">關閉</button></div>
    </div>
</div>

<div id="dueModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">今日待學題目</div>
        <div class="modal-search-row">
            <div class="modal-search-group"><div class="modal-search-label">🔍 題目關鍵字</div><input type="text" id="dueQSearch" class="modal-search" placeholder="搜尋題目…"></div>
            <div class="modal-search-group"><div class="modal-search-label">🔍 答案關鍵字</div><input type="text" id="dueASearch" class="modal-search" placeholder="搜尋答案…"></div>
        </div>
        <div id="dueCount2" class="q-count cd"></div>
        <div id="dueList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeDueBtn" class="btn">關閉</button></div>
    </div>
</div>

<div id="mastModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">已掌握題目</div>
        <div class="modal-search-row">
            <div class="modal-search-group"><div class="modal-search-label">🔍 題目關鍵字</div><input type="text" id="mastQSearch" class="modal-search" placeholder="搜尋題目…"></div>
            <div class="modal-search-group"><div class="modal-search-label">🔍 答案關鍵字</div><input type="text" id="mastASearch" class="modal-search" placeholder="搜尋答案…"></div>
        </div>
        <div id="mastCount2" class="q-count cm"></div>
        <div id="mastList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeMastBtn" class="btn">關閉</button></div>
    </div>
</div>

<script>
var qaData=[
  {
    "question": "IR-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E眉尾，眼眶外，眼輪匝肌外上角\u003C/li\u003E\u003Cli\u003ETE23，絲竹空穴\u003C/li\u003E\u003Cli\u003E眼下斜肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的內旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的上斜肌，其cc 點位於眼眉的外側端\u003C/li\u003E\u003Cli\u003E2=嵌人顳下頷關節盤的翼外肌，其cc 點位於耳屏和下頜骨頭部之間\u003C/li\u003E\u003Cli\u003E3=翼內肌，其cc 點位於耳垂和下頜骨頸之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後兩個次級肌筋膜單元的連接要素是翼肌筋膜\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080455-Ir-cp1.jpeg\" alt=\"Ir-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E眼部節段協調中心的比較性觸診\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 1的CC位於眼球及眶上嵴之間；單關節（上斜肌的滑車）及雙關節向量（眼輪匝肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Eme-cp 1的CC 位於內側眼臉韌帶，其中單關節（內直肌）及雙關節（眼輪匝肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 1的CC位於瞳孔下方並與瞳孔對齊，單關節（直肌下）和特定向量（眼球）匯合。Tenon&#39;s 囊筋膜將這些向量連接起來。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070540-an-cp1-location.jpeg\" alt=\"an-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E牽引眼輪匝肌（orbicularis oculi）上的耳前肌(anterior auricular muscle) (ir-cp 1-2) •\u003C/li\u003E\u003Cli\u003E牽引眼輪匝肌的上唇方肌顴骨部分（zygomatic portion of the quadratus labii supe-rioris) (an-cp 1-2) •\u003C/li\u003E\u003Cli\u003E上唇方肌的角部（angular portion of the quadratus labii superioris），在内側臉韌帶 (medial palpebral ligament) 和口輪匝肌的内側縫之間延伸（me-cp 1-2）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060520-me-cp1-location.jpeg\" alt=\"me-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E矢狀面和下方横截面中的眼球球狀筋膜 (Fasciae of the bulbus oculi) •\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 1 的CC 連接到上斜肌的筋膜，通過它的肌腱，位於眼眶上部的滑車（向下旋轉眼睛）。\u003C/li\u003E\u003Cli\u003Ean-cp 1的CC 與下直肌筋膜相連。\u003C/li\u003E\u003Cli\u003Eme-cp 1 的CC 與内直肌和眼球筋膜的眼眶肌腱，即眼球囊膜〔Tenon（特農）氏膜〕相關。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060501-ir-cp1-location.jpeg\" alt=\"ir-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 1 協調中心（CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E在眉毛下方進行觸診驗證。患者的感受與治療師的感受之間必須達成一致（針灸穴位 Ex3）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060553-ir-cp1-pave.jpeg\" alt=\"ir-cp1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 1 協調中心（CC）的治療\u003C/p\u003E\u003Cp\u003E患者仰臥閉眼。用指尖在眼眶上緣的內部以及部分眼球上操作。施加非常輕的力量直到感覺到筋膜之間滑動減少。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060507-ir-cp1-treatment.jpeg\" alt=\"ir-cp1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E治疗师用指尖同时触摸患者双侧的眉毛末端，比较两侧的高敏感性及牵涉痛。按摩该点直到症状消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010555-ir-cp1-o-treatment.jpeg\" alt=\"ir-cp1-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "IR-CP1 障礙",
    "answer": "\u003Cp\u003Eir-cp 1 肌筋膜單元的疼痛部位和感知中心（CP）\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E眼睛疼痛，視力模糊，由於淚液不足導致眼睛發紅。\u003C/li\u003E\u003Cli\u003E上斜肌的缺陷，在眼眶的上表面有一個滑車 (trochlea) 。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060536-ir-cp1-cp.jpeg\" alt=\"ir-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 1肌筋膜單元的疼痛動作 (PaMo) 。\u003C/p\u003E\u003Cp\u003E患者難以向下和橫向轉動眼睛。上斜肌或滑車斜肌使眼球後極 （posterior pole ofeyeball）向上和向内移動，從而允許眼球的下降和内旋。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060543-ir-cp1-pamo.jpeg\" alt=\"ir-cp1-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP（感知中心）：\u003Cbr /\u003E眼睑痉挛、视物模糊、眼睛发红或肿胀。\u003Cbr /\u003E功能障碍的起源或 CC（协调中心）：\u003Cbr /\u003E触诊眼睑筋膜和眼部旋转肌在眶部的附着点，有益于解决此区域内的问题。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010545-ir-cp1-o-cp.jpeg\" alt=\"ir-cp1-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让病人看他们的鼻尖，观察双侧斜肌协同运动；注意两只眼睛的运动是否对称。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010549-ir-cp1-o-move.jpeg\" alt=\"ir-cp1-o-move\" /\u003E\u003C/p\u003E"

    "question": "ER-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E眉毛中，外側1/3交界處上方，蝶額縫前側\u003C/li\u003E\u003Cli\u003EGB14，陽白穴\u003C/li\u003E\u003Cli\u003E眼上斜肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的外旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的下斜肌，其cc 點在眼眉中央\u003C/li\u003E\u003Cli\u003E2=耳上肌，其cc 點在耳輪上方\u003C/li\u003E\u003Cli\u003E3=耳後肌，其cC 點在起自項線與枕骨乳突部分的耳後肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E顳頂筋膜從眼眶延伸到顱項筋膜和枕部，是這3個次級肌筋膜單元的連接要素。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080412-Er-cp1.jpeg\" alt=\"Er-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著眼節段進行協調中心的比較\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 1的CC 位於眉毛的内緣，單關節肌（上直肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 1的CC 位於外眥上，單關節（外直肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp 1的CC位於眼球 （bulbus oculi）和眼眶下緣之間，單關節（下斜肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100530-re-cp-1-location.jpeg\" alt=\"re-cp-1-location\" /\u003E\u003Cbr /\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E牽拉來自向後的額肌和向前的眼輪匝肌或皺眉肌（re-cp 1-2）。\u003C/li\u003E\u003Cli\u003E牽拉來自向外的顳肌和向内的眼外直肌(la-cp 1-2) •\u003C/li\u003E\u003Cli\u003E帽狀腱膜的牽拉來自斜向的耳上肌和下斜肌以及眼輪匝肌的反向張力（er-cp 1-2）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060509-la-cp1-location.jpeg\" alt=\"la-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003E矢狀面和下方橫截面中的眼球球筋膜 (Fasciae of the bulbus oculi) •\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 1 的CC 位於提上眼臉肌 （levatorpalpebrae superioris）筋膜和上直肌。\u003C/li\u003E\u003Cli\u003Eer-cp 1 的CC 連接到下斜肌，使眼睛向一側旋轉。\u003C/li\u003E\u003Cli\u003Ela-cp 1 的CC，外直肌周圍的筋膜形成眶外肌腱，附著於外側眼眶。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060529-er-cp1-location.jpeg\" alt=\"er-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 1 協調中心（CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E在眼球（bulbus oculi） 和眼眶下緣之間的溝中進行觸診驗證。該CC 對應於針灸穴位 ST 1。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060512-er-cp1-pave.jpeg\" alt=\"er-cp1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 1 協調中心 （CC）的治療。\u003C/p\u003E\u003Cp\u003E患者仰臥。站在患者側邊，用指腹操作與下斜肌相連的 Tenon 筋膜。沿眼眶和眼球之間的整個溝施加輕微力道。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060536-er-cp1-treatment.jpeg\" alt=\"er-cp1-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ER-CP1 障礙",
    "answer": "\u003Cp\u003Eer-cp 1肌筋膜單元的疼痛部位和感知中心（CP）。\u003C/p\u003E\u003Cp\u003E由於對強烈的亮度敏感引起眼睛疼痛、復發性結膜炎（conjunctivitis）、葡萄膜炎（uveitis） 和角膜炎 （keratitis）過度敏感引起的眼睛疼痛、頭痛、面癱。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060559-er-cp1-cp.jpeg\" alt=\"er-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 1 肌筋膜單元的疼痛運動(PaMo) •\u003C/p\u003E\u003Cp\u003E患者主述暫時性複視（transitory diplopia），這意味著在外旋眼睛時有雙重影像；這發生原因是負責向上和橫向旋轉眼睛下斜肌過度活化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060507-er-cp1-pamo.jpeg\" alt=\"er-cp1-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP（感知中心）：\u003Cbr /\u003E头痛，难以睁大眼睛或转动眼球。\u003Cbr /\u003E功能障碍的起源或CC（协调中心）：\u003Cbr /\u003E如果这些眼部不适由上斜肌引起，可以推拿上眼眶上方区域的筋膜止点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060550-er-cp1-o-cp.jpeg\" alt=\"er-cp1-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者向上、向左、向右看，注意两眼的区别。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060554-er-cp1-o-move.jpeg\" alt=\"er-cp1-o-move\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧位，治疗师在前额区域触诊，即眉毛外侧正上方，用指尖感知组织的变化。对两侧 cc 点进行触诊比较是有效方法。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060559-er-cp1-o-treatment.jpeg\" alt=\"er-cp1-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "IR-CP2 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E耳輪角前方，顳骨顴突上方\u003C/li\u003E\u003Cli\u003ETE21，耳門穴\u003C/li\u003E\u003Cli\u003E翼外肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的內旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的上斜肌，其ce 點位於眼眉的外側端\u003C/li\u003E\u003Cli\u003E2=嵌人顳下頷關節盤的翼外肌，其cc 點位於耳屏和下頜骨頭部之間\u003C/li\u003E\u003Cli\u003E3=翼內肌，其cc 點位於耳垂和下頜骨頸之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後兩個次級肌筋膜單元的連接要素是翼肌筋膜\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080424-Ir-cp2.jpeg\" alt=\"Ir-cp2\" /\u003E\u003C/p\u003E\u003Cp\u003E上頜節段協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 2 CC 位於耳輪的前面，其中單關節（耳前肌）及雙關節（顳肌）的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 2的CC位於臉頰的中間，這裡是單關節（提上唇肌 levator labii superioris\u003C/li\u003E\u003Cli\u003E及雙關節（口角肌 anguli oris） 的向量匯合點。\u003C/li\u003E\u003Cli\u003Eme-cp 2的CC位於鼻唇溝 nasolabial sulcus 的中心，單關節（提上唇鼻翼肌 levatorlabii superior alaeque nasi） 及雙關節（顴肌的翼頭 alar head of zygomaticus） 的向量會合點。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070537-an-cp2-location.jpeg\" alt=\"an-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E翼狀肌在頭側和尾側方向牽引耳前肌（ir-cp 2-3) °\u003C/li\u003E\u003Cli\u003E唇方肌（quadratus labii）向上牽引上唇，頸闊肌 （platysma） 則是向下牽引（an-cp2-3) 。\u003C/li\u003E\u003Cli\u003E口輪匝肌向上牽引唇內側纖維彈性板，頸闊肌内側纖維向下牽引（me-cp 2-3）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-me-cp2-location.jpeg\" alt=\"me-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E顱骨斜切面圖（從後到前）。註解：級別上頜骨的高度低於後顱骨水平。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cp 2的CC位於上領骨和顴骨之間，在提上唇肌 （levator labii superioris muscle）上方。\u003C/li\u003E\u003Cli\u003Eme-cp 2的CC 位於兩上領骨中間的鼻唇溝 （nasolabial sulcus）中。me-cp 2後側的 CC 位於兩塊額肌之間。\u003C/li\u003E\u003Cli\u003Eir-cp 2的CC 位於耳輪和耳屏（tragus）之間，在開口時形成的凹陷的上部。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060556-ir-cp2-locatoon.jpeg\" alt=\"ir-cp2-locatoon\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eir-cp 2 協調中心（CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E在耳輪（helix）前方、下頷髁上方、往下的連線會到下頷角（針灸穴位 TE 21）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060550-ir-cp2-pave.jpeg\" alt=\"ir-cp2-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 2 協調中心（CC）的治療。\u003C/p\u003E\u003Cp\u003E患者仰臥，頭部向側邊旋轉。治療師站在患者身後或側邊，手指作用在頭部筋膜內的小肌肉纖維。力道很輕，因為這個區域 的筋膜很容易被觸診到。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060513-ir-cp2-treatment.jpeg\" alt=\"ir-cp2-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E病人仰卧，治疗师用指尖按摩位于耳轮根部前方的结缔组织，直到纤维化消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010539-ir-cp2-o-treatment.jpeg\" alt=\"ir-cp2-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "IR-CP2 障礙",
    "answer": "\u003Cp\u003Eir-cp 2 肌筋膜單元的疼痛部位及感知中心（CP）。\u003C/p\u003E\u003Cp\u003E耳朶和/或顳下頷關節疼痛。顳頂區感覺異常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060537-ir-cp2-cp.jpeg\" alt=\"ir-cp2-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 2肌筋膜單元的疼痛動作 (PaMo) •\u003C/p\u003E\u003Cp\u003EHAIRAN (temporoparietalis muscle) 和 / 或耳朶的内部肌肉可能導致頭部在水平面上運動時的平衡紊亂。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060544-ir-cp2-pamo.jpeg\" alt=\"ir-cp2-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E由于耳内肌肉过于紧张造成的耳鸣等障碍。\u003Cbr /\u003E功能障碍的起源或CC：\u003Cbr /\u003E耳鸣可以由离耳朵较远部位的肌紧张造成。在没有明确指征的情况下，这是一个有用的鉴别点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010530-ir-cp2-o-cp.jpeg\" alt=\"ir-cp2-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E为了验证内耳张力是否来源于耳前\u003Cbr /\u003E肌肉，医生可以将病人的耳屏向下和向后拉伸，被动牵拉该肌肉（这部分不会主动收缩），并和对侧进行对比。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010534-ir-cp2-o-move.jpeg\" alt=\"ir-cp2-o-move\" /\u003E\u003C/p\u003E"

  {
    "question": "ER-CP2 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E耳朵正上方，顳肌上\u003C/li\u003E\u003Cli\u003EGB8，率谷穴\u003C/li\u003E\u003Cli\u003E耳上肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的外旋運動分為3個次級肌筋膜\u003Cbr /\u003E單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的下斜肌，其cc 點在眼眉中央\u003C/li\u003E\u003Cli\u003E2=耳上肌，其cc 點在耳輪上方\u003C/li\u003E\u003Cli\u003E3=耳後肌，其cC 點在起自項線與枕骨乳突部分的耳後肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E顳頂筋膜從眼眶延伸到顱項筋膜和枕部，是這3個次級肌筋膜單元的連接要素。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080431-Er-cp2.jpeg\" alt=\"Er-cp2\" /\u003E\u003C/p\u003E\u003Cp\u003E在頭顱節段進行協調中心的比較\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 2位於前額的上部，單關節（額肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp 2位於耳輪上方，單關節（耳上肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 2位於顳筋膜上，單關節（顳肌）和雙關節（帽狀腱膜）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070523-re-cp2-location.jpeg\" alt=\"re-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E來自耳上肌的向上牽拉和耳後肌的向後牽拉 (er-cp 2-3) •\u003C/li\u003E\u003Cli\u003E帽狀腱膜的牽拉來自於前側的額肌以及後側的枕肌 （re-cp 2-3）。\u003C/li\u003E\u003Cli\u003E深筋膜的向上牽拉來自於顳肌，向下牽拉來自於嚼肌 （la-cp 2-3）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060503-la-cp2-location.jpeg\" alt=\"la-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003E顱骨穿過上頜骨的斜切面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 2的CC 位於額肌上（CC高於其所在位置）。\u003C/li\u003E\u003Cli\u003Ela-cp 2的CC 位於顳肌上方，其筋膜與咬肌的筋膜連續（如圖所示）。\u003C/li\u003E\u003Cli\u003Eer-cp 2的CC位於耳上肌，在耳朶的外軟骨（耳廓）上方。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060547-er-cp2-location.jpeg\" alt=\"er-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 2 協調中心 （CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E直接在耳廓頂點上方，在耳上肌的小纖維之間進行觸診驗證（針灸穴位 GB 8、GB9 d) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060542-er-cp2-pave.jpeg\" alt=\"er-cp2-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 2 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。站在患者的頭部後面或側面。\u003Cbr /\u003E使用指關節作用位於耳廓上方並包含在頭蓋骨内的肌肉纖維。\u003Cbr /\u003E應該施加一個剛好足以黏附在皮膚上的輕微力道。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060553-er-cp2-treatment.jpeg\" alt=\"er-cp2-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，头转向对侧，治疗师用指尖触诊患者耳上方有症状区域。鉴于该区域属浅层，轻微的压力即可。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060523-er-cp-2-o-treatment.jpeg\" alt=\"er-cp-2-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ER-CP2 障礙",
    "answer": "\u003Cp\u003Eer-cp 2肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E單側頭痛、頭皮感覺異常以及頭皮有灼燒 感或冰冷感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060526-er-cp2-cp.jpeg\" alt=\"er-cp2-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 2肌筋膜單元的疼痛運動(PaMo) •\u003C/p\u003E\u003Cp\u003E耳上肌 （superior auricular muscle） 的痙攣傳遞到頭狀腱膜，該肌肉附著於帽狀腱膜（galea capitis），導致嵌入的游離神經末梢異常緊張。耳上肌主要的動作是移動 耳廓，但人類不容易執行此運動。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060536-er-cp2-pamo.jpeg\" alt=\"er-cp2-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E头皮过敏，偏头痛伴有灼热感，头痛。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E耳上肌的痉挛传递到其嵌人的帽状腱膜上。这导致对帽状腱膜中神经末梢的不规则牵引。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060514-er-cp-2-o-cp.jpeg\" alt=\"er-cp-2-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E很少有人能主动活动耳肌，因此这里采用被动的运动验证方法，即通过向下拉伸耳轮，上方的耳肌被拉长，有时会伴有疼痛或异常感觉加剧。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060518-er-cp-2-o-move.jpeg\" alt=\"er-cp-2-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "IR-CP3 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E耳屏前下方，咬肌與耳朵之間\u003C/li\u003E\u003Cli\u003EGB2，聽會穴\u003C/li\u003E\u003Cli\u003E翼內肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的內旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的上斜肌，其ce 點位於眼眉的外側端\u003C/li\u003E\u003Cli\u003E2=嵌人顳下頷關節盤的翼外肌，其cc 點位於耳屏和下頜骨頭部之間\u003C/li\u003E\u003Cli\u003E3=翼內肌，其cc 點位於耳垂和下頜骨頸之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後兩個次級肌筋膜單元的連接要素是翼肌筋膜\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080439-Ir-cp3.jpeg\" alt=\"Ir-cp3\" /\u003E\u003C/p\u003E\u003Cp\u003E下領節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 3的CC位於下領骨的一側，單關節（翼肌 pterygoid）及雙關節（莖舌骨肌stylohyoid） 的向量會合點。\u003C/li\u003E\u003Cli\u003Eme-cp 3的CC 位於中央縫 central raphe 上，單關節（頦舌骨肌 mylohyoid）和雙關節（二腹肌 digastric） 的向量會合點。\u003C/li\u003E\u003Cli\u003Ean-cp 3的CC位於下領骨下方，單關節（頦舌骨肌 mylohyoid）和雙關節（二腹肌 digastric） 的向量會合點・頸筋膜連接這些。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070526-an-cp3-location.jpeg\" alt=\"an-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頸部白線牽拉下頷舌骨肌的正中纖維縫和胸骨上切跡中心 （me-cp 3, me-cl）。\u003C/li\u003E\u003Cli\u003E尾側方向的牽引力由胸鎖乳突肌（此處未圖示）和由二腹肌往頭端方向牽引（an-cl和 аn-ср 3) •\u003C/li\u003E\u003Cli\u003E莖突舌骨肌的牽引力往頭側方向和由肩胛舌骨肌往尾側方向 （ir-cp 3 和 ir-cl）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060531-me-cp3-location.jpeg\" alt=\"me-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E下領骨和口咽水平的顱骨橫截\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cp 3的CC 位於下領骨下方，下領舌骨肌（mylohyoid）和二腹肌 （digastricmuscles） 的筋膜上。\u003C/li\u003E\u003Cli\u003Eir-cp 3的CC 位於下頜骨的後緣，咬肌筋膜在此處與翼內側筋膜相連。\u003C/li\u003E\u003Cli\u003Eme-cp 3 的CC 位於下領舌骨肌的中縫。me-cp 3後側的 CC 位於頸部頂韌帶（nuchal ligament）附著於枕骨哭突（occipitalprotuberance）下方。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060549-ir-cp3-location.jpeg\" alt=\"ir-cp3-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eir-cp 3 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在耳垂前下頜後溝中進行。用指腹沿著下領骨的後緣搜索從咬肌 （masseter） 延伸到翼狀肌的筋膜緻密化（針灸穴位GB 2）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060544-ir-cp3-pave.jpeg\" alt=\"ir-cp3-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 3 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，頭轉向一側。將指腹或指關節放在下頜骨頸部的後緣，並沿著骨頭的邊界治療筋膜。因為此處有神經和腮腺，操作力道必須很小（2）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060555-ir-cp3-treatment.jpeg\" alt=\"ir-cp3-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧位，治疗师触诊下颌骨后方的沟，寻找一个明显不同的点：有时表现为一个小凸点。请让患者微微张口以方便查找。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010529-ir-cp3-o-treatment.jpeg\" alt=\"ir-cp3-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "IR-CP3 障礙",
    "answer": "\u003Cp\u003Eir-cp 3 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E顳顎痛、下頜痛、牙齒神經痛和唾液管功能障礙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060530-ir-cp3-cp.jpeg\" alt=\"ir-cp3-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 3 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E當外翼肌 （lateral pterygoid muscles） 或側翼肌 （external pterygoid muscles） 協同作用時，患者主述顳顎關節疼痛，導致下頜骨突比。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060538-ir-cp3-pamo.jpeg\" alt=\"ir-cp3-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E颞下颌关节痛、牙痛、听觉障碍和腮腺疾病。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E此CC 点作用于翼状肌，这部分肌肉从口腔外边很难触及，唯一可触及的表面点位于耳垂与下颌之间的沟内。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010521-ir-cp3-o-cp.jpeg\" alt=\"ir-cp3-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E要求病人在治疗师的阻力下将下颌骨从一边移到另一边；有时疼痛加剧，有时两边力量明显不等。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010524-ir-cp3-o-move.jpeg\" alt=\"ir-cp3-o-move\" /\u003E\u003C/p\u003E"
  },

    "question": "ER-CP3 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E乳突後方，胸鎖乳突肌在枕骨上止點\u003C/li\u003E\u003Cli\u003EGB12，完骨穴\u003C/li\u003E\u003Cli\u003E耳後肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的外旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的下斜肌，其cc 點在眼眉中央\u003C/li\u003E\u003Cli\u003E2=耳上肌，其cc 點在耳輪上方\u003C/li\u003E\u003Cli\u003E3=耳後肌，其cC 點在起自項線與枕骨乳突部分的耳後肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E顳頂筋膜從眼眶延伸到顱項筋膜和枕部，是這3個次級肌筋膜單元的連接要素。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080446-Er-cp3.jpeg\" alt=\"Er-cp3\" /\u003E\u003C/p\u003E\u003Cp\u003E在後側下領節段肌進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 3 位於枕骨粗隆下方，單關節（枕骨肌）和雙關節（豎脊肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp3 位於乳突，其中單關節（耳後肌）和雙關節（胸鎖乳突肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 3位於嚼肌筋膜上，單關節（嚼肌）和雙關節（笑肌）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520070549-re-cp3-location.jpeg\" alt=\"re-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E顳顎韌帶的牽拉來自往頭側的嚼肌和往尾側的胸鎖乳突肌 （la-cp 3, la-cl）。\u003C/li\u003E\u003Cli\u003E頸筋膜的牽拉來自往頭側的耳肌和往尾側的頸夾肌以及胸鎖乳突肌（er-cp 3, er-cl) •\u003C/li\u003E\u003Cli\u003E牽拉來自往頭側的枕肌以及往尾側的豎脊肌 (re-cp 3 和 re-cl) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060502-la-cp3-location.jpeg\" alt=\"la-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003E頭部在下領骨和口咽水平的橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cp 3 的CC 位於咬肌（masseter） 的肌腹上，其筋膜通過共同的懸帶與內側翼肌的筋膜相連。\u003C/li\u003E\u003Cli\u003Eer-cp 3的CC 位於枕骨上的胸鎖乳突肌和頭夾肌 （splenius capitis muscles） 的附著處。\u003C/li\u003E\u003Cli\u003Ere-cp 3的CC 位於斜方肌和頭半棘肌（semispinalis capitis） 的枕骨嵌入處，位於頭夾肌的深處。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060548-er-cp3-location.jpeg\" alt=\"er-cp3-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eer-cp 3 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在胸鎖乳突肌附著的乳突切跡的水平進行觸診驗證（針灸穴位 GB 12）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060543-er-cp3-pave.jpeg\" alt=\"er-cp3-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 3 協調中心（CC）的治療。\u003Cbr /\u003E患者坐著，頭靠在手上。站在患者身後，從同一側或相反側處理這個點。\u003Cbr /\u003E應施加適度的力道，沿小枕神經（lesser occipital nerve）的走向橫向操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060501-er-cp3-treatment.jpeg\" alt=\"er-cp3-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取坐位，头置于在手上，治疗师将指间关节置于乳突切迹区，触诊肌筋膜单元最致密的点，该点大致位于枕大神经附近。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060510-er-cp3-o-treatment.jpeg\" alt=\"er-cp3-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ER-CP3 障礙",
    "answer": "\u003Cp\u003Eer-cp 3 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E頸後（項背）疼痛，通常指前額和同側眼睛。小耳肌和眼肌功能障礙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060533-er-cp3-cp.jpeg\" alt=\"er-cp3-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 3 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E頭部疼痛與頸部僵硬或急性斜頸有關。患 者在轉動頸部時可能會感到頭部刺痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060537-er-cp3-pamo.jpeg\" alt=\"er-cp3-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E从颈部区域延伸至前额的头痛，有时会延伸至牙齿，伴眩晕、耳鸣。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E颈部肌肉的牵张力与耳后肌牵张力汇聚于乳突区。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060501-er-cp3-o-cp.jpeg\" alt=\"er-cp3-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E通常头与颈的疼痛相互联系，因此对颈部的运动测试会影响到头部的协调中心。如果疼痛只存在于头部，则可通过向前拉伸耳轮对耳后肌进行验证。需要注意，验证时要对左右耳的耳后肌进行对比。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527060505-er-cp3-o-move.jpeg\" alt=\"er-cp3-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "IR-CL 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸鎖乳突肌遠端，胸骨束與鎖骨束之間，前斜角肌上\u003C/li\u003E\u003Cli\u003EST11，氣舍穴\u003C/li\u003E\u003Cli\u003E前斜角肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頸部的內旋動作（將頸從外旋位置轉回到中線）由單關節肌（前斜角肌）和雙關節肌（胸鎖乳突肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在胸鎖乳突肌兩個頭之間的前斜角肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080453-Ir-cl.jpeg\" alt=\"Ir-cl\" /\u003E\u003C/p\u003E\u003Cp\u003E頸部節段前側協調中心的比較性動作驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cl 的CC 位於甲狀腺軟骨的一側，在此單關節（舌下肌）及雙關節向量（胸鎖乳突肌）匯聚。\u003C/li\u003E\u003Cli\u003Eir-cl 的CC位於鎖骨上方，在此單關節（肩胛舌骨肌）及雙關節向量（胸鎖乳突肌的鎖骨頭）匯聚。\u003C/li\u003E\u003Cli\u003Eme-cl 的CC 位於胸骨窩，由胸鎖乳突肌的胸骨部形成的向量匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080537-an-cl-location.jpeg\" alt=\"an-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩舌骨肌 （omohyoid）對中頸椎板施加向上牽引，肋間筋膜（ir-cl，ir-th） 向下牽引。\u003C/li\u003E\u003Cli\u003E由胸骨上帶（me-cl, me-th） 連接的頸椎和腰椎白線之間的張力。\u003C/li\u003E\u003Cli\u003E胸骨旁筋膜的張力由胸鎖乳突肌在頭側牽引，尾側則源自腹直肌 （an-cl，an-th）的起點。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120541-me-cl-a-location.jpeg\" alt=\"me-cl-a-location\" /\u003E\u003C/p\u003E\u003Cp\u003E頸部的橫截面圖，在第5節頸椎的水平，從上方往下看。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cl 的 CC 位於胸鎖乳突肌的鎖骨端和胸骨端之間，對應於舌骨的中間肌腱。\u003C/li\u003E\u003Cli\u003Ean-cl 的CC 位於胸鎖乳突肌的前緣，在甲狀軟骨水平高度\u003C/li\u003E\u003Cli\u003Eme-cl 前側的 CC 位於胸骨窩。me-cl 後側的 CC 位於頸部韌帶附著於第 7頸椎的位置。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060520-Ir-cl-location.jpeg\" alt=\"Ir-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cl 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在患者的合作之下進行，患者必須說明右側的 CC 是否比左側的CC 更敏感，以及說明哪個精確點出現了最明顯的疼痛（針灸穴位 ST 11）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060513-Ir-cl-pave.jpeg\" alt=\"Ir-cl-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cl 協調中心（CC）的治療。\u003C/p\u003E\u003Cp\u003E病人仰臥，頭部向一側旋轉。用指關節置入胸鎖乳突肌的兩個頭部之間，以便治療頸部深筋膜的淺層和中層。\u003Cbr /\u003E操作方向是橫向的，沿著鎖骨的上緣。力道適中，必須克服胸鎖乳突肌的阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060529-Ir-cl-treatment.jpeg\" alt=\"Ir-cl-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取仰卧位或坐位，头转向对侧；治疗师用指间关节在胸锁乳突肌胸骨和锁骨头之间进行触诊，深度要达到触及覆盖肩胛舌骨肌中心腱的筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010513-ir-cl-o-treatment.jpeg\" alt=\"ir-cl-o-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "IR-CL 障礙",
    "answer": "\u003Cp\u003Eir-cl 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E頸部疼痛、胸鎖關節腫脹、頸部內在器官 功能障礙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060552-Ir-cl-cp.jpeg\" alt=\"Ir-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cl 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者主訴旋轉時頸部疼痛；有時候這種疼痛似乎發生在頸部外旋時，是由於内旋肌筋膜單位的不協調所造成的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060558-Ir-cl-pamo.jpeg\" alt=\"Ir-cl-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E胸锁关节的疼痛和肿胀，频繁的头颈歪斜，转头困难。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E即使病人抱怨只有一侧疼痛，我们也可以假设，作为一对儿旋转力，要考虑对侧内旋序列上的CC。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010505-ir-cl-o-cp.jpeg\" alt=\"ir-cl-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让患者的头从外旋位置转回正中位置，治疗者施加反向阻力。颈、胸、腰、骨盆在内旋方向上的运动测试不是总会加剧疼痛，这些点需要更多依靠触诊来验证。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010509-ir-cl-o-move.jpeg\" alt=\"ir-cl-o-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ER-CL 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸鎖乳突肌後側，C2-C4橫突，肩胛提肌和頭夾肌上\u003C/li\u003E\u003Cli\u003ETE16，天牖穴\u003C/li\u003E\u003Cli\u003E頭夾肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頸部的外旋運動（向後看）由單關節肌（頸回旋肌）和雙關節肌（頸夾肌、肩胛提肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在夾肌和回旋肌上，與第二、第三頸椎橫突水平。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080407-Er-cl.jpeg\" alt=\"Er-cl\" /\u003E\u003C/p\u003E\u003Cp\u003E在後側頸節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cl 位於胸鎖乳突肌筋膜上，單關節（中斜角肌）和雙關節（胸鎖乳突肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cl 位於第3 頸椎的橫突上，單關節（頸夾肌）和雙關節（提肩胛肌）向量的交匯處。\u003C/li\u003E\u003Cli\u003Ere-cl 位於第 6 頸椎水平高度，單關節（多裂肌）和雙關節（最長肌）向量的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100532-re-cl-location.jpeg\" alt=\"re-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E深筋膜的牽拉來自於往頭側的頭半棘肌，以及往尾側的胸半棘肌 （re-cl, re-th）。\u003C/li\u003E\u003Cli\u003E中層深筋膜的牽拉來自往頭側的頭夾肌，以及往尾側的頸夾肌和後鋸肌（er-cl, er-th) •\u003C/li\u003E\u003Cli\u003E外側筋膜的牽拉來自於往頭側的頭後大直和小直肌，以及往尾側的胸髂肋肌（la-cl，la-th) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010523-la-cl-location.jpeg\" alt=\"la-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在第5 頸椎水平向上看的頸部橫截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cl 的CC 位於胸鎖乳突肌腹的中心，在甲狀軟骨水平。\u003C/li\u003E\u003Cli\u003Eer-cl 的CC 與提肩胛肌有關，其筋膜與後斜角肌的筋膜一起向前延伸。\u003C/li\u003E\u003Cli\u003Ere-cl 的CC位於頸夾肌（splenius cervicis）、頭夾肌 （splenius capitis） 和頭半棘肌 （semispinalis capitis） 上，可在斜方肌和提肩胛肌之間的溝中觸診到。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070507-er-cl-location.jpeg\" alt=\"er-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cl 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E在C2-C4 的橫突的後方，在頸夾肌（splenius cervicis）筋膜和提肩胛肌（針灸穴位 TE 16）上進行觸診驗證。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070502-er-cl-pave.jpeg\" alt=\"er-cl-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cl 協調中心 （CC）的治療。\u003Cbr /\u003E患者仰臥，頭部轉向對側。站在患者的頭部後面或側邊，用指關節在疼痛的點操作並重現患者的症狀。\u003Cbr /\u003E應在提肩胛肌的椎體附著處施加適度的力道。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070513-er-cl-treatment.jpeg\" alt=\"er-cl-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧，头转向对侧；治疗师将指间关节置于第2 和第3横突上，这里是肩胛提肌的止点，松解该点直至感觉此处组织发生变化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070517-er-cl-o-treatment.jpeg\" alt=\"er-cl-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "ER-CL 障礙",
    "answer": "\u003Cp\u003Eer-cl 肌筋膜單元的疼痛部位和感知中心（CP）。\u003C/p\u003E\u003Cp\u003E頸部外側區域的疼痛，通常會延伸至頭部或同側肩部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070551-er-cl-cp.jpeg\" alt=\"er-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cl 肌筋膜單元的疼痛動作 (PaMo) 。\u003C/p\u003E\u003Cp\u003E患者報告說無法轉動脖子，尤其是向一側轉動。有時，只有運動受限，而在其他時候，疼痛是主要症狀。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070556-er-cl-pamo.jpeg\" alt=\"er-cl-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E颈痛、肩痛、头痛和喉咙痛。\u003Cbr /\u003E功能障碍起源或 CC点：\u003Cbr /\u003E若为急性疼痛，止痛痉挛可导致斜颈；若为慢性疼痛，可见颈部运动范围受限以避免刺激神经末梢。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070508-er-cl-o-cp.jpeg\" alt=\"er-cl-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E令患者左右旋转头部，并告知更痛的是哪一侧；在适当时候，治疗师可以施加被动的力来克服可能掩盖问题的运动受限或僵硬。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070512-er-cl-o-move.jpeg\" alt=\"er-cl-o-move\" /\u003E\u003C/p\u003E"

  {
    "question": "IR-TH 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E乳頭下方，第5-6肋間肌上\u003C/li\u003E\u003Cli\u003ELR14，期門穴\u003C/li\u003E\u003Cli\u003E肋間肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E胸部的內旋運動（將胸的一側向前移）由單關節肌（助間肌）和雙關節肌（胸大肌、背閣肌、腹斜肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在鎖骨中線與第五、第六肋之間的肋間肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080414-Ir-th.jpeg\" alt=\"Ir-th\" /\u003E\u003C/p\u003E\u003Cp\u003E前側胸部節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-th 的CC位於胸骨，由兩個胸大肌組成的向量在此處匯聚。\u003C/li\u003E\u003Cli\u003Eir-th 的 CC 位於乳房下方，這裡是單關節（肋間肌）及雙關節向量（胸大肌下部）的匯合處。\u003C/li\u003E\u003Cli\u003Ean-th 的CC 位於劍突的一側，單關節（胸骨肌）及雙關節向量（腹直肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080523-an-th-location.jpeg\" alt=\"an-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拉緊臍上白線，其上方錨定至胸骨，下方錨定至腹直肌鞘（me-th, me-lu） 的肌腱交叉處。\u003C/li\u003E\u003Cli\u003E前鋸肌在頭側方向牽引，而腹斜肌本身（ir-th，ir-lu）向尾端方向施加的腹斜肌筋膜牽引。\u003C/li\u003E\u003Cli\u003E胸大肌在頭側方向牽引腹直肌鞘，在同一腹直肌（an-th, an-lu） 的肌腱交叉處向尾側牽引腹直肌鞘。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090507-me-th-a-location.jpeg\" alt=\"me-th-a-location\" /\u003E\u003C/p\u003E\u003Cp\u003E在第三胸椎水平的胸壁的横截面\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eme-th 後側的 CC 位於胸椎的棘上韌帶(supraspinous ligaments) 上。me-th 的前側 CC 位於穿過胸骨的韌帶上。\u003C/li\u003E\u003Cli\u003Eir-th 的CC 位於乳房下方，在胸大肌筋膜和腹斜肌筋膜之間的通道上。\u003C/li\u003E\u003Cli\u003Ean-th 的CC位於劍突側邊肋骨上，腹直肌在肋骨的附著處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060557-ir-th-location.jpeg\" alt=\"ir-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-th 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在第五或第六肋間進行觸診驗證，在胸大肌下緣，沿著乳頭線（紅色虛線）（針灸穴17 LV 14 • GB 24 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060551-ir-th-pave.jpeg\" alt=\"ir-th-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-th 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。治療師站在側邊，指節在肋間溝的筋膜上操作，直到患者感覺疼痛減輕。力道必須具有中等強度（3）才能到達肋間筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060505-ir-th-treatment.jpeg\" alt=\"ir-th-treatment\" /\u003E\u003C/p\u003E"

    "question": "IR-TH 障礙",
    "answer": "\u003Cp\u003Eir-th 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E前胸區單側或雙側肋間疼痛、刺痛；肋骨骨折後的痛苦後遺症。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060539-ir-th-cp.jpeg\" alt=\"ir-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-th 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者主述，當軀幹旋轉或向前彎曲時，乳房下方有刺痛感。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060545-ir-th-pamo.jpeg\" alt=\"ir-th-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E肋间痛，向前弯曲时加重；肋间尖锐剧痛。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E在这个肌筋膜单元，由于肋间肌及其筋膜非常小而且连接紧密，疼痛与其起源部位是重叠的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010546-ir-th-o-cp.jpeg\" alt=\"ir-th-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让病人双手置于头上旋转胸部，若外旋-胸节段的CC点改变则后胸部疼痛加剧，而内旋-胸节段的CC改变则表现为前胸区域的疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010550-ir-th-o-move.jpeg\" alt=\"ir-th-o-move\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者取仰卧位，CC 位于乳头正下方，在第5或第6肋间。最初，病人感到剧烈的疼痛，然后，疼痛突然消失。患者经常会问治疗师是否减轻了施压的力度，但实际上是由于出现纤维化的筋膜最初对抗一个强大的阻力，一旦弹性恢复就会有压力减轻的感觉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010556-ir-th-o-treatment.jpeg\" alt=\"ir-th-o-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "ER-TH 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E上後鋸肌平T3水平，抵於豎脊肌外側\u003C/li\u003E\u003Cli\u003EBL42，魄戶穴\u003C/li\u003E\u003Cli\u003E上後鋸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E胸部的外旋運動（將一側胸部向後旋裝）由單關節肌（上後鋸肌）和雙關節肌（斜方肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的ce 點在上後鋸肌靠近肩胛網處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080421-Er-th.jpeg\" alt=\"Er-th\" /\u003E\u003C/p\u003E\u003Cp\u003E後側胸節段進行協調中心的比較性觸出診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eer-th 位於肩骨水平高度，單關節（後上鋸肌）和雙關節（髂肋肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-th 位於第4 胸椎水平高度，單關節（胸多裂肌）和雙關節（最長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-th 位於第8 和第 10肋骨之間，單關節（棘突間肌）和雙關節（胸髂肋肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100550-re-th-location.jpeg\" alt=\"re-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鋸筋膜的牽拉來自於往頭側方向的後上鋸肌和往尾側方向的下後上鋸肌 （er-th, er-lu) •\u003C/li\u003E\u003Cli\u003E深筋膜的牽拉來自於往頭側的頸脊肌和往尾側的脊肌 （re-th 和 re-lu）。\u003C/li\u003E\u003Cli\u003E胸腰筋膜外側部分的牽拉來自於往頭側的髂肋肌和往尾側的腰方肌 （la-th 和 la-lu) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010534-la-th-location.jpeg\" alt=\"la-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003E第2胸椎水平的胸壁橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-th 的 CC 位於沿髂肋肌 （iliocostalis muscle） 嵌入第7、8和9肋骨的更遠側處。\u003C/li\u003E\u003Cli\u003Ere-th 的 CC 位於斜方肌和豎脊肌上方，在第4 和第5胸椎的水平。\u003C/li\u003E\u003Cli\u003Eer-th 的 CC 位於菱形肌和後上鋸肌(serratus posterior superior muscles）上方，與闊背肌一起向前延伸。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070546-er-th-location.jpeg\" alt=\"er-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-th 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在肩胛骨內側緣的内側進行觸診驗證，位置在肩胛骨脊柱的水平（針灸穴位 BL 41p • 43) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070541-er-th-pave.jpeg\" alt=\"er-th-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-th 協調中心 （CC）的治療。\u003C/p\u003E\u003Cp\u003E患者俯臥，雙臂沿身體側伸展。站在患者的頭側或側面，用肘部操作上距肌間（superior interserrati）筋膜。一旦緻密區域開始變化，就可以用指關節完成 CC。\u003Cbr /\u003E肘部應沿著肩胛骨的邊界施加強大的力道。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070553-er-th-treatment.jpeg\" alt=\"er-th-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者俯卧，治疗师用肘抵住肩胛骨内侧缘，即肩胛冈末端，治疗牵涉痛的部位。一旦局部疼痛减弱，用指间关节检查筋膜组织，力度渗透于不同肌层。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070557-er-th-o-treatment.jpeg\" alt=\"er-th-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "ER-TH 障礙",
    "answer": "\u003Cp\u003Eer-th 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E胸部上部疼痛，伴有頸部和/或肩部的放射痛。疼痛通常是單側的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070531-er-th-cp.jpeg\" alt=\"er-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-th 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者報告在頸部旋轉或肩胛骨運動過程中胸部有不適感。有時，疼痛會延伸到肩部和前胸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070536-er-th-pamo.jpeg\" alt=\"er-th-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E颈根部疼痛，颈部锐痛，肩胛间阻滞感并伴有呼吸困难。\u003Cbr /\u003E功能障碍起源或 CC点：\u003Cbr /\u003E若病变仅发生于上后锯肌筋膜，则疼痛局限于患处。如果失衡，沿同侧夹肌延伸，则疼痛延伸至颈部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070547-er-th-o-cp.jpeg\" alt=\"er-th-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者双手置于脑后，左右旋转躯干。也可以对这个肌筋膜单元进行被动测试：治疗师一只手旋转并牵伸患者的颈部，同时另一只手阻止同侧肩部移动。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070552-er-th-o-move.jpeg\" alt=\"er-th-o-move\" /\u003E\u003C/p\u003E"

    "question": "IR-LU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第11肋肋間，腋前線前側，腹外斜肌上\u003C/li\u003E\u003Cli\u003ELR13，章門穴\u003C/li\u003E\u003Cli\u003E腹外斜肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腰部的內旋運動（將同一側的肋緣向前移）由單關節肌（止於腹白線的腹橫肌）和雙關節肌（一側的腹外斜肌纖維不間斷地延續至對側腹內斜肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在第十一肋下。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080431-Ir-lu.jpeg\" alt=\"Ir-lu\" /\u003E\u003C/p\u003E\u003Cp\u003E腰部節段前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-lu 的CC 位於第11 肋骨下方，單關節（腹橫肌）及雙關節向量（腹斜肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-lu 的CC位於臍上方的白線上，具有感知作用。\u003C/li\u003E\u003Cli\u003Ean-lu 的CC 位於肚臍的一側，在那裡單關節（腹直肌）及雙關節向量（腹斜肌）會聚。腹筋膜連接這些向量。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080551-an-lu-location.jpeg\" alt=\"an-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腹白線的臍上束由腹外斜肌往頭側方向拉緊，而臍下束是由錐肌（pyramidalis muscle）（me-lu，me-pv） 往尾側拉緊。\u003C/li\u003E\u003Cli\u003E腹直肌鞘由肌腱交叉點往頭側方向牽引，然而在髂肌則往尾端方向牽引（an-lu，an-pv) •\u003C/li\u003E\u003Cli\u003E腹外斜肌筋膜將肌肉本身往頭側牽拉，然而臀中肌和臀小肌則往尾端方向牽拉（ir-lu • ir-pv) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090556-me-lu-a-location.jpeg\" alt=\"me-lu-a-location\" /\u003E\u003C/p\u003E\u003Ch4\u003E中腹區緊鄰肚臍下方的橫截面圖\u003Cbr /\u003E- me-lu 後側的CC 位於腰椎的棘上韌帶上方；me-lu 的前側CC在臍上白線（su-praumbilical linea alba) 上•\u003Cbr /\u003E- ir-lu 的 CC 位於第 11 肋骨，腹斜肌的起點。\u003Cbr /\u003E- an-lu 的CC位於腹直肌鞘上，肚臍的旁邊。\u003C/h4\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060542-ir-lu-location.jpeg\" alt=\"ir-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-lu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在第 11 肋骨的游離端下方（針灸穴位LV 13） 進行觸診驗證。患者仰臥，因為這個姿勢有利於對這個節段（an-lu、me-lu）中其他 CC 的比較觸診。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060535-ir-lu-pave.jpeg\" alt=\"ir-lu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-lu 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥。治療師位於患者前方，將肘部靠在腋中線前方的第11 肋骨上，沿橫向操作腹斜肌筋膜。\u003Cbr /\u003E力道應為中等強度（3），以便到達腹斜肌在肋骨的附著點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060551-ir-lu-treatment.jpeg\" alt=\"ir-lu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E病人向非痛侧侧卧，治疗者把手肘置于患者肋弓下缘滑动施压，改变压力直到发现最敏感的痛点。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010537-ir-lu-o-treatment.jpeg\" alt=\"ir-lu-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "IR-LU 障礙",
    "answer": "\u003Cp\u003Eir-lu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E腹壁疼痛，表現為一側沉重感或兩側下肋骨區域刺痛（季肋區）（hypochondrium）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060521-ir-lu-cp.jpeg\" alt=\"ir-lu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-lu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者報告說，每當他們倒車時轉身或在床上翻身時，側面疼痛就會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060527-ir-lu-pamo.jpeg\" alt=\"ir-lu-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E腹壁痛，位于季肋部，脐周，或腹股沟区。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E腹内外斜肌附着于下部肋骨。当肌筋膜发生纤维化时，弥漫性疼痛可以在这些肌肉相关的整个区域蔓延。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010529-ir-lu-o-cp.jpeg\" alt=\"ir-lu-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E让病人旋转躯干，如同越过肩膀向后看，保持手臂交叉以避免用手帮忙。\u003Cbr /\u003E通常向两侧旋转的范围存在差异。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010532-ir-lu-o-move.jpeg\" alt=\"ir-lu-o-move\" /\u003E\u003C/p\u003E"

5) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070516-er-lu-pave.jpeg\" alt=\"er-lu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-lu 協調中心 （CC）的治療。\u003Cbr /\u003E患者側臥。站在患者身後，將肘部抵在第12肋骨的下緣，操作筋膜直至疼痛消失。\u003Cbr /\u003E操作強度適中（3），平行於肋骨進行。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070531-er-lu-treatment.jpeg\" alt=\"er-lu-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者背对治疗师侧卧，筋膜治疗师用肘抵住其第12肋下缘，向肋骨末端移动以寻找致密的区域。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070531-er-lu-o-treatment.jpeg\" alt=\"er-lu-o-treatment\" /\u003E\u003C/p\u003E"

ster/images/20260518060532-ir-pv-pave.jpeg\" alt=\"ir-pv-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-pv 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥。治療師站在患者身後，將肘部放在闊筋膜張肌後方形成的溝中，在臀小肌和臀中肌的筋膜上深度摩擦。\u003Cbr /\u003E壓力必須很大（等級4），因為下面的筋膜和肌肉非常強壯。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060544-ir-pv-treatment.jpeg\" alt=\"ir-pv-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E病人向非痛侧侧卧，治疗师站在病人身后用肘关节抵于臀小肌肌腹，按摩直到异常筋膜变软。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010501-ir-pv-o-treatment.jpeg\" alt=\"ir-pv-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "ER-PV 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胳脊最高點下方，臀中肌上\u003C/li\u003E\u003Cli\u003EGB29，居髏穴\u003C/li\u003E\u003Cli\u003E臀中肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E骨盆的外旋運動（外旋一盆）由單關節肌（臀中肌）和雙關節肌（臀大肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在臀中肌上，緊靠鏘脊最高點下方。在這個部位，臀筋膜為許多肌纖維提供附著，並且在它的後面延伸有許多結締組織層，這些結締組織層穿過梨狀肌與閉孔外肌的肌纖維。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080456-Er-pv.jpeg\" alt=\"Er-pv\" /\u003E\u003C/p\u003E\u003Cp\u003E後側骨盆節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-pv 位於髂腰韌帶上，單關節（多裂肌）和雙關節（最長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-pv 位於髂嵴的最高點（頂峰）下方，單關節（臀中肌）和雙關節（臀大肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-pv 位族臀大肌的上縁，單關節（臀中肌）和雙關節（臀大肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100520-re-pv-location.jpeg\" alt=\"re-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E中層深筋膜的牽拉來自於往頭側的臀中肌，以及往尾側的梨狀肌和孖肌。（er-pv，er-cx) •\u003C/li\u003E\u003Cli\u003E上層深筋膜的牽拉來自於往頭側的臀大肌和遠端方向的闊筋膜張肌 （la-pv, la-cx）。\u003C/li\u003E\u003Cli\u003E薦椎結節韌帶的牽拉來自於往頭側的骶棘肌和遠端方向的臀大肌 （re-pv, re-cx）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010538-la-pv-location.jpeg\" alt=\"la-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003E下腹區域在恥骨的水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-pv 的 CC 位於臀大肌的外緣，此肌肉的筋膜與臀中肌的外向運動單元連接。\u003C/li\u003E\u003Cli\u003Ere-pv 的CC 位於腰背腱膜上，覆蓋多裂肌和薦棘肌 （sacrospinal muscles）（髂肋肌和最長肌），也稱為豎脊肌。\u003C/li\u003E\u003Cli\u003Eer-pv 的CC 位於臀中肌的筋膜上，在其近端具有真正的腱膜外觀。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070552-er-pv-location.jpeg\" alt=\"er-pv-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-pv 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在臀中肌筋膜上進行觸診驗證，沿著從髂嵴頂端到大轉子（greater trochanter ）的連線（針灸穴位 GB 29）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070547-er-pv-pave.jpeg\" alt=\"er-pv-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-pv 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，腿伸直。\u003Cbr /\u003E站在患者身後，將肘部放在臀中肌筋膜上，操作通常需要長時間而深入的力道。臀中肌筋膜具有很強的抵抗力，因此需要非常強大的力量來改變其纖維化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070558-er-pv-treatment.jpeg\" alt=\"er-pv-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者背对治疗师侧卧，治疗师将肘抵在臀中肌筋膜上，此位置正好位于骼嵴顶点下方；患者可在骶骨、大腿或腹股沟的区域感受到上述疼痛。治疗师应注意如何使用身体的部分重量，以便对这类十分致密的筋膜进行操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070501-er-pv-o-treatment.jpeg\" alt=\"er-pv-o-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ER-PV 障礙",
    "answer": "\u003Cp\u003Eer-pv 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E髖關節、薦髂關節或下肢疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070537-er-pv-cp.jpeg\" alt=\"er-pv-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-pv 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者在站立一段時間後，主訴下背部或下肢疼痛。有時，姿勢評估檢查會突顯骨盆 的旋轉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070542-er-pv-pamo.jpeg\" alt=\"er-pv-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E骶髂关节疼痛，有时疼痛向下延伸至下肢后外侧区。\u003Cbr /\u003E功能障碍起源或 CC点：\u003Cbr /\u003E臀中肌筋膜的改变可引起骨盆转动失调，而后刺激骶髂韧带，可能会形成大腿后侧肌群的代偿性张力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070552-er-pv-o-cp.jpeg\" alt=\"er-pv-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E治疗师抓住患者肩部，请患者每次向前移动一侧髂嵴，两侧交替进行。被带动的一侧骨盆向后转动时，骶骨或沿着大腿可能会感到疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070557-er-pv-o-move.jpeg\" alt=\"er-pv-o-move\" /\u003E\u003C/p\u003E"

    "question": "IR-CX 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿近端1/3前側，縫匠肌內側，股薄肌筋膜上\u003C/li\u003E\u003Cli\u003ELR11，陰廉穴\u003C/li\u003E\u003Cli\u003E恥骨肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E髖部的內旋運動（將鏡關節向內旋轉）由單關節肌（恥骨肌和臀小肌）和雙關節肌（闊翁膜張肌和大收肌）的纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在股三角的頂點\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080403-Ir-cx.jpeg\" alt=\"Ir-cx\" /\u003E\u003C/p\u003E\u003Cp\u003E髖部節段協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cx 的CC 位於腹股溝韌帶的遠端，單關節（内收長肌）和雙關節向量（髂腰肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-cx 的CC 位於股薄肌/內收肌上，單關節（内收長肌）和雙關節向量（股薄肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-cx 的 CC 位於 Scarpa 三角形（股三角形）的頂點，在那裡單關節（恥骨肌）和雙關節向量（内收大肌）匯聚。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090516-an-cx-location.jpeg\" alt=\"an-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E通過内收肌的起點向近端方向牽引内收肌筋膜，並通過嵌入這些相同的肌肉（me-cx、me-ge） 向遠端方向牽引内收肌筋膜。\u003C/li\u003E\u003Cli\u003E骼腰肌對闊深筋膜（deep fascia lata）的近端牽引和股中間肌（an-cx, an-ge）的遠端牽引。\u003C/li\u003E\u003Cli\u003E恥骨肌對股骨内收肌膜（内收肌管上的筋膜）和肌間隔施加近端牽引力，而股内側肌施加遠端牽引力 （ir-cx，ir-ge）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090532-me-cx-location.jpeg\" alt=\"me-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E大腿近端在股骨頸水平的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cx 的 CC 位於骼腰肌腱膜，在縫匠肌鞘的内側。\u003C/li\u003E\u003Cli\u003Eir-cx 的 CC 位於恥骨筋膜的末端部分，覆蓋在内收長肌和内收短肌的筋膜上。\u003C/li\u003E\u003Cli\u003Eme-cx 的 CC 位於股薄肌鞘，反過來，它涵蓋了内收大肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060546-ir-cx-location.jpeg\" alt=\"ir-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cx 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E位於大腿近端三分之一和中三分之一之間的通道中，在斯卡帕三角（Scarpa&#39;s triangle）的頂點（紅色虛線）。觸診驗證也應延伸到縫匠肌的内側邊緣（針灸穴位 LV11）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060539-ir-cx-pave.jpeg\" alt=\"ir-cx-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cx 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，雙腿伸直。治療師站在 CC的同一側或相反側，將肘部放在斯卡帕（Scarpa） 三角的頂點。\u003Cbr /\u003E即使使用肘部，由於該區域存在血管和神經，力道應該適中（3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060553-ir-cx-treatment.jpeg\" alt=\"ir-cx-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者仰卧位，治疗师用肘关节缓慢施加压力于缝匠肌和内收肌形成的三角形的下角区域正上方，在明显发生改变的点进行手法操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010556-ir-cx-o-treatment.jpeg\" alt=\"ir-cx-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "IR-CX 障礙",
    "answer": "\u003Cp\u003Eir-cx 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E髖部疼痛或發炎，常導致患者跛行。腹股溝區的疼痛會放射至膝蓋。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060527-ir-cx-cp.jpeg\" alt=\"ir-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cx 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E功能性超負荷或外傷會導致髖關節疼痛和僵硬，限制直立姿勢和行走。在坐姿中，患者無法交叉雙腿。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060532-ir-cx-pamo.jpeg\" alt=\"ir-cx-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E髋关节内收肌和（或）腹股沟管充血时出现的腹股沟区疼痛。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E骨盆内旋肌筋膜位于外部，附着于腹股沟韧带上。而髋关节内旋肌筋膜则更靠内侧。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010548-ir-cx-o-cp.jpeg\" alt=\"ir-cx-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E患者取坐位交叉双腿，治疗师观察运动中的任何差异，询问患者是否感觉一侧髋关节较另一侧存在活动受限。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010552-ir-cx-o-move.jpeg\" alt=\"ir-cx-o-move\" /\u003E\u003C/p\u003E"

  {
    "question": "ER-CX 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大轉子和骶孔連線外1/3處，梨狀肌上\u003C/li\u003E\u003Cli\u003EGB30，環跳穴\u003C/li\u003E\u003Cli\u003E梨狀肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E鏡部的外旋運動（將髖關節向外旋轉）由單關節肌（梨狀肌、孖肌、股方肌、閉孔內肌）和雙關節肌（臀大肌、縫匠肌、繁腰肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在梨狀肌上，位於臀大肌中點處\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080417-Er-cx.jpeg\" alt=\"Er-cx\" /\u003E\u003C/p\u003E\u003Cp\u003E後側髖節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cx 位於薦結節韌帶上，單關節（臀大肌）和雙關節（股二頭肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-cx 位於闊筋膜張肌上，單關節（臀小肌）和雙關節（闊筋膜張肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-cx 位於外旋肌的筋膜上，單關節（梨狀肌）和雙關節（臀大肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100553-re-cx-location.jpeg\" alt=\"re-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髂脛束的牽拉來自於近端的闊筋膜張肌和遠端的股四頭肌中的股外側肌（la-cx, la-ge) •\u003C/li\u003E\u003Cli\u003E後側闊筋膜的牽拉來自近端的臀大肌和遠端的膕旁肌 （re-cx, re-ge）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的臀中肌和遠端的股二頭肌短頭（er-cx, er-ge）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010516-la-cx-location.jpeg\" alt=\"la-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E大腿近端在股骨頸水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ela-cx 的CC 位於闊筋膜張肌的筋膜上，該筋膜不中斷地延伸至臀中肌和臀小肌。\u003C/li\u003E\u003Cli\u003Eer-cx 的CC 位於梨狀肌上方，其筋膜在臀中肌上向上延伸，在兩個孖肌（gemelli） 向下延伸。\u003C/li\u003E\u003Cli\u003Ere-cx 的CC 位於臀大肌的筋膜上，在深層與薦結節韌帶 （sacrotuberous ligament）聯合，薦結節韌帶是膕旁肌的起源。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070526-er-cx-location.jpeg\" alt=\"er-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cx 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E在梨狀肌筋膜上進行，該筋膜也延伸到其他使髖關節向外旋轉的肌肉〔股方肌、孖肌 （gemelli）〕（針灸穴位 GB 30）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070520-er-cx-pave.jpeg\" alt=\"er-cx-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cx 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E患者側臥身體前傾，髖關節和膝關節彎曲。\u003Cbr /\u003E治療師站在患者身後，將肘部放在大轉子和薦骨的中間，操作於梨狀肌筋膜，最初橫向穿過梨狀肌，然後向各個方向移動。力道必須很大才能穿越臀大肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070541-er-cx-treatment.jpeg\" alt=\"er-cx-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E患者背对治疗师侧卧，治疗师将肘置于股骨大转子与骶骨之间，变换力度找到病变最明显的点操作直至其消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070534-er-cx-o-treatment.jpeg\" alt=\"er-cx-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "ER-CX 障礙",
    "answer": "\u003Cp\u003Eer-cx 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E髖部後部或前部疼痛。梨狀肌症候群（Piriformis syndrome） 有下肢牽涉痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070511-er-cx-cp.jpeg\" alt=\"er-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cx 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者主述無法向外旋轉髖關節。在其他時候，患者能夠向外旋轉髖關節，但這種運動會導致他們的腹股溝和/或臀部區域劇烈疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070515-er-cx-pamo.jpeg\" alt=\"er-cx-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其来源\u003Cbr /\u003E疼痛部位或 CP：\u003Cbr /\u003E髋关节痛或臀部前外侧弥漫性疼痛，坐骨神经痛。\u003Cbr /\u003E功能障碍起源或 CC：\u003Cbr /\u003E臀大肌下方是小的髋关节外旋肌群；\u003Cbr /\u003E如果连接这些肌肉的筋膜无法滑动，不协调运动就会产生，引起关节紊乱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070525-er-cx-o-cp.jpeg\" alt=\"er-cx-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E患者坐于治疗床上，将一只脚置于另侧腿的膝上，交换方向做相同动作，验证髋关节外旋程度是否一致，并注意屈膝时双膝与床的距离是否一致。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527070529-er-cx-o-move.jpeg\" alt=\"er-cx-o-move\" /\u003E\u003C/p\u003E"

    "question": "IR-GE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿中下1/3交界處，股內側肌上，縫匠肌外側\u003C/li\u003E\u003Cli\u003ELR9，陰包穴\u003C/li\u003E\u003Cli\u003E股內側肌、縫匠肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E膝部的內旋運動（將脛骨內課向內旋轉）由單關節肌（脂肌）和雙關節肌（半膜肌、縫匠肌、半腱肌、股薄肌）的纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在內收肌管膜上，位於該膜延伸至股內側肌處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080424-Ir-ge.jpeg\" alt=\"Ir-ge\" /\u003E\u003C/p\u003E\u003Cp\u003E膝部前側協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-ge 的 CC 位於大腿的中點，單關節（股四頭肌）和雙關節向量（股直肌）匯聚於此。\u003C/li\u003E\u003Cli\u003Eme-ge 的CC 位於覆蓋内收肌或 subsartorial canal (vastoadductor membrane) 的筋膜上，單關節（半腱肌）和雙關節向量（股薄肌遠端）在此處匯合。\u003C/li\u003E\u003Cli\u003Eir-ge 的CC 位於股内側肌的肌腹上，單關節 （vastus medialis） 和雙關節向量（sartorius）匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090509-an-ge-location.jpeg\" alt=\"an-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股薄肌對内側小腿筋膜進行近端牽引，比目魚肌（me-ge, me-ta） 進行遠端牽引。\u003C/li\u003E\u003Cli\u003E股内側肌和縫匠肌對小腿内側淺筋膜進行近端牽引，脛後肌和脛前肌（ir-ge, ir-ta）進行遠端牽引。\u003C/li\u003E\u003Cli\u003E由股四頭肌肌腱施加的前小腿筋膜的近端牽引，以及由伸趾肌（an-ge, an-ta） 施加的遠端牽引。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090516-me-ge-location.jpeg\" alt=\"me-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E大腿中間 1/3 水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-ge 的CC 位於股內側肌的肌腹上方，筋膜在後方與縫匠肌筋膜相結合。\u003C/li\u003E\u003Cli\u003Ean-ge 的 CC 位於分隔股直肌和股外側肌的隔膜上，並與股中間肌的筋膜結合。\u003C/li\u003E\u003Cli\u003Eme-ge 的CC位於股内收肌膜上，起源於内收大肌，穿過縫匠肌下方，覆蓋血管，止於股内側肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060535-ir-ge-location.jpeg\" alt=\"ir-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-ge 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在大腿遠端三分之一處進行觸診驗證，位置在股內側肌的中心（彎曲的虛線）（針灸穴位 LV 9）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060529-ir-ge-pave.jpeg\" alt=\"ir-ge-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-ge 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，膝蓋半屈曲。治療師站在患者前面，將肘部放在股內側肌的頂端，往脛骨平台尋找疼痛的點。\u003Cbr /\u003E力道可能需要很大（4），因為此處纖維化通常很深。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060542-ir-ge-treatment.jpeg\" alt=\"ir-ge-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E治疗\u003Cbr /\u003E请病人侧躺在疼痛侧，治疗师将肘关节置于股内侧肌顶端并确定导致膝部牵涉痛的痛点，按摩直到症状消失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010524-ir-ge-o-treatment.jpeg\" alt=\"ir-ge-o-treatment\" /\u003E\u003C/p\u003E"

    "question": "IR-GE 障礙",
    "answer": "\u003Cp\u003Eir-ge 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E膝蓋內側疼痛，有時伴隨腫脹。這一點上的疼痛非常頻繁出現，其起源可能與 ir-ge 和 me-ge 的CC 有關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060518-ir-ge-cp.jpeg\" alt=\"ir-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-ge 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者主述說，當跑步或長時間蹲下等費力動作時膝蓋會疼痛和腫脹，而且會持續好幾天。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518060523-ir-ge-pamo.jpeg\" alt=\"ir-ge-pamo\" /\u003E\u003C/p\u003E\u003Cp\u003E疼痛部位及其起源\u003Cbr /\u003E疼痛的部位或 CP：\u003Cbr /\u003E疼痛位于内侧膝关节区域，类似于内侧半月板或内侧副韧带病变区域。\u003Cbr /\u003E功能障碍的起源或 CC：\u003Cbr /\u003E股内侧肌被覆着缝匠肌下膜或筋膜，继而与胫骨内侧髁的内旋肌群（缝匠肌、股薄肌、半腱肌）相连。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010516-ir-ge-o-cp.jpeg\" alt=\"ir-ge-o-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E运动测试\u003Cbr /\u003E请患者蹲下并指出痛处，注意两腿承重是否均衡，两膝弯曲度是否一致。\u003Cbr /\u003E不仅仅是疼痛，关节活动度受限也是功能障碍的一个信号。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260527010520-ir-ge-o-move.jpeg\" alt=\"ir-ge-o-move\" /\u003E\u003C/p\u003E"

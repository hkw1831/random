<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC CF 點位隨機抽題卡</title>
    <style>
        :root{--primary:#4361ee;--primary-light:#4895ef;--secondary:#3f37c9;--background:#f0f4ff;--card-bg:#ffffff;--text:#212529;--success:#38b000;--error:#d00000;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.7;color:var(--text);background:var(--background);padding:0.5rem 0;}
        .container{max-width:100%;margin:0;width:100%;padding:0;}
        h1{font-size:1.8rem;font-weight:700;color:var(--primary);text-align:center;margin:0.5rem 0;}
        .stats{display:flex;gap:0.2rem;margin:0.5rem 0;flex-wrap:nowrap;}
        .stat-item{background:var(--card-bg);border-radius:8px;padding:0.4rem 0.15rem;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center;flex:1;}
        .stat-label{font-size:0.75rem;color:#6c757d;}
        .stat-value{font-size:1.3rem;font-weight:700;color:var(--primary);}
        .stat-value.correct{color:var(--success);}.stat-value.incorrect{color:var(--error);}
        .controls{display:flex;gap:0.2rem;margin:0.5rem 0;flex-wrap:wrap;}
        .btn{background:var(--primary);color:#fff;border:none;padding:0.6rem 0.9rem;border-radius:6px;cursor:pointer;font-size:0.95rem;font-weight:500;transition:background .2s,transform .15s;}
        .btn:hover{background:var(--secondary);transform:translateY(-1px);}
        .btn:active{transform:translateY(0);}
        .btn-success{background:var(--success);}.btn-success:hover{background:#2d9600;}
        .btn-error{background:var(--error);}.btn-error:hover{background:#b00000;}
        .btn-info{background:#6c757d;}.btn-info:hover{background:#5a6268;}
        .btn-small{padding:0.35rem 0.6rem;font-size:0.82rem;}
        .question-box{background:var(--card-bg);border-radius:10px;padding:0.85rem 0.25rem;margin:0.5rem 0;box-shadow:0 2px 8px rgba(0,0,0,.07);}
        .question{font-size:1.35rem;font-weight:600;color:var(--primary);margin-bottom:0.75rem;}
        .question img,.answer-content img,.question-text img,.question-answer img{max-width:100%;height:auto;display:block;margin:0.5rem 0;border-radius:6px;}
        .show-answer-btn-wrap{text-align:center;margin:0.5rem 0;}
        .answer-content{display:none;background:rgba(67,97,238,.08);border-left:4px solid var(--primary);padding:0.6rem 0.5rem;border-radius:0 8px 8px 0;margin-top:0.6rem;}
        .answer-content.show{display:block;}
        .answer-content ul,.answer-content ol{padding-left:1.4rem;}
        .answer-content li{margin-bottom:0.4rem;}
        .answer-content p{margin-bottom:0.5rem;}
        .answer-content p:last-child{margin-bottom:0;}
        .feedback-controls{display:none;gap:0.5rem;justify-content:center;margin-top:0.6rem;flex-wrap:wrap;}
        .feedback-controls.show{display:flex;}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:flex-start;padding:1rem 0;overflow-y:auto;}
        .modal.open{display:flex;}
        .modal-content{background:var(--card-bg);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.2);padding:1rem 0.4rem;max-width:100%;width:100%;}
        .modal-title{font-size:1.3rem;font-weight:700;color:var(--primary);text-align:center;margin-bottom:0.6rem;}
        .modal-buttons{display:flex;justify-content:center;gap:0.75rem;margin-top:1rem;flex-wrap:wrap;}
        .question-count{font-weight:700;margin-bottom:0.6rem;text-align:center;}
        .question-count.correct{color:var(--success);}.question-count.remaining{color:var(--primary);}
        .question-list{display:flex;flex-direction:column;gap:0.5rem;}
        .question-item{background:rgba(67,97,238,.05);border-left:4px solid var(--primary);padding:0.6rem 0.4rem;border-radius:0 8px 8px 0;font-size:0.93rem;}
        .question-item.correct{border-color:var(--success);background:rgba(56,176,0,.05);}
        .question-header{display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;flex-wrap:wrap;}
        .question-text{flex:1;font-weight:500;}
        .question-answer{display:none;margin-top:0.6rem;padding:0.6rem 0.4rem;background:rgba(255,255,255,.9);border-radius:5px;border:1px solid rgba(67,97,238,.2);}
        .question-answer.show{display:block;}
        .question-answer ul,.question-answer ol{margin:0;padding-left:1.4rem;}
        .question-answer li{margin-bottom:0.4rem;}
        .question-answer p{margin-bottom:0.5rem;}
        .question-answer p:last-child{margin-bottom:0;}
        /* ── H3–H6 sub-headings ── */
        h3{font-size:1.05rem;font-weight:700;color:var(--secondary);margin:0.85rem 0 0.3rem;padding-bottom:0.18rem;border-bottom:1px solid rgba(67,97,238,.2);}
        h4{font-size:0.98rem;font-weight:700;color:var(--primary);margin:0.65rem 0 0.25rem;}
        h5{font-size:0.92rem;font-weight:600;color:#555;margin:0.5rem 0 0.2rem;}
        h6{font-size:0.88rem;font-weight:600;color:#888;margin:0.4rem 0 0.15rem;font-style:italic;}
        /* ── Tables ── */
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0.65rem 0;border-radius:6px;}
        table{width:100%;border-collapse:collapse;font-size:0.88rem;min-width:260px;}
        thead tr{background:rgba(67,97,238,.13);}
        th{padding:0.45rem 0.6rem;text-align:left;font-weight:700;color:var(--primary);border:1px solid rgba(67,97,238,.25);white-space:nowrap;}
        td{padding:0.42rem 0.6rem;border:1px solid rgba(67,97,238,.15);vertical-align:top;}
        tr:nth-child(even) td{background:rgba(67,97,238,.04);}
        /* ── Code ── */
        pre{background:#f4f6ff;border-radius:6px;padding:0.7rem 0.85rem;overflow-x:auto;margin:0.55rem 0;border:1px solid rgba(67,97,238,.14);font-size:0.85rem;}
        code{font-family:Menlo,Monaco,Consolas,monospace;font-size:0.87em;background:rgba(67,97,238,.09);padding:1px 5px;border-radius:3px;}
        pre code{background:transparent;padding:0;font-size:inherit;}
        /* ── Blockquote ── */
        blockquote{border-left:3px solid var(--primary-light);margin:0.55rem 0;padding:0.45rem 0.85rem;background:rgba(67,97,238,.05);border-radius:0 6px 6px 0;color:#444;}
        blockquote p{margin:0;}
        /* ── Filter ── */
        .filter-row{display:flex;gap:0.35rem;margin:0.5rem 0;align-items:stretch;}
        .filter-input{flex:1;min-width:0;padding:0.55rem 0.75rem;border-radius:6px;border:1px solid rgba(67,97,238,.35);font-size:0.93rem;font-family:Menlo,Monaco,Consolas,monospace;background:#fff;color:var(--text);}
        .filter-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(67,97,238,.18);}
        .filter-input::placeholder{font-family:"Noto Sans TC",-apple-system,sans-serif;color:#aaa;}
        .filter-status{font-size:0.82rem;min-height:1.3rem;margin:-0.1rem 0 0.35rem;padding:0 0.1rem;}
        .filter-status.ok{color:var(--success);}.filter-status.err{color:var(--error);font-weight:600;}
        @media(max-width:600px){h1{font-size:1.3rem;}.stat-label{font-size:0.65rem;}.stat-value{font-size:1rem;}.stat-item{padding:0.35rem 0.1rem;}.question{font-size:1.05rem;}.btn{padding:0.5rem 0.6rem;font-size:0.83rem;}.controls{flex-wrap:nowrap;overflow-x:auto;}.controls .btn{flex:1;white-space:nowrap;}th,td{padding:0.35rem 0.4rem;font-size:0.82rem;}.filter-row{flex-wrap:wrap;}.filter-input{min-width:100%;}}
    </style>
</head>
<body>
<div class="container">
    <h1>CC CF 點位隨機抽題卡</h1>
    <div class="stats">
        <div class="stat-item"><div class="stat-label">總題數</div><div id="totalCount" class="stat-value">0</div></div>
        <div class="stat-item"><div class="stat-label">待答題數</div><div id="remainingCount" class="stat-value">0</div></div>
        <div class="stat-item"><div class="stat-label">答對</div><div id="correctCount" class="stat-value correct">0</div></div>
        <div class="stat-item"><div class="stat-label">答錯</div><div id="incorrectCount" class="stat-value incorrect">0</div></div>
    </div>
    <div class="filter-row">
        <input type="text" id="filterInput" class="filter-input" placeholder="Regex 篩選題目（例如 ^什麼 | ^How | keyword）…">
        <button id="filterBtn" class="btn">篩選</button>
        <button id="clearFilterBtn" class="btn btn-info">清除篩選</button>
    </div>
    <div id="filterStatus" class="filter-status"></div>
    <div class="controls">
        <button id="drawBtn" class="btn">隨機抽題</button>
        <button id="resetBtn" class="btn">重設</button>
        <button id="showRemainingBtn" class="btn btn-info">查看待答題目</button>
        <button id="showCorrectBtn" class="btn btn-info">查看已答對題目</button>
    </div>
    <div class="question-box">
        <div id="question" class="question">按下「隨機抽題」按鈕開始</div>
        <div id="showAnswerBtnWrap" class="show-answer-btn-wrap" style="display:none">
            <button id="showAnswerBtn" class="btn">顯示答案</button>
        </div>
        <div id="answerContent" class="answer-content"></div>
        <div id="feedbackControls" class="feedback-controls">
            <button id="correctBtn" class="btn btn-success">我答對了</button>
            <button id="incorrectBtn" class="btn btn-error">我答錯了</button>
        </div>
    </div>
</div>

<div id="resetModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">確定要重設？</div>
        <p style="text-align:center">這將清除所有答題進度，此操作無法撤銷。</p>
        <div class="modal-buttons">
            <button id="confirmResetBtn" class="btn btn-error">確定重設</button>
            <button id="cancelResetBtn" class="btn">取消</button>
        </div>
    </div>
</div>

<div id="remainingModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">待答題目列表</div>
        <div id="remainingQuestionCount" class="question-count remaining"></div>
        <div id="remainingQuestionList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeRemainingBtn" class="btn">關閉</button></div>
    </div>
</div>

<div id="correctModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">已答對題目列表</div>
        <div id="correctQuestionCount" class="question-count correct"></div>
        <div id="correctQuestionList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeCorrectBtn" class="btn">關閉</button></div>
    </div>
</div>

  {
    "question": "RE-GE",

    "question": "AN-PE",

    "answer": "\u003Cp\u003ECF點位置\u003Cbr /\u003E尾骨下緣旁\u003C/p\u003E\u003Cp\u003E中醫穴位\u003Cbr /\u003EBL35，會陽穴\u003C/p\u003E\u003Cp\u003E相關問題\u003Cbr /\u003E尾骨痛，提肛肌綜合征，盆腔隔膜綜合征\u003C/p\u003E\u003Cp\u003E後-內-髖cf點位於骶尾關節旁。\u003C/p\u003E\u003Cp\u003E此 cf點對應針灸的會陽穴（BL 35）及 Cyriax 法中®的治療胭繩肌的點。筋膜手法治療這個點常常可以解決因跌坐或分娩而導致的尾骨痛。\u003C/p\u003E\u003Cp\u003E在行走過程中短螺旋止於前-內一髖cf點，而在涉及多個節段的覆雜動作中，長螺旋通過臀中肌筋膜止於後-內一髖cf點。這些螺旋在圖166中用小紅線段表示。但根據正在完成的動作，它們可以包括所有斜肌不同部位的肌纖維。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090449-Re-me-cx.jpeg\" alt=\"Re-me-cx\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260515080543-Re-me-cx1.jpeg\" alt=\"Re-me-cx1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260515080547-Re-me-cx2.jpeg\" alt=\"Re-me-cx2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010533-re-me-cx-cp.jpeg\" alt=\"re-me-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010538-re-me-cx-move-p.jpeg\" alt=\"re-me-cx-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010545-re-me-cx-move-a.jpeg\" alt=\"re-me-cx-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010551-re-me-cx-location.jpeg\" alt=\"re-me-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010558-re-me-cx-pave-treatment.jpeg\" alt=\"re-me-cx-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-TA",
    "answer": "\u003Cp\u003ECF點位置：跟腱和趾屈肌肌腱之間\u003Cbr /\u003E中醫穴位：KI7，覆溜穴；KI3，太溪穴\u003Cbr /\u003E相關問題：踝關節後內側疼痛，足跟疼痛\u003C/p\u003E\u003Cp\u003E後-外-踝cf點位於腓骨長短肌肌腱上。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的外丘和懸鐘穴（GB 36 和39）。該點的致密化可以導致脛距關節的僵化，Maigne 法建議用快速牽引（swift traction） 手法來緩解。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090403-Re-me-ta.jpeg\" alt=\"Re-me-ta\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260515080540-Re-me-ta1.jpeg\" alt=\"Re-me-ta1\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260515080543-Re-me-ta2.jpeg\" alt=\"Re-me-ta2\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010524-re-me-ta-cp.jpeg\" alt=\"re-me-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010528-re-me-ta-move-p.jpeg\" alt=\"re-me-ta-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010535-re-me-ta1-pave-treatment.jpeg\" alt=\"re-me-ta1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010548-re-me-ta-location.jpeg\" alt=\"re-me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010556-re-me-ta2-pave-treatment.jpeg\" alt=\"re-me-ta2-pave-treatment\" /\u003E\u003C/p\u003E"

var currentQuestion=null;
var correctAnswers=[],incorrectAnswers=[];
var filteredData=qaData.slice();
var answerVisible=false,storageAvailable=false;
var STORAGE_KEY="quizCardFlashcards";
var questionElem=document.getElementById("question");
var answerContent=document.getElementById("answerContent");
var feedbackControls=document.getElementById("feedbackControls");
var showAnswerBtn=document.getElementById("showAnswerBtn");
var showAnswerBtnWrap=document.getElementById("showAnswerBtnWrap");
var drawBtn=document.getElementById("drawBtn");
var resetBtn=document.getElementById("resetBtn");
var showRemainingBtn=document.getElementById("showRemainingBtn");
var showCorrectBtn=document.getElementById("showCorrectBtn");
var correctBtn=document.getElementById("correctBtn");
var incorrectBtn=document.getElementById("incorrectBtn");
var totalCountElem=document.getElementById("totalCount");
var remainingCountElem=document.getElementById("remainingCount");
var correctCountElem=document.getElementById("correctCount");
var incorrectCountElem=document.getElementById("incorrectCount");
var resetModal=document.getElementById("resetModal");
var remainingModal=document.getElementById("remainingModal");
var correctModal=document.getElementById("correctModal");
function checkStorage(){try{localStorage.setItem("t","1");localStorage.removeItem("t");storageAvailable=true;}catch(e){storageAvailable=false;}}
function saveProgress(){if(!storageAvailable)return;try{localStorage.setItem(STORAGE_KEY,JSON.stringify({c:correctAnswers.map(function(q){return q.question;}),i:incorrectAnswers.map(function(q){return q.question;})}));}catch(e){}}
function loadProgress(){if(!storageAvailable)return;try{var d=localStorage.getItem(STORAGE_KEY);if(!d)return;var p=JSON.parse(d);correctAnswers=qaData.filter(function(q){return p.c.indexOf(q.question)!==-1;});incorrectAnswers=qaData.filter(function(q){return p.i.indexOf(q.question)!==-1;});}catch(e){}}
function updateStats(){
  var fc=correctAnswers.filter(function(q){return filteredData.indexOf(q)!==-1;});
  var fi=incorrectAnswers.filter(function(q){return filteredData.indexOf(q)!==-1;});
  totalCountElem.textContent=filteredData.length;
  remainingCountElem.textContent=filteredData.length-fc.length;
  correctCountElem.textContent=fc.length;
  incorrectCountElem.textContent=fi.length;
}
function hideAnswer(){answerContent.classList.remove("show");feedbackControls.classList.remove("show");showAnswerBtn.textContent="顯示答案";answerVisible=false;}
function drawRandomQuestion(){
  hideAnswer();
  if(filteredData.length===0){
    questionElem.innerHTML="目前篩選無符合題目，請調整篩選條件。";
    answerContent.innerHTML="";currentQuestion=null;showAnswerBtnWrap.style.display="none";return;
  }
  var available=filteredData.filter(function(q){return correctAnswers.indexOf(q)===-1;});
  if(available.length===0){
    questionElem.innerHTML="恭喜！篩選範圍內所有題目都已答對！點擊「重設」重新開始。";
    answerContent.innerHTML="";currentQuestion=null;showAnswerBtnWrap.style.display="none";return;
  }
  currentQuestion=available[Math.floor(Math.random()*available.length)];
  questionElem.innerHTML=currentQuestion.question;
  answerContent.innerHTML=currentQuestion.answer;
  showAnswerBtnWrap.style.display="block";
}
function toggleAnswer(){
  if(!currentQuestion)return;
  if(answerVisible){hideAnswer();}
  else{answerContent.classList.add("show");feedbackControls.classList.add("show");showAnswerBtn.textContent="隱藏答案";answerVisible=true;}
}
function markAsCorrect(){if(!currentQuestion)return;var i=incorrectAnswers.indexOf(currentQuestion);if(i!==-1)incorrectAnswers.splice(i,1);if(correctAnswers.indexOf(currentQuestion)===-1)correctAnswers.push(currentQuestion);updateStats();saveProgress();drawRandomQuestion();}
function markAsIncorrect(){if(!currentQuestion)return;if(incorrectAnswers.indexOf(currentQuestion)===-1)incorrectAnswers.push(currentQuestion);updateStats();saveProgress();drawRandomQuestion();}
function toggleQuestionAnswer(idx,type){
  var ans=document.getElementById(type+"-answer-"+idx);
  var btn=document.getElementById(type+"-btn-"+idx);
  if(!ans||!btn)return;
  if(ans.classList.contains("show")){ans.classList.remove("show");btn.textContent="顯示答案";}
  else{ans.classList.add("show");btn.textContent="隱藏答案";}
}
function buildQuestionList(list,type){
  if(list.length===0)return'<div class="question-item">無</div>';
  var html="";
  for(var i=0;i<list.length;i++){
    var q=list[i];
    var cls="question-item"+(type==="correct"?" correct":"");
    html+='<div class="'+cls+'"><div class="question-header">';
    html+='<div class="question-text">'+q.question+'</div>';
    html+='<button id="'+type+'-btn-'+i+'" class="btn btn-small qa-toggle" data-type="'+type+'" data-idx="'+i+'">顯示答案</button>';
    html+='</div><div id="'+type+'-answer-'+i+'" class="question-answer">'+q.answer+'</div></div>';
  }
  return html;
}
function showRemainingQuestions(){
  var avail=filteredData.filter(function(q){return correctAnswers.indexOf(q)===-1;});
  document.getElementById("remainingQuestionCount").textContent="待答題目（"+avail.length+" 題）";
  document.getElementById("remainingQuestionList").innerHTML=buildQuestionList(avail,"remaining");
  remainingModal.classList.add("open");
}
function showCorrectQuestions(){
  var correct=correctAnswers.filter(function(q){return filteredData.indexOf(q)!==-1;});
  document.getElementById("correctQuestionCount").textContent="已答對題目（"+correct.length+" 題）";
  document.getElementById("correctQuestionList").innerHTML=buildQuestionList(correct,"correct");
  correctModal.classList.add("open");
}
function applyFilter(){
  var pat=document.getElementById("filterInput").value;
  var st=document.getElementById("filterStatus");
  if(!pat.trim()){
    filteredData=qaData.slice();
    st.textContent="篩選已清除，顯示全部 "+qaData.length+" 題。";
    st.className="filter-status ok";
    updateStats();return;
  }
  try{
    var re=new RegExp(pat,"i");
    filteredData=qaData.filter(function(q){return re.test(q.question);});
    if(filteredData.length===0){
      st.textContent="⚠ 無符合題目（共 "+qaData.length+" 題中 0 題符合）";
      st.className="filter-status err";
    }else{
      st.textContent="符合 "+filteredData.length+" / "+qaData.length+" 題";
      st.className="filter-status ok";
    }
    updateStats();
  }catch(e){
    st.textContent="無效的 Regex："+e.message;
    st.className="filter-status err";
  }
}
function clearFilter(){
  document.getElementById("filterInput").value="";
  filteredData=qaData.slice();
  var st=document.getElementById("filterStatus");
  st.textContent="篩選已清除，顯示全部 "+qaData.length+" 題。";
  st.className="filter-status ok";
  updateStats();
}
function doReset(){
  correctAnswers=[];incorrectAnswers=[];currentQuestion=null;
  hideAnswer();questionElem.innerHTML="按下「隨機抽題」按鈕開始";
  answerContent.innerHTML="";showAnswerBtnWrap.style.display="none";
  updateStats();saveProgress();resetModal.classList.remove("open");
}
function setupModalDelegation(modal){
  modal.addEventListener("click",function(e){
    if(e.target===modal){modal.classList.remove("open");return;}
    if(e.target.classList.contains("qa-toggle")){
      var idx=parseInt(e.target.getAttribute("data-idx"),10);
      var type=e.target.getAttribute("data-type");
      toggleQuestionAnswer(idx,type);
    }
  });
}
checkStorage();loadProgress();updateStats();
drawBtn.addEventListener("click",drawRandomQuestion);
showAnswerBtn.addEventListener("click",toggleAnswer);
correctBtn.addEventListener("click",markAsCorrect);
incorrectBtn.addEventListener("click",markAsIncorrect);
resetBtn.addEventListener("click",function(){resetModal.classList.add("open");});
document.getElementById("confirmResetBtn").addEventListener("click",doReset);
document.getElementById("cancelResetBtn").addEventListener("click",function(){resetModal.classList.remove("open");});
showRemainingBtn.addEventListener("click",showRemainingQuestions);
showCorrectBtn.addEventListener("click",showCorrectQuestions);
document.getElementById("closeRemainingBtn").addEventListener("click",function(){remainingModal.classList.remove("open");});
document.getElementById("closeCorrectBtn").addEventListener("click",function(){correctModal.classList.remove("open");});
document.getElementById("filterBtn").addEventListener("click",applyFilter);
document.getElementById("clearFilterBtn").addEventListener("click",clearFilter);
document.getElementById("filterInput").addEventListener("keydown",function(e){if(e.key==="Enter")applyFilter();});
setupModalDelegation(resetModal);
setupModalDelegation(remainingModal);
setupModalDelegation(correctModal);
</script>

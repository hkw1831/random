    "answer": "\u003Cp\u003Ean-la-sc 融合中心 （CF）的功能障礙。\u003Cbr /\u003E上肢疲勞感。刺激臂叢神經。頸部肌肉痙攣，頸部運動僵硬。Adson 氏的胸廓出口症候群測試可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060544-an-la-sc-cp.jpeg\" alt=\"an-la-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-sc 融合中心 （CF）的動作驗證。\u003Cbr /\u003E類似於 Adson 的測試，是因頸肋或前、中肩胛肌緊張導致的鎖骨下動脈受壓的測試。治療師將患者的手臂向後移動（被動拉伸），同時將患者的頭部移動到另一側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060553-an-la-sc-move.jpeg\" alt=\"an-la-sc-move\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-la-hu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E肩部疼痛，難以抬起手臂。上肢前側運動時的僵硬，有時會出現在骨折後或偏癱的患者中。Neer 氏評估肩峰下夾擠的測試可能是陽性的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070514-an-la-hu-cp.jpeg\" alt=\"an-la-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-hu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003Ean-la-sc 和 an-la-hu 的 CF 功能可以透過牽拉來測試；患者的手臂被移到其背後，來到肱骨向後且内收的位置。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070518-an-la-hu-move-p.jpeg\" alt=\"an-la-hu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-hu 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者站姿。治療師站在患者身後，請患者嘗試向上和向外移動上肢（肱骨前側）時，在患者的手腕上施加阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070525-an-la-hu-move-a.jpeg\" alt=\"an-la-hu-move-a\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-CU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E外側肌間隔遠端；肱二頭肌肌腱外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI13，手五里穴；LU5，尺澤穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩部到肘外側疼痛，肱骨外上髁炎\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-肘cf點位於肘橫紋的外側部。肱二頭肌和肱肌（前）、旋前圓肌（內旋）和肱橈肌（外）的矢量力都匯聚於此點，這些矢量力可以穩定肘關節。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090456-An-la-cu.jpeg\" alt=\"An-la-cu\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 的 CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E肘部在鷹嘴的水平橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cu 的 CF 位於肱二頭肌肌腱外側和肱橈肌内側\u003C/li\u003E\u003Cli\u003Ean-me-cu 的 CF 位於旋前圓肌和手指屈肌的聯合處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-la-cu-location.jpeg\" alt=\"an-la-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用食指的指關節來鬆動肘筋膜，其位於肱二頭肌肌腱（針灸穴位 LU5）的橈側。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070545-an-la-cu-pave-treatment.jpeg\" alt=\"an-la-cu-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {

    "answer": "\u003Cp\u003Ean-la-cu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E上髁炎 （epicondylitis）。手臂運動受限。手臂前部疼痛，類似於肩周炎（scapulohumeral periarthritis) •\u003Cbr /\u003E手掌朝上用於評估肱二頭肌長頭病變的測試可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070522-an-la-cu-cp.jpeg\" alt=\"an-la-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E透過旋轉患者的手腕來進行被動動作驗證。\u003Cbr /\u003E患者可能會感到手肘（肘部）或肩部的前外側部疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070527-an-la-cu-move-p.jpeg\" alt=\"an-la-cu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cu 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E此主動動作驗證是要求患者向上和向外移動前臂並抵抗阻力。如果同時對雙上肢進行測試，則更容易偵測到力量的差異。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-la-cu-move-a.jpeg\" alt=\"an-la-cu-move-a\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-CA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E橈動脈溝近端和遠端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELU7，列缺穴\u003C/li\u003E\u003Cli\u003ELU8，經渠穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腱鞘炎，腕掌關節炎\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前--外一腕cf點位於屈肌支持帶的止點、拇長屈肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090401-An-la-ca.jpeg\" alt=\"An-la-ca\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ca 1 和2的CF 解剖位置以及橫截面線\u003C/p\u003E\u003Cp\u003E前臂下段的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ca 的 CF 位於橈動脈溝，靠近橈側屈腕肌腱。\u003C/li\u003E\u003Cli\u003Ean-me-ca 的 CF 位於尺動脈溝，尺側屈肌腱之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070504-an-la-ca-location.jpeg\" alt=\"an-la-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ca 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師沿著橈骨莖突（針灸穴位 LU 7） 方向延伸到肱橈肌的肌腱通道的筋膜上進行觸診驗證和治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070548-an-la-ca1-pave-treatment.jpeg\" alt=\"an-la-ca1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ca 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用食指的指尖在腕部水平的橈動脈上的筋膜尋找緻密化，用指關節來鬆動緻密點（針灸穴位 LU8）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070511-an-la-ca2-pave-treatment.jpeg\" alt=\"an-la-ca2-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-CA 障礙",
    "answer": "\u003Cp\u003Ean-la-ca 融合中心 （CF）的功能障礙。\u003Cbr /\u003E手腕和手部的緊張和無力〔這是 an-ca 肌筋膜單元的感知中心（CP）〕。手掌和前三個手指的針刺感。這也是正中神經皮神經出現的點。舟狀骨移位試驗可能呈陽性或可能存在舟月關節不穩定。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-la-ca-cp.jpeg\" alt=\"an-la-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ca 融合中心 （CF）的動作驗證。\u003Cbr /\u003E若此CF 功能障礙，當手腕向前外側轉動時，患者應會感到前臂筋膜的緊張和疼痛，且這種疼痛可延伸到手腕。當治療師前外側腕施加阻力時，會覺得患者的力量很弱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070538-an-la-ca-move.jpeg\" alt=\"an-la-ca-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-DI 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E大魚際底部，腕橫紋外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELU9，太淵穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拇指根部疼痛，拇指屈肌腱鞘炎，舟狀骨月骨不穩，關節炎\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-指cf點位於屈肌支持帶的橈側端，在握攏手指及拇指前-外向運動時，受到來自大、小魚際的牽引力。\u003C/p\u003E\u003Cp\u003Ean-la-di 患仰臥。治療師使用指關節來操作位於食指掌指關節的掌面之結絡組綴。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090407-An-la-di.jpeg\" alt=\"An-la-di\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-di 1 的CF 位置和橫截面線。\u003C/p\u003E\u003Cp\u003E豌豆骨、頭狀骨和舟狀骨的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-di 1融合中心位於舟狀骨上方和外展拇短肌的起點\u003C/li\u003E\u003Cli\u003Ean-me-di 1 的 CF 位於外展小指肌的包覆筋膜中\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070549-an-la-di-location.jpeg\" alt=\"an-la-di-location\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-la-di 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用食指的指關節來操作與大魚際肌（針灸穴位 LU 9）相連的屈肌支持帶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-la-di1-pave-treatment.jpeg\" alt=\"an-la-di1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-di 2融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用指關節來操作位於食指掌指關節的掌面之結締組織。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070557-an-la-di2-pave-treatment.jpeg\" alt=\"an-la-di2-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-LA-DI 障礙",
    "answer": "\u003Cp\u003Ean- la-di 融合中心 （CF）的功能障礙。\u003Cbr /\u003E拇指根部的疼痛（腕掌骨關節炎）與 an-la-di 1 CF 相關，而拇指的指骨疼痛與an-di 的 CC 相關。拇指對掌動作引發的疼痛則與 an-la-di 2 CF 有關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070518-an-la-di-cp.jpeg\" alt=\"an-la-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean- la-di 融合中心 （CF）的被動一主動動作驗證。\u003Cbr /\u003E藉由在患者拇指上形成槓桿，治療師將患者的手指延伸到終端。如果 an-la-di 1 CF 變緻密，則拇指根部會感到劇烈疼痛。在這個姿勢，要求患者向前和向內移動他們的拇指。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070525-an-la-di-move.jpeg\" alt=\"an-la-di-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-CP 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鼻孔外側\u003C/li\u003E\u003Cli\u003E鼻唇溝中點\u003C/li\u003E\u003Cli\u003E下巴和下唇溝之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI20，迎香穴；\u003C/li\u003E\u003Cli\u003EGV26，水溝穴；\u003C/li\u003E\u003Cli\u003ECV24，承漿穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：上下唇疼痛，牙齒疼痛；牙關緊閉，言語障礙\u003C/p\u003E\u003Cp\u003E前-內--頭cf點有3個：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一個在鼻翼旁；\u003C/li\u003E\u003Cli\u003E第二個從鼻唇溝延伸到上牙齦\u003C/li\u003E\u003Cli\u003E第三個從下頦溝延至下牙齦。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090455-An-me-cp.jpeg\" alt=\"An-me-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 1,2和3CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EAn-me-cp 1 CF 位於鼻翼根部，me-cp 1和an-cp 1的CC 牽引力匯聚處。\u003C/li\u003E\u003Cli\u003Ean-me-cp 2 CF 位於上領肌肉上方，me-cp 2和 an-cp 2的CC的牽引力匯聚於此。\u003C/li\u003E\u003Cli\u003Ean-me-cp 3 CF 位於下領肌肉，來自 me-cp 3和 an-cp 3的CC的牽引力匯聚處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060521-an-me-cp-location.jpeg\" alt=\"an-me-cp-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 2 CF 解剖位置。\u003Cbr /\u003Ean-me-cp 2的CF 位於提上唇鼻翼肌。此CF協調或調控位於額肌上的 an-cp 2和位於鼻唇溝中的 me-cp 2的CC。在口腔外緣和頦部和鼻唇縫，降口角肌、提口角肌和頰肌形成一種支持帶。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060542-an-me-cp-location2.jpeg\" alt=\"an-me-cp-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 3 CF 解剖位置。\u003Cbr /\u003Ean-me-cp 3 CF 位於下巴筋膜，二腹肌前腹的延續（me-cp 3）。\u003Cbr /\u003Ean-me-cp 3 CF 的另一個向量问 an-cp 3的CC，即為下領舌骨和舌下肌筋膜延伸。\u003Cbr /\u003E通過頸闊肌，an-me-cp 3 CF 對 an-me-cl 施加頭側牽引力。在遠端，頸闊肌與胸大肌纖肌肉維結合 （an-me-sc CF 和 an-me-th CF) 。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-an-me-cp-location3.jpeg\" alt=\"an-me-cp-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用中指或食指的指尖進行治療，一指疊加在另一指上面。對鼻翼側邊進行操作（針灸穴位 ST 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060529-an-me-cp1-pave-treatment.jpeg\" alt=\"an-me-cp1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。用食指疊加在中指指尖靠在上顎犬齒的根部，並操作緻密點，直到任何過度敏感反應消失（針灸穴位 ST 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060549-an-me-cp2-pave-treatment.jpeg\" alt=\"an-me-cp2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 3融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。將食指疊加於中指，操作在下領犬齒的根部，直到緻密化消失（針灸穴位 EX 5) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060507-an-me-cp3-pave-treatment.jpeg\" alt=\"an-me-cp3-pave-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "AN-ME-CP 障礙",
    "answer": "\u003Cp\u003Ean-me-cp 融合中心 （CF）的功能障礙。\u003Cbr /\u003E面部麻痺或痙攣，尤其是：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E• an-me-cp 1：眼瞼痙攣或眼險下垂。\u003C/li\u003E\u003Cli\u003E• an-me-cp 2：提口角肌和上唇方肌麻痺。\u003C/li\u003E\u003Cli\u003E• an-me-cp 3：降口角肌和下唇方肌。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060552-an-me-cp-cp.jpeg\" alt=\"an-me-cp-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 1融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者坐姿或站姿。為了測試眼輪匝肌和提上唇肌、鼻翼肌肉的正常功能，要求患者用力閉上雙眼（眼科領域，an-me-cp 1）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060559-an-me-cp1-move-a.jpeg\" alt=\"an-me-cp1-move-a\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cp 2和3融合中心（CF）的主動動作驗證。\u003Cbr /\u003E要求患者吹氣（an-me-cp 2上領和鼻部）。\u003Cbr /\u003E在下巴水平，頸闊肌的内側束跨越來自對側的肌束，外側束將它們連接到下領角肌和下唇方肌 （an-me-cp 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060510-an-me-cp2-3-move-a.jpeg\" alt=\"an-me-cp2-3-move-a\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-CL 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E胸鎖乳突肌在胸骨上的附著點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EST10，水突穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E喉嚨嘶啞，斜頸\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內一頸cf點位於胸鎖乳突肌胸骨腱上。\u003C/p\u003E\u003Cp\u003E它對應針灸的水突穴（ST 10）及Maigne 法中的前側頸椎信號點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090401-An-me-cl.jpeg\" alt=\"An-me-cl\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-cl CF 位於SCM 肌肉前方，在下頜角韌帶上。\u003C/li\u003E\u003Cli\u003Ean-me-cl CF 位於胸鎖乳突肌胸骨端的肌腱通道上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070532-an-me-cl-location.jpeg\" alt=\"an-me-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl CF 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用指尖進行觸診，因為肌腱通道水平的筋膜結構相當堅固（針灸穴位 ST 10），使用食指的指關節進行比較適當。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070541-an-me-cl-pave-treatment.jpeg\" alt=\"an-me-cl-pave-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-me-cl 融合中心（CF）的功能障礙。\u003Cbr /\u003E軀幹中的 CF 主要涉及内部功能障礙。然而，本書僅描述與肌肉骨骼功能障礙相關的部分。an-me-cl CF 的緻密化可以導致頸椎僵直。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070508-an-me-cl-cp.jpeg\" alt=\"an-me-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl 融合中心 （CF）的被動動作驗證\u003Cbr /\u003E患者站姿。將患者的頭部向後稍微向右移動，然後向左移動，並詢問患者哪裡感到最大的緊張。只有頸部一側的緊張感與緻密部分相對應。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070513-an-me-cl-move-p.jpeg\" alt=\"an-me-cl-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-cl 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E治療師將手放在患者的頭上，在患者試圖在前中間方向移動他們的脖子時，施加一定的阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070525-an-me-cl-move-a.jpeg\" alt=\"an-me-cl-move-a\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-TH 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E劍突旁，第1、3、5肋間溝\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI26：或中穴；K124：靈墟穴；KI22，步廊穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E胸口壓迫，呼吸短促，前屈受限\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內-胸1cf點位於胸骨旁，第二肋間隙。此點通過胸大肌與胸小肌筋膜連接到本螺旋。\u003C/p\u003E\u003Cp\u003E前-內-胸3 cf點位於胸骨旁的第五肋間隙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090406-An-me-th.jpeg\" alt=\"An-me-th\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 1,2和3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-cl CF 在頭側方向牽引\u003C/li\u003E\u003Cli\u003Ean-me-th 1 CF 位於第一和第二肋間\u003C/li\u003E\u003Cli\u003Ean-me-th 2 CF 位於第三和第四肋間\u003C/li\u003E\u003Cli\u003Ean-me-th 3 CF 位於第五肋間隙，劍突側邊。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070521-an-me-th-location.jpeg\" alt=\"an-me-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-th 2 CF 位於第三和第四肋間，在胸骨的側邊，在前向、内向和内旋一胸部 CC之間。\u003C/li\u003E\u003Cli\u003Ean-la-th 1 和2 CF 位於前鋸肌到腹外斜肌的肌腱通道中\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070538-an-me-th-location2.jpeg\" alt=\"an-me-th-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E深筋膜的淺層，其中包含左、右胸大肌。\u003C/li\u003E\u003Cli\u003Ean-me-th 3 CF 與胸大肌（me-th） 和腹直肌（an-th） 的嵌入肌腱相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070507-an-me-th-location.jpeg\" alt=\"an-me-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用食指的指關節觸診胸鎖關節區域，尋找最敏感的部位；一旦定位，操作直到緻密化消失（針灸穴位 KI 27-26) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070527-an-me-th1-pave-treatment.jpeg\" alt=\"an-me-th1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師將食指和無名指的指尖或食指的指關節放在第三肋間區域，並尋找需要治療的最緻密韌帶（針灸穴位 KI 25-24) \u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070549-an-me-th2-pave-treatment.jpeg\" alt=\"an-me-th2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師在第五肋間附近，用指尖觸診與劍突韌帶相連的緻密筋膜。然後用指關節操作最緻密的點，直到局部敏感性消失（針灸穴位 KI 23-22）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070513-an-me-th3-pave-treatment.jpeg\" alt=\"an-me-th3-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-TH 障礙",
    "answer": "\u003Cp\u003Ean-me-th 融合中心（CF）的功能障礙。\u003Cbr /\u003E胸肋關節紊亂。胸骨後緊繃感或緊張感：前胸區瀰漫性疼痛。an-me-th 1 CF 的緻密化會導致胸鎖關節疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070503-an-me-th-cp.jpeg\" alt=\"an-me-th-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 融合中心 （CF）的被動動作驗證\u003Cbr /\u003E患者站姿。為了拉緊胸骨旁韌帶，治療師站在患者身後，將一隻手放在患者的胸骨上，同時用另一隻手推動腰部區域。要求患者描述他們經歷的任何疼痛或緊張。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070508-an-me-th-move-p.jpeg\" alt=\"an-me-th-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-th 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E患者站姿。從上述前内向對角線最大伸展位置，當治療師在胸骨上施加阻力時，要求患者胸部向前移動\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070515-an-me-th-move-a.jpeg\" alt=\"an-me-th-move-a\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-ME-LU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E劍突到肚臍的腹白線外側：劍突下；劍突與肚臍之間；平肚臍\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI21，幽門穴\u003C/li\u003E\u003Cli\u003EKI19，陰都穴\u003C/li\u003E\u003Cli\u003EK116，肓俞穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腹壁、胃腸痙攣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內-腰cf點由3個點組成，分布在劍突與臍之間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090411-An-me-lu.jpeg\" alt=\"An-me-lu\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 1, 2和3 CF 解剖位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-lu 1 CF 位於劍突的遠端和側邊。它協調胸骨和腹直肌的第一肌腱之間的纖維參與。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070522-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 2 CF 解剖位置。\u003Cbr /\u003Ean-me-lu 2 CF 位於臍上白線中間側邊。白線是腹筋膜三層的融合線：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一層包圍腹外斜肌\u003C/li\u003E\u003Cli\u003E第二層包圍腹內斜肌和腹直肌\u003C/li\u003E\u003Cli\u003E第三層包裹著腹橫\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 3 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-lu 3 CF 位於白線的側邊，稍靠近到肚臍。在這個筋膜點協調腹直肌第二和第三腱劃 （tendinous inscriptions）之間的肌纖維。\u003C/li\u003E\u003Cli\u003E如果腹部筋膜的一部分被分離並手動向外拉，牽引力會傳播到腹直肌鞘和下面的肌肉。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070556-an-me-lu-location.jpeg\" alt=\"an-me-lu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。將指尖放在劍突的側面和遠端，並尋找最痛的點。操作時，建議經常換手並像鑿子一樣使用關節（針灸穴位 KI 21-20) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070528-an-me-lu1-pave-treatment.jpeg\" alt=\"an-me-lu1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用指尖或食指的指關節，在白線的中間和側面尋找一個緻密和敏感的點。一旦確定，就可用指關節或肘部（針灸穴位 KI 19-18）進行治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070545-an-me-lu2-pave-treatment.jpeg\" alt=\"an-me-lu2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 3融合中心 （CF）的觸診驗證與治療\u003Cbr /\u003E患者仰臥。治療師將指關節或肘部靠在臍帶近端和一側的白線上，並進行緻密化治療，直到滑動改善。同時，患者應感到疼痛減輕（針灸穴位 KI 17-16）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070503-an-me-lu3-pave-treatment.jpeg\" alt=\"an-me-lu3-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-ME-LU 障礙",
    "answer": "\u003Cp\u003Ean-me-lu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E腹痛通常會蔓延到腰部。感覺腹部腫脹或緊張。為了代償腹部筋膜的限制，軀幹姿勢可能會有輕微的前傾。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070502-an-me-lu-cp.jpeg\" alt=\"an-me-lu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 融合中心（CF）的被動動作驗證。\u003Cbr /\u003E患者站姿。治療師用一手向後移動患者的胸部，同時用另一手穩定骨盆，拉伸前側腰部區域。如果臍上腹直肌鞘緻密，則患者主訴上腹部區域疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070507-an-me-lu-move-p.jpeg\" alt=\"an-me-lu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-lu 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E從上述最大伸展位置，對患者的胸骨施加阻力，並要求患者向前移動軀幹。患者可能會感到後腰疼痛或全身無力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070515-an-me-lu-move-a.jpeg\" alt=\"an-me-lu-move-a\" /\u003E\u003C/p\u003E"
  },

的中間開始觸診驗證，然後在頭側和尾側方向將觸診延伸幾厘米。處理僅限於已確定的單個緻密點（針灸穴位 KI 14-13）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070500-an-me-pv2-pave-treatment.jpeg\" alt=\"an-me-pv2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pv 3融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。檢查恥骨上區域，該區域通常很敏感，因為它有豐富的神經支配。因此，在決定治療點的選擇時，應考慮緻密化，而非敏感性（針灸穴位 KI 12-11）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070518-an-me-pv3-pave-treatment.jpeg\" alt=\"an-me-pv3-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-TA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E小腿遠端1/3處脛骨後內側；\u003C/li\u003E\u003Cli\u003E伸肌支持帶\u003Cbr /\u003E中醫穴位：\u003C/li\u003E\u003Cli\u003ELR5，蠡溝穴；\u003C/li\u003E\u003Cli\u003ESP6，三陰交穴\u003Cbr /\u003E相關問題：\u003C/li\u003E\u003Cli\u003E踝關節不穩定\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內-踝cf點位於伸肌上支持帶的內側。此處的支持帶可以在脛骨上滑動，並連接了脛骨前肌與脛骨後肌的張力，以完成踝部的前向與內向運動。\u003C/p\u003E\u003Cp\u003E此 cf點對應針灸的蠡溝穴（LR 5）和三陰交穴（SP6）。\u003C/p\u003E\u003Cp\u003E後一內一踝cf點位於跟腱的內側緣，在跟腱與脛骨之間的溝內。由小腿三頭肌、足趾屈肌、足𧿹長屈肌形成的後向與內向運動矢量匯聚於此。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090432-An-me-ta.jpeg\" alt=\"An-me-ta\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ta 1,2 融合中心 （CF）解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-ta 1 CF 位於脛骨内側表面\u003C/li\u003E\u003Cli\u003Ean-me-ta 2 CF 位於脛骨後緣的後方\u003C/li\u003E\u003Cli\u003Ean-la-ta 1 CF 位於腓骨遠端三分之一的前方\u003C/li\u003E\u003Cli\u003Ean-la-ta 2 CF 位於第三腓骨肌於腓骨的附著處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070514-an-me-ta-location.jpeg\" alt=\"an-me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ta 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師在脛骨的內側表面進行觸診驗證和治療，在伸肌支持帶上緣穿過骨膜的水平處（針灸穴位 LV 5、SP7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070500-an-me-ta1-pave-treatment.jpeg\" alt=\"an-me-ta1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ta 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。為了尋找緻密點，治療師用食指的指關節穿透脛骨後面的溝。由於該區域存在隱靜脈和其他敏感組織（針灸穴位 SP6），因此不應長時間操作此點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070521-an-me-ta2-pave-treatment.jpeg\" alt=\"an-me-ta2-pave-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-ME-TA 障礙",
    "answer": "\u003Cp\u003Ean-me-ta 融合中心 （CF）的功能障礙。\u003Cbr /\u003E下肢緊張和無力。融合中心（CF）的功能活動，脛跗關節失能，脛骨肌腱炎。在某些情況下，由於支持帶纖維化，空凹足、扁平足和馬蹄内翻足可能與小腿肌肉不協調有關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070548-an-me-ta-cp.jpeg\" alt=\"an-me-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-ta 融合中心 （CF）的動作驗證。\u003Cbr /\u003E患者仰臥。運動驗證和 an-me-pe CF 相同。\u003Cbr /\u003E此處 CF 若不正常，患者可能會感到小腿或足部的張力更大。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070553-an-me-ta-move.jpeg\" alt=\"an-me-ta-move\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-PE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E脛骨前肌肌腱和踝骨之間；\u003C/li\u003E\u003Cli\u003E脛骨前肌肌腱溝內側，內踝前側\u003C/li\u003E\u003Cli\u003E第一跖骨基底部\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELR4 中封穴；\u003C/li\u003E\u003Cli\u003ESP5 商丘六；\u003C/li\u003E\u003Cli\u003ESP4 公孫穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E足前中部疼痛，高足弓\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前--內一足cf點由3個點構成：第一個在內踝與脛骨前肌肌腱之間，第二個在內踝尖前方，而第三個在脛骨前肌位於第一跖骨基底及內側楔骨的附著點上\u003C/p\u003E\u003Cp\u003E此cf 點對應針灸的中封穴（LR 4）、商丘與公孫穴（SP 5、4），以及 Cyriax法給出的前脛距韌帶損傷的適應點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090437-An-me-pe.jpeg\" alt=\"An-me-pe\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 1,2和3CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pe 1 CF 位於伸肌支持帶上束\u003C/li\u003E\u003Cli\u003Ean-me-pe 2 CF 位於支持帶的下束\u003C/li\u003E\u003Cli\u003Ean-me-pe 3 CF 位於脛前肌的終止點處\u003C/li\u003E\u003Cli\u003E形成an-me-pe CF 的足部肌肉在遠端方向牽引前内向對角線\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070519-an-me-pe-location.jpeg\" alt=\"an-me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pe CF 位於伸肌支持帶的上束和下束，靠近內踝前緣：\u003Cul\u003E\u003Cli\u003Ean-me-pe 1 CF 位於十字支持帶上束的内部。\u003C/li\u003E\u003Cli\u003Ean-me-pe 2 CF 位於同支持帶下束的内部。\u003C/li\u003E\u003Cli\u003Ean-me-pe 3 CF 位於支持帶下束的附著處。\u003C/li\u003E\u003C/ul\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070533-an-me-pe-location2.jpeg\" alt=\"an-me-pe-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 3 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-pe 3 CF 位於脛骨前肌附著於内側楔形骨和第一蹠骨的位置\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070552-an-me-pe-location3.jpeg\" alt=\"an-me-pe-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 1融合中心 （CF）的治療。\u003Cbr /\u003E患者仰臥或側臥。將指關節放在伸肌支持帶的上束，靠近脛前肌腱，並操作最緻密和最敏感的點（針灸穴位 LV4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070526-an-me-pe-treatment.jpeg\" alt=\"an-me-pe-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或側臥。用指關節尋找和再現患者描述的踝關節疼痛的點。繼續操作直到疼痛消失（針灸穴位 SP5）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070539-an-me-pe2-pave-treatment.jpeg\" alt=\"an-me-pe2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-pe 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或側臥。治療師將指關節放在伸肌支持帶的上束，靠近脛前肌腱，並治療最緻密和最敏感的點（針灸穴位 SP 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070500-an-me-pe3-pave-treatment.jpeg\" alt=\"an-me-pe3-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-ME-PE 障礙",

  {
    "question": "AN-ME-SC 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鎖骨中線上\u003C/li\u003E\u003Cli\u003E第2和3肋骨溝\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EST15，屋翳穴\u003C/li\u003E\u003Cli\u003EST16，膺窗穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩部局部疼痛或彌漫性疼痛，手臂感覺異常，胸廓出口綜合征\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-內-肩cf點位於胸大肌胸骨部的中心（第二肋間隙），在這里它同步隊鎖-腋筋膜（前、內旋）與胸大肌筋膜（內）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090444-An-me-sc.jpeg\" alt=\"An-me-sc\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-sc 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-me-sc 1 CF 位於胸小肌上段的肌腱通道上\u003C/li\u003E\u003Cli\u003Ean-me-sc 2 CF 靠近胸小肌中段的肌腱通道\u003C/li\u003E\u003Cli\u003Ean-la-sc 1 CF 位於中斜角肌\u003C/li\u003E\u003Cli\u003Ean-la-sc 2 CF 位於鎖骨上窩\u003C/li\u003E\u003Cli\u003E肩胛的 CF 受到來自肱骨的牽引力，然後分布到頸部的肌筋膜單元，反之亦然。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070541-an-me-sc-location.jpeg\" alt=\"an-me-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-sc 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥，治療師站在同側或對側。觸診驗證與治療在胸筋膜上進行，位置在第二肋間隙（針灸穴位 ST 14、15）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070530-an-me-sc1-pave-treatment.jpeg\" alt=\"an-me-sc1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-sc 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。使用指尖進行觸診驗證（PaVe），並使用食指關節來治療 an-me-sc 2 CF 所在的第三肋間（針灸穴位 ST 16）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070552-an-me-sc2-pave-treatment.jpeg\" alt=\"an-me-sc2-pave-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-me-sc 融合中心 （CF）的功能障礙。\u003Cbr /\u003E上肢感覺疲倦，胸小肌和大肌痙攣，上肢麻痺，肩膀疼痛。用以評估肩峰下夾擠的Yocum 測試可能是陽性的。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070520-an-me-sc-cp.jpeg\" alt=\"an-me-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-me-sc 融合中心（CF）的動作驗證。\u003Cbr /\u003E患者站姿。an-me-sc 1 和 2 CF 的運動驗證和 an-me-hu CF 的動作驗證相同。治療師向上和向外移動手臂（被動伸展），然後讓患者將手臂向前移動，將手伸向對側肩部（主動動作驗證）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519070524-an-me-sc-move.jpeg\" alt=\"an-me-sc-move\" /\u003E\u003C/p\u003E"

的上方找到，或者在額頭的中間，或者靠近髮際線處（針灸穴位 GB14 • 15) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010526-re-la-cp1-treatment.jpeg\" alt=\"re-la-cp1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿或俯臥，頭靠在治療床上。治療師在頭骨上尋找與頂骨突起相對應的緻密點，然後鬆動該點直到彈性恢復（針灸穴位 GB 17-18) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010542-re-la-cp2-treatment.jpeg\" alt=\"re-la-cp2-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cp 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿或俯臥，頭靠在治療床上。治療師尋找乳突後方和上方最敏感的點，然後用指關節操作此點，直到疼痛消失（針灸穴位GB 19 • GB 11) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010557-re-la-cp3-treatment.jpeg\" alt=\"re-la-cp3-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E坐骨結節外側與大轉子之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL.36，承扶穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E坐骨神經痛，膕繩肌緊張\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-髖cf點位於坐骨結節外側與大轉子之間。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的承扶穴（BL36）。治療這個 cf 點可以減輕 Cyriax 法用注射來治療的臀下滑囊炎，以及 Maigne 法用被動拉伸來治療的轉子滑囊炎。這些方法當然會有好的效果，但它們針對的是炎癥而不是引起炎癥的原因--肌筋膜失衡。\u003C/p\u003E\u003Cp\u003E雙側後-外--髖cf點位於環繞臀大肌下部的膠原纖維上，這些螺旋形纖維與髂脛束、臀中肌及腹外斜肌的筋膜相連。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090422-Me-la-cx.jpeg\" alt=\"Me-la-cx\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cx CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E大腿橫截面圖，垂直股骨頸的軸線。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cx CF 位於尾骨的側邊，臀大肌的邊界。\u003C/li\u003E\u003Cli\u003Ere-la-cx CF 位於坐骨結節和大轉子之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100525-re-la-cx-location.jpeg\" alt=\"re-la-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514070521-Re-la-cx2.jpeg\" alt=\"Re-la-cx2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cx 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師用肘部尋找坐骨結節和大轉子之間的緻密和敏感點。然後沿著溝縱向操作該點（針灸穴位 BL 36）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100531-re-la-cx-pave-treatment.jpeg\" alt=\"re-la-cx-pave-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ere-la-cx 融合中心 （CF）的功能障礙。\u003Cbr /\u003E大腿後外側部位的疼痛和感覺異常。下肢無力和不協調。患者告知如果躺在受影響的臀部區域上，將無法入睡。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100506-re-la-cx-cp.jpeg\" alt=\"re-la-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cx 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E患者仰臥。為了拉伸覆蓋大腿後外側肌肉的筋膜，治療師用一手抓住患者的腳踝，另一手將膝蓋移動到屈曲和內收。如果該筋膜僵硬，患者會感到強烈的張力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100510-re-la-cx-move-p.jpeg\" alt=\"re-la-cx-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-cx 融合中心 （CF）的主動動作驗證。\u003Cbr /\u003E治療師站在與受影響的臀部相對側，並握住患者的膝蓋。要求患者進行髖關節後向動作。此動作可能會突顯某側的肌力較弱，也可能會加劇疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100518-re-la-cx-move-a.jpeg\" alt=\"re-la-cx-move-a\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-LA-GE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股二頭肌肌腱遠端內側\u003C/li\u003E\u003Cli\u003E腓腸肌外側近端，腓骨頭後\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL38，浮郄穴\u003C/li\u003E\u003Cli\u003EBL55，合陽穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E膝後外側疼痛，股二頭肌肌腱炎，外側半月板損傷\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-膝融合中心由兩個點構成：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一個在股二頭肌的遠端肌腱上，\u003C/li\u003E\u003Cli\u003E第二個在腓腸肌外側頭的近端。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腓腸肌的外側頭參與膝關節的後向運動及外向穩定。此cf點對應針灸的委中穴（BL 40）和浮郄穴（BL 38）（膝陽關 /GB 33）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090428-Me-la-ge.jpeg\" alt=\"Me-la-ge\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ge 1 和2 CF 解剖位置。\u003C/p\u003E\u003Cp\u003E膝部通過股骨髁的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-ge CF 位於腓腸肌（内側頭）、半腱肌和半膜肌上方\u003C/li\u003E\u003Cli\u003Ere-la-ge CF 位於腓腸肌（外側頭）和蹠肌上方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100541-re-la-ge-location.jpeg\" alt=\"re-la-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260514070501-Re-la-ge3.jpeg\" alt=\"Re-la-ge3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ge 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師使用食指的指關節在股二頭肌遠端肌腱上尋找膕肌外側近端的任何緻密點，然後將這部份的膕肌支持帶沿縱向操作（針灸穴位 BL 38、39）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100531-re-la-ge1-pave-treatment.jpeg\" alt=\"re-la-ge1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ge 2融合中心（CF）的治療。\u003Cbr /\u003E患者俯臥。治療師將指關節放在外側腓腸肌的肌腱通道上，一旦確定緻密化，就在橫向操作該點（針灸穴位 BL 55）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100548-re-la-ge2-treatment.jpeg\" alt=\"re-la-ge2-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ere-la-ge 融合中心（CF）的功能障礙。\u003Cbr /\u003E膝關節後外側部位疼痛和腫脹。下肢功能障礙。患者感覺他們的膝蓋僵硬且受束縛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100520-re-la-ge-cp.jpeg\" alt=\"re-la-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ge 融合中心 （CF）的動作驗證\u003Cbr /\u003E患者仰臥或站姿。與 re-la-ge 1和2 CF 相連的筋膜之緻密化在縮短過程中比在延長過程中更容易顯現。因此，患者被要求最大限度地彎曲膝蓋，無論是躺著還是從站姿下\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520100524-re-la-ge-move.jpeg\" alt=\"re-la-ge-move\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-TA 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E跟腱和腓骨肌之間\u003C/li\u003E\u003Cli\u003E腓骨長肌和腓骨短肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL59，跗陽穴\u003C/li\u003E\u003Cli\u003EGB39，懸鐘穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腓骨肌腱炎，踝關節失穩\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090436-Me-la-ta.jpeg\" alt=\"Me-la-ta\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cp\u003E腿部下三分之一在踝骨上方的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-ta CF 位於覆蓋屈肌肌腱的支持帶上\u003C/li\u003E\u003Cli\u003Ere-la-ta CF 位於覆蓋兩塊腓骨肌的支持帶上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120558-re-la-ta-location.jpeg\" alt=\"re-la-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 1融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥或俯臥。治療師觸診驗證在腓骨後方進行，對著腓骨長肌和短肌的肌腱通道進行治療（針灸穴位 BL 59）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120548-re-la-ta1-pave-treatment.jpeg\" alt=\"re-la-ta1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師的指關節來操作覆蓋腓骨長肌和短肌的筋膜的後部和遠端部（針灸穴位 GB 39）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120504-re-la-ta2-pave-treatment.jpeg\" alt=\"re-la-ta2-pave-treatment\" /\u003E\u003C/p\u003E"
  },

    "answer": "\u003Cp\u003Ere-la-ta 融合中心 （CF）的功能障礙\u003Cbr /\u003E下肢緊繃且無力。腳踝運動不協調。此為腳踝扭傷的後果。脛跗關節韌帶鬆弛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120536-re-la-ta-cp.jpeg\" alt=\"re-la-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ta 融合中心 （CF）的被動動作驗證\u003Cbr /\u003Ere-la-ta 1 和 2 CF 與 re-la-pe 1 • 2 和 3 CF\u003Cbr /\u003E的動作驗證相同，但患者在小腿外側最能感覺到張力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120541-re-la-ta-move-p.jpeg\" alt=\"re-la-ta-move-p\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-LA-PE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E外踝與跟腱之間\u003C/li\u003E\u003Cli\u003E跟腱外側\u003C/li\u003E\u003Cli\u003E外課最高點下\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL60，昆侖穴\u003C/li\u003E\u003Cli\u003EBL61，仆參穴\u003C/li\u003E\u003Cli\u003EBL62，申脈穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E足跟痛，跟腱炎，外踝痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-足cf點由位於外踝後的3個點構成：第一個位於腓骨肌上支持帶，第二個在跟腱附著點的外側，而第三個在腓骨肌下支持帶上。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的昆侖（經穴）、仆參、申脈和金門穴（BL 60、61、62 和63）。筋膜手法治療師必須在最敏感、致密的點上操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090443-Me-la-pe.jpeg\" alt=\"Me-la-pe\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E足部在距骨、舟狀骨和骰骨的水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-pe CF 位於腓骨短肌和長肌腱之間\u003C/li\u003E\u003Cli\u003Ere-me-pe CF 位於脛後肌和外展拇肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120536-re-la-pe-location.jpeg\" alt=\"re-la-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 1、23CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-pe 1 CF 位於腓骨上支持帶\u003C/li\u003E\u003Cli\u003Ere-la-pe 3 CF 位於腓骨下支持帶\u003C/li\u003E\u003Cli\u003Ere-la-pe 2 CF 位於腓骨的中間支持帶\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120556-re-la-pe-location2.jpeg\" alt=\"re-la-pe-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-pe 3 CF 位於外踝下方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120513-re-la-pe-location3.jpeg\" alt=\"re-la-pe-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師用指尖尋找腓骨骨膜上部的緻密點。該支持帶是雙層的：深層與小腿深筋膜相連，淺層與小腿淺層相連（針灸穴位 BL 60）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120542-re-la-pe1-pave-treatment.jpeg\" alt=\"re-la-pe1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。腓骨支持帶的中間帶嵌入跟骨的外側表面，是由兩個腓骨肌肉形成的兩個骨纖維通道（針灸穴位 BL 61）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120503-re-la-pe2-pave-treatment.jpeg\" alt=\"re-la-pe2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-pe 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者側臥。治療師使用中指的指尖尋找腓骨下支持帶的任何緻密變化，此支持帶在十字形支持帶上方連續（針灸穴位 BL 62）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120519-re-la-pe3-pave-treatment.jpeg\" alt=\"re-la-pe3-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-SC 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E岡上肌筋膜中點；\u003C/li\u003E\u003Cli\u003E肩鎖韌帶和遠端\u003C/li\u003E\u003Cli\u003E岡上肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI12，秉風穴\u003C/li\u003E\u003Cli\u003ELI16，巨骨穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩鎖關節疼痛，岡上肌疼痛，頸椎疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-肩 cf點位於岡上窩的內側部，斜方肌與肩胛提肌共同作於肩胛骨，可以將肩胛骨上提及後移。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090448-Me-la-sc.jpeg\" alt=\"Me-la-sc\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-sc 1 and 2 CF 解剖位置和橫截面線。\u003C/p\u003E\u003Cp\u003E第二胸椎水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-sc CF 位於棘上窩内側緣\u003C/li\u003E\u003Cli\u003Ere-la-sc 2 CF 位於肩鎖韌帶上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120541-re-la-sc-location.jpeg\" alt=\"re-la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-sc 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿。對位於斜方肌在鎖骨終止點上方的筋膜進行觸診驗證和治療。透過從肌肉的中心向前移動來進行治療（針灸穴位 GB21) \u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120528-re-la-sc1-pave-treatment.jpeg\" alt=\"re-la-sc1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-sc 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿。治療師用指關節操作肩鎖韌帶，直到患者主述疼痛，包括任何牽涉的疼痛，已經消失（針灸穴位 LI 16）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520120548-re-la-sc2-pave-treatment.jpeg\" alt=\"re-la-sc2-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-CA 位置",

    "answer": "\u003Cp\u003Ere-la-ca 融合中心（CF）的功能障礙。\u003Cbr /\u003E拇指伸展動作緊張和無力。狄奎凡氏症（DeQuervain&#39;s disease）。拇指伸展期間，有類似板機指感的纖維化。手腕橈側腫脹。該區域對應於 la-ca 肌筋膜單元的感知中心（CP）和橈神經皮支的點。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010502-re-la-ca-cp.jpeg\" alt=\"re-la-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-ca 融合中心 （CF）的動作驗證\u003Cbr /\u003E患者在主動尺偏或被動手腕橈側拉伸時抱怨手腕橈側酸痛。Finkelstein 氏的測試，其包括拇指彎曲時手腕的尺側偏斜，可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010507-re-la-ca-move.jpeg\" alt=\"re-la-ca-move\" /\u003E\u003C/p\u003E"

    "question": "RE-LA-DI 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拇指外展，在手腕橈側伸肌肌腱上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI5，陽溪穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E拇指疼痛，腕掌關節炎\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-指cf點位於解剖學上的鼻煙窩，橈骨莖突的遠端。從這里它控制著拇長、短伸肌（後）和拇長展肌（外）的肌腱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090413-Me-la-di.jpeg\" alt=\"Me-la-di\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-di 1 CF 解剖位置和橫截面線\u003C/p\u003E\u003Cp\u003E豌豆骨、頭狀骨和舟狀骨的橫截面圖\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-di 1 CF，在伸肌支持帶遠端，尺骨區域。\u003C/li\u003E\u003Cli\u003Ere-la-di 1 CF 在伸肌支持帶遠端，橈骨區域。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010538-re-la-di-location.jpeg\" alt=\"re-la-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-di 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或仰臥。治療師用指尖檢查手部解剖鼻煙壺內的筋膜。然後用食指的指關節操作緻密點（針灸穴位 LI 5）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010528-re-la-di1-pave-treatment.jpeg\" alt=\"re-la-di1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-la-di 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或坐著。治療師用指尖檢查位於緊鄰第二掌骨頭空間中的筋膜；然後用食指的指關節操作緻密點（針灸穴位 LI3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010544-re-la-di2-pave-treatment.jpeg\" alt=\"re-la-di2-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-LA-DI 障礙",
    "answer": "\u003Cp\u003Ere-la-di 融合中心 （CF）的功能障礙。\u003Cbr /\u003E手部第 1和第2指功能受限、手部小肌肉痙攣、第一掌指關節骨關節炎和腱鞘炎。複雜性局部疼痛症候群（CRPS）或反射性交感神經營養不良或痛覺神經營養不良症候群或灼痛或 Sudeck 氏症候群。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-la-di-cp.jpeg\" alt=\"re-la-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere- la-di 1 融合中心 （CF）的被動-主動動作驗證。\u003Cbr /\u003E為了測試伸肌支持帶和肌腱的彈性，治療師將患者的拇指放在拳頭內，然後拉緊手腕，並要求患者從這個位置伸出手指抵抗阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010521-re-la-di-move.jpeg\" alt=\"re-la-di-move\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-CP 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E發際線到頭頂的中點\u003C/li\u003E\u003Cli\u003E稍微低於頭頂\u003C/li\u003E\u003Cli\u003E頭頂至枕骨粗隆中點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL5，五處穴\u003C/li\u003E\u003Cli\u003EBL6，承光穴\u003C/li\u003E\u003Cli\u003EBL7，通天穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頭部沈重，眼周酸痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內-頭cf點由3個點組成：第一個位於前額與頭頂的中點；第二個在頭頂的旁邊；第三個稍高於枕外隆凸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090424-Re-me-cp.jpeg\" alt=\"Re-me-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 1, 2 和 3 CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cp 2 CF 位於頭頂，re-cp 2、me-cp 2r和 er-cp 2 CC 的牽引力匯合處\u003C/li\u003E\u003Cli\u003Ere-me-cp 1 CF 位於髮際線上，從此處控制 me-cp 1 和 re-cp 1的CC\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 CF 位於枕骨隆突的一側，re-cp 3 和 me-cp 3rCC 的牽引力匯合處\u003C/li\u003E\u003Cli\u003E注意：黃色三角形代表 re-la-cp\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010535-re-me-cp-location.jpeg\" alt=\"re-me-cp-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 2 CF 解剖位置。\u003C/p\u003E\u003Cp\u003E筋膜在運動知覺中的作用可以從帽狀腱膜張肌的排列推斷出來。\u003C/p\u003E\u003Cp\u003E這些肌肉以這樣一種方式維持了帽狀腱膜的基礎張力，即使是頭部在三個空間平面中的任何一個平面上的細微運動也可以活化感受噐。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-cp 1 連接到 me-cp 1 和 re-cp 1 CC\u003C/li\u003E\u003Cli\u003Ere-me-cp 2位於頭頂，前後和側向牽引力匯聚處。\u003C/li\u003E\u003Cli\u003Ean-me-cp 1 連接到 me-cp 1和 an-ср СС\u003C/li\u003E\u003Cli\u003E耳廓肌肉斜牽引帽狀腱鞘\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 連接到 me-cp 3r 和 re-cp 3 CC\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010552-re-me-cp-location2.jpeg\" alt=\"re-me-cp-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 3 CF 解剖位置•\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E帽狀腱膜，切片強調覆蓋顳肌的顱骨上筋膜。\u003C/li\u003E\u003Cli\u003Ere-me-cp 3 CF 位於枕骨突的側邊，帽狀腱膜與頸筋膜和枕肌也附著在此。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-cp-location3.jpeg\" alt=\"re-me-cp-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師一旦指尖確定了緻密點，使用指關節來治療該點，施加治療額肌所需的最小壓力（針灸穴位 BL 3）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010541-re-me-cp1-pave-treatment.jpeg\" alt=\"re-me-cp1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師將食指的指關節放在頭部中線的一側，即頭骨的頂部，然後尋找滑動減少的最敏感點並對其進行操作直到它軟化（針灸穴位 BL 6-7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010559-re-me-cp2-pave-treatment.jpeg\" alt=\"re-me-cp2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 3 融合中心（CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐著，額頭靠在床上。治療師用一手穩定患者的頭部，並用另一手的指關節操作枕肌的小纖維（針灸穴位 BL9）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-me-cp3-pave-treatment.jpeg\" alt=\"re-me-cp3-pave-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-CP 障礙",
    "answer": "\u003Cp\u003Ere-me-cp 1融合中心 （CF）的功能障礙。\u003Cbr /\u003E此 CF 與靠近鼻子和眼睛的 CC 相互作用；\u003Cbr /\u003E因此，會導致於眼睛和鼻子的功能障礙，如眼痛和鼻炎、臉部淋巴充血和前額痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-cp1-cp.jpeg\" alt=\"re-me-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 2融合中心 （CF）的功能障礙。\u003Cbr /\u003E維持帽狀腱膜張力的小肌肉功能不能由一個動作驗證評估。此 CF 的功能障礙表現為眩暈、頭部沉重的感覺，以及神經和心理障礙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010521-re-me-cp2-cp.jpeg\" alt=\"re-me-cp2-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cp 3 融合中心 （CF）的功能障礙。\u003Cbr /\u003Ere-me-cp 3 CF 的緻密化可引起枕骨粗隆下方的疼痛和緊張、頸部和整個脊柱的僵硬、枕骨頭痛、癱瘓、中風和心理障礙，例如對自己身體的感知改變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010528-re-me-cp3-cp.jpeg\" alt=\"re-me-cp3-cp\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-CL 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E脖子中點，項韌帶兩側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EBL10，天柱穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E頸部和枕骨區域疼痛，眩暈\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點緊鄰項韌帶，它對應針灸的天柱穴（BL 10）及 Cyriax 法中的中央脫位（central dislocation）處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090430-Re-me-cl.jpeg\" alt=\"Re-me-cl\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cl CF 位於斜方肌和胸鎖乳突肌之間的溝\u003C/li\u003E\u003Cli\u003Ere-me-cl CF 位於頸部項韌帶的一側，從第一頸椎（針灸穴位 VG 15） 延伸到第七頸椎（針灸穴位 VG 14) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010553-re-me-cl-location.jpeg\" alt=\"re-me-cl-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者坐姿，額頭擱在手上。治療師使用食指的指關節進行的。項韌帶的筋膜結構堅固，因此需要長時間的深度治療（針灸穴位 JJ cl1-7) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010500-re-me-cl-pave-treatment.jpeg\" alt=\"re-me-cl-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-CL 障礙",
    "answer": "\u003Cp\u003Ere-me-cl 融合中心（CF）的功能障礙。\u003Cbr /\u003Ere-me-cl 的CF 對於恢復頸部韌帶的彈性非常有幫助。頸部韌帶的剛性代償了頭部，而引起頭痛，以及在背部引發沿脊柱的疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010534-re-me-cl-cp.jpeg\" alt=\"re-me-cl-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl 融合中心 （CF）被動動作驗證。\u003Cbr /\u003E治療師將患者的頭部向前輕輕推向右側，然後向左側；要求患者指出感到最緊繃的地方。只有一側的緊繃感表明了緻密的部份。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010539-re-me-cl-move-p.jpeg\" alt=\"re-me-cl-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cl 融合中心 （CF）主動動作驗證\u003Cbr /\u003E治療師要求患者將頭部向後以拉緊頸部項韌帶。有時，頸部會感到疼痛，因為頸部項韌帶的僵硬會對嵌入該韌帶內的感受器產生異常牽引力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010545-re-me-cl-move-a.jpeg\" alt=\"re-me-cl-move-a\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-TH 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ET2-T3\u003C/li\u003E\u003Cli\u003ET4-T6\u003C/li\u003E\u003Cli\u003ET7-T11兩側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EEX-B2，夾脊穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E背部僵硬酸痛，頸椎屈曲困難，深呼吸僵硬\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內一胸3cf點位於第八、第九胸椎棘突與豎脊肌的肌束之間。它對應\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090434-Re-me-th.jpeg\" alt=\"Re-me-th\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 1,2和3 CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 1 CF 上的 re-me-cl CF 的牽引力\u003C/li\u003E\u003Cli\u003Ere-me-th 1 CF 位於第一至三節胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於第四至第七胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-la-th CF 位於肩胛骨下角水平\u003C/li\u003E\u003Cli\u003Ere-me-th 3 CF 位於第8 至第 11 胸椎棘突側面\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010519-re-me-th-location.jpeg\" alt=\"re-me-th-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 2 CF 位於 me-th 和 re-th 的 CC之間，在胸棘肌的中間。\u003C/li\u003E\u003Cli\u003Ere-me-th 1 和 re-me-th 3 CF 位於胸椎的起點和棘肌終點。\u003C/li\u003E\u003Cli\u003E三個 re-me-th CF 作用於 re-th 和 me-thr 的 CC，對抗 an-me-th CF \u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於 re-th 和 me-th r 的 CC 之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此圖中，後向序列的胸最長肌已被移除，以突顯 re-me-th 動作序列的脊肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010537-re-me-th-location2.jpeg\" alt=\"re-me-th-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-th CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-th 1 CF 位於第一至三節胸椎棘突側邊\u003C/li\u003E\u003Cli\u003Ere-me-th 2 CF 位於胸最長肌 （re-th）的肌腹和胸椎棘突（me-th）之間\u003C/li\u003E\u003Cli\u003Ere-me-th 3 CF 與胸脊肌，在這張照片中被胸最長肌覆蓋。\u003C/li\u003E\u003C/     "answer": "\u003Cp\u003Ere-me-cx 融合中心 （CF）的功能障礙。\u003Cbr /\u003E最常見的障礙是尾骨痛，通常在跌坐到尾骨後發生，隨後尾骨本身發生位置偏移。\u003Cbr /\u003E薦尾部韌帶的緻密化會引起會陰部和大腿内側的疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010533-re-me-cx-cp.jpeg\" alt=\"re-me-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cx 融合中心 （CF）被動動作驗證\u003Cbr /\u003E患者仰臥。該測試與用於膝蓋的測試相同，但現在拉伸感主要集中在大腿的後内側部分。此動作驗證類似於拉塞格 （Lasegue）或直腿抬高測試。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010538-re-me-cx-move-p.jpeg\" alt=\"re-me-cx-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cx 融合中心 （CF）主動動作驗證。\u003Cbr /\u003E治療師要求患者向下和向内移動下肢。在此動作執行期間，可能會引發膕肌痙攣或内收肌刺痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010545-re-me-cx-move-a.jpeg\" alt=\"re-me-cx-move-a\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-GE 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E半膜肌和半腱肌肌腱之間；\u003C/li\u003E\u003Cli\u003E腓腸肌內側近端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI10，陰谷穴\u003C/li\u003E\u003Cli\u003EBL55，合陽穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E膝蓋疼痛，陽窩疼痛、囊腫，內側半月板損傷\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內--膝融合中心由兩個點組成：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一個在半膜肌與半腱肌的肌腱之間\u003C/li\u003E\u003Cli\u003E第二個在腓腸肌內側頭的後內緣上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點對應針灸的陰谷穴（K1 10）與合陽穴（BL 5S）。治療這些點被證明對可能由膝關節軟骨損傷引起的疼痛有效，常常產生膝關節活動範圍的即刻恢覆。其他方法也有類似效果®\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090456-Re-me-ge.jpeg\" alt=\"Re-me-ge\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ge 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-ge 1 CF 位於股二頭肌的肌腱通道上\u003C/li\u003E\u003Cli\u003Ere-la-ge 2 CF 位於外側腓腸肌近端處，作用於膝關節後向動作。\u003C/li\u003E\u003Cli\u003Ere-la-ta CF 的遠近端牽引力在 re-la-ge 動作過程中轉化為協同作用\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010520-re-me-ge-location.jpeg\" alt=\"re-me-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ge 1融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師操作位於半腱肌和半膜肌的肌腱通道內的筋膜，注意避開後關節間隙區域（針灸穴位KI 10）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010510-re-me-ge1-pave-treatment.jpeg\" alt=\"re-me-ge1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ge 2融合中心（CF）的治療\u003Cbr /\u003E患者俯臥。治療師在內側腓腸肌頭近端肌腱通道的方向上操作膕筋膜，注意避免在膕窩的中心上方操作（針灸穴位 LV 7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010527-re-me-ge2-pave-treatment.jpeg\" alt=\"re-me-ge2-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-GE 障礙",
    "answer": "\u003Cp\u003Ere-me-ge 融合中心 （CF）的功能障礙。\u003Cbr /\u003E膝蓋的運動受損。膕窩腫脹的感覺有時歸因於貝克囊腫。膝關節內側有脂肪沉積，常見於中年女性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010559-re-me-ge-cp.jpeg\" alt=\"re-me-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ge 融合中心 （CF）被動動作驗證。\u003Cbr /\u003E治療師用一手向上和向外抬起患者腿，同時用另一手保持膝蓋伸展。若膕筋膜緻密化，則患者會感到膝蓋後內側部位過度拉伸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010504-re-me-ge-move-p.jpeg\" alt=\"re-me-ge-move-p\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-TA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E跟腱和趾屈肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI7，覆溜穴\u003C/li\u003E\u003Cli\u003EKI3，太溪穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E踝關節後內側疼痛，足跟疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-外-踝cf點位於腓骨長短肌肌腱上。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的外丘和懸鐘穴（GB 36 和39）。該點的致密化可以導致脛距關節的僵化，Maigne 法建議用快速牽引（swift traction） 手法來緩解。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090403-Re-me-ta.jpeg\" alt=\"Re-me-ta\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 1 和 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-ta 1 CF 位於跟腱和腓骨邊界之間\u003C/li\u003E\u003Cli\u003Ere-la-ta 2 CF 位於外踝近端，腓骨後方。\u003C/li\u003E\u003Cli\u003Ere-me-ta 1 CF 位於跟腱和屈趾肌之間的溝中\u003C/li\u003E\u003Cli\u003Ere-me-ta 2 CF 位於與上述相同的溝中，但稍遠一些。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010548-re-me-ta-location.jpeg\" alt=\"re-me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 1融合中心 （CF）的觸診\u003Cbr /\u003E患者側臥。治療師沿著脛骨和跟腱之間的溝進行觸診驗證。一旦確定緻密點，就可以使用肘部對其進行操作（針灸穴位 KI7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010535-re-me-ta1-pave-treatment.jpeg\" alt=\"re-me-ta1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 2融合中心 （CF）的觸診\u003Cbr /\u003E患者側臥。治療師用食指的指關節尋找 re-me-ta 2 CF 的緻密化，它與前一個（針灸穴位 KI 8） 位於同一溝中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010556-re-me-ta2-pave-treatment.jpeg\" alt=\"re-me-ta2-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-TA 障礙",
    "answer": "\u003Cp\u003Ere-me-ta 融合中心 （CF）的功能障礙\u003Cbr /\u003E下肢緊張和無力。腳踝運動不協調。跟骨骨膜過度敏感反應，通常與跟腱附著點病變有關。反覆踝關節扭傷後屈肌支持帶纖維化導致踝關節不穩。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010524-re-me-ta-cp.jpeg\" alt=\"re-me-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ta 融合中心 （CF）被動性動作驗證。\u003Cbr /\u003E與 re-me-pe CF 動作驗證相同。根據哪種 CF 引起的功能障礙有關，患者會在小腿或足部感受到更大的張力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010528-re-me-ta-move-p.jpeg\" alt=\"re-me-ta-move-p\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-PE 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E內踝和跟腱之間\u003C/li\u003E\u003Cli\u003E跟骨上韌帶附著點內側\u003C/li\u003E\u003Cli\u003E跟骨頂下方口\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EKI4，大鐘穴\u003C/li\u003E\u003Cli\u003EKI5，水泉穴\u003C/li\u003E\u003Cli\u003EKI6，照海穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E足底筋膜炎，足跟痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內-足cf點位於內踝與跟腱之間，它由3個點組成：第一個在屈肌支持帶的上緣，第二個在跟腱附著點的內側，而第三個在支持帶的下緣，正對內踝的下方。\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的大鐘、水泉和照海穴（KI4、5和6，經脈的絡穴），從這里開始，一條縱向的絡脈和一條橫向的絡脈分別去到膀胱經）。Cyriax 法在此定位了3個治療脛骨後肌鞘的部位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090407-Re-me-pe.jpeg\" alt=\"Re-me-pe\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 1、2和3CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pe CF 從近 - 遠端方向牽引\u003C/li\u003E\u003Cli\u003Ere-me-pe 1 CF 位於屈肌支持帶上束\u003C/li\u003E\u003Cli\u003Ere-me-pe 3 CF 位於屈肌支持帶下束\u003C/li\u003E\u003Cli\u003Ere-me-pe 2 CF 位於屈肌支持帶的中間束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-me-pe-location.jpeg\" alt=\"re-me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 2 解剖位置。\u003Cbr /\u003Ere-me-pe 2 CF 位於跟骨粗隆的内側表面，\u003Cbr /\u003E屈肌支持帶中間束的附著點。在某種程度上，這一層與伸肌的支持帶相連。\u003Cbr /\u003E屈肌支持帶分為兩層：一層與小腿深筋膜和腓骨支持帶相連；另一層與小腿筋膜的淺層相連，後者在後面環繞小腿三頭肌肌腱，在前面以環形方式與屈肌支持帶相連。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E屈肌支持帶覆蓋三角韌帶和跗骨隧道\u003C/li\u003E\u003Cli\u003E屈肌的淺層支持帶嵌入拇外展肌：這深層可嵌入足底方肌。\u003C/li\u003E\u003Cli\u003E足距的屈肌支持帶包含在肌筋膜内，與筋膜一樣，它由兩個薄層組成，一個淺的和一個深的。這些層板與形成腓骨支持帶的兩個層板相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010534-re-me-pe-location2.jpeg\" alt=\"re-me-pe-location2\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 3 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-me-pe 3 CF 位於屈肌（或繖狀）支持帶的下束\u003C/li\u003E\u003Cli\u003Ere-me-pe 1 CF 位於屈肌支持帶上束\u003C/li\u003E\u003Cli\u003Ere-me-pe 2 CF 位於支持帶的中間束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010552-re-me-pe-location3.jpeg\" alt=\"re-me-pe-location3\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 1融合中心（CF）的治療。\u003Cbr /\u003E患者俯臥或側臥。為了找出緻密點，治療師使用指關節在內踝後緣和跟腱前緣之間，在高於跟骨的位置將其找出（針灸穴位KI 4）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010522-re-me-pe1-pave-treatment.jpeg\" alt=\"re-me-pe1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或側臥。治療師使用指關節，尋找跟骨內側表面上的緻密點。一旦確定緻密點就會將其鬆動，直到感覺到緻密化被解決（針灸穴位 KI 4-5）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010539-re-me-pe1-pave-treatment.jpeg\" alt=\"re-me-pe1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥或側臥。治療師用指關節找出內踝髁以下的支持帶的任何變化。一旦確定緻密化之處，其就會被輕輕地鬆動（針灸穴位KI 6)\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010500-re-me-pe3-pave-treatment.jpeg\" alt=\"re-me-pe3-pave-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-PE 障礙",
    "answer": "\u003Cp\u003Ere-me-pe 融合中心（CF）的功能障礙。\u003Cbr /\u003E複雜性局部疼痛症候群（CRPS）或反射性交感神經營養不良或痛覺神經營養不良症候群或灼痛或 Sudeck 氏症候群等。脛跗關節功能障礙、足痛和跟骨或足底痛，常歸因於足底筋膜炎、跗骨隧道、足跟骨刺等。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010554-re-me-pe-cp.jpeg\" alt=\"re-me-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe CF 被動動作驗證。\u003Cbr /\u003E患者仰臥。向外和向上伸展患者的前足，以拉緊屈肌支持帶。這種支持帶也被戲稱為繖狀「韌帶」（laciniate &#39;igament&#39;），不應與三角韌帶混淆。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010559-re-me-pe-move-p.jpeg\" alt=\"re-me-pe-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-pe 融合中心 （CF）主動動作驗證。\u003Cbr /\u003E患者仰臥。治療師從上述 re-me-pe CF 的最大伸展位置，治療師要求患者向內和向下移動他們的腳以活化屈肌，其肌腱在屈肌支持帶下方通過。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-pe-move-a.jpeg\" alt=\"re-me-pe-move-a\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-SC 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛骨內側緣，小菱形肌肌腱上\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI13，曲垣穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩臂疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內一肩cf點位於小菱形肌（後）的肩胛骨附著處，同時斜方肌的水平纖維也附著於此，該纖維引發肩胛骨內向運動。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090415-Re-me-sc.jpeg\" alt=\"Re-me-sc\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-sc 1, 2 和 re-la-sc 1,2CF解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-sc 1 CF 位於斜方肌的前緣，沿著乳頭線。\u003C/li\u003E\u003Cli\u003Ere-la-sc 2 CF 位於肩鎖關節上方\u003C/li\u003E\u003Cli\u003Ere-me-sc 1 CF位於棘上窩内側\u003C/li\u003E\u003Cli\u003Ere-me-sc 2 CF 位於棘上窩中央\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010532-re-me-sc-location.jpeg\" alt=\"re-me-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere- me-sc 1融合中心（CF）治療。\u003Cbr /\u003E患者坐著，頭靠在手上。治療師使用指關節或肘部來移動棘上窩的內側緣，在棘上肌的筋膜與小菱形肌的筋膜連接處（針灸穴位 SI 13) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010521-re-me-sc1-treatment.jpeg\" alt=\"re-me-sc1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-sc 2融合中心（CF）治療。\u003Cbr /\u003E患者坐姿。治療師使用食指指關節或肘部來操作 reme-sc 2 CF。該點位於棘上窩（針灸穴位 SI 12）的中心。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010538-re-me-sc2-treatment.jpeg\" alt=\"re-me-sc2-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-SC 障礙",
    "answer": "\u003Cp\u003Ere-me-sc 融合中心 （CF）的功能障礙。\u003Cbr /\u003E疲倦、針刺和上肢力量喪失。這些症狀通常被定義為「頸臂痛」。患者告知每當他們將頸部朝向同一側伸展和旋轉時，症狀會加重。Spurling 神經根疼痛的試驗可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010508-re-me-sc-cp.jpeg\" alt=\"re-me-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-sc 触合中心 （CF） 動作驗證。\u003Cbr /\u003E治療師要求患者向上和向後移動伸展的手臂。如果 re-me-sc CF 僅在一側緻密，那麼這動作會在肩胛骨的上部內側或整個肩部區域引起受限或疼痛的感覺。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010512-re-me-sc-move.jpeg\" alt=\"re-me-sc-move\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-ME-HU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛岡下\u003C/li\u003E\u003Cli\u003E岡下肌凹陷上緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI11，天宗穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩臂疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後一內-肱cf點位於腋後部，肱骨伸肌、內收肌及旋轉肌的矢量力匯聚於此。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090421-Re-me-hu.jpeg\" alt=\"Re-me-hu\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 和 re-la-hu CF 解剖位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-hu CF 位於三角肌後肌腱上，後向、外向和外旋動作匯聚在此筋膜。\u003C/li\u003E\u003Cli\u003Ere-me-hu CF位於腋窩上方，朝向肱三頭肌的長頭。\u003C/li\u003E\u003Cli\u003E來目 re-me-cu 和 re-me-ca CF 的遠近側牽引力\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010554-re-me-hu-location.jpeg\" alt=\"re-me-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥，手臂外展。治療師用食指的指關節尋找緻密化，然後用肘部治療肱三頭肌長頭、大圓肌和三角肌後束的肌腱纖維（針灸穴位 SI9、10）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010500-re-me-hu-pave-treatment.jpeg\" alt=\"re-me-hu-pave-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-HU 障礙",
    "answer": "\u003Cp\u003Ere-me-hu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E孟肱關節疼痛。患者告知難以將手移到褲子後的口袋或伸手到後面扣緊胸罩。評估肩胛下肌病變的 Lift-off 測試可能呈陽性。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010537-re-me-hu-cp.jpeg\" alt=\"re-me-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E治療師將患者的手臂抬高至末端範圍，以拉緊與胸大肌、大圓肌（内旋動作）、三角肌與肩胛骨（内向動作）相連的後側腋窩筋膜和肱三頭肌長頭（後向動作）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010542-re-me-hu-move-p.jpeg\" alt=\"re-me-hu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-hu 融合中心 （CF）主動動作驗證。\u003Cbr /\u003E患者站姿。治療師要求患者將手放在背後，觀察活動是否受到限制。伸向背部時，患側手比健側手的活動度低。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010547-re-me-hu-move-a.jpeg\" alt=\"re-me-hu-move-a\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-CU 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E尺神經溝近端抵於肱三頭肌肌腱；\u003C/li\u003E\u003Cli\u003E內側課和鷹嘴之間的凹陷\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ETE11，清冷淵穴\u003C/li\u003E\u003Cli\u003ESI8，小海穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E尺神經綜合征，內側森、手腕、小指感覺異常\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內-肘cf點位於肱三頭肌肌腱的內側，在內上髁和鷹嘴之間。在這里，它控制附著於內側肌間隔的內收肌，以及肱三頭肌的伸展部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090427-Re-me-cu.jpeg\" alt=\"Re-me-cu\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-cu CF 位於尺側伸腕肌和伸指肌之間的溝中，緊靠肘肌的遠端。\u003C/li\u003E\u003Cli\u003E來自 re-la-di 和 re-la-ca 的 CF 的遠近端牽引力\u003C/li\u003E\u003Cli\u003Ere-me-cu CF 位於鷹嘴和内上髁之間的尺骨溝中\u003C/li\u003E\u003Cli\u003E遠近側牽引力來自re-me-ca CF\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010503-re-me-cu-location.jpeg\" alt=\"re-me-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥，上肢微外展內旋，掌心朝上。治療師透過觸診驗證確定緻密點後，使用食指的指關節沿鷹嘴突和内上髁之間的溝操作尺神經鞘（針灸穴位 SI 8）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010509-re-me-cu-pave-treatment.jpeg\" alt=\"re-me-cu-pave-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-CU 障礙",
    "answer": "\u003Cp\u003Ere-me-cu 融合中心 （CF）的功能障礙。\u003Cbr /\u003E手臂運動受損，前臂尺側感覺異常。上肢震顫、痙攣和抽搐。內側上髁疼痛。由於内側肌間隔過度牽拉，造成尺神經半脫位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010543-re-me-cu-cp.jpeg\" alt=\"re-me-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E為了拉伸內側肘筋膜或後內向對角線，透過將患者的手腕向同側肩部移動來進行被動動作驗證。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010550-re-me-cu-move-p.jpeg\" alt=\"re-me-cu-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-cu 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E主動動作驗證是伸肘進行。患者被要求逆著治療師施力方向在內側移動時向内旋轉他們的手。如果測試是雙側同時進行的，則還可評估兩個肢體之間的力量差異。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010557-re-me-cu-move-a.jpeg\" alt=\"re-me-cu-move-a\" /\u003E\u003C/p\u003E"

    "question": "RE-ME-CA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E伸肌肌腱近端\u003C/li\u003E\u003Cli\u003E尺側腕伸肌肌肌腱內側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ETE7，會宗穴\u003C/li\u003E\u003Cli\u003ESI6，養老穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E伸肌肌腱勞損，手腕和尺骨區肌腱疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內一腕cf點位於指伸肌肌腱上，伸肌支持帶的近端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090432-Re-me-ca.jpeg\" alt=\"Re-me-ca\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ca 1, 2 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-la-ca 1 CF 位於肱橈肌肌腱和橈側伸腕肌之間\u003C/li\u003E\u003Cli\u003Ere-la-ca 2 CF 位於伸指肌和外展拇長肌的肌腱通道\u003C/li\u003E\u003Cli\u003Ere-me-ca 1 CF 位於尺側伸腕肌和尺骨間溝中\u003C/li\u003E\u003Cli\u003Ere-me-ca 2 CF 位於尺骨莖突和伸肌支持帶上緣之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010538-re-me-ca-location.jpeg\" alt=\"re-me-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ca 1 融合中心 （CF）的觸診驗證與治療\u003Cbr /\u003E患者俯臥。治療師在尺骨和尺側伸腕肌之間的溝上延伸的筋膜上進行觸診驗證和治療，在尺骨莖突的方向上（針灸穴位 TE 7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010526-re-me-ca1-pave-treatment.jpeg\" alt=\"re-me-ca1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ca 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥。治療師用食指的指關節操作在尺側伸腕肌腱和尺骨之間延伸的筋膜，比 re-me-ca 1（針灸穴位 SI6）更遠端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010543-re-me-ca2-pave-treatment.jpeg\" alt=\"re-me-ca2-pave-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-CA 障礙",
    "answer": "\u003Cp\u003Ere- me-ca 融合中心（CF）的功能障礙。\u003Cbr /\u003E手和手腕的緊繃和疼痛。上肢精細運動感覺受損。手和前臂肌肉的痙攣和不自主收縮。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010516-re-me-ca-cp.jpeg\" alt=\"re-me-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-ca 融合中心 （CF）的動作驗證。\u003Cbr /\u003E和 re-me-di CF 的動作驗證相同。如果腕部的 CF 變緻密，則患者會在手腕的尺骨區域感到緊繃或疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010521-re-me-ca-move.jpeg\" alt=\"re-me-ca-move\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-ME-DI 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腕模紋背側遠端，指伸肌肌腱和小指伸肌肌腱之間\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ESI3，後溪穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E仲肌肌腱損傷，尺骨莖突遠端疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後-內一指cf點位於腕骨，在指伸肌與小指伸肌的肌腱之間。在這里它控制這些肌腱的伸展軌跡，以及由尺側腕屈肌和尺側腕伸肌驅動的尺偏部分。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090437-Re-me-di.jpeg\" alt=\"Re-me-di\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-di 和 re-la-di 的 CF 解剖位置。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E向近端方向牽引 re-la-di CF\u003C/li\u003E\u003Cli\u003Ere-la-di 1 CF 位於伸肌支持帶的下部靠近橈骨側，在伸肌腱和外展拇肌腱上。\u003C/li\u003E\u003Cli\u003Ere-la-di 2 CF 位於靠近第2 指掌關節\u003C/li\u003E\u003Cli\u003Ere-me-di 1 CF 位於腕骨之間，在伸肌支持帶的尺骨部份\u003C/li\u003E\u003Cli\u003Ere-me-di 2 CF 位於第4和第5指之間的指間聯合處\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010508-re-me-di-location.jpeg\" alt=\"re-me-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-di 1融合中心 （CF）的觸診驗證。\u003Cbr /\u003E患者俯臥或坐位，手掌朝下。治療師使用食指的指關節觸診位於莖突遠端的筋膜，並與伸小指肌（針灸穴位 SI 5）相關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010557-re-me-di1-pave-treatment.jpeg\" alt=\"re-me-di1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-me-di 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者俯臥，手掌朝下。治療師檢查第4和第5指之間的指間聯合，一旦確定緻密點，\u003Cbr /\u003E就用食指的指關節進行操作（針灸穴位 TE 3) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520010514-re-me-di2-pave-treatment.jpeg\" alt=\"re-me-di2-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "來自肺部的轉移痛治療",
    "answer": "\u003Cul\u003E\u003Cli\u003E資料：患者主訴斜方肌和胸部的一側或兩側疼痛。\u003C/li\u003E\u003Cli\u003E假說：如果哮喘、咳嗽或先前的肺炎、胸膜炎等與這種疼痛有關，那麼治療師可能會假設與內臟一胸部器官筋膜單元有關。\u003C/li\u003E\u003Cli\u003E觸診驗證：觸診 an-me-th 1、2、an-la-th 1 - 2 CF 和 ir-sc ; re-me-th 1 、 re-la-th和左右兩邊的 er-SC。\u003C/li\u003E\u003Cli\u003E治療：治療師操作在最緻密化的融合中心（CF），直到患者不再感到任何疼痛。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260524110534-%E4%BE%86%E8%87%AA%E8%82%BA%E9%83%A8%E7%9A%84%E8%BD%89%E7%A7%BB%E7%97%9B%E6%B2%BB%E7%99%82.jpeg\" alt=\"來自肺部的轉移痛治療\" /\u003E\u003C/p\u003E"

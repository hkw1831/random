<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC CF 點位隨機抽題卡</title>
    <style>
        :root{--primary:#4361ee;--primary-light:#4895ef;--secondary:#3f37c9;--bg:#f0f4ff;--card:#ffffff;--text:#212529;--err:#d00000;--warn:#e67700;--info:#1971c2;--mast:#5c3db8;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.7;color:var(--text);background:var(--bg);padding:0.5rem 0;}
        .container{max-width:100%;width:100%;padding:0;}
        h1{font-size:1.8rem;font-weight:700;color:var(--primary);text-align:center;margin:0.5rem 0;}
        /* ── Stats ── */
        .stats{display:flex;gap:0.2rem;margin:0.5rem 0;flex-wrap:nowrap;}
        .stat-item{background:var(--card);border-radius:8px;padding:0.4rem 0.15rem;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center;flex:1;}
        .stat-label{font-size:0.7rem;color:#6c757d;}
        .stat-value{font-size:1.25rem;font-weight:700;color:var(--primary);}
        .sv-new{color:var(--info);} .sv-due{color:var(--warn);} .sv-mast{color:var(--mast);}
        /* ── Progress bar ── */
        .prog-wrap{height:5px;background:#dee2e6;border-radius:3px;margin:0.3rem 0;overflow:hidden;}
        .prog-bar{height:100%;background:linear-gradient(90deg,var(--primary),#7048e8);border-radius:3px;transition:width .5s ease;width:0%;}
        /* ── Buttons ── */
        .btn{background:var(--primary);color:#fff;border:none;padding:0.6rem 0.9rem;border-radius:6px;cursor:pointer;font-size:0.95rem;font-weight:500;transition:background .2s,transform .15s;}
        .btn:hover{background:var(--secondary);transform:translateY(-1px);}
        .btn:active{transform:translateY(0);}
        .btn-err{background:var(--err);}.btn-err:hover{background:#b00000;}
        .btn-sec{background:#6c757d;}.btn-sec:hover{background:#5a6268;}
        .btn-sm{padding:0.35rem 0.6rem;font-size:0.82rem;}
        /* ── Mode toggle ── */
        .mode-row{display:flex;gap:0.35rem;margin:0.5rem 0;}
        .mode-btn{flex:1;padding:0.55rem 0.5rem;border-radius:6px;border:2px solid transparent;background:#e9ecef;color:#495057;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
        .mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(67,97,238,.35);}
        .mode-btn:not(.active):hover{background:#dee2e6;}
        /* ── Controls ── */
        .controls{display:flex;gap:0.2rem;margin:0.5rem 0;flex-wrap:wrap;}
        /* ── Filter ── */
        .filter-row{display:flex;gap:0.35rem;margin:0.5rem 0;align-items:stretch;}
        .filter-row .btn{flex-shrink:0;white-space:nowrap;}
        .filter-input{flex:1;min-width:0;padding:0.55rem 0.75rem;border-radius:6px;border:1px solid rgba(67,97,238,.35);font-size:0.93rem;font-family:Menlo,Monaco,Consolas,monospace;background:#fff;color:var(--text);}
        .filter-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(67,97,238,.18);}
        .filter-input::placeholder{font-family:"Noto Sans TC",-apple-system,sans-serif;color:#aaa;}
        /* ── Question box ── */
        .question-box{background:var(--card);border-radius:10px;padding:0.85rem 0.25rem;margin:0.5rem 0;box-shadow:0 2px 8px rgba(0,0,0,.07);}
        .question{font-size:1.35rem;font-weight:600;color:var(--primary);margin-bottom:0.6rem;}
        .question img,.answer-content img,.question-text img,.question-answer img{max-width:100%;height:auto;display:block;margin:0.5rem 0;border-radius:6px;}
        /* ── SRS info strip ── */
        .srs-info{display:none;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.55rem;}
        .srs-badge{display:inline-flex;align-items:center;gap:0.2rem;font-size:0.73rem;padding:2px 9px;border-radius:10px;font-weight:700;letter-spacing:.3px;}
        .st-new{background:rgba(25,113,194,.12);color:var(--info);}
        .st-due{background:rgba(230,119,0,.13);color:var(--warn);}
        .st-upcoming{background:rgba(56,176,0,.12);color:#2b8a00;}
        .st-mastered{background:rgba(92,61,184,.12);color:var(--mast);}
        .srs-meta{font-size:0.71rem;color:#868e96;}
        /* ── Show-answer button ── */
        .show-ans-wrap{text-align:center;margin:0.5rem 0;}
        .answer-content{display:none;background:rgba(67,97,238,.08);border-left:4px solid var(--primary);padding:0.6rem 0.5rem;border-radius:0 8px 8px 0;margin-top:0.6rem;}
        .answer-content.show{display:block;}
        .answer-content ul,.answer-content ol{padding-left:1.4rem;}
        .answer-content li{margin-bottom:0.4rem;}
        .answer-content p{margin-bottom:0.5rem;}
        .answer-content p:last-child{margin-bottom:0;}
        /* ── Rating buttons ── */
        .rating-wrap{display:none;margin-top:0.8rem;}
        .rating-wrap.show{display:block;}
        .rating-label{font-size:0.75rem;color:#868e96;text-align:center;margin-bottom:0.5rem;line-height:1.5;}
        .rating-label strong{color:#495057;}
        .rating-row{display:flex;gap:0.3rem;}
        .r-btn{flex:1;min-width:0;padding:0.6rem 0.15rem;border:none;border-radius:9px;cursor:pointer;color:#fff;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:0 2px 8px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s,filter .15s;}
        .r-btn:hover{transform:translateY(-3px);box-shadow:0 5px 14px rgba(0,0,0,.22);}
        .r-btn:active{transform:translateY(0);filter:brightness(.88);}
        .r-again{background:linear-gradient(150deg,#e03131,#c92a2a);}
        .r-hard{background:linear-gradient(150deg,#e67700,#d9480f);}
        .r-good{background:linear-gradient(150deg,#2f9e44,#2b8a3e);}
        .r-easy{background:linear-gradient(150deg,#1971c2,#1864ab);}
        .r-icon{font-size:1.15rem;}
        .r-text{font-size:0.88rem;}
        .r-hint{font-size:0.67rem;font-weight:600;opacity:.92;background:rgba(255,255,255,.2);padding:1px 6px;border-radius:4px;white-space:nowrap;letter-spacing:.2px;}
        /* ── Modals ── */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:flex-start;padding:1rem 0;overflow-y:auto;}
        .modal.open{display:flex;}
        .modal-content{background:var(--card);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.2);padding:1rem 0.4rem;max-width:100%;width:100%;}
        .modal-title{font-size:1.3rem;font-weight:700;color:var(--primary);text-align:center;margin-bottom:0.6rem;}
        .modal-buttons{display:flex;justify-content:center;gap:0.75rem;margin-top:1rem;flex-wrap:wrap;}
        .q-count{font-weight:700;margin-bottom:0.6rem;text-align:center;}
        .q-count.cd{color:var(--warn);} .q-count.cm{color:var(--mast);}
        .question-list{display:flex;flex-direction:column;gap:0.5rem;}
        .question-item{background:rgba(67,97,238,.05);border-left:4px solid var(--primary);padding:0.6rem 0.4rem;border-radius:0 8px 8px 0;font-size:0.93rem;}
        .question-item.is-mast{border-color:var(--mast);background:rgba(92,61,184,.05);}
        .question-header{display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;flex-wrap:wrap;}
        .question-text{flex:1;font-weight:500;}
        .srs-mini{font-size:0.69rem;color:#868e96;margin-top:3px;}
        .question-answer{display:none;margin-top:0.6rem;padding:0.6rem 0.4rem;background:rgba(255,255,255,.9);border-radius:5px;border:1px solid rgba(67,97,238,.2);}
        .question-answer.show{display:block;}
        .question-answer ul,.question-answer ol{margin:0;padding-left:1.4rem;}
        .question-answer li{margin-bottom:0.4rem;}
        .question-answer p{margin-bottom:0.5rem;}
        .question-answer p:last-child{margin-bottom:0;}
        /* ── Typography ── */
        h4{font-size:1.0rem;font-weight:700;color:var(--secondary);margin:0.85rem 0 0.3rem;padding-bottom:0.18rem;border-bottom:1px solid rgba(67,97,238,.2);}
        h5{font-size:0.95rem;font-weight:700;color:var(--primary);margin:0.65rem 0 0.25rem;}
        h6{font-size:0.88rem;font-weight:600;color:#555;margin:0.5rem 0 0.2rem;}
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0.65rem 0;border-radius:6px;}
        table{width:100%;border-collapse:collapse;font-size:0.88rem;min-width:260px;}
        thead tr{background:rgba(67,97,238,.13);}
        th{padding:0.45rem 0.6rem;text-align:left;font-weight:700;color:var(--primary);border:1px solid rgba(67,97,238,.25);white-space:nowrap;}
        td{padding:0.42rem 0.6rem;border:1px solid rgba(67,97,238,.15);vertical-align:top;}
        tr:nth-child(even) td{background:rgba(67,97,238,.04);}
        pre{background:#f4f6ff;border-radius:6px;padding:0.7rem 0.85rem;overflow-x:auto;margin:0.55rem 0;border:1px solid rgba(67,97,238,.14);font-size:0.85rem;}
        code{font-family:Menlo,Monaco,Consolas,monospace;font-size:0.87em;background:rgba(67,97,238,.09);padding:1px 5px;border-radius:3px;}
        pre code{background:transparent;padding:0;font-size:inherit;}
        blockquote{border-left:3px solid var(--primary-light);margin:0.55rem 0;padding:0.45rem 0.85rem;background:rgba(67,97,238,.05);border-radius:0 6px 6px 0;color:#444;}
        blockquote p{margin:0;}
        @media(max-width:600px){h1{font-size:1.3rem;}.stat-label{font-size:0.62rem;}.stat-value{font-size:1rem;}.stat-item{padding:0.3rem 0.1rem;}.question{font-size:1.05rem;}.btn{padding:0.5rem 0.55rem;font-size:0.82rem;}.controls{flex-wrap:nowrap;overflow-x:auto;}.controls .btn{flex:1;white-space:nowrap;}.r-icon{font-size:.95rem;}.r-text{font-size:.75rem;}.r-hint{font-size:.6rem;}th,td{padding:0.35rem 0.4rem;font-size:0.82rem;}}
    </style>
</head>
<body>
<div class="container">
    <h1>CC CF 點位隨機抽題卡</h1>
    <div class="stats">
        <div class="stat-item"><div class="stat-label">總題數</div><div id="totalCount" class="stat-value">0</div></div>
        <div class="stat-item"><div class="stat-label">新卡片</div><div id="newCount" class="stat-value sv-new">0</div></div>
        <div class="stat-item"><div class="stat-label">今日到期</div><div id="dueCount" class="stat-value sv-due">0</div></div>
        <div class="stat-item"><div class="stat-label">已掌握</div><div id="mastCount" class="stat-value sv-mast">0</div></div>
    </div>
    <div class="prog-wrap"><div id="progBar" class="prog-bar"></div></div>
    <div class="filter-row">
        <input type="text" id="filterInput" class="filter-input" placeholder="Regex 篩選題目（例如 ^什麼 | keyword）…">
        <button id="filterBtn" class="btn">篩選</button>
        <button id="clearFilterBtn" class="btn btn-sec">清除篩選</button>
    </div>
    <div class="mode-row">
        <button id="modeRndBtn" class="mode-btn active">🎲 隨機練習</button>
        <button id="modeSrsBtn" class="mode-btn">📅 間隔複習（SM-2）</button>
    </div>
    <div class="controls">
        <button id="drawBtn" class="btn">隨機抽題</button>
        <button id="resetBtn" class="btn">重設進度</button>
        <button id="showDueBtn" class="btn btn-sec">查看到期題目</button>
        <button id="showMastBtn" class="btn btn-sec">查看已掌握</button>
    </div>
    <div class="question-box">
        <div id="srsInfo" class="srs-info"></div>
        <div id="question" class="question">🎲 隨機練習模式：從所有題目中隨機抽取，按下「隨機抽題」開始。</div>
        <div id="showAnsWrap" class="show-ans-wrap" style="display:none">
            <button id="showAnsBtn" class="btn">顯示答案</button>
        </div>
        <div id="answerContent" class="answer-content"></div>
        <div id="ratingWrap" class="rating-wrap">
            <div class="rating-label"><strong>評估此題難度</strong> -- 系統將依 SM-2 間隔重複算法安排下次複習時間</div>
            <div class="rating-row">
                <button class="r-btn r-again" data-q="1"><span class="r-icon">🔴</span><span class="r-text">再學</span><span class="r-hint" id="hint-1">重學</span></button>
                <button class="r-btn r-hard"  data-q="3"><span class="r-icon">🟠</span><span class="r-text">困難</span><span class="r-hint" id="hint-3">--</span></button>
                <button class="r-btn r-good"  data-q="4"><span class="r-icon">🟢</span><span class="r-text">良好</span><span class="r-hint" id="hint-4">--</span></button>
                <button class="r-btn r-easy"  data-q="5"><span class="r-icon">⭐</span><span class="r-text">容易</span><span class="r-hint" id="hint-5">--</span></button>
            </div>
        </div>
    </div>
</div>

<div id="resetModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">確定要重設？</div>
        <p style="text-align:center;margin-bottom:.5rem">這將清除所有 SM-2 學習進度（間隔、複習次數、難度係數），此操作<strong>無法撤銷</strong>。</p>
        <div class="modal-buttons"><button id="confirmResetBtn" class="btn btn-err">確定重設</button><button id="cancelResetBtn" class="btn">取消</button></div>
    </div>
</div>

<div id="dueModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">今日待學題目</div>
        <div id="dueCount2" class="q-count cd"></div>
        <div id="dueList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeDueBtn" class="btn">關閉</button></div>
    </div>
</div>

<div id="mastModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">已掌握題目</div>
        <div id="mastCount2" class="q-count cm"></div>
        <div id="mastList" class="question-list"></div>
        <div class="modal-buttons"><button id="closeMastBtn" class="btn">關閉</button></div>
    </div>
</div>

<script>
/* ── Data ─────────────────────────────────── */
var qaData=[
  {
    "question": "IR-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E眉尾，眼眶外，眼輪匝肌外上角\u003C/li\u003E\u003Cli\u003ETE23，絲竹空穴\u003C/li\u003E\u003Cli\u003E眼下斜肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的內旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的上斜肌，其ce 點位於眼眉的外側端\u003C/li\u003E\u003Cli\u003E2=嵌人顳下頷關節盤的翼外肌，其cc 點位於耳屏和下頜骨頭部之間\u003C/li\u003E\u003Cli\u003E3=翼內肌，其cc 點位於耳垂和下頜骨頸之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後兩個次級肌筋膜單元的連接要素是翼肌筋膜\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080455-Ir-cp1.jpeg\" alt=\"Ir-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E矢狀面和下方横截面中的眼球球狀筋膜 (Fasciae of the bulbus oculi) •\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-cp 1 的CC 連接到上斜肌的筋膜，通過它的肌腱，位於眼眶上部的滑車（向下旋轉眼睛）。\u003C/li\u003E\u003Cli\u003Ean-cp 1的CC 與下直肌筋膜相連。\u003C/li\u003E\u003Cli\u003Eme-cp 1 的CC 與内直肌和眼球筋膜的眼眶肌腱，即眼球囊膜〔Tenon（特農）氏膜〕相關。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060501-ir-cp1-location.jpeg\" alt=\"ir-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 1 協調中心（CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E在眉毛下方進行觸診驗證。患者的感受與治療師的感受之間必須達成一致（針灸穴位 Ex3）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060553-ir-cp1-pave.jpeg\" alt=\"ir-cp1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 1 協調中心（CC）的治療\u003C/p\u003E\u003Cp\u003E患者仰臥閉眼。用指尖在眼眶上緣的內部以及部分眼球上操作。施加非常輕的力量直到感覺到筋膜之間滑動減少。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060507-ir-cp1-treatment.jpeg\" alt=\"ir-cp1-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "IR-CP1 障礙",
    "answer": "\u003Cp\u003Eir-cp 1 肌筋膜單元的疼痛部位和感知中心（CP）\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E眼睛疼痛，視力模糊，由於淚液不足導致眼睛發紅。\u003C/li\u003E\u003Cli\u003E上斜肌的缺陷，在眼眶的上表面有一個滑車 (trochlea) 。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060536-ir-cp1-cp.jpeg\" alt=\"ir-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cp 1肌筋膜單元的疼痛動作 (PaMo) 。\u003C/p\u003E\u003Cp\u003E患者難以向下和橫向轉動眼睛。上斜肌或滑車斜肌使眼球後極 （posterior pole ofeyeball）向上和向内移動，從而允許眼球的下降和内旋。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060543-ir-cp1-pamo.jpeg\" alt=\"ir-cp1-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ER-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E眉毛中，外側1/3交界處上方，蝶額縫前側\u003C/li\u003E\u003Cli\u003EGB14，陽白穴\u003C/li\u003E\u003Cli\u003E眼上斜肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的外旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的下斜肌，其cc 點在眼眉中央\u003C/li\u003E\u003Cli\u003E2=耳上肌，其cc 點在耳輪上方\u003C/li\u003E\u003Cli\u003E3=耳後肌，其cC 點在起自項線與枕骨乳突部分的耳後肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E顳頂筋膜從眼眶延伸到顱項筋膜和枕部，是這3個次級肌筋膜單元的連接要素。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080412-Er-cp1.jpeg\" alt=\"Er-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E矢狀面和下方橫截面中的眼球球筋膜 (Fasciae of the bulbus oculi) •\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 1 的CC 位於提上眼臉肌 （levatorpalpebrae superioris）筋膜和上直肌。\u003C/li\u003E\u003Cli\u003Eer-cp 1 的CC 連接到下斜肌，使眼睛向一側旋轉。\u003C/li\u003E\u003Cli\u003Ela-cp 1 的CC，外直肌周圍的筋膜形成眶外肌腱，附著於外側眼眶。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060529-er-cp1-location.jpeg\" alt=\"er-cp1-location\" /\u003E\u003Cbr /\u003Eer-cp 1 協調中心（CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E在眼球（bulbus oculi） 和眼眶下緣之間的溝中進行觸診驗證。該CC 對應於針灸穴位 ST 1。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060512-er-cp1-pave.jpeg\" alt=\"er-cp1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 1 協調中心 （CC）的治療。\u003C/p\u003E\u003Cp\u003E患者仰臥。站在患者側邊，用指腹操作與下斜肌相連的 Tenon 筋膜。沿眼眶和眼球之間的整個溝施加輕微力道。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060536-er-cp1-treatment.jpeg\" alt=\"er-cp1-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E耳輪角前方，顳骨顴突上方\u003C/li\u003E\u003Cli\u003ETE21，耳門穴\u003C/li\u003E\u003Cli\u003E翼外肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的內旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的上斜肌，其ce 點位於眼眉的外側端\u003C/li\u003E\u003Cli\u003E2=嵌人顳下頷關節盤的翼外肌，其cc 點位於耳屏和下頜骨頭部之間\u003C/li\u003E\u003Cli\u003E3=翼內肌，其cc 點位於耳垂和下頜骨頸之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後兩個次級肌筋膜單元的連接要素是翼肌筋膜\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080424-Ir-cp2.jpeg\" alt=\"Ir-cp2\" /\u003E\u003Cbr /\u003E顱骨斜切面圖（從後到前）。註解：級別上頜骨的高度低於後顱骨水平。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cp 2的CC位於上領骨和顴骨之間，在提上唇肌 （levator labii superioris muscle）上方。\u003C/li\u003E\u003Cli\u003Eme-cp 2的CC 位於兩上領骨中間的鼻唇溝 （nasolabial sulcus）中。me-cp 2後側的 CC 位於兩塊額肌之間。\u003C/li\u003E\u003Cli\u003Eir-cp 2的CC 位於耳輪和耳屏（tragus）之間，在開口時形成的凹陷的上部。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060556-ir-cp2-locatoon.jpeg\" alt=\"ir-cp2-locatoon\" /\u003E\u003Cbr /\u003Eir-cp 2 協調中心（CC）的觸診驗證。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E在耳輪（helix）前方、下頷髁上方、往下的連線會到下頷角（針灸穴位 TE 21）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060550-ir-cp2-pave.jpeg\" alt=\"ir-cp2-pave\" /\u003E\u003Cbr /\u003Eir-cp 2 協調中心（CC）的治療。\u003C/p\u003E\u003Cp\u003E患者仰臥，頭部向側邊旋轉。治療師站在患者身後或側邊，手指作用在頭部筋膜內的小肌肉纖維。力道很輕，因為這個區域 的筋膜很容易被觸診到。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060513-ir-cp2-treatment.jpeg\" alt=\"ir-cp2-treatment\" /\u003E\u003C/p\u003E"
  },

    "question": "ER-CP2 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E耳朵正上方，顳肌上\u003C/li\u003E\u003Cli\u003EGB8，率谷穴\u003C/li\u003E\u003Cli\u003E耳上肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的外旋運動分為3個次級肌筋膜\u003Cbr /\u003E單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的下斜肌，其cc 點在眼眉中央\u003C/li\u003E\u003Cli\u003E2=耳上肌，其cc 點在耳輪上方\u003C/li\u003E\u003Cli\u003E3=耳後肌，其cC 點在起自項線與枕骨乳突部分的耳後肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E顳頂筋膜從眼眶延伸到顱項筋膜和枕部，是這3個次級肌筋膜單元的連接要素。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080431-Er-cp2.jpeg\" alt=\"Er-cp2\" /\u003E\u003Cbr /\u003E顱骨穿過上頜骨的斜切面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 2的CC 位於額肌上（CC高於其所在位置）。\u003C/li\u003E\u003Cli\u003Ela-cp 2的CC 位於顳肌上方，其筋膜與咬肌的筋膜連續（如圖所示）。\u003C/li\u003E\u003Cli\u003Eer-cp 2的CC位於耳上肌，在耳朶的外軟骨（耳廓）上方。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060547-er-cp2-location.jpeg\" alt=\"er-cp2-location\" /\u003E\u003Cbr /\u003Eer-cp 2 協調中心 （CC）的觸診驗證。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E直接在耳廓頂點上方，在耳上肌的小纖維之間進行觸診驗證（針灸穴位 GB 8、GB9 d) °\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060542-er-cp2-pave.jpeg\" alt=\"er-cp2-pave\" /\u003E\u003Cbr /\u003Eer-cp 2 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。站在患者的頭部後面或側面。\u003Cbr /\u003E使用指關節作用位於耳廓上方並包含在頭蓋骨内的肌肉纖維。\u003Cbr /\u003E應該施加一個剛好足以黏附在皮膚上的輕微力道。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060553-er-cp2-treatment.jpeg\" alt=\"er-cp2-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "IR-CP3 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E耳屏前下方，咬肌與耳朵之間\u003C/li\u003E\u003Cli\u003EGB2，聽會穴\u003C/li\u003E\u003Cli\u003E翼內肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的內旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的上斜肌，其ce 點位於眼眉的外側端\u003C/li\u003E\u003Cli\u003E2=嵌人顳下頷關節盤的翼外肌，其cc 點位於耳屏和下頜骨頭部之間\u003C/li\u003E\u003Cli\u003E3=翼內肌，其cc 點位於耳垂和下頜骨頸之間。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E後兩個次級肌筋膜單元的連接要素是翼肌筋膜\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080439-Ir-cp3.jpeg\" alt=\"Ir-cp3\" /\u003E\u003Cbr /\u003E下領骨和口咽水平的顱骨橫截\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cp 3的CC 位於下領骨下方，下領舌骨肌（mylohyoid）和二腹肌 （digastricmuscles） 的筋膜上。\u003C/li\u003E\u003Cli\u003Eir-cp 3的CC 位於下頜骨的後緣，咬肌筋膜在此處與翼內側筋膜相連。\u003C/li\u003E\u003Cli\u003Eme-cp 3 的CC 位於下領舌骨肌的中縫。me-cp 3後側的 CC 位於頸部頂韌帶（nuchal ligament）附著於枕骨哭突（occipitalprotuberance）下方。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060549-ir-cp3-location.jpeg\" alt=\"ir-cp3-location\" /\u003E\u003Cbr /\u003Eir-cp 3 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在耳垂前下頜後溝中進行。用指腹沿著下領骨的後緣搜索從咬肌 （masseter） 延伸到翼狀肌的筋膜緻密化（針灸穴位GB 2）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060544-ir-cp3-pave.jpeg\" alt=\"ir-cp3-pave\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Eir-cp 3 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，頭轉向一側。將指腹或指關節放在下頜骨頸部的後緣，並沿著骨頭的邊界治療筋膜。因為此處有神經和腮腺，操作力道必須很小（2）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060555-ir-cp3-treatment.jpeg\" alt=\"ir-cp3-treatment\" /\u003E\u003C/p\u003E"

    "question": "ER-CP3 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E乳突後方，胸鎖乳突肌在枕骨上止點\u003C/li\u003E\u003Cli\u003EGB12，完骨穴\u003C/li\u003E\u003Cli\u003E耳後肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的外旋運動分為3個次級肌筋膜單元：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的下斜肌，其cc 點在眼眉中央\u003C/li\u003E\u003Cli\u003E2=耳上肌，其cc 點在耳輪上方\u003C/li\u003E\u003Cli\u003E3=耳後肌，其cC 點在起自項線與枕骨乳突部分的耳後肌上。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E顳頂筋膜從眼眶延伸到顱項筋膜和枕部，是這3個次級肌筋膜單元的連接要素。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080446-Er-cp3.jpeg\" alt=\"Er-cp3\" /\u003E\u003C/p\u003E\u003Ch4\u003E頭部在下領骨和口咽水平的橫截面\u003Cbr /\u003E- la-cp 3 的CC 位於咬肌（masseter） 的肌腹上，其筋膜通過共同的懸帶與內側翼肌的筋膜相連。\u003Cbr /\u003E- er-cp 3的CC 位於枕骨上的胸鎖乳突肌和頭夾肌 （splenius capitis muscles） 的附著處。\u003Cbr /\u003E- re-cp 3的CC 位於斜方肌和頭半棘肌（semispinalis capitis） 的枕骨嵌入處，位於頭夾肌的深處。\u003C/h4\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060548-er-cp3-location.jpeg\" alt=\"er-cp3-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 3 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在胸鎖乳突肌附著的乳突切跡的水平進行觸診驗證（針灸穴位 GB 12）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060543-er-cp3-pave.jpeg\" alt=\"er-cp3-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-cp 3 協調中心（CC）的治療。\u003Cbr /\u003E患者坐著，頭靠在手上。站在患者身後，從同一側或相反側處理這個點。\u003Cbr /\u003E應施加適度的力道，沿小枕神經（lesser occipital nerve）的走向橫向操作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060501-er-cp3-treatment.jpeg\" alt=\"er-cp3-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E趾短伸肌上\u003C/li\u003E\u003Cli\u003EGB40，丘墟穴\u003C/li\u003E\u003Cli\u003E趾短伸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部的外旋運動（將前足向外移動）由單關節肌（趾短伸肌）和雙關節肌（腓背長肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在趾短伸肌上，外踝的遠端。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080412-Er-pe.jpeg\" alt=\"Er-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E足部在蹠骨 （metatarsals） 水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-pe 的 CC 位於外展小趾肌的筋膜上，然後與屈小趾肌相連，再接續到小腿三頭肌 （triceps surae） 的筋膜。\u003C/li\u003E\u003Cli\u003Eer-pe 的CC 位於更近端，在伸趾短肌的肌腹上；該肌肉的筋膜與足背側筋膜的中層（middle lamina ofthe dorsal fascia）相連。\u003C/li\u003E\u003Cli\u003Ela-pe 的CC 位於更遠側，在足背筋膜的深部，與足背骨間肌（dorsal\u003C/li\u003E\u003Cli\u003Einterossei muscles) 相連•\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070550-er-pe-location.jpeg\" alt=\"er-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-pe 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在伸趾短肌上進行觸診驗證，沿著從外踝延伸到最後兩個腳趾之間的線（針灸穴位 GB 40) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070545-er-pe-pave.jpeg\" alt=\"er-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-pe 協調中心 （CC）的治療。\u003Cbr /\u003E患者側臥或仰臥，腳板平放。\u003Cbr /\u003E治療師站在側邊，用指關節在伸趾短肌的肌腹上操作。即使這是一塊小肌肉，力道也應該適中，因為此筋膜的纖維化通常很難處理。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070556-er-pe-treatment.jpeg\" alt=\"er-pe-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E前臂近端1/3內，旋前圓肌上\u003C/li\u003E\u003Cli\u003EPC3，曲澤穴\u003C/li\u003E\u003Cli\u003E旋前圓肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的內旋運動（橈骨頭旋前）由單關節肌（旋前圓肌）和雙關節肌（橈側腕屈肌和掌長肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在旋前圓肌上，肘橫紋中點的下方。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080451-Ir-cu.jpeg\" alt=\"Ir-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E上臂在遠端 1/3的水平橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-cu 的CC 位於前臂筋膜；肱肌的外側纖維將此點更向外側移。\u003C/li\u003E\u003Cli\u003Eir-cu 的CC 位於更遠的位置，因為它與旋前圓肌的筋膜有關。\u003C/li\u003E\u003Cli\u003Eme-cu 的 CC 位於内側肌間隔上，而後者又與尺神經鞘結合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070554-ir-cu-location.jpeg\" alt=\"ir-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E在前臂近三分之一處，旋前圓肌 （pronator teres muscle）（紅色虚線）（針灸穴位 PC3） 上進行觸診驗證。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070544-ir-cu-pave.jpeg\" alt=\"ir-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eir-cu 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，手臂沿身體一側伸展。\u003Cbr /\u003E使用食指關節作為一個小鑿子，在橫向上向旋前圓肌筋膜的緻密處搓開。\u003Cbr /\u003E力道最初應該較輕，然後變得適中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518070501-ir-cu-treatment.jpeg\" alt=\"ir-cu-treatment\" /\u003E\u003C/p\u003E"

  {

    "answer": "\u003Cul\u003E\u003Cli\u003E第2-4骨間肌背側\u003C/li\u003E\u003Cli\u003ETE3，中渚穴\u003C/li\u003E\u003Cli\u003E蚓狀肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E指部（手指）的外旋運動由單關節肌（蚓狀肌）和雙關節肌（指伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在骨間背側肌上。背側筋膜協調精細的手指動作，同時手腕的筋膜協調手腕與手指的強力動作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080423-Er-di.jpeg\" alt=\"Er-di\" /\u003E\u003C/p\u003E\u003Cp\u003E手在掌骨水平的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-di 的 CC 位於外展小指肌上方；這塊肌肉的運動軌跡與伸小指肌的動作一致。\u003C/li\u003E\u003Cli\u003Eer-di 的 CC 位於手背筋膜上，準確地說是在圍繞著伸指肌腱的淺層隔膜上。\u003C/li\u003E\u003Cli\u003Ela-di 的CC 位於第一背側骨間肌上，其筋膜與覆蓋另一骨間肌的深隔膜相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080508-er-di-location.jpeg\" alt=\"er-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-di 協調中心 （CC）的觸診驗證。\u003C/p\u003E\u003Cp\u003E在手背尺骨與橈骨分隔處，朝向尺骨部分進行觸診驗證（紅色虛線將兩個部份分開）（針灸穴位 TE 3、TE 2d）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080503-er-di-pave.jpeg\" alt=\"er-di-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-di 協調中心 （CC）的治療。\u003C/p\u003E\u003Cp\u003E患者俯臥，手掌平放。用指關節治療第 3和第4與第4 和第5掌骨之間的背側筋膜。力道應該很輕，因為這個區域的筋膜很容易觸診。操作沿著骨間溝進行縱向治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080514-er-di-treatment.jpeg\" alt=\"er-di-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ER-DI 障礙",
    "answer": "\u003Cp\u003Eer-di 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛和僵硬，主要發生在第3 和第4指。\u003Cbr /\u003E指間有結節產生。伸指肌腱的肌腱病變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080553-er-di-cp.jpeg\" alt=\"er-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eer-di 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者主訴無法完全伸出小指。有時候是手指伸肌力量不足。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518080558-er-di-pamo.jpeg\" alt=\"er-di-pamo\" /\u003E\u003C/p\u003E"

  {
    "question": "LA-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E外眼角下緣，眼輪匝肌外側纖維上\u003C/li\u003E\u003Cli\u003EGB1，瞳子膠穴\u003C/li\u003E\u003Cli\u003E眼外直肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部的外向運動分為3個次級肌筋膜單元\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的外直肌，其cc 點在外眼角上；\u003C/li\u003E\u003Cli\u003E2=顳肌，其cc 點在此肌肉的中心；\u003C/li\u003E\u003Cli\u003E3=咬肌，其ce 點在該肌肉的中心。顳肌和咬肌的筋膜延伸到這兩塊肌肉上，在閉合下頜的動作中將兩塊肌肉的作用整合到一起。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080427-La-cp1.jpeg\" alt=\"La-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E牽拉來自向後的額肌和向前的眼輪匝肌或皺眉肌（re-cp 1-2）。\u003C/li\u003E\u003Cli\u003E牽拉來自向外的顳肌和向内的眼外直肌(la-cp 1-2) •\u003C/li\u003E\u003Cli\u003E帽狀腱膜的牽拉來自斜向的耳上肌和下斜肌以及眼輪匝肌的反向張力（er-cp 1-2）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060509-la-cp1-location.jpeg\" alt=\"la-cp1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp 1 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E通過觸診眼眶外側邊界，接近外側眼角，來觸診驗證此 CC 點（針灸穴位 GB1）。\u003Cbr /\u003E透過觸診兩邊來驗證，因為有可能是對側直肌的筋膜緻密化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060504-la-cp1-pave.jpeg\" alt=\"la-cp1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp 1 協調中心（CC）的治療。\u003Cbr /\u003E病人仰臥。站在患者頭側或者是側邊並目以外向（如箭頭所示）的方向輕輕摩擦。\u003Cbr /\u003E施壓在這個點上的力道應該非常輕（1）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060514-la-cp1-treatment.jpeg\" alt=\"la-cp1-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CP1 障礙",
    "answer": "\u003Cp\u003Ela-cp 1 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E來源不明的眼睛疼痛。側視時眼睛不協 調。溢淚症、復發性結膜炎。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060554-la-cp1-cp.jpeg\" alt=\"la-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cp1肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E此肌筋膜單元的張力代償導致視力聚焦不佳，患者表示看單側的時候會有複視的症狀。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060559-la-cp1-pamo.jpeg\" alt=\"la-cp1-pamo\" /\u003E\u003C/p\u003E"

    "question": "ME-CP1 位置",

  },
  {

    "answer": "\u003Cp\u003Eme-cp 1 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E疼痛位於眼球内眼角上方，靠近眼眶内側緣。眼淚分泌過多（流淚）、眼睛發紅和視力模糊。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060506-me-cp1-cp.jpeg\" alt=\"me-cp1-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cp 1 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E由於眼内直肌的缺陷，患者主述向左或向右看時出現複視。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060510-me-cp1-pamo.jpeg\" alt=\"me-cp1-pamo\" /\u003E\u003C/p\u003E"
  },

  {
    "question": "ME-CP2 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E下巴下中點，下頜舌骨肌上\u003C/li\u003E\u003Cli\u003ECV23，廉泉穴\u003C/li\u003E\u003Cli\u003E下頜舌骨肌中縫\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411080446-Me-cp2.jpeg\" alt=\"Me-cp2\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E翼狀肌在頭側和尾側方向牽引耳前肌（ir-cp 2-3) °\u003C/li\u003E\u003Cli\u003E唇方肌（quadratus labii）向上牽引上唇，頸闊肌 （platysma） 則是向下牽引（an-cp2-3) 。\u003C/li\u003E\u003Cli\u003E口輪匝肌向上牽引唇內側纖維彈性板，頸闊肌内側纖維向下牽引（me-cp 2-3）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-me-cp2-location.jpeg\" alt=\"me-cp2-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cp 2協調中心（CC）的解診驗證。\u003Cbr /\u003E在内側唇裂或人中（針灸穴位 Du或GV26）的中心進行觸診驗證。此穴位的治療適應症多與内在或心因性功能障礙有關。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060526-me-cp2-pave-treatment.jpeg\" alt=\"me-cp2-pave-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cul\u003E\u003Cli\u003E骶骨和尾骨之間，中線上\u003C/li\u003E\u003Cli\u003EGV2，腰前穴\u003C/li\u003E\u003Cli\u003E尾椎韌帶\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這些力的 cc 點位於低骨與尾骨之間的恥尾肌筋膜的縫上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090427-Me-pv-r.jpeg\" alt=\"Me-pv-r\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cp\u003E内收大肌的起點從恥骨延伸到坐骨；這樣，髖部節段的内向運動在前面與白線相連，在後面與棘上韌帶相連（me-pv 前、後點與内向- 髖關節結合）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090536-me-pv-p-location.jpeg\" alt=\"me-pv-p-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-pv r 協調中心（CC）的觸診驗證和治療。\u003C/p\u003E\u003Cp\u003E患者俯臥。me-pvr 的CC 的觸診驗證和治療與自主神經支配相互作用；因此，與內向運動 CC 點一樣，最重要的是對內部功能障礙有用（針灸穴位 VG 3、VG2d）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090543-me-pv-p-pave-treatment.jpeg\" alt=\"me-pv-p-pave-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "LA-CX 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E闊筋膜張肌肌腹上，平大轉子\u003C/li\u003E\u003Cli\u003EST31，髀關穴\u003C/li\u003E\u003Cli\u003E闊筋膜張肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E談部或胯的外向運動（大腿外展）由單關節肌（臀小肌和臀中肌）和雙關節肌（闊筋膜張肌和臀大肌）的纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在闕筋膜張肌上\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090434-La-cx.jpeg\" alt=\"La-cx\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髂脛束的牽拉來自於近端的闊筋膜張肌和遠端的股四頭肌中的股外側肌（la-cx, la-ge) •\u003C/li\u003E\u003Cli\u003E後側闊筋膜的牽拉來自近端的臀大肌和遠端的膕旁肌 （re-cx, re-ge）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的臀中肌和遠端的股二頭肌短頭（er-cx, er-ge）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010516-la-cx-location.jpeg\" alt=\"la-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cx 協調中心（CC）的觸診驗證。\u003Cbr /\u003E使用指尖或指關節在大轉子前方的闊筋膜張肌的肌腹上進行觸診驗證。（針灸穴位 Ex)\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010511-la-cx-pave.jpeg\" alt=\"la-cx-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cx 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥在非患側，臀部略微彎曲。治療師站在患者面前，用肘部在觸診驗證過程中確定的點上施加摩擦。儘管闊筋膜張肌是一塊小肌肉，但壓力必須很大，因為這塊肌肉對於鬆動術而言特別頑強。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010521-la-cx-treatment.jpeg\" alt=\"la-cx-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CX 障礙",
    "answer": "\u003Cp\u003Ela-cx 肌筋膜單元的疼痛部位感知中心 （CP）。\u003Cbr /\u003E與闊筋膜張肌相關的痙攣、感覺異常和干擾、麻痛性股痛、髖部疼痛和下肢無力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010559-la-cx-cp.jpeg\" alt=\"la-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cx 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003Ela-cx 肌筋膜單元的張力代償患者會呈現軟腳無力，似乎無法支撐自己的體重。當髖關節外展疼痛時，會避免這種運動，導致關節運動範圍逐漸喪失。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010504-la-cx-pamo.jpeg\" alt=\"la-cx-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CX 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿內側近端1/3處，股薄肌上\u003C/li\u003E\u003Cli\u003ELR10，足五里穴\u003C/li\u003E\u003Cli\u003E內收肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E部的內向運動（大腿內收）由單關節肌（長收肌、短收肌和大收肌）和雙關節肌（股薄肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點位於股薄肌的前緣、近端1/3處\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090441-Me-cx.jpeg\" alt=\"Me-cx\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E通過内收肌的起點向近端方向牽引内收肌筋膜，並通過嵌入這些相同的肌肉（me-cx、me-ge） 向遠端方向牽引内收肌筋膜。\u003C/li\u003E\u003Cli\u003E骼腰肌對闊深筋膜（deep fascia lata）的近端牽引和股中間肌（an-cx, an-ge）的遠端牽引。\u003C/li\u003E\u003Cli\u003E恥骨肌對股骨内收肌膜（内收肌管上的筋膜）和肌間隔施加近端牽引力，而股内側肌施加遠端牽引力 （ir-cx，ir-ge）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090532-me-cx-location.jpeg\" alt=\"me-cx-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cx 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E尋找股薄肌筋膜腔室的緻密化進行觸診驗證。該點的觸診和治療也可以透過接近患者後側面來進行（針灸穴位 LV 10）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090527-me-cx-pave.jpeg\" alt=\"me-cx-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cx 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，患側靠床面。在 me-cx 的治療過程中，必須特別根據患者的感覺（例如針刺痛、牽涉痛）引導進行觸診驗證，因為該區域的脂肪組織很難清楚地感知緻密化。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090538-me-cx-treatment.jpeg\" alt=\"me-cx-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CX 障礙",
    "answer": "\u003Cp\u003Eme-cx 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於腹股溝和恥骨區域，當患者大腿内收時，或者更常見的是，由於髖關節外展時股薄肌的拉伸，疼痛會加劇。恥骨痛和髖部疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090518-me-cx-cp.jpeg\" alt=\"me-cx-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cx 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E當患者試圖將下肢内收時或突然牽拉內收肌群時，腹股溝和恥骨區的疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090522-me-cx-pamo.jpeg\" alt=\"me-cx-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-GE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿外側中間，髂脛束上\u003C/li\u003E\u003Cli\u003EGB31，風市穴\u003C/li\u003E\u003Cli\u003E闊筋膜張肌-髂脛束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E膝部或膝關節的外向運動（防止膝關節的外向脫位）由單關節肌（股二頭肌短頭）和雙關節肌（股二頭肌長頭和闊筋膜張肌的諮脛束，這些肌肉的肌腱止於腓骨和脛骨）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在髂脛束上，靠近股二頭肌短頭的起點處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090447-La-ge.jpeg\" alt=\"La-ge\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E髂脛束的牽拉來自於近端的闊筋膜張肌和遠端的伸趾長肌 （la-ge, la-ta）。\u003C/li\u003E\u003Cli\u003E外側小腿筋膜的牽拉來自於近端的股二頭肌和遠端的腓骨肌 （er-ge, er-ta）。\u003C/li\u003E\u003Cli\u003E膕筋膜的牽拉來自於近端的膕旁肌和來自尾端的腓腸肌 （re-ge, re-ta）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010517-la-ge-location.jpeg\" alt=\"la-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ge 協調中心（CC）的觸診驗證。\u003Cbr /\u003E為了與 la-cx 的協調中心進行比較，在患者側臥的情況下對 la-ge 的協調中心進行觸診驗證。\u003Cbr /\u003Ela-ge 的協調中心位於髂脛束上中段的大腿上（針灸穴位 GB 31）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010512-la-ge-pave.jpeg\" alt=\"la-ge-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ge 協調中心的治療 la-ge。\u003Cbr /\u003E患者側臥在非患側，臀部略微彎曲。治療師站在患者的後面或前面，對骼脛束施以操作。在相對於髂脛束的橫向方向上進行鬆動術。這對病人來說很痛苦；因此壓力應該適中（3），即使這可能會延長治療時間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010522-la-ge-treatment.jpeg\" alt=\"la-ge-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-GE 障礙",
    "answer": "\u003Cp\u003Ela-ge 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E髂脛束的腓骨附著處上有灼燒感、膝蓋外側疼痛、髕骨外側偏移。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010503-la-ge-cp.jpeg\" alt=\"la-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ge 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E這個肌筋膜單元的張力代償會導致膝蓋的橫向不穩定，膝蓋會無預警地軟腳。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010507-la-ge-pamo.jpeg\" alt=\"la-ge-pamo\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-GE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E大腿內側遠端1/3交界處，股薄肌上\u003C/li\u003E\u003Cli\u003ESP11，箕門穴\u003C/li\u003E\u003Cli\u003E股薄肌遠端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E膝部的內向運動（維持滕關節的內側穩定）由單關節肌（在腱性壓跡下的半腱肌遠端；此肌肉的肌腱止於脛骨的內側，穩定膝關節，防止內側脫位）和雙關節肌（股薄肌遠端，由來自同一肌肉近端的自身神經肌肉終板獨立支配）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在股薄肌和縫匠肌遠端之間。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090453-Me-ge.jpeg\" alt=\"Me-ge\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股薄肌對内側小腿筋膜進行近端牽引，比目魚肌（me-ge, me-ta） 進行遠端牽引。\u003C/li\u003E\u003Cli\u003E股内側肌和縫匠肌對小腿内側淺筋膜進行近端牽引，脛後肌和脛前肌（ir-ge, ir-ta）進行遠端牽引。\u003C/li\u003E\u003Cli\u003E由股四頭肌肌腱施加的前小腿筋膜的近端牽引，以及由伸趾肌（an-ge, an-ta） 施加的遠端牽引。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090516-me-ge-location.jpeg\" alt=\"me-ge-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ge 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證是在股薄肌前半部的溝中進行的。用食指的指關節尋找內收大肌筋膜中的點（針灸穴位 SP 11）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090509-me-ge-pave.jpeg\" alt=\"me-ge-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ge 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，患側腳靠床面。\u003Cbr /\u003E操作大腿遠端三分之一，對應於内收大肌膜。此穴位常用於小腿循環障礙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090521-me-ge-treatment.jpeg\" alt=\"me-ge-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-GE 障礙",
    "answer": "\u003Cp\u003Eme-ge 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於膝蓋內側。內側膝關節坍塌，就好像内側副韌帶不再能夠穩定膝關節一樣。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090500-me-ge-cp.jpeg\" alt=\"me-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ge 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E當患者試圖將其下肢內收時，或者由於缺乏肌肉張力的保護，膝蓋內側韌帶突然被拉伸時，膝蓋內側的疼痛會加劇。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090504-me-ge-pamo.jpeg\" alt=\"me-ge-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-TA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E小腿中段1/3內靠上，腓骨上或稍前\u003C/li\u003E\u003Cli\u003EST40，豐隆穴\u003C/li\u003E\u003Cli\u003E趾長伸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E踝部的外向運動（將踝關節向外移動，最重要的是防止踝關節向內扭傷）由單關節肌（第三排骨肌）和雙關節肌（趾長伸肌）的纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc點在趾長伸肌上，位於第三排骨肌起點處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090400-La-ta.jpeg\" alt=\"La-ta\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E足背筋膜的牽拉來自於近端的伸趾肌和遠端的背側骨間肌。（la-ta, la-pe）。\u003C/li\u003E\u003Cli\u003E支持帶的牽拉來自於近端的腓肌群和遠端的伸趾短肌（er-ta, er-di）。\u003C/li\u003E\u003Cli\u003E足部外側筋膜腔室的牽拉來自於近端的小腿三頭肌和遠端的外展小趾肌。（re-ta, re-pe) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010516-la-ta-location.jpeg\" alt=\"la-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ta 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在小腿的中段進行，在將伸趾長肌與腓骨肌肉分界的隔膜上。下肢半彎曲這個姿勢，允許治療師相對地觸診 la-ta、er-ta 和 re-ta（針灸穴位 ST 40）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010511-la-ta-pave.jpeg\" alt=\"la-ta-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ta 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，治療師站在病人的後面或前面，在病人感知疼痛起源的點上產生摩擦。\u003Cbr /\u003E小腿前部筋膜很容易觸及，因此適度的壓力（3）就足夠了。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010522-la-ta-treatment.jpeg\" alt=\"la-ta-treatment\" /\u003E\u003C/p\u003E"

    "question": "LA-TA 障礙",
    "answer": "\u003Cp\u003Ela-ta 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E伸趾肌腱病變，由於反覆出現的微創傷導致腳踝外側肌腱的肌腱病變、小腿麻木。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010501-la-ta-cp.jpeg\" alt=\"la-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ta 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者無法用腳外緣行走，因為僵硬的外側筋膜的牽拉會引起腳踝的劇烈刺痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010506-la-ta-pamo.jpeg\" alt=\"la-ta-pamo\" /\u003E\u003C/p\u003E"

    "question": "ME-TA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E小腿中段1/3，腓腸肌內側接近肌腱處\u003C/li\u003E\u003Cli\u003EKI9，築賓穴\u003C/li\u003E\u003Cli\u003E比目魚肌內側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E踝部的內向運動（向內移動踝關節）由單關節肌（脛骨後肌）和雙關節肌（小腿三頭肌、趾長屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在小腿三頭肌上，比目魚肌與腓腸肌內側頭匯合處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090406-Me-ta.jpeg\" alt=\"Me-ta\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E伸趾肌向近端方向而伸𧿹短肌（an-ta，an-pe） 向遠端方向牽引足背筋膜。\u003C/li\u003E\u003Cli\u003E兩條脛骨肌向近端方向，外展𧿹肌（ir-ta，ir-pe）向遠端方向牽引内側小腿筋膜。\u003C/li\u003E\u003Cli\u003E透過比目魚肌向近端方向，足底肌肉（me-ta, me-pe） 向遠端方向牽引足内側深筋膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090535-me-ta-location.jpeg\" alt=\"me-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ta 協調中心（CC）的觸診驗證。\u003Cbr /\u003E比CC 的觸診驗證是用食指的指關節，在小腿中段，内側腓腸肌與比目魚肌分界的空間中進行的（針灸穴位 KI9）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090530-me-ta-pave.jpeg\" alt=\"me-ta-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ta 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥。使用肘部進行操作，而為了更有效地校準壓力，治療師的另一隻手臂將身體的重量支撐在床上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090540-me-ta-treatment.jpeg\" alt=\"me-ta-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-TA 障礙",
    "answer": "\u003Cp\u003Eme-ta 肌筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於腳踝内側・小腿内側抽筋，屈𧿹長肌和屈趾長肌的肌腱病變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090521-me-ta-cp.jpeg\" alt=\"me-ta-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ta 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E此筋膜單元的張力代償會導致跟腱内側部分的著骨點病變。患者主述，當在腳後跟的内側縁承重時會感到劇烈疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519090525-me-ta-pamo.jpeg\" alt=\"me-ta-pamo\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-PE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E跟骨與足舟骨之間，拇長屈肌和脛骨後肌筋膜\u003C/li\u003E\u003Cli\u003EKI2，然谷穴\u003C/li\u003E\u003Cli\u003E拇短屈肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部（足）的內向運動（內收足的同時加深縱向和橫向兩個足弓）由單關節肌（足底骨間肌、足𧿹短屈肌、起自足底長韌帶的足𧿹收肌斜頭）和雙關節肌（趾長屈肌、足𧿹長屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的 cc 點在脛骨後肌位於足舟骨的止點上，足𧿹短屈肌起於該肌腱。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090433-Me-pe.jpeg\" alt=\"Me-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E股薄肌腱位於鵝足 （pes anserinus） 的深處。\u003C/li\u003E\u003Cli\u003E小腿深筋膜的深層在足部與深層肌肉層相連。\u003C/li\u003E\u003Cli\u003E足底骨間肌與深筋膜和屈趾長肌（me-pe）的肌腱相連。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100539-me-pe-location.jpeg\" alt=\"me-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-pe 協調中心 （CC） 的觸診驗證。\u003C/p\u003E\u003Cp\u003E觸診驗證直接在內踝下方（垂直線）和足底弓的起點（曲線）（針灸穴位 KI 2）探索這個 CC。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100529-me-pe-pave.jpeg\" alt=\"me-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-pe 協調中心（CC）的治療。\u003C/p\u003E\u003Cp\u003E患者側臥。將鷹嘴突放置在觸診驗證過程中發現緻密點上，然後橫向移動肘部進行治療。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519100547-me-pe-treatment.jpeg\" alt=\"me-pe-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "LA-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E胸鎖乳突肌和斜方肌之間，朝向斜角肌和頸基底部\u003C/li\u003E\u003Cli\u003ELI17，天鼎穴\u003C/li\u003E\u003Cli\u003E斜角肌外側\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的外向運動（肩胛帶上提一肱骨外展超過90°）由單關節肌（肩胛舌骨肌下腹）和雙關節肌（斜方肌上行纖維和胸鎖乳突肌鎖骨部）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在後斜角肌上，位於斜方肌與胸鎖乳突肌之間\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090443-La-sc.jpeg\" alt=\"La-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肩胛筋膜的牽拉來自於往頭側的斜方肌以及遠端方向的三角肌（la-sc, la-hu）。\u003C/li\u003E\u003Cli\u003E提肩胛肌向頭側方向牽拉，棘上肌、棘下肌和三角肌向遠側方向牽拉（er-sc, er-hu) •\u003C/li\u003E\u003Cli\u003E三角肌筋膜的牽拉來自於向内方向的斜方肌和菱形肌群，和來自遠端方向的三角肌嵌入肩胛骨的部分（re-sc, re-hu）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010540-la-sc-location.jpeg\" alt=\"la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-sc 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在斜方肌前方，後斜角肌的方向進行（針灸穴位 LI 16）。這個協調中心應該在患者坐著的情況下觸診，因為這個位置也允許與 re-sc 和 er-sc 的協調中心進行比較。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010534-la-sc-pave.jpeg\" alt=\"la-sc-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-sc 協調中心 （CC）的治療。\u003Cbr /\u003E患者坐著，治療師將肘部靠在斜方肌的前緣，也試圖涉及斜角肌的筋膜。初始壓力應該適中，以流動化斜方肌的筋膜，慢慢增加也達到斜角肌。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010545-la-sc-treatment.jpeg\" alt=\"la-sc-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第3肋間隙，胸大肌在肋骨上的止點\u003C/li\u003E\u003Cli\u003ESP21，大包穴\u003C/li\u003E\u003Cli\u003E前鋸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的內向運動（內收肩胛骨）由單關節肌（前鋸肌）和雙關節肌（背闊肌和胸大肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在腋窩纖維腱弓（卵圓孔）的內側部分。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090449-Me-sc.jpeg\" alt=\"Me-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鎖骨下肌向近端方向，而肩胛下肌 （ir-hu）向遠端方向牽引鎖骨腋筋膜 （ir-sc）。\u003C/li\u003E\u003Cli\u003E胸小肌 （an-sc）向近端方向，而肱二頭肌短頭（an-hu） 向遠端方向牽引胸筋膜。\u003C/li\u003E\u003Cli\u003E由闊背肌和前鋸肌（me-sc） 牽引内側腋窩筋膜，由上臂肌肉（me-hu）牽引外側腋筋膜。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120521-me-sc-location.jpeg\" alt=\"me-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-sc 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證直接在腋窩遠端、腋線（垂直線）前和胸大肌邊界後（曲線）尋找這個 CC（針灸穴位 GB 22）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120517-me-sc-pave.jpeg\" alt=\"me-sc-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-sc 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，手臂外展。操作已經透過觸診確定的點；治療師可以站立或坐著，可以在治療床的同側或對側工作。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120527-me-sc-treatment.jpeg\" alt=\"me-sc-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-SC 障礙",
    "answer": "\u003Cp\u003Eme-sc 肌筋膜單元的疼痛部位及感知中心 （CP）。\u003Cbr /\u003E疼痛位於肩膀；患者常被診斷為肩周炎。\u003Cbr /\u003E如果肩胛骨内收肌筋膜緻密，則影響肩胛骨和肱骨的同步外展。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120504-me-sc-cp.jpeg\" alt=\"me-sc-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-sc 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003Eme-sc CC 的緻密化在内收期間很少有症狀，而在肱骨外展期間經常引起肩峰下疼痛；這是由於肩胛骨缺乏同步和協調的抬高動作控制。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519120509-me-sc-pamo.jpeg\" alt=\"me-sc-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-HU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E平肱骨頭，三角肌中東上\u003C/li\u003E\u003Cli\u003ELI15，肩偶穴\u003C/li\u003E\u003Cli\u003E三角肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肱骨的外向運動（上臂外展至90°）由單關節肌（三角肌中部和岡上肌）和雙關節肌（肱二頭肌長頭）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的 cc 點在三角肌上、大結節的前部（岡上肌止點處）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090455-La-hi.jpeg\" alt=\"La-hi\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的三角肌和遠端的肱橈肌（la-hu, la-cu）。\u003C/li\u003E\u003Cli\u003E臂筋膜的牽拉來自於近端附著於肩胛棘上的三角肌和遠端的三頭肌 （re-hu, re-cu）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的斜向牽拉來自於外旋動作單元，包含上方的三角肌和下方肱橈肌和旋後肌 (er-hu, er-cu) •\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010551-la-hu-location.jpeg\" alt=\"la-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-hu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在肱骨頭水平高度，三角肌外側束上進行。患者可以側臥；然而，如果正在執行比較性觸診驗證，則患者應該站立（針灸穴位 LI 15）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010546-la-hu-pave.jpeg\" alt=\"la-hu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-hu 協調中心（CC）的治療。\u003Cbr /\u003E患者側臥，手臂放在身側。用肘部鬆動三角肌，因為在這個肌筋膜單元中，疼痛通常是非常慢性的。施加到肌肉本身的壓力可能很大，而在二頭肌長頭肌腱上操作時，壓力應該很小。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010557-la-hu-treatment.jpeg\" alt=\"la-hu-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-HU 障礙",
    "answer": "\u003Cp\u003Ela-hu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於三角肌的外側部分，有時它會向斜方肌或外上髁延伸。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010538-la-hu-cp.jpeg\" alt=\"la-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-hu 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者表示無法外展手臂，然而前屈和後伸都不痛。肩峰下夾擠通常是由於肩胛外側 和肱骨外側的肌筋膜單元之間缺乏同步。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010541-la-hu-pamo.jpeg\" alt=\"la-hu-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-HU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E上臂中上1/3交界處，內側肌間隔上\u003C/li\u003E\u003Cli\u003EHT1，極泉穴\u003C/li\u003E\u003Cli\u003E喙肱肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肱骨的內向運動（內收上臂）由單關節肌（喙肱肌肌）和雙關節肌（肱二頭肌短頭和肱三頭肌長頭）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在腋窩纖維腱弓（卵圓孔）的外側部分。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090403-Me-hu.jpeg\" alt=\"Me-hu\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前向- 肱部（an-hu）肌筋膜序列向近端方向，而前向-肘部（an-cu） 肌筋膜序列向遠端方向牽引筋膜。\u003C/li\u003E\u003Cli\u003E内向- 肱部（me-hu） 肌筋膜序列向近端方向，内向-肘部（me-cu）肌筋膜序列向遠端方向牽引内側肌間隔。\u003C/li\u003E\u003Cli\u003E肩胛下肌和喙肱肌（ir-hu）對内側肌間隔向内牽引，旋前圓肌（ir-cu）向遠端牽引。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010556-me-hu-location.jpeg\" alt=\"me-hu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-hu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證是在喙肱肌與內側肌間隔（垂直線）連續的部分上進行的。me-hu 的CC位於上臂近端三分之一和中間三分之一之間的交界處（曲線）（針灸穴位 HT 1）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010551-me-hu-pave.jpeg\" alt=\"me-hu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-hu 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥，手臂外展，高舉過頭。\u003Cbr /\u003E操作喙肱肌筋膜和內側肌間隔，直到緻密化消失。因為此 CC 位於神經血管束上方，施作壓力應當適中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010503-me-hu-treatment.jpeg\" alt=\"me-hu-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-HU 障礙",
    "answer": "\u003Cp\u003Eme-hu 筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於肩部的前側區域。診斷可以是撞擊（關節衝擊）、肩周炎、扭傷或拉傷後肌腱損傷或肌腱病變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010539-me-hu-cp.jpeg\" alt=\"me-hu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-hu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E該筋膜單元的張力代償，通常會在涉及用手抓握物體的動作期間，產生肱骨半脫位或肩部外側疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-me-hu-pamo.jpeg\" alt=\"me-hu-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E上臂遠端1/3內，外側肌間隔上，肱橈肌止點\u003C/li\u003E\u003Cli\u003ELI11，曲池穴\u003C/li\u003E\u003Cli\u003E肱橈肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的外向運動（外展手臂時固定或穩定肘關節）由單關節肌（肱橈肌）和雙關節肌（橈側腕長伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在肱橈肌上，於外上髁處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090408-La-cu.jpeg\" alt=\"La-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前臂筋膜的牽拉來自於近端的肱三頭肌和遠端的尺側伸腕肌（re-cu, re-ca）。\u003C/li\u003E\u003Cli\u003E外側肌間隔的牽拉來自於近端的三角肌和遠端的橈側伸腕長肌和肱橈肌（la-cu, la-ca) •\u003C/li\u003E\u003Cli\u003E骨間膜的牽拉來自於近端的旋後肌和遠端的伸拇長肌、外展拇長肌（er-cu, er-ca）。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010547-la-cu-location.jpeg\" alt=\"la-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cu 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證進行在上臂遠端三分之一，外側肌間隔（紅色虛線），肱橈肌附著處（針灸穴位 LI 12）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010543-la-cu-pave.jpeg\" alt=\"la-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cu 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，手臂放在治療床上。使用指關節在縱向和橫向方向上對外側肌間隔施加摩擦。應注意不要在橈神經上鬆動。為避免對神經造成任何損傷，壓力應輕或適中。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010552-la-cu-treatment.jpeg\" alt=\"la-cu-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CU 障礙",
    "answer": "\u003Cp\u003Ela-cu 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於外側肘部，有時延伸到肩部。在慢性病例中出現肘部屈曲或伸展的終端角度限制。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010535-la-cu-cp.jpeg\" alt=\"la-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-cu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E提重物（例如沉重的購物袋）時，上髁疼痛會加劇；當涉及 la-ca 的 協調中心時，手腕運動會加劇疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010538-la-cu-pamo.jpeg\" alt=\"la-cu-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CU 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E上臂遠端中下1/3交界處，內側肌間隔上\u003C/li\u003E\u003Cli\u003EHT2，清靈穴\u003C/li\u003E\u003Cli\u003E尺側腕屈肌近端\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肘部的內向運動（內收過程中穩定肘關節）由單關節肌（連接肱骨和尺骨的尺側腕屈肌）和雙關節肌（連接肱骨和腕骨的尺側腕屈肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在尺側腕屈肌起點的內側肌間隔上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090414-Me-cu.jpeg\" alt=\"Me-cu\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E肱二頭肌向近端方向，而橈側屈腕肌（an-cu, an-ca）向遠端方向施加牽引力。\u003C/li\u003E\u003Cli\u003E喙肱肌在近端方向，而尺側屈腕肌（me-cu, me-ca） 在遠端方向牽引隔膜。\u003C/li\u003E\u003Cli\u003E旋前圓肌向近端方向，旋前方肌（ir-cu,ir-ca）向遠端方向施加牽引力。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010550-me-cu-location.jpeg\" alt=\"me-cu-location\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cu 協調中心 （CC）的觸診驗證。\u003Cbr /\u003E觸診驗證 me-cu 在内側肌間隔（垂直線）上的 CC，恰好在上臂的中間三分之一和遠端三分之一之間的交界處（曲線）（針灸穴位 HT 2）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010545-me-cu-pave.jpeg\" alt=\"me-cu-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cu 協調中心 （CC）的治療。\u003Cbr /\u003E根據治療計劃和與其他 CC的關聯，患者可以是仰臥，也可以是俯臥。操作内側肌間隔，注意避免將尺神經壓在肱骨上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010556-me-cu-treatment.jpeg\" alt=\"me-cu-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "ME-CU 障礙",
    "answer": "\u003Cp\u003Eme-cu 筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E內側上髁炎或高爾夫球肘、尺神經支配區域感覺異常。尺神經半脫位。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010536-me-cu-cp.jpeg\" alt=\"me-cu-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-cu 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E當握拳或必須拉繩子時，患者報告同時出現内側和外側上髁疼痛・有時，當彎曲肘部時，第五指可能會感覺到類似電擊的感覺。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010540-me-cu-pamo.jpeg\" alt=\"me-cu-pamo\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "LA-CA 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E前臂近端1/3內，肱橈肌外側緣，橈側伸肌間溝內\u003C/li\u003E\u003Cli\u003ELI9，上廉穴\u003C/li\u003E\u003Cli\u003E橈側腕伸肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E腕部的外向運動（外展和後伸手腕）由單關節肌（附著於橈骨韌帶上的橈側腕伸肌）和雙關節肌（附著於肱骨的兩塊橈側腕伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點在兩個橈側腕伸肌肌腹上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090421-La-ca.jpeg\" alt=\"La-ca\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著肌筋膜序列進行協調中心的比較性觸診驗證。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E前臂筋膜的牽拉來自於近端的橈側伸腕肌和遠端的骨間肌 （la-ca, la-di）。\u003C/li\u003E\u003Cli\u003E前臂筋膜的牽拉沿著整段伸指肌群（er-ca，er-di) •\u003C/li\u003E\u003Cli\u003E筋膜上的牽拉來自於近端的尺側伸腕肌和遠端的外展小指肌。（re-ca, re-di）\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010544-la-ca-location.jpeg\" alt=\"la-ca-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ca 協調中心（CC）的觸診驗證。\u003Cbr /\u003E觸診驗證在前臂的近端三分之一處進行。\u003Cbr /\u003E更準確地說，在橈側伸腕長肌與短肌和肱橈肌之間的溝中，沿著從外上髁到橈骨莖突的連線上。（針灸穴位 LI 10p、L19、LI8 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010539-la-ca-pave.jpeg\" alt=\"la-ca-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-ca 協調中心（CC）的治療。\u003Cbr /\u003E患者俯臥，手臂外展，手舉過頭頂。根據肌肉的厚度，使用指關節或肘部來對抗筋膜的纖維化。用肘部施加的壓力很強，因為它牽扯更大的接觸面：而用指關節施加的壓力適中，因為穿透得更深。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010550-la-ca-treatment.jpeg\" alt=\"la-ca-treatment\" /\u003E\u003C/p\u003E"

  {
    "question": "ME-CA 障礙",
    "answer": "\u003Cp\u003Eme-ca 筋膜單元的疼痛部位及感知中心（CP）。\u003Cbr /\u003E疼痛位於尺側屈腕肌嵌入豌豆骨的位置（附著點病變）。\u003Cbr /\u003E疼痛可能會沿著尺側屈腕肌腱延伸（肌腱病變）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010505-me-ca-cp.jpeg\" alt=\"me-ca-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Eme-ca 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者不能用手腕做費力的運動，特別是使用尺側屈腕肌的動作時，例如拉繩子。\u003Cbr /\u003E想提醒讀者疼痛會抑制肌肉收縮。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010510-me-ca-pamo.jpeg\" alt=\"me-ca-pamo\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ela-di 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E疼痛位於第二指和中指的指骨處。當疼痛持續存在一段時間，這些指骨會發生關節炎變形。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010527-la-di-cp.jpeg\" alt=\"la-di-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ela-di 肌筋膜單元的疼痛動作\u003Cbr /\u003E患者表示無法張開手指，並且手感覺僵硬和笨拙。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519010531-la-di-pamo.jpeg\" alt=\"la-di-pamo\" /\u003E\u003C/p\u003E"

    "question": "RE-CP1 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E眉毛內側1/3，眼眶外，眶上孔之上\u003C/li\u003E\u003Cli\u003EBL2，攢竹穴\u003C/li\u003E\u003Cli\u003E眼上直肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E頭部（頭）的後向運動由3個次級肌筋膜單元組成：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E1=眼的上直肌，其cc 點位於眼眉的內側緣；\u003C/li\u003E\u003Cli\u003E2=額肌，其cc 點在額肌的中心；\u003C/li\u003E\u003Cli\u003E3=枕肌，其cc 點在枕肌與豎脊肌之間的部位。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E這3個部分由帽狀腱膜協調統一，其張力來自之前提到的肌肉。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070413-Re-cp1.jpeg\" alt=\"Re-cp1\" /\u003E\u003C/p\u003E\u003Cp\u003E沿著眼節段進行協調中心的比較\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-cp 1的CC 位於眉毛的内緣，單關節肌（上直肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003Cli\u003Ela-cp 1的CC 位於外眥上，單關節（外直肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003Cli\u003Eer-cp 1的CC位於眼球 （bulbus oculi）和眼眶下緣之間，單關節（下斜肌）和雙關節向量（眼輪匝肌）的交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100530-re-cp-1-location.jpeg\" alt=\"re-cp-1-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 1協調中心（CC）的觸診驗證。\u003Cbr /\u003Ere-cp 1 協調中心位於眉毛內側末端上方的凹陷處，內眥正上方（針灸穴位 BL 2）\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100524-re-cp-1-pave.jpeg\" alt=\"re-cp-1-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-cp 1協調中心（CC）的治療。患者仰臥。\u003Cbr /\u003E放置拇指或食指的指尖，由中指加強。根據使用的指尖，治療師可以站在床的側面或頂部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100536-re-cp-1-treatment.jpeg\" alt=\"re-cp-1-treatment\" /\u003E\u003C/p\u003E"

    "answer": "\u003Cp\u003Ean-ge 肌筋膜單元的疼痛部位和感知中心 （CP）。\u003Cbr /\u003E膝關節前部障礙：肌腱病變、滑囊炎、髕骨軟骨病變。骨折或關節手術後出現僵 硬、疼痛或關節受限。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090547-an-ge-cp.jpeg\" alt=\"an-ge-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-ge 肌筋膜單元的疼痛動作(PaMo) •\u003Cbr /\u003E患者反應在下樓梯或下山時疼痛，換句說，當他們在彎曲的膝蓋上負重時。疼痛表現在肌腱（CP）或膝關節内部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090551-an-ge-pamo.jpeg\" alt=\"an-ge-pamo\" /\u003E\u003C/p\u003E"

  {

    "answer": "\u003Cp\u003Ean-pe 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E第一腳趾（𧿹趾）的蹠趾關節和指間關節障礙。伸𧿹長肌和伸𧿹短肌腱病變。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090531-an-pe-cp.jpeg\" alt=\"an-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-pe 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E患者反應前足在背屈力量不足（無力），更常見的是大腳趾本身背屈無力。其他時候，患者會出現大腳趾關節活動受限和感覺異常。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090536-an-pe-pamo.jpeg\" alt=\"an-pe-pamo\" /\u003E\u003C/p\u003E"

  {
    "question": "RE-PE 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E第五跖骨基底部周圍\u003C/li\u003E\u003Cli\u003EBL64，京骨穴\u003C/li\u003E\u003Cli\u003E小趾展肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E足部（足）的後向運動（用足的外側部分蹬地----此筋膜間室與小腿三頭肌筋膜間室相連續）由單關節肌（小趾展肌、小趾短屈肌）和雙關節肌（起自短屈肌的起點，並止於第五跖骨基底的腓骨短肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些力的cc 點在小趾短屈肌和小趾展肌上。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070450-Re-pe.jpeg\" alt=\"Re-pe\" /\u003E\u003C/p\u003E\u003Cp\u003E外側腳節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eer-pe 位於十字伸肌支持帶下方，單關節（伸趾短肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ere-pe 位於腳的外側筋膜腔室，單關節（外展小趾肌）和雙關節（腓骨短肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-pe 位於第2、3、4蹠骨頭，其中單關節（背側骨間肌）和雙關節（伸趾長肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100551-re-pe-location.jpeg\" alt=\"re-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-pe 協調中心（CC）的觸診驗證。\u003Cbr /\u003E該協調中心的觸診驗證在第五蹠骨基底部的近端和遠端進行，在外展小趾肌的筋膜腔室上進行（針灸穴位 BL 64 p、BL 65、BL 66 d) •\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100546-re-pe-pave.jpeg\" alt=\"re-pe-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-pe 協調中心（CC）的治療。\u003Cbr /\u003E患者處於俯臥位，腳的内緣放置在床上。\u003Cbr /\u003E將指關節放在腳的外側腔室並鬆動最緻密的筋膜。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100558-re-pe-treatment.jpeg\" alt=\"re-pe-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "RE-PE 障礙",
    "answer": "\u003Cp\u003Ere-pe 肌筋膜單元的疼痛部位和感知中心（CP）。\u003Cbr /\u003E疼痛位於腳的外部邊界。在慢性病例中，第五腳趾出現老繭或變形。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100535-re-pe-cp.jpeg\" alt=\"re-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-pe 肌筋膜單元的疼痛動作 (PaMo) •\u003Cbr /\u003E如果患者的腳外側負重，患者會表示急性疼痛。在第五蹠骨骨折後，外展小趾肌經常會出現殘餘的鎭痛性收縮。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518100541-re-pe-pamo.jpeg\" alt=\"re-pe-pamo\" /\u003E\u003C/p\u003E"

    "question": "AN-SC 位置",
    "answer": "\u003Cul\u003E\u003Cli\u003E喙突下方，胸小肌肌腹上，三角肌與胸大肌之間\u003C/li\u003E\u003Cli\u003ELU1，中府穴\u003C/li\u003E\u003Cli\u003E胸小肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E肩胛骨的前向運動（將肩胛骨向前向下移動）由單關節肌（胸小肌）和雙關節肌（胸大肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的cc 點位於啄突下的胸小肌肌腹。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070402-An-sc.jpeg\" alt=\"An-sc\" /\u003E\u003C/p\u003E\u003Cp\u003E肩胛節段前部的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Eir-sc 的CC 位於鎖骨內側部分下方，單關節（鎖骨下肌）和雙關節向量（胸大肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Ean-sc 的 CC 位於胸小肌的肌腹上方，單關節（胸小肌）和雙關節向量（胸大肌）在此處匯合。\u003C/li\u003E\u003Cli\u003Eme-sc 的 CC 位於腋中線的前方，單關節（前鋸肌）和雙關節向量（胸大肌和闊背肌）在此處匯合。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090534-an-sc-location.jpeg\" alt=\"an-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-sc 協調中心（CC）的觸診驗證。\u003Cbr /\u003E將食指或中指的指尖置於喙突下方，在三角肌一胸大肌溝內側（紅色虛線），用來驗證胸小肌筋膜（針灸穴位 LU 1）的狀態。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090528-an-sc-pave.jpeg\" alt=\"an-sc-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-sc 協調中心（CC）的治療。\u003Cbr /\u003E患者仰臥。\u003Cbr /\u003E用指關節探索喙突下方的溝，尋找深筋膜中最緻密的點，並且也傳導疼痛。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518090541-an-sc-treatment.jpeg\" alt=\"an-sc-treatment\" /\u003E\u003C/p\u003E"
  },
  {
    "question": "AN-SC 障礙",

    "question": "RE-SC 位置",

    "question": "AN-HU 位置",

    "answer": "\u003Cul\u003E\u003Cli\u003E小魚際外側，第5掌骨中間\u003C/li\u003E\u003Cli\u003ESI4，腕骨穴\u003C/li\u003E\u003Cli\u003E小指展肌\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E手指的後向運動（伸指的同時尺偏）由單關節肌（小指展肌）和雙關節肌（小\u003Cbr /\u003E指伸肌）纖維完成。\u003C/p\u003E\u003Cp\u003E這些矢量力的ce 點在小指展肌上，位於第五掌骨基底，在這里尺側腕伸肌的腱性擴展部延伸到小魚際的隆起處。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411070402-Re-di.jpeg\" alt=\"Re-di\" /\u003E\u003C/p\u003E\u003Cp\u003E後側手節段進行協調中心的比較性觸診驗證\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ere-di 位於尺骨上的手掌筋膜，單關節（外展小指肌）和雙關節（伸小指肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Ela-di 位於骨間筋膜上，單關節（第一骨間肌）和雙關節（橈側伸腕肌）的向量交匯處。\u003C/li\u003E\u003Cli\u003Eer-di 位於第五指的肌腱附近，單關節（蚓狀肌）和雙關節（伸指長肌）的向量交匯處。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110503-re-di-location.jpeg\" alt=\"re-di-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-di 協調中心（CC）的觸診驗證。\u003Cbr /\u003E該協調中心的觸診驗證在外展小指肌、第五掌骨（針灸穴位 SI 14、SI3 d）的中段和近端指骨的基底部進行。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110559-re-di-pave.jpeg\" alt=\"re-di-pave\" /\u003E\u003C/p\u003E\u003Cp\u003Ere-di 協調中心 （CC）的治療。患者俯臥。\u003Cbr /\u003E牢牢握住患者的手指，同時用食指的指關節鬆動小魚際肌的外側邊界。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260518110509-re-di-treatment.jpeg\" alt=\"re-di-treatment\" /\u003E\u003C/p\u003E"

03E\u003Cp\u003Ean-la-cp 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用中指和食指的指尖進行觸診驗證，而使用指關節進行治療更容易。\u003Cbr /\u003E直接在顴弓上方進行操作（針灸穴位 GB 3) °\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060558-an-la-cp1-pave-treatment.jpeg\" alt=\"an-la-cp1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師將食指的指尖置於顴弓下緣下方，當患者張開和闔上嘴巴時，檢查下領髁（針灸穴位 ST 7）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060521-an-la-cp2-pave-treatment.jpeg\" alt=\"an-la-cp2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-cp 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。為了進行觸診驗證，治療師將食指的指尖放在咬肌的前緣。然後使用關節來操作該點，直到筋膜的基質完全軟化（針灸穴位 SI18）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260520060544-an-la-cp3-pave-treatment.jpeg\" alt=\"an-la-cp3-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-TA 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E腓骨前緣，第三腓骨肌起點\u003C/li\u003E\u003Cli\u003E上伸肌支持帶\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EGB37，光明穴\u003C/li\u003E\u003Cli\u003EGB38，陽輔穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E踝關節前側疼痛，可能往遠端放射\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前一外-踝cf點位於外踝的上方，在排骨之前，第三腓骨肌的起點\u003C/p\u003E\u003Cp\u003E此cf點對應針灸的光明、陽輔穴（GB 37、38）。它還對應 Maigne 法中激活下脛腓關節的點\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090432-An-la-ta.jpeg\" alt=\"An-la-ta\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ta 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E下肢遠端三分之一在踝骨上方的橫截面。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-ta 的 CF 位於淺層伸肌支持帶上\u003C/li\u003E\u003Cli\u003Ean-me-ta 的 CF 位於脛骨内側緣\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060557-an-la-ta-location.jpeg\" alt=\"an-la-ta-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ta 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或側臥。治療師觸診驗證在腓骨前方，從第三腓骨肌的起點開始（針灸穴位 GB 37）。用食指的指關節治療，但在治療慢性患者時可使用肘部。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060547-an-la-ta1-pave-treatment.jpeg\" alt=\"an-la-ta1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-ta 2 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥或側臥。治療師使用食指的指關節在腓骨遠端前部進行操作（針灸穴位GB 38) •\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060505-an-la-ta2-pave-treatment.jpeg\" alt=\"an-la-ta2-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-PE 位置",
    "answer": "\u003Cp\u003ECF點位置：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E外踝和趾伸肌肌腱之間；\u003C/li\u003E\u003Cli\u003E第4-5跖骨溝近端中點和遠端中點\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003EST41，解溪穴；\u003C/li\u003E\u003Cli\u003EGB41，足臨泣穴；\u003C/li\u003E\u003Cli\u003EGB42，地五會穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E踝關節扭傷，足部前外側疼痛\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-足cf點由3個點構成：\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E第一個在外踝與伸肌腱之間，\u003C/li\u003E\u003Cli\u003E第二個在第四跖骨基底，\u003C/li\u003E\u003Cli\u003E而第三個在第四跖骨頭水平。\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E此cf點對應針灸的解溪和沖陽穴（ST 41、42）及地五會穴（GB 42）（前往大敦穴的絡脈由此發出），還對應 Cyriax法中用於治療跗骨間韌帶損傷的部位®。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090437-An-la-pe.jpeg\" alt=\"An-la-pe\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 1 的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E足部在距骨、舟狀骨和骰骨的水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-pe 1的CF 位於伸肌支持帶的外側束\u003C/li\u003E\u003Cli\u003Ean-me-pe 的CF 位於伸肌支持帶的内側束\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060531-an-la-pe-location.jpeg\" alt=\"an-la-pe-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 2的CF 解剖位置以及和CC（協調中心）的相對關係。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-pe 1 CF 位於伸肌支持帶上，靠近外踝。\u003C/li\u003E\u003Cli\u003Ean-la-pe 2的CF 位於第4和第5蹠骨之間，靠近它們的基部。\u003C/li\u003E\u003Cli\u003Ean-la-pe 3的 CF 位於第4 和第5之間的蹠骨，靠近蹠骨頭部。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060548-an-la-pe-location2.jpeg\" alt=\"an-la-pe-location2\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean-la-pe 3的CF 解剖位置和腳的深背區筋膜。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-pe 1 的 CF\u003C/li\u003E\u003Cli\u003Ean-la-pe 2 的 CF\u003C/li\u003E\u003Cli\u003Ean-la-pe 3 的CF 位於第4 和第5蹠骨頭之間\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060509-an-la-pe-location3.jpeg\" alt=\"an-la-pe-location3\" /\u003E\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003Ean- la-pe 1 融合中心（CF）的治療。\u003Cbr /\u003E患者仰臥。治療師將指關節放在十字支持帶的上帶，對應於伸趾肌，並操作最緻密和最敏感的點（針灸穴位 ST 41、42）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060539-an-la-pe1-treatment.jpeg\" alt=\"an-la-pe1-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用指尖尋找第四和第五蹠骨底部之間的緻密點，且繼續操作直到疼痛消失（針灸穴位 GB 41）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060556-an-la-pe2-pave-treatment.jpeg\" alt=\"an-la-pe2-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 3 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師使用指尖或指節，操作在第四和第五腳趾的指關節根部，尋找疼痛與敏感的點（針灸穴位 GB 42・43）。\u003Cbr /\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060517-an-la-pe3-pave-treatment.jpeg\" alt=\"an-la-pe3-pave-treatment\" /\u003E\u003C/p\u003E"

    "question": "AN-LA-PE 障礙",
    "answer": "\u003Cp\u003Ean-la-pe 融合中心 （CF）的功能障礙。\u003Cbr /\u003E支持帶透過與高爾基體腱器官相互作用，在協調運動方面發揮著重要作用。伸肌支持帶的上束根據距骨的位置而改變肌腱的角度，而下束根據前足的位置與肌腱相互作用。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060553-an-la-pe-cp.jpeg\" alt=\"an-la-pe-cp\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 融合中心 （CF）的被動動作驗證。\u003Cbr /\u003E患者仰臥。治療師抓住患者的前腳並向内與向下伸展。不論是否感到腳踝和前足外側區域疼痛或過度緊繃，均請患者告知。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060517-an-la-pe-move-p.jpeg\" alt=\"an-la-pe-move-p\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-pe 融合中心（CF）的主動動作驗證。\u003Cbr /\u003E患者仰臥。治療師從最大伸展位置，要求患者在前外側向上和向外移動他們的腳，抵抗治療師施加的阻力。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060524-an-la-pe-move-a.jpeg\" alt=\"an-la-pe-move-a\" /\u003E\u003C/p\u003E"

  {
    "question": "AN-LA-SC 位置",
    "answer": "\u003Cp\u003ECF點位置\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E鎖骨上窩，靠近頸部和鎖骨\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E中醫穴位\u003C/p\u003E\u003Cul\u003E\u003Cli\u003ELI17，天鼎穴\u003C/li\u003E\u003Cli\u003EST12，缺盆穴\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E相關問題\u003C/p\u003E\u003Cul\u003E\u003Cli\u003E放射性疼痛到手臂、肩胛和上胸段，胸廓出口綜合征\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E前-外-肩cf點位於鎖骨上窩，近斜方肌鎖骨附著處。它控制肩胛骨的外向運動或外展運動力量（斜方肌），以及前向運動力量（肩胛舌骨肌）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260411090442-An-la-sc.jpeg\" alt=\"An-la-sc\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-sc 2的CF 解剖位置以及橫截面線。\u003C/p\u003E\u003Cp\u003E第二胸椎水平的橫截面圖。\u003C/p\u003E\u003Cul\u003E\u003Cli\u003Ean-la-sc 2 的 CF位於臂神經叢前方\u003C/li\u003E\u003Cli\u003Ean-me-cl 的 CF 位於SCM前方\u003C/li\u003E\u003C/ul\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060514-an-la-sc-location.jpeg\" alt=\"an-la-sc-location\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-sc 1 融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師用指尖在胸鎖乳突肌後緣後方的斜角肌筋膜上進行觸診驗證和治療（針灸穴位 LI 17）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060501-an-la-sc1-pave-treatment.jpeg\" alt=\"an-la-sc1-pave-treatment\" /\u003E\u003C/p\u003E\u003Cp\u003Ean-la-sc 2融合中心 （CF）的觸診驗證與治療。\u003Cbr /\u003E患者仰臥。治療師可使用食指和中指的指尖進行觸診和治療。指尖需要深入鎖骨上窩，沿著鎖骨上緣的一半，以尋找緻密點（針灸穴位 ST 12）。\u003C/p\u003E\u003Cp\u003E\u003Cimg src=\"https://github.com/piccture74/twpic/raw/master/images/20260519060521-an-la-sc2-pave-treatment.jpeg\" alt=\"an-la-sc2-pave-treatment\" /\u003E\u003C/p\u003E"

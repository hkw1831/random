<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者問診記錄模板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        body {
            font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
        }
        
        .section-header {
            font-weight: 600;
            color: #1e40af;
            border-bottom: 2px solid #dbeafe;
            padding-bottom: 0.25rem;
        }
        
        .form-input {
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .clinical-table {
            border: 1px solid #e5e7eb;
        }
        
        .clinical-table th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #374151;
        }
        
        .action-btn {
            transition: all 0.2s ease;
        }
        
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        
        .mini-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            border-radius: 0.375rem;
        }
        
        .record-row {
            transition: background-color 0.2s ease;
        }
        
        .record-row:hover {
            background-color: #f8fafc;
        }
        
        .template-container {
            max-width: 1100px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-slate-100 py-8">
    <div class="template-container px-4">
        <!-- 頂部標題與按鈕 -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-3">
                    <i class="fa-solid fa-clipboard-list text-blue-600"></i>
                    <span>患者問診記錄模板</span>
                </h1>
                <p class="text-slate-500 mt-1 text-sm">個人臨床使用版 • 可匯出截圖與 JSON</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <button onclick="exportScreenshot()" 
                        class="action-btn flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-300 hover:border-blue-400 text-slate-700 rounded-xl text-sm font-medium shadow-sm">
                    <i class="fa-solid fa-camera text-blue-600"></i>
                    <span>匯出截圖</span>
                </button>
                
                <button onclick="exportToJSON()" 
                        class="action-btn flex items-center gap-2 px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-medium shadow-sm">
                    <i class="fa-solid fa-file-export"></i>
                    <span>匯出 JSON</span>
                </button>
                
                <button onclick="importFromJSON()" 
                        class="action-btn flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-300 hover:border-emerald-400 text-slate-700 rounded-xl text-sm font-medium shadow-sm">
                    <i class="fa-solid fa-file-import text-emerald-600"></i>
                    <span>匯入 JSON</span>
                </button>
            </div>
        </div>

        <!-- 主要表單卡片 -->
        <div id="form-card" class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            
            <!-- 日期與基本資訊列 -->
            <div class="px-8 pt-8 pb-6 bg-slate-50 border-b border-slate-200">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5">日期</label>
                        <input type="date" id="record_date" 
                               class="form-input w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5">患者姓名 / 代號</label>
                        <input type="text" id="patient_name" placeholder="例如：陳先生 / A001"
                               class="form-input w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5">年齡 / 性別</label>
                        <input type="text" id="patient_age_gender" placeholder="例如：42歲 男"
                               class="form-input w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm">
                    </div>
                </div>
            </div>

            <div class="p-8 space-y-8">
                
                <!-- 主要問題 -->
                <div>
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-comment-dots"></i>
                        </div>
                        <h2 class="section-header text-lg">主要問題</h2>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">請詳細描述最主要痛的位置與感覺</label>
                            <textarea id="main_location" rows="3" placeholder="例如：右側腰部後方靠近脊柱處，深層酸痛感，偶爾會放射到右臀部"
                                      class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm resize-y"></textarea>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1.5">這個問題持續了多久？</label>
                                <input type="text" id="main_duration" placeholder="例如：3個月 / 從去年開始"
                                       class="form-input w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1.5">這是第一次出現嗎？</label>
                                <input type="text" id="first_occurrence" placeholder="例如：不是，以前偶爾會痛"
                                       class="form-input w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 疼痛強度 -->
                <div>
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-chart-line"></i>
                        </div>
                        <h2 class="section-header text-lg">疼痛強度</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">現在疼痛程度（0-10分）</label>
                            <div class="flex items-center gap-3">
                                <input type="range" id="current_pain" min="0" max="10" step="1" value="5"
                                       class="flex-1 accent-blue-600" oninput="updatePainValue('current_pain', 'current_pain_value')">
                                <div class="w-12 text-center">
                                    <span id="current_pain_value" class="inline-block w-10 text-center font-semibold text-lg text-blue-700">5</span>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">最痛的時候（0-10分）</label>
                            <div class="flex items-center gap-3">
                                <input type="range" id="max_pain" min="0" max="10" step="1" value="8"
                                       class="flex-1 accent-red-500" oninput="updatePainValue('max_pain', 'max_pain_value')">
                                <div class="w-12 text-center">
                                    <span id="max_pain_value" class="inline-block w-10 text-center font-semibold text-lg text-red-600">8</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 疼痛模式 -->
                <div>
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 bg-violet-100 text-violet-600 rounded-xl flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-exchange-alt"></i>
                        </div>
                        <h2 class="section-header text-lg">疼痛模式（加重與緩解因素）</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">什麼動作或姿勢會讓痛明顯加重？</label>
                            <textarea id="aggravating_factors" rows="2" placeholder="例如：走路超過15分鐘、久坐後起身、彎腰拿東西"
                                      class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm resize-y"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">什麼動作或姿勢會讓痛減輕？</label>
                            <textarea id="relieving_factors" rows="2" placeholder="例如：躺平休息、熱敷、輕輕伸展後"
                                      class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm resize-y"></textarea>
                        </div>
                    </div>
                </div>

                <!-- 其他痛處 -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-teal-100 text-teal-600 rounded-xl flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-list-ul"></i>
                            </div>
                            <h2 class="section-header text-lg">其他痛處</h2>
                        </div>
                        <button onclick="addAssociatedRow()" 
                                class="mini-btn flex items-center gap-1.5 bg-teal-600 hover:bg-teal-700 text-white px-3 py-1.5 text-xs font-medium rounded-lg">
                            <i class="fa-solid fa-plus"></i>
                            <span>新增一筆</span>
                        </button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="clinical-table w-full text-sm rounded-2xl overflow-hidden">
                            <thead>
                                <tr>
                                    <th class="px-4 py-3 text-left w-2/5">痛的位置與感覺</th>
                                    <th class="px-4 py-3 text-left">持續時間</th>
                                    <th class="px-4 py-3 text-left w-20">程度</th>
                                    <th class="px-4 py-3 text-left">加重/緩解因素</th>
                                    <th class="px-3 py-3 w-12"></th>
                                </tr>
                            </thead>
                            <tbody id="associated_tbody">
                            </tbody>
                        </table>
                    </div>
                    <p class="text-xs text-slate-400 mt-1.5 ml-1">若無其他痛處可留空</p>
                </div>

                <!-- 舊傷痛史 -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center flex-shrink-0">
                                <i class="fa-solid fa-history"></i>
                            </div>
                            <h2 class="section-header text-lg">舊傷痛史（以前痛過但現在不痛）</h2>
                        </div>
                        <button onclick="addPastPainRow()" 
                                class="mini-btn flex items-center gap-1.5 bg-orange-600 hover:bg-orange-700 text-white px-3 py-1.5 text-xs font-medium rounded-lg">
                            <i class="fa-solid fa-plus"></i>
                            <span>新增一筆</span>
                        </button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="clinical-table w-full text-sm rounded-2xl overflow-hidden">
                            <thead>
                                <tr>
                                    <th class="px-4 py-3 text-left w-2/5">位置與當時情況</th>
                                    <th class="px-4 py-3 text-left">發生時間</th>
                                    <th class="px-4 py-3 text-left">持續多久</th>
                                    <th class="px-3 py-3 w-12"></th>
                                </tr>
                            </thead>
                            <tbody id="past_pain_tbody">
                            </tbody>
                        </table>
                    </div>
                    <p class="text-xs text-slate-400 mt-1.5 ml-1">重點記錄時間較長或反覆出現的舊傷</p>
                </div>

                <!-- 手術與外傷史 -->
                <div>
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-user-injured"></i>
                        </div>
                        <h2 class="section-header text-lg">手術、骨折與外傷史</h2>
                    </div>
                    
                    <textarea id="surgery_trauma" rows="4" placeholder="例如：&#10;• 2018年右手腕骨折，打石膏6週&#10;• 2022年車禍，右肩撞傷，當時腫脹約兩週&#10;• 無手術史"
                              class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm resize-y"></textarea>
                </div>

                <!-- 問診總結 -->
                <div>
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 bg-slate-200 text-slate-600 rounded-xl flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-sticky-note"></i>
                        </div>
                        <h2 class="section-header text-lg">問診總結與觀察</h2>
                    </div>
                    
                    <textarea id="summary_notes" rows="5" placeholder="在此記錄重要觀察、患者描述的重點、或後續需要注意的事項..."
                              class="form-input w-full px-4 py-3 border border-slate-300 rounded-2xl text-sm resize-y"></textarea>
                </div>

            </div>
            
            <div class="px-8 py-4 bg-slate-50 border-t border-slate-200 flex items-center justify-between text-xs text-slate-400">
                <div>個人臨床記錄模板 • 資料僅儲存在本機</div>
                <div class="flex items-center gap-1">
                    <i class="fa-solid fa-info-circle"></i>
                    <span>建議使用 Chrome / Edge 瀏覽器</span>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        function updatePainValue(inputId, displayId) {
            const input = document.getElementById(inputId);
            const display = document.getElementById(displayId);
            if (input && display) display.textContent = input.value;
        }
        
        function initPainSliders() {
            const currentSlider = document.getElementById('current_pain');
            const maxSlider = document.getElementById('max_pain');
            
            if (currentSlider) {
                currentSlider.oninput = () => updatePainValue('current_pain', 'current_pain_value');
                setTimeout(() => updatePainValue('current_pain', 'current_pain_value'), 50);
            }
            if (maxSlider) {
                maxSlider.oninput = () => updatePainValue('max_pain', 'max_pain_value');
                setTimeout(() => updatePainValue('max_pain', 'max_pain_value'), 50);
            }
        }
        
        function addAssociatedRow(data = null) {
            const tbody = document.getElementById('associated_tbody');
            const row = document.createElement('tr');
            row.className = 'record-row border-t border-slate-200';
            
            row.innerHTML = `
                <td class="px-3 py-2.5">
                    <input type="text" class="assoc-location form-input w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg" 
                           placeholder="痛的位置與感覺" value="${data ? data.location : ''}">
                </td>
                <td class="px-3 py-2.5">
                    <input type="text" class="assoc-duration form-input w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg" 
                           placeholder="持續時間" value="${data ? data.duration : ''}">
                </td>
                <td class="px-3 py-2.5">
                    <input type="text" class="assoc-level form-input w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg" 
                           placeholder="0-10" value="${data ? data.level : ''}">
                </td>
                <td class="px-3 py-2.5">
                    <input type="text" class="assoc-factors form-input w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg" 
                           placeholder="加重/緩解因素" value="${data ? data.factors : ''}">
                </td>
                <td class="px-2 py-2.5 text-center">
                    <button onclick="removeRow(this)" class="text-red-400 hover:text-red-600 p-1">
                        <i class="fa-solid fa-trash text-sm"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(row);
        }
        
        function addPastPainRow(data = null) {
            const tbody = document.getElementById('past_pain_tbody');
            const row = document.createElement('tr');
            row.className = 'record-row border-t border-slate-200';
            
            row.innerHTML = `
                <td class="px-3 py-2.5">
                    <input type="text" class="past-location form-input w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg" 
                           placeholder="位置與當時情況" value="${data ? data.location : ''}">
                </td>
                <td class="px-3 py-2.5">
                    <input type="text" class="past-time form-input w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg" 
                           placeholder="發生時間" value="${data ? data.time : ''}">
                </td>
                <td class="px-3 py-2.5">
                    <input type="text" class="past-duration form-input w-full px-3 py-1.5 text-sm border border-slate-200 rounded-lg" 
                           placeholder="持續多久" value="${data ? data.duration : ''}">
                </td>
                <td class="px-2 py-2.5 text-center">
                    <button onclick="removeRow(this)" class="text-red-400 hover:text-red-600 p-1">
                        <i class="fa-solid fa-trash text-sm"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(row);
        }
        
        function removeRow(btn) {
            const row = btn.closest('tr');
            if (row) row.remove();
        }
        
        function collectFormData() {
            const data = {
                version: "1.0",
                export_date: new Date().toISOString(),
                record_date: document.getElementById('record_date').value,
                patient_name: document.getElementById('patient_name').value,
                patient_age_gender: document.getElementById('patient_age_gender').value,
                main_problem: {
                    location_description: document.getElementById('main_location').value,
                    duration: document.getElementById('main_duration').value,
                    first_occurrence: document.getElementById('first_occurrence').value
                },
                pain_intensity: {
                    current: parseInt(document.getElementById('current_pain').value) || 0,
                    max: parseInt(document.getElementById('max_pain').value) || 0
                },
                pain_pattern: {
                    aggravating_factors: document.getElementById('aggravating_factors').value,
                    relieving_factors: document.getElementById('relieving_factors').value
                },
                associated_symptoms: [],
                past_pain_history: [],
                surgery_trauma: document.getElementById('surgery_trauma').value,
                summary_notes: document.getElementById('summary_notes').value
            };
            
            document.querySelectorAll('#associated_tbody tr').forEach(row => {
                const location = row.querySelector('.assoc-location')?.value.trim();
                if (location) {
                    data.associated_symptoms.push({
                        location: location,
                        duration: row.querySelector('.assoc-duration')?.value.trim() || '',
                        level: row.querySelector('.assoc-level')?.value.trim() || '',
                        factors: row.querySelector('.assoc-factors')?.value.trim() || ''
                    });
                }
            });
            
            document.querySelectorAll('#past_pain_tbody tr').forEach(row => {
                const location = row.querySelector('.past-location')?.value.trim();
                if (location) {
                    data.past_pain_history.push({
                        location: location,
                        time: row.querySelector('.past-time')?.value.trim() || '',
                        duration: row.querySelector('.past-duration')?.value.trim() || ''
                    });
                }
            });
            
            return data;
        }
        
        async function exportToJSON() {
            try {
                const data = collectFormData();
                const jsonString = JSON.stringify(data, null, 2);
                await navigator.clipboard.writeText(jsonString);
                showToast('JSON 已複製到剪貼簿！', 'success');
            } catch (err) {
                const data = collectFormData();
                const jsonString = JSON.stringify(data, null, 2);
                prompt('無法自動複製，請手動複製以下 JSON：', jsonString);
            }
        }
        
        async function importFromJSON() {
            try {
                let jsonText = '';
                try {
                    jsonText = await navigator.clipboard.readText();
                } catch (e) {
                    jsonText = prompt('請將 JSON 內容貼上到下方：');
                    if (!jsonText) return;
                }
                
                if (!jsonText || jsonText.trim() === '') {
                    showToast('沒有可匯入的內容', 'error');
                    return;
                }
                
                const data = JSON.parse(jsonText);
                fillFormWithData(data);
                showToast('JSON 資料已成功匯入！', 'success');
            } catch (err) {
                showToast('匯入失敗，請確認 JSON 格式是否正確', 'error');
            }
        }
        
        function fillFormWithData(data) {
            if (!data) return;
            
            if (data.record_date) document.getElementById('record_date').value = data.record_date;
            if (data.patient_name) document.getElementById('patient_name').value = data.patient_name;
            if (data.patient_age_gender) document.getElementById('patient_age_gender').value = data.patient_age_gender;
            
            if (data.main_problem) {
                document.getElementById('main_location').value = data.main_problem.location_description || '';
                document.getElementById('main_duration').value = data.main_problem.duration || '';
                document.getElementById('first_occurrence').value = data.main_problem.first_occurrence || '';
            }
            
            if (data.pain_intensity) {
                const currentSlider = document.getElementById('current_pain');
                const maxSlider = document.getElementById('max_pain');
                if (currentSlider && data.pain_intensity.current !== undefined) {
                    currentSlider.value = data.pain_intensity.current;
                    updatePainValue('current_pain', 'current_pain_value');
                }
                if (maxSlider && data.pain_intensity.max !== undefined) {
                    maxSlider.value = data.pain_intensity.max;
                    updatePainValue('max_pain', 'max_pain_value');
                }
            }
            
            if (data.pain_pattern) {
                document.getElementById('aggravating_factors').value = data.pain_pattern.aggravating_factors || '';
                document.getElementById('relieving_factors').value = data.pain_pattern.relieving_factors || '';
            }
            
            const assocTbody = document.getElementById('associated_tbody');
            assocTbody.innerHTML = '';
            if (data.associated_symptoms && Array.isArray(data.associated_symptoms)) {
                data.associated_symptoms.forEach(item => addAssociatedRow(item));
            }
            
            const pastTbody = document.getElementById('past_pain_tbody');
            pastTbody.innerHTML = '';
            if (data.past_pain_history && Array.isArray(data.past_pain_history)) {
                data.past_pain_history.forEach(item => addPastPainRow(item));
            }
            
            if (data.surgery_trauma) document.getElementById('surgery_trauma').value = data.surgery_trauma;
            if (data.summary_notes) document.getElementById('summary_notes').value = data.summary_notes;
        }
        
        async function exportScreenshot() {
            const card = document.getElementById('form-card');
            if (!card) return;
            
            const originalBoxShadow = card.style.boxShadow;
            card.style.boxShadow = 'none';
            
            try {
                const canvas = await html2canvas(card, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                
                const link = document.createElement('a');
                const dateStr = new Date().toISOString().slice(0, 10);
                link.download = `問診記錄_${dateStr}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                showToast('截圖已下載', 'success');
            } catch (err) {
                showToast('截圖失敗，請稍後再試', 'error');
            } finally {
                card.style.boxShadow = originalBoxShadow;
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 px-5 py-3 rounded-2xl shadow-xl text-sm font-medium flex items-center gap-2 z-50
                ${type === 'success' ? 'bg-emerald-600 text-white' : 'bg-red-500 text-white'}`;
            toast.innerHTML = `
                <i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transition = 'all 0.3s ease';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2200);
        }
        
        function initDefaultRows() {
            const assocTbody = document.getElementById('associated_tbody');
            const pastTbody = document.getElementById('past_pain_tbody');
            
            if (assocTbody.children.length === 0) addAssociatedRow();
            if (pastTbody.children.length === 0) addPastPainRow();
        }
        
        function setDefaultDate() {
            const dateInput = document.getElementById('record_date');
            if (dateInput && !dateInput.value) {
                dateInput.value = new Date().toISOString().split('T')[0];
            }
        }
        
        function initializeApp() {
            initPainSliders();
            setDefaultDate();
            initDefaultRows();
        }
        
        window.onload = initializeApp;

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown → JSON Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      padding: 24px;
      color: #e2e8f0;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #818cf8 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container { max-width: 1500px; margin: 0 auto; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel { display: flex; flex-direction: column; gap: 8px; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-md   { background: #1e3a5f; color: #60a5fa; }
    .badge-json { background: #14532d; color: #4ade80; }

    textarea {
      width: 100%;
      height: 74vh;
      padding: 14px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
      font-size: 12.5px;
      line-height: 1.75;
      resize: vertical;
      transition: border-color .2s, box-shadow .2s;
    }
    textarea:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,.15);
    }
    #output { color: #86efac; }

    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding-top: 28px;
    }

    .btn-convert {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 22px;
      background: linear-gradient(135deg, #818cf8, #34d399);
      color: #0f172a;
      font-weight: 900;
      box-shadow: 0 4px 18px rgba(129,140,248,.45);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-convert:hover  { transform: scale(1.12); box-shadow: 0 6px 24px rgba(129,140,248,.6); }
    .btn-convert:active { transform: scale(.97); }

    .btn-small {
      background: #1e293b;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-small:hover { background: #334155; color: #e2e8f0; }

    .btn-clear {
      background: #2d1a1a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-clear:hover { background: #3f1a1a; color: #fca5a5; border-color: #ef4444; }

    .status {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      min-height: 16px;
    }
    .status.ok  { color: #34d399; }
    .status.err { color: #f87171; }

    #debugWrap {
      margin-top: 20px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    #debugWrap.visible { display: block; }
    .debug-header {
      padding: 8px 16px;
      background: #0f172a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #debugContent {
      padding: 14px 16px;
      font-family: monospace;
      font-size: 12px;
      color: #fbbf24;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .middle { flex-direction: row; padding-top: 0; }
      textarea { height: 42vh; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✦ Markdown → JSON Converter</h1>

  <div class="grid">
    <!-- INPUT -->
    <div class="panel">
      <div class="panel-header">
        <label>Input</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-md">Markdown</span>
          <button class="btn-clear" id="btnClearInput">✕ Clear</button>
        </div>
      </div>
      <textarea id="input" spellcheck="false" placeholder="Paste markdown with ## H2 sections…"></textarea>
    </div>

    <!-- MIDDLE -->
    <div class="middle">
      <button class="btn-convert" id="btnConvert" title="Convert">→</button>
      <div class="status" id="status"></div>
      <button class="btn-small" id="btnDebug" title="Show raw HTML before cleanup">🔍</button>
      <button class="btn-clear" id="btnClearAll" title="Clear all">🗑</button>
    </div>

    <!-- OUTPUT -->
    <div class="panel">
      <div class="panel-header">
        <label>Output</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-json">JSON</span>
          <button class="btn-small" id="btnCopy">⎘ Copy</button>
          <button class="btn-clear" id="btnClearOutput">✕ Clear</button>
        </div>
      </div>
      <textarea id="output" readonly spellcheck="false" placeholder="JSON output will appear here…"></textarea>
    </div>
  </div>

  <!-- DEBUG panel -->
  <div id="debugWrap">
    <div class="debug-header">
      <span>🔍 Raw marked.parse() output (before cleanup)</span>
      <button class="btn-small" id="btnCloseDebug">✕ Close</button>
    </div>
    <div id="debugContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
<script>
const renderer = new marked.Renderer();

renderer.image = function(href, title, text) {
  const src = (href || '').replace(/^["']|["']$/g, '');
  return `<img src="${src}">`;
};

renderer.hr = function() { return ''; };

marked.setOptions({
  renderer,
  gfm:       true,
  breaks:    true,
  headerIds: false,
  mangle:    false,
});

function cleanHtml(html) {
  return html
    .replace(/<br\s*\/?>\s*(<\/(?:p|li|td|th|blockquote|div)>)/gi, '$1')
    .replace(/(<\/[^>]+>)\s+(<[^/])/g, '$1$2')
    .replace(/\r?\n/g, '')
    .trim();
}

let _lastRawHtmls = [];

function mdToJson(raw) {
  _lastRawHtmls = [];

  const stripped = raw.replace(/^---[\s\S]*?---[ \t]*(\r?\n|$)/, '');

  const chunks = stripped
    .split(/(?=^## )/m)
    .map(c => c.trim())
    .filter(c => c.length > 0);

  if (chunks.length === 0) {
    throw new Error('No ## headings found. Make sure sections start with "## Title".');
  }

  const result = [];

  for (const chunk of chunks) {
    const headingMatch = chunk.match(/^## (.+?)[ \t]*(\r?\n|$)/);
    if (!headingMatch) continue;

    const question = headingMatch[1].trim();
    const body = chunk.slice(headingMatch[0].length).trim();

    if (!body) {
      result.push({ question, answer: '' });
      continue;
    }

    const rawHtml = marked.parse(body);
    _lastRawHtmls.push({ question, rawHtml });

    const answer = cleanHtml(rawHtml);
    result.push({ question, answer });
  }

  return result;
}

const inputEl      = document.getElementById('input');
const outputEl     = document.getElementById('output');
const statusEl     = document.getElementById('status');
const debugWrap    = document.getElementById('debugWrap');
const debugContent = document.getElementById('debugContent');

function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className   = 'status ' + (type || '');
}

function clearAll() {
  inputEl.value  = '';
  outputEl.value = '';
  _lastRawHtmls  = [];
  debugWrap.classList.remove('visible');
  setStatus('');
}

document.getElementById('btnConvert').addEventListener('click', () => {
  const raw = inputEl.value;
  if (!raw.trim()) { setStatus('⚠ Input is empty', 'err'); return; }

  try {
    const json = mdToJson(raw);
    outputEl.value = JSON.stringify(json, null, 2);
    setStatus(`✓ ${json.length} section${json.length !== 1 ? 's' : ''} converted`, 'ok');
    if (debugWrap.classList.contains('visible')) showDebug();
  } catch (e) {
    outputEl.value = '';
    setStatus('✗ ' + e.message, 'err');
  }
});

document.getElementById('btnCopy').addEventListener('click', () => {
  if (!outputEl.value) return;
  navigator.clipboard.writeText(outputEl.value).then(() => {
    const b = document.getElementById('btnCopy');
    const orig = b.textContent;
    b.textContent = '✓ Copied!';
    setTimeout(() => (b.textContent = orig), 2000);
  });
});

document.getElementById('btnClearInput').addEventListener('click', () => {
  inputEl.value = '';
  inputEl.focus();
  setStatus('');
});

document.getElementById('btnClearOutput').addEventListener('click', () => {
  outputEl.value = '';
  _lastRawHtmls  = [];
  debugWrap.classList.remove('visible');
  setStatus('');
});

document.getElementById('btnClearAll').addEventListener('click', clearAll);

function showDebug() {
  if (_lastRawHtmls.length === 0) {
    debugContent.textContent = 'Run a conversion first.';
  } else {
    debugContent.textContent = _lastRawHtmls
      .map(({question, rawHtml}) => `── ${question} ──\n${rawHtml}`)
      .join('\n\n');
  }
  debugWrap.classList.add('visible');
}

document.getElementById('btnDebug').addEventListener('click', showDebug);
document.getElementById('btnCloseDebug').addEventListener('click', () => {
  debugWrap.classList.remove('visible');
});
</script>
</body>
</html>

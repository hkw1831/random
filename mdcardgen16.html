<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown → Quiz Card Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; min-height: 100vh; padding: 24px; color: #e2e8f0;
    }
    h1 {
      text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 20px;
      background: linear-gradient(135deg, #818cf8 0%, #34d399 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .container { max-width: 1500px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 84px 1fr; gap: 16px; align-items: start; }
    .panel { display: flex; flex-direction: column; gap: 8px; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; }
    label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #94a3b8; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .badge-md   { background: #1e3a5f; color: #60a5fa; }
    .badge-json { background: #14532d; color: #4ade80; }
    .badge-html { background: #3b1f5e; color: #c084fc; }
    textarea {
      width: 100%; height: 74vh; padding: 14px 16px;
      background: #1e293b; border: 1px solid #334155; border-radius: 10px;
      color: #e2e8f0; font-family: 'Menlo','Monaco','Consolas',monospace;
      font-size: 12.5px; line-height: 1.75; resize: vertical; transition: border-color .2s, box-shadow .2s;
    }
    textarea:focus { outline: none; border-color: #818cf8; box-shadow: 0 0 0 3px rgba(129,140,248,.15); }
    .middle { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding-top: 28px; }
    .btn-convert {
      width: 64px; background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      border: none; color: #fff; padding: 7px 6px; border-radius: 8px;
      font-size: 11px; font-weight: 700; cursor: pointer; line-height: 1.4; text-align: center;
      box-shadow: 0 3px 14px rgba(14,165,233,.45); transition: transform .2s, box-shadow .2s;
    }
    .btn-convert:hover { transform: scale(1.08); }
    .btn-convert:active { transform: scale(.97); }
    .btn-generate {
      width: 64px; background: linear-gradient(135deg, #7c3aed, #db2777);
      border: none; color: #fff; padding: 7px 6px; border-radius: 8px;
      font-size: 11px; font-weight: 700; cursor: pointer; line-height: 1.4; text-align: center;
      box-shadow: 0 3px 14px rgba(124,58,237,.45); transition: transform .2s, box-shadow .2s;
    }
    .btn-generate:hover { transform: scale(1.08); }
    .btn-generate:active { transform: scale(.97); }
    .btn-small {
      background: #1e293b; border: 1px solid #475569; color: #94a3b8;
      padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .btn-small:hover { background: #334155; color: #e2e8f0; }
    .btn-clear {
      background: #2d1a1a; border: 1px solid #7f1d1d; color: #f87171;
      padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .btn-clear:hover { background: #3f1a1a; color: #fca5a5; border-color: #ef4444; }
    .status-bar {
      margin-top: 12px; padding: 8px 16px; border-radius: 8px; text-align: center;
      font-size: 12.5px; min-height: 36px; line-height: 20px;
      color: transparent; border: 1px solid transparent; transition: all .2s;
    }
    .status-bar.ok  { color: #34d399; background: rgba(52,211,153,.07); border-color: rgba(52,211,153,.2); }
    .status-bar.err { color: #f87171; background: rgba(248,113,113,.07); border-color: rgba(248,113,113,.2); }
    .error-banner {
      display: none; align-items: center; gap: 12px;
      background: #2d1a1a; border: 1px solid #ef4444; border-radius: 10px;
      padding: 14px 18px; margin-bottom: 16px; color: #fca5a5; font-size: 13px; line-height: 1.5;
    }
    .error-banner.visible { display: flex; }
    .error-banner-icon { font-size: 22px; flex-shrink: 0; }
    .error-banner-text strong { display: block; color: #f87171; font-size: 14px; margin-bottom: 2px; }
    .error-banner-close {
      margin-left: auto; background: none; border: none; color: #f87171;
      font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 6px;
      border-radius: 4px; transition: background .15s; flex-shrink: 0;
    }
    .error-banner-close:hover { background: #3f1a1a; }
    #debugWrap {
      margin-top: 16px; background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; overflow: hidden; display: none;
    }
    #debugWrap.visible { display: block; }
    .debug-header {
      padding: 8px 16px; background: #0f172a; font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; color: #94a3b8;
      display: flex; justify-content: space-between; align-items: center;
    }
    #debugContent {
      padding: 14px 16px; font-family: monospace; font-size: 12px; color: #fbbf24;
      white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto;
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .middle { flex-direction: row; padding-top: 0; flex-wrap: wrap; justify-content: center; }
      textarea { height: 42vh; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✦ Markdown → Quiz Card Generator  <small style="font-size:12px;opacity:.6;background:none;-webkit-text-fill-color:#818cf8">+ SM-2 SRS</small></h1>

  <div class="error-banner" id="noH1Banner">
    <span class="error-banner-icon">⚠️</span>
    <div class="error-banner-text">
      <strong>No H1 title found in the Markdown</strong>
      Add a title at the top of your markdown using <code style="background:#3f1a1a;padding:1px 5px;border-radius:3px;color:#fcd34d;"># Your Title</code>, then try again.
    </div>
    <button class="error-banner-close" id="noH1BannerClose" title="Dismiss">✕</button>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-header">
        <label>Input</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-md">Markdown</span>
          <button class="btn-clear" id="btnClearInput">✕ Clear</button>
        </div>
      </div>
      <textarea id="input" spellcheck="false"
        placeholder="# Your Quiz Title&#10;&#10;## Optional Section (ignored)&#10;Any text here between ## and ### is ignored&#10;&#10;### Card Question 1&#10;Answer content here…&#10;&#10;#### Sub-heading inside answer&#10;More detailed content…&#10;&#10;### Card Question 2&#10;&#10;| Column A | Column B | Column C |&#10;|----------|----------|----------|&#10;| one      | two      | three    |&#10;&#10;## Another Section (ignored)&#10;&#10;### Card Question 3&#10;- bullet one&#10;- bullet two"></textarea>
    </div>

    <div class="middle">
      <button class="btn-convert"  id="btnConvert"  title="Convert MD → JSON">→<br>Gen JSON</button>
      <button class="btn-generate" id="btnGenerate" title="Generate Quiz HTML">📄<br>Gen HTML</button>
      <button class="btn-small"    id="btnDebug">🔍</button>
      <button class="btn-clear"    id="btnClearAll">🗑</button>
    </div>

    <div class="panel">
      <div class="panel-header">
        <label>Output</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-json" id="outputBadge">JSON</span>
          <button class="btn-small" id="btnCopy">⎘ Copy</button>
          <button class="btn-clear" id="btnClearOutput">✕ Clear</button>
        </div>
      </div>
      <textarea id="output" readonly spellcheck="false" placeholder="JSON or HTML output will appear here…"></textarea>
    </div>
  </div>

  <div class="status-bar" id="status"></div>

  <div id="debugWrap">
    <div class="debug-header">
      <span>🔍 Raw marked.parse() output</span>
      <button class="btn-small" id="btnCloseDebug">✕ Close</button>
    </div>
    <div id="debugContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
<script>
  /* ── Marked config ─────────────────────────────────────────────── */
  function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function safeJson(data){return JSON.stringify(data,null,2).replace(/</g,'\\u003C').replace(/>/g,'\\u003E');}

  var renderer=new marked.Renderer();
  renderer.image=function(href,title,text){var src=escAttr((href||'').replace(/^["']|["']$/g,''));var alt=text?' alt="'+escAttr(text)+'"':'';var titl=title?' title="'+escAttr(title)+'"':'';return '<img src="'+src+'"'+alt+titl+' />';};
  renderer.hr=function(){return '';};
  renderer.heading=function(text,level){var sl=Math.max(parseInt(level,10),4);return '<h'+sl+'>'+text+'</h'+sl+'>\n';};
  renderer.table=function(header,body){var tbody=body?'<tbody>'+body+'</tbody>':'';return '<div class="table-wrap"><table>\n<thead>\n'+header+'</thead>\n'+tbody+'</table></div>\n';};
  marked.setOptions({renderer:renderer,gfm:true,breaks:true,headerIds:false,mangle:false});

  function cleanHtml(html){
    return html.replace(/<br\s*\/?>/gi,'<br />').replace(/<br \/>\s*(<\/(?:p|li|td|th|blockquote|div|h[4-6])>)/gi,'$1').replace(/(<\/[^>]+>)\s+(<[^/])/g,'$1$2').replace(/\r?\n/g,'').trim();
  }
  function extractTitle(raw){var m=raw.match(/^# (.+?)[ \t]*$/m);return m?m[1].trim():null;}

  var _lastRawHtmls=[];

  function mdToJson(raw){
    _lastRawHtmls=[];
    var stripped=raw.replace(/^---[\s\S]*?---[ \t]*(\r?\n|$)/,'');
    var chunks=stripped.split(/(?=^### )/m).map(function(c){return c.trim();}).filter(function(c){return c.length>0;});
    if(chunks.length===0)throw new Error('No ### headings found. Cards must start with "### Question".');
    var result=[];
    for(var k=0;k<chunks.length;k++){
      var chunk=chunks[k];
      if(chunk.indexOf('### ')!==0)continue;
      var m=chunk.match(/^### (.+?)[ \t]*(\r?\n|$)/);
      if(!m)continue;
      var question=m[1].trim();
      var body=chunk.slice(m[0].length);
      body=body.replace(/^#{1,2} .+[ \t]*(\r?\n|$)/mg,'').trim();
      if(!body){result.push({question:question,answer:''});continue;}
      var rawHtml=marked.parse(body);
      _lastRawHtmls.push({question:question,rawHtml:rawHtml});
      result.push({question:question,answer:cleanHtml(rawHtml)});
    }
    if(result.length===0)throw new Error('No ### headings found. Cards must start with "### Question".');
    return result;
  }

  /* ── Quiz HTML Template (SM-2 SRS) ────────────────────────────── */
  function generateQuizHtml(title,json){
    return QUIZ_TEMPLATE
      .replace(/%%TITLE%%/g,escHtml(title))
      .replace('%%JSON%%',safeJson(json));
  }

    '        pre code{background:transparent;padding:0;font-size:inherit;}',

    '            <div class="modal-search-group"><div class="modal-search-label">🔍 答案關鍵字<\/div><input type="text" id="dueASearch" class="modal-search" placeholder="搜尋答案…"><\/div>',

    '        <div class="modal-search-row">',
    '            <div class="modal-search-group"><div class="modal-search-label">🔍 題目關鍵字<\/div><input type="text" id="mastQSearch" class="modal-search" placeholder="搜尋題目…"><\/div>',
    '            <div class="modal-search-group"><div class="modal-search-label">🔍 答案關鍵字<\/div><input type="text" id="mastASearch" class="modal-search" placeholder="搜尋答案…"><\/div>',
    '        <\/div>',
    '        <div id="mastCount2" class="q-count cm"><\/div>',

    '',
    '<script>',
    'var qaData=%%JSON%%;',
    'var srsData={};',
    'var filteredData=qaData.slice();',
    'var currentQ=null;',
    'var studyMode="random";',
    'var answerVisible=false;',
    'var storageOk=false;',
    'var SRS_KEY="srs_"+"%%TITLE%%".replace(/\\W/g,"_").slice(0,40);',
    '',
    'function pad2(n){return n<10?"0"+n:""+n;}',
    'function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}',
    'function addDays(s,n){var d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}',
    'function ivText(days){',
    '  if(days<=0)return "重學";',
    '  if(days===1)return "1天";',
    '  if(days<7)return days+"天";',
    '  if(days<30)return Math.round(days/7)+"週";',
    '  return Math.round(days/30)+"月";',
    '}',
    'function stripHtml(s){return s.replace(/<[^>]*>/g,"");}',
    'function filterModalList(list,qSearch,aSearch){',
    '  return list.filter(function(item){',
    '    var qOk=!qSearch||item.question.toLowerCase().indexOf(qSearch.toLowerCase())!==-1;',
    '    var aOk=!aSearch||stripHtml(item.answer).toLowerCase().indexOf(aSearch.toLowerCase())!==-1;',
    '    return qOk&&aOk;',
    '  });',
    '}',
    '',
    'function chkStorage(){try{localStorage.setItem("_t","1");localStorage.removeItem("_t");storageOk=true;}catch(e){storageOk=false;}}',
    'function saveSrs(){if(!storageOk)return;try{localStorage.setItem(SRS_KEY,JSON.stringify(srsData));}catch(e){}}',
    'function loadSrs(){if(!storageOk)return;try{var d=localStorage.getItem(SRS_KEY);if(d)srsData=JSON.parse(d);}catch(e){srsData={};}}',
    '',
    'function getCard(q){',
    '  if(!srsData[q])srsData[q]={interval:0,reps:0,ef:2.5,nextReview:null,total:0};',
    '  return srsData[q];',
    '}',
    'function getStatus(q){',
    '  var c=getCard(q);',
    '  if(!c.nextReview)return "new";',
    '  if(c.interval>=21)return "mastered";',
    '  if(c.nextReview<=todayStr())return "due";',
    '  return "upcoming";',
    '}',
    '',
    'function sm2(card,quality){',
    '  var ef=card.ef||2.5, reps=card.reps||0, iv=card.interval||0;',
    '  var nef,niv,nreps;',
    '  if(quality<3){',
    '    nef=Math.max(1.3,ef-0.2); niv=1; nreps=0;',
    '  } else {',
    '    nef=Math.max(1.3,ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02)));',
    '    nreps=reps+1;',
    '    if(reps===0){',
    '      niv=(quality===5?4:quality===4?2:1);',
    '    } else if(reps===1){',
    '      niv=(quality===5?Math.round(6*nef):quality===3?4:6);',
    '    } else {',
    '      niv=Math.round(iv*nef);',
    '      if(quality===3)niv=Math.max(1,Math.round(niv*0.7));',
    '      if(quality===5)niv=Math.round(niv*1.3);',
    '    }',
    '  }',
    '  return {interval:niv,reps:nreps,ef:nef};',
    '}',
    'function previewAll(q){',
    '  var c=getCard(q);',
    '  return {1:sm2(c,1).interval,3:sm2(c,3).interval,4:sm2(c,4).interval,5:sm2(c,5).interval};',
    '}',
    'function applyRating(q,quality){',
    '  var card=getCard(q);',
    '  var r=sm2(card,quality);',
    '  card.interval=r.interval; card.reps=r.reps; card.ef=r.ef;',
    '  card.nextReview=addDays(todayStr(),quality<3?0:r.interval);',
    '  card.total=(card.total||0)+1;',
    '  saveSrs();',
    '}',
    '',
    'function updateStats(){',
    '  var tot=filteredData.length,nw=0,due=0,mast=0;',
    '  filteredData.forEach(function(item){',
    '    var st=getStatus(item.question);',
    '    if(st==="new")nw++;',
    '    else if(st==="due")due++;',
    '    else if(st==="mastered")mast++;',
    '  });',
    '  document.getElementById("totalCount").textContent=tot;',
    '  document.getElementById("newCount").textContent=nw;',
    '  document.getElementById("dueCount").textContent=due;',
    '  document.getElementById("mastCount").textContent=mast;',
    '  document.getElementById("progBar").style.width=(tot>0?Math.round((mast/tot)*100):0)+"%";',
    '}',
    '',
    'function getPool(){',
    '  if(studyMode==="srs"){',
    '    var due=[],nw=[];',
    '    filteredData.forEach(function(item){',
    '      var st=getStatus(item.question);',
    '      if(st==="due")due.push(item);',
    '      else if(st==="new")nw.push(item);',
    '    });',
    '    return due.concat(nw);',
    '  }',
    '  return filteredData;',
    '}',
    '',
    'function hideAnswer(){',
    '  document.getElementById("answerContent").classList.remove("show");',
    '  document.getElementById("ratingWrap").classList.remove("show");',
    '  document.getElementById("showAnsBtn").textContent="顯示答案";',
    '  answerVisible=false;',
    '}',
    'function toggleAnswer(){',
    '  if(!currentQ)return;',
    '  if(answerVisible){hideAnswer();}',
    '  else{',
    '    document.getElementById("answerContent").classList.add("show");',
    '    document.getElementById("ratingWrap").classList.add("show");',
    '    document.getElementById("showAnsBtn").textContent="隱藏答案";',
    '    answerVisible=true;',
    '    updateHints(currentQ.question);',
    '  }',
    '}',
    'function updateHints(q){',
    '  var iv=previewAll(q);',
    '  document.getElementById("hint-1").textContent="重學";',
    '  document.getElementById("hint-3").textContent=ivText(iv[3]);',
    '  document.getElementById("hint-4").textContent=ivText(iv[4]);',
    '  document.getElementById("hint-5").textContent=ivText(iv[5]);',
    '}',
    'function onRating(quality){',
    '  if(!currentQ)return;',
    '  applyRating(currentQ.question,quality);',
    '  drawQuestion();',
    '}',
    '',
    'function setSrsInfo(q){',
    '  var el=document.getElementById("srsInfo");',
    '  if(!q){el.style.display="none";el.innerHTML="";return;}',
    '  var card=getCard(q); var st=getStatus(q);',
    '  var labels={"new":"🆕 新卡片","due":"📅 到期複習","upcoming":"✅ 排程中","mastered":"🏆 已掌握"};',
    '  var html=\'<span class="srs-badge st-\'+st+\'">\'+labels[st]+\'<\/span>\';',
    '  if(st!=="new"){',
    '    html+=\'<span class="srs-meta">間隔 \'+card.interval+\'天&nbsp;·&nbsp;複習 \'+card.total+\'次&nbsp;·&nbsp;EF \'+card.ef.toFixed(2)+\'<\/span>\';',
    '    if(card.nextReview)html+=\'<span class="srs-meta">下次複習：\'+card.nextReview+\'<\/span>\';',
    '  } else {',
    '    html+=\'<span class="srs-meta">從未複習<\/span>\';',
    '  }',
    '  if(studyMode==="srs"){',
    '    html+=\'<span class="srs-meta">（待學 \'+getPool().length+\' 題）<\/span>\';',
    '  }',
    '  el.innerHTML=html; el.style.display="flex";',
    '}',
    '',
    'function drawQuestion(){',
    '  hideAnswer();',
    '  var pool=getPool();',
    '  if(pool.length===0){',
    '    var msg=studyMode==="srs"',
    '      ?"🎉 今日所有卡片已複習完畢！請明日再來，或切換「隨機練習」繼續練習。"',
    '      :"🎉 目前篩選範圍無符合題目。";',
    '    document.getElementById("question").innerHTML=msg;',
    '    document.getElementById("answerContent").innerHTML="";',
    '    document.getElementById("showAnsWrap").style.display="none";',
    '    setSrsInfo(null); currentQ=null; updateStats(); return;',
    '  }',
    '  var item;',
    '  if(studyMode==="srs"){',
    '    var dueOnly=pool.filter(function(i){return getStatus(i.question)==="due";});',
    '    var src=(dueOnly.length>0&&Math.random()<0.8)?dueOnly:pool;',
    '    item=src[Math.floor(Math.random()*src.length)];',
    '  } else {',
    '    item=pool[Math.floor(Math.random()*pool.length)];',
    '  }',
    '  currentQ=item;',
    '  document.getElementById("question").innerHTML=item.question;',
    '  document.getElementById("answerContent").innerHTML=item.answer;',
    '  document.getElementById("showAnsWrap").style.display="block";',
    '  setSrsInfo(item.question); updateStats();',
    '}',
    '',
    'function setMode(mode){',
    '  studyMode=mode;',
    '  document.getElementById("modeRndBtn").classList.toggle("active",mode==="random");',
    '  document.getElementById("modeSrsBtn").classList.toggle("active",mode==="srs");',
    '  updateStats();',
    '  drawQuestion();',
    '}',
    '',
    'function applyFilter(){',
    '  var pat=document.getElementById("filterInput").value;',
    '  if(!pat.trim()){filteredData=qaData.slice();updateStats();drawQuestion();return;}',
    '  try{var re=new RegExp(pat,"i");filteredData=qaData.filter(function(q){return re.test(q.question);});updateStats();drawQuestion();}catch(e){}',
    '}',
    'function clearFilter(){document.getElementById("filterInput").value="";filteredData=qaData.slice();updateStats();drawQuestion();}',
    '',
    'function doReset(){',
    '  srsData={};saveSrs();currentQ=null;',
    '  updateStats();',
    '  document.getElementById("resetModal").classList.remove("open");',
    '  drawQuestion();',
    '}',
    '',
    'function toggleModalQA(idx,type){',
    '  var ans=document.getElementById(type+"-ans-"+idx);',
    '  var btn=document.getElementById(type+"-btn-"+idx);',
    '  if(!ans||!btn)return;',
    '  var show=!ans.classList.contains("show");',
    '  ans.classList.toggle("show",show);',
    '  btn.textContent=show?"隱藏答案":"顯示答案";',
    '}',
    'function buildList(list,type){',
    '  if(!list.length)return\'<div class="no-results">（無符合結果）<\/div>\';',
    '  return list.map(function(item,i){',
    '    var c=getCard(item.question),st=getStatus(item.question);',
    '    var meta=st==="new"',
    '      ?"新卡片（從未複習）"',
    '      :("間隔 "+c.interval+"天 · EF "+c.ef.toFixed(2)+(c.nextReview?" · 下次 "+c.nextReview:""));',
    '    var cls="question-item"+(st==="mastered"?" is-mast":"");',
    '    return \'<div class="\'+cls+\'">\'',
    '      +\'<div class="question-header">\'',
    '      +\'<div class="question-text">\'+item.question+\'<div class="srs-mini">\'+meta+\'<\/div><\/div>\'',
    '      +\'<button id="\'+type+"-btn-"+i+\'" class="btn btn-sm qa-tog" data-type="\'+type+\'" data-idx="\'+i+\'">顯示答案<\/button>\'',
    '      +\'<\/div>\'',
    '      +\'<div id="\'+type+"-ans-"+i+\'" class="question-answer">\'+item.answer+\'<\/div>\'',
    '      +\'<\/div>\';',
    '  }).join("");',
    '}',
    '',
    'function renderAllModal(){',
    '  var q=document.getElementById("allQSearch").value;',
    '  var a=document.getElementById("allASearch").value;',
    '  var base=filteredData.slice();',
    '  var list=filterModalList(base,q,a);',
    '  var suffix=(q||a)?" / "+base.length:"";',
    '  document.getElementById("allCount2").textContent="全部題目（"+list.length+suffix+" 題）";',
    '  document.getElementById("allList").innerHTML=buildList(list,"all");',
    '}',
    'function showAllModal(){',
    '  document.getElementById("allQSearch").value="";',
    '  document.getElementById("allASearch").value="";',
    '  renderAllModal();',
    '  document.getElementById("allModal").classList.add("open");',
    '}',
    'function renderDueModal(){',
    '  var q=document.getElementById("dueQSearch").value;',
    '  var a=document.getElementById("dueASearch").value;',
    '  var base=filteredData.filter(function(item){var st=getStatus(item.question);return st==="due"||st==="new";});',
    '  var list=filterModalList(base,q,a);',
    '  var suffix=(q||a)?" / "+base.length:"";',
    '  document.getElementById("dueCount2").textContent="今日待學（"+list.length+suffix+" 題）";',
    '  document.getElementById("dueList").innerHTML=buildList(list,"due");',
    '}',
    'function showDueModal(){',
    '  document.getElementById("dueQSearch").value="";',
    '  document.getElementById("dueASearch").value="";',
    '  renderDueModal();',
    '  document.getElementById("dueModal").classList.add("open");',
    '}',
    'function renderMastModal(){',
    '  var q=document.getElementById("mastQSearch").value;',
    '  var a=document.getElementById("mastASearch").value;',
    '  var base=filteredData.filter(function(item){return getStatus(item.question)==="mastered";});',
    '  var list=filterModalList(base,q,a);',
    '  var suffix=(q||a)?" / "+base.length:"";',
    '  document.getElementById("mastCount2").textContent="已掌握（"+list.length+suffix+" 題）";',
    '  document.getElementById("mastList").innerHTML=buildList(list,"mast");',
    '}',
    'function showMastModal(){',
    '  document.getElementById("mastQSearch").value="";',
    '  document.getElementById("mastASearch").value="";',
    '  renderMastModal();',
    '  document.getElementById("mastModal").classList.add("open");',
    '}',
    'function setupModal(modal){',
    '  modal.addEventListener("click",function(e){',
    '    if(e.target===modal){modal.classList.remove("open");return;}',
    '    if(e.target.classList.contains("qa-tog"))',
    '      toggleModalQA(parseInt(e.target.getAttribute("data-idx"),10),e.target.getAttribute("data-type"));',
    '  });',
    '}',
    '',

  /* ── Generator UI logic ─────────────────────────────────────────── */
  var inputEl     = document.getElementById('input');
  var outputEl    = document.getElementById('output');
  var statusEl    = document.getElementById('status');
  var outputBadge = document.getElementById('outputBadge');
  var debugWrap   = document.getElementById('debugWrap');
  var debugContent= document.getElementById('debugContent');
  var noH1Banner  = document.getElementById('noH1Banner');

  function setStatus(msg,type){statusEl.textContent=msg;statusEl.className='status-bar '+(type||'');}
  function setOutputMode(mode){
    if(mode==='html'){outputEl.style.color='#fcd34d';outputBadge.textContent='HTML';outputBadge.className='badge badge-html';}
    else{outputEl.style.color='#86efac';outputBadge.textContent='JSON';outputBadge.className='badge badge-json';}
  }
  function showNoH1Banner(){noH1Banner.classList.add('visible');noH1Banner.scrollIntoView({behavior:'smooth',block:'nearest'});}
  function hideNoH1Banner(){noH1Banner.classList.remove('visible');}

  document.getElementById('noH1BannerClose').addEventListener('click',hideNoH1Banner);
  inputEl.addEventListener('input',hideNoH1Banner);

  function clearAll(){
    inputEl.value='';outputEl.value='';_lastRawHtmls=[];
    debugWrap.classList.remove('visible');hideNoH1Banner();setStatus('');setOutputMode('json');
  }

  document.getElementById('btnConvert').addEventListener('click',function(){
    var raw=inputEl.value;
    if(!raw.trim()){setStatus('⚠ Input is empty','err');return;}
    hideNoH1Banner();
    try{
      var json=mdToJson(raw);
      outputEl.value=JSON.stringify(json,null,2);
      setOutputMode('json');
      setStatus('✓ '+json.length+' card'+(json.length!==1?'s':'')+' converted to JSON','ok');
    }catch(e){outputEl.value='';setStatus('✗ '+e.message,'err');}
  });

  document.getElementById('btnGenerate').addEventListener('click',function(){
    var raw=inputEl.value;
    if(!raw.trim()){setStatus('⚠ Input is empty','err');return;}
    var title=extractTitle(raw);
    if(!title){showNoH1Banner();setStatus('✗ No H1 title found','err');return;}
    hideNoH1Banner();
    try{
      var json=mdToJson(raw);
      outputEl.value=generateQuizHtml(title,json);
      setOutputMode('html');
      setStatus('✓ HTML generated -- "'+title+'" ('+json.length+' card'+(json.length!==1?'s':'')+') with SM-2 SRS','ok');
    }catch(e){setStatus('✗ '+e.message,'err');}
  });

  document.getElementById('btnCopy').addEventListener('click',function(){
    if(!outputEl.value)return;
    navigator.clipboard.writeText(outputEl.value).then(function(){
      var b=document.getElementById('btnCopy');var o=b.textContent;
      b.textContent='✓ Copied!';setTimeout(function(){b.textContent=o;},2000);
    });
  });

  document.getElementById('btnClearInput').addEventListener('click',function(){inputEl.value='';hideNoH1Banner();inputEl.focus();setStatus('');});
  document.getElementById('btnClearOutput').addEventListener('click',function(){outputEl.value='';_lastRawHtmls=[];debugWrap.classList.remove('visible');setOutputMode('json');setStatus('');});
  document.getElementById('btnClearAll').addEventListener('click',clearAll);

  document.getElementById('btnDebug').addEventListener('click',function(){
    debugContent.textContent=_lastRawHtmls.length===0
      ?'Run a conversion first.'
      :_lastRawHtmls.map(function(x){return '── '+x.question+' ──\n'+x.rawHtml;}).join('\n\n');
    debugWrap.classList.add('visible');
  });
  document.getElementById('btnCloseDebug').addEventListener('click',function(){debugWrap.classList.remove('visible');});
</script>
</body>
</html>

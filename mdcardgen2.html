<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown → Quiz Card Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      padding: 24px;
      color: #e2e8f0;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #818cf8 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .container { max-width: 1500px; margin: 0 auto; }
    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 16px;
    }
    .title-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #94a3b8;
      white-space: nowrap;
    }
    #titleInput {
      flex: 1;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 8px 12px;
      transition: border-color .2s, box-shadow .2s;
    }
    #titleInput:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,.15);
    }
    #titleInput::placeholder { color: #475569; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 84px 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel { display: flex; flex-direction: column; gap: 8px; }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-md   { background: #1e3a5f; color: #60a5fa; }
    .badge-json { background: #14532d; color: #4ade80; }
    .badge-html { background: #3b1f5e; color: #c084fc; }
    textarea {
      width: 100%;
      height: 74vh;
      padding: 14px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
      font-size: 12.5px;
      line-height: 1.75;
      resize: vertical;
      transition: border-color .2s, box-shadow .2s;
    }
    textarea:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,.15);
    }
    #output     { color: #86efac; }
    #htmlOutput { color: #fcd34d; height: 50vh; }
    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding-top: 28px;
    }
    .btn-convert {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 22px;
      background: linear-gradient(135deg, #818cf8, #34d399);
      color: #0f172a;
      font-weight: 900;
      box-shadow: 0 4px 18px rgba(129,140,248,.45);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-convert:hover  { transform: scale(1.12); box-shadow: 0 6px 24px rgba(129,140,248,.6); }
    .btn-convert:active { transform: scale(.97); }
    .btn-generate {
      width: 64px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border: none;
      color: #fff;
      padding: 7px 6px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.4;
      text-align: center;
      box-shadow: 0 3px 14px rgba(124,58,237,.45);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-generate:hover  { transform: scale(1.08); }
    .btn-generate:active { transform: scale(.97); }
    .btn-small {
      background: #1e293b;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-small:hover { background: #334155; color: #e2e8f0; }
    .btn-clear {
      background: #2d1a1a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-clear:hover { background: #3f1a1a; color: #fca5a5; border-color: #ef4444; }
    .status {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      min-height: 16px;
    }
    .status.ok  { color: #34d399; }
    .status.err { color: #f87171; }
    .html-section { margin-top: 20px; }
    #debugWrap {
      margin-top: 20px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    #debugWrap.visible { display: block; }
    .debug-header {
      padding: 8px 16px;
      background: #0f172a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #debugContent {
      padding: 14px 16px;
      font-family: monospace;
      font-size: 12px;
      color: #fbbf24;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .middle { flex-direction: row; padding-top: 0; flex-wrap: wrap; justify-content: center; }
      textarea { height: 42vh; }
      #htmlOutput { height: 38vh; }
      .title-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✦ Markdown → Quiz Card Generator</h1>

  <div class="title-row">
    <span class="title-label">Card Title</span>
    <input type="text" id="titleInput"
      placeholder="Enter the quiz card page title…" />
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-header">
        <label>Input</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-md">Markdown</span>
          <button class="btn-clear" id="btnClearInput">✕ Clear</button>
        </div>
      </div>
      <textarea id="input" spellcheck="false"
        placeholder="Paste markdown with ## H2 sections…"></textarea>
    </div>

    <div class="middle">
      <button class="btn-convert" id="btnConvert" title="Convert MD → JSON">→</button>
      <div class="status" id="status"></div>
      <button class="btn-generate" id="btnGenerate">📄 Gen HTML</button>
      <button class="btn-small"  id="btnDebug">🔍</button>
      <button class="btn-clear"  id="btnClearAll">🗑</button>
    </div>

    <div class="panel">
      <div class="panel-header">
        <label>JSON Output</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-json">JSON</span>
          <button class="btn-small" id="btnCopy">⎘ Copy</button>
          <button class="btn-clear" id="btnClearOutput">✕ Clear</button>
        </div>
      </div>
      <textarea id="output" readonly spellcheck="false"
        placeholder="JSON output will appear here…"></textarea>
    </div>
  </div>

  <div class="html-section panel">
    <div class="panel-header">
      <label>Generated Quiz Card HTML</label>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="badge badge-html">HTML</span>
        <button class="btn-small" id="btnCopyHtml">⎘ Copy</button>
        <button class="btn-clear" id="btnClearHtml">✕ Clear</button>
      </div>
    </div>
    <textarea id="htmlOutput" readonly spellcheck="false"
      placeholder="The complete quiz card HTML will appear here after clicking 📄 Gen HTML…"></textarea>
  </div>

  <div id="debugWrap">
    <div class="debug-header">
      <span>🔍 Raw marked.parse() output</span>
      <button class="btn-small" id="btnCloseDebug">✕ Close</button>
    </div>
    <div id="debugContent"></div>
  </div>
</div>

    return String(s)
      .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

      .replace(/</g,'\\u003C').replace(/>/g,'\\u003E');

    var titl = title ? ' title="' + escAttr(title) + '"' : '';
    return '<img src="' + src + '"' + alt + titl + ' />';
  };
  renderer.hr = function() { return ''; };

                      headerIds:false, mangle:false });

  function cleanHtml(html) {
    return html
      .replace(/<br\s*\/?>/gi, '<br />')
      .replace(/<br \/>\s*(<\/(?:p|li|td|th|blockquote|div)>)/gi, '$1')
      .replace(/(<\/[^>]+>)\s+(<[^/])/g, '$1$2')

  // ── Core MD → JSON conversion ─────────────────────────────────────────────────
  var _lastRawHtmls = [];

  function mdToJson(raw) {
    _lastRawHtmls = [];
    var stripped = raw.replace(/^---[\s\S]*?---[ \t]*(\r?\n|$)/, '');
    var chunks = stripped.split(/(?=^## )/m).map(function(c){ return c.trim(); }).filter(function(c){ return c.length > 0; });
    if (chunks.length === 0) throw new Error('No ## headings found. Sections must start with "## Title".');
    var result = [];
    for (var k = 0; k < chunks.length; k++) {
      var chunk = chunks[k];
      var m = chunk.match(/^## (.+?)[ \t]*(\r?\n|$)/);
      if (!m) continue;
      var question = m[1].trim();
      var body = chunk.slice(m[0].length).trim();
      if (!body) { result.push({ question: question, answer: '' }); continue; }
      var rawHtml = marked.parse(body);
      _lastRawHtmls.push({ question: question, rawHtml: rawHtml });
      result.push({ question: question, answer: cleanHtml(rawHtml) });
    }
    return result;
  }

  // ── Generate full HTML file ───────────────────────────────────────────────────
  function generateQuizHtml(title, json) {
    return QUIZ_TEMPLATE
      .replace(/%%TITLE%%/g, escHtml(title || 'Quiz Card'))
      .replace('%%JSON%%', safeJson(json));
  }

  // ── UI ────────────────────────────────────────────────────────────────────────
  var inputEl      = document.getElementById('input');
  var outputEl     = document.getElementById('output');
  var htmlOutputEl = document.getElementById('htmlOutput');
  var titleInputEl = document.getElementById('titleInput');
  var statusEl     = document.getElementById('status');
  var debugWrap    = document.getElementById('debugWrap');
  var debugContent = document.getElementById('debugContent');

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + (type || '');
  }

  function clearAll() {
    inputEl.value = ''; outputEl.value = ''; htmlOutputEl.value = '';
    titleInputEl.value = ''; _lastRawHtmls = [];
    debugWrap.classList.remove('visible'); setStatus('');
  }

  document.getElementById('btnConvert').addEventListener('click', function() {
    var raw = inputEl.value;
    if (!raw.trim()) { setStatus('⚠ Input is empty', 'err'); return; }
    try {
      var json = mdToJson(raw);
      outputEl.value = JSON.stringify(json, null, 2);
      setStatus('✓ ' + json.length + ' section' + (json.length !== 1 ? 's' : '') + ' converted', 'ok');
    } catch(e) { outputEl.value = ''; setStatus('✗ ' + e.message, 'err'); }
  });

  document.getElementById('btnGenerate').addEventListener('click', function() {
    var title = titleInputEl.value.trim();
    if (!title) { setStatus('⚠ Enter a card title first', 'err'); return; }
    var json;
    var jsonStr = outputEl.value.trim();
    if (!jsonStr) {
      var raw = inputEl.value;
      if (!raw.trim()) { setStatus('⚠ Input is empty', 'err'); return; }
      try { json = mdToJson(raw); outputEl.value = JSON.stringify(json, null, 2); }
      catch(e) { setStatus('✗ ' + e.message, 'err'); return; }
    } else {
      try { json = JSON.parse(jsonStr); }
      catch(e) { setStatus('✗ Invalid JSON in output pane', 'err'); return; }
    }
    htmlOutputEl.value = generateQuizHtml(title, json);
    setStatus('✓ HTML generated (' + json.length + ' card' + (json.length !== 1 ? 's' : '') + ')', 'ok');
    setTimeout(function(){ htmlOutputEl.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 80);
  });

  document.getElementById('btnCopy').addEventListener('click', function() {
    if (!outputEl.value) return;
    navigator.clipboard.writeText(outputEl.value).then(function() {
      var b = document.getElementById('btnCopy'); var o = b.textContent;
      b.textContent = '✓ Copied!'; setTimeout(function(){ b.textContent = o; }, 2000);
    });
  });

  document.getElementById('btnCopyHtml').addEventListener('click', function() {
    if (!htmlOutputEl.value) return;
    navigator.clipboard.writeText(htmlOutputEl.value).then(function() {
      var b = document.getElementById('btnCopyHtml'); var o = b.textContent;
      b.textContent = '✓ Copied!'; setTimeout(function(){ b.textContent = o; }, 2000);
    });
  });

  document.getElementById('btnClearInput').addEventListener('click', function(){ inputEl.value = ''; inputEl.focus(); setStatus(''); });
  document.getElementById('btnClearOutput').addEventListener('click', function(){ outputEl.value = ''; _lastRawHtmls = []; debugWrap.classList.remove('visible'); setStatus(''); });
  document.getElementById('btnClearHtml').addEventListener('click', function(){ htmlOutputEl.value = ''; setStatus(''); });
  document.getElementById('btnClearAll').addEventListener('click', clearAll);

  function showDebug() {
    debugContent.textContent = _lastRawHtmls.length === 0
      ? 'Run a conversion first.'
      : _lastRawHtmls.map(function(x){ return '── ' + x.question + ' ──\n' + x.rawHtml; }).join('\n\n');
    debugWrap.classList.add('visible');
  }
  document.getElementById('btnDebug').addEventListener('click', showDebug);
  document.getElementById('btnCloseDebug').addEventListener('click', function(){ debugWrap.classList.remove('visible'); });

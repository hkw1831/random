<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown → Quiz Card Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      padding: 24px;
      color: #e2e8f0;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #818cf8 0%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .container { max-width: 1500px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 84px 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel { display: flex; flex-direction: column; gap: 8px; }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-md   { background: #1e3a5f; color: #60a5fa; }
    .badge-json { background: #14532d; color: #4ade80; }
    .badge-html { background: #3b1f5e; color: #c084fc; }
    textarea {
      width: 100%;
      height: 74vh;
      padding: 14px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-family: 'Menlo', 'Monaco', 'Consolas', monospace;
      font-size: 12.5px;
      line-height: 1.75;
      resize: vertical;
      transition: border-color .2s, box-shadow .2s;
    }
    textarea:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,.15);
    }
    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding-top: 28px;
    }
    .btn-convert {
      width: 64px;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      border: none;
      color: #fff;
      padding: 7px 6px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.4;
      text-align: center;
      box-shadow: 0 3px 14px rgba(14,165,233,.45);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-convert:hover  { transform: scale(1.08); }
    .btn-convert:active { transform: scale(.97); }
    .btn-generate {
      width: 64px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border: none;
      color: #fff;
      padding: 7px 6px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1.4;
      text-align: center;
      box-shadow: 0 3px 14px rgba(124,58,237,.45);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-generate:hover  { transform: scale(1.08); }
    .btn-generate:active { transform: scale(.97); }
    .btn-small {
      background: #1e293b;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-small:hover { background: #334155; color: #e2e8f0; }
    .btn-clear {
      background: #2d1a1a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-clear:hover { background: #3f1a1a; color: #fca5a5; border-color: #ef4444; }
    .status-bar {
      margin-top: 12px;
      padding: 8px 16px;
      border-radius: 8px;
      text-align: center;
      font-size: 12.5px;
      min-height: 36px;
      line-height: 20px;
      color: transparent;
      border: 1px solid transparent;
      transition: all .2s;
    }
    .status-bar.ok  { color: #34d399; background: rgba(52,211,153,.07); border-color: rgba(52,211,153,.2); }
    .status-bar.err { color: #f87171; background: rgba(248,113,113,.07); border-color: rgba(248,113,113,.2); }
    .error-banner {
      display: none;
      align-items: center;
      gap: 12px;
      background: #2d1a1a;
      border: 1px solid #ef4444;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      color: #fca5a5;
      font-size: 13px;
      line-height: 1.5;
    }
    .error-banner.visible { display: flex; }
    .error-banner-icon { font-size: 22px; flex-shrink: 0; }
    .error-banner-text strong { display: block; color: #f87171; font-size: 14px; margin-bottom: 2px; }
    .error-banner-close {
      margin-left: auto;
      background: none;
      border: none;
      color: #f87171;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background .15s;
      flex-shrink: 0;
    }
    .error-banner-close:hover { background: #3f1a1a; }

      margin-top: 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    #debugWrap.visible { display: block; }
    .debug-header {
      padding: 8px 16px;
      background: #0f172a;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #debugContent {
      padding: 14px 16px;
      font-family: monospace;
      font-size: 12px;
      color: #fbbf24;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .middle { flex-direction: row; padding-top: 0; flex-wrap: wrap; justify-content: center; }
      textarea { height: 42vh; }
    }
  </style>

<div class="container">
  <h1>✦ Markdown → Quiz Card Generator</h1>

  <div class="error-banner" id="noH1Banner">
    <span class="error-banner-icon">⚠️</span>
    <div class="error-banner-text">
      <strong>No H1 title found in the Markdown</strong>
      Add a title at the top of your markdown using <code style="background:#3f1a1a;padding:1px 5px;border-radius:3px;color:#fcd34d;"># Your Title</code>, then try again.
    </div>
    <button class="error-banner-close" id="noH1BannerClose" title="Dismiss">✕</button>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-header">
        <label>Input</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-md">Markdown</span>
          <button class="btn-clear" id="btnClearInput">✕ Clear</button>
        </div>
      </div>
      <textarea id="input" spellcheck="false"
        placeholder="# Your Quiz Title&#10;&#10;## Question one&#10;Answer content here…&#10;&#10;## Question two&#10;Answer content here…"></textarea>
    </div>

    <div class="middle">
      <button class="btn-convert"  id="btnConvert"  title="Convert MD → JSON">→<br>Gen JSON</button>
      <button class="btn-generate" id="btnGenerate" title="Generate Quiz HTML">📄<br>Gen HTML</button>
      <button class="btn-small"    id="btnDebug">🔍</button>
      <button class="btn-clear"    id="btnClearAll">🗑</button>
    </div>

    <div class="panel">
      <div class="panel-header">
        <label>Output</label>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-json" id="outputBadge">JSON</span>
          <button class="btn-small" id="btnCopy">⎘ Copy</button>
          <button class="btn-clear" id="btnClearOutput">✕ Clear</button>
        </div>
      </div>
      <textarea id="output" readonly spellcheck="false"
        placeholder="JSON or HTML output will appear here…"></textarea>
    </div>
  </div>

  <div class="status-bar" id="status"></div>

  <div id="debugWrap">
    <div class="debug-header">
      <span>🔍 Raw marked.parse() output</span>
      <button class="btn-small" id="btnCloseDebug">✕ Close</button>
    </div>
    <div id="debugContent"></div>
  </div>
</div>

  function escAttr(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function safeJson(data) {
    return JSON.stringify(data, null, 2)
      .replace(/</g,'\\u003C').replace(/>/g,'\\u003E');
  }

  var renderer = new marked.Renderer();
  renderer.image = function(href, title, text) {
    var src  = escAttr((href  || '').replace(/^["']|["']$/g,''));
    var alt  = text  ? ' alt="'   + escAttr(text)  + '"' : '';
    var titl = title ? ' title="' + escAttr(title) + '"' : '';
    return '<img src="' + src + '"' + alt + titl + ' />';
  };
  renderer.hr = function() { return ''; };
  marked.setOptions({ renderer:renderer, gfm:true, breaks:true,
                      headerIds:false, mangle:false });

  function cleanHtml(html) {
    return html
      .replace(/<br\s*\/?>/gi, '<br />')
      .replace(/<br \/>\s*(<\/(?:p|li|td|th|blockquote|div)>)/gi, '$1')
      .replace(/(<\/[^>]+>)\s+(<[^/])/g, '$1$2')
      .replace(/\r?\n/g, '')
      .trim();
  }

  function extractTitle(raw) {
    var m = raw.match(/^# (.+?)[ \t]*$/m);
    return m ? m[1].trim() : null;
  }

  var _lastRawHtmls = [];

  function mdToJson(raw) {
    _lastRawHtmls = [];
    var stripped = raw.replace(/^---[\s\S]*?---[ \t]*(\r?\n|$)/, '');
    var chunks = stripped.split(/(?=^## )/m).map(function(c){ return c.trim(); }).filter(function(c){ return c.length > 0; });
    if (chunks.length === 0) throw new Error('No ## headings found. Sections must start with "## Title".');
    var result = [];
    for (var k = 0; k < chunks.length; k++) {
      var chunk = chunks[k];
      var m = chunk.match(/^## (.+?)[ \t]*(\r?\n|$)/);
      if (!m) continue;
      var question = m[1].trim();
      var body = chunk.slice(m[0].length).trim();
      if (!body) { result.push({ question: question, answer: '' }); continue; }
      var rawHtml = marked.parse(body);
      _lastRawHtmls.push({ question: question, rawHtml: rawHtml });
      result.push({ question: question, answer: cleanHtml(rawHtml) });
    }
    return result;
  }

  function generateQuizHtml(title, json) {
    return QUIZ_TEMPLATE
      .replace(/%%TITLE%%/g, escHtml(title))
      .replace('%%JSON%%', safeJson(json));
  }

  var inputEl      = document.getElementById('input');
  var outputEl     = document.getElementById('output');
  var statusEl     = document.getElementById('status');
  var outputBadge  = document.getElementById('outputBadge');
  var debugWrap    = document.getElementById('debugWrap');
  var debugContent = document.getElementById('debugContent');
  var noH1Banner   = document.getElementById('noH1Banner');

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status-bar ' + (type || '');
  }
  function setOutputMode(mode) {
    if (mode === 'html') {
      outputEl.style.color = '#fcd34d';
      outputBadge.textContent = 'HTML';
      outputBadge.className = 'badge badge-html';
    } else {
      outputEl.style.color = '#86efac';
      outputBadge.textContent = 'JSON';
      outputBadge.className = 'badge badge-json';
    }
  }
  function showNoH1Banner() { noH1Banner.classList.add('visible'); noH1Banner.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
  function hideNoH1Banner() { noH1Banner.classList.remove('visible'); }

  document.getElementById('noH1BannerClose').addEventListener('click', hideNoH1Banner);
  inputEl.addEventListener('input', hideNoH1Banner);

  function clearAll() {
    inputEl.value = ''; outputEl.value = ''; _lastRawHtmls = [];
    debugWrap.classList.remove('visible'); hideNoH1Banner(); setStatus(''); setOutputMode('json');
  }

  document.getElementById('btnConvert').addEventListener('click', function() {
    var raw = inputEl.value;
    if (!raw.trim()) { setStatus('⚠ Input is empty', 'err'); return; }
    hideNoH1Banner();
    try {
      var json = mdToJson(raw);
      outputEl.value = JSON.stringify(json, null, 2);
      setOutputMode('json');
      setStatus('✓ ' + json.length + ' section' + (json.length !== 1 ? 's' : '') + ' converted to JSON', 'ok');
    } catch(e) { outputEl.value = ''; setStatus('✗ ' + e.message, 'err'); }
  });

  document.getElementById('btnGenerate').addEventListener('click', function() {
    var raw = inputEl.value;
    if (!raw.trim()) { setStatus('⚠ Input is empty', 'err'); return; }
    var title = extractTitle(raw);
    if (!title) { showNoH1Banner(); setStatus('✗ No H1 title found', 'err'); return; }
    hideNoH1Banner();
    try {
      var json = mdToJson(raw);
      outputEl.value = generateQuizHtml(title, json);
      setOutputMode('html');
      setStatus('✓ HTML generated -- "' + title + '" (' + json.length + ' card' + (json.length !== 1 ? 's' : '') + ')', 'ok');
    } catch(e) { setStatus('✗ ' + e.message, 'err'); }
  });

  document.getElementById('btnCopy').addEventListener('click', function() {
    if (!outputEl.value) return;
    navigator.clipboard.writeText(outputEl.value).then(function() {
      var b = document.getElementById('btnCopy'); var o = b.textContent;
      b.textContent = '✓ Copied!'; setTimeout(function(){ b.textContent = o; }, 2000);
    });
  });

  document.getElementById('btnClearInput').addEventListener('click', function() { inputEl.value = ''; hideNoH1Banner(); inputEl.focus(); setStatus(''); });
  document.getElementById('btnClearOutput').addEventListener('click', function() { outputEl.value = ''; _lastRawHtmls = []; debugWrap.classList.remove('visible'); setOutputMode('json'); setStatus(''); });
  document.getElementById('btnClearAll').addEventListener('click', clearAll);

  document.getElementById('btnDebug').addEventListener('click', function() {
    debugContent.textContent = _lastRawHtmls.length === 0
      ? 'Run a conversion first.'
      : _lastRawHtmls.map(function(x){ return '── ' + x.question + ' ──\n' + x.rawHtml; }).join('\n\n');
    debugWrap.classList.add('visible');
  });
  document.getElementById('btnCloseDebug').addEventListener('click', function(){ debugWrap.classList.remove('visible'); });

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM 筋膜手法 CC 點和 CF 點 Q&A 隨機抽題卡</title>
    <style>
        :root {
            --primary: #4361ee;
            --primary-light: #4895ef;
            --secondary: #3f37c9;
            --background: #f8f9fa;
            --card-bg: #ffffff;
            --text: #212529;
            --success: #38b000;
            --error: #d00000;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--background);
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }
        
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .question {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }
        
        .show-answer-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }
        
        .answer-container {
            margin-top: 1rem;
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.5s ease;
        }
        
        .answer-content {
            background-color: rgba(67, 97, 238, 0.1);
            border-left: 4px solid var(--primary);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
        }
        
        .answer-content ul {
            padding-left: 1.5rem;
        }
        
        .answer-content li {
            margin-bottom: 0.5rem;
        }
        
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.3s, transform 0.2s;
            display: inline-block;
            margin: 0.5rem 0.5rem 0.5rem 0;
        }
        
        .btn:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-success {
            background-color: var(--success);
        }
        
        .btn-success:hover {
            background-color: #2d9600;
        }
        
        .btn-error {
            background-color: var(--error);
        }
        
        .btn-error:hover {
            background-color: #b00000;
        }

        .btn-info {
            background-color: #6c757d;
        }

        .btn-info:hover {
            background-color: #5a6268;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .feedback-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }
        
        .count {
            text-align: center;
            margin-top: 1rem;
            color: var(--primary);
            font-weight: 500;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1rem 0;
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        
        .stat-item {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #6c757d;
            white-space: nowrap;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-value.correct {
            color: var(--success);
        }
        
        .stat-value.incorrect {
            color: var(--error);
        }
        
        footer {
            margin-top: auto;
            text-align: center;
            padding: 1rem 0;
            font-size: 0.9rem;
            color: #6c757d;
        }
        
        .info {
            margin: 1rem 0;
            padding: 1rem;
            background-color: rgba(67, 97, 238, 0.05);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            margin: 2rem auto;
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .question-list {
            margin-top: 1rem;
        }

        .question-item {
            background-color: rgba(67, 97, 238, 0.05);
            border-left: 4px solid var(--primary);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
        }

        .question-item.correct {
            border-left-color: var(--success);
            background-color: rgba(56, 176, 0, 0.05);
        }

        .question-item.remaining {
            border-left-color: var(--primary);
            background-color: rgba(67, 97, 238, 0.05);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            gap: 1rem;
        }

        .question-text {
            flex: 1;
            font-weight: 500;
        }

        .question-answer {
            margin-top: 1rem;
            padding: 1rem;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 5px;
            border: 1px solid rgba(67, 97, 238, 0.2);
            display: none;
        }

        .question-answer.show {
            display: block;
        }

        .question-answer ul {
            margin: 0;
            padding-left: 1.5rem;
        }

        .question-answer li {
            margin-bottom: 0.5rem;
        }

        .question-count {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 1rem;
            text-align: center;
        }

        .question-count.correct {
            color: var(--success);
        }

        .question-count.remaining {
            color: var(--primary);
        }

        @media (max-width: 600px) {
            .stats {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            
            .stat-item {
                min-width: calc(50% - 0.5rem);
                flex: none;
            }
            
            .card {
                padding: 1.5rem;
            }
            
            .question {
                font-size: 1.25rem;
            }
            
            .btn {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }

            .btn-small {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .controls .btn {
                width: 100%;
                margin-right: 0;
            }
            
            .feedback-controls {
                flex-direction: column;
            }

            .modal-buttons {
                flex-direction: column;
            }

            .modal-content {
                margin: 1rem auto;
                padding: 1.5rem;
                max-width: 95%;
            }

            .question-header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }

            .question-text {
                margin-bottom: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>肌肉伸展 Q&A 隨機抽題卡</h1>
            <p>隨機抽取伸展相關問題並測試自己的知識</p>
        </header>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">總題數</div>
                <div id="totalCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">待答題數</div>
                <div id="remainingCount" class="stat-value">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">答對</div>
                <div id="correctCount" class="stat-value correct">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">答錯</div>
                <div id="incorrectCount" class="stat-value incorrect">0</div>
            </div>
        </div>
        
        <div class="controls">
            <button id="drawBtn" class="btn">隨機抽題</button>
            <button id="resetBtn" class="btn">重設</button>
            <button id="showRemainingBtn" class="btn btn-info">查看待答題目</button>
            <button id="showCorrectBtn" class="btn btn-info">查看已答對題目</button>
        </div>
        
        <div class="info">
            <p>✓ 正確回答的問題將不再出現</p>
            <p>✓ 回答錯誤的問題將保留在題庫中再次抽取</p>
            <p>✓ 按「重設」按鈕可重新開始</p>
            <p>✓ 可查看待答題目和已答對題目列表</p>
        </div>
        
        <div id="card" class="card">
            <div id="question" class="question">按下「隨機抽題」按鈕開始</div>
            
            <div class="show-answer-btn-container">
                <button id="showAnswerBtn" class="btn">顯示答案</button>
            </div>
            
            <div id="answerContainer" class="answer-container">
                <div id="answer" class="answer-content"></div>
                <div id="feedbackControls" class="feedback-controls">
                    <button id="correctBtn" class="btn btn-success">我答對了</button>
                    <button id="incorrectBtn" class="btn btn-error">我答錯了</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 重設確認模態框 -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">確定要重設？</div>
            <p>這將清除所有答題進度，此操作無法撤銷。</p>
            <div class="modal-buttons">
                <button id="confirmResetBtn" class="btn btn-error">確定重設</button>
                <button id="cancelResetBtn" class="btn">取消</button>
            </div>
        </div>
    </div>

    <!-- 待答題目模態框 -->
    <div id="remainingModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">待答題目列表</div>
            <div id="remainingQuestionCount" class="question-count remaining"></div>
            <div id="remainingQuestionList" class="question-list"></div>
            <div class="modal-buttons">
                <button id="closeRemainingBtn" class="btn">關閉</button>
            </div>
        </div>
    </div>

    <!-- 已答對題目模態框 -->
    <div id="correctModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">已答對題目列表</div>
            <div id="correctQuestionCount" class="question-count correct"></div>
            <div id="correctQuestionList" class="question-list"></div>
            <div class="modal-buttons">
                <button id="closeCorrectBtn" class="btn">關閉</button>
            </div>
        </div>
    </div>
    
    <footer>
        <p>© FM 筋膜手法 CC 點和 CF 點 Q&A 隨機抽題卡</p>
    </footer>

    "answer": "肌梭是肌肉內主要的感覺器官，由許多微小的肌梭內纖維組合而成，並且平行於肌梭外纖維。肌梭可以監測牽張的速度及時間，並且感覺肌肉長度的變化。"
  },
  {
    "question": "GTO",
    "answer": "GTO 位於肌肉肌腱連合處附近，可以感覺出肌肉被動牽張或主動收縮時的張力。<br><br>肌肉主動收縮後激發閥值相當低，對被動牽張的激發閥值較高。<br><br>肌肉張力過高時， GTO 會被激發，supress alpha 運動神經元的活動，以降低肌肉的張力。"
  }
]
;
        
        // 初始化變數
        let currentQuestion = null;
        let correctAnswers = [];
        let incorrectAnswers = [];
        let isAnswerShowing = false;
        let storageAvailable = false;
        
        // 取得DOM元素
        const drawBtn = document.getElementById('drawBtn');
        const showAnswerBtn = document.getElementById('showAnswerBtn');
        const resetBtn = document.getElementById('resetBtn');
        const showRemainingBtn = document.getElementById('showRemainingBtn');
        const showCorrectBtn = document.getElementById('showCorrectBtn');
        const questionElem = document.getElementById('question');
        const answerElem = document.getElementById('answer');
        const answerContainer = document.getElementById('answerContainer');
        const feedbackControls = document.getElementById('feedbackControls');
        const correctBtn = document.getElementById('correctBtn');
        const incorrectBtn = document.getElementById('incorrectBtn');
        
        // 重設確認模態框元素
        const resetModal = document.getElementById('resetModal');
        const confirmResetBtn = document.getElementById('confirmResetBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        
        // 待答題目模態框元素
        const remainingModal = document.getElementById('remainingModal');
        const closeRemainingBtn = document.getElementById('closeRemainingBtn');
        const remainingQuestionCount = document.getElementById('remainingQuestionCount');
        const remainingQuestionList = document.getElementById('remainingQuestionList');
        
        // 已答對題目模態框元素
        const correctModal = document.getElementById('correctModal');
        const closeCorrectBtn = document.getElementById('closeCorrectBtn');
        const correctQuestionCount = document.getElementById('correctQuestionCount');
        const correctQuestionList = document.getElementById('correctQuestionList');
        
        // 統計數據元素
        const totalCountElem = document.getElementById('totalCount');
        const remainingCountElem = document.getElementById('remainingCount');
        const correctCountElem = document.getElementById('correctCount');
        const incorrectCountElem = document.getElementById('incorrectCount');
        
        // 檢測localStorage是否可用
        function checkStorageAvailability() {
            try {
                const testKey = 'test-storage';
                localStorage.setItem(testKey, '1');
                localStorage.removeItem(testKey);
                storageAvailable = true;
                return true;
            } catch (e) {
                storageAvailable = false;
                return false;
            }
        }
        
        // 本地存儲鍵
        const STORAGE_KEY = 'muscleStretchFlashcards';
        
        // 保存進度到本地存儲
        function saveProgress() {
            if (!storageAvailable) return;
            
            try {
                // 只保存問題文本，而不是整個對象
                const correctQuestions = correctAnswers.map(q => q.question);
                const incorrectQuestions = incorrectAnswers.map(q => q.question);
                
                const data = {
                    correctQuestions,
                    incorrectQuestions
                };
                
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.error('保存進度時出錯：', e);
                storageAvailable = false;
            }
        }
        
        // 從本地存儲加載進度
        function loadProgress() {
            if (!storageAvailable) return;
            
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (!data) return;
                
                const { correctQuestions, incorrectQuestions } = JSON.parse(data);
                
                // 根據問題文本還原對象引用
                correctAnswers = qaData.filter(q => correctQuestions.includes(q.question));
                incorrectAnswers = qaData.filter(q => incorrectQuestions.includes(q.question));
                
                // 更新統計
                updateStats();
            } catch (e) {
                console.error('加載進度時出錯：', e);
                storageAvailable = false;
            }
        }
        
        // 更新統計數據
        function updateStats() {
            totalCountElem.textContent = qaData.length;
            remainingCountElem.textContent = qaData.length - correctAnswers.length;
            correctCountElem.textContent = correctAnswers.length;
            incorrectCountElem.textContent = incorrectAnswers.length;
        }
        
        // 初始化 - 檢測存儲可用性並加載保存的進度
        checkStorageAvailability();
        if (storageAvailable) {
            loadProgress();
        }
        updateStats();
        
        // 隨機抽題
        function drawRandomQuestion() {
            // 重置顯示答案按鈕狀態
            showAnswerBtn.textContent = "顯示答案";
            answerContainer.style.maxHeight = "0";
            feedbackControls.style.maxHeight = "0";
            isAnswerShowing = false;
            
            // 過濾掉已經回答正確的問題
            const availableQuestions = qaData.filter(q => !correctAnswers.includes(q));
            
            // 如果所有問題都回答正確，提示用戶
            if (availableQuestions.length === 0) {
                questionElem.innerHTML = "恭喜！所有問題都已經答對了！點擊「重設」重新開始。";
                answerElem.innerHTML = "";
                currentQuestion = null;
                return;
            }
            
            // 隨機選取一個問題
            const randomIndex = Math.floor(Math.random() * availableQuestions.length);
            currentQuestion = availableQuestions[randomIndex];
            
            // 更新界面
            questionElem.innerHTML = currentQuestion.question;
            answerElem.innerHTML = currentQuestion.answer;
        }
        
        // 顯示答案
        function toggleAnswer() {
            if (!currentQuestion) return;
            
            if (isAnswerShowing) {
                answerContainer.style.maxHeight = "0";
                feedbackControls.style.maxHeight = "0";
                showAnswerBtn.textContent = "顯示答案";
            } else {
                answerContainer.style.maxHeight = "1000px";
                feedbackControls.style.maxHeight = "100px";
                showAnswerBtn.textContent = "隱藏答案";
            }
            
            isAnswerShowing = !isAnswerShowing;
        }
        
        // 標記為正確答案
        function markAsCorrect() {
            if (!currentQuestion) return;
            
            // 從不正確列表中移除（如果存在）
            const incorrectIndex = incorrectAnswers.indexOf(currentQuestion);
            if (incorrectIndex !== -1) {
                incorrectAnswers.splice(incorrectIndex, 1);
            }
            
            // 加入正確列表（如果尚未加入）
            if (!correctAnswers.includes(currentQuestion)) {
                correctAnswers.push(currentQuestion);
            }
            
            // 更新統計數據
            updateStats();
            
            // 保存進度
            if (storageAvailable) {
                saveProgress();
            }
            
            // 抽取下一題
            drawRandomQuestion();
        }
        
        // 標記為錯誤答案
        function markAsIncorrect() {
            if (!currentQuestion) return;
            
            // 加入不正確列表（如果尚未加入）
            if (!incorrectAnswers.includes(currentQuestion)) {
                incorrectAnswers.push(currentQuestion);
            }
            
            // 更新統計數據
            updateStats();
            
            // 保存進度
            if (storageAvailable) {
                saveProgress();
            }
            
            // 抽取下一題
            drawRandomQuestion();
        }
        
        // 切換問題列表中的答案顯示
        function toggleQuestionAnswer(index, type) {
            const answerId = `${type}-answer-${index}`;
            const answerElement = document.getElementById(answerId);
            const buttonId = `${type}-btn-${index}`;
            const buttonElement = document.getElementById(buttonId);
            
            if (answerElement.classList.contains('show')) {
                answerElement.classList.remove('show');
                buttonElement.textContent = '顯示答案';
            } else {
                answerElement.classList.add('show');
                buttonElement.textContent = '隱藏答案';
            }
        }
        
        // 顯示待答題目列表
        function showRemainingQuestions() {
            const availableQuestions = qaData.filter(q => !correctAnswers.includes(q));
            remainingQuestionCount.textContent = `待答題目 (${availableQuestions.length} 題)`;
            
            if (availableQuestions.length === 0) {
                remainingQuestionList.innerHTML = '<div class="question-item">所有題目都已經答對了！</div>';
            } else {
                remainingQuestionList.innerHTML = availableQuestions
                    .map((q, index) => `
                        <div class="question-item remaining">
                            <div class="question-header">
                                <div class="question-text">${q.question}</div>
                                <button id="remaining-btn-${index}" class="btn btn-small" onclick="toggleQuestionAnswer(${index}, 'remaining')">顯示答案</button>
                            </div>
                            <div id="remaining-answer-${index}" class="question-answer">
                                ${q.answer}
                            </div>
                        </div>
                    `)
                    .join('');
            }
            
            remainingModal.style.display = 'flex';
        }
        
        // 顯示已答對題目列表
        function showCorrectQuestions() {
            correctQuestionCount.textContent = `已答對題目 (${correctAnswers.length} 題)`;
            
            if (correctAnswers.length === 0) {
                correctQuestionList.innerHTML = '<div class="question-item">尚未答對任何題目</div>';
            } else {
                correctQuestionList.innerHTML = correctAnswers
                    .map((q, index) => `
                        <div class="question-item correct">
                            <div class="question-header">
                                <div class="question-text">${q.question}</div>
                                <button id="correct-btn-${index}" class="btn btn-small" onclick="toggleQuestionAnswer(${index}, 'correct')">顯示答案</button>
                            </div>
                            <div id="correct-answer-${index}" class="question-answer">
                                ${q.answer}
                            </div>
                        </div>
                    `)
                    .join('');
            }
            
            correctModal.style.display = 'flex';
        }
        
        // 顯示重設確認模態框
        function showResetModal() {
            resetModal.style.display = 'flex';
        }
        
        // 隱藏重設確認模態框
        function hideResetModal() {
            resetModal.style.display = 'none';
        }
        
        // 隱藏待答題目模態框
        function hideRemainingModal() {
            remainingModal.style.display = 'none';
        }
        
        // 隱藏已答對題目模態框
        function hideCorrectModal() {
            correctModal.style.display = 'none';
        }
        
        // 執行重設功能
        function doResetQuiz() {
            correctAnswers = [];
            incorrectAnswers = [];
            currentQuestion = null;
            isAnswerShowing = false;
            
            questionElem.innerHTML = "按下「隨機抽題」按鈕開始";
            answerElem.innerHTML = "";
            answerContainer.style.maxHeight = "0";
            feedbackControls.style.maxHeight = "0";
            showAnswerBtn.textContent = "顯示答案";
            
            // 更新統計並保存進度
            updateStats();
            if (storageAvailable) {
                saveProgress();
            }
            
            hideResetModal();
        }
        
        // 將toggleQuestionAnswer綁定到window以供HTML onclick使用
        window.toggleQuestionAnswer = toggleQuestionAnswer;
        
        // 綁定事件
        drawBtn.addEventListener('click', drawRandomQuestion);
        showAnswerBtn.addEventListener('click', toggleAnswer);
        resetBtn.addEventListener('click', showResetModal);
        showRemainingBtn.addEventListener('click', showRemainingQuestions);
        showCorrectBtn.addEventListener('click', showCorrectQuestions);
        confirmResetBtn.addEventListener('click', doResetQuiz);
        cancelResetBtn.addEventListener('click', hideResetModal);
        correctBtn.addEventListener('click', markAsCorrect);
        incorrectBtn.addEventListener('click', markAsIncorrect);
        closeRemainingBtn.addEventListener('click', hideRemainingModal);
        closeCorrectBtn.addEventListener('click', hideCorrectModal);
        
        // 點擊模態框背景時關閉模態框
        resetModal.addEventListener('click', function(e) {
            if (e.target === resetModal) {
                hideResetModal();
            }
        });
        
        remainingModal.addEventListener('click', function(e) {
            if (e.target === remainingModal) {
                hideRemainingModal();
            }
        });
        
        correctModal.addEventListener('click', function(e) {
            if (e.target === correctModal) {
                hideCorrectModal();
            }
        });
    </script>
</body>
</html>
